# =============================================
# VulHunter 前端独立开发模式
# =============================================
# 用途: 仅启动前端容器，用于纯前端 UI 开发
#       后端可运行在宿主机或远程服务器
#
# 构建镜像:
#   docker compose -f docker-compose.frontend-only.yml build
#
# 启动服务:
#   docker compose -f docker-compose.frontend-only.yml up
#
# 等价 docker run 命令 (镜像已构建后):
#   docker run -d -p 3333:5173 \
#     -v /path/to/AuditTool:/app \
#     -v vulhunter_frontend_nm:/app/frontend/node_modules \
#     -v vulhunter_pnpm_store:/pnpm/store \
#     -e FRONTEND_WORKDIR=/app/frontend \
#     -e VITE_API_TARGET=http://host.docker.internal:8000 \
#     -e VITE_HMR_CLIENT_PORT=3333 \
#     -e CHOKIDAR_USEPOLLING=true \
#     --name frontend-local \
#     vulhunter/frontend-local:latest
#
# 环境变量说明:
#   VITE_API_TARGET  - 后端 API 地址 (默认: http://host.docker.internal:8000)
#   VULHUNTER_FRONTEND_PORT - 宿主机端口 (默认: 3333)

services:
  frontend:
    image: vulhunter/frontend-local:latest
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: dev
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - FRONTEND_NPM_REGISTRY=${FRONTEND_NPM_REGISTRY:-https://registry.npmmirror.com}
        - FRONTEND_NPM_REGISTRY_FALLBACK=${FRONTEND_NPM_REGISTRY_FALLBACK:-https://registry.npmjs.org}
        - PNPM_VERSION=${PNPM_VERSION:-9.15.4}
        - BUILD_WEAK_NETWORK=${BUILD_WEAK_NETWORK:-false}
        - BUILD_ARCH=${BUILD_ARCH:-}
        - http_proxy=
        - https_proxy=
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - all_proxy=
        - ALL_PROXY=
    volumes:
      # 挂载整个仓库根目录，FRONTEND_WORKDIR 指定前端子目录
      - ./:/app
      # node_modules 和 pnpm store 使用具名卷隔离，避免宿主机 node_modules 覆盖
      - frontend_node_modules:/app/frontend/node_modules
      - frontend_pnpm_store:/pnpm/store
    ports:
      - "${VULHUNTER_FRONTEND_PORT:-3333}:5173"
    environment:
      # 告知 dev-launcher 前端源码位于仓库根目录下的 frontend 子目录
      FRONTEND_WORKDIR: /app/frontend
      # 后端 API 代理目标，默认指向宿主机 8000 端口
      VITE_API_TARGET: ${VITE_API_TARGET:-http://host.docker.internal:8000}
      VITE_API_BASE_URL: /api/v1
      # HMR 使用宿主机端口（穿透容器端口映射）
      VITE_HMR_CLIENT_PORT: "${VULHUNTER_FRONTEND_PORT:-3333}"
      # 容器内 platform=linux 无法自动检测宿主机类型，显式开启轮询（WSL2/Mac 挂载需要）
      CHOKIDAR_USEPOLLING: "${CHOKIDAR_USEPOLLING:-true}"
      CHOKIDAR_INTERVAL: "${CHOKIDAR_INTERVAL:-300}"
      FRONTEND_DEV_PORT: "5173"
      FRONTEND_PUBLIC_URL: http://localhost:${VULHUNTER_FRONTEND_PORT:-3333}
      BACKEND_PUBLIC_URL: ${VITE_API_TARGET:-http://host.docker.internal:8000}
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"

volumes:
  frontend_node_modules:
  frontend_pnpm_store:
