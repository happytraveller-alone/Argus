# =============================================
# DeepAudit v3.0.4 生产环境一键部署配置（国内加速版）
# =============================================
# 使用南京大学镜像站加速拉取 GHCR 镜像
# 部署命令: curl -fsSL https://raw.githubusercontent.com/lintsinghua/DeepAudit/main/docker-compose.prod.cn.yml | docker compose -f - up -d
# 镜像加速说明：
# - 原始地址：ghcr.io
# - 加速地址：ghcr.nju.edu.cn（南京大学开源镜像站）

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=deepaudit
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - deepaudit-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepaudit-network

  backend:
    image: ghcr.nju.edu.cn/lintsinghua/deepaudit-backend:latest
    restart: unless-stopped
    volumes:
      - backend_uploads:/app/uploads
      - mcp_data:/app/data/mcp
      - qmd_data:/app/data/qmd
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/deepaudit
      - REDIS_URL=redis://redis:6379/0
      - AGENT_ENABLED=true
      - SANDBOX_ENABLED=true
      - SANDBOX_IMAGE=ghcr.nju.edu.cn/lintsinghua/deepaudit-sandbox:latest
      - MCP_ENABLED=true
      - MCP_REQUIRE_ALL_READY_ON_STARTUP=true
      - MCP_REQUIRED_RUNTIME_DOMAIN=all
      - MCP_DAEMON_AUTOSTART=true
      - MCP_DAEMON_LOG_DIR=/tmp/deepaudit/mcp-daemons
      - MCP_SOURCE_SYNC_ENABLED=true
      - MCP_SOURCE_ROOT=/app/data/mcp/sources
      - MCP_SOURCE_SYNC_DEPTH=1
      - MCP_SOURCE_SYNC_STRICT=false
      - MCP_FILESYSTEM_ENABLED=false
      - MCP_FILESYSTEM_SANDBOX_ENABLED=true
      - MCP_FILESYSTEM_RUNTIME_MODE=sandbox_only
      - MCP_FILESYSTEM_FORCE_STDIO=${MCP_FILESYSTEM_FORCE_STDIO:-true}
      - MCP_FILESYSTEM_BACKEND_URL=${MCP_FILESYSTEM_BACKEND_URL:-http://127.0.0.1:8770/mcp}
      - MCP_FILESYSTEM_SANDBOX_URL=${MCP_FILESYSTEM_SANDBOX_URL:-http://127.0.0.1:8770/mcp}
      - MCP_FILESYSTEM_DAEMON_HOST=${MCP_FILESYSTEM_DAEMON_HOST:-127.0.0.1}
      - MCP_FILESYSTEM_DAEMON_PORT=${MCP_FILESYSTEM_DAEMON_PORT:-8770}
      - MCP_FILESYSTEM_DAEMON_COMMAND=${MCP_FILESYSTEM_DAEMON_COMMAND:-fastmcp}
      - MCP_FILESYSTEM_DAEMON_ARGS=${MCP_FILESYSTEM_DAEMON_ARGS:-}
      - MCP_FILESYSTEM_DAEMON_ALLOWED_DIRS=${MCP_FILESYSTEM_DAEMON_ALLOWED_DIRS:-/tmp,/app}
      - MCP_FILESYSTEM_DAEMON_SOURCE_DIR=${MCP_FILESYSTEM_DAEMON_SOURCE_DIR:-/app/mcp-src/filesystem}
      - MCP_FILESYSTEM_DAEMON_STARTUP_TIMEOUT_SECONDS=${MCP_FILESYSTEM_DAEMON_STARTUP_TIMEOUT_SECONDS:-45}
      - MCP_CODE_INDEX_ENABLED=true
      - MCP_CODE_INDEX_SANDBOX_ENABLED=true
      - MCP_CODE_INDEX_BACKEND_URL=http://127.0.0.1:8765/mcp
      - MCP_CODE_INDEX_SANDBOX_URL=http://127.0.0.1:8765/mcp
      - MCP_CODE_INDEX_DAEMON_HOST=127.0.0.1
      - MCP_CODE_INDEX_DAEMON_PORT=8765
      - MCP_CODE_INDEX_DAEMON_COMMAND=code-index-mcp
      - MCP_CODE_INDEX_DAEMON_ARGS=--transport streamable-http --port 8765 --indexer-path /app/data/mcp/code-index
      - MCP_CODE_INDEX_DAEMON_INDEXER_PATH=/app/data/mcp/code-index
      - MCP_CODE_INDEX_DAEMON_SOURCE_DIR=${MCP_CODE_INDEX_DAEMON_SOURCE_DIR:-/app/mcp-src/code-index-mcp}
      - MCP_CODE_INDEX_DAEMON_STARTUP_TIMEOUT_SECONDS=45
      - MCP_SEQUENTIAL_THINKING_ENABLED=true
      - MCP_SEQUENTIAL_THINKING_SANDBOX_ENABLED=true
      - MCP_SEQUENTIAL_THINKING_FORCE_STDIO=${MCP_SEQUENTIAL_THINKING_FORCE_STDIO:-true}
      - MCP_SEQUENTIAL_THINKING_COMMAND=${MCP_SEQUENTIAL_THINKING_COMMAND:-mcp-server-sequential-thinking}
      - MCP_SEQUENTIAL_THINKING_ARGS=${MCP_SEQUENTIAL_THINKING_ARGS:-}
      - MCP_SEQUENTIAL_THINKING_SANDBOX_COMMAND=${MCP_SEQUENTIAL_THINKING_SANDBOX_COMMAND:-mcp-server-sequential-thinking}
      - MCP_SEQUENTIAL_THINKING_SANDBOX_ARGS=${MCP_SEQUENTIAL_THINKING_SANDBOX_ARGS:-}
      - MCP_SEQUENTIAL_THINKING_BACKEND_URL=${MCP_SEQUENTIAL_THINKING_BACKEND_URL:-http://127.0.0.1:8771/mcp}
      - MCP_SEQUENTIAL_THINKING_SANDBOX_URL=${MCP_SEQUENTIAL_THINKING_SANDBOX_URL:-http://127.0.0.1:8771/mcp}
      - MCP_SEQUENTIAL_THINKING_DAEMON_HOST=${MCP_SEQUENTIAL_THINKING_DAEMON_HOST:-127.0.0.1}
      - MCP_SEQUENTIAL_THINKING_DAEMON_PORT=${MCP_SEQUENTIAL_THINKING_DAEMON_PORT:-8771}
      - MCP_SEQUENTIAL_THINKING_DAEMON_COMMAND=${MCP_SEQUENTIAL_THINKING_DAEMON_COMMAND:-node}
      - MCP_SEQUENTIAL_THINKING_DAEMON_ARGS=${MCP_SEQUENTIAL_THINKING_DAEMON_ARGS:-dist/index.js --transport streamable-http --port 8771}
      - MCP_SEQUENTIAL_THINKING_DAEMON_SOURCE_DIR=${MCP_SEQUENTIAL_THINKING_DAEMON_SOURCE_DIR:-/app/mcp-src/sequential-thinking}
      - MCP_SEQUENTIAL_THINKING_DAEMON_STARTUP_TIMEOUT_SECONDS=${MCP_SEQUENTIAL_THINKING_DAEMON_STARTUP_TIMEOUT_SECONDS:-45}
      - MCP_QMD_ENABLED=false
      - MCP_QMD_SANDBOX_ENABLED=false
      - MCP_QMD_RUNTIME_MODE=sandbox_only
      - MCP_QMD_BACKEND_URL=http://localhost:8181/mcp
      - MCP_QMD_SANDBOX_URL=http://localhost:8181/mcp
      - MCP_QMD_DAEMON_HOST=localhost
      - MCP_QMD_DAEMON_PORT=8181
      - MCP_QMD_DAEMON_COMMAND=node
      - MCP_QMD_DAEMON_ARGS=dist/index.js mcp --transport streamable-http --port 8181
      - MCP_QMD_DAEMON_SOURCE_DIR=${MCP_QMD_DAEMON_SOURCE_DIR:-/app/mcp-src/qmd}
      - MCP_QMD_DAEMON_STARTUP_TIMEOUT_SECONDS=60
      - GIT_MIRROR_ENABLED=${GIT_MIRROR_ENABLED:-true}
      - GIT_MIRROR_PREFIX=${GIT_MIRROR_PREFIX:-https://ghfast.top}
      - GIT_MIRROR_HOSTS=${GIT_MIRROR_HOSTS:-github.com}
      - GIT_MIRROR_ALLOW_AUTH_URL=${GIT_MIRROR_ALLOW_AUTH_URL:-false}
      - QMD_DATA_DIR=/app/data/qmd
      - QMD_CLI_COMMAND=qmd
      - QMD_CLI_TIMEOUT_SECONDS=120
      - QMD_TASK_KB_ENABLED=true
      - QMD_TASK_ROOT_REL=.deepaudit/qmd
      - QMD_TASK_COLLECTION_PREFIX=task
      - QMD_TASK_DOC_GLOB=**/*.{md,txt,json,yml,yaml}
      - QMD_TASK_AUTO_EMBED=false
      - QMD_TASK_QUERY_CACHE=true
      - XDG_CONFIG_HOME=/app/data/mcp/xdg-config
      # CodeBadger/Joern MCP（服务可通过单独 profile 或外部地址启用）
      # LLM 配置 - 请根据需要修改
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_API_KEY=${LLM_API_KEY:-your-api-key-here}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      # 禁用代理
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - NO_PROXY=*
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - deepaudit-network

  # 数据库迁移服务 - 在后端启动前自动执行
  db-migrate:
    image: ghcr.nju.edu.cn/lintsinghua/deepaudit-backend:latest
    restart: "no"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/deepaudit
    command: [".venv/bin/alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - deepaudit-network

  frontend:
    image: ghcr.nju.edu.cn/lintsinghua/deepaudit-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      # 禁用代理 - nginx 需要直连后端
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=*
    depends_on:
      - backend
    logging:
      driver: "none"
    networks:
      - deepaudit-network

  # 预拉取沙箱镜像（后端会按需调用）
  sandbox-pull:
    image: ghcr.nju.edu.cn/lintsinghua/deepaudit-sandbox:latest
    restart: "no"
    command: echo "Sandbox image ready"

networks:
  deepaudit-network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads:
  mcp_data:
  qmd_data:
  redis_data:
