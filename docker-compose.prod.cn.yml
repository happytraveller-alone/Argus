# =============================================
# VulHunter v3.0.4 生产环境一键部署配置（国内加速版）
# =============================================
# 使用南京大学镜像站加速拉取 GHCR 镜像
# CodeBadger 不在此 compose 内构建；如需 Joern 深度分析，请通过外部地址接入
# 部署命令: curl -fsSL https://raw.githubusercontent.com/unbengable12/AuditTool/main/docker-compose.prod.cn.yml | docker compose -f - up -d
# 镜像加速说明：
# - 原始地址：ghcr.io
# - 加速地址：ghcr.nju.edu.cn（南京大学开源镜像站）

services:
  db:
    image: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}/postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=${POSTGRES_DB:-vulhunter}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vulhunter-network

  redis:
    image: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}/redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vulhunter-network

  backend:
    image: ${GHCR_REGISTRY:-ghcr.nju.edu.cn}/lintsinghua/vulhunter-backend:${VULHUNTER_IMAGE_TAG:-latest}
    restart: unless-stopped
    volumes:
      - backend_uploads:/app/uploads
      - mcp_data:/app/data/mcp
      - qmd_data:/app/data/qmd
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/${POSTGRES_DB:-vulhunter}
      - REDIS_URL=redis://redis:6379/0
      - AGENT_ENABLED=true
      - SANDBOX_ENABLED=true
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-${GHCR_REGISTRY:-ghcr.nju.edu.cn}/lintsinghua/vulhunter-sandbox:${VULHUNTER_IMAGE_TAG:-latest}}
      - MCP_ENABLED=true
      - MCP_REQUIRE_ALL_READY_ON_STARTUP=true
      - MCP_REQUIRED_RUNTIME_DOMAIN=stdio
      - MCP_FILESYSTEM_ENABLED=false
      - MCP_FILESYSTEM_RUNTIME_MODE=stdio_only
      - MCP_FILESYSTEM_FORCE_STDIO=${MCP_FILESYSTEM_FORCE_STDIO:-true}
      - MCP_CODEBADGER_ENABLED=${MCP_CODEBADGER_ENABLED:-false}
      - MCP_CODEBADGER_RUNTIME_MODE=${MCP_CODEBADGER_RUNTIME_MODE:-backend_only}
      - MCP_CODEBADGER_BACKEND_URL=${MCP_CODEBADGER_BACKEND_URL:-}
      - MCP_CODE_INDEX_ENABLED=true
      - MCP_CODE_INDEX_RUNTIME_MODE=stdio_only
      - GIT_MIRROR_ENABLED=${GIT_MIRROR_ENABLED:-true}
      - GIT_MIRROR_PREFIX=${GIT_MIRROR_PREFIX:-https://ghfast.top}
      - GIT_MIRROR_HOSTS=${GIT_MIRROR_HOSTS:-github.com}
      - GIT_MIRROR_ALLOW_AUTH_URL=${GIT_MIRROR_ALLOW_AUTH_URL:-false}
      - QMD_DATA_DIR=/app/data/qmd
      - QMD_CLI_COMMAND=qmd
      - QMD_CLI_TIMEOUT_SECONDS=120
      - QMD_TASK_KB_ENABLED=true
      - QMD_TASK_ROOT_REL=.vulhunter/qmd
      - QMD_TASK_COLLECTION_PREFIX=task
      - QMD_TASK_DOC_GLOB=**/*.{md,txt,json,yml,yaml}
      - QMD_TASK_AUTO_EMBED=false
      - QMD_TASK_QUERY_CACHE=true
      - XDG_CONFIG_HOME=/app/data/mcp/xdg-config
      - JOERN_MCP_ENABLED=${JOERN_MCP_ENABLED:-false}
      - JOERN_MCP_PREFER=${JOERN_MCP_PREFER:-true}
      - JOERN_MCP_URL=${JOERN_MCP_URL:-}
      - JOERN_MCP_CPG_TIMEOUT_SEC=${JOERN_MCP_CPG_TIMEOUT_SEC:-240}
      - JOERN_MCP_QUERY_TIMEOUT_SEC=${JOERN_MCP_QUERY_TIMEOUT_SEC:-90}
      # CodeBadger/Joern MCP：仅支持外部服务地址
      # LLM 配置 - 请根据需要修改
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_API_KEY=${LLM_API_KEY:-your-api-key-here}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      # 禁用代理
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - NO_PROXY=*
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - vulhunter-network

  # 数据库迁移服务 - 在后端启动前自动执行
  db-migrate:
    image: ${GHCR_REGISTRY:-ghcr.nju.edu.cn}/lintsinghua/vulhunter-backend:${VULHUNTER_IMAGE_TAG:-latest}
    restart: "no"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/${POSTGRES_DB:-vulhunter}
    command: [".venv/bin/alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vulhunter-network

  frontend:
    image: ${GHCR_REGISTRY:-ghcr.nju.edu.cn}/lintsinghua/vulhunter-frontend:${VULHUNTER_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      # 禁用代理 - nginx 需要直连后端
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=*
    depends_on:
      - backend
    logging:
      driver: "none"
    networks:
      - vulhunter-network

  # 预拉取沙箱镜像（后端会按需调用）
  sandbox-pull:
    image: ${GHCR_REGISTRY:-ghcr.nju.edu.cn}/lintsinghua/vulhunter-sandbox:${VULHUNTER_IMAGE_TAG:-latest}
    restart: "no"
    command: echo "Sandbox image ready"

networks:
  vulhunter-network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads:
  mcp_data:
  qmd_data:
  redis_data:
