# =============================================
# VulHunter v3.0.4 Docker Compose 全量本地构建覆盖层
# =============================================
# 用法:
# docker compose -f docker-compose.yml -f docker-compose.full.yml up --build
# 注意: backend 依赖下方 runner services 进行启动期 runner preflight / warmup。
# 这些 runner 是一次性预热/自检容器，不是常驻服务；执行完检查后按预期退出。
# `restart: "no"` 与 `condition: service_completed_successfully` 共同构成本地默认可用性的启动门禁。
# 真正执行扫描时，backend 会通过 Docker SDK 按 `SCANNER_*_IMAGE` / `FLOW_PARSER_RUNNER_IMAGE`
# 动态拉起临时 runner 容器；下方 compose services 仅负责本地镜像预热与可执行性校验。

services:
  backend:
    image: vulhunter/backend-local:latest
    build: !override
      context: ./backend
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - UV_IMAGE=${UV_IMAGE:-ghcr.nju.edu.cn/astral-sh/uv:latest}
        - BACKEND_APT_MIRROR_PRIMARY=${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        - BACKEND_APT_SECURITY_PRIMARY=${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        - BACKEND_APT_MIRROR_FALLBACK=${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
        - BACKEND_APT_SECURITY_FALLBACK=${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
        - BACKEND_PYPI_INDEX_PRIMARY=${BACKEND_PYPI_INDEX_PRIMARY:-https://mirrors.aliyun.com/pypi/simple/}
        - BACKEND_PYPI_INDEX_FALLBACK=${BACKEND_PYPI_INDEX_FALLBACK:-https://pypi.org/simple}
        - BACKEND_PYPI_INDEX_CANDIDATES=${BACKEND_PYPI_INDEX_CANDIDATES:-https://mirrors.aliyun.com/pypi/simple/,https://pypi.tuna.tsinghua.edu.cn/simple,https://pypi.org/simple}
        - BACKEND_INSTALL_CJK_FONTS=${BACKEND_INSTALL_CJK_FONTS:-0}
        - BACKEND_INSTALL_YASA=${BACKEND_INSTALL_YASA:-1}
        - YASA_VERSION=${YASA_VERSION:-v0.2.33}
        - http_proxy=
        - https_proxy=
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - all_proxy=
        - ALL_PROXY=
    working_dir: !reset null
    command: !reset null
    volumes: !override
      - backend_uploads:/app/uploads
      - mcp_data:/app/data/mcp
      - scan_workspace:/tmp/vulhunter/scans
      - /var/run/docker.sock:/var/run/docker.sock
    environment: !override
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/${POSTGRES_DB:-vulhunter}
      ASYNCPG_DSN: postgresql://postgres:postgres@db:5432/${POSTGRES_DB:-vulhunter}
      REDIS_URL: redis://redis:6379/0
      RESET_STATIC_SCAN_TABLES_ON_DEPLOY: "false"
      AGENT_ENABLED: "true"
      SANDBOX_ENABLED: "true"
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-vulhunter/sandbox:latest}
      YASA_ENABLED: ${YASA_ENABLED:-true}
      SCAN_WORKSPACE_ROOT: ${SCAN_WORKSPACE_ROOT:-/tmp/vulhunter/scans}
      SCAN_WORKSPACE_VOLUME: ${SCAN_WORKSPACE_VOLUME:-vulhunter_scan_workspace}
      SCANNER_YASA_IMAGE: ${SCANNER_YASA_IMAGE:-vulhunter/yasa-runner-local:latest}
      SCANNER_OPENGREP_IMAGE: ${SCANNER_OPENGREP_IMAGE:-vulhunter/opengrep-runner-local:latest}
      SCANNER_BANDIT_IMAGE: ${SCANNER_BANDIT_IMAGE:-vulhunter/bandit-runner-local:latest}
      SCANNER_GITLEAKS_IMAGE: ${SCANNER_GITLEAKS_IMAGE:-vulhunter/gitleaks-runner-local:latest}
      SCANNER_PHPSTAN_IMAGE: ${SCANNER_PHPSTAN_IMAGE:-vulhunter/phpstan-runner-local:latest}
      SCANNER_PMD_IMAGE: ${SCANNER_PMD_IMAGE:-vulhunter/pmd-runner-local:latest}
      FLOW_PARSER_RUNNER_IMAGE: ${FLOW_PARSER_RUNNER_IMAGE:-vulhunter/flow-parser-runner-local:latest}
      FLOW_PARSER_RUNNER_ENABLED: "${FLOW_PARSER_RUNNER_ENABLED:-true}"
      FLOW_PARSER_RUNNER_TIMEOUT_SECONDS: "${FLOW_PARSER_RUNNER_TIMEOUT_SECONDS:-120}"
      FLOW_PARSER_RUNNER_BATCH_MAX_FILES: "${FLOW_PARSER_RUNNER_BATCH_MAX_FILES:-100}"
      FLOW_PARSER_RUNNER_BATCH_MAX_BYTES: "${FLOW_PARSER_RUNNER_BATCH_MAX_BYTES:-8388608}"
      YASA_TIMEOUT_SECONDS: ${YASA_TIMEOUT_SECONDS:-600}
      MCP_ENABLED: "true"
      MCP_REQUIRE_ALL_READY_ON_STARTUP: "true"
      GIT_MIRROR_ENABLED: ${GIT_MIRROR_ENABLED:-true}
      GIT_MIRROR_PREFIX: ${GIT_MIRROR_PREFIX:-https://gh-proxy.org}
      GIT_MIRROR_PREFIXES: ${GIT_MIRROR_PREFIXES:-https://gh-proxy.org,https://v6.gh-proxy.org}
      GIT_MIRROR_HOSTS: ${GIT_MIRROR_HOSTS:-github.com}
      GIT_MIRROR_ALLOW_AUTH_URL: ${GIT_MIRROR_ALLOW_AUTH_URL:-false}
      GIT_MIRROR_FALLBACK_TO_ORIGIN: ${GIT_MIRROR_FALLBACK_TO_ORIGIN:-false}
      CODEX_SKILLS_AUTO_INSTALL: "false"
      XDG_CONFIG_HOME: /app/data/mcp/xdg-config
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      yasa-runner:
        condition: service_completed_successfully
      opengrep-runner:
        condition: service_completed_successfully
      bandit-runner:
        condition: service_completed_successfully
      gitleaks-runner:
        condition: service_completed_successfully
      phpstan-runner:
        condition: service_completed_successfully
      pmd-runner:
        condition: service_completed_successfully
      flow-parser-runner:
        condition: service_completed_successfully

  # One-shot runner preflight / warmup services for local development.
  # They build local scanner images and verify the command is runnable.
  # `restart: "no"` is intentional because these checks are expected to exit after completion.
  yasa-runner:
    image: vulhunter/yasa-runner-local:latest
    build:
      context: ./backend
      dockerfile: ./docker/yasa-runner.Dockerfile
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - BACKEND_INSTALL_YASA=${BACKEND_INSTALL_YASA:-1}
        - YASA_VERSION=${YASA_VERSION:-v0.2.33}
        - http_proxy=
        - https_proxy=
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - all_proxy=
        - ALL_PROXY=
    restart: "no"

  opengrep-runner:
    image: vulhunter/opengrep-runner-local:latest
    build:
      context: ./backend
      dockerfile: ./docker/opengrep-runner.Dockerfile
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - BACKEND_APT_MIRROR_PRIMARY=${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        - BACKEND_APT_SECURITY_PRIMARY=${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        - BACKEND_APT_MIRROR_FALLBACK=${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
        - BACKEND_APT_SECURITY_FALLBACK=${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
        - http_proxy=
        - https_proxy=
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - all_proxy=
        - ALL_PROXY=
    restart: "no"

  bandit-runner:
    image: vulhunter/bandit-runner-local:latest
    build:
      context: ./backend
      dockerfile: ./docker/bandit-runner.Dockerfile
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - BACKEND_APT_MIRROR_PRIMARY=${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        - BACKEND_APT_SECURITY_PRIMARY=${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        - BACKEND_APT_MIRROR_FALLBACK=${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
        - BACKEND_APT_SECURITY_FALLBACK=${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
        - BACKEND_PYPI_INDEX_PRIMARY=${BACKEND_PYPI_INDEX_PRIMARY:-https://mirrors.aliyun.com/pypi/simple/}
        - http_proxy=
        - https_proxy=
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - all_proxy=
        - ALL_PROXY=
    restart: "no"

  gitleaks-runner:
    image: vulhunter/gitleaks-runner-local:latest
    build:
      context: ./backend
      dockerfile: ./docker/gitleaks-runner.Dockerfile
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - BACKEND_APT_MIRROR_PRIMARY=${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        - BACKEND_APT_SECURITY_PRIMARY=${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        - BACKEND_APT_MIRROR_FALLBACK=${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
        - BACKEND_APT_SECURITY_FALLBACK=${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
        - http_proxy=
        - https_proxy=
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - all_proxy=
        - ALL_PROXY=
    restart: "no"

  phpstan-runner:
    image: vulhunter/phpstan-runner-local:latest
    build:
      context: ./backend
      dockerfile: ./docker/phpstan-runner.Dockerfile
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - BACKEND_APT_MIRROR_PRIMARY=${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        - BACKEND_APT_SECURITY_PRIMARY=${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        - BACKEND_APT_MIRROR_FALLBACK=${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
        - BACKEND_APT_SECURITY_FALLBACK=${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
        - http_proxy=
        - https_proxy=
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - all_proxy=
        - ALL_PROXY=
    restart: "no"

  pmd-runner:
    image: vulhunter/pmd-runner-local:latest
    build:
      context: ./backend
      dockerfile: ./docker/pmd-runner.Dockerfile
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - http_proxy=
        - https_proxy=
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - all_proxy=
        - ALL_PROXY=
    restart: "no"

  flow-parser-runner:
    image: vulhunter/flow-parser-runner-local:latest
    build:
      context: ./backend
      dockerfile: ./docker/flow-parser-runner.Dockerfile
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - BACKEND_APT_MIRROR_PRIMARY=${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        - BACKEND_APT_SECURITY_PRIMARY=${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        - BACKEND_APT_MIRROR_FALLBACK=${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
        - BACKEND_APT_SECURITY_FALLBACK=${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
        - BACKEND_PYPI_INDEX_PRIMARY=${BACKEND_PYPI_INDEX_PRIMARY:-https://mirrors.aliyun.com/pypi/simple/}
        - BACKEND_PYPI_INDEX_CANDIDATES=${BACKEND_PYPI_INDEX_CANDIDATES:-https://mirrors.aliyun.com/pypi/simple/,https://pypi.tuna.tsinghua.edu.cn/simple,https://pypi.org/simple}
        - http_proxy=
        - https_proxy=
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - all_proxy=
        - ALL_PROXY=
    restart: "no"

  frontend:
    image: vulhunter/frontend-local:latest
    build: !override
      context: ./frontend
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile}
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - FRONTEND_NPM_REGISTRY=${FRONTEND_NPM_REGISTRY:-https://registry.npmmirror.com}
        - FRONTEND_NPM_REGISTRY_FALLBACK=${FRONTEND_NPM_REGISTRY_FALLBACK:-https://registry.npmjs.org}
        - PNPM_VERSION=${PNPM_VERSION:-9.15.4}
        - BUILD_WEAK_NETWORK=${BUILD_WEAK_NETWORK:-false}
        - BUILD_ARCH=${BUILD_ARCH:-}
        - http_proxy=
        - https_proxy=
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - all_proxy=
        - ALL_PROXY=
    working_dir: !reset null
    command: !reset null
    volumes: !override
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports: !override
      - "${VULHUNTER_FRONTEND_PORT:-3000}:80"
    environment: !override
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
      VITE_API_BASE_URL: /api/v1
