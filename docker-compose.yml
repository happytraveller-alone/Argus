# =============================================
# Argus Docker Compose — 全量本地构建
# =============================================
# 启动: podman compose up --build (或 docker compose up --build)
# backend 会在启动期通过配置的 container runtime 执行 Opengrep runner preflight。
# opengrep-runner service 只作为 profile=runner-build 的镜像构建目标存在；
# 默认启动不创建 runner service 容器。真正执行 Opengrep 扫描时，backend
# 按 SCANNER_OPENGREP_IMAGE 动态创建临时 runner 容器，并在任务结束后删除。

services:

  opengrep-runner:
    image: ${SCANNER_OPENGREP_IMAGE:-argus/opengrep-runner-local:latest}
    profiles: [ "runner-build" ]
    pull_policy: never
    build:
      context: .
      dockerfile: docker/opengrep-runner.Dockerfile
      args:
        DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-m.daocloud.io/docker.io/library}
        BACKEND_APT_MIRROR_PRIMARY: ${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        BACKEND_APT_SECURITY_PRIMARY: ${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        BACKEND_APT_MIRROR_FALLBACK: ${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
        BACKEND_APT_SECURITY_FALLBACK: ${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
        BACKEND_CARGO_REGISTRY: ${BACKEND_CARGO_REGISTRY:-sparse+https://rsproxy.cn/index/}
        BACKEND_CARGO_HTTP_TIMEOUT_SECONDS: ${BACKEND_CARGO_HTTP_TIMEOUT_SECONDS:-30}
        BACKEND_CARGO_NET_RETRY: ${BACKEND_CARGO_NET_RETRY:-10}
    restart: "no"
    mem_limit: 2g
    pids_limit: 512
    command:
      - "opengrep-scan"
      - "--self-test"
    environment:
      OPENGREP_SCAN_JOBS: ${OPENGREP_SCAN_JOBS:-0}
      OPENGREP_SCAN_MAX_MEMORY_MB: ${OPENGREP_SCAN_MAX_MEMORY_MB:-2048}
    networks:
      - argus-network

  db:
    image: ${DOCKERHUB_LIBRARY_MIRROR:-m.daocloud.io/docker.io/library}/postgres:18.3-alpine3.23
    restart: unless-stopped
    mem_limit: 1g
    pids_limit: 512
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ${POSTGRES_DB:-Argus}
    ports:
      - "${Argus_DB_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      start_period: 30s
      retries: 12
    networks:
      - argus-network

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: runtime-plain
      args:
        DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-m.daocloud.io/docker.io/library}
        BACKEND_APT_MIRROR_PRIMARY: ${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        BACKEND_APT_SECURITY_PRIMARY: ${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        BACKEND_APT_MIRROR_FALLBACK: ${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
        BACKEND_APT_SECURITY_FALLBACK: ${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
    restart: unless-stopped
    mem_limit: 4g
    pids_limit: 1024
    working_dir: /app
    env_file:
      - path: ${ARGUS_ENV_FILE:-./.env}
        required: true
      - path: ${ARGUS_LLM_ENV_FILE:-./.argus-llm.env}
        required: true
    network_mode: host
    volumes:
      - backend_uploads:/app/uploads
      - backend_runtime_data:/app/data/runtime
      - ./oci:/app/oci:ro
      - ${ARGUS_ENV_FILE:-./.env}:/app/.env
      - ./docker/opengrep-scan.sh:/app/docker/opengrep-scan.sh:ro
      - scan_workspace:/tmp/Argus/scans
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
    devices:
      - /dev/kvm:/dev/kvm
      - /dev/vhost-vsock:/dev/vhost-vsock
      - /dev/net/tun:/dev/net/tun
    cap_add:
      # a3s-box (krun-vm) needs SYS_ADMIN for the overlay/tmpfs mounts it
      # performs while assembling the microVM rootfs ("mount: …/merged: must
      # be superuser to use mount" otherwise). The backend container is
      # already trusted root with /dev/kvm passed in, so adding the matching
      # mount capability keeps the privilege envelope consistent.
      - SYS_ADMIN
    group_add:
      - "${ARGUS_KVM_GROUP_ID:-109}"
    environment:
      BIND_ADDR: 0.0.0.0:${Argus_BACKEND_PORT:-18000}
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/${POSTGRES_DB:-Argus}
      ASYNCPG_DSN: postgresql://postgres:postgres@127.0.0.1:5432/${POSTGRES_DB:-Argus}
      REDIS_URL: redis://127.0.0.1:6379/0
      GHCR_REGISTRY: ${GHCR_REGISTRY:-ghcr.io}
      Argus_IMAGE_NAMESPACE: ${Argus_IMAGE_NAMESPACE:-happytraveller-alone}
      Argus_IMAGE_TAG: ${Argus_IMAGE_TAG:-latest}
      RESET_STATIC_SCAN_TABLES_ON_DEPLOY: "false"
      AGENT_ENABLED: "true"
      ARGUS_RESET_IMPORT_TOKEN: "${ARGUS_RESET_IMPORT_TOKEN:-}"
      ARGUS_CODEX_HOST_DIR: ${ARGUS_CODEX_HOST_DIR:-}
      OPENGREP_SCAN_TIMEOUT_SECONDS: "${OPENGREP_SCAN_TIMEOUT_SECONDS:-0}"
      OPENGREP_SCAN_JOBS: "${OPENGREP_SCAN_JOBS:-0}"
      OPENGREP_SCAN_MAX_MEMORY_MB: "${OPENGREP_SCAN_MAX_MEMORY_MB:-2048}"
      OPENGREP_RUNNER_MEMORY_LIMIT_MB: "${OPENGREP_RUNNER_MEMORY_LIMIT_MB:-2048}"
      OPENGREP_RUNNER_CPU_LIMIT: "${OPENGREP_RUNNER_CPU_LIMIT:-0}"
      JOERN_SCAN_TIMEOUT_SECONDS: "${JOERN_SCAN_TIMEOUT_SECONDS:-1800}"
      JOERN_RESULTS_JSON_LIMIT_BYTES: "${JOERN_RESULTS_JSON_LIMIT_BYTES:-268435456}"
      JOERN_STDOUT_LIMIT_BYTES: "${JOERN_STDOUT_LIMIT_BYTES:-1048576}"
      JOERN_STDERR_LIMIT_BYTES: "${JOERN_STDERR_LIMIT_BYTES:-1048576}"
      JOERN_RUNNER_MEMORY_LIMIT_MB: "${JOERN_RUNNER_MEMORY_LIMIT_MB:-4096}"
      JOERN_RUNNER_CPU_LIMIT: "${JOERN_RUNNER_CPU_LIMIT:-0}"
      JOERN_RUNNER_PIDS_LIMIT: "${JOERN_RUNNER_PIDS_LIMIT:-1024}"
      JOERN_NETWORK_DISABLED: "${JOERN_NETWORK_DISABLED:-true}"
      # Default container runtime for the Opengrep scanner runner.
      # Override with OPENGREP_RUNNER_RUNTIME=docker for the Docker socket path.
      OPENGREP_RUNNER_RUNTIME: "${OPENGREP_RUNNER_RUNTIME:-podman}"
      OPENGREP_AVAILABLE_CORES: "${OPENGREP_AVAILABLE_CORES:-}"
      CUBE_OPENGREP_RULES_ARCHIVE: /app/assets/scan_rule_assets.tar.gz
      CUBE_OPENGREP_CPU_MILLI: "${CUBE_OPENGREP_CPU_MILLI:-4000}"
      CUBE_OPENGREP_MEMORY_MB: "${CUBE_OPENGREP_MEMORY_MB:-4096}"
      CUBE_VM_MEMORY_MB: "${CUBE_VM_MEMORY_MB:-8192}"
      CUBE_VM_CPUS: "${CUBE_VM_CPUS:-4}"
      SCAN_WORKSPACE_ROOT: ${SCAN_WORKSPACE_ROOT:-/tmp/Argus/scans}
      SCAN_WORKSPACE_VOLUME: ${SCAN_WORKSPACE_VOLUME:-Argus_scan_workspace}
      RUNNER_PREFLIGHT_ENABLED: "${RUNNER_PREFLIGHT_ENABLED:-true}"
      RUNNER_PREFLIGHT_STRICT: "${RUNNER_PREFLIGHT_STRICT:-true}"
      RUNNER_PREFLIGHT_TIMEOUT_SECONDS: "${RUNNER_PREFLIGHT_TIMEOUT_SECONDS:-30}"
      RUNNER_PREFLIGHT_MAX_CONCURRENCY: "${RUNNER_PREFLIGHT_MAX_CONCURRENCY:-2}"
      RUNNER_PREFLIGHT_BUILD_TIMEOUT_SECONDS: "${RUNNER_PREFLIGHT_BUILD_TIMEOUT_SECONDS:-1800}"
      RUNNER_PREFLIGHT_BUILD_CONTEXT: /opt/backend-build-context
      DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-m.daocloud.io/docker.io/library}
      BACKEND_APT_MIRROR_PRIMARY: ${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
      BACKEND_APT_SECURITY_PRIMARY: ${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
      BACKEND_APT_MIRROR_FALLBACK: ${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
      BACKEND_APT_SECURITY_FALLBACK: ${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
      BACKEND_PYPI_INDEX_PRIMARY: ${BACKEND_PYPI_INDEX_PRIMARY:-}
      BACKEND_PYPI_INDEX_FALLBACK: ${BACKEND_PYPI_INDEX_FALLBACK:-}
      BACKEND_PYPI_INDEX_CANDIDATES: ${BACKEND_PYPI_INDEX_CANDIDATES:-https://mirrors.aliyun.com/pypi/simple/,https://pypi.tuna.tsinghua.edu.cn/simple,https://pypi.mirrors.ustc.edu.cn/simple/,https://mirrors.cloud.tencent.com/pypi/simple/,https://mirrors.huaweicloud.com/repository/pypi/simple/,https://mirrors.bfsu.edu.cn/pypi/web/simple/,https://pypi.org/simple}
      SCANNER_OPENGREP_IMAGE: ${SCANNER_OPENGREP_IMAGE:-argus/opengrep-runner-local:latest}
      SCANNER_CODEQL_IMAGE: ${SCANNER_CODEQL_IMAGE:-localhost/argus/codeql-runner:latest}
      SCANNER_JOERN_IMAGE: ${SCANNER_JOERN_IMAGE:-ghcr.io/joernio/joern:nightly}
      SCANNER_OPENGREP_A3S_BOX_IMAGE: ${SCANNER_OPENGREP_A3S_BOX_IMAGE:-${SCANNER_OPENGREP_IMAGE:-argus/opengrep-runner-local:latest}}
      CODEQL_LLM_ALLOW_SOURCE_SNIPPETS: "${CODEQL_LLM_ALLOW_SOURCE_SNIPPETS:-true}"
      CODEQL_ALLOW_NETWORK_DURING_BUILD: "${CODEQL_ALLOW_NETWORK_DURING_BUILD:-true}"
      CODEQL_MAX_BUILD_INFERENCE_ROUNDS: "${CODEQL_MAX_BUILD_INFERENCE_ROUNDS:-3}"
      CODEQL_RAM_MB: "${CODEQL_RAM_MB:-6144}"
      CODEQL_THREADS: "${CODEQL_THREADS:-0}"
      GIT_MIRROR_ENABLED: ${GIT_MIRROR_ENABLED:-true}
      GIT_MIRROR_PREFIX: ${GIT_MIRROR_PREFIX:-https://gh-proxy.org}
      GIT_MIRROR_PREFIXES: ${GIT_MIRROR_PREFIXES:-https://gh-proxy.org,https://v6.gh-proxy.org}
      GIT_MIRROR_HOSTS: ${GIT_MIRROR_HOSTS:-github.com}
      GIT_MIRROR_ALLOW_AUTH_URL: ${GIT_MIRROR_ALLOW_AUTH_URL:-false}
      GIT_MIRROR_FALLBACK_TO_ORIGIN: ${GIT_MIRROR_FALLBACK_TO_ORIGIN:-false}
      XDG_DATA_HOME: /app/data/runtime/xdg-data
      XDG_CACHE_HOME: /app/data/runtime/xdg-cache
      XDG_CONFIG_HOME: /app/data/runtime/xdg-config
      CONTAINER_HOST: ${BACKEND_CONTAINER_HOST:-unix:///run/user/1000/podman/podman.sock}
      CONTAINER_CLI: ${CONTAINER_CLI:-podman}
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-fsS"
        - "http://127.0.0.1:${Argus_BACKEND_PORT:-18000}/health"
      interval: 5s
      timeout: 5s
      start_period: 180s
      retries: 120
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: dev
      args:
        DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-m.daocloud.io/docker.io/library}
    restart: unless-stopped
    mem_limit: 1g
    pids_limit: 256
    ports:
      - "${Argus_FRONTEND_PORT:-13000}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_pnpm_store:/pnpm/store
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-http://localhost:13000}
      VITE_API_BASE_URL: /api/v1
      VITE_API_TARGET: ${VITE_API_TARGET:-http://host.docker.internal:18000}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost:18000}
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_HMR_PORT: ${VITE_HMR_PORT:-13000}
      FRONTEND_NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
      PNPM_VERSION: ${PNPM_VERSION:-10.11.0}
    depends_on:
      backend:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - argus-network

  redis:
    image: ${DOCKERHUB_LIBRARY_MIRROR:-m.daocloud.io/docker.io/library}/redis:8.6.2-alpine3.23
    restart: unless-stopped
    mem_limit: 256m
    pids_limit: 256
    ports:
      - "${Argus_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - argus-network

  adminer:
    image: ${DOCKERHUB_LIBRARY_MIRROR:-m.daocloud.io/docker.io/library}/adminer:latest
    restart: unless-stopped
    profiles: [ "tools" ]
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - argus-network

networks:
  argus-network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads:
  backend_runtime_data:
  scan_workspace:
    name: ${SCAN_WORKSPACE_VOLUME:-Argus_scan_workspace}
  redis_data:
  frontend_node_modules:
  frontend_pnpm_store:
