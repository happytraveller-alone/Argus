# =============================================
# Argus Docker Compose — 全量本地构建
# =============================================
# 启动: docker compose up --build
# backend 会在启动期通过 Docker SDK 执行 runner preflight。
# opengrep-runner compose service 仅用于在 `docker compose up` 时构建/预热本地镜像，
# 服务本身为一次性成功退出；真正执行扫描时，backend 仍按 SCANNER_*_IMAGE
# 动态拉起临时 runner 容器，并在结束后清理。

services:

  agentflow-runner:
    image: ${ARGUS_AGENTFLOW_RUNNER_IMAGE:-argus/agentflow-runner:1667fa35}
    pull_policy: never
    build:
      context: .
      dockerfile: docker/agentflow-runner.Dockerfile
      args:
        DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        AGENTFLOW_REPOSITORY: ${AGENTFLOW_REPOSITORY:-https://v6.gh-proxy.org/https://github.com/berabuddies/agentflow.git}
        AGENTFLOW_COMMIT: ${AGENTFLOW_COMMIT:-1667fa35ed99e3c1583a7d60cac8e3406cafd3ee}
        AGENTFLOW_VERSION: ${AGENTFLOW_VERSION:-0.1.0}
        AGENTFLOW_LOCAL_SOURCE: ${AGENTFLOW_LOCAL_SOURCE:-vendor/agentflow-src}
        BACKEND_APT_MIRROR_PRIMARY: ${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        BACKEND_APT_SECURITY_PRIMARY: ${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        BACKEND_APT_MIRROR_FALLBACK: ${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
        BACKEND_APT_SECURITY_FALLBACK: ${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
        BACKEND_PYPI_INDEX_PRIMARY: ${BACKEND_PYPI_INDEX_PRIMARY:-https://pypi.org/simple}
        BACKEND_PYPI_EXTRA_INDEX_URLS: ${BACKEND_PYPI_EXTRA_INDEX_URLS:-https://pypi.tuna.tsinghua.edu.cn/simple https://mirrors.aliyun.com/pypi/simple/}
        BACKEND_PYPI_INDEX_FALLBACK: ${BACKEND_PYPI_INDEX_FALLBACK:-}
        BACKEND_PIP_TIMEOUT_SECONDS: ${BACKEND_PIP_TIMEOUT_SECONDS:-300}
        BACKEND_PIP_RETRIES: ${BACKEND_PIP_RETRIES:-20}
        AGENTFLOW_P1_PYTHON_DEPS: ${AGENTFLOW_P1_PYTHON_DEPS:-jinja2>=3.1.6 pydantic>=2.11.0 PyYAML>=6.0.2 typer>=0.16.0}
    restart: "no"
    mem_limit: 4g
    cpus: "2.0"
    pids_limit: 512
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=512m
    volumes:
      - .:/workspace/src:ro
      - ./backend/agentflow:/app/backend/agentflow:ro
      - agentflow_runner_work:/work
    environment:
      AGENTFLOW_RUNS_DIR: /work/agentflow-runs
      AGENTFLOW_MAX_CONCURRENT_RUNS: ${AGENTFLOW_MAX_CONCURRENT_RUNS:-2}
      ARGUS_AGENTFLOW_INPUT_PATH: ${ARGUS_AGENTFLOW_INPUT_PATH:-/work/input/runner_input.json}
      ARGUS_AGENTFLOW_OUTPUT_DIR: ${ARGUS_AGENTFLOW_OUTPUT_DIR:-/work/outputs}
      HOME: /tmp/argus-agentflow-home
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
    command:
      - "agentflow"
      - "--help"
    networks:
      - argus-network
  opengrep-runner:
    image: ${SCANNER_OPENGREP_IMAGE:-Argus/opengrep-runner-local:latest}
    pull_policy: never
    build:
      context: .
      dockerfile: docker/opengrep-runner.Dockerfile
      args:
        DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        BACKEND_APT_MIRROR_PRIMARY: ${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        BACKEND_APT_SECURITY_PRIMARY: ${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        BACKEND_APT_MIRROR_FALLBACK: ${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
        BACKEND_APT_SECURITY_FALLBACK: ${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
        BACKEND_CARGO_REGISTRY: ${BACKEND_CARGO_REGISTRY:-sparse+https://rsproxy.cn/index/}
        BACKEND_CARGO_HTTP_TIMEOUT_SECONDS: ${BACKEND_CARGO_HTTP_TIMEOUT_SECONDS:-30}
        BACKEND_CARGO_NET_RETRY: ${BACKEND_CARGO_NET_RETRY:-10}
    restart: "no"
    mem_limit: 2g
    pids_limit: 512
    command:
      - "opengrep-scan"
      - "--self-test"
    environment:
      OPENGREP_SCAN_JOBS: ${OPENGREP_SCAN_JOBS:-0}
      OPENGREP_SCAN_MAX_MEMORY_MB: ${OPENGREP_SCAN_MAX_MEMORY_MB:-2048}
    networks:
      - argus-network

  db:
    image: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}/postgres:18.3-alpine3.23
    restart: unless-stopped
    mem_limit: 1g
    pids_limit: 512
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ${POSTGRES_DB:-Argus}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      start_period: 30s
      retries: 12
    networks:
      - argus-network

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: runtime-plain
      args:
        DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        UV_IMAGE: ${UV_IMAGE:-docker.m.daocloud.io/library/ghcr.io/astral-sh/uv:0.7}
        DOCKER_CLI_IMAGE: ${DOCKER_CLI_IMAGE:-docker.m.daocloud.io/library/docker:27-cli}
        BACKEND_APT_MIRROR_PRIMARY: ${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        BACKEND_APT_SECURITY_PRIMARY: ${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        BACKEND_APT_MIRROR_FALLBACK: ${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
        BACKEND_APT_SECURITY_FALLBACK: ${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
    restart: unless-stopped
    mem_limit: 4g
    pids_limit: 1024
    working_dir: /app
    volumes:
      - ./docker/env/backend:/docker/env/backend
      - backend_uploads:/app/uploads
      - backend_runtime_data:/app/data/runtime
      - scan_workspace:/tmp/Argus/scans
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
    ports:
      - "${Argus_BACKEND_PORT:-18000}:8000"
    env_file:
      - path: ./docker/env/backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/${POSTGRES_DB:-Argus}
      ASYNCPG_DSN: postgresql://postgres:postgres@db:5432/${POSTGRES_DB:-Argus}
      REDIS_URL: redis://redis:6379/0
      GHCR_REGISTRY: ${GHCR_REGISTRY:-ghcr.io}
      Argus_IMAGE_NAMESPACE: ${Argus_IMAGE_NAMESPACE:-happytraveller-alone}
      Argus_IMAGE_TAG: ${Argus_IMAGE_TAG:-latest}
      RESET_STATIC_SCAN_TABLES_ON_DEPLOY: "false"
      AGENT_ENABLED: "true"
      ARGUS_AGENTFLOW_RUNNER_IMAGE: ${ARGUS_AGENTFLOW_RUNNER_IMAGE:-argus/agentflow-runner:1667fa35}
      AGENTFLOW_RUNNER_WORK_VOLUME: ${AGENTFLOW_RUNNER_WORK_VOLUME:-Argus_agentflow_runner_work}
      AGENTFLOW_DEFAULT_RUNNER_ENABLED: ${AGENTFLOW_DEFAULT_RUNNER_ENABLED:-true}
      OPENGREP_SCAN_TIMEOUT_SECONDS: "${OPENGREP_SCAN_TIMEOUT_SECONDS:-0}"
      OPENGREP_SCAN_JOBS: "${OPENGREP_SCAN_JOBS:-0}"
      OPENGREP_SCAN_MAX_MEMORY_MB: "${OPENGREP_SCAN_MAX_MEMORY_MB:-2048}"
      OPENGREP_RUNNER_MEMORY_LIMIT_MB: "${OPENGREP_RUNNER_MEMORY_LIMIT_MB:-2048}"
      OPENGREP_RUNNER_CPU_LIMIT: "${OPENGREP_RUNNER_CPU_LIMIT:-0}"
      OPENGREP_AVAILABLE_CORES: "${OPENGREP_AVAILABLE_CORES:-}"
      SCAN_WORKSPACE_ROOT: ${SCAN_WORKSPACE_ROOT:-/tmp/Argus/scans}
      SCAN_WORKSPACE_VOLUME: ${SCAN_WORKSPACE_VOLUME:-Argus_scan_workspace}
      RUNNER_PREFLIGHT_ENABLED: "${RUNNER_PREFLIGHT_ENABLED:-true}"
      RUNNER_PREFLIGHT_STRICT: "${RUNNER_PREFLIGHT_STRICT:-true}"
      RUNNER_PREFLIGHT_TIMEOUT_SECONDS: "${RUNNER_PREFLIGHT_TIMEOUT_SECONDS:-30}"
      RUNNER_PREFLIGHT_MAX_CONCURRENCY: "${RUNNER_PREFLIGHT_MAX_CONCURRENCY:-2}"
      RUNNER_PREFLIGHT_BUILD_TIMEOUT_SECONDS: "${RUNNER_PREFLIGHT_BUILD_TIMEOUT_SECONDS:-1800}"
      RUNNER_PREFLIGHT_BUILD_CONTEXT: /opt/backend-build-context
      DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
      BACKEND_APT_MIRROR_PRIMARY: ${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
      BACKEND_APT_SECURITY_PRIMARY: ${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
      BACKEND_APT_MIRROR_FALLBACK: ${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
      BACKEND_APT_SECURITY_FALLBACK: ${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
      BACKEND_PYPI_INDEX_PRIMARY: ${BACKEND_PYPI_INDEX_PRIMARY:-}
      BACKEND_PYPI_INDEX_FALLBACK: ${BACKEND_PYPI_INDEX_FALLBACK:-}
      BACKEND_PYPI_INDEX_CANDIDATES: ${BACKEND_PYPI_INDEX_CANDIDATES:-https://mirrors.aliyun.com/pypi/simple/,https://pypi.tuna.tsinghua.edu.cn/simple,https://pypi.mirrors.ustc.edu.cn/simple/,https://mirrors.cloud.tencent.com/pypi/simple/,https://mirrors.huaweicloud.com/repository/pypi/simple/,https://mirrors.bfsu.edu.cn/pypi/web/simple/,https://pypi.org/simple}
      SCANNER_OPENGREP_IMAGE: ${SCANNER_OPENGREP_IMAGE:-Argus/opengrep-runner-local:latest}
      GIT_MIRROR_ENABLED: ${GIT_MIRROR_ENABLED:-true}
      GIT_MIRROR_PREFIX: ${GIT_MIRROR_PREFIX:-https://gh-proxy.org}
      GIT_MIRROR_PREFIXES: ${GIT_MIRROR_PREFIXES:-https://gh-proxy.org,https://v6.gh-proxy.org}
      GIT_MIRROR_HOSTS: ${GIT_MIRROR_HOSTS:-github.com}
      GIT_MIRROR_ALLOW_AUTH_URL: ${GIT_MIRROR_ALLOW_AUTH_URL:-false}
      GIT_MIRROR_FALLBACK_TO_ORIGIN: ${GIT_MIRROR_FALLBACK_TO_ORIGIN:-false}
      XDG_DATA_HOME: /app/data/runtime/xdg-data
      XDG_CACHE_HOME: /app/data/runtime/xdg-cache
      XDG_CONFIG_HOME: /app/data/runtime/xdg-config
      DOCKER_HOST: ${BACKEND_DOCKER_HOST:-unix:///var/run/docker.sock}
      CONTAINER_CLI: ${CONTAINER_CLI:-docker}
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-fsS"
        - "http://127.0.0.1:8000/health"
      interval: 5s
      timeout: 5s
      start_period: 180s
      retries: 120
    depends_on:
      agentflow-runner:
        condition: service_completed_successfully
      opengrep-runner:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - argus-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: dev
      args:
        DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        PNPM_VERSION: ${PNPM_VERSION:-10.11.0}
        WEAK_NETWORK: ${WEAK_NETWORK:-false}
    restart: unless-stopped
    mem_limit: 1g
    pids_limit: 256
    ports:
      - "${Argus_FRONTEND_PORT:-13000}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_pnpm_store:/pnpm/store
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-http://localhost:13000}
      VITE_API_BASE_URL: /api/v1
      VITE_API_TARGET: ${VITE_API_TARGET:-http://backend:8000}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost:18000}
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_HMR_PORT: ${VITE_HMR_PORT:-13000}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - argus-network

  redis:
    image: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}/redis:8.6.2-alpine3.23
    restart: unless-stopped
    mem_limit: 256m
    pids_limit: 256
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - argus-network

  adminer:
    image: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}/adminer:latest
    restart: unless-stopped
    profiles: [ "tools" ]
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - argus-network

networks:
  argus-network:
    driver: bridge

volumes:
  agentflow_runner_work:
    name: ${AGENTFLOW_RUNNER_WORK_VOLUME:-Argus_agentflow_runner_work}
  postgres_data:
  backend_uploads:
  backend_runtime_data:
  scan_workspace:
    name: ${SCAN_WORKSPACE_VOLUME:-Argus_scan_workspace}
  redis_data:
  frontend_node_modules:
  frontend_pnpm_store:
