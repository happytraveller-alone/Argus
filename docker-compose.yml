# =============================================
# VulHunter v3.0.4 Docker Compose 日常开发默认配置
# =============================================
# 默认入口: docker compose up -d --build
# 全量本地构建: docker compose -f docker-compose.yml -f docker-compose.full.yml up -d --build
# 预构建镜像部署模板: deploy/compose/docker-compose.prod.yml / docker-compose.prod.cn.yml

services:
  db:
    image: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}/postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ${POSTGRES_DB:-vulhunter}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vulhunter-network

  backend:
    build:
      context: ./backend
      target: dev-runtime
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - UV_IMAGE=${UV_IMAGE:-ghcr.nju.edu.cn/astral-sh/uv:latest}
        - BACKEND_APT_MIRROR_PRIMARY=${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        - BACKEND_APT_SECURITY_PRIMARY=${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        - BACKEND_APT_MIRROR_FALLBACK=${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
        - BACKEND_APT_SECURITY_FALLBACK=${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
        - BACKEND_PYPI_INDEX_PRIMARY=${BACKEND_PYPI_INDEX_PRIMARY:-}
        - BACKEND_PYPI_INDEX_FALLBACK=${BACKEND_PYPI_INDEX_FALLBACK:-}
        - BACKEND_PYPI_INDEX_CANDIDATES=${BACKEND_PYPI_INDEX_CANDIDATES:-https://mirrors.aliyun.com/pypi/simple/,https://pypi.tuna.tsinghua.edu.cn/simple,https://pypi.org/simple}
        - BACKEND_INSTALL_CJK_FONTS=${BACKEND_INSTALL_CJK_FONTS:-0}
        - BACKEND_INSTALL_YASA=${BACKEND_INSTALL_YASA:-1}
        - YASA_VERSION=${YASA_VERSION:-v0.2.33}
        - http_proxy=
        - https_proxy=
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - all_proxy=
        - ALL_PROXY=
    image: vulhunter/backend-dev:latest
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - backend_uv_cache:/root/.cache/uv
      - backend_uploads:/app/uploads
      - mcp_data:/app/data/mcp
      - /tmp/vulhunter:/tmp/vulhunter
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${VULHUNTER_BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/${POSTGRES_DB:-vulhunter}
      ASYNCPG_DSN: postgresql://postgres:postgres@db:5432/${POSTGRES_DB:-vulhunter}
      REDIS_URL: redis://redis:6379/0
      RESET_STATIC_SCAN_TABLES_ON_DEPLOY: "false"
      AGENT_ENABLED: "true"
      SANDBOX_ENABLED: "true"
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-vulhunter/sandbox:latest}
      YASA_ENABLED: ${YASA_ENABLED:-true}
      YASA_BIN_PATH: ${YASA_BIN_PATH:-/opt/yasa/bin/yasa}
      YASA_RESOURCE_DIR: ${YASA_RESOURCE_DIR:-/opt/yasa/resource}
      YASA_TIMEOUT_SECONDS: ${YASA_TIMEOUT_SECONDS:-600}
      MCP_ENABLED: "true"
      MCP_REQUIRE_ALL_READY_ON_STARTUP: "false"
      GIT_MIRROR_ENABLED: ${GIT_MIRROR_ENABLED:-true}
      GIT_MIRROR_PREFIX: ${GIT_MIRROR_PREFIX:-https://gh-proxy.org}
      GIT_MIRROR_PREFIXES: ${GIT_MIRROR_PREFIXES:-https://gh-proxy.org,https://v6.gh-proxy.org}
      GIT_MIRROR_HOSTS: ${GIT_MIRROR_HOSTS:-github.com}
      GIT_MIRROR_ALLOW_AUTH_URL: ${GIT_MIRROR_ALLOW_AUTH_URL:-false}
      GIT_MIRROR_FALLBACK_TO_ORIGIN: ${GIT_MIRROR_FALLBACK_TO_ORIGIN:-false}
      CODEX_SKILLS_AUTO_INSTALL: "false"
      SKILL_REGISTRY_AUTO_SYNC_ON_STARTUP: "false"
      XDG_CONFIG_HOME: /app/data/mcp/xdg-config
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 60
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vulhunter-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile}
      target: dev
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - FRONTEND_NPM_REGISTRY=${FRONTEND_NPM_REGISTRY:-https://registry.npmmirror.com}
        - FRONTEND_NPM_REGISTRY_FALLBACK=${FRONTEND_NPM_REGISTRY_FALLBACK:-https://registry.npmjs.org}
        - PNPM_VERSION=${PNPM_VERSION:-9.15.4}
        - BUILD_WEAK_NETWORK=${BUILD_WEAK_NETWORK:-false}
        - BUILD_ARCH=${BUILD_ARCH:-}
        - http_proxy=
        - https_proxy=
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - all_proxy=
        - ALL_PROXY=
    image: vulhunter/frontend-dev:latest
    restart: unless-stopped
    working_dir: /app
    command:
      - sh
      - /app/scripts/dev-entrypoint.sh
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_pnpm_store:/pnpm/store
    ports:
      - "${VULHUNTER_FRONTEND_PORT:-3000}:5173"
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
      VITE_API_TARGET: http://backend:8000
      FRONTEND_DEV_PORT: "5173"
      FRONTEND_PUBLIC_URL: http://localhost:${VULHUNTER_FRONTEND_PORT:-3000}
      BACKEND_PUBLIC_URL: http://localhost:${VULHUNTER_BACKEND_PORT:-8000}
      FRONTEND_NPM_REGISTRY: ${FRONTEND_NPM_REGISTRY:-https://registry.npmmirror.com}
      FRONTEND_DEV_INSTALL_MODE: ${FRONTEND_DEV_INSTALL_MODE:-auto}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-}
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "none"
    networks:
      - vulhunter-network

  redis:
    image: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}/redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vulhunter-network

  sandbox:
    build:
      context: ./docker/sandbox
      dockerfile: Dockerfile
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - SANDBOX_BASE_IMAGE=${SANDBOX_BASE_IMAGE:-docker.m.daocloud.io/python:3.12-slim}
        - SANDBOX_APT_MIRROR_PRIMARY=${SANDBOX_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        - SANDBOX_APT_SECURITY_PRIMARY=${SANDBOX_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        - SANDBOX_APT_MIRROR_FALLBACK=${SANDBOX_APT_MIRROR_FALLBACK:-deb.debian.org}
        - SANDBOX_APT_SECURITY_FALLBACK=${SANDBOX_APT_SECURITY_FALLBACK:-security.debian.org}
        - SANDBOX_PYPI_INDEX_PRIMARY=${SANDBOX_PYPI_INDEX_PRIMARY:-https://mirrors.aliyun.com/pypi/simple/}
        - SANDBOX_PYPI_INDEX_FALLBACK=${SANDBOX_PYPI_INDEX_FALLBACK:-https://pypi.org/simple}
        - SANDBOX_NPM_REGISTRY_PRIMARY=${SANDBOX_NPM_REGISTRY_PRIMARY:-https://registry.npmmirror.com}
        - SANDBOX_NPM_REGISTRY_FALLBACK=${SANDBOX_NPM_REGISTRY_FALLBACK:-https://registry.npmjs.org}
        - SANDBOX_PNPM_CMD_TIMEOUT_SECONDS=${SANDBOX_PNPM_CMD_TIMEOUT_SECONDS:-420}
    image: vulhunter/sandbox:latest
    profiles: ["build"]
    restart: "no"
    command: echo "Sandbox image built successfully"

  adminer:
    image: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}/adminer:latest
    restart: unless-stopped
    profiles: ["tools"]
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vulhunter-network
  
  nexus-web:
    build:
      context: ./nexus-web
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - NEXUS_WEB_REPO_URL=${NEXUS_WEB_REPO_URL:-https://github.com/happytraveller-alone/nexus-web.git}
        - NEXUS_WEB_GIT_MIRROR_PREFIX=${NEXUS_WEB_GIT_MIRROR_PREFIX:-https://v6.gh-proxy.org/}
        - NEXUS_WEB_NPM_REGISTRY=${NEXUS_WEB_NPM_REGISTRY:-https://registry.npmmirror.com}
        - NEXUS_WEB_NPM_REGISTRY_FALLBACK=${NEXUS_WEB_NPM_REGISTRY_FALLBACK:-https://registry.npmjs.org}
        - NEXUS_WEB_PNPM_VERSION=${NEXUS_WEB_PNPM_VERSION:-10.32.1}
    ports:
      - "5174:5174"

networks:
  vulhunter-network:
    driver: bridge

volumes:
  postgres_data:
  backend_venv:
  backend_uv_cache:
  backend_uploads:
  mcp_data:
  redis_data:
  frontend_node_modules:
  frontend_pnpm_store:
