# =============================================
# VulHunter v3.0.4 Docker Compose 配置
# =============================================
# 部署: docker compose up -d --build
# 查看日志: docker compose logs -f
# 说明: 默认 docker compose 路径不会启动 Joern/CodeBadger
# 如需启用，请使用 --profile joern
# 预构建镜像部署请使用 docker-compose.prod.yml / docker-compose.prod.cn.yml

services:
  # =============================================
  # 核心基础服务
  # =============================================

  db:
    image: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}/postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=${POSTGRES_DB:-vulhunter}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vulhunter-network

  backend:
    build:
      context: ./backend
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - UV_IMAGE=${UV_IMAGE:-ghcr.nju.edu.cn/astral-sh/uv:latest}
        - BACKEND_APT_MIRROR_PRIMARY=${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        - BACKEND_APT_SECURITY_PRIMARY=${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        - BACKEND_APT_MIRROR_FALLBACK=${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
        - BACKEND_APT_SECURITY_FALLBACK=${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
        - BACKEND_PYPI_INDEX_PRIMARY=${BACKEND_PYPI_INDEX_PRIMARY:-https://mirrors.aliyun.com/pypi/simple/}
        - BACKEND_PYPI_INDEX_FALLBACK=${BACKEND_PYPI_INDEX_FALLBACK:-https://pypi.org/simple}
        - BACKEND_PYPI_INDEX_CANDIDATES=${BACKEND_PYPI_INDEX_CANDIDATES:-https://mirrors.aliyun.com/pypi/simple/,https://pypi.tuna.tsinghua.edu.cn/simple,https://pypi.org/simple}
        - BACKEND_NPM_REGISTRY_PRIMARY=${BACKEND_NPM_REGISTRY_PRIMARY:-https://registry.npmmirror.com}
        - BACKEND_NPM_REGISTRY_FALLBACK=${BACKEND_NPM_REGISTRY_FALLBACK:-https://registry.npmjs.org}
        - BACKEND_NPM_REGISTRY_CANDIDATES=${BACKEND_NPM_REGISTRY_CANDIDATES:-https://registry.npmmirror.com,https://mirrors.cloud.tencent.com/npm,https://registry.npmjs.org}
        - BACKEND_PNPM_VERSION=${BACKEND_PNPM_VERSION:-9.15.4}
        - BACKEND_PNPM_CMD_TIMEOUT_SECONDS=${BACKEND_PNPM_CMD_TIMEOUT_SECONDS:-420}
        - BACKEND_PNPM_INSTALL_OPTIONAL=${BACKEND_PNPM_INSTALL_OPTIONAL:-0}
        - BACKEND_INSTALL_CJK_FONTS=${BACKEND_INSTALL_CJK_FONTS:-0}
        - http_proxy=
        - https_proxy=
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - all_proxy=
        - ALL_PROXY=
    image: vulhunter/backend-local:latest
    restart: unless-stopped
    volumes:
      # - ./backend/app:/app/app:ro  # 挂载代码目录，修改后自动生效
      - backend_uploads:/app/uploads
      - mcp_data:/app/data/mcp
      - qmd_data:/app/data/qmd
      - /tmp/vulhunter:/tmp/vulhunter # VulHunter runtime cache/log dir visible to host
      - /tmp/vulhunter:/tmp/deepaudit # ZIP/Repo 工作目录兼容挂载（供沙箱/Joern MCP 挂载）
      - /var/run/docker.sock:/var/run/docker.sock # 沙箱执行必须
    ports:
      - "${VULHUNTER_BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/${POSTGRES_DB:-vulhunter}
      - ASYNCPG_DSN=postgresql://postgres:postgres@db:5432/${POSTGRES_DB:-vulhunter}
      - REDIS_URL=redis://redis:6379/0
      - RESET_STATIC_SCAN_TABLES_ON_DEPLOY=false
      - AGENT_ENABLED=true
      - SANDBOX_ENABLED=true
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-vulhunter/sandbox:latest}
      - MCP_ENABLED=true
      - MCP_REQUIRE_ALL_READY_ON_STARTUP=true
      - MCP_REQUIRED_RUNTIME_DOMAIN=stdio
      - MCP_FILESYSTEM_ENABLED=true
      - MCP_FILESYSTEM_RUNTIME_MODE=stdio_only
      - MCP_FILESYSTEM_FORCE_STDIO=${MCP_FILESYSTEM_FORCE_STDIO:-true}
      - MCP_CODEBADGER_ENABLED=true
      - MCP_CODEBADGER_RUNTIME_MODE=backend_only
      - MCP_CODEBADGER_BACKEND_URL=http://codebadger-mcp:4242/mcp
      - MCP_CODE_INDEX_ENABLED=true
      - GIT_MIRROR_ENABLED=${GIT_MIRROR_ENABLED:-true}
      - GIT_MIRROR_PREFIX=${GIT_MIRROR_PREFIX:-https://gh-proxy.org}
      - GIT_MIRROR_PREFIXES=${GIT_MIRROR_PREFIXES:-https://gh-proxy.org,https://v6.gh-proxy.org}
      - GIT_MIRROR_HOSTS=${GIT_MIRROR_HOSTS:-github.com}
      - GIT_MIRROR_ALLOW_AUTH_URL=${GIT_MIRROR_ALLOW_AUTH_URL:-false}
      - GIT_MIRROR_FALLBACK_TO_ORIGIN=${GIT_MIRROR_FALLBACK_TO_ORIGIN:-false}
      - XDG_CONFIG_HOME=/app/data/mcp/xdg-config
      - JOERN_MCP_ENABLED=true
      - JOERN_MCP_PREFER=true
      - JOERN_MCP_URL=http://codebadger-mcp:4242/mcp
      - JOERN_MCP_CPG_TIMEOUT_SEC=${JOERN_MCP_CPG_TIMEOUT_SEC:-240}
      - JOERN_MCP_QUERY_TIMEOUT_SEC=${JOERN_MCP_QUERY_TIMEOUT_SEC:-90}
      # 禁用代理设置，防止容器内无法连接外部 API
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=*
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 开发模式：启用 --reload 热重载
    networks:
      - vulhunter-network

  codebadger-joern-server:
    build:
      context: ./docker/codebadger-joern-server
      dockerfile: Dockerfile
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - CODEBADGER_APT_MIRROR_PRIMARY=${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        - CODEBADGER_APT_SECURITY_PRIMARY=${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        - CODEBADGER_APT_MIRROR_FALLBACK=${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
        - CODEBADGER_APT_SECURITY_FALLBACK=${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
        - GIT_MIRROR_PREFIX=${GIT_MIRROR_PREFIX:-https://gh-proxy.org}
    image: vulhunter/codebadger-joern-server:latest
    container_name: codebadger-joern-server
    restart: unless-stopped
    volumes:
      - codebadger_playground:/playground
      - /tmp/vulhunter:/tmp/vulhunter
      - /tmp/vulhunter:/tmp/deepaudit
    healthcheck:
      test: ["CMD-SHELL", "test -x /opt/joern/joern-cli/joern"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["joern"]
    networks:
      - vulhunter-network

  codebadger-mcp:
    build:
      context: ./docker/codebadger-mcp
      dockerfile: Dockerfile
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - CODEBADGER_APT_MIRROR_PRIMARY=${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        - CODEBADGER_APT_SECURITY_PRIMARY=${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        - CODEBADGER_APT_MIRROR_FALLBACK=${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
        - CODEBADGER_APT_SECURITY_FALLBACK=${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
        - CODEBADGER_PYPI_INDEX_PRIMARY=${BACKEND_PYPI_INDEX_PRIMARY:-https://mirrors.aliyun.com/pypi/simple/}
        - CODEBADGER_PYPI_INDEX_FALLBACK=${BACKEND_PYPI_INDEX_FALLBACK:-https://pypi.org/simple}
        - CODEBADGER_PYPI_INDEX_CANDIDATES=${BACKEND_PYPI_INDEX_CANDIDATES:-https://mirrors.aliyun.com/pypi/simple/,https://pypi.tuna.tsinghua.edu.cn/simple,https://pypi.org/simple}
        - GIT_MIRROR_PREFIX=${GIT_MIRROR_PREFIX:-https://gh-proxy.org}
    image: vulhunter/codebadger-mcp:latest
    restart: unless-stopped
    volumes:
      - codebadger_playground:/app/playground
      - /tmp/vulhunter:/tmp/vulhunter
      - /tmp/vulhunter:/tmp/deepaudit
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4242/health | tr -d '\\n\\r ' | grep -q '\"status\":\"healthy\"'"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      codebadger-joern-server:
        condition: service_healthy
    profiles: ["joern"]
    networks:
      - vulhunter-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile}
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - FRONTEND_NPM_REGISTRY=${FRONTEND_NPM_REGISTRY:-https://registry.npmmirror.com}
        - FRONTEND_NPM_REGISTRY_FALLBACK=${FRONTEND_NPM_REGISTRY_FALLBACK:-https://registry.npmjs.org}
        - PNPM_VERSION=${PNPM_VERSION:-9.15.4}
        - BUILD_WEAK_NETWORK=${BUILD_WEAK_NETWORK:-false}
        - BUILD_ARCH=${BUILD_ARCH:-}
        - http_proxy=
        - https_proxy=
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - all_proxy=
        - ALL_PROXY=
    image: vulhunter/frontend-local:latest
    restart: unless-stopped
    volumes:
      # - ./frontend/dist:/usr/share/nginx/html:ro  # 挂载构建产物，本地 pnpm build 后自动生效
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro  # 挂载 nginx 配置
    ports:
      - "${VULHUNTER_FRONTEND_PORT:-3000}:80" # Nginx 监听 80 端口
    environment:
      # 禁用代理 - nginx 需要直连后端
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=*
      - VITE_API_BASE_URL=/api/v1
    depends_on:
      - backend
    logging:
      driver: "none"
    networks:
      - vulhunter-network

  # =============================================
  # Agent 服务必须组件
  # =============================================

  # Redis (Agent 任务队列 - 必须)
  redis:
    image: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}/redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vulhunter-network

  # 沙箱镜像构建服务 (漏洞验证必须)
  # 注意: 此服务仅用于构建镜像，构建完成后自动退出
  sandbox:
    build:
      context: ./docker/sandbox
      dockerfile: Dockerfile
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - SANDBOX_BASE_IMAGE=${SANDBOX_BASE_IMAGE:-docker.m.daocloud.io/python:3.12-slim}
        - SANDBOX_APT_MIRROR_PRIMARY=${SANDBOX_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        - SANDBOX_APT_SECURITY_PRIMARY=${SANDBOX_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        - SANDBOX_APT_MIRROR_FALLBACK=${SANDBOX_APT_MIRROR_FALLBACK:-deb.debian.org}
        - SANDBOX_APT_SECURITY_FALLBACK=${SANDBOX_APT_SECURITY_FALLBACK:-security.debian.org}
        - SANDBOX_PYPI_INDEX_PRIMARY=${SANDBOX_PYPI_INDEX_PRIMARY:-https://mirrors.aliyun.com/pypi/simple/}
        - SANDBOX_PYPI_INDEX_FALLBACK=${SANDBOX_PYPI_INDEX_FALLBACK:-https://pypi.org/simple}
        - SANDBOX_NPM_REGISTRY_PRIMARY=${SANDBOX_NPM_REGISTRY_PRIMARY:-https://registry.npmmirror.com}
        - SANDBOX_NPM_REGISTRY_FALLBACK=${SANDBOX_NPM_REGISTRY_FALLBACK:-https://registry.npmjs.org}
        - SANDBOX_PNPM_CMD_TIMEOUT_SECONDS=${SANDBOX_PNPM_CMD_TIMEOUT_SECONDS:-420}
    image: vulhunter/sandbox:latest
    profiles: ["build"]
    restart: "no"
    command: echo "Sandbox image built successfully"

networks:
  vulhunter-network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads:
  mcp_data:
  qmd_data:
  redis_data:
  codebadger_playground:
