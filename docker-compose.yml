# =============================================
# VulHunter Docker Compose — 全量本地构建
# =============================================
# 启动: docker compose up --build
# backend 会在启动期通过 Docker SDK 执行 runner preflight。
# opengrep-runner compose service 仅用于在 `docker compose up` 时构建/预热本地镜像，
# 服务本身为一次性成功退出；真正执行扫描时，backend 仍按 SCANNER_*_IMAGE
# 动态拉起临时 runner 容器，并在结束后清理。

services:
  opengrep-runner:
    image: ${SCANNER_OPENGREP_IMAGE:-vulhunter/opengrep-runner-local:latest}
    pull_policy: never
    build:
      context: .
      dockerfile: docker/opengrep-runner.Dockerfile
      args:
        DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        BACKEND_APT_MIRROR_PRIMARY: ${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        BACKEND_APT_SECURITY_PRIMARY: ${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        BACKEND_APT_MIRROR_FALLBACK: ${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
        BACKEND_APT_SECURITY_FALLBACK: ${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
    restart: "no"
    command:
      - "opengrep"
      - "--version"
    networks:
      - vulhunter-network

  db:
    image: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}/postgres:15-alpine
    restart: unless-stopped
    mem_limit: 1g
    pids_limit: 512
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ${POSTGRES_DB:-vulhunter}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      start_period: 30s
      retries: 12
    networks:
      - vulhunter-network

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: runtime-plain
      args:
        DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        UV_IMAGE: ${UV_IMAGE:-docker.m.daocloud.io/library/ghcr.io/astral-sh/uv:0.7}
        DOCKER_CLI_IMAGE: ${DOCKER_CLI_IMAGE:-docker.m.daocloud.io/library/docker:27-cli}
        BACKEND_APT_MIRROR_PRIMARY: ${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        BACKEND_APT_SECURITY_PRIMARY: ${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        BACKEND_APT_MIRROR_FALLBACK: ${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
        BACKEND_APT_SECURITY_FALLBACK: ${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
    restart: unless-stopped
    mem_limit: 4g
    pids_limit: 1024
    working_dir: /app
    volumes:
      - ./docker/env/backend:/docker/env/backend
      - backend_uploads:/app/uploads
      - backend_runtime_data:/app/data/runtime
      - scan_workspace:/tmp/vulhunter/scans
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
    ports:
      - "${VULHUNTER_BACKEND_PORT:-8000}:8000"
    env_file:
      - path: ./docker/env/backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/${POSTGRES_DB:-vulhunter}
      ASYNCPG_DSN: postgresql://postgres:postgres@db:5432/${POSTGRES_DB:-vulhunter}
      REDIS_URL: redis://redis:6379/0
      GHCR_REGISTRY: ${GHCR_REGISTRY:-ghcr.io}
      VULHUNTER_IMAGE_NAMESPACE: ${VULHUNTER_IMAGE_NAMESPACE:-happytraveller-alone}
      VULHUNTER_IMAGE_TAG: ${VULHUNTER_IMAGE_TAG:-latest}
      RESET_STATIC_SCAN_TABLES_ON_DEPLOY: "false"
      AGENT_ENABLED: "true"
      SANDBOX_ENABLED: "true"
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-vulhunter/sandbox-runner-local:latest}
      SCAN_WORKSPACE_ROOT: ${SCAN_WORKSPACE_ROOT:-/tmp/vulhunter/scans}
      SCAN_WORKSPACE_VOLUME: ${SCAN_WORKSPACE_VOLUME:-vulhunter_scan_workspace}
      RUNNER_PREFLIGHT_ENABLED: "${RUNNER_PREFLIGHT_ENABLED:-true}"
      RUNNER_PREFLIGHT_STRICT: "${RUNNER_PREFLIGHT_STRICT:-true}"
      RUNNER_PREFLIGHT_TIMEOUT_SECONDS: "${RUNNER_PREFLIGHT_TIMEOUT_SECONDS:-30}"
      RUNNER_PREFLIGHT_MAX_CONCURRENCY: "${RUNNER_PREFLIGHT_MAX_CONCURRENCY:-2}"
      RUNNER_PREFLIGHT_BUILD_TIMEOUT_SECONDS: "${RUNNER_PREFLIGHT_BUILD_TIMEOUT_SECONDS:-1800}"
      RUNNER_PREFLIGHT_BUILD_CONTEXT: /opt/backend-build-context
      DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
      BACKEND_APT_MIRROR_PRIMARY: ${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
      BACKEND_APT_SECURITY_PRIMARY: ${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
      BACKEND_APT_MIRROR_FALLBACK: ${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
      BACKEND_APT_SECURITY_FALLBACK: ${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
      BACKEND_PYPI_INDEX_PRIMARY: ${BACKEND_PYPI_INDEX_PRIMARY:-}
      BACKEND_PYPI_INDEX_FALLBACK: ${BACKEND_PYPI_INDEX_FALLBACK:-}
      BACKEND_PYPI_INDEX_CANDIDATES: ${BACKEND_PYPI_INDEX_CANDIDATES:-https://mirrors.aliyun.com/pypi/simple/,https://pypi.tuna.tsinghua.edu.cn/simple,https://pypi.mirrors.ustc.edu.cn/simple/,https://mirrors.cloud.tencent.com/pypi/simple/,https://mirrors.huaweicloud.com/repository/pypi/simple/,https://mirrors.bfsu.edu.cn/pypi/web/simple/,https://pypi.org/simple}
      SCANNER_OPENGREP_IMAGE: ${SCANNER_OPENGREP_IMAGE:-vulhunter/opengrep-runner-local:latest}
      FLOW_PARSER_RUNNER_IMAGE: ${FLOW_PARSER_RUNNER_IMAGE:-vulhunter/flow-parser-runner-local:latest}
      SANDBOX_RUNNER_IMAGE: ${SANDBOX_RUNNER_IMAGE:-vulhunter/sandbox-runner-local:latest}
      SANDBOX_RUNNER_ENABLED: "${SANDBOX_RUNNER_ENABLED:-true}"
      FLOW_PARSER_RUNNER_ENABLED: "${FLOW_PARSER_RUNNER_ENABLED:-true}"
      FLOW_PARSER_RUNNER_TIMEOUT_SECONDS: "${FLOW_PARSER_RUNNER_TIMEOUT_SECONDS:-120}"
      FLOW_PARSER_RUNNER_BATCH_MAX_FILES: "${FLOW_PARSER_RUNNER_BATCH_MAX_FILES:-100}"
      FLOW_PARSER_RUNNER_BATCH_MAX_BYTES: "${FLOW_PARSER_RUNNER_BATCH_MAX_BYTES:-8388608}"
      GIT_MIRROR_ENABLED: ${GIT_MIRROR_ENABLED:-true}
      GIT_MIRROR_PREFIX: ${GIT_MIRROR_PREFIX:-https://gh-proxy.org}
      GIT_MIRROR_PREFIXES: ${GIT_MIRROR_PREFIXES:-https://gh-proxy.org,https://v6.gh-proxy.org}
      GIT_MIRROR_HOSTS: ${GIT_MIRROR_HOSTS:-github.com}
      GIT_MIRROR_ALLOW_AUTH_URL: ${GIT_MIRROR_ALLOW_AUTH_URL:-false}
      GIT_MIRROR_FALLBACK_TO_ORIGIN: ${GIT_MIRROR_FALLBACK_TO_ORIGIN:-false}
      XDG_DATA_HOME: /app/data/runtime/xdg-data
      XDG_CACHE_HOME: /app/data/runtime/xdg-cache
      XDG_CONFIG_HOME: /app/data/runtime/xdg-config
      DOCKER_HOST: ${DOCKER_HOST:-}
      CONTAINER_CLI: ${CONTAINER_CLI:-docker}
      HERMES_RECON_CONTAINER: hermes-recon
      HERMES_ANALYSIS_CONTAINER: hermes-analysis
      HERMES_VERIFICATION_CONTAINER: hermes-verification
      HERMES_REPORT_CONTAINER: hermes-report
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-fsS"
        - "http://127.0.0.1:8000/health"
      interval: 5s
      timeout: 5s
      start_period: 180s
      retries: 120
    depends_on:
      opengrep-runner:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vulhunter-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: dev
      args:
        DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        PNPM_VERSION: ${PNPM_VERSION:-10.11.0}
        WEAK_NETWORK: ${WEAK_NETWORK:-false}
    restart: unless-stopped
    mem_limit: 512m
    pids_limit: 256
    ports:
      - "${VULHUNTER_FRONTEND_PORT:-3000}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_pnpm_store:/pnpm/store
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
      VITE_API_BASE_URL: /api/v1
      VITE_API_TARGET: ${VITE_API_TARGET:-http://backend:8000}
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_HMR_PORT: ${VITE_HMR_PORT:-3000}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vulhunter-network

  redis:
    image: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}/redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    pids_limit: 256
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vulhunter-network

  adminer:
    image: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}/adminer:latest
    restart: unless-stopped
    profiles: [ "tools" ]
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vulhunter-network

  # ----- Hermes Functional Agents -----

  hermes-recon:
    build:
      context: .
      dockerfile: docker/hermes-agent-base.Dockerfile
      args:
        DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        HERMES_APT_MIRROR_PRIMARY: ${HERMES_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        HERMES_APT_SECURITY_PRIMARY: ${HERMES_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        HERMES_APT_MIRROR_FALLBACK: ${HERMES_APT_MIRROR_FALLBACK:-deb.debian.org}
        HERMES_APT_SECURITY_FALLBACK: ${HERMES_APT_SECURITY_FALLBACK:-security.debian.org}
    image: vulhunter/hermes-agent:latest
    container_name: hermes-recon
    restart: unless-stopped
    mem_limit: 2g
    pids_limit: 512
    volumes:
      - ./backend/agents/recon/data:/opt/data
      - ./backend/agents/recon/hermes-home:/opt/seed:ro
      - ${PROJECT_SOURCE_PATH:-.}:/scan:ro
    env_file:
      - path: ./backend/agents/recon/container.env
        required: false
    healthcheck:
      test: ["CMD", "sh", "/opt/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vulhunter-network

  hermes-analysis:
    build:
      context: .
      dockerfile: docker/hermes-agent-base.Dockerfile
      args:
        DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        HERMES_APT_MIRROR_PRIMARY: ${HERMES_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        HERMES_APT_SECURITY_PRIMARY: ${HERMES_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        HERMES_APT_MIRROR_FALLBACK: ${HERMES_APT_MIRROR_FALLBACK:-deb.debian.org}
        HERMES_APT_SECURITY_FALLBACK: ${HERMES_APT_SECURITY_FALLBACK:-security.debian.org}
    image: vulhunter/hermes-agent:latest
    container_name: hermes-analysis
    restart: unless-stopped
    mem_limit: 2g
    pids_limit: 512
    volumes:
      - ./backend/agents/analysis/data:/opt/data
      - ./backend/agents/analysis/hermes-home:/opt/seed:ro
      - ${PROJECT_SOURCE_PATH:-.}:/scan:ro
    env_file:
      - path: ./backend/agents/analysis/container.env
        required: false
    healthcheck:
      test: ["CMD", "sh", "/opt/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vulhunter-network

  hermes-verification:
    build:
      context: .
      dockerfile: docker/hermes-agent-base.Dockerfile
      args:
        DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        HERMES_APT_MIRROR_PRIMARY: ${HERMES_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        HERMES_APT_SECURITY_PRIMARY: ${HERMES_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        HERMES_APT_MIRROR_FALLBACK: ${HERMES_APT_MIRROR_FALLBACK:-deb.debian.org}
        HERMES_APT_SECURITY_FALLBACK: ${HERMES_APT_SECURITY_FALLBACK:-security.debian.org}
    image: vulhunter/hermes-agent:latest
    container_name: hermes-verification
    restart: unless-stopped
    mem_limit: 2g
    pids_limit: 512
    volumes:
      - ./backend/agents/verification/data:/opt/data
      - ./backend/agents/verification/hermes-home:/opt/seed:ro
      - ./backend/agents/verification/scratch:/opt/scratch
      - ${PROJECT_SOURCE_PATH:-.}:/scan:ro
    env_file:
      - path: ./backend/agents/verification/container.env
        required: false
    healthcheck:
      test: ["CMD", "sh", "/opt/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vulhunter-network

  hermes-report:
    build:
      context: .
      dockerfile: docker/hermes-agent-base.Dockerfile
      args:
        DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        HERMES_APT_MIRROR_PRIMARY: ${HERMES_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        HERMES_APT_SECURITY_PRIMARY: ${HERMES_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        HERMES_APT_MIRROR_FALLBACK: ${HERMES_APT_MIRROR_FALLBACK:-deb.debian.org}
        HERMES_APT_SECURITY_FALLBACK: ${HERMES_APT_SECURITY_FALLBACK:-security.debian.org}
    image: vulhunter/hermes-agent:latest
    container_name: hermes-report
    restart: unless-stopped
    mem_limit: 2g
    pids_limit: 512
    volumes:
      - ./backend/agents/report/data:/opt/data
      - ./backend/agents/report/hermes-home:/opt/seed:ro
      - ./backend/agents/report/output:/opt/output
      - ${PROJECT_SOURCE_PATH:-.}:/scan:ro
    env_file:
      - path: ./backend/agents/report/container.env
        required: false
    healthcheck:
      test: ["CMD", "sh", "/opt/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vulhunter-network

networks:
  vulhunter-network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads:
  backend_runtime_data:
  scan_workspace:
    name: ${SCAN_WORKSPACE_VOLUME:-vulhunter_scan_workspace}
  redis_data:
  frontend_node_modules:
  frontend_pnpm_store:
