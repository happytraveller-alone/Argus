  severity: WARNING
  message: "The application was found executing string comparisons using one of `===`,\
    \ `!==`, `==` or `!=`\nagainst security sensitive values. String comparisons like\
    \ this are not constant time, meaning\nthe\nfirst character found not to match\
    \ in the two strings will immediately exit the conditional\nstatement.\nThis allows\
    \ an adversary to calculate or observe small timing differences depending on the\n\
    strings\npassed to this comparison. This potentially allows an adversary the ability\
    \ to brute force a\nstring\nthat will match the expected value by monitoring different\
    \ character values.\n\nTo remediate this issue, use the `crypto.timingSafeEqual`\
    \ method when comparing strings.\n\nExample using `crypto.timingSafeEqual` to\
    \ safely compare strings:\n```\nfunction constantTimeIsPasswordEqual(userInput)\
    \ {\n    // Retrieve the password from a secure data store such as a KMS or Hashicorp's\
    \ vault.\n    const password = getPasswordFromSecureDataStore();\n    // Use crypto\
    \ timingSafeEqual to ensure the comparison is done in constant time.\n    return\
    \ crypto.timingSafeEqual(Buffer.from(userInput, 'utf-8'), Buffer.from(password,\n\
    'utf-8'));\n}\n```\n\nFor more information on constant time comparison see:\n\
    - https://nodejs.org/api/crypto.html#crypto_crypto_timingsafeequal_a_b\n"
  metadata:
    cwe: CWE-208
    shortDescription: Observable timing discrepancy
    category: security
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    security-severity: Medium
