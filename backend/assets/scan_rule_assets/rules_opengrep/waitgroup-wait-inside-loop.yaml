rules:
- id: waitgroup-wait-inside-loop
  message: Calling `$WG.Wait()` inside a loop blocks the call to `$WG.Done()`
  languages:
  - go
  severity: WARNING
  metadata:
    category: security
    cwe: 'CWE-667: Improper Locking'
    subcategory:
    - vuln
    confidence: MEDIUM
    likelihood: MEDIUM
    impact: MEDIUM
    technology:
    - --no-technology--
    description: Calls to `sync.WaitGroup.Wait` inside a loop
    references:
    - https://go101.org/article/concurrent-common-mistakes.html
  patterns:
  - pattern-either:
    - pattern: "var $WG sync.WaitGroup\n...\nfor ... {\n  ...\n  go func(...){\n \
        \   ...\n    defer $WG.Done()\n    ...\n  }()\n  ...\n  $WG.Wait()\n  ...\n\
        }\n"
    - pattern: "$WG := &sync.WaitGroup{}\n...\nfor ... {\n  ...\n  go func(...){\n\
        \    ...\n    defer $WG.Done()\n    ...\n  }()\n  ...\n  $WG.Wait()\n  ...\n\
        }\n"
    - pattern: "var $WG sync.WaitGroup\n...\nfor ... {\n  ...\n  go func(...){\n \
        \   ...\n    $WG.Done()\n    ...\n  }()\n  ...\n  $WG.Wait()\n  ...\n}\n"
    - pattern: "$WG := &sync.WaitGroup{}\n...\nfor ... {\n  ...\n  go func(...){\n\
        \    ...\n    $WG.Done()\n    ...\n  }()\n  ...\n  $WG.Wait()\n  ...\n}\n"
