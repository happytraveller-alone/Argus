rules:
- id: useless-assignment-keyed
  patterns:
  - pattern-either:
    - pattern: '$X[$Y] = ...

        $X[$Y] = ...

        '
    - pattern: '$X[$Y][$Z] = ...

        $X[$Y][$Z] = ...

        '
  message: key `$Y` in `$X` is assigned twice; the first assignment is useless
  languages:
  - python
  severity: WARNING
  metadata:
    cwe:
    - 'CWE-563: Assignment to Variable without Use'
    - 'CWE-398: Indicator of Poor Code Quality'
