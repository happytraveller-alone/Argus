rules:
- id: vuln-mono-3e4bd5f6
  patterns:
  - pattern: |
      if (!$FILEINFO.Exists)
      ...
  - pattern-not: |
      if (!$FILEINFO.Exists || !ValidFileName($FILENAME))
      ...
  languages:
  - csharp
  message: |
    Detected a vulnerability where file existence is checked without validating the file name.
    This can lead to security issues such as directory traversal or handling of malicious files.
    Ensure to validate the file name using a method like ValidFileName before checking file existence.
  severity: ERROR
  metadata:
    source-url: github.com/mono/mono/commit/3e4bd5f6e0dfc74907b40cdefcf91ee3a791876b
    category: security
    cwe:
    - CWE-22
    - CWE-73
    owasp:
    - 'A1: Injection'
    - 'A5: Security Misconfiguration'
    references:
    - https://cwe.mitre.org/data/definitions/22.html
    - https://owasp.org/www-project-top-ten/
    technology:
    - csharp
- id: vuln-mono-8125ab9c
  patterns:
  - pattern: |
      internal bool EnableViewStateMac = false;
  - pattern-not: |
      internal bool EnableViewStateMac = true;
  languages:
  - csharp
  message: |
    The EnableViewStateMac property is set to false, which disables the Message Authentication Code (MAC) validation for ViewState. This can lead to security vulnerabilities such as tampering with ViewState data. Always set EnableViewStateMac to true to ensure ViewState integrity.
  severity: ERROR
  metadata:
    source-url: github.com/mono/mono/commit/8125ab9c2a8c9b0d7da01b6909d54c47344eaa67
    category: security
    cwe:
    - CWE-642
    owasp:
    - A06:2021-Vulnerable and Outdated Components
    references:
    - https://docs.microsoft.com/en-us/previous-versions/dotnet/netframework-1.1/ms972969(v=vs.71)#view-state-and-security
    technology:
    - csharp
- id: vuln-mono-b371da6b
  patterns:
  - pattern: |
      private byte[] ReadClientHelloV2(Stream $RECORD)
      {
        int $MSGLENGTH = $RECORD.ReadByte();
        if ($RECORD.CanSeek && ($MSGLENGTH + 1 > $RECORD.Length))
        {
          return null;
        }
        byte[] $MESSAGE = new byte[$MSGLENGTH];
        $RECORD.Read($MESSAGE, 0, $MSGLENGTH);
        ...
        byte[] $CHALLENGE = new byte[$CHALLENGELENGTH];
        Buffer.BlockCopy($MESSAGE, $OFFSET, $CHALLENGE, 0, $CHALLENGELENGTH);
        ...
        if ($CHALLENGELENGTH < 16 || $CIPHERSPECLENGTH == 0 || ($CIPHERSPECLENGTH % 3) != 0)
        {
          ...
        }
      }
  - pattern-not: |
      private byte[] ReadClientHelloV2(Stream $RECORD)
      {
        int $MSGLENGTH = $RECORD.ReadByte();
        if ($RECORD.CanSeek && ($MSGLENGTH + 1 > $RECORD.Length))
        {
          return null;
        }
        byte[] $MESSAGE = new byte[$MSGLENGTH];
        $RECORD.Read($MESSAGE, 0, $MSGLENGTH);
        ...
        int $LENGTH = ($CHALLENGELENGTH > 32) ? 32 : $CHALLENGELENGTH;
        byte[] $CHALLENGE = new byte[$CHALLENGELENGTH];
        Buffer.BlockCopy($MESSAGE, $OFFSET, $CHALLENGE, 0, $CHALLENGELENGTH);
        ...
        if ($CHALLENGELENGTH < 16 || $CIPHERSPECLENGTH == 0 || ($CIPHERSPECLENGTH % 3) != 0)
        {
          ...
        }
      }
  languages:
  - csharp
  message: |
    The vulnerability allows for insufficient validation of challenge length in SSL/TLS ClientHello message processing.
    This could lead to buffer overflow or incorrect handling of client random data.
    The fix ensures challenge length is properly constrained to 32 bytes.
  severity: ERROR
  metadata:
    source-url: https://github.com/mono/mono/commit/b371da6b2d68b4cdd0f21d6342af6c42794f998b
    category: security
    cwe:
    - CWE-120
    - CWE-130
    owasp:
    - 'A2: Cryptographic Failures'
    technology:
    - csharp
- id: vuln-mono-c3e088bf
  patterns:
  - pattern: |
      new NameValueCollection()
  - pattern-not: |
      new NameValueCollection(SecureHashCodeProvider.DefaultInvariant, CaseInsensitiveComparer.DefaultInvariant)
  languages:
  - csharp
  message: |
    Detected insecure instantiation of NameValueCollection without secure hash code provider and case-insensitive comparer. This can lead to security vulnerabilities such as hash collision attacks. Always use SecureHashCodeProvider.DefaultInvariant and CaseInsensitiveComparer.DefaultInvariant when creating NameValueCollection instances.
  severity: ERROR
  metadata:
    source-url: github.com/mono/mono/commit/c3e088bf2fc22d66d0f17b74676de366f661c3eb
    category: security
    cwe:
    - CWE-328
    owasp:
    - A02:2021 - Cryptographic Failures
    technology:
    - csharp
