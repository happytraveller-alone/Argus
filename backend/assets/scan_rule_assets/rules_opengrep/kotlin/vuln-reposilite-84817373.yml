rules:
- id: vuln-reposilite-84817373
  pattern: |
    jarFile.entries().asSequence().forEach { file ->
      if (file.isDirectory) {
        return@forEach
      }
      val path = Paths.get($UNSAFE_PATH + "/" + file.name)
      path.parent?.also { parent -> Files.createDirectories(parent) }
      jarFile.getInputStream(file).copyToAndClose(path.outputStream())
    }.asSuccess<Unit, ErrorResponse>()
  pattern-not: |
    jarFile
      .entries()
      .asSequence()
      .forEach { file ->
        if (file.isDirectory) {
          return@forEach
        }
        val processedArchiveFileLocation = file.name.toLocation()
        processedArchiveFileLocation
          .toPath()
          .map { javadocUnpackPath.resolve(it) }
          .peek {
            it.parent?.also { parent -> Files.createDirectories(parent) }
            jarFile.getInputStream(file).copyToAndClose(it.outputStream())
          }
          .onError {
            failureFacade.throwException(
              "Malicious resource path detected: $processedArchiveFileLocation in $jarPath",
              IllegalArgumentException("Malicious resource path detected: $it")
            )
          }
      }.asSuccess<Unit, ErrorResponse>()
  languages:
  - kotlin
  message: |
    Detected unsafe handling of archive file paths which can lead to path traversal vulnerabilities.
    The code directly uses the file name from the archive to construct a file path, allowing attackers to inject malicious paths.
    To fix this, validate and sanitize the file path using a method like `toLocation()` to ensure it is safe before processing.
  severity: ERROR
  metadata:
    source-url: github.com/dzikoysk/reposilite/commit/848173738e4375482c70365db5cebae29f125eaa
    category: security
    cwe:
    - CWE-22
    - CWE-73
    owasp:
    - 'A1: Injection'
    references:
    - https://owasp.org/www-project-top-ten/
    technology:
    - kotlin
