rules:
- id: kotlin_pathtraversal_rule-FilePathTraversal
  languages:
  - kotlin
  message: "The application is found using untrusted user input with file \noperations,\
    \ which can potentially lead to Path Traversal vulnerabilities. \nPath traversal\
    \ (also known as directory traversal) allows attackers to \naccess files and directories\
    \ outside of intended boundaries by inserting \nspecial characters or sequences\
    \ (like ../, ..\\\\, or URL-encoded variants) \nto navigate to arbitrary locations\
    \ in the filesystem.\nThe vulnerability can lead to unauthorized access to sensitive\
    \ files \n(configuration files, credentials), code execution (if attackers can\
    \ write \nto or include executable files), information disclosure, or complete\
    \ system \ncompromise.\n\nWhere possible, do not send user input to file operation\
    \ methods. If that \ncannot be avoided, follow the below mitigation strategy:\n\
    1. Validate and sanitize all user inputs used in file operations \n2. Use allowlisting\
    \ approaches to validate file paths where possible\n3. Apply canonicalization\
    \ before validation to prevent bypass techniques\n4. Restrict operations to a\
    \ specific designated directory\n5. Use application-specific user accounts with\
    \ limited privileges\n\nSecure Code Example:\n```\nfun safeWrite(filename: String,\
    \ content: String) {\n    val baseDir = File(\"/safe-dir/\")\n    val target =\
    \ File(baseDir, filename).canonicalFile\n\n    // Ensure the target path is within\
    \ the allowed directory\n    if (!target.path.startsWith(baseDir.canonicalPath))\
    \ {\n        throw SecurityException(\"Invalid file path: $filename\")\n    }\n\
    \n    FileWriter(target).use { writer ->\n        writer.write(content)\n    }\n\
    }\n```\n"
  metadata:
    shortDescription: Improper limitation of a pathname to a restricted directory
      ('Path Traversal')
    cwe: CWE-22
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    security-severity: High
    technology:
    - kotlin
    category: security
  severity: ERROR
  mode: taint
  pattern-sources:
  - patterns:
    - patterns:
      - pattern-inside: 'import $IMPORT

          ...

          '
      - metavariable-regex:
          metavariable: $IMPORT
          regex: .*springframework.*
      - focus-metavariable: $VAR
      - patterns:
        - pattern-either:
          - pattern-inside: "fun $_(..., @$REQ(...) $VAR: $TYPE,...): $_ {\n  ...\n\
              }\n"
          - pattern-inside: "fun $_(..., @$REQ $VAR: $TYPE,...): $_ {\n  ...\n}\n"
        - metavariable-regex:
            metavariable: $TYPE
            regex: ^(?!(Int|Long|Float|Double|Char|Boolean))
        - metavariable-regex:
            metavariable: $REQ
            regex: (RequestBody|PathVariable|RequestParam|RequestHeader|CookieValue|ModelAttribute|RequestPart)
  - pattern: '($REQ: javax.servlet.ServletRequest)

      '
  - pattern: "($REQ: javax.servlet.http.HttpServletRequest)                  \n"
  pattern-sinks:
  - pattern: java.io.File(...)
  - pattern: java.io.FileInputStream(...)
  - pattern: java.io.FileReader(...)
  - patterns:
    - pattern-either:
      - pattern: java.io.FileOutputStream($TAINT, ...)
      - pattern: java.io.FileWriter($TAINT, ...)
      - pattern: java.io.RandomAccessFile($TAINT, ...)
    - focus-metavariable: $TAINT
  - pattern: kotlin.io.path.Path(...)
