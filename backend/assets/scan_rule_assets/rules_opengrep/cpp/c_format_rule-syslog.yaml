rules:
- id: c_format_rule-syslog
  languages:
  - cpp
  message: |
    检测到格式化字符串风险（规则：c_format_rule-syslog）。危害：用户可控格式串可能泄露内存、破坏内存或导致进程崩溃。建议：使用固定格式字符串，把用户输入作为普通参数传入。
    保留的关键标识：https://capec.mitre.org/data/definitions/67.html、`syslog`。
  metadata:
    shortDescription: Potential format string vulnerability in syslog call
    cwe: CWE-134
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: High
    category: security
  pattern-either:
  - patterns:
    - pattern: syslog($FUNC,...)
    - pattern-not: syslog($FUNC,"...",...)
  severity: ERROR
