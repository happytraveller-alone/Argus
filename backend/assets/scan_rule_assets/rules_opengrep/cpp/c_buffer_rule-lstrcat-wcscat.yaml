rules:
- id: c_buffer_rule-lstrcat-wcscat
  languages:
  - cpp
  message: |
    检测到缓冲区溢出/越界访问风险（规则：c_buffer_rule-lstrcat-wcscat）。危害：写入长度不受控或长度参数错误可能破坏内存，导致崩溃、数据破坏或代码执行。建议：使用带长度限制的安全
    API，并以目标缓冲区大小作为边界。
    保留的关键标识：https://learn.microsoft.com/en-us/cpp/c-runtime-library/reference/strcat-s-wcscat-s-mbscat-s?view=msvc-170、`strcat`、`snprintf`。
  metadata:
    shortDescription: Insecure functions unable to limit / check buffer sizes
    cwe: CWE-120
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: High
    category: security
  patterns:
  - pattern-either:
    - pattern: lstrcat(...)
    - pattern: wcscat(...)
    - pattern: _tcscat(...)
    - pattern: _mbscat(...)
  - pattern-not-inside: |
      $LEN = wcslen($SRC);
      ...
      $SIZE = $BASE_LEN + $LEN + 2;
      ...
      $NEW = av_realloc_array($BASE, $SIZE, sizeof *$BASE);
      ...
      $BASE = $NEW;
      ...
      wcscat($BASE, $SRC);
  severity: ERROR
