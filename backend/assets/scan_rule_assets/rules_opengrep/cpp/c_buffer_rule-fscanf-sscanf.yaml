rules:
- id: c_buffer_rule-fscanf-sscanf
  languages:
  - cpp
  message: |
    Format specifiers can take optional field widths, which should be
    used to limit how many characters are copied into the target buffer.

    Example:
    ```
      const char str[20] = "AAAAAAAAAAAAAAAAAAA";
      char buf[11] = {0};
      sscanf(str, "%10s", &buf); // buf = AAAAAAAAAA\0
    ```
  metadata:
    shortDescription: sscanf() functions may allow format string based overflows
    cwe: CWE-120
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: High
    category: security
  pattern-either:
  - patterns:
    - pattern: fscanf($STREAM, $FMT, ...)
    - metavariable-regex:
        metavariable: $FMT
        regex: 'L?"(?:[^"\\]|\\.)*%(\[[^\]]+\]|s)'
  - patterns:
    - pattern: sscanf($INPUT, $FMT, ...)
    - metavariable-regex:
        metavariable: $FMT
        regex: 'L?"(?:[^"\\]|\\.)*%(\[[^\]]+\]|s)'
  - patterns:
    - pattern: vsscanf($INPUT, $FMT, ...)
    - metavariable-regex:
        metavariable: $FMT
        regex: 'L?"(?:[^"\\]|\\.)*%(\[[^\]]+\]|s)'
  - patterns:
    - pattern: vfscanf($STREAM, $FMT, ...)
    - metavariable-regex:
        metavariable: $FMT
        regex: 'L?"(?:[^"\\]|\\.)*%(\[[^\]]+\]|s)'
  - patterns:
    - pattern: _ftscanf($STREAM, $FMT, ...)
    - metavariable-regex:
        metavariable: $FMT
        regex: 'L?"(?:[^"\\]|\\.)*%(\[[^\]]+\]|s)'
  - patterns:
    - pattern: fwscanf($STREAM, $FMT, ...)
    - metavariable-regex:
        metavariable: $FMT
        regex: 'L?"(?:[^"\\]|\\.)*%(\[[^\]]+\]|s)'
  - patterns:
    - pattern: vfwscanf($STREAM, $FMT, ...)
    - metavariable-regex:
        metavariable: $FMT
        regex: 'L?"(?:[^"\\]|\\.)*%(\[[^\]]+\]|s)'
  - patterns:
    - pattern: vswscanf($INPUT, $FMT, ...)
    - metavariable-regex:
        metavariable: $FMT
        regex: 'L?"(?:[^"\\]|\\.)*%(\[[^\]]+\]|s)'
  severity: ERROR
