rules:
- id: vuln-librecad-8604f171
  pattern: |
    if (9 != $CODE) {
        DRW_DBG("\nnot a variable in header, code: ");
        DRW_DBG($CODE);
        DRW_DBG("\n");
        return false;
    }
  pattern-not: |
    if (NULL == $CURR && 9 != $CODE) {
        DRW_DBG("invalid header code: ");
        DRW_DBG($CODE);
        DRW_DBG("\n");
        return;
    }
  languages:
  - cpp
  message: |
    Detected a missing NULL check before validating header code. This can lead to undefined behavior if the pointer is invalid. The fix ensures that the pointer is checked for NULL before validating the code, preventing potential crashes or security issues.
  severity: ERROR
  metadata:
    source-url: github.com/LibreCAD/LibreCAD/commit/8604f171ee380f294102da6154adf77ab754d403
    category: security
    cwe:
    - CWE-476
    owasp:
    - A9:2021-Security Logging and Monitoring Failures
    technology:
    - cpp
