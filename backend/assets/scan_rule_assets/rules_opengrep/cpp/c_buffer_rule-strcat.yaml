rules:
- id: c_buffer_rule-strcat
  languages:
  - cpp
  message: |
    检测到缓冲区溢出/越界访问风险（规则：c_buffer_rule-strcat）。危害：写入长度不受控或长度参数错误可能破坏内存，导致崩溃、数据破坏或代码执行。建议：使用带长度限制的安全
    API，并以目标缓冲区大小作为边界。
    保留的关键标识：https://linux.die.net/man/3/snprintf、https://learn.microsoft.com/en-us/cpp/c-runtime-library/reference/strcat-s-wcscat-s-mbscat-s?view=msvc-170、`strcat`、`snprintf`。
  metadata:
    shortDescription: Insecure string processing function
    cwe: CWE-120
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: High
    category: security
  pattern: strcat(...)
  severity: ERROR
