rules:
- id: c_crypto_rule-crypt-crypt-r
  languages:
  - cpp
  message: |
    检测到弱加密/加密参数错误风险（规则：c_crypto_rule-crypt-crypt-r）。危害：过时算法、重复
    nonce/IV、弱密钥长度或缺少认证校验会削弱机密性和完整性，可能导致明文恢复或数据篡改。建议：使用现代算法和正确参数，例如 AES-GCM/ChaCha20-Poly1305，保证
    nonce/IV 唯一，使用足够密钥长度并完成认证校验。 保留的关键标识：https://libsodium.gitbook.io/doc/password_hashing。
  metadata:
    shortDescription: Insecure hashing algorithm
    cwe: CWE-327
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    security-severity: Medium
    category: security
  pattern-either:
  - pattern: crypt(...)
  - pattern: crypt_r(...)
  severity: ERROR
