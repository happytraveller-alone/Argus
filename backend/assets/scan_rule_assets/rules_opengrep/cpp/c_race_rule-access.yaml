rules:
- id: c_race_rule-access
  languages:
  - cpp
  message: |
    检测到竞态条件/TOCTOU 风险（规则：c_race_rule-access）。危害：access() 检查与后续文件操作之间的时间窗口可能被攻击者利用，导致权限绕过或操作错误目标。建议：1）创建文件时使用 open(path, O_CREAT|O_EXCL, mode) 原子操作；2）需要检查属性时先 open() 再 fstat() 同一文件描述符；3）替换/重命名时使用原子 rename() 流程；4）若 access() 结果仅用于用户提示而非安全决策，风险较低。
    保留的关键标识：https://wiki.sei.cmu.edu/confluence/display/c/FIO45-C.+Avoid+TOCTOU+race+conditions+while+accessing+files、`access`、`open`、`O_CREAT`、`O_EXCL`、`fstat`、`rename`。
  metadata:
    shortDescription: Potential time of check time of use vulnerability (access)
    cwe: CWE-362
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    security-severity: Medium
    category: security
  pattern: access(...)
  severity: ERROR
