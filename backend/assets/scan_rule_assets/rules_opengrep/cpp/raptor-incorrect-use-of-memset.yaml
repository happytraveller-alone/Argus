rules:
- id: raptor-incorrect-use-of-memset
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://lkml.org/lkml/2009/11/11/336
    - https://bugs.mysql.com/bug.php?id=23181
    confidence: HIGH
    cwe:
    - 'CWE-665: Improper Initialization'
    - 'CWE-457: Use of Uninitialized Variable'
    - 'CWE-787: Out-of-bounds Write'
    - 'CWE-200: Exposure of Sensitive Information to an Unauthorized Actor'
  message: |
    检测到内存清理调用错误风险（规则：raptor-incorrect-use-of-memset）。危害：参数顺序或长度错误可能导致清理无效，使敏感数据残留或逻辑失效。建议：确认 `memset`
    的填充值和长度参数顺序正确，必要时使用显式清零 API。 保留的关键标识：memset()。
  severity: ERROR
  languages:
  - cpp
  pattern-either:
  - pattern: memset($_, $_, 0);
  - pattern: memset($_, $_, '\0');
  - pattern: memset($_, sizeof(...), $_);
  - pattern: memset_explicit($_, $_, 0);
  - pattern: memset_explicit($_, $_, '\0');
  - pattern: memset_explicit($_, sizeof(...), $_);
