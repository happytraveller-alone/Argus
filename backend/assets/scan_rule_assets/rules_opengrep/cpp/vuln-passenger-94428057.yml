rules:
- id: vuln-passenger-94428057
  patterns:
  - pattern: |
      switch (getFileTypeNoFollowSymlinks($PATH)) {
        case FT_NONEXISTANT:
          ...
        case FT_DIRECTORY:
          verifyDirectoryPermissions($PATH);
          ...
        default:
          throw RuntimeException("'" + $PATH + "' already exists, and is not a directory");
      }
  - pattern-not: |
      struct stat $BUF;
      int $RET;
      do {
        $RET = lstat($PATH.c_str(), &$BUF);
      } while ($RET == -1 && errno == EAGAIN);
      if ($RET == 0) {
        if (S_ISDIR($BUF.st_mode)) {
          verifyDirectoryPermissions($PATH, $BUF);
        } else {
          throw RuntimeException("'" + $PATH + "' already exists, and is not a directory");
        }
      } else if (errno == ENOENT) {
        ...
      } else {
        int $E = errno;
        throw FileSystemException("Cannot lstat '" + $PATH + "'", $E, $PATH);
      }
  languages:
  - cpp
  message: |
    The code uses getFileTypeNoFollowSymlinks to check file types, which can lead to TOCTOU (Time-of-Check to Time-of-Use) vulnerabilities.
    This is dangerous because the file system state can change between the check and the use, potentially leading to security issues.
    The fix introduces a retry loop with lstat and directly checks the file type using S_ISDIR, avoiding the TOCTOU issue.
  severity: ERROR
  metadata:
    source-url: github.com/phusion/passenger/commit/94428057c602da3d6d34ef75c78091066ecac5c0
    category: security
    cwe:
    - CWE-367
    owasp:
    - A01:2021-Broken Access Control
    references:
    - https://cwe.mitre.org/data/definitions/367.html
    technology:
    - cpp
