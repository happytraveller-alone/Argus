rules:
- id: raptor-incorrect-use-of-strncpy-memcpy-etc
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/806
    - https://github.com/0xdea/advisories/blob/master/2020-07-solaris-whodo-w.txt
    - https://dustri.org/b/playing-with-weggli.html
    confidence: MEDIUM
    cwe:
    - 'CWE-806: Buffer Access Using Size of Source Buffer'
    - 'CWE-119: Improper Restriction of Operations within the Bounds of a Memory Buffer'
    - 'CWE-787: Out-of-bounds Write'
    - 'CWE-125: Out-of-bounds Read'
  message: The software uses the size of a source buffer when reading from or writing to a destination buffer, which may cause it to access memory that is outside of the bounds of the buffer.
  severity: ERROR
  languages:
  - cpp
  pattern-either:
  - patterns:
    - pattern: $FUN($_, $SRC, $LEN)
    - pattern-not: $FUN($_, "...", $LEN)
    - metavariable-pattern:
        metavariable: $FUN
        pattern-either:
        - pattern: strncpy
        - pattern: stpncpy
        - pattern: strlcpy
        - pattern: strscpy
        - pattern: memcpy
        - pattern: memmove
        - pattern: wmemcpy
        - pattern: wmemmove
    - pattern-either:
      - pattern-inside: |
          $_ $SRC[$LEN];
          ...
      - pattern-inside: |
          $_ $SRC[$LEN] = $_;
          ...
  - patterns:
    - pattern: $FUN($_, $SRC, <... $SRC ...>)
    - pattern-not: $FUN($_, "...", <... $SRC ...>)
    - metavariable-pattern:
        metavariable: $FUN
        pattern-either:
        - pattern: strncpy
        - pattern: stpncpy
        - pattern: strlcpy
        - pattern: strscpy
        - pattern: memcpy
        - pattern: memmove
        - pattern: wmemcpy
        - pattern: wmemmove
