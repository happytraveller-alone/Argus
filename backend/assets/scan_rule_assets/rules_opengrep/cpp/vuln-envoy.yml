rules:
- id: vuln-envoy-675f317d
  patterns:
  - pattern: |
      const Api::SysCallSizeResult $RESULT = Api::OsSysCallsSingleton::get().recvmsg($FD, &$HDR, 0);
  - pattern-not: |
      const Api::SysCallSizeResult $RESULT = Api::OsSysCallsSingleton::get().recvmsg($FD, &$HDR, $MSG_TRUNC);
  languages:
  - cpp
  message: |
    Detected use of recvmsg() without MSG_TRUNC flag, which can lead to undetected truncated UDP packets. Truncated packets should be explicitly checked and dropped to prevent processing of incomplete data. Use MSG_TRUNC flag to detect truncated packets and handle them appropriately.
  severity: ERROR
  metadata:
    source-url: github.com/envoyproxy/envoy/commit/675f317d5805a1b32b2dfcc8db1e41747bd143ef
    category: security
    cwe:
    - CWE-252
    owasp:
    - 'A1: Injection'
    references:
    - https://man7.org/linux/man-pages/man2/recvmsg.2.html
    technology:
    - cpp
- id: vuln-envoy-7ca28ff7
  patterns:
  - pattern: |
      const uint32_t total = $FIELD.size() + $VALUE.size() + $HEADERS.byteSize();
      if (total > ($MAX_HEADERS_KB * 1024)) {
        ...
        throw CodecProtocolException($ERROR_MESSAGE);
      }
  - pattern-not: |
      void checkMaxHeadersSize() {
        const uint32_t total = getHeadersSize();
        if (total > (max_headers_kb_ * 1024)) {
          ...
          throw CodecProtocolException(...);
        }
      }
  languages:
  - cpp
  message: |
    The code directly calculates and checks the header size without using the `checkMaxHeadersSize()` method, which could lead to inconsistent header size validation. This could potentially allow oversized headers to bypass size checks, leading to resource exhaustion or denial of service. Always use the centralized `checkMaxHeadersSize()` method to ensure consistent header size validation across the codebase.
  severity: ERROR
  metadata:
    source-url: github.com/envoyproxy/envoy/commit/7ca28ff7d46454ae930e193d97b7d08156b1ba59
    category: security
    cwe:
    - CWE-770
    owasp: A1:2017-Injection
    technology:
    - cpp
- id: vuln-envoy-9584bcd0
  patterns:
  - pattern: |
      if ($READ_BUFFER.length() > 0) {
        ...
      }
  - pattern-not: |
      if ($READ_BUFFER.length() > 0 || $TRANSPORT_WANTS_READ) {
        ...
      }
  languages:
  - cpp
  message: |
    Detected a missing check for `transport_wants_read_` in read buffer condition. This can lead to missed read resumptions when data is held in transport socket internal buffers, potentially causing connection stalls or incomplete data processing. Ensure to check both `read_buffer_.length() > 0` and `transport_wants_read_` to properly handle read resumptions.
  severity: ERROR
  metadata:
    source-url: github.com/envoyproxy/envoy/commit/9584bcd09865ba6ce01b69c0dfcfa591b3e998ec
    category: security
    cwe:
    - CWE-400
    owasp:
    - A9:2017-Insufficient Logging & Monitoring
    technology:
    - cpp
