rules:
- id: raptor-incorrect-use-of-strncat
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/787
    - https://cwe.mitre.org/data/definitions/193
    - https://g.co/kgs/PCHQjJ
    confidence: HIGH
    cwe:
    - 'CWE-119: Improper Restriction of Operations within the Bounds of a Memory Buffer'
    - 'CWE-787: Out-of-bounds Write'
    - 'CWE-193: Off-by-one Error'
  message: |
    检测到缓冲区溢出/越界访问风险（规则：raptor-incorrect-use-of-strncat）。危害：写入长度不受控或长度参数错误可能破坏内存，导致崩溃、数据破坏或代码执行。建议：使用带长度限制的安全
    API，并以目标缓冲区大小作为边界。 保留的关键标识：strncat()、strcat()。
  severity: ERROR
  languages:
  - cpp
  pattern-either:
  - patterns:
    - pattern: strncat($DST, $_, $LEN)
    - pattern-either:
      - pattern-inside: |
          $_ $DST[$LEN];
          ...
      - pattern-inside: |
          $_ $DST[$LEN] = $_;
          ...
  - pattern: strncat($DST, $_, sizeof($DST))
  - pattern: strncat($DST, $_, strlen($DST))
  - pattern: strncat($DST, $_, sizeof($DST) - strlen($DST))
