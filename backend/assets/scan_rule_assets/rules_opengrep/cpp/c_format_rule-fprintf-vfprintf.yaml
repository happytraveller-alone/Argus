rules:
- id: c_format_rule-fprintf-vfprintf
  languages:
  - cpp
  message: |
    检测到格式化字符串风险（规则：c_format_rule-fprintf-vfprintf）。危害：当格式串参数为非字面量变量且来源不可信时，可能泄露内存、破坏内存或导致进程崩溃。建议：1）格式串必须为编译期常量字面量；2）若需输出外部内容，使用 fprintf(f, "%s", user_input) 而非 fprintf(f, user_input)；3）测试/调试代码中的固定格式日志输出风险较低。
    保留的关键标识：https://linux.die.net/man/3/fprintf、https://owasp.org/www-community/attacks/Format_string_attack、`fprintf`、`vfprintf`。
  metadata:
    shortDescription: Potential format string vulnerability
    cwe: CWE-134
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: High
    category: security
  pattern-either:
  - patterns:
    - pattern: fprintf($FD, $FMT, ...)
    - pattern-not: fprintf($FD, "...", ...)
  - patterns:
    - pattern: vfprintf($FMT, $ARGS, ...)
    - pattern-not: vfprintf("...", $ARGS, ...)
  - patterns:
    - pattern: _ftprintf($FD, $FMT, ...)
    - pattern-not: _ftprintf($FD, "...", ...)
  - patterns:
    - pattern: fwprintf($FD, $FMT, ...)
    - pattern-not: fwprintf($FD, "...", ...)
  - patterns:
    - pattern: fvwprintf($FD, $FMT, ...)
    - pattern-not: fvwprintf($FD, "...", ...)
  severity: ERROR
