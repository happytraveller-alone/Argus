rules:
- id: go_http_rule-http-serve_1
  languages:
  - go
  patterns:
  - pattern-inside: 'import "net/http"

      ...

      '
  - pattern-either:
    - pattern: http.ListenAndServe(...)
    - pattern: http.ListenAndServeTLS(...)
    - pattern: http.Serve(...)
    - pattern: http.ServeTLS(...)
    - patterns:
      - pattern-not-inside: "&http.Server{\n  ...,\n  ReadHeaderTimeout: ...,\n  ...,\n\
          }\n"
      - pattern-not-inside: "&http.Server{\n  ...,\n  ReadTimeout: ...,\n  ...,\n\
          }\n"
      - pattern-not-inside: "$S = &http.Server{\n  ...,\n}\n$S.ReadHeaderTimeout =\
          \ ...\n...\n"
      - pattern-not-inside: "$S = &http.Server{\n  ...,\n}\n$S.ReadTimeout = ...\n\
          ...\n"
      - pattern: "&http.Server{\n  ...,\n}\n"
  message: "Go's `net/http` serve functions may be vulnerable to resource consumption\
    \ attacks if timeouts\nare not properly configured\nprior to starting the HTTP\
    \ server. An adversary may open up thousands of connections but never\ncomplete\
    \ sending all data,\nor never terminate the connections. This may lead to the\
    \ server no longer accepting new\nconnections.\n\nTo protect against this style\
    \ of resource consumption attack, timeouts should be set in the\n`net/http` server\
    \ prior to calling\nthe listen or serve functions. What this means is that the\
    \ default `http.ListenAndServe` and\n`http.Serve` functions should not\nbe used\
    \ in a production setting as they are unable to have timeouts configured. Instead\
    \ a\ncustom `http.Server` object must be\ncreated with the timeouts configured.\n\
    \nExample setting timeouts on a `net/http` server:\n```\n// All values chosen\
    \ below are dependent on application logic and\n// should be tailored per use-case\n\
    srv := &http.Server{\n  Addr: \"localhost:8000\",\n  // ReadHeaderTimeout is the\
    \ amount of time allowed to read\n  // request headers. The connection's read\
    \ deadline is reset\n  // after reading the headers and the Handler can decide\
    \ what\n  // is considered too slow for the body. If ReadHeaderTimeout\n  // is\
    \ zero, the value of ReadTimeout is used. If both are\n  // zero, there is no\
    \ timeout.\n  ReadHeaderTimeout: 15 * time.Second,\n\n  // ReadTimeout is the\
    \ maximum duration for reading the entire\n  // request, including the body. A\
    \ zero or negative value means\n  // there will be no timeout.\n  //\n  // Because\
    \ ReadTimeout does not let Handlers make per-request\n  // decisions on each request\
    \ body's acceptable deadline or\n  // upload rate, most users will prefer to use\n\
    \  // ReadHeaderTimeout. It is valid to use them both.\n  ReadTimeout: 15 * time.Second,\n\
    \n  // WriteTimeout is the maximum duration before timing out\n  // writes of\
    \ the response. It is reset whenever a new\n  // request's header is read. Like\
    \ ReadTimeout, it does not\n  // let Handlers make decisions on a per-request\
    \ basis.\n  // A zero or negative value means there will be no timeout.\n  WriteTimeout:\
    \ 10 * time.Second,\n\n  // IdleTimeout is the maximum amount of time to wait\
    \ for the\n  // next request when keep-alives are enabled. If IdleTimeout\n  //\
    \ is zero, the value of ReadTimeout is used. If both are\n  // zero, there is\
    \ no timeout.\n  IdleTimeout: 30 * time.Second,\n}\n\n// For per request timeouts\
    \ applications can wrap all `http.HandlerFunc(...)` in\n// `http.TimeoutHandler``\
    \ and specify a timeout, but note the TimeoutHandler does not\n// start ticking\
    \ until all headers have been read.\n\n// Listen with our custom server with timeouts\
    \ configured\nif err := srv.ListenAndServe(); err != nil {\n  log.Fatal(err)\n\
    }\n```\nFor more information on the `http.Server` timeouts, see: https://pkg.go.dev/net/http#Server\n\
    \nFor information on setting request based timeouts, see:\nhttps://pkg.go.dev/net/http#TimeoutHandler\n\
    \nFor more information on the Slowloris attack see:\nhttps://en.wikipedia.org/wiki/Slowloris_(computer_security)\n"
  metadata:
    shortDescription: Uncontrolled resource consumption (Slowloris)
    cwe: CWE-400
    owasp:
    - A6:2017-Security Misconfiguration
    - A05:2021-Security Misconfiguration
    security-severity: Medium
    category: security
  severity: WARNING
