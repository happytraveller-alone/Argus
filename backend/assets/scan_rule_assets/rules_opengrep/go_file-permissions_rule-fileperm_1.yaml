rules:
- id: go_file-permissions_rule-fileperm_1
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: os.Chmod(...,$MASK)
    - pattern: os.OpenFile(...,$MASK)
    - pattern: os.WriteFile(...,$MASK)
  - metavariable-comparison:
      metavariable: $MASK
      comparison: $MASK > 0o640
      base: 8
  message: "The application was found setting file permissions to overly permissive\
    \ values. Consider\nusing the following values if the application user is the\
    \ only process to access\nthe file:\n\n- 0400 - read only access to the file\n\
    - 0200 - write only access to the file\n- 0600 - read/write access to the file\n\
    \nExample creating a file with read/write permissions for the application user:\n\
    ```\nf, err := os.OpenFile(\"file.txt\", os.O_CREATE, 0600)\nif err != nil {\n\
    \  log.Fatal(err)\n}\ndefer f.Close()\n// continue to work with file here\n```\n\
    \nFor all other values please see:\nhttps://en.wikipedia.org/wiki/File-system_permissions#Numeric_notation\n"
  metadata:
    shortDescription: Incorrect permission assignment for critical resource
    cwe: CWE-732
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    security-severity: Medium
    category: security
  severity: WARNING
