rules:
- id: is-not-is-not
  patterns:
  - pattern: $S is (not ...)
  message: In python 'X is not ...' is different from 'X is (not ...)'. In the latter
    the 'not' converts the '...' directly to boolean.
  languages:
  - python
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-480: Use of Incorrect Operator'
    - 'CWE-710: Improper Adherence to Coding Standards'
