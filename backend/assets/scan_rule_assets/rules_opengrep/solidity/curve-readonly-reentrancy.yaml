rules:
- id: curve-readonly-reentrancy
  message: $POOL.get_virtual_price() call on a Curve pool is not protected from the
    read-only reentrancy.
  metadata:
    category: security
    technology:
    - solidity
    cwe: 'CWE-841: Improper Enforcement of Behavioral Workflow'
    confidence: HIGH
    likelihood: MEDIUM
    impact: HIGH
    subcategory:
    - vuln
    references:
    - https://chainsecurity.com/heartbreaks-curve-lp-oracles/
    - https://chainsecurity.com/curve-lp-oracle-manipulation-post-mortem/
  patterns:
  - pattern: '$POOL.get_virtual_price()

      '
  - pattern-not-inside: "function $F(...) {\n  ...\n  $VAR.withdraw_admin_fees(...);\n\
      \  ...\n}\n"
  - pattern-not-inside: "function $F(...) {\n  ...\n  $VAR.withdraw_admin_fees(...);\n\
      \  ...\n}\n"
  - pattern-not-inside: "contract $C {\n  ...\n  function $CHECKFUNC(...) {\n    ...\n\
      \    $VAR.withdraw_admin_fees(...);\n    ...\n  }\n  ...\n  function $F(...)\
      \ {\n    ...\n    $CHECKFUNC(...);\n    ...\n    $POOL.get_virtual_price();\n\
      \    ...\n  }\n  ...\n}\n"
  - pattern-not-inside: "contract $C {\n  ...\n  function $CHECKFUNC(...) {\n    ...\n\
      \    $VAR.withdraw_admin_fees(...);\n    ...\n  }\n  ...\n  function $F(...)\
      \ {\n    ...\n    $POOL.get_virtual_price();\n    ...\n    $CHECKFUNC(...);\n\
      \    ...\n  }\n  ...\n}\n"
  languages:
  - solidity
  severity: ERROR
