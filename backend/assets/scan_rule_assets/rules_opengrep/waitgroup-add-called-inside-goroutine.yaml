rules:
- id: waitgroup-add-called-inside-goroutine
  message: 'Calling `$WG.Add` inside of an anonymous goroutine may result in `$WG.Wait`

    waiting for more or less calls to `$WG.Done()` than expected

    '
  languages:
  - go
  severity: ERROR
  metadata:
    category: security
    cwe: 'CWE-667: Improper Locking'
    subcategory:
    - vuln
    confidence: MEDIUM
    likelihood: MEDIUM
    impact: MEDIUM
    technology:
    - --no-technology--
    description: Calls to `sync.WaitGroup.Add` inside of anonymous goroutines
    references:
    - https://go101.org/article/concurrent-common-mistakes.html
  patterns:
  - pattern-either:
    - pattern: "$WG := &sync.WaitGroup{}\n...\ngo func(...) {\n  ...\n  $WG.Add(...)\n\
        \  ...\n}(...)\n...\n$WG.Wait()\n"
    - pattern: "var $WG sync.WaitGroup\n...\ngo func(...) {\n  ...\n  $WG.Add(...)\n\
        \  ...\n}(...)\n...\n$WG.Wait()\n"
  - pattern-not-inside: "for ... {\n  ...\n  $WG.Add(...)\n  ...\n}\n"
