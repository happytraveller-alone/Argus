rules:
- id: scala_xml_rule-ApacheXmlRpc_1
  languages:
  - scala
  message: 'Enabling extensions in Apache XML RPC server or client can lead to deserialization

    vulnerability which would allow an attacker to execute arbitrary code.

    '
  metadata:
    category: security
    cwe: CWE-502
    shortDescription: Deserialization of Untrusted Data
    security-severity: Info
  patterns:
  - pattern-either:
    - patterns:
      - pattern-inside: 'val $VAR = new XmlRpcServerConfigImpl();

          ...

          '
      - pattern: $VAR.setEnabledForExtensions(true);
    - patterns:
      - pattern-inside: 'val $VAR = new org.apache.xmlrpc.client.XmlRpcClientConfigImpl();

          ...

          '
      - pattern: $VAR.setEnabledForExtensions(true);
  severity: WARNING
