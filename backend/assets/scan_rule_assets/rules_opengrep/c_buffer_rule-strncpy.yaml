rules:
- id: c_buffer_rule-strncpy
  languages:
  - c
  - cpp
  message: 'The `strncpy` family of functions do not properly handle strings that
    are not null terminated.

    It is recommended to use more secure alternatives such as `snprintf`.


    For more information please see: https://linux.die.net/man/3/snprintf


    If developing for C Runtime Library (CRT), more secure versions of these functions
    should be

    used, see:

    https://learn.microsoft.com/en-us/cpp/c-runtime-library/reference/strncpy-s-strncpy-s-l-wcsncpy-s-wcsncpy-s-l-mbsncpy-s-mbsncpy-s-l?view=msvc-170

    '
  metadata:
    shortDescription: Function does not handle null terminated strings or invalid
      pointers properly
    cwe: CWE-120
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: High
    category: security
  pattern: strncpy(...)
  severity: INFO
