rules:
- id: vuln-matrix-js-sdk-5f3e1155
  pattern: |
    const $PARENT_EVENT_ID = $EVENT.getAssociatedId()!;
    const $PARENT_EVENT = $THIS.findEventById($PARENT_EVENT_ID) ?? $EVENTS?.find(($E) => $E.getId() === $PARENT_EVENT_ID);
  pattern-not: |
    const $PARENT_EVENT_ID = $EVENT.getAssociatedId();
    let $PARENT_EVENT: $TYPE | undefined;
    if ($PARENT_EVENT_ID) {
        $PARENT_EVENT = $THIS.findEventById($PARENT_EVENT_ID) ?? $EVENTS?.find(($E) => $E.getId() === $PARENT_EVENT_ID);
    }
  languages:
  - typescript
  message: |
    Potential null reference vulnerability detected. The code assumes `getAssociatedId()` always returns a non-null value by using the non-null assertion operator (!), which can lead to runtime errors if the value is actually null. Always check for null values before using them in potentially unsafe operations.
    To fix this, remove the non-null assertion operator and add a null check before using the variable.
  severity: ERROR
  metadata:
    source-url: github.com/matrix-org/matrix-js-sdk/commit/5f3e115545e17c23f4bfdd813fac334cedea7a3d
    category: security
    cwe:
    - CWE-476
    owasp:
    - A1:2017-Injection
    references:
    - https://cwe.mitre.org/data/definitions/476.html
    - https://owasp.org/www-project-top-ten/2017/A1_2017-Injection.html
    technology:
    - typescript
- id: vuln-matrix-js-sdk-b01f3541
  pattern: |
    if ($CONTENT["m.terminated"]) {
      ...
    }
  pattern-not: |
    if ($CONTENT["m.terminated"] || $CALL_EVENT.isRedacted()) {
      ...
    }
  languages:
  - typescript
  message: |
    The code fails to check if a call event is redacted, which can lead to incorrect handling of terminated calls. This vulnerability could allow redacted calls to be processed as if they were valid, potentially leading to security issues. To fix this, ensure that the `isRedacted()` method is called alongside checking for terminated content.
  severity: ERROR
  metadata:
    source-url: github.com/matrix-org/matrix-js-sdk/commit/b01f3541ea92ad06938babe7a677ceffb04f22c1
    category: security
    cwe:
    - CWE-285
    owasp:
    - A01:2021-Broken Access Control
    references:
    - https://owasp.org/www-project-top-ten/
    technology:
    - typescript
