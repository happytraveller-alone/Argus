rules:
- id: vuln-premid-16bd93f5
  patterns:
  - pattern: |
      {
        cors: { origin: "*" }
      }
  - pattern-not: |
      {
        allowRequest: (req, callback) => {
          const noOriginHeader = req.headers.origin === undefined;
          callback(null, noOriginHeader);
        }
      }
  languages:
  - typescript
  message: |
    Detected a vulnerable CORS configuration that allows all origins (`origin: "*"`).
    This is dangerous as it exposes the application to Cross-Origin Resource Sharing (CORS) attacks,
    potentially allowing malicious websites to access sensitive data.
    To fix this, implement a custom `allowRequest` function that validates the origin header.
  severity: ERROR
  metadata:
    source-url: github.com/PreMiD/PreMiD/commit/16bd93f56605dc0db9843d22ebcaa8f9f580420d
    category: security
    cwe:
    - CWE-942
    owasp:
    - A5:2017-Broken Access Control
    references:
    - https://owasp.org/www-project-top-ten/2017/A5_2017-Broken_Access_Control
    - https://portswigger.net/web-security/cors
    technology:
    - typescript
