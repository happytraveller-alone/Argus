rules:
- id: vuln-quilt-3284be1e
  patterns:
  - pattern: |
      const {shop} = $QUERY;
      ...
      if (shop == null) {
        $CTX.throw(400, $ERROR);
        return;
      }
  - pattern-not: |
      const {shop} = $QUERY;
      const shopRegex = new RegExp($REGEX);
      ...
      if (shop == null || !shopRegex.test(shop)) {
        $CTX.throw(400, $ERROR);
        return;
      }
  languages:
  - typescript
  message: |
    Missing validation of the 'shop' query parameter. Without proper validation,
    an attacker could provide a malicious shop domain, potentially leading to
    security vulnerabilities such as phishing or unauthorized access. Always
    validate the shop parameter using a regex pattern to ensure it matches the
    expected format.
  severity: ERROR
  metadata:
    source-url: github.com/Shopify/quilt/commit/3284be1e6cfe9165a2b23339d7f1bf8367ee9df7
    category: security
    cwe:
    - CWE-20
    owasp:
    - 'A1: Injection'
    technology:
    - typescript
