rules:
- id: vuln-directus-454cb534
  patterns:
  - pattern: |
      if ($USER?.status !== 'active') {
        ...
        if ($USER?.status === 'suspended') {
          ...
        } else {
          ...
        }
      } else if ($USER.provider !== $PROVIDER) {
        ...
      }
  - pattern-not: |
      if ($USER?.status !== 'active' || $USER?.provider !== $PROVIDER) {
        ...
      }
  languages:
  - typescript
  message: |
    Detected an authentication bypass vulnerability where provider validation is performed after status validation, allowing potential bypass of provider checks. This can lead to unauthorized access if a user's status is 'active' but their provider is invalid. Combine both status and provider checks in a single condition to prevent this vulnerability.
  severity: ERROR
  metadata:
    source-url: github.com/directus/directus/commit/454cb534d6ffa547feb11f4d74b932ae7368dae2
    category: security
    cwe:
    - CWE-287
    owasp:
    - A01:2021-Broken Access Control
    references:
    - https://owasp.org/www-project-top-ten/
    technology:
    - typescript
- id: vuln-directus-826404bc
  patterns:
  - pattern: |
      $CONFIG = {
        ...,
        CORS_ENABLED: true,
        CORS_ORIGIN: true,
        ...
      }
  - pattern-not: |
      $CONFIG = {
        ...,
        CORS_ENABLED: false,
        CORS_ORIGIN: false,
        ...
      }
  languages:
  - typescript
  message: |
    Detected insecure CORS configuration where both CORS_ENABLED and CORS_ORIGIN are set to true. This can allow any domain to make cross-origin requests, potentially exposing sensitive data or allowing unauthorized actions. To fix this, set CORS_ENABLED and CORS_ORIGIN to false or restrict CORS_ORIGIN to specific trusted domains.
  severity: ERROR
  metadata:
    source-url: github.com/directus/directus/commit/826404bcbe769f9bcd526baec41e696237b78ebb
    category: security
    cwe:
    - CWE-942
    owasp:
    - A5:2021-Security Misconfiguration
    references:
    - https://owasp.org/www-project-top-ten/2021/A5_2021-Security_Misconfiguration.html
    technology:
    - typescript
