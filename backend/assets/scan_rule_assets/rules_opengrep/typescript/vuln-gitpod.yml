rules:
- id: vuln-gitpod-12956988
  pattern: |
    const verifyCSRF = ($ORIGIN) => {
      let $ALLOWED = isAllowedWebsocketDomain($ORIGIN, $HOSTNAME);
      ...
    }
  pattern-not: |
    const verifyOrigin = ($ORIGIN, $STRICT) => {
      let $ALLOWED = isAllowedWebsocketDomain($ORIGIN, $HOSTNAME, $STRICT);
      ...
    }
  languages:
  - typescript
  message: |
    Detected a vulnerable CSRF protection implementation in websocket origin verification.
    The old version of `isAllowedWebsocketDomain` did not enforce strict origin checks,
    potentially allowing CSRF attacks from unauthorized domains.
    The fix introduces a `strict` parameter to enforce stricter origin validation.
    Update the CSRF verification to use the strict mode for cookie/session authentication.
  severity: ERROR
  metadata:
    source-url: github.com/gitpod-io/gitpod/commit/12956988eec0031f42ffdfa3bdc3359f65628f9f
    category: security
    cwe:
    - CWE-352
    owasp:
    - 'A2: Broken Authentication'
    - 'A5: Broken Access Control'
    references:
    - https://owasp.org/www-community/attacks/csrf
    - https://cwe.mitre.org/data/definitions/352.html
    technology:
    - typescript
    - websocket
- id: vuln-gitpod-6771283c
  pattern: |
    redirect = $PROTOCOL !== "http:" && $PROTOCOL !== "https:"
  pattern-not: |
    redirect = $TRUSTED_PROTOCOLS.includes($PROTOCOL)
  languages:
  - typescript
  message: |
    The code allows redirects based on a negative check for HTTP and HTTPS protocols, which can lead to unsafe redirects to untrusted protocols. This can be exploited to redirect users to malicious sites or applications. To fix this, use a whitelist of trusted protocols and check if the protocol is included in that list.
  severity: ERROR
  metadata:
    source-url: github.com/gitpod-io/gitpod/commit/6771283c3406586e352337675b79ff2ca50f191b
    category: security
    cwe: 'CWE-601: URL Redirection to Untrusted Site'
    owasp: 'A1: Injection'
    references:
    - https://owasp.org/www-community/attacks/Unvalidated_Redirects_and_Forwards
    technology:
    - typescript
