rules:
- id: index-by-threadid
  patterns:
  - pattern-inside: "@threads ... for $X = ...\n  ...\nend\n"
  - pattern-not-inside: "@threads :static for $X = ...\n  ...\nend\n"
  - pattern-either:
    - pattern: $S[Threads.threadid()]
    - pattern: $S[threadid()]
    - pattern: '$TID = Threads.threadid()

        ...

        $Y = $S[$TID]

        '
    - pattern: '$TID = threadid()

        ...

        $Y = $S[$TID]

        '
  message: Indexing by `threadid()` may cause race conditions and should be avoided.
  metadata:
    confidence: LOW
    references:
    - https://www.julialang.org/blog/2023/07/PSA-dont-use-threadid/
    license: LGPL
    cwe:
    - 'CWE-362: Concurrent Execution using Shared Resources'
  languages:
  - julia
  severity: WARNING
