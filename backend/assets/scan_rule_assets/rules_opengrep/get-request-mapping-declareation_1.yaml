rules:
- id: get-request-mapping-declareation_1
  languages:
  - java
  severity: INFO
  pattern-either:
  - pattern: "public $TYPE $FUNCTIONNAME(...){\n  StringBuilder $VARIABLE = new StringBuilder($XYZ);\n\
      \  ...\n  $ABC.append($SOMETHING);\n  ...\n  $SOMETHINGELSE = new FlexibleSearchQuery($ABCD);\n\
      }\n"
  message: 'Function: $FUNCTIONNAME, name: $VARIABLE

    '
  metadata:
    cwe:
    - 'CWE-89: Improper Neutralization of Special Elements used in an SQL Command'
    - 'CWE-74: Improper Neutralization of Special Elements in Output Used by a Downstream Component'
    - 'CWE-20: Improper Input Validation'
