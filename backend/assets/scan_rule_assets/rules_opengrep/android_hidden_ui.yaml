rules:
- id: android_hidden_ui
  patterns:
  - metavariable-regex:
      metavariable: $X
      regex: (?i).*(password|passwd|pwd|token|secret|credential|credit|card|ssn|pin|key|auth).*
  - pattern-either:
    - pattern: '$X.setVisibility(View.GONE);

        '
    - pattern: '$V = View.GONE;

        ...

        $X.setVisibility($V);

        '
    - pattern: '$X.setVisibility(View.INVISIBLE);

        '
    - pattern: '$V = View.INVISIBLE;

        ...

        $X.setVisibility($V);

        '
  message: Hidden sensitive elements in a view can still be accessible through memory
    inspection. Clear sensitive data before hiding it.
  languages:
  - java
  severity: ERROR
  metadata:
    cwe: cwe-919
    owasp-mobile: m1
    masvs: storage-7
    reference: https://github.com/MobSF/owasp-mstg/blob/master/Document/0x05d-Testing-Data-Storage.md#checking-for-sensitive-data-disclosure-through-the-user-interface-mstg-storage-7
