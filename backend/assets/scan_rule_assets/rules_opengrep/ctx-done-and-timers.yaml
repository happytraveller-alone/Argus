rules:
- id: ctx-done-and-timers
  patterns:
  - pattern-either:
    - pattern: "select {\ncase <-ctx.Done():\n    $BODY\ncase <-time.After(...):\n\
        \    $BODY\n}\n"
    - pattern: "$T := time.NewTicker(...)\n...\nselect {\ncase <-ctx.Done():\n   \
        \ $BODY\ncase <-$T.C:\n    $BODY\n}\n"
  message: ctx.Done() and time.After/time.NewTicker
  languages:
  - go
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-703: Improper Check or Handling of Exceptional Conditions'
    - 'CWE-400: Uncontrolled Resource Consumption'
    - 'CWE-401: Memory Leak'
