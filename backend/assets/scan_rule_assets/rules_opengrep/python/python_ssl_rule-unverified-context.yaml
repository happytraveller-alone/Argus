rules:
- id: python_ssl_rule-unverified-context
  languages:
  - python
  message: |
    检测到TLS/证书或主机校验配置不当风险（规则：python_ssl_rule-unverified-context）。危害：跳过证书、主机密钥校验或使用弱 TLS
    配置会使连接暴露于中间人攻击，导致数据被窃听或篡改。建议：启用证书链、主机名或主机密钥校验，禁用过时协议和弱加密套件。
    保留的关键标识：ssl.create_default_context()、`_create_unverified_context`、`ssl.create_default_context`、`verifyingSSL`、`ssl.create_default_context()`。
  metadata:
    cwe: CWE-295
    owasp:
    - A2:2017-Broken Authentication
    - A07:2021-Identification and Authentication Failures
    category: security
    shortDescription: Improper certificate validation
    security-severity: Medium
  pattern: ssl._create_unverified_context(...)
  severity: ERROR
