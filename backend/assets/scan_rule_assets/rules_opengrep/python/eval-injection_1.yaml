rules:
- id: eval-injection_1
  languages:
  - python
  message: Detected user data flowing into eval. This is code injection and should
    be avoided.
  metadata:
    category: security
    confidence: MEDIUM
    cwe:
    - 'CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code
      (''Eval Injection'')'
    impact: MEDIUM
    likelihood: MEDIUM
    owasp:
    - A03:2021 - Injection
    references:
    - https://nedbatchelder.com/blog/201206/eval_really_is_dangerous.html
    subcategory:
    - vuln
    technology:
    - flask
  pattern-either:
  - patterns:
    - pattern: eval(...)
    - pattern-either:
      - pattern-inside: "@$APP.route($ROUTE, ...)\ndef $FUNC(..., $ROUTEVAR, ...):\n\
          \  ...\n  eval(..., <... $ROUTEVAR ...>, ...)\n"
      - pattern-inside: "@$APP.route($ROUTE, ...)\ndef $FUNC(..., $ROUTEVAR, ...):\n\
          \  ...\n  $INTERM = <... $ROUTEVAR ...>\n  ...\n  eval(..., <... $INTERM\
          \ ...>, ...)\n"
  - pattern: eval(..., <... flask.request.$W.get(...) ...>, ...)
  - pattern: eval(..., <... flask.request.$W[...] ...>, ...)
  - pattern: eval(..., <... flask.request.$W(...) ...>, ...)
  - pattern: eval(..., <... flask.request.$W ...>, ...)
  - patterns:
    - pattern-inside: '$INTERM = <... flask.request.$W.get(...) ...>

        ...

        eval(..., <... $INTERM ...>, ...)

        '
    - pattern: eval(...)
  - patterns:
    - pattern-inside: '$INTERM = <... flask.request.$W[...] ...>

        ...

        eval(..., <... $INTERM ...>, ...)

        '
    - pattern: eval(...)
  - patterns:
    - pattern-inside: '$INTERM = <... flask.request.$W(...) ...>

        ...

        eval(..., <... $INTERM ...>, ...)

        '
    - pattern: eval(...)
  - patterns:
    - pattern-inside: '$INTERM = <... flask.request.$W ...>

        ...

        eval(..., <... $INTERM ...>, ...)

        '
    - pattern: eval(...)
  severity: ERROR
