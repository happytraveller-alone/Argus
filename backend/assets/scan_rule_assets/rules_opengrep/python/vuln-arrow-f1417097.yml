rules:
- id: vuln-arrow-f1417097
  patterns:
  - pattern: |
      class $CLASS(pa.PyExtensionType):
          def __init__(self, $STORAGE_TYPE):
              pa.PyExtensionType.__init__(self, $STORAGE_TYPE)
          def __reduce__(self):
              return $CLASS, ($ARGS)
  - pattern-not: |
      class $CLASS(pa.ExtensionType):
          def __init__(self, $STORAGE_TYPE, $EXT_NAME):
              super().__init__($STORAGE_TYPE, $EXT_NAME)
          def __arrow_ext_serialize__(self):
              ...
          @classmethod
          def __arrow_ext_deserialize__(cls, $STORAGE_TYPE, $SERIALIZED):
              ...
  languages:
  - python
  message: |
    Detected insecure use of PyExtensionType which is deprecated and can lead to unsafe deserialization.
    Migrate to using ExtensionType with proper serialization methods (__arrow_ext_serialize__ and __arrow_ext_deserialize__).
  severity: ERROR
  metadata:
    source-url: github.com/apache/arrow/commit/f14170976372436ec1d03a724d8d3f3925484ecf
    category: security
    cwe: CWE-502
    owasp: A8:2017-Insecure Deserialization
    technology: python
