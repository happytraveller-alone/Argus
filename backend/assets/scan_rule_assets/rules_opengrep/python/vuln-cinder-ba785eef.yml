rules:
- id: vuln-cinder-ba785eef
  patterns:
  - pattern: |
      {
          'serverPassword': $PASSWORD,
          'serverToken': $TOKEN,
          ...
      }
  - pattern-not: |
      {
          'config_group': $CONFIG_GROUP,
          ...
      }
  languages:
  - python
  message: Detected insecure storage of server credentials in a dictionary. This can lead to exposure of sensitive information. Use a secure configuration group instead.
  severity: ERROR
  metadata:
    source-url: github.com/openstack/cinder/commit/ba785eef5f515b869c0d68016e84bb74f76ab45e
    category: security
    cwe: CWE-312
    owasp: A3:2017-Sensitive Data Exposure
    technology:
    - python
