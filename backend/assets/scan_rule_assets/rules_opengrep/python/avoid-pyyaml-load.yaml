rules:
- id: avoid-pyyaml-load
  metadata:
    owasp: 'A8: Insecure Deserialization'
    cwe: 'CWE-502: Deserialization of Untrusted Data'
    references:
    - https://github.com/yaml/pyyaml/wiki/PyYAML-yaml.load(input)-Deprecation
    - https://nvd.nist.gov/vuln/detail/CVE-2017-18342
  languages:
  - python
  message: |
    检测到不安全反序列化风险（规则：avoid-pyyaml-load）。危害：恶意序列化数据可能触发对象构造、代码执行或业务状态篡改。建议：只反序列化可信数据，使用安全加载函数或限制可反序列化类型。
    保留的关键标识：load()、safe_load()、`load()`、`PyYAML.load`、`safe_load()`。
  fix: yaml.safe_load($FOO)
  severity: ERROR
  patterns:
  - pattern-not-inside: |
      yaml = $X
      ...
  - pattern: yaml.load($FOO)
