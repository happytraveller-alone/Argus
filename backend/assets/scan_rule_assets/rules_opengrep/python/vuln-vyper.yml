rules:
- id: vuln-vyper-02339dfd
  patterns:
  - pattern: |
      ["if", ["eq", "_calldata_method_id", $METHOD_ID], $RET]
  - pattern-not: |
      ["if", ["and", ["gt", "calldatasize", 0], ["eq", "_calldata_method_id", $METHOD_ID]], $RET]
  languages:
  - python
  message: Detected a vulnerability where a method ID check does not validate calldatasize. This can lead to incorrect function execution when calldata is empty. Ensure that calldatasize is checked when the method ID is 0.
  severity: ERROR
  metadata:
    source-url: github.com/vyperlang/vyper/commit/02339dfda0f3caabad142060d511d10bfe93c520
    category: security
    cwe: 'CWE-284: Improper Access Control'
    owasp: A02:2021-Cryptographic Failures
    technology:
    - python
- id: vuln-vyper-10564dcc
  patterns:
  - pattern: |
      $CTX.append_instruction($OPCODE, [$IRLITERAL(...)])
  - pattern-not: |
      $BB.append_instruction($OPCODE, $VALUE)
  languages:
  - python
  message: |
    Detected unsafe usage of IRLiteral in append_instruction. Directly passing raw integers without proper wrapping can lead to security vulnerabilities. Use the updated append_instruction method that automatically wraps integers in IRLiteral.
  severity: ERROR
  metadata:
    source-url: github.com/vyperlang/vyper/commit/10564dcc37756f3d3684b7a91fd8f4325a38c4d8
    category: security
    cwe: CWE-120
    owasp: A1:2017-Injection
    technology:
    - python
- id: vuln-vyper-78fa8dd8
  patterns:
  - pattern: |
      IRnode.from_list(
          [
              "seq",
              ["mstore", $PLACEHOLDER, $GETELEM($ARG, 0)],
              ["mstore", ["add", $PLACEHOLDER, 32], $GETELEM($ARG, 1)],
              ["mstore", ["add", $PLACEHOLDER, 64], $GETELEM($ARG2, 0)],
              ["mstore", ["add", $PLACEHOLDER, 96], $GETELEM($ARG2, 1)],
              [
                  "assert",
                  ["staticcall", ["gas"], $CALL, $PLACEHOLDER, $SIZE, $PLACEHOLDER, $RET_SIZE],
              ],
              $PLACEHOLDER,
          ],
          typ=$TYP,
          location=$LOC,
      )
  - pattern-not: |
      IRnode.from_list(
          [
              "seq",
              make_setter($DST0, $ARG0),
              make_setter($DST1, $ARG1),
              ["assert", ["staticcall", ["gas"], $CALL, $BUF, $SIZE, $BUF, $RET_SIZE]],
              $BUF,
          ],
          typ=$TYP,
          location=$LOC,
      )
  languages:
  - python
  message: |
    Detected unsafe memory handling in Vyper's built-in functions. The original code directly manipulated memory using mstore and get_element_ptr, which could lead to memory corruption or undefined behavior. The patch replaces this with safer make_setter calls. Always use safe memory management patterns in smart contract development.
  severity: ERROR
  metadata:
    source-url: github.com/vyperlang/vyper/commit/78fa8dd8f91ba0cb26277eeffb585c68c83e7daa
    category: security
    cwe: CWE-119
    owasp: A7:2017-Cross-Site Scripting (XSS)
    references:
    - https://docs.vyperlang.org/en/stable/built-ins.html
    technology:
    - python
    - vyper
- id: vuln-vyper-c3e68c30
  patterns:
  - pattern: |
      num_kwargs = len($SIG.default_args)
      kwargs_needed = num_kwargs - num_provided_kwargs
      kw_vals = list($SIG.default_values.values())[:kwargs_needed]
  - pattern-not: |
      kw_vals = list($SIG.default_values.values())[num_provided_kwargs:]
  languages:
  - python
  message: |
    Detected incorrect handling of keyword arguments in Vyper code. This vulnerability can lead to incorrect argument processing and potential security issues. The fix involves correctly slicing the default values based on the number of provided keyword arguments.
  severity: ERROR
  metadata:
    source-url: github.com/vyperlang/vyper/commit/c3e68c302aa6e1429946473769dd1232145822ac
    category: security
    cwe: CWE-682
    owasp: A06:2021-Vulnerable and Outdated Components
    technology: python
- id: vuln-vyper-eae0eaf8
  patterns:
  - pattern: |
      if $TYPE.nonreentrant is not None:
        $TYPE.set_reentrancy_key_position(StorageSlot($STORAGE_SLOT))
        $VARIABLE_NAME = f"nonreentrant.{$TYPE.nonreentrant}"
        $RET[$VARIABLE_NAME] = {
            "type": "nonreentrant lock",
            "location": "storage",
            "slot": $STORAGE_SLOT,
        }
        $STORAGE_SLOT += 1
  - pattern-not: |
      if $TYPE.nonreentrant is None:
        continue
      $VARIABLE_NAME = f"nonreentrant.{$TYPE.nonreentrant}"
      if $VARIABLE_NAME in $RET:
        continue
      $TYPE.set_reentrancy_key_position(StorageSlot($STORAGE_SLOT))
      $RET[$VARIABLE_NAME] = {
          "type": "nonreentrant lock",
          "location": "storage",
          "slot": $STORAGE_SLOT,
      }
      $STORAGE_SLOT += 1
  languages:
  - python
  message: |
    Detected incorrect handling of nonreentrant keys in storage layout. The original code could assign multiple storage slots to the same nonreentrant key, leading to potential storage collisions. The fix ensures that a nonreentrant key only takes one slot, ignoring subsequent occurrences.
  severity: ERROR
  metadata:
    source-url: github.com/vyperlang/vyper/commit/eae0eaf86eb462746e4867352126f6c1dd43302f
    category: security
    cwe: CWE-664
    owasp: A9:2017-Using Components with Known Vulnerabilities
    technology: python
