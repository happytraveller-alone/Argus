rules:
- id: vuln-checkmk-2961f096
  patterns:
  - pattern: |
      return "%s: %s;%s;%s;%s;%s" % (
          $WHAT,
          $CONTACT,
          $SPEC,
          $STATE,
          $PLUGIN,
          $OUTPUT[:$MAX_LENGTH].replace(";", $REPLACE)
      )
  - pattern-not: |
      return SanitizedLivestatusLogStr(
          "{}: {};{};{};{};{}".format(
              $WHAT,
              livestatus.lqencode($CONTACT),
              livestatus.lqencode($SPEC),
              livestatus.lqencode($STATE),
              livestatus.lqencode($PLUGIN),
              livestatus.lqencode($OUTPUT[:$MAX_LENGTH].replace(";", $REPLACE))
          )
      )
  languages:
  - python
  message: |
    Detected unencoded string concatenation in notification messages. This can lead to injection vulnerabilities in Livestatus log entries. Use SanitizedLivestatusLogStr and livestatus.lqencode() to properly sanitize all inputs.
  severity: ERROR
  metadata:
    source-url: github.com/checkmk/checkmk/commit/2961f0962585012eff18ef804d87535bd3c821c3
    category: security
    cwe: CWE-116
    owasp: A1:2017-Injection
    technology:
    - python
- id: vuln-checkmk-6fc4f3b3
  patterns:
  - pattern: |
      html.render_pre(HTML($VALUE), class_="ve_textarea")
  - pattern-not: |
      html.render_pre($VALUE, class_="ve_textarea")
  languages:
  - python
  message: |
    Detected potential XSS vulnerability due to unnecessary HTML wrapping.
    Directly passing unescaped HTML content can lead to cross-site scripting (XSS) attacks.
    Remove the HTML wrapper to ensure proper escaping.
  severity: ERROR
  metadata:
    source-url: github.com/checkmk/checkmk/commit/6fc4f3b341bae28d741edf172812ac204d2f78f5
    category: security
    cwe: CWE-79
    owasp: A7:2017-Cross-Site Scripting (XSS)
    references:
    - https://owasp.org/www-community/attacks/xss/
    technology: python
