rules:
- id: vuln-checkmk-2961f096
  pattern: "return \"%s: %s;%s;%s;%s;%s\" % (\n    $WHAT,\n    $CONTACT,\n    $SPEC,\n    $STATE,\n    $PLUGIN,\n    $OUTPUT[:$MAX_LENGTH].replace(\"\
    ;\", $REPLACE)\n)\n"
  pattern-not: "return SanitizedLivestatusLogStr(\n    \"{}: {};{};{};{};{}\".format(\n        $WHAT,\n        livestatus.lqencode($CONTACT),\n\
    \        livestatus.lqencode($SPEC),\n        livestatus.lqencode($STATE),\n        livestatus.lqencode($PLUGIN),\n  \
    \      livestatus.lqencode($OUTPUT[:$MAX_LENGTH].replace(\";\", $REPLACE))\n    )\n)\n"
  languages:
  - python
  message: 'Detected unencoded string concatenation in notification messages. This can lead to injection vulnerabilities in
    Livestatus log entries. Use SanitizedLivestatusLogStr and livestatus.lqencode() to properly sanitize all inputs.

    '
  severity: ERROR
  metadata:
    source-url: github.com/checkmk/checkmk/commit/2961f0962585012eff18ef804d87535bd3c821c3
    category: security
    cwe: CWE-116
    owasp: A1:2017-Injection
    technology:
    - python
- id: vuln-checkmk-6fc4f3b3
  pattern: 'html.render_pre(HTML($VALUE), class_="ve_textarea")

    '
  pattern-not: 'html.render_pre($VALUE, class_="ve_textarea")

    '
  languages:
  - python
  message: "Detected potential XSS vulnerability due to unnecessary HTML wrapping. \nDirectly passing unescaped HTML content\
    \ can lead to cross-site scripting (XSS) attacks. \nRemove the HTML wrapper to ensure proper escaping.\n"
  severity: ERROR
  metadata:
    source-url: github.com/checkmk/checkmk/commit/6fc4f3b341bae28d741edf172812ac204d2f78f5
    category: security
    cwe: CWE-79
    owasp: A7:2017-Cross-Site Scripting (XSS)
    references:
    - https://owasp.org/www-community/attacks/xss/
    technology: python
