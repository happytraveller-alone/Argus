rules:
- id: vuln-kolla-2a4a8fce
  patterns:
  - pattern: |
      def load_from_env():
          config_raw = os.environ.get("KOLLA_CONFIG")
          if config_raw is None:
              return None
          try:
              return json.loads(config_raw)
          except ValueError:
              raise InvalidConfig('Invalid json for Kolla config')
  - pattern-not: |
      def load_from_env():
          config_file = '/var/lib/kolla/config_files/config.json'
  languages:
  - python
  message: Detected unsafe configuration loading from environment variables. This can lead to security vulnerabilities if untrusted input is deserialized. Use a secure configuration file instead.
  severity: ERROR
  metadata:
    source-url: github.com/openstack/kolla/commit/2a4a8fce31c12114e8f472c24dd96864b5bd2bd2
    category: security
    cwe:
    - CWE-502
    owasp:
    - A8:2017-Insecure Deserialization
    technology:
    - python
