rules:
- id: vuln-notebook-05aa4b2c
  pattern: version_info = (5, 7, 5)
  pattern-not: version_info = (5, 7, 6)
  languages:
  - python
  message: Outdated version of Jupyter Notebook detected. This version may contain security vulnerabilities. Update to the latest version to mitigate potential risks.
  severity: ERROR
  metadata:
    source-url: github.com/jupyter/notebook/commit/05aa4b2cffb55896b53f0a5e50bc9bca405cb29f
    category: security
    cwe:
    - CWE-1104
    owasp:
    - A9:2017-Using Components with Known Vulnerabilities
    references:
    - https://jupyter-notebook.readthedocs.io/en/stable/changelog.html
    technology:
    - python
- id: vuln-notebook-35f32dd2
  pattern: |
    $JENV_OPT = $JINJA_ENV_OPTIONS if $JINJA_ENV_OPTIONS else {}
  pattern-not: |
    $JENV_OPT = {"autoescape": True}
    $JENV_OPT.update($JINJA_ENV_OPTIONS if $JINJA_ENV_OPTIONS else {})
  languages:
  - python
  message: |
    Detected unsafe Jinja2 environment configuration without autoescape enabled. This can lead to Cross-Site Scripting (XSS) vulnerabilities. Always set `autoescape=True` when configuring Jinja2 environments.
  severity: ERROR
  metadata:
    source-url: github.com/jupyter/notebook/commit/35f32dd2da804d108a3a3585b69ec3295b2677ed
    category: security
    cwe:
    - CWE-79
    owasp:
    - A7:2017-Cross-Site Scripting (XSS)
    references:
    - https://jinja.palletsprojects.com/en/3.1.x/api/#autoescaping
    technology:
    - python
- id: vuln-notebook-694ed72f
  pattern: |
    self.set_header('Content-Security-Policy', $POLICY)
  pattern-not: |
    @property
    def content_security_policy(self):
      return super($CLASS, self).content_security_policy + $EXTENSION
  languages:
  - python
  message: |
    Detected direct setting of Content-Security-Policy header without proper inheritance.
    This can lead to incomplete or insecure CSP policies.
    Instead, use a property that inherits and extends the parent class's CSP policy.
  severity: ERROR
  metadata:
    source-url: github.com/jupyter/notebook/commit/694ed72fb4a80ccae6b352811f5dd2277e6889b8
    category: security
    cwe: CWE-693
    owasp: A6:2017-Security Misconfiguration
    references:
    - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
    technology:
    - python
