rules:
- id: python_flask_rule-tainted-sql-string
  languages:
  - python
  message: |
    检测到SQL 注入风险（规则：python_flask_rule-tainted-sql-string）。危害：未受信任输入可能改变 SQL
    语义，导致数据泄露、篡改或越权查询。建议：使用参数化查询、绑定变量或 ORM 的安全 API，避免拼接原始 SQL。
    保留的关键标识：https://docs.djangoproject.com/en/4.2/ref/models/querysets/#queryset-api、https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html、execute()、`gt`、`lt`、`execute()`、`params`。
  metadata:
    security-severity: High
    cwe: CWE-89
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    category: security
    shortDescription: Improper neutralization of special elements used in an SQL Command ('SQL Injection')
  mode: taint
  pattern-sources:
  - pattern-either:
    - pattern: flask.request.$ANYTHING
    - patterns:
      - pattern-inside: |
          @$APP.route(...)
          def $FUNC(..., $ROUTEVAR, ...):
            ...
      - pattern: $ROUTEVAR
  pattern-sinks:
  - patterns:
    - pattern-either:
      - pattern: |
          <... "$QUERYLIKE" ...>
    - metavariable-regex:
        metavariable: $QUERYLIKE
        regex: .*\b(?i)(SELECT .+ FROM|WHERE|DELETE FROM|INSERT INTO| CREATE TABLE|UPDATE .+ SET|ALTER TABLE|ALTER COLUMN|DROP COLUMN|DROP TABLE|ORDER BY)\b.*
  severity: ERROR
