rules:
- id: password-empty-string_1
  languages:
  - python
  message: |
    检测到硬编码凭据风险（规则：password-empty-string_1）。危害：密钥或口令进入源码后容易泄露，导致认证绕过、会话伪造或横向访问。建议：改用环境变量、密钥管理服务或安全配置注入。
    保留的关键标识：$VAR、$MODEL、set_unusable_password()、'$VAR'、'$MODEL'、'set_unusable_password()'。
  metadata:
    category: security
    confidence: MEDIUM
    cwe:
    - 'CWE-521: Weak Password Requirements'
    impact: MEDIUM
    likelihood: LOW
    owasp:
    - A07:2021 - Identification and Authentication Failures
    references:
    - https://docs.djangoproject.com/en/3.0/ref/contrib/auth/#django.contrib.auth.models.User.set_password
    subcategory:
    - vuln
    technology:
    - django
  patterns:
  - pattern-either:
    - pattern: |
        $MODEL.set_password($EMPTY)
        ...
        $MODEL.save()
    - pattern: |
        $VAR = $EMPTY
        ...
        $MODEL.set_password($VAR)
        ...
        $MODEL.save()
  - metavariable-regex:
      metavariable: $EMPTY
      regex: (\'\'|\"\")
  severity: ERROR
