rules:
- id: vuln-paddle-4c0888d7
  pattern: |
    _download_methods = {..., 'wget': $VAL, ...}
  languages:
  - python
  message: Insecure 'wget' download method detected, removed due to security risks in subprocess shell execution
  severity: ERROR
  metadata:
    source-url: github.com/PaddlePaddle/Paddle/commit/4c0888d7b8f10405e2e79adc41c224264f93e816
    category: security
    technology:
    - python
    cwe:
    - 'CWE-78: OS Command Injection'
    - 'CWE-20: Improper Input Validation'
- id: vuln-paddle-bdf6234f
  patterns:
  - pattern: |
      subprocess.$METHOD(
          $COMMAND_STRING + ...,
          shell=True
      )
  - pattern-not: |
      subprocess.$METHOD(
          [$ARG1, $ARG2, ..., $ARGN],
          ...
      )
  languages:
  - python
  message: Potential shell injection vulnerability from unsafe subprocess call with shell=True. Use list arguments instead of string concatenation.
  severity: ERROR
  metadata:
    source-url: github.com/PaddlePaddle/Paddle/commit/bdf6234fdc22e6ee7948950d271cbbe1d27edc93
    category: security
    technology:
    - python
    cwe:
    - 'CWE-78: OS Command Injection'
    - 'CWE-77: Improper Neutralization of Special Elements used in a Command'
    - 'CWE-20: Improper Input Validation'
