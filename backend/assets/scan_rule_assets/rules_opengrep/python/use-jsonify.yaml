rules:
- id: use-jsonify
  patterns:
  - pattern-inside: |
      @app.route(...)
      def $X():
        ...
  - pattern-either:
    - pattern: return json.dumps(...)
    - pattern: |
        $DATA = json.dumps(...)
        ...
        return <... $DATA ...>
  fix-regex:
    regex: (json\.){0,1}dumps
    replacement: flask.jsonify
    count: 1
  message: |
    检测到响应构造不当风险（规则：use-jsonify）。危害：手动构造 JSON 响应可能遗漏正确的内容类型、编码或安全处理，造成客户端解析或安全边界问题。建议：使用框架提供的 JSON 响应对象。
    保留的关键标识：flask.jsonify()。
  languages:
  - python
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-79: Improper Neutralization of Input During Web Page Generation'
    - 'CWE-116: Improper Encoding or Escaping of Output'
    - 'CWE-200: Exposure of Sensitive Information to an Unauthorized Actor'
