rules:
- id: identical-is-comparison
  pattern: $S is $S
  message: |
    检测到对象身份比较缺陷（规则：identical-is-comparison）。危害：把值比较写成对象身份比较会导致结果依赖解释器对象复用，产生不稳定或错误的判断。建议：比较字符串、数字等值语义对象时使用
    `==`，仅在判断同一对象时使用 `is`。
  languages:
  - python
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-571: Expression Is Always True/False'
    - 'CWE-704: Incorrect Type Conversion or Cast'
