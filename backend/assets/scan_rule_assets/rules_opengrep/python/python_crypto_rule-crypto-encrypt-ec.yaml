rules:
- id: python_crypto_rule-crypto-encrypt-ec
  languages:
  - python
  message: |
    检测到弱加密/加密参数错误风险（规则：python_crypto_rule-crypto-encrypt-ec）。危害：过时算法、重复
    nonce/IV、弱密钥长度或缺少认证校验会削弱机密性和完整性，可能导致明文恢复或数据篡改。建议：使用现代算法和正确参数，例如 AES-GCM/ChaCha20-Poly1305，保证
    nonce/IV 唯一，使用足够密钥长度并完成认证校验。
    保留的关键标识：https://cryptography.io/en/latest/hazmat/primitives/asymmetric/ec/、`ec.SECP384R1`。
  metadata:
    cwe: CWE-326
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    category: security
    shortDescription: Inadequate encryption strength
    security-severity: Medium
  patterns:
  - pattern-inside: cryptography.hazmat.primitives.asymmetric.ec.generate_private_key(...)
  - pattern: cryptography.hazmat.primitives.asymmetric.ec.$SIZE
  - metavariable-pattern:
      metavariable: $SIZE
      pattern-either:
      - pattern: SECP192R1
      - pattern: SECT163K1
      - pattern: SECT163R2
  - focus-metavariable: $SIZE
  severity: ERROR
