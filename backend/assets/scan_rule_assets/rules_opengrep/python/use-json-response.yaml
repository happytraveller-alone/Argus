rules:
- id: use-json-response
  patterns:
  - pattern-inside: |
      def $X(...):
        ...
  - pattern-either:
    - pattern: |
        $Y = json.dumps(...)
        ...
        django.http.HttpResponse($Y, ...)
  message: |
    检测到响应构造不当风险（规则：use-json-response）。危害：手动构造 JSON 响应可能遗漏正确的内容类型、编码或安全处理，造成客户端解析或安全边界问题。建议：使用框架提供的 JSON
    响应对象。
  languages:
  - python
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-79: Cross-site Scripting'
    - 'CWE-116: Improper Encoding or Escaping of Output'
