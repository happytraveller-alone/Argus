rules:
- id: use-defused-xml
  pattern-either:
  - pattern: import xml
  - pattern: import lxml
  fix: import defusedxml
  metadata:
    owasp: 'A4: XML External Entities (XXE)'
    cwe: 'CWE-611: Improper Restriction of XML External Entity Reference'
    references:
    - https://docs.python.org/3/library/xml.html
  message: |
    检测到XML 外部实体（XXE）/实体扩展风险（规则：use-defused-xml）。危害：攻击者可能读取服务器本地文件、发起内网请求，或通过实体扩展造成资源耗尽。建议：禁用外部实体和危险的
    DOCTYPE/实体扩展能力，并只解析可信 XML。 保留的关键标识：'defusedxml'。
  languages:
  - python
  severity: ERROR
