rules:
- id: return-in-init
  patterns:
  - pattern-inside: |
      class A(...):
          ...
          def __init__(...):
              ...
  - pattern: return ...
  message: '`return` should never appear inside a class __init__ function. This will cause a runtime error.'
  languages:
  - python
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-665: Improper Initialization'
    - 'CWE-391: Unchecked Error Condition'
