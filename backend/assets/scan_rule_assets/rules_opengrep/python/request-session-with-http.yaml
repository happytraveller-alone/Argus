rules:
- id: request-session-with-http
  pattern-either:
  - patterns:
    - pattern-either:
      - pattern: |
          def $FUNC(..., $URL = "=~/[Hh][Tt][Tt][Pp]:\/\/.*/", ...):
            ...
            $SESSION = requests.Session(...)
            ...
            $SESSION.$W($URL, ...)
      - pattern: |
          def $FUNC(..., $URL = "=~/[Hh][Tt][Tt][Pp]:\/\/.*/", ...):
            ...
            $SESSION = requests.Session(...)
            ...
            $SESSION.request($METHOD, $URL, ...)
  - patterns:
    - pattern-inside: |
        $SESSION = requests.Session(...)
        ...
    - pattern-either:
      - pattern: $SESSION.$W("=~/[Hh][Tt][Tt][Pp]:\/\/.*/", ...)
      - pattern: |
          $URL = "=~/[Hh][Tt][Tt][Pp]:\/\/.*/"
          ...
          $SESSION.$W($URL, ...)
      - pattern: $SESSION.request($METHOD, "=~/[Hh][Tt][Tt][Pp]:\/\/.*/", ...)
      - pattern: |
          $URL = "=~/[Hh][Tt][Tt][Pp]:\/\/.*/"
          ...
          $SESSION.request($METHOD, $URL, ...)
  fix-regex:
    regex: '[Hh][Tt][Tt][Pp]://'
    replacement: https://
    count: 1
  message: |
    检测到不安全明文通信风险（规则：request-session-with-http）。危害：明文协议可能被窃听或篡改，导致凭据和业务数据泄露。建议：改用 TLS/HTTPS 等加密通道并校验证书。
    保留的关键标识：http://'、https://'、'http://'、'https://'。
  metadata:
    owasp: 'A3: Sensitive Data Exposure'
    cwe: 'CWE-319: Cleartext Transmission of Sensitive Information'
  languages:
  - python
  severity: ERROR
