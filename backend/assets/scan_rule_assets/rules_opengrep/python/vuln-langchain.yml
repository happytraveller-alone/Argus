rules:
- id: vuln-langchain-5ca7ce77
  pattern: |
    $PYTHON_EXECUTOR = PythonREPL()
    ...
    $CODE = $T[9:-4]
    $PYTHON_EXECUTOR.run($CODE)
  pattern-not: |
    $LOCAL_DICT = {"pi": math.pi, "e": math.e}
    numexpr.evaluate(
      $EXPRESSION.strip(),
      global_dict={},
      local_dict=$LOCAL_DICT,
    )
  languages:
  - python
  message: |
    Detected unsafe execution of Python code using PythonREPL. This can lead to arbitrary code execution vulnerabilities.
    The code should use numexpr.evaluate() with restricted globals and predefined locals instead.
  severity: ERROR
  metadata:
    source-url: github.com/langchain-ai/langchain/commit/5ca7ce77cd536991d04f476e420446a3b21d2a7b
    category: security
    cwe: CWE-94
    owasp: A03:2021-Injection
    technology: python
- id: vuln-langchain-bf0b3cc0
  pattern: |
    if prevent_outside and not $PATH.startswith($BASE_URL):
        ...
  pattern-not: |
    if prevent_outside:
        $PARSED_PATH = urlparse($PATH)
        if $PARSED_BASE_URL.netloc != $PARSED_PATH.netloc:
            ...
        if not $PATH.startswith($BASE_URL_TO_USE):
            ...
  languages:
  - python
  message: Detected insecure URL validation. The original code only checks if the path starts with the base URL, which can be bypassed. Use urlparse to properly validate the netloc and path components.
  severity: ERROR
  metadata:
    source-url: github.com/langchain-ai/langchain/commit/bf0b3cc0b5ade1fb95a5b1b6fa260e99064c2e22
    category: security
    cwe: CWE-20
    owasp: A1:2017-Injection
    technology: python
