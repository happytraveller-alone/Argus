rules:
- id: vuln-keystone-bdb88c66
  pattern: |
    self.assertNotEqual($V1, $V2)
  pattern-not: |
    self.assertEqual($V1, $V2)
  languages:
  - python
  message: Incorrect assertion detected. Using assertNotEqual instead of assertEqual can lead to false positives in test cases. Replace with assertEqual to ensure correct validation.
  severity: ERROR
  metadata:
    source-url: github.com/openstack/keystone/commit/bdb88c662ac2035f9b0d8a229a5db5f60f5f16ae
    category: security
    cwe: CWE-691
    owasp: A9:2017-Using Components with Known Vulnerabilities
    references:
    - https://docs.python.org/3/library/unittest.html#unittest.TestCase.assertEqual
    technology:
    - python
- id: vuln-keystone-ce6cedb3
  pattern: |
    return $AUTH['identity']['methods'] or []
  pattern-not: |
    $METHOD_NAMES = []
    for $METHOD in $AUTH['identity']['methods']:
        if $METHOD not in $METHOD_NAMES:
            $METHOD_NAMES.append($METHOD)
    return $METHOD_NAMES
  languages:
  - python
  message: |
    Detected unsafe handling of authentication methods that does not filter out duplicates.
    This can lead to inconsistent behavior or security issues when processing authentication requests.
    Fix by sanitizing the methods list to remove duplicates while preserving order.
  severity: ERROR
  metadata:
    source-url: github.com/openstack/keystone/commit/ce6cedb30c5c4b4cf4db9380f09443de22414b39
    category: security
    cwe: 'CWE-20: Improper Input Validation'
    owasp: A01:2021-Broken Access Control
    technology:
    - python
- id: vuln-keystone-d9600434
  pattern: |
    $USER_REF = self.update_user($CONTEXT, $USER_ID, $USER)
    try:
        for $TOKEN_ID in self.token_api.list_tokens($CONTEXT, $USER_ID):
            self.token_api.delete_token($CONTEXT, $TOKEN_ID)
    except exception.NotImplemented:
        LOG.warning('Password changed for %s, but existing tokens remain valid' % $USER_ID)
    return $USER_REF
  pattern-not: |
    if $USER.get('password') or $USER.get('enabled', True) == False:
        try:
            for $TOKEN_ID in self.token_api.list_tokens($CONTEXT, $USER_ID):
                self.token_api.delete_token($CONTEXT, $TOKEN_ID)
        except exception.NotImplemented:
            LOG.warning('User %s status has changed, but existing tokens remain valid' % $USER_ID)
    return self.update_user($CONTEXT, $USER_ID, $USER)
  languages:
  - python
  message: Detected a security issue where user tokens are not invalidated when a user is disabled or their password is changed. This can allow continued access with revoked credentials. Ensure tokens are cleared when user status changes.
  severity: ERROR
  metadata:
    source-url: github.com/openstack/keystone/commit/d9600434da14976463a0bd03abd8e0309f0db454
    category: security
    cwe: CWE-613
    owasp: A2:2017-Broken Authentication
    technology: python
