rules:
- id: ssrf-injection-urllib_1
  languages:
  - python
  message: |
    检测到服务端请求伪造（SSRF）风险（规则：ssrf-injection-urllib_1）。危害：攻击者可能诱导服务端访问内网、云元数据或受保护资源，造成信息泄露或横向探测。建议：对协议、主机和端口做白名单校验，并禁止转发敏感响应。
  metadata:
    category: security
    confidence: MEDIUM
    cwe:
    - 'CWE-918: Server-Side Request Forgery (SSRF)'
    cwe2021-top25: true
    cwe2022-top25: true
    impact: HIGH
    likelihood: MEDIUM
    owasp:
    - A10:2021 - Server-Side Request Forgery (SSRF)
    references:
    - https://owasp.org/www-community/attacks/Server_Side_Request_Forgery
    subcategory:
    - vuln
    technology:
    - django
  patterns:
  - pattern-inside: |
      def $FUNC(...):
        ...
  - pattern-either:
