rules:
- id: python_ssl_rule-ssl-with-bad-version
  languages:
  - python
  message: |
    检测到TLS/证书或主机校验配置不当风险（规则：python_ssl_rule-ssl-with-bad-version）。危害：跳过证书、主机密钥校验或使用弱 TLS
    配置会使连接暴露于中间人攻击，导致数据被窃听或篡改。建议：启用证书链、主机名或主机密钥校验，禁用过时协议和弱加密套件。
    保留的关键标识：https://docs.python.org/3/library/ssl.html、https://cryptography.io/en/latest/openssl/、ssl.SSLContext(...)、`SSLContext.wrap_socket`、`pyOpenSSL`、`ssl`、`ssl.PROTOCOL_TLS_CLIENT`、`ssl.PROTOCOL_TLS_SERVER`、`ssl.SSLContext(...)`、`protocol=`。
  metadata:
    cwe: CWE-326
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    shortDescription: Inadequate Encryption Strength
    security-severity: Medium
    category: security
  patterns:
  - pattern-either:
    - pattern: ssl.PROTOCOL_SSLv2
    - pattern: ssl.PROTOCOL_SSLv3
    - pattern: ssl.PROTOCOL_TLSv1
    - pattern: ssl.PROTOCOL_TLSv1_1
    - pattern: pyOpenSSL.SSL.SSLv2_METHOD
    - pattern: pyOpenSSL.SSL.SSLv23_METHOD
    - pattern: pyOpenSSL.SSL.SSLv3_METHOD
    - pattern: pyOpenSSL.SSL.TLSv1_METHOD
    - pattern: pyOpenSSL.SSL.TLSv1_1_METHOD
  severity: ERROR
