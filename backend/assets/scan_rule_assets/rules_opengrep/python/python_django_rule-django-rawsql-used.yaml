rules:
- id: python_django_rule-django-rawsql-used
  languages:
  - python
  message: |
    检测到SQL 注入风险（规则：python_django_rule-django-rawsql-used）。危害：未受信任输入可能改变 SQL
    语义，导致数据泄露、篡改或越权查询。建议：使用参数化查询、绑定变量或 ORM 的安全 API，避免拼接原始 SQL。
    保留的关键标识：https://docs.djangoproject.com/en/4.2/ref/models/querysets/#queryset-api、https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html、`gt`、`lt`、`raw`、`RawSQL`、`QuerySet`、`params`、`param`、`sql`、`%s`、`...
    where id='%s'`。
  metadata:
    cwe: CWE-89
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    category: security
    shortDescription: Improper neutralization of special elements used in an SQL Command ('SQL Injection')
    security-severity: CRITICAL
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $PARAM
    - pattern-inside: |
        def $VIEW(...,$PARAM,...):
          ...
          return ...
  pattern-sinks:
  - patterns:
    - pattern: $QUERY
    - pattern-inside: django.db.models.expressions.RawSQL($QUERY, ... )
  severity: ERROR
