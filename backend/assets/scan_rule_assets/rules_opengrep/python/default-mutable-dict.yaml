rules:
- id: default-mutable-dict
  patterns:
  - pattern-either:
    - patterns:
      - pattern: |
          def $F(..., $D={}, ...):
            ...
            $D[...] = ...
      - pattern-not: |
          def $F(..., $D={}, ...):
            ...
            $D = {}
            ...
            $D[...] = ...
      - pattern-not: |
          def $F(..., $D={}, ...):
            ...
            $D = dict(...)
            ...
            $D[...] = ...
      - pattern-not: |
          def $F(..., $D={}, ...):
            ...
            $D = $D.copy()
            ...
            $D[...] = ...
      - pattern-not: |
          def $F(..., $D={}, ...):
            ...
            $D = copy.deepcopy($D)
            ...
            $D[...] = ...
      - pattern-not: |
          def $F(..., $D={}, ...):
            ...
            $D = copy.copy($D)
            ...
            $D[...] = ...
      - pattern-not: |
          def $F(..., $D={}, ...):
            ...
            $D = dict.copy($D)
            ...
            $D[...] = ...
      - pattern-not: |
          def $F(..., $D={}, ...):
            ...
            $D = {... for ... in ...}
            ...
            $D[...] = ...
      - pattern-not: |
          def $F(..., $D={}, ...):
            ...
            $D = $D or {}
            ...
            $D[...] = ...
      - pattern-not-inside: |
          def $A(...):
            ...
            def $F(..., $D={}, ...):
              ...
              $D[...] = ...
    - patterns:
