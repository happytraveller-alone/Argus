rules:
- id: vuln-home-assistant-bd58a0de
  pattern: '$URL = ''http://api.macvendors.com/'' + $OUI

    ...

    $RESP = yield from $WEBSESSION.get($URL)

    '
  pattern-not: '$URL = ''https://api.macvendors.com/'' + $OUI

    ...

    $RESP = yield from $WEBSESSION.get($URL)

    '
  languages:
  - python
  message: Detected insecure HTTP request to macvendors.com API. This exposes sensitive MAC address data to potential interception
    or manipulation. Use HTTPS instead of HTTP to encrypt the communication.
  severity: ERROR
  metadata:
    source-url: github.com/home-assistant/home-assistant/commit/bd58a0de7dab6dc8119ddea5878f27ed1fb25c1e
    category: security
    cwe: CWE-319
    owasp: A3:2017-Sensitive Data Exposure
    references:
    - https://owasp.org/www-project-top-ten/2017/A3_2017-Sensitive_Data_Exposure
    technology:
    - python
- id: vuln-home-assistant-dbfc5ea8
  pattern: "return self.json({\n    $PERSON[ATTR_USER_ID]: {\n        $ATTR_NAME: $PERSON[ATTR_NAME],\n        $CONF_PICTURE:\
    \ $PERSON.get(CONF_PICTURE),\n    }\n    for $PERSON in $PERSONS\n    if $PERSON.get(ATTR_USER_ID)\n})\n"
  pattern-not: "return self.json_message(\n    message=\"Not local\",\n    status_code=HTTPStatus.BAD_REQUEST,\n    message_code=\"\
    not_local\",\n)\n"
  languages:
  - python
  message: Detected potential exposure of sensitive user information without proper IP address validation. Ensure that user
    data is only accessible from local network addresses.
  severity: ERROR
  metadata:
    source-url: github.com/home-assistant/home-assistant/commit/dbfc5ea8f96bde6cd165892f5a6a6f9a65731c76
    category: security
    cwe: CWE-200
    owasp: A1:2017-Injection
    technology:
    - python
