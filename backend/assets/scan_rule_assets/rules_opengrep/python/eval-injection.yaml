rules:
- id: eval-injection
  languages:
  - python
  severity: ERROR
  message: Detected user data flowing into eval. This is code injection and should be avoided.
  metadata:
    cwe: 'CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code (''Eval Injection'')'
    owasp: 'A1: Injection'
    references:
    - https://nedbatchelder.com/blog/201206/eval_really_is_dangerous.html
  patterns:
  - pattern-either:
    - patterns:
      - pattern-inside: |
          @$APP.route($ROUTE, ...)
          def $FUNC(..., $ROUTEVAR, ...):
            ...
      - pattern-either:
        - pattern: eval(..., <... $ROUTEVAR ...>, ...)
        - pattern: |
            $INTERM = <... $ROUTEVAR ...>
            ...
            eval(..., <... $INTERM ...>, ...)
    - patterns:
      - pattern-either:
        - pattern: eval(..., <... flask.request.$W.get(...) ...>, ...)
        - pattern: eval(..., <... flask.request.$W[...] ...>, ...)
        - pattern: eval(..., <... flask.request.$W(...) ...>, ...)
        - pattern: eval(..., <... flask.request.$W ...>, ...)
    - patterns:
      - pattern-either:
        - patterns:
          - pattern-inside: "$INTERM = <... flask.request.$W.get(...) ...>\n... \n"
          - pattern: eval(..., <... $INTERM ...>, ...)
        - patterns:
          - pattern-inside: "$INTERM = <... flask.request.$W[...] ...>\n... \n"
          - pattern: eval(..., <... $INTERM ...>, ...)
        - patterns:
          - pattern-inside: "$INTERM = <... flask.request.$W(...) ...>\n... \n"
          - pattern: eval(..., <... $INTERM ...>, ...)
        - patterns:
          - pattern-inside: "$INTERM = <... flask.request.$W ...>\n... \n"
          - pattern: eval(..., <... $INTERM ...>, ...)
