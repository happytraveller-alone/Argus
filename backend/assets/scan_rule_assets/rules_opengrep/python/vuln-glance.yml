rules:
- id: vuln-glance-108f0e04
  pattern: |
    LOG.warn(_('Get image %(id)s data from %(loc)s failed: %(err)s.') % {'id': $ID, 'loc': $LOC, 'err': $ERR})
  pattern-not: |
    LOG.warn(_('Get image %(id)s data failed: %(err)s.') % {'id': $ID, 'err': $ERR})
  languages:
  - python
  message: |
    Detected insecure logging of sensitive information. The patch removed the 'loc' parameter from the log message to prevent exposure of sensitive location data. Avoid logging sensitive information to prevent security risks.
  severity: ERROR
  metadata:
    source-url: github.com/openstack/glance/commit/108f0e04ad2ed3dc287f1b71b987a7e9d66072ba
    category: security
    cwe: CWE-532
    owasp: A3:2017-Sensitive Data Exposure
    references:
    - https://cwe.mitre.org/data/definitions/532.html
    technology:
    - python
- id: vuln-glance-fc0ee762
  pattern: |
    status = 'deleted'
    if $IMAGE['location']:
        if $CONF.delayed_delete:
            status = 'pending_delete'
            $STORE_API.schedule_delayed_delete_from_backend($IMAGE['location'], $ID)
        else:
            $STORE_API.safe_delete_from_backend($IMAGE['location'], $CONTEXT, $ID)
  pattern-not: |
    if $IMAGE['location'] and $CONF.delayed_delete:
        status = 'pending_delete'
    else:
        status = 'deleted'
        if $IMAGE['location']:
            if $CONF.delayed_delete:
                $STORE_API.schedule_delayed_delete_from_backend($IMAGE['location'], $ID)
            else:
                $STORE_API.safe_delete_from_backend($IMAGE['location'], $CONTEXT, $ID)
  languages:
  - python
  message: |
    Detected a vulnerability where the deletion status and deletion operations are not properly synchronized.
    This could lead to inconsistent states where an image is marked as 'deleted' but its data is not actually removed from the backend.
    Ensure that the status and deletion operations are handled in a consistent manner.
  severity: ERROR
  metadata:
    source-url: github.com/openstack/glance/commit/fc0ee7623ec59c87ac6fc671e95a9798d6f2e2c3
    category: security
    cwe: CWE-664
    owasp: A9:2017-Using Components with Known Vulnerabilities
    technology:
    - python
