rules:
- id: use-none-for-password-default
  message: |
    检测到硬编码凭据风险（规则：use-none-for-password-default）。危害：密钥或口令进入源码后容易泄露，导致认证绕过、会话伪造或横向访问。建议：改用环境变量、密钥管理服务或安全配置注入。
    保留的关键标识：$VAR、$MODEL、set_unusable_password()、'$VAR'、'$MODEL'、'None'、'set_unusable_password()'。
  metadata:
    cwe: 'CWE-521: Weak Password Requirements'
    owasp: 'A2: Broken Authentication'
    references:
    - https://docs.djangoproject.com/en/3.0/ref/contrib/auth/#django.contrib.auth.models.User.set_password
  patterns:
  - pattern-either:
    - pattern: |
        $VAR = request.$W.get($X, "")
        ...
        $MODEL.set_password($VAR)
        ...
        $MODEL.save(...)
    - pattern: |
        def $F(..., $VAR="", ...):
          ...
          $MODEL.set_password($VAR)
  fix-regex:
    regex: (def.*|request.*)(""|'')
    replacement: \1None
  languages:
  - python
  severity: ERROR
- fix: |
    None
  id: use-none-for-password-default_1
  languages:
  - python
  message: |
    检测到硬编码凭据风险（规则：use-none-for-password-default_1）。危害：密钥或口令进入源码后容易泄露，导致认证绕过、会话伪造或横向访问。建议：改用环境变量、密钥管理服务或安全配置注入。
    保留的关键标识：$VAR、$MODEL、set_unusable_password()、'$VAR'、'$MODEL'、'None'、'set_unusable_password()'。
  metadata:
    category: security
    confidence: MEDIUM
    cwe:
    - 'CWE-521: Weak Password Requirements'
    impact: MEDIUM
    likelihood: MEDIUM
    owasp:
    - A07:2021 - Identification and Authentication Failures
    references:
    - https://docs.djangoproject.com/en/3.0/ref/contrib/auth/#django.contrib.auth.models.User.set_password
    subcategory:
    - vuln
    technology:
    - django
  patterns:
  - pattern-either:
    - pattern: |
        $VAR = request.$W.get($X, $EMPTY)
        ...
        $MODEL.set_password($VAR)
        ...
        $MODEL.save(...)
    - pattern: |
        def $F(..., $VAR=$EMPTY, ...):
          ...
          $MODEL.set_password($VAR)
  - metavariable-pattern:
      metavariable: $EMPTY
      pattern: '""'
  - focus-metavariable: $EMPTY
  severity: ERROR
