rules:
- id: use-none-for-password-default
  message: '''$VAR'' is using the empty string as its default and is being used to set

    the password on ''$MODEL''. If you meant to set an unusable password, set

    the default value to ''None'' or call ''set_unusable_password()''.

    '
  metadata:
    cwe: 'CWE-521: Weak Password Requirements'
    owasp: 'A2: Broken Authentication'
    references:
    - https://docs.djangoproject.com/en/3.0/ref/contrib/auth/#django.contrib.auth.models.User.set_password
  patterns:
  - pattern-either:
    - pattern: '$VAR = request.$W.get($X, "")

        ...

        $MODEL.set_password($VAR)

        ...

        $MODEL.save(...)

        '
    - pattern: "def $F(..., $VAR=\"\", ...):\n  ...\n  $MODEL.set_password($VAR)\n"
  fix-regex:
    regex: (def.*|request.*)(""|'')
    replacement: \1None
  languages:
  - python
  severity: ERROR
- fix: 'None

    '
  id: use-none-for-password-default_1
  languages:
  - python
  message: '''$VAR'' is using the empty string as its default and is being used to set the password on ''$MODEL''. If you
    meant to set an unusable password, set the default value to ''None'' or call ''set_unusable_password()''.'
  metadata:
    category: security
    confidence: MEDIUM
    cwe:
    - 'CWE-521: Weak Password Requirements'
    impact: MEDIUM
    likelihood: MEDIUM
    owasp:
    - A07:2021 - Identification and Authentication Failures
    references:
    - https://docs.djangoproject.com/en/3.0/ref/contrib/auth/#django.contrib.auth.models.User.set_password
    subcategory:
    - vuln
    technology:
    - django
  patterns:
  - pattern-either:
    - pattern: '$VAR = request.$W.get($X, $EMPTY)

        ...

        $MODEL.set_password($VAR)

        ...

        $MODEL.save(...)

        '
    - pattern: "def $F(..., $VAR=$EMPTY, ...):\n  ...\n  $MODEL.set_password($VAR)\n"
  - metavariable-pattern:
      metavariable: $EMPTY
      pattern: '""'
  - focus-metavariable: $EMPTY
  severity: ERROR
