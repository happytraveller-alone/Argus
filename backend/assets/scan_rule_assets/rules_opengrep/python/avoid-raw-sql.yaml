rules:
- id: avoid-raw-sql
  patterns:
  - pattern-either:
    - pattern: $MODEL.objects.raw($QUERY, ...)
    - pattern: django.db.models.expressions.RawSQL(...)
  message: |
    检测到SQL 注入风险（规则：avoid-raw-sql）。危害：未受信任输入可能改变 SQL 语义，导致数据泄露、篡改或越权查询。建议：使用参数化查询、绑定变量或 ORM 的安全
    API，避免拼接原始 SQL。
    保留的关键标识：https://docs.djangoproject.com/en/3.0/topics/db/sql/#passing-parameters-into-raw。
  metadata:
    cwe: 'CWE-89: Improper Neutralization of Special Elements used in an SQL Command (''SQL Injection'')'
    owasp: 'A1: Injection'
    references:
    - https://docs.djangoproject.com/en/3.0/ref/models/expressions/#raw-sql-expressions
    - https://blog.r2c.dev/2020/preventing-sql-injection-a-django-authors-perspective/
  languages:
  - python
  severity: ERROR
