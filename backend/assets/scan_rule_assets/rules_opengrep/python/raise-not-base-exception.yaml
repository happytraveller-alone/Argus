rules:
- id: raise-not-base-exception
  patterns:
  - pattern-either:
    - pattern: raise "..."
    - pattern: |
        $X: BaseException
        raise $X(...)
  message: |
    检测到异常类型使用缺陷（规则：raise-not-base-exception）。危害：抛出非 `BaseException` 派生对象会在 Python3
    中触发运行时错误，掩盖原始控制流。建议：只抛出继承自 `BaseException` 的异常类型或实例。 保留的关键标识：`TypeError`、`BaseException`。
  languages:
  - python
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-703: Improper Check or Handling of Exceptional Conditions'
    - 'CWE-248: Uncaught Exception'
    - 'CWE-20: Improper Input Validation'
