rules:
- id: yield-in-init
  patterns:
  - pattern-inside: "class A(...):\n    ...\n    def __init__(...):\n        ...\n"
  - pattern: yield ...
  message: '`yield` should never appear inside a class __init__ function. This will
    cause a runtime error.'
  languages:
  - python
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-665: Improper Initialization'
