rules:
- id: tarfile_unsafe_unpacking
  languages:
  - python
  severity: ERROR
  message: |
    检测到路径穿越/不安全解包风险（规则：tarfile_unsafe_unpacking）。危害：归档条目、路径输入或服务端视图路径可能访问/写入目标目录之外，造成敏感文件泄露、任意文件覆盖或恶意内容植入。建议：规范化路径并校验其仍位于目标目录内，拒绝绝对路径和
    `..` 路径段，避免把用户输入直接作为视图或文件路径。
  patterns:
  - pattern-inside: |
      import tarfile
      ...
  - pattern-either:
    - pattern-inside: |
        with tarfile.open($FILE, ...) as $FD:
          ...
    - pattern-inside: |
        $FD = tarfile.open($FILE, ...)
        ...
  - pattern-either:
    - patterns:
      - pattern: $FD.extract($MEMBER, ...)
      - pattern: $FD.extract($MEMBER, ..., ...)
      - pattern: $FD.extract($MEMBER, ..., ..., ...)
      - pattern: $FD.extract($MEMBER, ..., ..., ..., ...)
      - pattern-either:
        - pattern-inside: |
            $FILELIST = $FD.getmembers()
            ...
            for $MEMBER in $FILELIST:
              ...
        - pattern-inside: |
            for $MEMBER in $FD.getmembers():
              ...
    - pattern: $FD.extractall(..., ..., ..., ..., ...)
  metadata:
    cwe:
    - 'CWE-22: Path Traversal'
    - 'CWE-36: Absolute Path Traversal'
    - 'CWE-73: External Control of File Name or Path'
    - 'CWE-20: Improper Input Validation'
