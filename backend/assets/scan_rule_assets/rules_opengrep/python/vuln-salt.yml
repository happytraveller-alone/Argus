rules:
- id: vuln-salt-63823f8c
  pattern: 'return bool(clean_path($OPTS[''pki_dir''], $ID))

    '
  pattern-not: 'return bool(clean_path($OPTS[''pki_dir''], $ID)) and clean_id($ID)

    '
  languages:
  - python
  message: Detected missing validation of ID in clean_path function. This can lead to directory traversal attacks if the ID
    contains malicious path sequences. Ensure to validate the ID using clean_id function before processing.
  severity: ERROR
  metadata:
    source-url: github.com/saltstack/salt/commit/63823f8c3ed02e7809fc8e61972d289bf233a9ed
    category: security
    cwe: 'CWE-22: Improper Limitation of a Pathname to a Restricted Directory (''Path Traversal'')'
    owasp: A1:2017-Injection
    references:
    - https://cwe.mitre.org/data/definitions/22.html
    technology:
    - python
- id: vuln-salt-7b3591d9
  pattern: '$RET = self._proc_function_local(self.opts[''fun''], ...)

    '
  pattern-not: '$RET = self._proc_function(self.opts[''fun''], ...)

    '
  languages:
  - python
  message: Detected use of potentially insecure function _proc_function_local. This function may bypass necessary security
    checks. Use _proc_function instead.
  severity: ERROR
  metadata:
    source-url: github.com/saltstack/salt/commit/7b3591d9cd427d46e410bc2d510e2ccfa6a23884
    category: security
    cwe:
    - CWE-20
    owasp:
    - A1:2017-Injection
    references:
    - https://docs.saltproject.io/en/latest/ref/runners/all/salt.runners.manage.html
    technology:
    - python
- id: vuln-salt-80d90307
  pattern: "def clean_id($ID):\n    ...\n    if re.search(r'\\.\\.\\{sep}'.format(sep=os.sep), $ID):\n        return False\n\
    \    return True\n"
  pattern-not: "def clean_id($ID):\n    ...\n    if any($X in $ID for $X in ('/', '\\\\', '\\0')):\n        return False\n\
    \    return True\n"
  languages:
  - python
  message: Path traversal vulnerability detected. The clean_id function was not properly checking for path separators, which
    could allow directory traversal attacks. Update the function to explicitly check for '/', '\', and null bytes.
  severity: ERROR
  metadata:
    source-url: github.com/saltstack/salt/commit/80d90307b07b3703428ecbb7c8bb468e28a9ae6d
    category: security
    cwe: 'CWE-22: Improper Limitation of a Pathname to a Restricted Directory (''Path Traversal'')'
    owasp: A1:2017-Injection
    references:
    - https://cwe.mitre.org/data/definitions/22.html
    technology:
    - python
- id: vuln-salt-86e18b91
  pattern: 'os.open($PATH, os.O_CREAT | os.O_WRONLY, $MODE)

    '
  pattern-not: 'os.open($PATH, os.O_CREAT | os.O_RDWR, $MODE)

    '
  languages:
  - python
  message: 'Detected insecure file creation using os.O_WRONLY. This can lead to race conditions or incomplete file operations.
    Use os.O_RDWR instead to ensure proper file handling.

    '
  severity: ERROR
  metadata:
    source-url: github.com/saltstack/salt/commit/86e18b91ae006de381f71b972f1daab9239bad3c
    category: security
    cwe: CWE-362
    owasp: A9:2017-Using Components with Known Vulnerabilities
    references:
    - https://man7.org/linux/man-pages/man2/open.2.html
    technology:
    - python
- id: vuln-salt-905efea1
  pattern: 'return self.low($FUN, $LOW, full_return=False)

    '
  pattern-not: "try:\n  return self.cmd_sync($LOW)\nexcept salt.exceptions.EauthAuthenticationError as $EXC:\n  log.error($EXC)\n"
  languages:
  - python
  message: 'Detected a potential authentication error handling vulnerability. The original code directly returns the result
    of a low-level function call without proper exception handling for authentication errors. This can lead to unhandled exceptions
    and potential security issues. The fix includes proper exception handling for EauthAuthenticationError. Always handle
    authentication errors explicitly to prevent security vulnerabilities.

    '
  severity: ERROR
  metadata:
    source-url: github.com/saltstack/salt/commit/905efea17d9740a081509780d7c44e742b99ce60
    category: security
    cwe: CWE-755
    owasp: A07:2021-Identification and Authentication Failures
    references:
    - https://cwe.mitre.org/data/definitions/755.html
    technology: python
- id: vuln-salt-b49d0d4b
  pattern: "logfile = salt.utils.path_join(\n    os.environ['TMP'],\n    '{0}.log'.format($EXE_NAME)\n)\n"
  pattern-not: "logfile_tmp = tempfile.NamedTemporaryFile(dir=os.environ['TMP'],\n                                       \
    \   prefix=$EXE_NAME,\n                                          suffix='.log',\n                                    \
    \      delete=False)\nlogfile = logfile_tmp.name\nlogfile_tmp.close()\n"
  languages:
  - python
  message: "Detected insecure temporary file creation using path concatenation. This can lead to path traversal or symlink\
    \ attacks. \nUse tempfile.NamedTemporaryFile instead for secure temporary file handling.\n"
  severity: ERROR
  metadata:
    source-url: github.com/saltstack/salt/commit/b49d0d4b5ca5c6f31f03e2caf97cef1088eeed81
    category: security
    cwe: 'CWE-377: Insecure Temporary File'
    owasp: A9:2017-Insufficient Attack Protection
    technology: python
- id: vuln-salt-bca115f3
  pattern: "if not ('token' in $LOW or 'eauth' in $LOW) and $LOW['client'] != 'ssh':\n  ...\n"
  pattern-not: "if not ('token' in $LOW or 'eauth' in $LOW):\n  if $LOW.get('raw_shell') and not $SELF.opts.get('netapi_allow_raw_shell'):\n\
    \    raise salt.exceptions.EauthAuthenticationError('Raw shell option not allowed.')\n"
  languages:
  - python
  message: 'Detected insecure handling of raw shell commands in SSH client. The original code allowed raw shell commands without
    proper authentication checks, which could lead to command injection. Ensure that raw shell commands are explicitly disabled
    unless ''netapi_allow_raw_shell'' is set to True.

    '
  severity: ERROR
  metadata:
    source-url: github.com/saltstack/salt/commit/bca115f3f00fbde564dd2f12bf036b5d2fd08387
    category: security
    cwe: 'CWE-77: Command Injection'
    owasp: A1:2017-Injection
    references:
    - https://cwe.mitre.org/data/definitions/77.html
    technology:
    - python
- id: vuln-salt-c0e5a117
  pattern: "def __init__(..., mopts=None):\n    ...\n"
  pattern-not: "def __init__(..., mopts=None, disable_custom_roster=False):\n    self.opts['__disable_custom_roster'] = disable_custom_roster\n"
  languages:
  - python
  message: Salt API should never offer a custom roster. Missing the disable_custom_roster parameter can allow custom rosters,
    which is a security risk.
  severity: ERROR
  metadata:
    source-url: github.com/saltstack/salt/commit/c0e5a1171d7ce2ba8747a971c024632e0d96d848
    category: security
    cwe: CWE-284
    owasp: A05:2021-Security Misconfiguration
    references:
    - https://docs.saltproject.io/en/latest/topics/ssh/index.html
    technology:
    - python
- id: vuln-salt-c80b20b9
  pattern: "def local_batch(self, *args, **kwargs):\n    ...\n    local = salt.client.get_local_client(mopts=self.opts)\n\
    \    return local.cmd_batch(*args, **kwargs)\n"
  pattern-not: "def local_batch(self, *args, **kwargs):\n    ...\n    local = salt.client.get_local_client(mopts=self.opts)\n\
    \    return local.cmd_batch(*args, **kwargs)\n"
  languages:
  - python
  message: Directly returning the result of `cmd_batch` without proper validation can lead to security vulnerabilities. Ensure
    that the batch size and other parameters are properly validated before execution.
  severity: ERROR
  metadata:
    source-url: github.com/saltstack/salt/commit/c80b20b9575dee6ed8a9a72b1a30dcdd338998b7
    category: security
    cwe: CWE-20
    owasp: A1:2017-Injection
    references:
    - https://docs.saltproject.io/en/latest/ref/netapi/all/salt.netapi.html
    technology:
    - python
