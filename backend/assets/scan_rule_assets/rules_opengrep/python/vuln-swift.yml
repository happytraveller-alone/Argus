rules:
- id: vuln-swift-12e54391
  patterns:
  - pattern: |
      parser = lxml.etree.XMLParser()
  - pattern-not: |
      parser = lxml.etree.XMLParser(resolve_entities=False, no_network=True)
  languages:
  - python
  message: |
    Detected unsafe XML parsing configuration. The XML parser is vulnerable to XML External Entity (XXE) attacks, which can lead to sensitive data disclosure or server-side request forgery (SSRF). To fix this, configure the XML parser with `resolve_entities=False` and `no_network=True`.
  severity: ERROR
  metadata:
    source-url: github.com/openstack/swift/commit/12e54391861e7d182d58f89fb88b027e65842640
    category: security
    cwe:
    - CWE-611
    owasp:
    - A4:2017-XML External Entities (XXE)
    references:
    - https://lxml.de/apidoc/lxml.etree.XMLParser-class.html
    technology:
    - python
- id: vuln-swift-d4409c0a
  patterns:
  - pattern: |
      env['swift.authorize'] = lambda req: None
  - pattern-not: |
      env['swift.authorize'] = authorize_same_account($ACCOUNT)
      env['swift.authorize'] = authorize_same_container($ACCOUNT, $CONTAINER)
  languages:
  - python
  message: |
    Detected insecure TempURL authorization implementation that does not properly scope access.
    The previous implementation allowed unrestricted access after TempURL validation, which
    could lead to unauthorized access to other resources in the same account or container.
    The fix introduces proper scoping based on the TempURL key type (account or container level).
    Ensure proper authorization scoping is implemented when using TempURLs.
  severity: ERROR
  metadata:
    source-url: github.com/openstack/swift/commit/d4409c0a046c6ce0e14e18c95efe2cd16cf120e8
    category: security
    cwe: CWE-284
    owasp: A01:2021-Broken Access Control
    technology: python
