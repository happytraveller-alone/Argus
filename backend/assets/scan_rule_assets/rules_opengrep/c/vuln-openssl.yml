rules:
- id: vuln-openssl-0042fb5f
  patterns:
  - pattern: |
      if (($VAR == NULL) || ($VAR->data == NULL)) {
          $BUF[0]='\0';
          return(0);
      }
  - pattern-not: |
      if ($BUF && $BUF_LEN > 0)
          $BUF[0] = '\0';
      if (($VAR == NULL) || ($VAR->data == NULL))
          return(0);
  languages:
  - c
  message: |
    The code does not ensure that the buffer is NUL-terminated in all cases, which could lead to undefined behavior or security vulnerabilities. Ensure that the buffer is always NUL-terminated, especially when handling NULL or invalid data.
  severity: ERROR
  metadata:
    source-url: github.com/openssl/openssl/commit/0042fb5fd1c9d257d713b15a1f45da05cf5c1c87
    category: security
    cwe:
    - CWE-170
    owasp:
    - A9:2017-Using Components with Known Vulnerabilities
    technology:
    - c
- id: vuln-openssl-006cd708
  patterns:
  - pattern: |
      if ($S->session == NULL) {
        ...
      }
  - pattern-not: |
      if ($S->session == NULL || $S->session->master_key_length == 0) {
        ...
      }
  languages:
  - c
  message: |
    Detected a vulnerability where the session master key length is not checked when the session is NULL. This can lead to security issues such as using an uninitialized or invalid master key. To fix this, ensure that the master key length is checked when the session is NULL.
  severity: ERROR
  metadata:
    source-url: github.com/openssl/openssl/commit/006cd7083f76ed5cb0d9a914857e9231ef1bc317
    category: security
    cwe:
    - 'CWE-327: Use of a Broken or Risky Cryptographic Algorithm'
    owasp:
    - A3:2017-Sensitive Data Exposure
    references:
    - https://www.openssl.org/news/secadv/20230628.txt
    technology:
    - c
- id: vuln-openssl-00e2f5ee
  patterns:
  - pattern: |
      if ($INL == 0) {
          *$OUTL = 0;
          return $RETVAL;
      }
  - pattern-not: |
      if ($OUT != NULL) {
          if ($INL == 0) {
              if ($OUTL != NULL)
                  *$OUTL = 0;
              return $RETVAL;
          }
      }
  languages:
  - c
  message: |
    Detected a missing NULL check for output buffer in AES-SIV implementation.
    This vulnerability could lead to null pointer dereference when handling empty encryption/decryption calls.
    The fix adds proper NULL checks for the output buffer before processing.
  severity: ERROR
  metadata:
    source-url: github.com/openssl/openssl/commit/00e2f5eea29994d19293ec4e8c8775ba73678598
    category: security
    cwe:
    - CWE-476
    owasp: A9:2017-Using Components with Known Vulnerabilities
    technology:
    - c
- id: vuln-openssl-06d1dc3f
  patterns:
  - pattern: |
      if ((gen->type == GEN_OTHERNAME) && (check_type == GEN_EMAIL)) {
          if (OBJ_obj2nid(gen->d.otherName->type_id) == NID_id_on_SmtpUTF8Mailbox) {
              san_present = 1;
              if (gen->d.otherName->value->type == V_ASN1_UTF8STRING) {
                  $CSTR = gen->d.otherName->value->value.utf8string;
                  if ((rv = do_check_string($CSTR, 0, equal, flags, chk, chklen, peername)) != 0)
                      break;
              }
          }
      }
  - pattern-not: |
      switch (gen->type) {
      case GEN_OTHERNAME:
          switch (OBJ_obj2nid(gen->d.otherName->type_id)) {
          case NID_id_on_SmtpUTF8Mailbox:
              if (check_type != GEN_EMAIL
                  || gen->d.otherName->value->type != V_ASN1_UTF8STRING)
                  continue;
              $CSTR = gen->d.otherName->value->value.utf8string;
              break;
          }
          break;
      }
  languages:
  - c
  message: |
    Insecure handling of SmtpUTF8Mailbox in X.509 certificate validation.
    The original code did not properly validate the email address format and type,
    potentially allowing malformed or invalid email addresses to be accepted.
    The fix adds proper type checking and validation according to RFC 8398.
    Always validate email addresses strictly according to the appropriate RFCs
    and ensure type checking is performed before processing the value.
  severity: ERROR
  metadata:
    source-url: github.com/openssl/openssl/commit/06d1dc3fa96a2ba5a3e22735a033012aadc9f0d6
    category: security
    cwe:
    - 'CWE-295: Improper Certificate Validation'
    owasp:
    - 'A02: Cryptographic Failures'
    references:
    - https://datatracker.ietf.org/doc/html/rfc8398
    technology:
    - c
- id: vuln-openssl-0ed26acc
  patterns:
  - pattern: |
      int $LEN = OBJ_obj2txt($BUF, sizeof($BUF), $OBJ, 0);
      BIO_write($BIO, $BUF, $LEN);
      BIO_write($BIO, "\n", 1);
  - pattern-not: |
      OBJ_obj2txt($BUF, sizeof($BUF), $OBJ, 0);
      BIO_printf($BIO, "%s\n", $BUF);
  languages:
  - c
  message: |
    Potential buffer handling vulnerability found. The original code uses BIO_write with a calculated length, which could lead to issues if the buffer isn't properly null-terminated. Use BIO_printf instead to ensure proper string handling and null-termination.
  severity: ERROR
  metadata:
    source-url: github.com/openssl/openssl/commit/0ed26acce328ec16a3aa635f1ca37365e8c7403a
    category: security
    cwe:
    - CWE-120
    owasp: A9:2021-Security Logging and Monitoring Failures
    references:
    - https://www.openssl.org/docs/man3.0/man3/BIO_printf.html
    technology:
    - c
- id: vuln-openssl-1f365708
  patterns:
  - pattern: |
      !TEST_str_eq($STR1, (char *)$STR2->data)
  - pattern-not: |
      !TEST_mem_eq($STR1, strlen($STR1), (char *)$STR2->data, $STR2->length)
  languages:
  - c
  message: |
    Insecure string comparison detected. The use of `TEST_str_eq` can lead to vulnerabilities when comparing strings with embedded null characters or when the length of the strings is not properly considered. This can result in incorrect comparisons and potential security issues. Replace `TEST_str_eq` with `TEST_mem_eq` to ensure proper length-based comparison.
  severity: ERROR
  metadata:
    source-url: github.com/openssl/openssl/commit/1f365708a3318a5f1a395f90c38b584a58d37fb9
    category: security
    cwe:
    - 'CWE-697: Incorrect Comparison'
    owasp:
    - 'A6: Security Misconfiguration'
    technology:
    - c
- id: vuln-openssl-2ac4c6f7
  patterns:
  - pattern: |
      asn1_item_embed_d2i($VAR1, $VAR2, $VAR3, $VAR4, $VAR5, $VAR6, $VAR7, $VAR8)
  - pattern-not: |
      asn1_item_embed_d2i($VAR1, $VAR2, $VAR3, $VAR4, $VAR5, $VAR6, $VAR7, $VAR8, $VAR9)
  languages:
  - c
  message: |
    Detected potentially vulnerable ASN.1 parsing code that lacks recursion depth checking.
    This could allow an attacker to craft malicious input that causes excessive recursion,
    leading to stack exhaustion and denial of service. The code should be updated to include
    a depth parameter and check against ASN1_MAX_CONSTRUCTED_NEST (30).
  severity: ERROR
  metadata:
    source-url: github.com/openssl/openssl/commit/2ac4c6f7b2b2af20c0e2b0ba05367e454cd11b33
    category: security
    cwe:
    - 'CWE-674: Uncontrolled Recursion'
    owasp:
    - 'A1: Injection'
    technology:
    - c
    references:
    - https://www.openssl.org/news/secadv/20180327.txt
- id: vuln-openssl-43e6a58d
  patterns:
  - pattern: |
      q_bits = BN_num_bits($DSAPARAM->q);
  - pattern-not: |
      q_bits = BN_num_bits($DSAPARAM->q) + sizeof($DSAPARAM->q->d[0]) * 16;
  languages:
  - c
  message: |
    The code calculates the number of bits in the DSA parameter `q` without considering additional padding bits. This can lead to incorrect cryptographic operations and potential security vulnerabilities. The fix adds proper padding by including the size of the internal representation of `q`. To fix this, ensure the calculation includes the additional bits as shown in the patched version.
  severity: ERROR
  metadata:
    source-url: github.com/openssl/openssl/commit/43e6a58d4991a451daf4891ff05a48735df871ac
    category: security
    cwe:
    - CWE-327
    owasp:
    - A3:2017-Sensitive Data Exposure
    technology:
    - c
- id: vuln-openssl-4924b37e
  patterns:
  - pattern: |
      if ($UBITS <= BN_BITS2 && $UDP[0] == 1)
          break;
  - pattern-not: |
      if ($UBITS <= BN_BITS2) {
          if ($UDP[0] == 0)
              goto err;
          if ($UDP[0] == 1)
              break;
      }
  languages:
  - c
  message: |
    Detected a missing check for reducible polynomials in GF2m arithmetic.
    The original code only checked if the polynomial was equal to 1, missing
    the case where it could be 0 (reducible polynomial). This could lead to
    incorrect cryptographic computations. The fix adds a check for 0 values
    and handles them appropriately with an error condition.
  severity: ERROR
  metadata:
    source-url: github.com/openssl/openssl/commit/4924b37ee01f71ae19c94a8934b80eeb2f677932
    category: security
    cwe:
    - 'CWE-682: Incorrect Calculation'
    owasp: A3:2017-Sensitive Data Exposure
    references:
    - https://github.com/openssl/openssl/commit/4924b37ee01f71ae19c94a8934b80eeb2f677932
    technology:
    - crypto
- id: vuln-openssl-4b22cce3
  patterns:
  - pattern: |
      if ($FUNC($CTX, $NULL, $SIGALG, $PKEY)) ...
  - pattern-not: |
      if ($FUNC($CTX, $NULL, $SIGALG, $PKEY) > 0) { }
  languages:
  - c
  message: |
    The function call in the if statement does not properly check the return value,
    which can lead to incorrect handling of error conditions. This can result in
