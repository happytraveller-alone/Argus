- id: vuln-openssl-901f1ef7
  patterns:
  - pattern: |
      good &= constant_time_ge($VAR, 8);
  - pattern-not: |
      good &= constant_time_lt($VAR, 8);
  languages:
  - c
  message: |
    This rule detects a vulnerability where the code incorrectly checks for 8 consecutive 0x03 bytes before a nul delimiter. The correct behavior should reject the input if it is preceded by 8 consecutive 0x03 bytes. This issue was corrected in OpenSSL commit 901f1ef7dacb6b3bde63233a1f623e1fa2f0f058. The incorrect check can lead to security vulnerabilities in RSA SSL padding validation. To fix this, ensure that the code uses `constant_time_lt` instead of `constant_time_ge` for this check.
  severity: ERROR
  metadata:
    source-url: github.com/openssl/openssl/commit/901f1ef7dacb6b3bde63233a1f623e1fa2f0f058
    category: security
    cwe:
    - 'CWE-327: Use of a Broken or Risky Cryptographic Algorithm'
    owasp:
    - A03:2021 - Cryptographic Failures
    references:
    - https://tools.ietf.org/html/rfc5246
    technology:
    - c
- id: vuln-openssl-91ddeba0
  patterns:
  - pattern: |
      if ($DH->q) {
        ...
      }
  - pattern-not: |
      if ($DH->q != NULL) {
        if (BN_ucmp($DH->p, $DH->q) > 0)
          $Q_GOOD = 1;
        else
          *$RET |= $DH_CHECK_INVALID_Q_VALUE;
      }
      if ($Q_GOOD) {
        ...
      }
  languages:
  - c
  message: |
    The code fails to properly validate the DH parameter 'q' against 'p', which can lead to security vulnerabilities in the Diffie-Hellman key exchange. Specifically, it doesn't check if 'p' is greater than 'q' before using them, which is a critical validation step. This could allow an attacker to exploit invalid parameter values. To fix this, ensure that 'q' is not NULL and that 'p' is greater than 'q' before proceeding with the key exchange.
  severity: ERROR
  metadata:
    source-url: github.com/openssl/openssl/commit/91ddeba0f2269b017dc06c46c993a788974b1aa5
    category: security
    cwe:
    - CWE-327
