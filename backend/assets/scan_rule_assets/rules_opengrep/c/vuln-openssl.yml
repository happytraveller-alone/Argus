- id: vuln-openssl-7725e7bf
  patterns:
  - pattern: |
      if ($RET == -1 && CRYPTO_THREAD_write_lock($LOCK)) {
          $EX_FLAGS |= $EXFLAG_INVALID_POLICY;
          CRYPTO_THREAD_unlock($LOCK);
      }
  - pattern-not: |
      if ($RET == -1 && CRYPTO_THREAD_write_lock($LOCK)) {
          $EX_FLAGS |= $EXFLAG_INVALID_POLICY;
          CRYPTO_THREAD_unlock($LOCK);
      }
      else {
          $EX_FLAGS |= $EXFLAG_INVALID_POLICY;
      }
  languages:
  - c
  message: |
    This pattern detects a potential race condition in OpenSSL where the EXFLAG_INVALID_POLICY flag is set without proper error handling. The original code could lead to inconsistent state if the lock acquisition fails, as the flag would not be set in that case. This could result in incorrect policy validation. The fix ensures that the flag is set regardless of whether the lock is acquired or not. Always ensure proper error handling when working with thread locks and shared state.
  severity: ERROR
  metadata:
    source-url: https://github.com/openssl/openssl/commit/7725e7bfe6f2ce8146b6552b44e0d226be7638e7
    category: security
    cwe:
    - 'CWE-362: Concurrent Execution using Shared Resource with Improper Synchronization (''Race Condition'')'
    owasp:
    - A2:2017-Broken Authentication
    references:
    - https://cwe.mitre.org/data/definitions/362.html
    technology:
    - c
- id: vuln-openssl-7c038a6b
  patterns:
  - pattern: |
      BIO_printf($OUT, "  Challenge String: %s\n", $CHAL->data);
  - pattern-not: |
      BIO_printf($OUT, "  Challenge String: %.*s\n", $CHAL->length, $CHAL->data);
  languages:
  - c
  message: |
    The code uses an insecure format string in BIO_printf that does not specify the length of the input string. This can lead to buffer overflows or incorrect output if the string is not null-terminated. Use the %.*s format specifier with the length parameter to ensure safe string printing.
  severity: ERROR
  metadata:
    source-url: github.com/openssl/openssl/commit/7c038a6bcd98d4bbfd2c2892a87a1138d2f7c5f3
    category: security
    cwe:
    - 'CWE-134: Use of Externally-Controlled Format String'
    owasp:
    - A9:2017-Using Components with Known Vulnerabilities
    references:
