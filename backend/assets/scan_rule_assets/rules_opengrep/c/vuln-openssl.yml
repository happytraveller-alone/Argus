- id: vuln-openssl-b96bebac
  patterns:
  - pattern: |
      if (!BN_copy(&$KQ, &$K))
          goto err;
      BN_set_flags(&$KQ, BN_FLG_CONSTTIME);
      ...
      if (!BN_add(&$KQ, &$KQ, $DSAREF->q))
          goto err;
      if (BN_num_bits(&$KQ) <= BN_num_bits($DSAREF->q)) {
          if (!BN_add(&$KQ, &$KQ, $DSAREF->q))
              goto err;
      }
  - pattern-not: |
      if (!BN_add(&$L, &$K, $DSAREF->q)
          || !BN_add(&$M, &$L, $DSAREF->q)
          || !BN_copy(&$KQ, BN_num_bits(&$L) > $QBITS ? &$L : &$M))
          goto err;
      BN_set_flags(&$KQ, BN_FLG_CONSTTIME);
  languages:
  - c
  message: |
    Detected a potential timing side-channel vulnerability in DSA modular exponentiation.
    The original code performs a conditional addition based on the bit length of the result,
    which can leak timing information about the private key. The fix ensures constant-time
    operations by performing both additions unconditionally and selecting the appropriate result.
    To fix, perform both additions unconditionally and choose the result with the correct bit length.
  severity: ERROR
  metadata:
    source-url: github.com/openssl/openssl/commit/b96bebacfe814deb99fb64a3ed2296d95c573600
    category: security
    cwe:
    - CWE-385
    owasp:
    - A03:2021 - Cryptographic Failures
    references:
    - https://www.openssl.org/news/secadv/20230207.txt
    technology:
    - c
- id: vuln-openssl-cd30f03a
  patterns:
  - pattern: |
      static int cms_copy_content(BIO *out, BIO *in, unsigned int flags)
      {
        unsigned char buf[4096];
        int r = 0, i;
        BIO *tmpout = NULL;
        ...
        tmpout = out;
        ...
      }
  - pattern-not: |
      static int cms_copy_content(BIO *out, BIO *in, unsigned int flags)
      {
        unsigned char buf[4096];
        int r = 0, i;
        BIO *tmpout;
        tmpout = cms_get_text_bio(out, flags);
        ...
      }
  languages:
  - c
  message: |
    The vulnerability involves improper handling of BIO objects in OpenSSL's CMS implementation.
    The original code directly assigns the output BIO to a temporary BIO pointer without proper checks,
    which could lead to resource leaks or incorrect behavior. The fix introduces a helper function
    `cms_get_text_bio` to properly manage BIO objects. This issue could potentially be exploited to
    cause memory leaks or other undefined behavior. Always use proper resource management functions
    when handling BIO objects in OpenSSL.
  severity: ERROR
  metadata:
    source-url: github.com/openssl/openssl/commit/cd30f03ac5bf2962f44bd02ae8d88245dff2f12c
    category: security
    cwe:
    - 'CWE-401: Missing Release of Resource after Effective Lifetime'
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-openssl-e1b568dd
  patterns:
  - pattern: |
      if ($COND) {
          ssl_fill_hello_random($S, $FLAGS, $P, sizeof($S->s3->client_random));
      }
  - pattern-not: |
      if ($COND && ssl_fill_hello_random($S, $FLAGS, $P, sizeof($S->s3->client_random)) <= 0) {
          goto err;
      }
  languages:
  - c
  message: |
    The code does not check the return value of `ssl_fill_hello_random`, which could lead to uninitialized or predictable random values. This is dangerous because predictable random values can compromise the security of the SSL/TLS handshake. Always check the return value of cryptographic functions and handle errors appropriately.
  severity: ERROR
  metadata:
    source-url: github.com/openssl/openssl/commit/e1b568dd2462f7cacf98f3d117936c34e2849a6b
