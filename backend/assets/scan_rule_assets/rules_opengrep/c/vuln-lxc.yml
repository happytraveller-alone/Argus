rules:
- id: vuln-lxc-5c3fcae7
  patterns:
  - pattern: |
      if (($OPTIONS->namespaces & $CLONE_NEWNS) && ($OPTIONS->attach_flags & $LXC_ATTACH_LSM)) {
        ...
        $RET = lsm_process_label_set($INIT_CTX->lsm_label, $INIT_CTX->container->lxc_conf, 0, $ON_EXEC);
        ...
      }
  languages:
  - c
  message: |
    The code fails to check if the LSM label is set before attempting to set it, which can lead to null pointer dereference or unexpected behavior. This vulnerability was fixed by adding a check for `init_ctx->lsm_label` before calling `lsm_set_label_at`. Ensure that the LSM label is properly initialized before attempting to set it.
  severity: ERROR
  metadata:
    source-url: github.com/lxc/lxc/commit/5c3fcae78b63ac9dd56e36075903921bd9461f9e
    category: security
    cwe:
    - CWE-476
    owasp:
    - A8-Insecure Deserialization
    references:
    - https://cwe.mitre.org/data/definitions/476.html
    technology:
    - c
- id: vuln-lxc-72cf81f6
  patterns:
  - pattern: |
      snprintf($DEST, $LEN, "%s/lock/lxc/%s", $RUNDIR, $P)
  - pattern-not: |
      snprintf($DEST, $LEN, "%s/lxc/lock/%s", $RUNDIR, $P)
  languages:
  - c
  message: |
    The lock file path construction is vulnerable due to incorrect directory structure. This could lead to security issues such as lock file collisions or privilege escalation. Ensure the correct directory structure is used by replacing "/lock/lxc/" with "/lxc/lock/".
  severity: ERROR
  metadata:
    source-url: github.com/lxc/lxc/commit/72cf81f6a3404e35028567db2c99a90406e9c6e6
    category: security
    cwe:
    - CWE-59
    owasp:
    - A1: Injection
    references:
    - https://cwe.mitre.org/data/definitions/59.html
    technology:
    - c
