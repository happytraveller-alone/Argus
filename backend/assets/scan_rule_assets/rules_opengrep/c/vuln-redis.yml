rules:
- id: vuln-redis-01173bc8
  patterns:
  - pattern: |
      getnum($FMT, $DF)
  - pattern-not: |
      getnum($L, $FMT, $DF)
  languages:
  - c
  message: |
    Detected unsafe use of getnum() without lua_State parameter, which can lead to integer overflow vulnerabilities. The function does not perform proper bounds checking, which could result in undefined behavior or security issues. Always use the updated version of getnum() that includes the lua_State parameter and performs overflow checks.
  severity: ERROR
  metadata:
    source-url: github.com/antirez/redis/commit/01173bc8097391b2e46c4d56a080709c219fda53
    category: security
    cwe:
    - CWE-190
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/190.html
    technology:
    - c
- id: vuln-redis-0bf90d94
  patterns:
  - pattern: |
      static void *getMcontextEip(ucontext_t *uc) {
        ...
        return (void*) $EXPRESSION;
        ...
      }
  - pattern-not: |
      static void* getAndSetMcontextEip(ucontext_t *uc, void *eip) {
        ...
        GET_SET_RETURN($EXPRESSION, eip);
        ...
      }
  languages:
  - c
  message: |
    Direct return of instruction pointer from ucontext_t without proper validation can lead to crashes when accessing invalid addresses.
    This vulnerability occurs when the instruction pointer (eip/rip) is directly returned without checking if it points to a valid memory location, potentially causing crashes when logging stack traces.
    The fix involves using a safer function (getAndSetMcontextEip) that allows validation and modification of the instruction pointer before returning it.
  severity: ERROR
  metadata:
    source-url: github.com/redis/redis/commit/0bf90d944313919eb8e63d3588bf63a367f020a3
    category: security
    cwe:
    - CWE-125
    - CWE-787
    owasp:
    - 'A1: Injection'
    references:
    - https://en.wikipedia.org/wiki/Instruction_pointer
    - https://man7.org/linux/man-pages/man3/getcontext.3.html
    technology:
    - c
- id: vuln-redis-12b5ff10
  patterns:
  - pattern: |
      int $VAR[HLL_Q+2] = {0};
  - pattern-not: |
      int $VAR[64] = {0};
  languages:
  - c
  message: |
    The array `reghisto` was originally declared with a size of `HLL_Q+2`, which could lead to buffer overflows if the input exceeds this size. This vulnerability can result in memory corruption and potential security exploits. To fix this, the array should be declared with a safe size, such as 64, to handle all possible inputs without overflow.
  severity: ERROR
  metadata:
    source-url: github.com/antirez/redis/commit/12b5ff109508c2a192f700c7738da7e7f09670f1
    category: security
    cwe:
    - 'CWE-120: Buffer Copy without Checking Size of Input (''Classic Buffer Overflow'')'
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-redis-15c078df
  patterns:
  - pattern: |
      asyncCloseClientOnOutputBufferLimitReached($C);
  - pattern-not: |
      closeClientOnOutputBufferLimitReached($C, $ASYNC);
  languages:
  - c
  message: |
    The function `asyncCloseClientOnOutputBufferLimitReached` has been replaced with `closeClientOnOutputBufferLimitReached` to handle client closure more safely. The old function did not provide control over whether the client should be closed immediately or asynchronously, which could lead to unsafe client handling. Use `closeClientOnOutputBufferLimitReached` with an appropriate `async` parameter to ensure safe client closure.
  severity: ERROR
  metadata:
    source-url: github.com/antirez/redis/commit/15c078df61985c76944995bfcb94c1c391c1a46d
    category: security
    cwe:
    - CWE-362
    owasp:
    - A09:2021-Security Logging and Monitoring Failures
    references:
    - https://github.com/antirez/redis/commit/15c078df61985c76944995bfcb94c1c391c1a46d
    technology:
    - c
- id: vuln-redis-1dc89e2d
  patterns:
  - pattern: |
      addReply($CLIENT, $HDR[$LL])
  - pattern-not: |
      addReplyProto($CLIENT, $HDR[$LL]->ptr, $HDR_LEN)
  languages:
  - c
  message: |
    The function `addReply` is being used to send a response header directly, which can lead to potential vulnerabilities due to incorrect handling of the response length. This can cause issues with protocol compliance and buffer overflows. Use `addReplyProto` instead, which explicitly handles the length of the response to ensure proper protocol handling.
  severity: ERROR
  metadata:
    source-url: github.com/redis/redis/commit/1dc89e2d0230f4bcadf21ee8185b79a12b001cf0
    category: security
    cwe:
    - CWE-120
    owasp:
    - 'A2: Broken Authentication'
    references:
    - https://redis.io/topics/protocol
    technology:
    - c
- id: vuln-redis-1ddecf19
  patterns:
  - pattern: |
      uint32_t *$LCS = zmalloc((size_t)($ALEN+1)*($BLEN+1)*sizeof(uint32_t));
  - pattern-not: |
      unsigned long long $LCS_SIZE = (unsigned long long)($ALEN+1)*($BLEN+1);
      unsigned long long $LCS_ALLOC = $LCS_SIZE * sizeof(uint32_t);
      uint32_t *$LCS = NULL;
      if ($LCS_ALLOC < SIZE_MAX && $LCS_ALLOC / $LCS_SIZE == sizeof(uint32_t))
        $LCS = ztrymalloc($LCS_ALLOC);
      if (!$LCS) {
        addReplyError($C, "Insufficient memory");
        goto cleanup;
      }
  languages:
  - c
  message: |
    Potential integer overflow vulnerability in memory allocation.
    The original code directly multiplies the length of two strings without checking for overflow, which could lead to a buffer overflow.
    The fix introduces checks to ensure the allocation size does not overflow and uses a larger data type for the calculation.
    To fix this, always validate the size of memory allocations and use appropriate data types to prevent overflow.
  severity: ERROR
  metadata:
    source-url: github.com/antirez/redis/commit/1ddecf1958924b178b76a31d989ef1e05af81964
    category: security
    cwe:
    - CWE-190
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/190.html
    technology:
    - c
- id: vuln-redis-39feee8e
  patterns:
  - pattern: |
      robj *$O = lookupKeyWriteOrReply($C, $C->argv[1], shared.null[$C->resp]);
  - pattern-not: |
      robj *$O = lookupKeyWriteOrReply($C, $C->argv[1], $HASCOUNT ? shared.nullarray[$C->resp] : shared.null[$C->resp]);
  languages:
  - c
  message: |
    Detected a potential vulnerability where the response type is not correctly handled based on the presence of a count parameter. This could lead to incorrect or unsafe behavior in the Redis list operations. The fix involves using a conditional check to determine the appropriate response type (nullarray or null) based on whether a count parameter is present.
  severity: ERROR
  metadata:
    source-url: github.com/redis/redis/commit/39feee8e3a6fee885aee60672a9d9de0dfd08896c
    category: security
    cwe:
    - CWE-20
    owasp:
    - A03:2021-Injection
    technology:
    - c
- id: vuln-redis-5674b005
  patterns:
  - pattern: |
      int $AUTH_REQUIRED = (!(DefaultUser->flags & USER_FLAG_NOPASS) ||
                            (DefaultUser->flags & USER_FLAG_DISABLED)) &&
                          !$C->authenticated;
      if ($AUTH_REQUIRED) {
          ...
      }
  - pattern-not: |
      if (authRequired($C)) {
          ...
      }
  languages:
  - c
  message: |
    Insecure authentication check detected. The authentication logic is duplicated and may lead to inconsistencies. Use the centralized `authRequired` function instead to ensure consistent authentication checks across the codebase. This vulnerability could allow unauthenticated access to sensitive operations.
  severity: ERROR
  metadata:
    source-url: github.com/redis/redis/commit/5674b0057ff2903d43eaff802017eddf37c360f8
    category: security
    cwe:
    - 'CWE-287: Improper Authentication'
    owasp:
    - 'A2: Broken Authentication'
    references:
    - https://redis.io/topics/security
    technology:
    - c
- id: vuln-redis-599e59eb
  patterns:
  - pattern: |
      ASSERT_NO_SIZE_OVERFLOW($SIZE);
  - pattern-not: |
      if ($SIZE >= SIZE_MAX/2) return NULL;
      if ($SIZE >= SIZE_MAX/2) zmalloc_oom_handler($SIZE);
      if ($SIZE >= SIZE_MAX/2) {
          zfree($PTR);
          if ($USABLE) *$USABLE = 0;
          return NULL;
      }
  languages:
  - c
  message: |
    The code uses an assertion to check for size overflow, which is insufficient for handling potential integer overflows during memory allocation. This can lead to security vulnerabilities such as buffer overflows or memory corruption. Instead, explicitly check for overflow conditions and handle them appropriately by returning NULL or invoking an out-of-memory handler.
  severity: ERROR
  metadata:
    source-url: github.com/redis/redis/commit/599e59ebc57283f52c60a8de56ec5f44d053109a
    category: security
    cwe:
    - CWE-190
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/190.html
    technology:
    - c
- id: vuln-redis-697af434
  patterns:
  - pattern: |
      server.vm_enabled
  - pattern-not: |
      server.ds_enabled
  languages:
  - c
  message: |
    Detected usage of deprecated `vm_enabled` variable, which has been replaced by `ds_enabled`. This could lead to incorrect behavior or security vulnerabilities due to outdated memory management logic. Update the code to use `ds_enabled` instead.
  severity: ERROR
  metadata:
    source-url: github.com/antirez/redis/commit/697af434fbeb2e3ba2ba9687cd283ed1a2734fa5
    category: security
    cwe:
    - CWE-477
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    references:
    - https://github.com/antirez/redis/commit/697af434fbeb2e3ba2ba9687cd283ed1a2734fa5
    technology:
    - c
- id: vuln-redis-6ac3c0b7
  patterns:
  - pattern: |
      sds *$FUNC(int *$ARGC) {
          ...
          $P = strstr($P,"\r\n");
          if (!$P) goto $LABEL;
          ...
      }
  - pattern-not: |
      sds *$FUNC(int *$ARGC, char** $ERR) {
          ...
          $P = strstr($P,"\r\n");
          if (!$P) goto $LABEL;
          ...
      }
  languages:
  - c
  message: |
    The function `ldbReplParseCommand` is vulnerable to a protocol error due to insufficient error handling.
    The original version did not properly handle cases where the input buffer was incomplete, leading to potential protocol errors.
    This could be exploited by an attacker to cause undefined behavior or crashes.
    The fix introduces proper error handling by using an additional `err` parameter to manage protocol errors and ensures the function handles incomplete buffers correctly.
  severity: ERROR
  metadata:
    source-url: github.com/redis/redis/commit/6ac3c0b7abd35f37201ed2d6298ecef4ea1ae1dd
    category: security
    cwe:
    - 'CWE-20: Improper Input Validation'
    owasp:
    - 'A6: Security Misconfiguration'
    technology:
    - c
- id: vuln-redis-6d9f8e24
  patterns:
  - pattern: |
      if (getClientTypeByName($VAR) == -1) {
        ...
      }
  - pattern-not: |
      if (getClientTypeByName($VAR) == -1 || getClientTypeByName($VAR) == CLIENT_TYPE_MASTER) {
        ...
      }
  languages:
  - c
  message: |
    The code does not properly handle the case where the client type is 'master', which has no buffer limits. This can lead to incorrect client limit enforcement. To fix this, ensure that the condition checks for both invalid client types and the 'master' type explicitly.
  severity: ERROR
  metadata:
    source-url: github.com/antirez/redis/commit/6d9f8e2462fc2c426d48c941edeb78e5df7d2977
    category: security
    cwe:
    - CWE-20
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/20.html
    technology:
    - c
- id: vuln-redis-71536684
  patterns:
  - pattern: |
      FILE *$FP = fopen($FILENAME, "w");
  - pattern-not: |
      mode_t $OLD_UMASK = umask($MODE);
      FILE *$FP;
      $FP = fopen($FILENAME, "w");
      umask($OLD_UMASK);
      chmod($FILENAME, $PERMISSIONS);
  languages:
  - c
  message: |
    Detected insecure file creation without proper permissions. This can lead to
    security vulnerabilities where sensitive files are created with overly permissive
    access rights, allowing unauthorized users to read or modify them. To fix this,
    use umask to restrict permissions during file creation and explicitly set
    appropriate permissions with chmod.
  severity: ERROR
  metadata:
    source-url: github.com/antirez/redis/commit/71536684a788dc859e42132a2c5a2b7373414375
    category: security
    cwe:
    - 'CWE-276: Incorrect Default Permissions'
    owasp: A05:2021 - Security Misconfiguration
    technology:
    - c
- id: vuln-redis-79f089bd
  patterns:
  - pattern: |
      createSentinelAddr($HOSTNAME, $PORT)
  - pattern-not: |
      createSentinelAddr($HOSTNAME, $PORT, $IS_ACCEPT_UNRESOLVED)
  languages:
  - c
  message: |
    The function `createSentinelAddr` is called without the `is_accept_unresolved` parameter, which can lead to unresolved hostname issues. This can cause the function to return NULL when it fails to resolve the hostname, potentially leading to unexpected behavior or crashes. The fix includes adding the `is_accept_unresolved` parameter to control whether unresolved hostnames are accepted.
  severity: ERROR
  metadata:
    source-url: github.com/redis/redis/commit/79f089bdd92348d5fa3965258f539752f2eb8e78
    category: security
    cwe:
    - CWE-20
    owasp:
    - 'A1: Injection'
    references:
    - https://github.com/redis/redis/commit/79f089bdd92348d5fa3965258f539752f2eb8e78
    technology:
    - c
- id: vuln-redis-874804da
  patterns:
  - pattern: |
      if ($C->flags & CLIENT_CLOSE_AFTER_REPLY) break;
  - pattern-not: |
      if ($C->flags & (CLIENT_CLOSE_AFTER_REPLY|CLIENT_CLOSE_ASAP)) break;
  languages:
  - c
  message: |
    Detected a missing check for CLIENT_CLOSE_ASAP flag in Redis networking code. This vulnerability could allow cross-protocol scripting attacks where an attacker sends HTTP commands (like POST or Host:) to Redis, potentially compromising the instance. The fix involves adding a check for the CLIENT_CLOSE_ASAP flag to terminate connections immediately when such commands are detected.
  severity: ERROR
  metadata:
    source-url: github.com/antirez/redis/commit/874804da0c014a7d704b3d285aa500098a931f50
    category: security
    cwe:
    - CWE-113
    owasp:
    - 'A1: Injection'
    references:
    - https://redis.io/topics/security
    technology:
    - c
- id: vuln-redis-875a1f07
  patterns:
  - pattern: |
      preventCommandLogging($C);
  - pattern-not: |
      redactClientCommandArgument($C, $ARG);
  languages:
  - c
  message: |
    The use of `preventCommandLogging` can lead to information leakage as it only prevents logging without redacting sensitive information. Replace it with `redactClientCommandArgument` to properly redact sensitive data.
  severity: ERROR
  metadata:
    source-url: github.com/antirez/redis/commit/875a1f07d821dc5abe737b064018a27bbc7175d2
    category: security
    cwe:
    - CWE-200
    owasp:
    - A3:2017-Sensitive Data Exposure
    technology:
    - c
- id: vuln-redis-9f63e75a
  patterns:
  - pattern: |
      getnum($FMT, $DF)
  - pattern-not: |
      getnum($L, $FMT, $DF)
  languages:
  - c
  message: |
    Detected a call to `getnum` without the `lua_State` parameter, which can lead to integer overflow vulnerabilities. This is dangerous because it can cause undefined behavior, crashes, or security exploits. Always include the `lua_State` parameter to enable proper error handling for integer overflow checks.
  severity: ERROR
  metadata:
    source-url: github.com/redis/redis/commit/9f63e75a07e73f40fec72ef83545f6e7f0438e90
    category: security
    cwe:
    - CWE-190
    owasp:
    - A9:2021-Security Logging and Monitoring Failures
    references:
