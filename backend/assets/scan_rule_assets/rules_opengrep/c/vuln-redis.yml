    technology:
    - c
- id: vuln-redis-a4b90be9
  patterns:
  - pattern: |
      int reghisto[$X+2] = {0};
  - pattern-not: |
      int reghisto[64] = {0};
  languages:
  - c
  message: |
    The array 'reghisto' is declared with a size that could lead to buffer overflow vulnerabilities.
    The size should be fixed to a safe value (e.g., 64) to prevent potential overflows that could write data to incorrect memory locations.
    This vulnerability is dangerous because it could lead to memory corruption, crashes, or even arbitrary code execution.
    To fix this, ensure the array size is set to a safe, fixed value that accommodates all possible input scenarios.
  severity: ERROR
  metadata:
    source-url: github.com/redis/redis/commit/a4b90be9fcd5e1668ac941cabce3b1ab38dbe326
    category: security
    cwe:
    - CWE-120
    - CWE-787
    owasp: 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    - https://cwe.mitre.org/data/definitions/787.html
    technology:
    - c
- id: vuln-redis-aa856b39
  patterns:
  - pattern: |
      lua_pushstring($LUA, $ERR);
      lua_error($LUA);
  - pattern-not: |
      luaPushError($LUA, $ERR);
      luaError($LUA);
  languages:
  - c
  message: |
    Direct use of `lua_pushstring` followed by `lua_error` can lead to inconsistent error handling and potential security issues.
    The vulnerability arises because the error message is not properly formatted and doesn't include necessary metadata.
    Instead, use `luaPushError` and `luaError` which properly format the error message and include additional context like source and line number.
  severity: ERROR
  metadata:
    source-url: github.com/redis/redis/commit/aa856b39f2ca65dbcc0eaae2d2c52f7a35291bbf
    category: security
    cwe:
    - CWE-209
    - CWE-248
    owasp:
    - A9:2017-Using Components with Known Vulnerabilities
    technology:
    - c
- id: vuln-redis-b099889a
  patterns:
  - pattern: |
      $VAR = callReplyCreate($PROTO, $CTX);
  - pattern-not: |
      $VAR = callReplyCreate($PROTO, $ERROR_LIST, $CTX);
  languages:
  - c
  message: |
    The function `callReplyCreate` is missing the `deferred_error_list` parameter, which can lead to unhandled error propagation and potential memory leaks. This vulnerability can cause incorrect error handling and statistics in Redis. To fix this, ensure that the `deferred_error_list` parameter is passed to `callReplyCreate` and properly managed.
  severity: ERROR
  metadata:
    source-url: github.com/redis/redis/commit/b099889a3a6dccf5243135f0611b8cdb11cab7b8
    category: security
    cwe:
    - CWE-401
    - CWE-664
    owasp: 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-redis-c9928576
  patterns:
  - pattern: |
      createLongLongConfig("proto-max-bulk-len", NULL, MODIFIABLE_CONFIG, 1024*1024, LLONG_MAX, $VAR, 512ll*1024*1024, MEMORY_CONFIG, NULL, NULL)
  - pattern-not: |
      createLongLongConfig("proto-max-bulk-len", NULL, MODIFIABLE_CONFIG, 1024*1024, LONG_MAX, $VAR, 512ll*1024*1024, MEMORY_CONFIG, NULL, NULL)
  languages:
  - c
  message: |
    The vulnerability involves the use of `LLONG_MAX` instead of `LONG_MAX` for the `proto-max-bulk-len` configuration parameter. This can lead to integer overflow issues, especially on systems where `LLONG_MAX` exceeds the expected range for memory allocation. This could result in undefined behavior, crashes, or security vulnerabilities. The fix replaces `LLONG_MAX` with `LONG_MAX` to ensure the value stays within a safe range.
  severity: ERROR
  metadata:
    source-url: github.com/antirez/redis/commit/c992857618db99776917f10bf4f2345a5fdc78b0
    category: security
    cwe:
    - CWE-190
    owasp: A9:2017-Using Components with Known Vulnerabilities
    technology:
    - c
- id: vuln-redis-e216ceaf
  patterns:
  - pattern: |
      if (($RUNLEN + $IDX) > HLL_REGISTERS) {
          ...
          return C_ERR;
      }
  - pattern-not: |
      if (($RUNLEN + $IDX) > HLL_REGISTERS) break;
  languages:
  - c
  message: |
    Detected a potential integer overflow vulnerability in Redis. The original code
    returns an error when an overflow condition is detected, but this can lead to
    undefined behavior or security issues. The fix replaces the error return with
    a break statement to properly handle the overflow condition. This vulnerability
    could be exploited to cause unexpected behavior or crashes in the application.
    To fix this, ensure that overflow conditions are handled gracefully by breaking
    out of the loop or using appropriate boundary checks.
  severity: ERROR
  metadata:
    source-url: github.com/antirez/redis/commit/e216ceaf0e099536fe3658a29dcb725d812364e0
    category: security
    cwe:
    - CWE-190
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/190.html
    technology:
    - c
- id: vuln-redis-e89086e0
  patterns:
  - pattern: |
      size_t $POS = luaL_optinteger($L, $ARG, 1) - 1;
      ...
      luaL_argcheck($L, $POS + $SIZE <= $LD, $ARG2, "data string too short");
  - pattern-not: |
      size_t $POS = luaL_optinteger($L, $ARG, 1);
      luaL_argcheck($L, $POS > 0, $ARG, "offset must be 1 or greater");
      $POS--;
      ...
      luaL_argcheck($L, $SIZE <= $LD && $POS <= $LD - $SIZE, $ARG2, "data string too short");
  languages:
  - c
  message: |
    The code contains a potential integer underflow vulnerability due to incorrect offset calculation.
    When `luaL_optinteger` returns a value less than 1, subtracting 1 can cause an underflow, leading to memory corruption or crashes.
    The fix includes a check to ensure the offset is greater than 0 before subtraction and corrects the bounds checking logic.
    To fix this, ensure the offset is validated before subtraction and use proper bounds checking.
  severity: ERROR
  metadata:
    source-url: github.com/antirez/redis/commit/e89086e09a38cc6713bcd4b9c29abf92cf393936
    category: security
    cwe:
    - 'CWE-191: Integer Underflow (Wrap or Wraparound)'
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/191.html
    technology:
    - c
- id: vuln-redis-ef1833b3
  patterns:
  - pattern: |
      if (($RUNLEN + $IDX) > HLL_REGISTERS) {
          $ACTION;
          return C_ERR;
      }
  - pattern-not: |
      if (($RUNLEN + $IDX) > HLL_REGISTERS) break;
  languages:
  - c
  message: |
    A potential buffer overflow vulnerability exists in the code. The check for overflow returns an error but does not break the loop, which could lead to undefined behavior or memory corruption. Instead of returning an error, the loop should be terminated using a 'break' statement to prevent further execution that could cause overflow.
  severity: ERROR
  metadata:
    source-url: github.com/redis/redis/commit/ef1833b3f9d02261617b757fd6ebe0ec3f1be507
    category: security
    cwe:
    - CWE-120
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
    - c
- id: vuln-redis-f613873d
  patterns:
  - pattern: |
      ($D->ht[1].size / $D->ht[0].size < $RATIO)
  - pattern-not: |
      (($S1 > $S0 && $S1 / $S0 < $RATIO) || ($S1 < $S0 && $S0 / $S1 < $RATIO))
  languages:
  - c
  message: |
    The vulnerability involves a division operation that could lead to incorrect behavior when the size of the first hash table is smaller than the second. This could cause incorrect resizing decisions in the dictionary, potentially leading to performance issues or unexpected behavior. The fix ensures that the ratio is checked in both directions, preventing incorrect resizing decisions.
  severity: ERROR
  metadata:
    source-url: github.com/redis/redis/commit/f613873de02340f70abcc606b5fa59caebb076f3
    category: security
    cwe:
