rules:
- id: vuln-libtiff-3ca657a8
  patterns:
  - pattern: |
      static void $FUNC(TIFF* $TIFF, uint8* $CP0, tmsize_t $CC) {
        ...
        assert(($CC%$STRIDE)==0);
        ...
      }
  - pattern-not: |
      static int $FUNC(TIFF* $TIFF, uint8* $CP0, tmsize_t $CC) {
        ...
        if(($CC%$STRIDE)!=0) {
          TIFFErrorExt($TIFF->tif_clientdata, "$FUNC", "%s", "($CC%$STRIDE)!=0");
          return 0;
        }
        ...
        return 1;
      }
  languages:
  - c
  message: |
    The function uses `assert` to validate input conditions, which can be disabled in production builds, leading to potential vulnerabilities.
    This can cause undefined behavior if the assertion fails in a production environment.
    Replace `assert` with proper error handling that returns an error code and logs the issue.
  severity: ERROR
  metadata:
    source-url: github.com/vadz/libtiff/commit/3ca657a8793dd011bf869695d72ad31c779c3cc1
    category: security
    cwe:
    - CWE-617
    owasp:
    - A10:2021 - Server-Side Request Forgery
    references:
    - https://cwe.mitre.org/data/definitions/617.html
    technology:
    - c
- id: vuln-libtiff-438274f9
  patterns:
  - pattern: |
      $STRIPSPERPLANE = (($TD->td_imagelength + $ROWSPERSTRIP - 1) / $ROWSPERSTRIP);
  - pattern-not: |
      $STRIPSPERPLANE = TIFFhowmany_32_maxuint_compat($TD->td_imagelength, $ROWSPERSTRIP);
  languages:
  - c
  message: |
    The vulnerability involves an integer overflow in the calculation of strips per plane in the TIFF library. The original calculation can lead to an overflow when td_imagelength and rowsperstrip are large, potentially causing memory corruption or other undefined behavior. The fix replaces the calculation with the TIFFhowmany_32_maxuint_compat function, which safely handles the division. To fix this, replace the vulnerable calculation with the safe function.
  severity: ERROR
  metadata:
    source-url: https://github.com/vadz/libtiff/commit/438274f938e046d33cb0e1230b41da32ffe223e1
    category: security
    cwe:
    - CWE-190
    owasp:
    - A9:2017-Using Components with Known Vulnerabilities
    technology:
    - c
- id: vuln-libtiff-4f020c28
  patterns:
  - pattern: |
      TIFFClose($IN);
      return (-1);
  - pattern-not: |
      goto $ERROR;
      ...
      $ERROR:
        if ($IN)
          TIFFClose($IN);
        return (-1);
  languages:
  - c
  message: |
    Detected a potential resource leak vulnerability where TIFF file handles are not properly cleaned up in error paths. This can lead to resource exhaustion and undefined behavior. The issue was fixed by using a centralized error handling block with proper cleanup. Ensure all resources are properly freed in error paths.
  severity: ERROR
  metadata:
    source-url: github.com/vadz/libtiff/commit/4f020c28a8374f26b2796900cdd805f3988a176b
    category: security
    cwe:
    - CWE-772
    owasp: A9:2021 - Security Logging and Monitoring Failures
    technology:
    - c
- id: vuln-libtiff-5c080298
  patterns:
  - pattern: |
      (void) TIFFGetField($IN, TIFFTAG_PLANARCONFIG, &$VAR);
  - pattern-not: |
      (void) TIFFGetFieldDefaulted($IN, TIFFTAG_PLANARCONFIG, &$VAR);
  languages:
  - c
  message: |
    The function TIFFGetField is used without a default value check, which can lead to undefined behavior if the field is not present. This vulnerability can cause the application to crash or behave unexpectedly. Use TIFFGetFieldDefaulted instead to ensure a default value is provided when the field is missing.
  severity: ERROR
  metadata:
    source-url: github.com/vadz/libtiff/commit/5c080298d59efa53264d7248bbe3a04660db6ef7
    category: security
    cwe:
    - CWE-476
    owasp: 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-libtiff-6a984bf7
  patterns:
  - pattern: |
      uint8 *$VAR = (uint8 *)_TIFFmalloc($SIZE);
  - pattern-not: |
      uint8 *$VAR;
      $VAR = (uint8 *)_TIFFmalloc($SIZE);
  languages:
  - c
  message: |
    The code directly assigns the result of _TIFFmalloc to a variable declaration
    without proper error handling or separation of declaration and initialization.
    This can lead to memory management issues and potential vulnerabilities if
    the allocation fails. To fix this, separate the declaration and initialization,
    and ensure proper error handling is in place.
  severity: ERROR
  metadata:
    source-url: github.com/vadz/libtiff/commit/6a984bf7905c6621281588431f384e79d11a2e33
    category: security
    cwe:
    - CWE-665
    - CWE-401
    owasp: 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-libtiff-b6af137b
  patterns:
  - pattern: |
      assert($VAR <= 0xFFFFFFFFUL);
  - pattern-not: |
      if($VAR > 0xFFFFFFFFUL) {
          TIFFErrorExt($TIF->tif_clientdata, $MODULE, "Illegal value for SubIFD tag");
          _TIFFfree($O);
          return(0);
      }
  languages:
  - c
  message: |
    The code uses an assert statement to check if a value is within the 32-bit range, which can be optimized out in release builds, leading to potential security vulnerabilities. Instead, proper error handling should be implemented to ensure the value is validated at runtime. This vulnerability could allow an attacker to pass illegal values that bypass the assert check, potentially leading to undefined behavior or crashes.
  severity: ERROR
  metadata:
    source-url: github.com/vadz/libtiff/commit/b6af137bf9ef852f1a48a50a5afb88f9e9da01cc
    category: security
    cwe:
    - CWE-617
    owasp:
    - 'A9: Security Misconfiguration'
    references:
    - https://cwe.mitre.org/data/definitions/617.html
    technology:
    - c
- id: vuln-libtiff-d6033205
  patterns:
  - pattern: |
      $VAR = (uint8*) _TIFFmalloc($SIZE);
  - pattern-not: |
      $VAR = (uint8*) _TIFFcalloc(1, $SIZE);
  languages:
  - c
  message: |
    Detected use of _TIFFmalloc without initialization, which can lead to uninitialized memory buffers. This is dangerous because it can expose sensitive data or cause undefined behavior if the buffer is read before being written. Use _TIFFcalloc instead to ensure the memory is zero-initialized.
  severity: ERROR
  metadata:
    source-url: github.com/vadz/libtiff/commit/d60332057b9575ada4f264489582b13e30137be1
    category: security
    cwe:
    - CWE-908
    owasp:
    - A3:2017-Sensitive Data Exposure
    references:
    - http://bugzilla.maptools.org/show_bug.cgi?id=2651
    technology:
    - c
- id: vuln-libtiff-d6d2c174
  patterns:
  - pattern: |
      $BUF = (unsigned char *)_TIFFmalloc(($ALPHA?4:3)*$SIZE);
      ...
      _TIFFmemset($BUF, 0, ($ALPHA?4:3)*$SIZE);
  - pattern-not: |
      $BUFSIZE = TIFFSafeMultiply(tsize_t, $ALPHA?4:3, $SIZE);
      ...
      $BUF = (unsigned char *)_TIFFmalloc($BUFSIZE);
      ...
      _TIFFmemset($BUF, 0, $BUFSIZE);
  languages:
  - c
  message: |
    Detected a potential integer overflow vulnerability in memory allocation.
    Direct multiplication of ($ALPHA?4:3)*$SIZE can lead to integer overflow, causing insufficient memory allocation.
    Use TIFFSafeMultiply to safely calculate the buffer size and check for overflow before allocation.
  severity: ERROR
  metadata:
    source-url: github.com/vadz/libtiff/commit/d6d2c17478b4c36a3bc5f86b970c0060e2f77282
    category: security
    cwe:
    - CWE-190
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
