rules:
- id: vuln-core-000030fe
  pattern: "$RET = var_expand($PATH, $KEY->key->key, $TABLE, &$ERROR);\nif ($RET <= 0) {\n  auth_request_log_error($AUTH,\
    \ $SUBSYS, \"Failed to expand key %s: %s\", $KEY->key->key, $ERROR);\n  return -1;\n}\n"
  pattern-not: 'str_append($PATH, $KEY->key->key);

    '
  languages:
  - c
  message: 'The use of `var_expand` without proper input validation can lead to security vulnerabilities such as path traversal
    or command injection. This is dangerous because it allows attackers to manipulate the path or key values, potentially
    leading to unauthorized access or other malicious activities. The fix involves directly appending the key value using
    `str_append` without expansion.

    '
  severity: ERROR
  metadata:
    source-url: github.com/dovecot/core/commit/000030feb7a30f193197f1aab8a7b04a26b42735
    category: security
    cwe:
    - CWE-20
    - CWE-22
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-core-00df2308
  pattern: "if ($VAR != NULL) {\n  str_printfa($CMD, \"\\ttag=%s\", $VAR);\n}\n"
  pattern-not: "if ($VAR != NULL) {\n  str_append($CMD, \"\\ttag=\");\n  str_append_tabescaped($CMD, $VAR);\n}\n"
  languages:
  - c
  message: "Detected use of str_printfa without proper escaping, which can lead to injection vulnerabilities. \nThe tag value\
    \ should be properly escaped using str_append_tabescaped to prevent any malicious input from being interpreted as part\
    \ of the command.\nTo fix this, replace str_printfa with str_append and str_append_tabescaped for secure string handling.\n"
  severity: ERROR
  metadata:
    source-url: github.com/dovecot/core/commit/00df2308b0733e810824545183d73276c416cdd3
    category: security
    cwe:
    - CWE-116
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/116.html
    technology:
    - c
- id: vuln-core-2c3f3767
  pattern: 'tab[$IDX].value = $FUNC(auth_request->user, $ARGS);

    '
  pattern-not: '$USERNAME = auth_request->user != NULL ? auth_request->user : "";

    tab[$IDX].value = $FUNC($USERNAME, $ARGS);

    '
  languages:
  - c
  message: 'Direct usage of auth_request->user without null-check can lead to null pointer dereference.

    This is dangerous as it can cause crashes or undefined behavior when auth_request->user is NULL.

    Fix by checking for NULL and using a fallback value.

    '
  severity: ERROR
  metadata:
    source-url: github.com/dovecot/core/commit/2c3f37672277b1f73f84722802aaa0ab1ab3e413
    category: security
    cwe:
    - CWE-476
    owasp:
    - A9:2017-Using Components with Known Vulnerabilities
    technology:
    - c
- id: vuln-core-321c3397
  pattern: "while (!$CONN->closing && $RET != 0) {\n  ...\n}\n"
  pattern-not: "while (!$CONN->closing && !$CONN->input_locked && $RET != 0) {\n  ...\n}\n"
  languages:
  - c
  message: 'Detected a potential STARTTLS command insertion vulnerability. The code allows processing commands without checking
    if the input is locked, which can lead to command injection after a STARTTLS command. To fix this, ensure that the input
    is locked when processing commands after STARTTLS.

    '
  severity: ERROR
  metadata:
    source-url: github.com/dovecot/core/commit/321c339756f9b2b98fb7326359d1333adebb5295
    category: security
    cwe:
    - CWE-77
    owasp:
    - A03:2021-Injection
    references:
    - https://www.ietf.org/rfc/rfc3207.txt
    technology:
    - c
- id: vuln-core-973769d7
  pattern: 'i_assert($BYTES > 0 && uni_is_valid_ucs4($CHR));

    json_append_escaped_ucs4($DEST, $CHR);

    $I += $BYTES;

    '
  pattern-not: "if ($BYTES > 0 && uni_is_valid_ucs4($CHR)) {\n  json_append_escaped_ucs4($DEST, $CHR);\n  $I += $BYTES;\n\
    } else {\n  str_append_data($DEST, UNICODE_REPLACEMENT_CHAR_UTF8, UTF8_REPLACEMENT_CHAR_LEN);\n  $I++;\n}\n"
  languages:
  - c
  message: 'The code fails to handle invalid Unicode characters properly, which can lead to security vulnerabilities such
    as crashes or undefined behavior. The patch adds a check to ensure that only valid Unicode characters are processed, and
    invalid characters are replaced with a replacement character. To fix this, ensure that all Unicode characters are validated
    before processing and handle invalid characters appropriately.

    '
  severity: ERROR
  metadata:
    source-url: github.com/dovecot/core/commit/973769d74433de3c56c4ffdf4f343cb35d98e4f7
    category: security
    cwe:
    - 'CWE-20: Improper Input Validation'
    owasp:
    - A03:2021 - Injection
    technology:
    - c
- id: vuln-core-f904cbdf
  pattern: '(void)str_unescape($STR + $VAR - 1);

    '
  pattern-not: '(void)str_unescape($STR);

    '
  languages:
  - c
  message: 'Detected unsafe string unescaping with incorrect offset. This can lead to incorrect string manipulation and potential
    security vulnerabilities. The issue arises when using an offset to unescape a string, which may result in processing unintended
    memory locations. The fix removes the offset to ensure the entire string is properly unescaped.

    '
  severity: ERROR
  metadata:
    source-url: github.com/dovecot/core/commit/f904cbdfec25582bc5e2a7435bf82ff769f2526a
    category: security
    cwe:
    - CWE-119
    owasp: A9:2021-Security Misconfiguration
    references:
    - https://cwe.mitre.org/data/definitions/119.html
    technology:
    - c
- id: vuln-core-fb97a1cd
  pattern: "if ($CONDITION && !parse_too_many_nested_mime_parts($CTX)) {\n  ...\n}\n"
  pattern-not: "if ($CONDITION && !parse_too_many_nested_mime_parts($CTX) && $CTX->total_parts_count < $CTX->max_total_mime_parts)\
    \ {\n  ...\n}\n"
  languages:
  - c
  message: 'The code does not check the total number of MIME parts against the maximum allowed limit, which can lead to excessive
    resource consumption or denial of service. This vulnerability can be exploited by sending a specially crafted message
    with a large number of nested MIME parts. To fix this, ensure that the total number of MIME parts is checked against the
    maximum limit using `ctx->total_parts_count < ctx->max_total_mime_parts`.

    '
  severity: ERROR
  metadata:
    source-url: github.com/dovecot/core/commit/fb97a1cddbda4019e327fa736972a1c7433fedaa
    category: security
    cwe:
    - CWE-400
    owasp: 'A1: Injection'
    technology:
    - c
