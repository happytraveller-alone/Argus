rules:
- id: vuln-pillow-6a83e432
  patterns:
  - pattern: |
      if (strcmp($IM->mode, "1") == 0 && $STATE->xsize > $STATE->bytes * 8) {
          ...
      } else if (strcmp($IM->mode, "P") == 0 && $STATE->xsize > $STATE->bytes) {
          ...
      }
  - pattern-not: |
      if (($STATE->xsize * $STATE->bits + 7) / 8 > $STATE->bytes) {
          ...
      }
  languages:
  - c
  message: |
    This rule detects a vulnerability where the bounds checking for image decoding in the PCX format is insufficient. The original code only checks the bounds for specific image modes ("1" and "P") separately, which can lead to buffer overflows if the image data exceeds the allocated buffer size. The fix consolidates the bounds check by considering the bit depth and ensuring the total size of the image data does not exceed the allocated buffer. This vulnerability could be exploited to cause a crash or potentially execute arbitrary code. To fix this, ensure that the bounds check accounts for the bit depth and the total size of the image data.
  severity: ERROR
  metadata:
    source-url: github.com/python-pillow/Pillow/commit/6a83e4324738bb0452fbe8074a995b1c73f08de7
    category: security
    cwe:
    - CWE-120
    - CWE-125
    owasp: 'A1: Injection'
    technology:
    - c
- id: vuln-pillow-9a2c9f72
  patterns:
  - pattern: |
      return IMAGING_CODEC_MEMORY;
  - pattern-not: |
      state->errcode = IMAGING_CODEC_MEMORY;
      return -1;
  languages:
  - c
  message: |
    Directly returning error codes without setting the state->errcode can lead to inconsistent error handling and potential security vulnerabilities. Always set the error code in the state structure before returning an error value to ensure proper error tracking and handling.
  severity: ERROR
  metadata:
    source-url: github.com/python-pillow/Pillow/commit/9a2c9f722f78773e608d44710873437baf3f17d1
    category: security
    cwe:
    - CWE-703
    owasp:
    - A10:2021 - Server-Side Request Forgery
    references:
    - https://cwe.mitre.org/data/definitions/703.html
    technology:
    - c
- id: vuln-pillow-f6926a04
  patterns:
  - pattern: |
      if ($DATA + $OFFSET > $PTR + $BYTES) {
        ...
        return -1;
      }
  - pattern-not: |
      ERR_IF_DATA_OOB($OFFSET)
  languages:
  - c
  message: |
    Detected a potential out-of-bounds read vulnerability. This occurs when data is read without proper bounds checking, which can lead to memory corruption or information disclosure. The fix involves using a macro `ERR_IF_DATA_OOB` to ensure bounds checking is consistently applied. Always validate data offsets before accessing memory.
  severity: ERROR
  metadata:
    source-url: github.com/python-pillow/Pillow/commit/f6926a041b4b544fd2ced3752542afb6c8c19405
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    owasp:
    - 'A1: Injection'
    technology:
    - c
