rules:
- id: vuln-systemd-1dfa7e79
  patterns:
  - pattern: |
      void *$P;
      ...
      free($P);
  languages:
  - c
  message: |
    Detected unsafe memory management where a pointer is not automatically freed using `_cleanup_free_`.
    This can lead to memory leaks or use-after-free vulnerabilities if the pointer is not properly freed.
    Use `_cleanup_free_` to ensure automatic cleanup of allocated memory.
  severity: ERROR
  metadata:
    source-url: github.com/systemd/systemd/commit/1dfa7e79a60de680086b1d93fcc3629b463f58bd
    category: security
    cwe:
    - CWE-416
    - CWE-401
    owasp: 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-systemd-5de6cce5
  patterns:
  - pattern: |
      $FUNC = open($PATH, $FLAGS1|$FLAGS2|$FLAGS3|$FLAGS4|$FLAGS5|$FLAGS6);
  - pattern-not: |
      $FUNC = open($PATH, $FLAGS1|$FLAGS2|$FLAGS3|$FLAGS4|$FLAGS5);
  languages:
  - c
  message: |
    The use of O_NONBLOCK with O_DIRECTORY in open() can lead to race conditions and security vulnerabilities.
    This flag combination can cause the function to fail unexpectedly, especially in directory operations.
    Remove O_NONBLOCK from the flags when opening directories to ensure consistent behavior and avoid potential security issues.
  severity: ERROR
  metadata:
    source-url: github.com/systemd/systemd/commit/5de6cce58b3e8b79239b6e83653459d91af6e57c
    category: security
    cwe:
    - CWE-362
    owasp:
    - 'A1: Injection'
    references:
    - https://man7.org/linux/man-pages/man2/open.2.html
    technology:
    - c
- id: vuln-systemd-63748626
  patterns:
  - pattern: |
      if ($R < 0) {
          $R = sd_bus_reply_method_errno($REQUEST, $R, NULL);
          goto $FINISH;
      }
  - pattern-not: |
      if ($R < 0)
          goto $FAIL;
  languages:
  - c
  message: |
    The original code fails to properly handle asynchronous PolicyKit replies, leading to potential memory leaks and incorrect error handling. The patch introduces a deferred event source to clean up resources after the asynchronous operation completes. Ensure proper cleanup of resources in asynchronous operations to prevent memory leaks and improve error handling.
  severity: ERROR
  metadata:
    source-url: github.com/systemd/systemd/commit/637486261528e8aa3da9f26a4487dc254f4b7abb
    category: security
    cwe:
    - 'CWE-401: Improper Release of Memory Before Removing Last Reference'
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-systemd-fc3c1c6e
  patterns:
  - pattern: |
      strappend($PATH, "/X11/display")
  - pattern-not: |
      strappend($PATH, "/X11-display")
  languages:
  - c
  message: |
    Detected a potentially unsafe path concatenation using "/X11/display". This can lead to directory traversal vulnerabilities if the input is not properly sanitized. Use "/X11-display" instead to avoid creating nested directories that could be exploited.
  severity: ERROR
  metadata:
    source-url: github.com/systemd/systemd/commit/fc3c1c6e091ea16ad5600b145201ec535bbb5d7c
    category: security
    cwe: 'CWE-22: Improper Limitation of a Pathname to a Restricted Directory (''Path Traversal'')'
    owasp: 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/22.html
    technology:
    - c
