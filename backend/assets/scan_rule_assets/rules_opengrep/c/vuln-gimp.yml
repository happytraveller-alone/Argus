rules:
- id: vuln-gimp-03df8c6a
  patterns:
  - pattern: |
      gimp_export_image($IMAGE, $DRAWABLE, NULL, ...)
  - pattern-not: |
      gimp_export_image($IMAGE, $DRAWABLE, $FORMAT, ...)
  languages:
  - c
  message: |
    Detected use of NULL as the format parameter in gimp_export_image.
    This can lead to undefined behavior or security vulnerabilities.
    Always specify a valid format string to ensure proper handling of the export process.
  severity: ERROR
  metadata:
    source-url: github.com/GNOME/gimp/commit/03df8c6af4ec4e5d547e9fff46d0710b3c262c58
    category: security
    cwe:
    - CWE-476
    owasp: A9:2017-Using Components with Known Vulnerabilities
    technology:
    - c
- id: vuln-gimp-0474376d
  patterns:
  - pattern: |
      {
        $FDAT = fits_decode_card(fits_search_card($HDR, "XTENSION"), $TYP_FSTRING);
        strcpy($HDULIST->xtension, $FDAT->fstring);
      }
  - pattern-not: |
      {
        $FDAT = fits_decode_card(fits_search_card($HDR, "XTENSION"), $TYP_FSTRING);
        if ($FDAT != NULL)
          {
            strcpy($HDULIST->xtension, $FDAT->fstring);
          }
        else
          {
            strcpy($ERRMSG, "No valid XTENSION header found.");
            goto err_return;
          }
      }
  languages:
  - c
  message: |
    The code directly uses the result of `fits_decode_card` without checking if it is NULL. This can lead to a NULL pointer dereference, potentially causing a crash or undefined behavior. Always check the return value of functions that can return NULL before using it.
  severity: ERROR
  metadata:
    source-url: github.com/GNOME/gimp/commit/0474376d234bc3d0901fd5e86f89d778a6473dd8
    category: security
    cwe:
    - CWE-476
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-gimp-687ec479
  patterns:
  - pattern: |
      $VAR->top = GUINT32_FROM_BE($VAR->top);
      $VAR->left = GUINT32_FROM_BE($VAR->left);
      $VAR->bottom = GUINT32_FROM_BE($VAR->bottom);
      $VAR->right = GUINT32_FROM_BE($VAR->right);
  - pattern-not: |
      $VAR->top = GINT32_FROM_BE($VAR->top);
      $VAR->left = GINT32_FROM_BE($VAR->left);
      $VAR->bottom = GINT32_FROM_BE($VAR->bottom);
      $VAR->right = GINT32_FROM_BE($VAR->right);
  languages:
  - c
  message: |
    Detected incorrect use of GUINT32_FROM_BE instead of GINT32_FROM_BE for reading signed integers from binary data.
    This can lead to incorrect interpretation of negative values, potentially causing memory corruption or incorrect program behavior.
    Use GINT32_FROM_BE for signed integer values.
  severity: ERROR
  metadata:
    source-url: github.com/GNOME/gimp/commit/687ec47914ec08d6e460918cb641c196d80140a3
    category: security
    cwe:
    - 'CWE-681: Incorrect Conversion between Numeric Types'
    technology:
    - c
