rules:
- id: vuln-jasper-03db7c81
  patterns:
  - pattern: |
      if (jas_image_cmpttype($IMAGE, 0) == $TYPE) {
          ...
      }
  - pattern-not: |
      if (jas_image_numcmpts($IMAGE) >= $NUM &&
          jas_image_cmpttype($IMAGE, 0) == $TYPE) {
          ...
      }
  languages:
  - c
  message: |
    The code checks the component type of an image without first verifying that the image has enough components.
    This can lead to out-of-bounds access if the image has fewer components than assumed.
    Fix the issue by adding a check for the number of components before accessing them.
  severity: ERROR
  metadata:
    source-url: github.com/jasper-software/jasper/commit/03db7c81f6a8a92d896249bc673877749987fd7a
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/125.html
    technology:
    - c
- id: vuln-jasper-0d224608
  patterns:
  - pattern: |
      if (!($VAR = jas_alloc2($NUMCOMPS, sizeof(uint_fast16_t)))) {
        ...
        return -1;
      }
  - pattern-not: |
      if (!($VAR = jas_alloc2($NUMCOMPS, sizeof(jpc_crgcomp_t)))) {
        ...
        return -1;
      }
  languages:
  - c
  message: |
    Incorrect memory allocation size detected. The code allocates memory using `uint_fast16_t` instead of the correct `jpc_crgcomp_t` type, which can lead to buffer overflows or memory corruption. This vulnerability was fixed by changing the `sizeof` argument to `jpc_crgcomp_t`. Always ensure the correct type is used in memory allocations to prevent security issues.
  severity: ERROR
  metadata:
    source-url: github.com/jasper-software/jasper/commit/0d22460816ea58e74a124158fa6cc48efb709a47
    category: security
    cwe:
    - 'CWE-131: Incorrect Calculation of Buffer Size'
    owasp: 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-jasper-0d64bde2
  patterns:
  - pattern: |
      #if !defined(HAVE_VLA)
      #else
      jpc_fix_t $VAR[bufsize * $VAR2];
      #endif
  - pattern-not: |
      #if !defined(HAVE_VLA)
      #endif
  languages:
  - c
  message: |
    The use of variable-length arrays (VLAs) in this code can lead to stack overflow vulnerabilities.
    VLAs are dangerous because they allocate memory on the stack without bounds checking, which can be exploited to cause a denial of service or arbitrary code execution.
    The patch removes the use of VLAs to mitigate this risk.
    Consider using fixed-size arrays or dynamic memory allocation with proper bounds checking instead.
  severity: ERROR
  metadata:
    source-url: github.com/jasper-software/jasper/commit/0d64bde2b3ba7e1450710d540136a8ce4199ef30
    category: security
    cwe:
    - CWE-787
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/787.html
    technology:
    - c
- id: vuln-jasper-1abc2e5a
  patterns:
  - pattern: |
      jpc_tsfb_band_t $BANDS[64];
  - pattern-not: |
      jpc_tsfb_band_t $BANDS[JPC_MAXBANDS];
  languages:
  - c
  message: |
    The use of a hardcoded array size (64) for `jpc_tsfb_band_t` can lead to buffer overflow vulnerabilities. This is dangerous because it may allow an attacker to execute arbitrary code or cause a denial of service. Replace the hardcoded size with a defined constant (e.g., JPC_MAXBANDS) to ensure the array size is properly managed.
  severity: ERROR
  metadata:
    source-url: github.com/jasper-software/jasper/commit/1abc2e5a401a4bf1d5ca4df91358ce5df111f495
    category: security
    cwe:
    - 'CWE-120: Buffer Copy without Checking Size of Input (''Classic Buffer Overflow'')'
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-jasper-1e84674d
  patterns:
  - pattern: |
      assert($N >= 0 && $N < 32);
  - pattern-not: |
      if ($N < 0 || $N >= 32) {
        return ...;
      }
  languages:
  - c
  message: |
    The vulnerability involves the use of `assert` for input validation, which can be disabled in production builds, leading to potential undefined behavior. This is dangerous because it can result in security vulnerabilities if the input is not properly validated. Replace the `assert` with proper error handling using conditional checks and return statements.
  severity: ERROR
  metadata:
    source-url: github.com/jasper-software/jasper/commit/1e84674d95353c64e5c4c0e7232ae86fd6ea813b
    category: security
    cwe:
    - CWE-617
    owasp:
    - A10:2021-Server-Side Request Forgery (SSRF)
    references:
    - https://wiki.sei.cmu.edu/confluence/display/c/ERR33-C.+Detect+and+handle+standard+library+errors
    technology:
    - c
- id: vuln-jasper-1f0dfe5a
  patterns:
  - pattern: |
      $VAR = $EXPR1 * (1 << ($EXPR2 + $EXPR3 - $EXPR4));
  - pattern-not: |
      $VAR = $EXPR1 * (JAS_CAST(uint_fast32_t, 1) << ($EXPR2 + $EXPR3 - $EXPR4));
  languages:
  - c
  message: |
    Detected potential integer overflow vulnerability due to unchecked bitwise shift operation.
    This can lead to undefined behavior or security vulnerabilities when the result exceeds the maximum value of the integer type.
    To fix, use a cast to ensure the operation is performed on an appropriately sized type, such as `uint_fast32_t`.
  severity: ERROR
  metadata:
    source-url: github.com/mdadams/jasper/commit/1f0dfe5a42911b6880a1445f13f6d615ddb55387
    category: security
    cwe:
    - CWE-190
    owasp:
    - A03:2021-Injection
    technology:
    - c
- id: vuln-jasper-33cc2cfa
  patterns:
  - pattern: |
      assert($DEC->numcomps >= 3);
  - pattern-not: |
      if ($DEC->numcomps < 3) {
        jas_eprintf($MSG);
        return -1;
      }
  languages:
  - c
  message: |
    The use of assert for input validation is dangerous because it can be disabled at compile time, leading to potential security vulnerabilities. In this case, the code fails to properly handle cases where the number of components is less than 3, which could lead to undefined behavior or crashes. Replace the assert with proper error handling that includes a meaningful error message and a return value.
  severity: ERROR
  metadata:
    source-url: github.com/jasper-software/jasper/commit/33cc2cfa51a8d0fc3116d16cc1d8fc581b3f9e8d
    category: security
    cwe:
    - 'CWE-617: Reachable Assertion'
    owasp:
    - A10:2021 - Server-Side Request Forgery (SSRF)
    technology:
    - c
- id: vuln-jasper-3afacc17
  patterns:
  - pattern: |
      static jas_image_cmpt_t *jas_image_cmpt_create(uint_fast32_t tlx, uint_fast32_t tly,
        uint_fast32_t hstep, uint_fast32_t vstep, uint_fast32_t width, uint_fast32_t
        height, uint_fast16_t depth, bool sgnd, uint_fast32_t inmem);
  - pattern-not: |
      static jas_image_cmpt_t *jas_image_cmpt_create(int_fast32_t tlx,
        int_fast32_t tly, int_fast32_t hstep, int_fast32_t vstep,
        int_fast32_t width, int_fast32_t height, uint_fast16_t depth, bool sgnd,
        uint_fast32_t inmem);
  languages:
  - c
  message: |
    The function `jas_image_cmpt_create` uses `uint_fast32_t` for coordinates and dimensions, which can lead to integer overflow and underflow vulnerabilities. This can cause memory corruption or security issues. The fix is to use `int_fast32_t` for these parameters and add appropriate bounds checking.
  severity: ERROR
  metadata:
    source-url: github.com/jasper-software/jasper/commit/3afacc174867cc9d1f74ef2683bc780de4b0b2df
    category: security
    cwe:
    - CWE-190
    - CWE-191
    owasp: A9:2017-Using Components with Known Vulnerabilities
    technology:
    - c
- id: vuln-jasper-3c55b399
  patterns:
  - pattern: |
      jas_malloc($SIZE * sizeof($TYPE))
  - pattern-not: |
      jas_alloc2($NUM_ELEMENTS, sizeof($TYPE))
  languages:
  - c
  message: |
    Detected unsafe memory allocation using `jas_malloc` with direct multiplication of size and type size. This can lead to integer overflow vulnerabilities. Use `jas_alloc2` instead, which includes overflow checking.
