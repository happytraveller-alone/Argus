- id: vuln-jasper-5dbe57e4
  patterns:
  - pattern: |
      if (JAS_CAST(int, $VAR->compno) > $DEC->numcomps) {
        ...
      }
  - pattern-not: |
      if (JAS_CAST(int, $VAR->compno) >= $DEC->numcomps) {
        ...
      }
  languages:
  - c
  message: |
    The comparison operator '>' is used instead of '>=' to check if a component number is within bounds. This can lead to an off-by-one error, potentially causing out-of-bounds access. Replace '>' with '>=' to ensure the boundary check is inclusive and prevents access beyond the valid range.
