- id: vuln-jasper-44a524e3
  patterns:
  - pattern: |
      if (!(buf = jas_realloc2($VAR, $BUFSIZE, sizeof(unsigned char)))) {
        ...
      }
  - pattern-not: |
      if (!(buf = jas_realloc2($VAR, $BUFSIZE, sizeof(unsigned char))) &&
        $BUFSIZE) {
        ...
