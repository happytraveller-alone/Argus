- id: vuln-jasper-c7634141
  patterns:
  - pattern: |
      if ($COND) {
        ...
        bmp_info_destroy($INFO);
        return 0;
        ...
      }
  - pattern-not: |
      if ($COND) {
        ...
        goto error;
        ...
      }
      error:
      if ($INFO) {
        bmp_info_destroy($INFO);
      }
      return 0;
  languages:
  - c
  message: |
    The code directly returns after destroying the BMP info without proper error handling, which can lead to resource management issues and potential security vulnerabilities. The patch introduces a consistent error handling mechanism using `goto error` to ensure proper cleanup. Always use a centralized error handling approach to manage resources safely.
  severity: ERROR
