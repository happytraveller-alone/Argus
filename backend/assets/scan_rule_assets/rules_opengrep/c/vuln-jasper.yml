- id: vuln-jasper-84d00fb2
  patterns:
  - pattern: |
      stepsizes[$BANDNO] = JPC_QCX_MANT($MANT) | JPC_QCX_EXPN($EXPN + ($BANDNO + 2) / 3);
  - pattern-not: |
      uint_fast16_t $E = $EXPN + ($BANDNO + 2) / 3;
      if ($E >= 0x20)
        return -1;
      stepsizes[$BANDNO] = JPC_QCX_MANT($MANT) | JPC_QCX_EXPN($E);
  languages:
  - c
  message: |
    This rule detects potential integer overflow vulnerabilities in JPC_QCX_EXPN calculations. The original code performs an arithmetic operation without checking for overflow, which could lead to undefined behavior or security vulnerabilities. The fix introduces a bounds check to ensure the exponent value does not exceed 0x20 before using it in the calculation. To fix this issue, always validate arithmetic operations that could result in overflow, especially when dealing with bitwise operations.
  severity: ERROR
  metadata:
    source-url: github.com/jasper-software/jasper/commit/84d00fb29a22e360c2ff91bdc2cd81c288826bfc
    category: security
    cwe:
    - 'CWE-190: Integer Overflow or Wraparound'
    owasp:
    - 'A9: Security Misconfiguration'
    technology:
    - c
- id: vuln-jasper-93a94803
  patterns:
  - pattern: |
      jas_stream_fileobj_t *$VAR = JAS_CAST(jas_stream_fileobj_t *, $OBJ);
  - pattern-not: |
      jas_stream_fileobj_t *$VAR;
      $VAR = JAS_CAST(jas_stream_fileobj_t *, $OBJ);
  languages:
  - c
  message: |
    The direct casting and assignment of a pointer in a single statement can lead to potential type confusion or incorrect assumptions about the object's type. This can be dangerous as it may result in undefined behavior or security vulnerabilities if the object is not of the expected type. Instead, declare the pointer first and then perform the casting and assignment in separate steps to ensure clarity and safety.
  severity: ERROR
  metadata:
    source-url: github.com/jasper-software/jasper/commit/93a94803ee65469cc882f39d3916b190f8b5ed18
    category: security
    cwe:
