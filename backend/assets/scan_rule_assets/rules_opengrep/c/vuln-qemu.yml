rules:
- id: vuln-qemu-035e69b0
  pattern: |
    assert($VAR1 > $VAR2);
  pattern-not: |
    if ($VAR2 >= $VAR1) {
        return false;
    }
  languages:
  - c
  message: |
    The use of `assert` for input validation is dangerous as it can be disabled in production builds, leading to potential security vulnerabilities.
    In this case, the assertion checks if `$VAR1` is greater than `$VAR2`, but if assertions are disabled, the program may continue with invalid data.
    Replace the `assert` with proper error handling, such as an `if` statement that returns an error or handles the invalid condition gracefully.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/035e69b063835a5fd23cacabd63690a3d84532a8
    category: security
    cwe:
    - 'CWE-617: Reachable Assertion'
    owasp:
    - 'A9: Security Misconfiguration'
    references:
    - https://wiki.sei.cmu.edu/confluence/display/c/EXP33-C.+Do+not+use+assertions+for+input+validation
    technology:
    - c
- id: vuln-qemu-070c4b92
  pattern: |
    while (1) {
      ...
    }
  pattern-not: |
    while ($DESCNT++ < $FEC_MAX_DESC) {
      ...
    }
  languages:
  - c
  message: |
    Infinite loop vulnerability detected in network handling code. This can lead to denial of service (DoS) as the loop lacks a termination condition. The vulnerability was fixed by introducing a counter and a maximum descriptor limit. Add a counter and a termination condition to prevent infinite loops.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/070c4b92b8cd5390889716677a0b92444d6e087a
    category: security
    cwe:
    - CWE-835
    owasp:
    - A9:2021-Security Misconfiguration
    technology:
    - c
- id: vuln-qemu-0a794529
  pattern: |
    if ($VAR && !g_str_equal($VAR, "none")) {
      if (g_str_equal($VAR, "passthrough")) {
        if ($FUNC(&$BUF)) {
          _FDT(fdt_setprop_string($FDT, $OFFSET, $PROP, $BUF));
          g_free($BUF);
        }
      } else {
        _FDT(fdt_setprop_string($FDT, $OFFSET, $PROP, $VAR));
      }
    }
  pattern-not: |
    if ($VAR) {
      _FDT(fdt_setprop_string($FDT, $OFFSET, $PROP, $VAR));
    } else if ($COND && $FUNC(&$BUF)) {
      _FDT(fdt_setprop_string($FDT, $OFFSET, $PROP, $BUF));
      g_free($BUF);
    }
  languages:
  - c
  message: |
    The code contains a vulnerable pattern where host model and serial information
    is passed through without proper validation. This can lead to information
    disclosure or unexpected behavior. The fix simplifies the logic and removes
    the "passthrough" option, ensuring that only explicitly set values are used.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/0a794529bd1109aeea0c407784b40a2605e808b9
    category: security
    cwe:
    - 'CWE-200: Information Exposure'
    owasp:
    - A3:2017-Sensitive Data Exposure
    references:
    - https://cwe.mitre.org/data/definitions/200.html
    technology:
    - c
- id: vuln-qemu-0db89536
  pattern: |
    if ($S->current_req) {
      ...
      scsi_req_continue($S->current_req);
      $S->data_in_ready = false;
      ...
    }
  pattern-not: |
    if (!$S->current_req) {
      return;
    }
    ...
    scsi_req_continue($S->current_req);
    $S->data_in_ready = false;
    ...
    if (!$S->current_req) {
      return;
    }
  languages:
  - c
  message: |
    Detected a potential null pointer dereference vulnerability. The code accesses `current_req` without checking if it is null after the initial check. This could lead to a crash or undefined behavior if `current_req` becomes null during execution. Ensure that `current_req` is checked before each use to prevent null pointer dereference.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/0db895361b8a82e1114372ff9f4857abea605701
    category: security
    cwe:
    - CWE-476
    owasp: A9:2021-Security Misconfiguration
    technology:
    - c
- id: vuln-qemu-0e68373c
  pattern: |
    if (!num_sge) {
        ...
        complete_work(IBV_WC_GENERAL_ERR, VENDOR_ERR_NO_SGE, ctx);
    }
  pattern-not: |
    if (!num_sge || num_sge > MAX_SGE) {
        ...
        complete_work(IBV_WC_GENERAL_ERR, VENDOR_ERR_INV_NUM_SGE, ctx);
    }
  languages:
  - c
  message: |
    The code checks for zero `num_sge` but fails to check for an upper bound, which could lead to buffer overflows or other undefined behavior. This vulnerability was fixed by adding a check against `MAX_SGE`. To fix this, ensure that `num_sge` is validated against both zero and a maximum allowed value.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/0e68373cc2b3a063ce067bc0cc3edaf370752890
    category: security
    cwe:
    - CWE-120
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-qemu-1328fe0c
  pattern: |
    $NEXT = $ISO_TD.offset[$RELATIVE_FRAME_NUMBER + 1];
    ...
    $END_ADDR = $ISO_TD.be;
  pattern-not: |
    if ($RELATIVE_FRAME_NUMBER < $FRAME_COUNT) {
        $NEXT = $ISO_TD.offset[$RELATIVE_FRAME_NUMBER + 1];
    } else {
        $NEXT = $ISO_TD.be;
    }
    ...
    $END_ADDR = $NEXT;
  languages:
  - c
  message: |
    Detected a potential out-of-bounds array access vulnerability in USB OHCI driver. The code directly accesses `iso_td.offset` without checking if `relative_frame_number + 1` is within bounds. This could lead to memory corruption or crashes. The fix adds bounds checking and uses a fallback value when the index is out of bounds. Always validate array indices before accessing them.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/1328fe0c32d5474604105b8105310e944976b058
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    technology:
    - c
- id: vuln-qemu-156a2e4d
  pattern: |
    uint32_t $I, $LEN, $PID, $DIR, $DEVADDR, $ENDP;
    ...
    return 0;
  pattern-not: |
    uint32_t $I, $LEN, $PID, $DIR, $DEVADDR, $ENDP, $XFERS = 0;
    ...
    $XFERS++;
    return $XFERS ? 0 : -1;
  languages:
  - c
  message: |
    The function returns 0 unconditionally without tracking the number of transfers, which can lead to incorrect handling of USB transactions. This could result in data corruption or loss. The fix introduces a counter variable `xfers` to track the number of transfers and returns -1 if no transfers occur, ensuring proper error handling.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/156a2e4dbffa85997636a7a39ef12da6f1b40254
    category: security
    cwe:
    - 'CWE-252: Unchecked Return Value'
    owasp:
    - A10:2021 - Server-Side Request Forgery
    references:
    - https://cwe.mitre.org/data/definitions/252.html
    technology:
    - c
- id: vuln-qemu-1ab95af0
  pattern: |
    return get_drv($FDCTRL, $FDCTRL->cur_drv);
  pattern-not: |
    $CUR_DRV = get_drv($FDCTRL, $FDCTRL->cur_drv);
    if (!$CUR_DRV->blk) {
      $CUR_DRV->blk = blk_create_empty_drive();
    }
    return $CUR_DRV;
  languages:
  - c
  message: |
    Potential NULL pointer dereference vulnerability detected. The function returns a pointer from `get_drv` without checking if the returned `blk` field is NULL. This can lead to a NULL dereference when the BlockBackend API is used. To fix this, ensure that the `blk` field is initialized with a valid BlockBackend or create an anonymous one if it is NULL.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/1ab95af033a419e7a64e2d58e67dd96b20af5233
    category: security
    cwe:
    - CWE-476
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-qemu-2067d39e
  pattern: |
    if ($ADDR + $SIZE > NVME_CMBSZ_GETSIZE($N->bar.cmbsz)) {
        return $RETURN;
    }
  pattern-not: |
    if ($ADDR + $SIZE > NVME_CMBSZ_GETSIZE($N->bar.cmbsz)) {
        return;
    }
  languages:
  - c
  message: |
    Detected a potential buffer overflow vulnerability due to missing bounds checking.
    This can lead to memory corruption or unauthorized access to memory regions.
    Ensure proper bounds checking is implemented before accessing memory.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/2067d39e5e53b053bece6fa15711640123c119ed
    category: security
    cwe:
    - CWE-120
    - CWE-125
    owasp:
    - 'A1: Injection'
