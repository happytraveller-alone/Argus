    - https://cwe.mitre.org/data/definitions/125.html
    technology:
    - c
- id: vuln-qemu-23910d3f
  pattern: |
    struct gpe_regs {
        uint16_t sts;
        uint16_t en;
    };
    ...
    struct gpe_regs gpe;
    ...
    register_ioport_write(GPE_BASE, 4, 1, gpe_writeb, s);
    register_ioport_read(GPE_BASE, 4, 1, gpe_readb, s);
  pattern-not: |
    struct ACPIGPE {
        uint8_t *sts;
        uint8_t *en;
        uint32_t blk;
        uint8_t len;
    };
    ...
    ACPIGPE gpe;
    ...
    acpi_gpe_init(&gpe, GPE_LEN);
    register_ioport_write(GPE_BASE, GPE_LEN, 1, gpe_writeb, s);
    register_ioport_read(GPE_BASE, GPE_LEN, 1, gpe_readb, s);
  languages:
  - c
  message: |
    The code uses a fixed-size struct for GPE registers, which can lead to buffer overflows or underflows. The vulnerability arises because the struct size is hardcoded and not dynamically allocated based on the actual GPE length. This can be exploited to read or write outside the intended memory bounds. The fix involves using dynamically allocated arrays for GPE status and enable registers, initialized based on the GPE length. Always ensure that memory allocation matches the actual size requirements.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/23910d3f669d46073b403876e30a7314599633af
    category: security
    cwe:
    - CWE-119
    - CWE-120
    owasp: 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/119.html
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
    - c
- id: vuln-qemu-26194a58
  pattern: |
    $NC->info->receive($NC, $BUF, $SIZE)
  pattern-not: |
    qemu_receive_packet($NC, $BUF, $SIZE)
  languages:
  - c
  message: |
    Direct use of network interface's receive function can lead to security vulnerabilities. Use the safer qemu_receive_packet() function instead, which properly handles packet reception with necessary security checks.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/26194a58f4eb83c5bdf4061a1628508084450ba1
    category: security
    cwe:
    - CWE-676
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-qemu-27461d69
  pattern: |
    if (kvmppc_get_host_model(&$VAR)) {
        _FDT(fdt_setprop_string($FDT, 0, "host-model", $VAR));
        g_free($VAR);
    }
    if (kvmppc_get_host_serial(&$VAR)) {
        _FDT(fdt_setprop_string($FDT, 0, "host-serial", $VAR));
        g_free($VAR);
    }
  pattern-not: |
    if ($SPAPR->host_model && !g_str_equal($SPAPR->host_model, "none")) {
        if (g_str_equal($SPAPR->host_model, "passthrough")) {
            if (kvmppc_get_host_model(&$VAR)) {
                _FDT(fdt_setprop_string($FDT, 0, "host-model", $VAR));
                g_free($VAR);
            }
        } else {
            _FDT(fdt_setprop_string($FDT, 0, "host-model", $SPAPR->host_model));
        }
    }
    if ($SPAPR->host_serial && !g_str_equal($SPAPR->host_serial, "none")) {
        if (g_str_equal($SPAPR->host_serial, "passthrough")) {
            if (kvmppc_get_host_serial(&$VAR)) {
                _FDT(fdt_setprop_string($FDT, 0, "host-serial", $VAR));
                g_free($VAR);
            }
        } else {
            _FDT(fdt_setprop_string($FDT, 0, "host-serial", $SPAPR->host_serial));
        }
    }
  languages:
  - c
  message: |
    The code directly uses `kvmppc_get_host_model` and `kvmppc_get_host_serial` without checking if the host model or serial is set to "none" or "passthrough". This can lead to unintended exposure of host information. Always validate the host model and serial before setting them in the device tree.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/27461d69a0f108dea756419251acc3ea65198f1b
    category: security
    cwe:
    - CWE-200
    owasp: A2:2017-Broken Authentication
    references:
    - https://cwe.mitre.org/data/definitions/200.html
    technology:
    - c
- id: vuln-qemu-2f5732e9
  pattern: |
    if ($CONFIG_LEN != $VDEV->config_len) {
        $ERROR_REPORT(...);
        return -1;
    }
    qemu_get_buffer($F, $VDEV->config, $VDEV->config_len);
  pattern-not: |
    qemu_get_buffer($F, $VDEV->config, MIN($CONFIG_LEN, $VDEV->config_len));
    while ($CONFIG_LEN > $VDEV->config_len) {
        qemu_get_byte($F);
        $CONFIG_LEN--;
    }
  languages:
  - c
  message: |
    The code directly uses the device's config length without validating the incoming config length, which can lead to buffer overflows or underflows. This is dangerous because it can result in memory corruption or information disclosure. The fix involves using MIN to ensure only the valid portion of the config is read and skipping any excess bytes.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/2f5732e9648fcddc8759a8fd25c0b41a38352be6
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    - 'CWE-787: Out-of-bounds Write'
    owasp: 'A1: Injection'
    technology:
    - c
- id: vuln-qemu-2fdb42d8
  pattern: |
    usb_packet_map($PACKET, $SGL);
  pattern-not: |
    if (usb_packet_map($PACKET, $SGL)) {
      qemu_sglist_destroy($SGL);
      return -1;
    }
  languages:
  - c
  message: |
    Missing error handling for `usb_packet_map` function call. This can lead to resource leaks or undefined behavior if the function fails. Always check the return value of `usb_packet_map` and handle errors appropriately by destroying the scatter-gather list and returning an error code.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/2fdb42d840400d58f2e706ecca82c142b97bcbd6
    category: security
    cwe:
    - 'CWE-252: Unchecked Return Value'
    owasp: 'A9: Security Misconfiguration'
    references:
    - https://cwe.mitre.org/data/definitions/252.html
    technology:
    - c
- id: vuln-qemu-2fe76055
  pattern: |
    for ($I = 0; $I < VIRTIO_GPU_MAX_SCANOUT; $I++) {
      ...
    }
  pattern-not: |
    for ($I = 0; $I < $G->conf.max_outputs; $I++) {
      ...
    }
  languages:
  - c
  message: |
    The code uses a hardcoded constant `VIRTIO_GPU_MAX_SCANOUT` instead of the device's configured maximum outputs, which could lead to out-of-bounds access. Always use `g->conf.max_outputs` to ensure proper bounds checking.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/2fe760554eb3769d70f608a158474f728ba45ba6
    category: security
    cwe:
    - CWE-125
