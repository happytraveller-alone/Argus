    - 'A1: Injection'
    technology:
    - c
- id: vuln-qemu-3592fe0c
  pattern: |
    if ($S->divider == 0) {
      ...
    }
  pattern-not: |
    if ($S->divider == 0 || $S->divider > $S->baudbase) {
      ...
    }
  languages:
  - c
  message: |
    The code checks only if the divider is zero, but does not validate if the divider exceeds the baudbase. This can lead to invalid baud rate settings, potentially causing undefined behavior or security vulnerabilities. To fix this, ensure the divider is within the valid range by adding a check for `s->divider > s->baudbase`.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/3592fe0c919cf27a81d8e9f9b4f269553418bb01
    category: security
    cwe:
    - CWE-682
    technology:
    - c
- id: vuln-qemu-362786f1
  pattern: |
    if ($PLEN < $CSUM_OFFSET + 2) {
        return;
    }
  pattern-not: |
    if ($PLEN < $CSUM_OFFSET + 2 || 14 + $HLEN + $PLEN > $LENGTH) {
        return;
    }
  languages:
  - c
  message: |
    Insufficient validation of packet length can lead to buffer overflow vulnerabilities.
    The original code only checks if the payload length is sufficient for the checksum offset,
    but fails to verify if the entire packet including headers fits within the buffer.
    This can be exploited by crafting malicious packets that overflow the buffer.
    Fixed by adding a check for the total packet length including headers.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/362786f14a753d8a5256ef97d7c10ed576d6572b
    category: security
    cwe:
    - CWE-120
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-qemu-36a894ae
  pattern: const MemTxAttrs $ATTRS = MEMTXATTRS_UNSPECIFIED;
  pattern-not: const MemTxAttrs $ATTRS = { .memory = true };
  languages:
  - c
  message: |
    The use of MEMTXATTRS_UNSPECIFIED can lead to undefined behavior or security vulnerabilities
    as it does not explicitly set the memory attributes. This can result in incorrect memory
    handling, potentially leading to memory corruption or unauthorized access. To fix this,
    explicitly set the memory attributes using `{ .memory = true }`.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/36a894aeb64a2e02871016da1c37d4a4ca109182
    category: security
