- id: vuln-qemu-3a9163af
  pattern: |
    $VAR->state = $STATE;
    $VAR->data_start = $ADDR;
    $VAR->data_offset = 0;
    if ($VAR->data_start + $VAR->blk_len > $VAR->size) {
        $VAR->card_status |= $ERROR;
    }
  pattern-not: |
    if ($ADDR + $VAR->blk_len > $VAR->size) {
        $VAR->card_status |= $ERROR;
        return $RET;
    }
    $VAR->state = $STATE;
    $VAR->data_start = $ADDR;
    $VAR->data_offset = 0;
  languages:
  - c
  message: |
    Potential out-of-bounds access vulnerability detected. The code checks the bounds after setting the state and data pointers, which could lead to accessing invalid memory if the bounds check fails. This should be fixed by performing the bounds check before setting any state or data pointers and returning early if the check fails.
  severity: ERROR
  metadata:
    source-url: github.com/qemu/qemu/commit/3a9163af4e3dd61795a35d47b702e302f98f81d6
    category: security
