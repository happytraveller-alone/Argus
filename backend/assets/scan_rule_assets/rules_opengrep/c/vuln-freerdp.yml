rules:
- id: vuln-freerdp-0332cad0
  patterns:
  - pattern: |
      WLog_Print($LOG, $LEVEL, "%s Update Data PDU", UPDATE_TYPE_STRINGS[$UPDATETYPE]);
  - pattern-not: |
      WLog_Print($LOG, $LEVEL, "%s Update Data PDU", update_type_to_string($UPDATETYPE));
  languages:
  - c
  message: |
    The use of a static array `UPDATE_TYPE_STRINGS` for logging update types is dangerous because it can lead to out-of-bounds access if the `updateType` value is outside the array bounds. This could result in undefined behavior or crashes. Use the function `update_type_to_string` instead, which safely handles all possible values of `updateType`.
  severity: ERROR
  metadata:
    source-url: github.com/FreeRDP/FreeRDP/commit/0332cad015fdf7fac7e5c6863484f18a554e0fcf
    category: security
    cwe:
    - CWE-125
    - CWE-787
    owasp: 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-freerdp-09b9d4f1
  patterns:
  - pattern: |
      $BITMAP->length = $DSTWIDTH * $DSTHEIGHT * GetBytesPerPixel($BITMAP->format);
  - pattern-not: |
      $SIZE = $DSTWIDTH * $DSTHEIGHT;
      if ((GetBytesPerPixel($BITMAP->format) == 0) ||
          ($DSTWIDTH == 0) || ($DSTHEIGHT == 0) || ($DSTWIDTH > UINT32_MAX / $DSTHEIGHT) ||
          ($SIZE > (UINT32_MAX / GetBytesPerPixel($BITMAP->format))))
          return FALSE;
      $SIZE *= GetBytesPerPixel($BITMAP->format);
      $BITMAP->length = $SIZE;
  languages:
  - c
  message: |
    Detected a potential integer overflow vulnerability in bitmap length calculation.
    The calculation of bitmap length as `DstWidth * DstHeight * GetBytesPerPixel(bitmap->format)`
    can result in an integer overflow if the values are large. This can lead to memory corruption
    or buffer overflow vulnerabilities. To fix this, add checks to ensure that the multiplication
    does not exceed UINT32_MAX and handle invalid input values (zero width/height/bytes per pixel).
  severity: ERROR
  metadata:
    source-url: github.com/FreeRDP/FreeRDP/commit/09b9d4f1994a674c4ec85b4947aa656eda1aed8a
    category: security
    cwe:
    - CWE-190
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/190.html
    technology:
    - c
- id: vuln-freerdp-532c4205
  patterns:
  - pattern: |
      update_read_pointer_color($S, $POINTER_COLOR)
  - pattern-not: |
      update_read_pointer_color($S, $POINTER_COLOR, $BPP)
  languages:
  - c
  message: |
    Detected a potentially unsafe call to `update_read_pointer_color` without the `bpp` parameter. This can lead to incorrect memory allocation for pointer masks, potentially causing buffer overflows or crashes. The issue was fixed by adding a `bpp` parameter to ensure proper calculation of scanline sizes. Always include the `bpp` parameter when calling this function to prevent memory corruption.
  severity: ERROR
  metadata:
    source-url: github.com/FreeRDP/FreeRDP/commit/532c42052a0b4769071cdcf08f03970de95390ab
    category: security
    cwe:
    - CWE-119
    - CWE-120
    owasp:
    - 'A2: Broken Authentication'
    - 'A1: Injection'
    references:
    - https://docs.microsoft.com/en-us/openspecs/windows_protocols/ms-rdpbcgr/9cde84cd-5055-4a7e-95ca-37d4391f9d3d
    technology:
    - c
- id: vuln-freerdp-6b2bc419
  patterns:
  - pattern: |
      if (Stream_GetRemainingLength($S) < $ICONINFO->cbBitsMask + $ICONINFO->cbBitsColor)
        return $FALSE;
  - pattern-not: |
      if (Stream_GetRemainingLength($S) < $ICONINFO->cbBitsMask)
        return $FALSE;
      {
        if (Stream_GetRemainingLength($S) < $ICONINFO->cbColorTable)
          return $FALSE;
      }
      if (Stream_GetRemainingLength($S) < $ICONINFO->cbBitsColor)
        return $FALSE;
  languages:
  - c
  message: |
    The vulnerability arises from an insufficient validation of the remaining stream length.
    The original code checks if the remaining length is less than the sum of `cbBitsMask` and `cbBitsColor`, but it fails to separately validate `cbColorTable`.
    This can lead to buffer overflows or other memory corruption issues.
    To fix this, ensure that each component (`cbBitsMask`, `cbColorTable`, and `cbBitsColor`) is validated individually.
  severity: ERROR
  metadata:
    source-url: github.com/FreeRDP/FreeRDP/commit/6b2bc41935e53b0034fe5948aeeab4f32e80f30f
    category: security
    cwe:
    - CWE-125
    - CWE-787
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/125.html
    - https://cwe.mitre.org/data/definitions/787.html
    technology:
    - c
