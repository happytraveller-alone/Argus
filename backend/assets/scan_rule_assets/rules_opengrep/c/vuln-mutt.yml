rules:
- id: vuln-mutt-3d9028fe
  patterns:
  - pattern: |
      mutt_from_base64($OUT, $IN)
  - pattern-not: |
      mutt_from_base64($OUT, $IN, $OLEN)
  languages:
  - c
  message: |
    The function `mutt_from_base64` is being called without the `olen` parameter, which can lead to buffer overflow vulnerabilities. This is dangerous because it allows for potential memory corruption and exploitation. Always provide the output buffer length (`olen`) to ensure safe operation.
  severity: ERROR
  metadata:
    source-url: github.com/muttmua/mutt/commit/3d9028fec8f4d08db2251096307c0bbbebce669a
    category: security
    cwe:
    - CWE-120
    owasp:
    - 'A2: Broken Authentication'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
    - c
- id: vuln-mutt-e0131852
  patterns:
  - pattern: |
      if (!$DLEN)
          break;
  - pattern-not: |
      if ($DLEN < 2)
          break;
  languages:
  - c
  message: |
    The vulnerability occurs due to insufficient boundary checking when handling string lengths.
    The original code fails to account for the required space for both the pre/post quote characters and the trailing null, which can lead to buffer underflow or incorrect string termination.
    This can result in memory corruption or undefined behavior.
    The fix ensures proper length checking by verifying that there is enough space for both quote characters and the null terminator.
  severity: ERROR
  metadata:
    source-url: github.com/muttmua/mutt/commit/e0131852c6059107939893016c8ff56b6e42865d
    category: security
    cwe:
    - CWE-119
    - CWE-120
    owasp:
    - 'A1: Injection'
    technology:
    - c
