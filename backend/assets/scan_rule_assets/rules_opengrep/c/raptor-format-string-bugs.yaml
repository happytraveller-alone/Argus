rules:
- id: raptor-format-string-bugs
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/134
    - https://julianor.tripod.com/bc/formatstring-1.2.pdf
    - http://phrack.org/issues/70/13.html#article
    - https://g.co/kgs/PCHQjJ
    - https://www.sei.cmu.edu/downloads/sei-cert-c-coding-standard-2016-v01.pdf
    confidence: MEDIUM
    cwe:
    - 'CWE-134: Uncontrolled Format String'
    - 'CWE-120: Buffer Copy without Checking Size of Input (Buffer Overflow)'
    - 'CWE-20: Improper Input Validation'
    - 'CWE-200: Information Exposure'
    - 'CWE-125: Out-of-bounds Read'
  message: The software uses a function that accepts a format string as an argument, but the format string originates from an external source. This can lead  to buffer overflows, denial of service, or data representation problems.
  severity: ERROR
  languages:
  - c
  pattern-either:
  - patterns:
    - pattern-either:
      - pattern: printf(...)
      - pattern: vprintf(...)
      - pattern: wprintf(...)
      - pattern: vwprintf(...)
      - pattern: vcprintf(...)
      - pattern: vcwprintf(...)
      - pattern: vscprintf(...)
      - pattern: vscwprintf(...)
      - pattern: printk(...)
      - pattern: warn(...)
      - pattern: vwarn(...)
      - pattern: warnx(...)
      - pattern: vwarnx(...)
    - pattern-not: $_("...", ...)
    - pattern-not: $_(gettext(...), ...)
    - pattern-not: $_(dgettext(...), ...)
    - pattern-not: $_(dcgettext(...), ...)
  - patterns:
    - pattern-either:
      - pattern: fprintf(...)
      - pattern: vfprintf(...)
      - pattern: fwprintf(...)
      - pattern: vfwprintf(...)
      - pattern: sprintf(...)
      - pattern: vsprintf(...)
      - pattern: asprintf(...)
      - pattern: vasprintf(...)
      - pattern: dprintf(...)
      - pattern: vdprintf(...)
      - pattern: wsprintf(...)
      - pattern: syslog(...)
      - pattern: vsyslog(...)
      - pattern: err(...)
      - pattern: verr(...)
      - pattern: errx(...)
      - pattern: verrx(...)
      - pattern: warnc(...)
      - pattern: vwarnc(...)
    - pattern-not: $_($_, "...", ...)
    - pattern-not: $_($_, gettext(...), ...)
    - pattern-not: $_($_, dgettext(...), ...)
    - pattern-not: $_($_, dcgettext(...), ...)
  - patterns:
    - pattern-either:
      - pattern: errc(...)
      - pattern: verrc(...)
    - pattern-not: $_($_, $_, "...", ...)
    - pattern-not: $_($_, $_, gettext(...), ...)
    - pattern-not: $_($_, $_, dgettext(...), ...)
    - pattern-not: $_($_, $_, dcgettext(...), ...)
