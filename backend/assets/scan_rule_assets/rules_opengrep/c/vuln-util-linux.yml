rules:
- id: vuln-util-linux-018a1090
  pattern: |
    $P = (char *) endswith($FS->target, $SUFFIX);
    if ($P && *$P)
        *$P = '\0';
  pattern-not: |
    $P = (char *) endswith($FS->target, PATH_DELETED_SUFFIX);
    if ($P && *$P)
        *$P = '\0';
  languages:
  - c
  message: |
    Detected unsafe string manipulation that removes a suffix without proper validation.
    This can lead to security vulnerabilities if the suffix is not correctly identified,
    potentially allowing path traversal or other exploits. Ensure that the suffix is
    validated and handled securely.
  severity: ERROR
  metadata:
    source-url: github.com/karelzak/util-linux/commit/018a10907fa9885093f6d87401556932c2d8bd2b
    category: security
    cwe:
    - CWE-20
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/20.html
    technology:
    - c
- id: vuln-util-linux-0377ef91
  pattern: |
    {
      const char *$FSTYPE;
      $FSTYPE = fsprobe_get_fstype_by_devname($OPTARG);
      printf("%s\n", $FSTYPE ? $FSTYPE : "unknown");
      exit($FSTYPE ? 0 : $EX_FAIL);
    }
  pattern-inside: |
    case $CASE_NUM:
      ...
      {
        ...
        $PATTERN
        ...
      }
  languages:
  - c
  message: |
    The use of `fsprobe_get_fstype_by_devname` for filesystem type guessing is unreliable and has been removed.
    This function can lead to incorrect assumptions about the filesystem type, potentially causing security issues or data corruption.
    Avoid using unreliable filesystem type guessing functions. Instead, explicitly specify the filesystem type or use more reliable methods.
  severity: ERROR
  metadata:
    source-url: github.com/karelzak/util-linux/commit/0377ef91270d06592a0d4dd009c29e7b1ff9c9b8
    category: security
    cwe:
    - 'CWE-20: Improper Input Validation'
    owasp:
    - 'A6: Security Misconfiguration'
    technology:
    - c
- id: vuln-util-linux-166e8736
  pattern: |
    int mnt_fs_is_deleted(struct libmnt_fs *fs)
    {
        return mnt_fs_get_flags(fs) & MNT_FS_DELETED;
    }
  pattern-not: |
    int mnt_fs_is_deleted(struct libmnt_fs *fs)
    {
        return (mnt_fs_get_flags(fs) & MNT_FS_DELETED) != 0;
    }
  languages:
  - c
  message: |
    The function `mnt_fs_is_deleted` returns a bitmask value directly without checking if the DELETED flag is set. This can lead to incorrect boolean interpretations. Ensure the function explicitly checks if the DELETED flag is set by comparing the result to 0.
  severity: ERROR
  metadata:
    source-url: github.com/karelzak/util-linux/commit/166e87368ae88bf31112a30e078cceae637f4cdb
    category: security
    cwe:
    - CWE-697
    owasp: A03:2021 - Injection
    technology:
    - c
- id: vuln-util-linux-57202f57
  pattern: |
    char *$USER_ID = NULL;
    size_t $SZ;
    uid_t $UID;
    char $UIDSTR[sizeof(stringify_value(ULONG_MAX))];
    ...
    if (mnt_optstr_get_option($OPTSTR, "user_id", &$USER_ID, &$SZ) != 0)
      return 0;
    ...
    snprintf($UIDSTR, sizeof($UIDSTR), "%lu", (unsigned long) $UID);
    return strncmp($USER_ID, $UIDSTR, $SZ) == 0;
  pattern-not: |
    uid_t $UID, $ENTRY_UID;
    ...
    if (mnt_optstr_get_uid($OPTSTR, "user_id", &$ENTRY_UID) != 0)
      return 0;
    ...
    return $UID == $ENTRY_UID;
  languages:
  - c
  message: |
    Detected a vulnerable pattern in user ID comparison. The original code uses string comparison for user IDs, which can lead to incorrect comparisons and potential security issues. The fixed version uses direct uid_t comparison for accuracy and safety. Replace string-based comparison with direct uid_t comparison using mnt_optstr_get_uid().
  severity: ERROR
  metadata:
    source-url: github.com/karelzak/util-linux/commit/57202f5713afa2af20ffbb6ab5331481d0396f8d
    category: security
    cwe:
    - 'CWE-697: Incorrect Comparison'
    owasp:
    - 'A2: Broken Authentication'
    technology:
    - c
- id: vuln-util-linux-687cc5d5
  pattern: |
    bool $PERMITTED;
    ...
    if (getuid() == 0)
        $PERMITTED = TRUE;
    else {
        if (($SET || $SYSTOHC || $ADJUST) && !$TESTING) {
            warnx(_("Sorry, only the superuser can change the Hardware Clock."));
            $PERMITTED = FALSE;
        } else if (($SYSTZ || $HCTOSYS) && !$TESTING) {
            warnx(_("Sorry, only the superuser can change the System Clock."));
            $PERMITTED = FALSE;
        } else if ($SETEPOCH && !$TESTING) {
            warnx(_("Sorry, only the superuser can change the Hardware Clock epoch in the kernel."));
            $PERMITTED = FALSE;
        } else
            $PERMITTED = TRUE;
    }
    ...
    if (!$PERMITTED)
        $EXIT(EX_NOPERM);
  pattern-not: |
    if (getuid() != 0) {
        warnx(_("Sorry, only the superuser can use the Hardware Clock."));
        $EXIT(EX_NOPERM);
    }
  languages:
  - c
  message: |
    The code uses a complex permission check that can be bypassed by setting the testing flag.
    This vulnerability allows non-superusers to perform privileged operations by manipulating the testing flag.
    To fix this, ensure that all privileged operations explicitly check for superuser status at the point of use.
  severity: ERROR
  metadata:
    source-url: github.com/karelzak/util-linux/commit/687cc5d58942b24a9f4013c68876d8cbea907ab1
    category: security
    cwe:
    - 'CWE-862: Missing Authorization'
    owasp:
    - 'A01: Broken Access Control'
    references:
    - https://cwe.mitre.org/data/definitions/862.html
    technology:
    - c
- id: vuln-util-linux-70e3fcf2
  pattern: |
    wchar_t $ARRAY[PAGE_ARRAY_ROWS][PAGE_ARRAY_COLS];
  pattern-not: |
    wchar_t $ARRAY[PAGE_ARRAY_ROWS + 1][PAGE_ARRAY_COLS + 1];
  languages:
  - c
  message: |
    The array dimensions are not large enough to prevent potential buffer overflows.
    This can lead to undefined behavior or security vulnerabilities when accessing elements beyond the defined bounds.
    To fix this, ensure the array dimensions are increased by 1 to accommodate all possible indices.
  severity: ERROR
  metadata:
    source-url: github.com/karelzak/util-linux/commit/70e3fcf293c1827a2655a86584ab13075124a8a8
    category: security
    cwe:
    - CWE-119
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-util-linux-89e90ae7
  pattern: |
    strchr($VALUE + 1, '"');
    if (!$END) {
      ...
    }
  pattern-not: |
    char *$P = $END = $VALUE + 1;
    while (*$P) {
      if (*$P == '\\') {
        $P++;
        *$END = *$P;
      } else {
        *$END = *$P;
        if (*$P == '"')
          break;
      }
      $P++;
      $END++;
    }
    if (*$END != '"') {
      $END = ++$P;
    }
  languages:
  - c
  message: |
    The code uses `strchr` to find the end of a quoted string without properly handling escaped quotes. This can lead to incorrect parsing of strings containing escaped quotes, potentially causing security vulnerabilities such as injection attacks. The fix involves iterating through the string and properly handling escaped quotes by converting them to their unescaped form.
  severity: ERROR
  metadata:
    source-url: github.com/karelzak/util-linux/commit/89e90ae7b2826110ea28c1c0eb8e7c56c3907bdc
    category: security
    cwe:
    - CWE-116
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-util-linux-ebbeb2c7
  pattern: |
    setuid(getuid());
    setgid(getgid());
  pattern-not: |
    if(setgid(getgid()) < 0)
      die(EX_FAIL, _("$MSG: cannot set group id: %s"), strerror(errno));
    if(setuid(getuid()) < 0)
      die(EX_FAIL, _("$MSG: cannot set user id: %s"), strerror(errno));
  languages:
  - c
  message: |
    Detected unsafe privilege drop without error handling.
    The code attempts to drop privileges using setuid() and setgid() but does not check for errors.
    If these calls fail, the program may continue running with elevated privileges, leading to potential privilege escalation vulnerabilities.
    Always check the return value of setuid() and setgid() and handle errors appropriately.
  severity: ERROR
  metadata:
    source-url: github.com/karelzak/util-linux/commit/ebbeb2c7ac1b00b6083905957837a271e80b187e
    category: security
    cwe:
    - CWE-273
    owasp: 'A2: Broken Authentication'
    references:
    - https://man7.org/linux/man-pages/man2/setuid.2.html
    - https://man7.org/linux/man-pages/man2/setgid.2.html
    technology:
    - c
