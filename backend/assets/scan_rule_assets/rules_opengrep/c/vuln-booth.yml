rules:
- id: vuln-booth-35bf0b7b
  pattern: "if (is_auth_req()) {\n  ...\n}\n"
  pattern-not: "if ($BOOTH_CONF->authfile[0] != '\\0') {\n  ...\n}\n"
  languages:
  - c
  message: 'The function `is_auth_req()` is used to check authentication without verifying the presence of an authfile. This
    can lead to unauthorized access if the authentication configuration is not properly set. Instead, explicitly check if
    the authfile is configured by verifying `booth_conf->authfile[0] != ''\0''`.

    '
  severity: ERROR
  metadata:
    source-url: github.com/ClusterLabs/booth/commit/35bf0b7b048d715f671eb68974fb6b4af6528c67
    category: security
    cwe:
    - CWE-287
    owasp:
    - A01:2021-Broken Access Control
    technology:
    - c
- id: vuln-booth-43eaf0e8
  pattern: '$TPT->recv($SITE, $MSG + $LEN, $LEN - sizeof(*$HEADER))

    '
  pattern-not: '$TPT->recv($SITE, $MSG + sizeof(*$HEADER), $LEN - sizeof(*$HEADER))

    '
  languages:
  - c
  message: 'This vulnerability occurs when the `recv` function is called with an incorrect offset calculation, potentially
    leading to buffer overflows or data corruption. The issue arises because the message pointer is incremented by the message
    length (`len`) instead of the header size (`sizeof(*header)`), which can cause the function to read beyond the intended
    memory boundary. To fix this, ensure that the message pointer is incremented by the header size (`sizeof(*header)`) to
    correctly align the buffer.

    '
  severity: ERROR
  metadata:
    source-url: github.com/ClusterLabs/booth/commit/43eaf0e82b1475a6a5322881cbd8260b6c3f5ef8
    category: security
    cwe:
    - CWE-119
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/119.html
    technology:
    - c
- id: vuln-booth-98b4284d
  pattern: '$FUNC(gcry_md_get_algo_dlen($HID))

    '
  pattern-not: '$HLEN = gcry_md_get_algo_dlen($HID);

    $FUNC($HLEN)

    '
  languages:
  - c
  message: 'Direct usage of `gcry_md_get_algo_dlen` without checking its return value can lead to vulnerabilities. Always
    store the result in a variable and verify it before use to prevent potential security issues.

    '
  severity: ERROR
  metadata:
    source-url: github.com/ClusterLabs/booth/commit/98b4284d1701f2efec278b51f151314148bfe70e
    category: security
    cwe:
    - CWE-190
    owasp:
    - 'A1: Injection'
    technology:
    - c
