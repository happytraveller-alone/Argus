rules:
- id: vuln-open-vm-tools-76dccec4
  pattern: |
    static Bool
    MakeDirectory(const char *path, mode_t mode, uid_t uid, gid_t gid)
    {
      if (mkdir(path, mode) == 0) {
        if (!ChmodChownDirectory(path, mode, uid, gid)) {
          return FALSE;
        }
        return TRUE;
      }
      if (errno != EEXIST || !ChmodChownDirectory(path, mode, uid, gid)) {
        return FALSE;
      }
      return TRUE;
    }
  pattern-not: |
    static Bool
    MakeDirectory(const char *path, mode_t mode, uid_t uid, gid_t gid)
    {
      if (mkdir(path, mode) == 0) {
        if (!ChmodChownDirectory(path, mode, uid, gid)) {
          return FALSE;
        }
        return TRUE;
      }
      if (errno != EEXIST || !ChmodChownDirectory(path, mode, uid, gid)) {
        return FALSE;
      }
      return TRUE;
    }
  languages:
  - c
  message: |
    The function `MakeDirectory` does not properly handle the case where the directory already exists. This can lead to race conditions and insecure directory permissions. Ensure that the directory is properly checked and permissions are set atomically.
  severity: ERROR
  metadata:
    source-url: github.com/vmware/open-vm-tools/commit/76dccec4dd4002cec240e71e0042cdacfae6cca7
    category: security
    cwe:
    - CWE-276
    owasp:
    - 'A9: Security Misconfiguration'
    references:
    - https://cwe.mitre.org/data/definitions/276.html
    technology:
    - c
