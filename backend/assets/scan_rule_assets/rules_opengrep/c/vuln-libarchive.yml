rules:
- id: vuln-libarchive-05a875fd
  pattern: |
    if (wstrcmp($START, $FLAG_WNAME) == 0) {
      ...
    }
  pattern-not: |
    if (wcscmp($START, $FLAG_WNAME) == 0) {
      ...
    }
  languages:
  - c
  message: |
    The code uses a custom `wstrcmp` function which may have incorrect behavior.
    This can lead to improper string comparison and potential security vulnerabilities.
    Replace `wstrcmp` with the standard `wcscmp` function to ensure correct string comparison.
  severity: ERROR
  metadata:
    source-url: github.com/libarchive/libarchive/commit/05a875fdb876e7a2f56a2937f756927cbed919e0
    category: security
    cwe:
    - 'CWE-697: Incorrect Comparison'
    owasp: 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-libarchive-65a23f5d
  pattern: |
    *$BUFF = __archive_read_ahead($A, 1, &$BYTES_AVAIL);
  pattern-not: |
    *$BUFF = __archive_read_ahead($A, $MINIMUM, &$BYTES_AVAIL);
  languages:
  - c
  message: |
    The use of a hardcoded value '1' in __archive_read_ahead can lead to performance issues and potential security vulnerabilities. This forces the decompressor to combine reads by copying data, which can be inefficient and may lead to buffer overflows or other memory-related issues. Use a dynamic minimum value instead to ensure proper handling of available bytes.
  severity: ERROR
  metadata:
    source-url: github.com/libarchive/libarchive/commit/65a23f5dbee4497064e9bb467f81138a62b0dae1
    category: security
    cwe:
    - CWE-120
    owasp:
    - 'A2: Insecure Design'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
    - c
- id: vuln-libarchive-a550daee
  pattern: |
    $NUMBERS[$ARGC++] = $EXPR;
    if ($ARGC > $MAX_PACK_ARGS) {
      ...
    }
  pattern-not: |
    if ($ARGC >= $MAX_PACK_ARGS) {
      $NUMBERS[$ARGC++] = $EXPR;
      ...
    }
  languages:
  - c
  message: |
    The code increments the array index before checking the bounds, which can lead to an out-of-bounds write. This is dangerous because it can result in memory corruption, potentially leading to crashes, data corruption, or even remote code execution. To fix this, ensure the bounds check is performed before incrementing the array index.
  severity: ERROR
  metadata:
    source-url: github.com/libarchive/libarchive/commit/a550daeecf6bc689ade371349892ea17b5b97c77
    category: security
    cwe:
    - CWE-787
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-libarchive-b31744df
  pattern: |
    static time_t $T;
    time_t $A;
    if ($T == 0) {
      $A = 1;
      while ($A > $T) {
        $T = $A;
        $A = $A * 2 + 1;
      }
    }
  pattern-not: |
    if (((time_t)0) < ((time_t)-1)) {
      return (~(time_t)0);
    } else {
      const uintmax_t $MAX_UNSIGNED_TIME_T = (uintmax_t)(~(time_t)0);
      const uintmax_t $MAX_SIGNED_TIME_T = $MAX_UNSIGNED_TIME_T >> 1;
      return (time_t)$MAX_SIGNED_TIME_T;
    }
  languages:
  - c
  message: |
    Detected unsafe time_t computation that may lead to incorrect time handling.
    The original code attempts to compute the maximum value of time_t by iterating,
    which can result in undefined behavior or incorrect results on different systems.
    The fix properly handles both signed and unsigned time_t types according to POSIX conventions.
    Replace with the fixed code that checks if time_t is signed or unsigned and returns the appropriate maximum value.
  severity: ERROR
  metadata:
    source-url: github.com/libarchive/libarchive/commit/b31744df71084a8734f97199e42418f55d08c6c5
    category: security
    cwe:
    - CWE-190
    owasp:
    - 'A2: Cryptographic Failures'
    references:
    - https://pubs.opengroup.org/onlinepubs/9699919799/basedefs/sys_types.h.html
    technology:
    - c
- id: vuln-libarchive-d24e79e8
  pattern: |
    static int $FUNC(struct archive_read *$A) {
      int $RET = ARCHIVE_OK;
      $RET = archive_write_free($A->extract->ad);
      free($A->extract);
      $A->extract = NULL;
      return ($RET);
    }
  pattern-not: |
    static int $FUNC(struct archive_read *$A) {
      int $RET = ARCHIVE_OK;
      if ($A->extract->ad != NULL) {
        $RET = archive_write_free($A->extract->ad);
      }
      free($A->extract);
      $A->extract = NULL;
      return ($RET);
    }
  languages:
  - c
  message: |
    Detected a potential NULL pointer dereference in archive_read_extract_cleanup function. The function directly calls archive_write_free without checking if a->extract->ad is NULL, which can lead to a crash. The fix involves adding a NULL check before calling archive_write_free.
  severity: ERROR
  metadata:
    source-url: github.com/libarchive/libarchive/commit/d24e79e8f9547ae475a3a0c9516e079a14010838
    category: security
    cwe:
    - CWE-476
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/476.html
    technology:
    - c
