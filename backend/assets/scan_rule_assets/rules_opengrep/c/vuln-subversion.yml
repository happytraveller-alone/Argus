rules:
- id: vuln-subversion-df961c8f
  patterns:
  - pattern: |
      $VAR = "$SVN_SSH ssh -q"
  - pattern-not: |
      $VAR = "$SVN_SSH ssh -q --"
  languages:
  - c
  message: |
    The SSH command is missing the '--' argument separator, which can lead to command injection if the hostname starts with a '-'. This is dangerous because an attacker could craft a malicious hostname to execute arbitrary commands. To fix this, always include '--' in SSH commands to separate options from arguments.
  severity: ERROR
  metadata:
    source-url: github.com/apache/subversion/commit/df961c8f7d48f435a631716ff7d164f323940da5
    category: security
    cwe:
    - CWE-78
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-subversion-e4d42eb1
  patterns:
  - pattern: |
      $FUNC($PROPNAME, $VALUE, $RESOURCE->pool);
  - pattern-not: |
      $FUNC($PROPNAME, $VALUE, $SUBPOOL);
  languages:
  - c
  message: |
    Detected a potential resource leak due to improper pool management.
    The code uses the parent pool (`$RESOURCE->pool`) directly for property operations, which can lead to resource exhaustion in scenarios with multiple calls.
    This vulnerability can cause memory leaks or degraded performance.
    To fix, create and use a subpool (`svn_pool_create`) for these operations and destroy it (`svn_pool_destroy`) after use.
  severity: ERROR
  metadata:
    source-url: github.com/apache/subversion/commit/e4d42eb10e29caf907083f188f314c2eebfb8ae1
    category: security
    cwe:
    - CWE-401
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
