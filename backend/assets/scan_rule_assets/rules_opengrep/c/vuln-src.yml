rules:
- id: vuln-src-13053edc
  pattern: |
    if (!$CLASS && $PWD && $PWD->pw_class && $PWD->pw_class[0] != '\0')
      $CLASS = strdup($PWD->pw_class);
    if (($LC = login_getclass($CLASS)) == NULL)
      $LOGIN_DEFCLASS;
  pattern-not: |
    if ($PW_CLASS == NULL && $PWD != NULL)
      $PW_CLASS = $PWD->pw_class;
    if (($LC = login_getclass($PW_CLASS)) == NULL)
      $LOGIN_DEFCLASS;
  languages:
  - c
  message: |
    The code directly uses `strdup` on a potentially uninitialized or NULL pointer `pw_class`, which can lead to undefined behavior or crashes. Instead, a temporary variable should be used to safely handle the `pw_class` value. This vulnerability can be fixed by using a separate variable to store the `pw_class` value and checking for NULL before using it.
  severity: ERROR
  metadata:
    source-url: github.com/openbsd/src/commit/13053edc2f30540fa66763e29d0a8eec43f1aa53
    category: security
    cwe:
    - CWE-476
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    references:
    - https://cwe.mitre.org/data/definitions/476.html
    technology:
    - c
- id: vuln-src-2dfc98f4
  pattern: |
    auth_call($AS, $SCRIPT, $SHELL, $FFLAG ? "-f" : $USERNAME, $FFLAG ? $USERNAME : 0, (char *)0);
  pattern-not: |
    auth_call($AS, $SCRIPT, $SHELL, "--", $USERNAME, (char *)NULL);
  languages:
  - c
  message: |
    The vulnerability involves improper argument handling in the `auth_call` function, which can lead to security issues such as command injection or unexpected behavior. The fix ensures that the arguments are properly separated using "--" to prevent argument misinterpretation. Always use "--" to separate options from arguments in command invocations to avoid such vulnerabilities.
  severity: ERROR
  metadata:
    source-url: github.com/openbsd/src/commit/2dfc98f42e117c7605b52b5020b630d98601dc22
    category: security
    cwe:
    - CWE-88
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/88.html
    technology:
    - c
- id: vuln-src-7afb2d41
  pattern: |
    if ($PEERKEY && !EVP_PKEY_cmp($PEERKEY, $LOCALKEY)) {
      ...
    }
  pattern-not: |
    if ($PEERKEY && EVP_PKEY_cmp($PEERKEY, $LOCALKEY) != 1) {
      ...
    }
  languages:
  - c
  message: |
    The code incorrectly checks the result of EVP_PKEY_cmp by using the logical NOT operator (!) instead of comparing the result to 1. This can lead to incorrect validation of cryptographic keys, potentially allowing unauthorized access. The correct approach is to explicitly check if the result equals 1, indicating a successful match.
  severity: ERROR
  metadata:
    source-url: github.com/openbsd/src/commit/7afb2d41c6d373cf965285840b85c45011357115
    category: security
    cwe:
    - CWE-327
    owasp:
    - 'A02: Cryptographic Failures'
    technology:
    - c
- id: vuln-src-9dcfda04
  pattern: |
    if (!valid_localpart($MADDR->user) ||
        !valid_domainpart($MADDR->domain)) {
        ...
        if ($MAILFROM && $MADDR->user[0] == '\0' && $MADDR->domain[0] == '\0')
            return (1);
        ...
    }
  pattern-not: |
    if ($MAILFROM && $MADDR->user[0] == '\0' && $MADDR->domain[0] == '\0')
        return (1);
    if ($MADDR->user[0] == '\0' || !valid_localpart($MADDR->user))
        return (0);
    if ($MADDR->domain[0] == '\0') {
        (void)strlcpy($MADDR->domain, $DOMAIN, sizeof($MADDR->domain));
    }
    if (!valid_domainpart($MADDR->domain))
        return (0);
  languages:
  - c
  message: |
    The code incorrectly validates email addresses by not properly checking the domain part after handling an empty user and domain. This can lead to accepting invalid email addresses. The patch ensures that the domain part is validated correctly after handling the empty case. To fix this, ensure that the domain part is validated even after handling the empty user and domain case.
  severity: ERROR
  metadata:
    source-url: github.com/openbsd/src/commit/9dcfda045474d8903224d175907bfc29761dcb45
    category: security
    cwe:
    - CWE-20
    owasp:
    - A2:2017-Broken Authentication
    technology:
    - c
