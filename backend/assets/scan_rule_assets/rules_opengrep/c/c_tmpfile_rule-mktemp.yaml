rules:
- id: c_tmpfile_rule-mktemp
  languages:
  - c
  message: |
    检测到临时文件使用不安全风险（规则：c_tmpfile_rule-mktemp）。危害：可预测或未同步的临时文件可能被抢占、覆盖或读取，造成信息泄露或文件篡改。建议：使用安全的临时文件创建
    API，并在使用前正确刷新/关闭。
    保留的关键标识：https://wiki.sei.cmu.edu/confluence/pages/viewpage.action?pageId=87152425、`mktemp`、`mkstemp`、`umask`。
  metadata:
    shortDescription: Use of deprecated function (mktemp)
    cwe: CWE-377
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    security-severity: Medium
    category: security
  pattern: mktemp(...)
  severity: ERROR
