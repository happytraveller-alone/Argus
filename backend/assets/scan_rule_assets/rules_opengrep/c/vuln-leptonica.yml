rules:
- id: vuln-leptonica-25ef6f68
  patterns:
  - pattern: |
      stringCheckForChars($ROOTNAME, "`;&|><\"?*", $BADCHAR)
  - pattern-not: |
      stringCheckForChars($ROOTNAME, "`;&|><\"?*$()", $BADCHAR)
  languages:
  - c
  message: |
    The function `stringCheckForChars` is missing critical characters (`$()`) in the set of dangerous characters to check for. This can lead to command injection vulnerabilities if the input is used in shell commands. To fix this, ensure all potentially dangerous characters are included in the character set.
  severity: ERROR
  metadata:
    source-url: github.com/DanBloomberg/leptonica/commit/25ef6f683de2abcea7af3191475a90218b96c340
    category: security
    cwe:
    - CWE-78
    owasp:
    - A03:2021-Injection
    references:
    - https://cwe.mitre.org/data/definitions/78.html
    technology:
    - c
- id: vuln-leptonica-b88c821f
  patterns:
  - pattern: |
      pixGetWordBoxesInTextlines($PIX, 1, $X, $Y, $W, $H, $BOXA, $NAI)
  - pattern-not: |
      pixGetWordBoxesInTextlines($PIX, $X, $Y, $W, $H, $BOXA, $NAI)
  languages:
  - c
  message: |
    The function `pixGetWordBoxesInTextlines` was called with an incorrect first parameter (reduction factor).
    This parameter was removed in the patch, indicating it was either unnecessary or incorrect.
    Using the old version could lead to incorrect text line detection or processing errors.
    Update the call to remove the first parameter and ensure proper text line detection.
  severity: ERROR
  metadata:
    source-url: github.com/DanBloomberg/leptonica/commit/b88c821f8d347bce0aea86d606c710303919f3d2
    category: security
    cwe:
    - CWE-682
    owasp:
    - A03:2021 - Injection
    technology:
    - c
