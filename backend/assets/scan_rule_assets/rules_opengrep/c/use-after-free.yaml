rules:
- id: use-after-free
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/416
    - https://github.com/struct/mms
    - https://www.sei.cmu.edu/downloads/sei-cert-c-coding-standard-2016-v01.pdf
    - https://docs.microsoft.com/en-us/cpp/sanitizers/asan-error-examples
    confidence: MEDIUM
    cwe:
    - 'CWE-416: Use After Free'
  message: |
    检测到释放后使用内存风险（规则：use-after-free）。危害：继续访问已释放内存可能读写无效对象，导致数据破坏、崩溃或代码执行。建议：释放后不要再访问该指针，必要时重构对象生命周期。
  severity: ERROR
  languages:
  - c
  patterns:
  - pattern-either:
    - pattern: $PTR->$_
    - pattern: $PTR[$_]
    - pattern: (*$PTR)
    - pattern: return $PTR;
    - patterns:
      - pattern-either:
        - pattern: $FUN(..., <... $PTR ...>, ...)
        - pattern: $FUN(..., <... $PTR->$_ ...>, ...)
        - pattern: $FUN(..., <... $PTR[$_] ...>, ...)
        - pattern: $FUN(..., <... (*$PTR) ...>, ...)
        - pattern: $PTR->$FUN(...)
      - metavariable-pattern:
          metavariable: $FUN
          patterns:
          - pattern-not: free
  - pattern-inside: free($PTR); ...
  - pattern-not-inside: |
      free($PTR);
      $PTR = $_;
      ...
