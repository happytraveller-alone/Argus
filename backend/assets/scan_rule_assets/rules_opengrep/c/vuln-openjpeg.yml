- id: vuln-openjpeg-afb308b9
  pattern: '$LHS = 1 + (OPJ_UINT32)(($X1 - $X0) * ...);

    '
  pattern-not: '$LHS = 2 + (OPJ_UINT32)(($X1 - $X0) * ...);

    '
  languages:
  - c
  message: 'This rule detects an insufficient buffer size allocation vulnerability. The original code adds 1 to the calculated
    size, which is insufficient and can lead to buffer overflows. The issue was fixed by changing the offset to 2. This vulnerability
    is dangerous because it can result in memory corruption, potentially leading to arbitrary code execution or crashes. To
    fix this, ensure the buffer size is calculated with a sufficient offset to accommodate all possible data.

    '
  severity: ERROR
  metadata:
    source-url: github.com/uclouvain/openjpeg/commit/afb308b9ccbe129608c9205cf3bb39bbefad90b9
    category: security
    cwe:
    - CWE-120
    owasp:
    - 'A1: Injection'
    references:
    - https://github.com/uclouvain/openjpeg/issues/835
    - https://github.com/uclouvain/openjpeg/issues/982
    technology:
    - c
- id: vuln-openjpeg-b2072402
  pattern: '$EXPR1 + $EXPR2 + $EXPR3 + $EXPR4

    '
  pattern-not: '$EXPR1 + $EXPR2 + $EXPR3

    '
  languages:
  - c
  message: "The vulnerability involves incorrect arithmetic calculations in image subsampling parameters. \nThe original code\
    \ adds unnecessary offset values (image->x0 and image->y0) to the subsampling parameters, \nwhich could lead to incorrect\
    \ image processing and potential memory corruption. \nThis is dangerous because it can cause undefined behavior or crashes\
    \ when processing malformed images. \nTo fix it, remove the unnecessary offset additions from the subsampling calculations.\n"
  severity: ERROR
  metadata:
    source-url: github.com/uclouvain/openjpeg/commit/b2072402b7e14d22bba6fb8cde2a1e9996e9a919
    category: security
    cwe:
