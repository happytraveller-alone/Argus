    technology:
    - c
- id: vuln-openjpeg-79c7d7af
  pattern: '$DIRPTR->filename_buf = (char*)malloc($SIZE * $OPJ_PATH_LEN * sizeof(char));

    $DIRPTR->filename = (char**) malloc($SIZE * sizeof(char*));

    '
  pattern-not: '$DIRPTR->filename_buf = (char*)calloc($SIZE, $OPJ_PATH_LEN * sizeof(char));

    $DIRPTR->filename = (char**) calloc($SIZE, sizeof(char*));

    '
  languages:
  - c
  message: 'The use of `malloc` without initialization can lead to uninitialized memory access vulnerabilities. This is dangerous
    because it can expose sensitive data or cause undefined behavior. Replace `malloc` with `calloc` to ensure memory is zero-initialized.

    '
  severity: ERROR
  metadata:
    source-url: github.com/uclouvain/openjpeg/commit/79c7d7af598b778c3cdcb455df23d50efc95eb3c
    category: security
    cwe:
    - CWE-908
    owasp: 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-openjpeg-a1d32a59
  pattern: '$VAR[$INDEX] *= (1 << $SHIFT)

    '
  pattern-not: '$VAR[$INDEX] <<= $SHIFT

    '
  languages:
  - c
  message: "Detected potential integer overflow vulnerability due to multiplication on signed types. \nWhen multiplying a\
    \ signed integer by a left-shifted value, large values can cause overflow, \nleading to undefined behavior. To fix, use\
    \ unsigned types and left shift directly instead \nof multiplication.\n"
  severity: ERROR
  metadata:
    source-url: github.com/uclouvain/openjpeg/commit/a1d32a596a94280178c44a55d7e7f1acd992ed5d
    category: security
    cwe:
    - CWE-190
    owasp: A9:2017-Using Components with Known Vulnerabilities
    references:
    - https://github.com/uclouvain/openjpeg/issues/1053
    technology:
    - c
