rules:
- id: vuln-openjpeg-05be3084
  pattern: 'get_ushort(*(unsigned short*)($VAR))

    '
  pattern-not: 'get_tga_ushort(*(unsigned short*)($VAR))

    '
  languages:
  - c
  message: 'Detected unsafe usage of `get_ushort` which does not properly handle endianness. This can lead to incorrect data
    interpretation and potential security vulnerabilities. Replace with `get_tga_ushort` which correctly handles little-endian
    serialized values.

    '
  severity: ERROR
  metadata:
    source-url: github.com/uclouvain/openjpeg/commit/05be3084460e46282ee63f04c72c451f3271fd28
    category: security
    cwe:
    - 'CWE-190: Integer Overflow or Wraparound'
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-openjpeg-0bc90e40
  pattern: 'fscanf($F, "PG%[ \t]%c%c%[ \t+-]%d%[ \t]%d%[ \t]%d", ...);

    '
  pattern-not: 'fscanf($F, "PG%31[ \t]%c%c%31[ \t+-]%d%31[ \t]%d%31[ \t]%d", ...);

    '
  languages:
  - c
  message: "Detected use of fscanf with unbounded format specifiers, which can lead to buffer overflows. \nThe patch limits\
    \ the width of the format specifiers to 31 characters to prevent potential overflows. \nAlways use bounded format specifiers\
    \ in fscanf to avoid security vulnerabilities.\n"
  severity: ERROR
  metadata:
    source-url: github.com/uclouvain/openjpeg/commit/0bc90e4062a5f9258c91eca018c019b179066c62
    category: security
    cwe:
    - CWE-120
    - CWE-125
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
    - c
- id: vuln-openjpeg-15cf3d95
  pattern: '$L_DATA_SIZE = 26 + (OPJ_UINT32)(($X1 - $X0) * ...);

    '
  pattern-not: '$L_DATA_SIZE = 28 + (OPJ_UINT32)(($X1 - $X0) * ...);

    '
  languages:
  - c
  message: 'This rule detects a vulnerability where the size calculation for data allocation is incorrect, leading to potential
    buffer overflows or underflows. The original code used a constant value of 26, which was insufficient and could result
    in memory corruption. The fix changes this value to 28 to ensure proper allocation. To fix this, update the constant value
    to 28 in the size calculation.

    '
  severity: ERROR
  metadata:
    source-url: github.com/uclouvain/openjpeg/commit/15cf3d95814dc931ca0ecb132f81cb152e051bae
    category: security
    cwe:
    - 'CWE-131: Incorrect Calculation of Buffer Size'
    owasp: 'A1: Injection'
    references:
    - https://github.com/uclouvain/openjpeg/issues/1283
    technology:
    - c
- id: vuln-openjpeg-162f6199
  pattern: 'if($IMAGE->numcomps < 4) return;

    '
  pattern-not: "if (\n    ($IMAGE->numcomps < 4)\n    || ($IMAGE->comps[0].dx != $IMAGE->comps[1].dx) || ($IMAGE->comps[0].dx\
    \ != $IMAGE->comps[2].dx) || ($IMAGE->comps[0].dx != $IMAGE->comps[3].dx)\n    || ($IMAGE->comps[0].dy != $IMAGE->comps[1].dy)\
    \ || ($IMAGE->comps[0].dy != $IMAGE->comps[2].dy) || ($IMAGE->comps[0].dy != $IMAGE->comps[3].dy)\n    ) {\n  fprintf(stderr,\"\
    %s:%d:color_cmyk_to_rgb\\n\\tCAN NOT CONVERT\\n\", __FILE__,__LINE__);\n  return;\n}\n"
  languages:
  - c
  message: 'The vulnerability occurs when the code only checks if the number of components is less than 4 but does not verify
    the consistency of the dx and dy values across components. This can lead to incorrect image processing and potential security
    issues. To fix this, ensure that all components have consistent dx and dy values before proceeding.

    '
  severity: ERROR
  metadata:
    source-url: github.com/uclouvain/openjpeg/commit/162f6199c0cd3ec1c6c6dc65e41b2faab92b2d91
    category: security
    cwe:
    - CWE-20
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/20.html
    technology:
    - c
- id: vuln-openjpeg-178194c0
  pattern: "assert($CMAP[$I].mtyp == 0 || $CMAP[$I].mtyp == 1);\nif ($PCOL >= $NR_CHANNELS) {\n  ...\n}\n"
  pattern-not: "if ($CMAP[$I].mtyp != 0 && $CMAP[$I].mtyp != 1) {\n  opj_event_msg($MANAGER, EVT_ERROR, \"Invalid value for\
    \ cmap[%d].mtyp = %d.\\n\", $I, $CMAP[$I].mtyp);\n  $IS_SANE = OPJ_FALSE;\n} else if ($PCOL >= $NR_CHANNELS) {\n  ...\n\
    }\n"
  languages:
  - c
  message: 'The code uses an assert statement to validate the value of cmap[i].mtyp, which can be disabled in production builds,
    leading to potential security vulnerabilities. Instead, proper error handling should be implemented to ensure the value
    is always validated. This can prevent undefined behavior or crashes when invalid values are encountered.

    '
  severity: ERROR
  metadata:
    source-url: https://github.com/uclouvain/openjpeg/commit/178194c093422c9564efc41f9ecb5c630b43f723
    category: security
    cwe:
    - 'CWE-617: Reachable Assertion'
    owasp: A9:2017 - Using Components with Known Vulnerabilities
    references:
    - ISO 15444-1 Table I.14 – MTYPi field values
    technology:
    - c
- id: vuln-openjpeg-18b1138f
  pattern: '$TCP_POC->compno1 = $PARAMETERS->POC[$NUM_POCS_TILE].compno1;

    '
  pattern-not: '$TCP_POC->compno1 = opj_uint_min($PARAMETERS->POC[$NUM_POCS_TILE].compno1, $IMAGE->numcomps);

    '
  languages:
  - c
  message: 'The code directly assigns a value from `POC[numpocs_tile].compno1` to `tcp_poc->compno1` without checking if it
    exceeds the number of components in the image. This can lead to out-of-bounds access and potential memory corruption.
    The fix involves using `opj_uint_min` to ensure the value does not exceed `image->numcomps`.

    '
  severity: ERROR
  metadata:
    source-url: github.com/uclouvain/openjpeg/commit/18b1138fbe3bb0ae4aa2bf1369f9430a8ec6fa00
    category: security
    cwe:
    - CWE-125
    - CWE-787
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/125.html
    - https://cwe.mitre.org/data/definitions/787.html
    technology:
    - c
- id: vuln-openjpeg-2cd30c2b
  pattern: "static unsigned short get_ushort(const unsigned char *data) {\n    unsigned short val = *(const unsigned short\
    \ *)data;\n    #ifdef OPJ_BIG_ENDIAN\n    val = ((val & 0xffU) << 8) | (val >> 8);\n    #endif\n    return val;\n}\n"
  pattern-not: "static unsigned short get_tga_ushort(const unsigned char *data) {\n    return data[0] | (data[1] << 8);\n\
    }\n"
  languages:
  - c
  message: 'The function `get_ushort` directly casts a byte array to a short, which can lead to incorrect endianness handling.
    This can cause misinterpretation of data and potential security vulnerabilities. Use `get_tga_ushort` instead, which correctly
    handles little-endian byte order.

    '
  severity: ERROR
  metadata:
    source-url: github.com/uclouvain/openjpeg/commit/2cd30c2b06ce332dede81cccad8b334cde997281
    category: security
    cwe:
    - 'CWE-190: Integer Overflow or Wraparound'
    owasp: A9:2021-Security Logging and Monitoring Failures
    technology:
    - c
- id: vuln-openjpeg-2fa0fc61
  pattern: "$EXPR && (\n  $COMP1.dx == $COMP2.dx &&\n  $COMP2.dx == $COMP3.dx &&\n  $COMP1.dy == $COMP2.dy &&\n  $COMP2.dy\
    \ == $COMP3.dy &&\n  $COMP1.prec == $COMP2.prec &&\n  $COMP2.prec == $COMP3.prec\n)\n"
  pattern-not: 'are_comps_similar($IMAGE)

    '
  languages:
  - c
  message: 'Detected direct comparison of image component properties without proper validation. This can lead to security
    vulnerabilities if the components are not properly checked for consistency. Use the `are_comps_similar` function to ensure
    all components are validated correctly.

    '
  severity: ERROR
  metadata:
    source-url: github.com/uclouvain/openjpeg/commit/2fa0fc61f2d546c8b67e7c5a9cbc61d98e1f7af0
    category: security
    cwe:
    - CWE-20
    owasp:
    - A06:2021-Vulnerable and Outdated Components
    references:
    - https://cwe.mitre.org/data/definitions/20.html
    - https://owasp.org/www-project-top-ten/
    technology:
    - c
- id: vuln-openjpeg-397f62c0
  pattern: '$SIZE = (OPJ_UINT32)(($X1 - $X0) * ($Y1 - $Y0) * (OPJ_INT32)sizeof(OPJ_UINT32));

    '
  pattern-not: '$SIZE = 1 + (OPJ_UINT32)(($X1 - $X0) * ($Y1 - $Y0) * (OPJ_INT32)sizeof(OPJ_UINT32));

    '
  languages:
  - c
  message: "This rule detects a potential buffer overflow vulnerability due to incorrect size calculation. \nThe original\
    \ code calculates the size of a buffer without adding 1, which can lead to insufficient memory allocation. \nThis can\
    \ cause buffer overflow, potentially leading to memory corruption or code execution. \nThe fix is to add 1 to the size\
    \ calculation to ensure sufficient memory is allocated.\n"
  severity: ERROR
  metadata:
    source-url: github.com/uclouvain/openjpeg/commit/397f62c0a838e15d667ef50e27d5d011d2c79c04
    category: security
    cwe:
    - 'CWE-120: Buffer Copy without Checking Size of Input (''Classic Buffer Overflow'')'
    owasp:
    - 'A2: Cryptographic Failures'
    references:
    - https://github.com/uclouvain/openjpeg/issues/835
    technology:
    - c
- id: vuln-openjpeg-39f9934a
  pattern: "for( $I = 0; $QUERY_PARAM.box_type[$I][0] != 0 && $I < $MAX_NUMOFBOX; $I++ ) {\n  ...\n}\n"
  pattern-not: "for( $I = 0; $I < $MAX_NUMOFBOX && $QUERY_PARAM.box_type[$I][0] != 0; $I++ ) {\n  ...\n}\n"
  languages:
  - c
  message: 'Potential out-of-bounds array access due to incorrect loop condition order.

    The condition `query_param.box_type[i][0] != 0` is checked before `i < MAX_NUMOFBOX`,

    which could lead to accessing memory beyond the array bounds if `i` exceeds `MAX_NUMOFBOX`.

    Fix by reordering the conditions to check the array bounds first.

    '
  severity: ERROR
  metadata:
    source-url: github.com/uclouvain/openjpeg/commit/39f9934a70f5f01ddb7adc70801e981efb146f05
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-openjpeg-6daf5f3e
  pattern: 'OPJ_FLOAT64 $VAR = opj_dwt_norms_real[$ORIENT][$LEVEL];

    '
  pattern-not: 'OPJ_FLOAT64 $VAR = opj_dwt_getnorm_real($LEVEL, $ORIENT);

    '
  languages:
  - c
  message: "Direct array access to `opj_dwt_norms_real` is vulnerable to out-of-bounds access. \nUse the safer `opj_dwt_getnorm_real`\
    \ function instead to ensure proper bounds checking.\n"
  severity: ERROR
  metadata:
    source-url: github.com/uclouvain/openjpeg/commit/6daf5f3e1ec6eff03b7982889874a3de6617db8d
    category: security
    cwe:
