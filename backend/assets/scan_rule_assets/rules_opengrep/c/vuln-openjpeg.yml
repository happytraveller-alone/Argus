- id: vuln-openjpeg-dcac91b8
  pattern: 'opj_j2k_write_sot($J2K, $DATA, $NB_BYTES_WRITTEN, $STREAM, $MANAGER)

    '
  pattern-not: 'opj_j2k_write_sot($J2K, $DATA, $TOTAL_DATA_SIZE, $NB_BYTES_WRITTEN, $STREAM, $MANAGER)

    '
  languages:
  - c
  message: 'The function `opj_j2k_write_sot` is called without checking the size of the output buffer, which can lead to buffer
    overflow vulnerabilities. This is dangerous because it can allow attackers to overwrite adjacent memory, potentially leading
    to arbitrary code execution or crashes. Always pass and validate the total data size parameter to ensure the buffer is
    large enough to handle the data being written.

    '
  severity: ERROR
  metadata:
    source-url: github.com/uclouvain/openjpeg/commit/dcac91b8c72f743bda7dbfa9032356bc8110098a
    category: security
    cwe:
    - CWE-120
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
    - c
- id: vuln-openjpeg-e03e9474
  pattern: "if ($VAR->prec > 32) {\n  ...\n}\n"
  pattern-not: "if ($VAR->prec > 31) {\n  ...\n}\n"
  languages:
  - c
  message: 'Detected a potential out-of-bounds issue where the precision value (`prec`) is checked against 32 instead of 31.
    This could lead to invalid memory access or undefined behavior. According to the JPEG2000 norm, OpenJpeg only supports
    precision values up to 31. Fix the condition to check `if ($VAR->prec > 31)`.

    '
  severity: ERROR
  metadata:
    source-url: github.com/uclouvain/openjpeg/commit/e03e9474667e5117341351699f0b1dbb06f93346
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    owasp:
    - 'A1: Injection'
    technology:
    - c
