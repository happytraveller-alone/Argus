rules:
- id: vuln-tcpreplay-2595c903
  pattern: "if ($PKTHDR->len < $PKTHDR->caplen) {\n  ...\n}\n"
  pattern-not: "if (!$PKTHDR->len || $PKTHDR->len < $PKTHDR->caplen) {\n  ...\n}\n"
  languages:
  - c
  message: "Detected a missing check for zero packet length in packet capture handling. \nThis vulnerability could lead to\
    \ incorrect processing of malformed packets. \nThe fix involves adding a check for zero length before comparing packet\
    \ length and capture length.\n"
  severity: ERROR
  metadata:
    source-url: github.com/appneta/tcpreplay/commit/2595c903b61d9e50b22cbfcc6899f8f11a17bbff
    category: security
    cwe:
    - CWE-120
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-tcpreplay-46cf964a
  pattern: 'packet += l2offset;

    l2len -= l2offset;

    pkt_len -= l2offset;

    '
  pattern-not: 'packet = data + l2len;

    l2len = ...;

    pkt_len = ...;

    '
  languages:
  - c
  message: 'The vulnerability involves incorrect pointer arithmetic when adjusting packet data pointers using `l2offset`.
    This can lead to memory corruption or invalid memory access. The patch removes the use of `l2offset` and directly uses
    `data + l2len` for pointer adjustments, ensuring correct memory access. To fix this, avoid using `l2offset` for pointer
    arithmetic and use `data + l2len` instead.

    '
  severity: ERROR
  metadata:
    source-url: github.com/appneta/tcpreplay/commit/46cf964a7db636da76abeebf10482acf6f682a87
    category: security
    cwe:
    - CWE-119
    owasp: 'A1: Injection'
    technology:
    - c
- id: vuln-tcpreplay-58dfef91
  pattern: "if (!process_xX_by_cidr_ipv4($MODE, $CIDR, $IP_HDR)) {\n  ...\n}\n"
  pattern-not: "if (!$IP_HDR || !process_xX_by_cidr_ipv4($MODE, $CIDR, $IP_HDR)) {\n  ...\n}\n"
  languages:
  - c
  message: 'Missing null check for `ip_hdr` before passing it to `process_xX_by_cidr_ipv4`.

    This can lead to a null pointer dereference, causing a crash or undefined behavior.

    Always check for null pointers before dereferencing them.

    '
  severity: ERROR
  metadata:
    source-url: github.com/appneta/tcpreplay/commit/58dfef91fa206f29e52fc5f7efeeb334eeaf37c6
    category: security
    cwe:
    - CWE-476
    owasp:
    - A1:2017-Injection
    references:
    - https://cwe.mitre.org/data/definitions/476.html
    technology:
    - c
- id: vuln-tcpreplay-61db8ada
  pattern: "if (pkthdr->caplen < (bpf_u_int32)TCPR_IPV6_H) {\n  dbgx($X, \"Packet too short for Unique IP feature: %u\", pkthdr->caplen);\n\
    \  return;\n}\n"
  pattern-not: "if (pkthdr->caplen < (bpf_u_int32)(l2_len + sizeof(ipv4_hdr_t))) {\n  dbgx($X, \"IP packet too short for Unique\
    \ IP feature: %u\", pkthdr->caplen);\n  return -1;\n}\n"
  languages:
  - c
  message: 'This rule detects insufficient packet length checks in network packet processing code. The vulnerability occurs
    when the code fails to account for the length of the Layer 2 header when validating packet length, potentially leading
    to buffer overflows or incorrect packet processing. The fix adds proper length checks that include the Layer 2 header
    length. To fix this issue, always include the Layer 2 header length in packet length validation checks.

    '
  severity: ERROR
  metadata:
    source-url: github.com/appneta/tcpreplay/commit/61db8adae55e246e0bc9442fbe977fff46154970
    category: security
    cwe:
    - CWE-120
    owasp: 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
    - c
- id: vuln-tcpreplay-682d559d
  pattern: "if (ntohs($IP_HDR->ip_len) < ($IP_HDR->ip_hl << 2)) {\n  ...\n}\n"
  pattern-not: "if (ntohs($IP_HDR->ip_len) < ($IP_HDR->ip_hl << 2)) {\n  tcpedit_setwarn($TCPEDIT, \"Unable to checksum IPv4\
    \ packet with invalid length %u\", $IP_HDR->ip_len);\n  return TCPEDIT_WARN;\n}\n"
  languages:
  - c
  message: 'Detected a missing validation check for IPv4 packet length. This vulnerability can lead to processing of packets
    with invalid lengths, potentially causing memory corruption or other undefined behavior. Ensure proper validation of packet
    length before processing.

    '
  severity: ERROR
  metadata:
    source-url: github.com/appneta/tcpreplay/commit/682d559d65fd9826aa53b7c7cfe8e4882bb2c6da
    category: security
    cwe:
    - CWE-120
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
