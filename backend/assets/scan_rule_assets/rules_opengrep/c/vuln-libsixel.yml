rules:
- id: vuln-libsixel-1377517a
  patterns:
  - pattern: |
      $CONTEXT->param = $CONTEXT->param * 10 + $P - '0';
  - pattern-not: |
      $STATUS = safe_addition_for_params($CONTEXT, $P);
      if (SIXEL_FAILED($STATUS)) {
          goto $END;
      }
  languages:
  - c
  message: |
    Detected an unsafe integer addition that could lead to integer overflow. This vulnerability occurs when performing unchecked arithmetic operations, which can result in undefined behavior or security issues. The fix involves using a safe addition function that checks for overflow conditions before performing the operation.
  severity: ERROR
  metadata:
    source-url: github.com/saitoha/libsixel/commit/1377517ad69bf35b7a5da0292ce45172210aaf5d
    category: security
    cwe:
    - CWE-190
    owasp:
    - A03:2021-Injection
    references:
    - https://cwe.mitre.org/data/definitions/190.html
    technology:
    - c
- id: vuln-libsixel-598c8c88
  patterns:
  - pattern: |
      $G->out[$G->cur_x + $G->cur_y * $G->line_size] = $G->codes[$CODE].suffix;
  - pattern-not: |
      $G->out[$G->cur_x + $G->cur_y * $G->max_x] = $G->codes[$CODE].suffix;
  languages:
  - c
  message: |
    Detected potential out-of-bounds write vulnerability due to incorrect array index calculation.
    The use of 'line_size' instead of 'max_x' can lead to buffer overflow.
    Replace 'line_size' with 'max_x' to ensure correct array bounds.
  severity: ERROR
  metadata:
    source-url: github.com/saitoha/libsixel/commit/598c8c88c97fd2eb5f6f5d1324fc325e66317f0c
    category: security
    cwe:
    - CWE-787
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-libsixel-7808a06b
  patterns:
  - pattern: |
      gif_lzw $VAR[4096];
  - pattern-not: |
      gif_lzw $VAR[1 << gif_lzw_max_code_size];
  languages:
  - c
  message: |
    Detected a potentially unsafe fixed-size array declaration for LZW codes.
    The original code uses a hardcoded size of 4096, which could lead to buffer overflows if the input exceeds this size.
    Ensure the array size is dynamically calculated based on the maximum code size constant.
  severity: ERROR
  metadata:
    source-url: github.com/saitoha/libsixel/commit/7808a06b88c11dbc502318cdd51fa374f8cd47ee
    category: security
    cwe:
    - CWE-119
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-libsixel-9d0a7ff4
  patterns:
  - pattern: |
      if ($DIRTY && $MOD_Y == 5) {
        ...
      }
  - pattern-not: |
      if ($DIRTY && ($MOD_Y == 5 || $Y >= $HEIGHT)) {
        ...
      }
  languages:
  - c
  message: |
    The code is vulnerable to a boundary check issue where it fails to validate the 'y' coordinate against the image height. This can lead to out-of-bounds memory access, potentially causing crashes or security vulnerabilities. The fix adds a check for 'y >= height' and properly handles the case when 'y >= orig_height' by jumping to the 'end' label. To fix this, ensure all boundary conditions are properly validated before accessing memory.
  severity: ERROR
  metadata:
    source-url: github.com/saitoha/libsixel/commit/9d0a7ff417b66d80a4bff714de1f27b24742f55a
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/125.html
    technology:
    - c
- id: vuln-libsixel-b418f351
  patterns:
  - pattern: |
      if ($P < $END && *$P == '\n') {
        ...
      }
  - pattern-not: |
      if ($P < $END && *$P < ' ') {
        ...
      }
  languages:
  - c
  message: |
    The code checks only for newline characters, potentially missing other invalid control characters. This can lead to incorrect parsing of input data, which may result in security vulnerabilities such as buffer overflows or data corruption. The fix should check for all invalid control characters (ASCII values less than ' ').
  severity: ERROR
  metadata:
    source-url: github.com/saitoha/libsixel/commit/b418f351f348d8273282f3fec6425b6b4e1d91da
    category: security
    cwe:
    - CWE-20
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/20.html
    technology:
    - c
- id: vuln-libsixel-fb329124
  patterns:
  - pattern: |
      error_diffuse($DATA, $POS + $WIDTH * $Y + $X, $DEPTH, $ERROR, $NUMERATOR, $DENOMINATOR)
  - pattern-not: |
      error_diffuse($DATA, $POS + $WIDTH * $Y + $X, $DEPTH, $ERROR, $NUMERATOR, $DENOMINATOR, $AREA)
  languages:
  - c
  message: |
    Detected a call to error_diffuse without the required area parameter. This can lead to out-of-bounds access vulnerabilities.
    The vulnerability was fixed by adding an area parameter to the function call, which is used to validate the position.
    Always include the area parameter to ensure bounds checking is performed.
  severity: ERROR
  metadata:
    source-url: github.com/libsixel/libsixel/commit/fb329124fd4bce693d3fc57447b0b40f62d9f090
    category: security
    cwe:
    - CWE-125
    - CWE-787
    owasp:
    - 'A1: Injection'
    technology:
    - c
