rules:
- id: vuln-flatpak-52346bf1
  patterns:
  - pattern: |
      $BUFFER = memmem($BUF, $POS, $AUTH_END_STRING, strlen($AUTH_END_STRING));
      if ($BUFFER != NULL)
        return $BUFFER - $BUF->data + strlen($AUTH_END_STRING);
  - pattern-not: |
      $BUFFER = memmem($BUF, $POS, $AUTH_END_STRING, strlen($AUTH_END_STRING));
      if ($BUFFER != NULL) {
        if (auth_line_is_valid($BUFFER, $BUFFER + strlen($AUTH_END_STRING)))
          return $BUFFER - $BUF->data + strlen($AUTH_END_STRING);
      }
  languages:
  - c
  message: |
    Detected insecure authentication line handling in DBus proxy. The original code
    directly matches authentication strings without proper validation, which could
    allow malicious input to bypass security checks. This vulnerability could lead
    to authentication bypass or injection attacks. The fix introduces proper validation
    of ASCII characters and control characters in the authentication line. Update
    the code to include the auth_line_is_valid() check before processing authentication
    data.
  severity: ERROR
  metadata:
    source-url: github.com/flatpak/flatpak/commit/52346bf187b5a7f1c0fe9075b328b7ad6abe78f6
    category: security
    cwe:
    - 'CWE-20: Improper Input Validation'
    owasp:
    - 'A1: Injection'
    references:
    - https://dbus.freedesktop.org/doc/dbus-specification.html#auth-mechanisms
    technology:
    - c
- id: vuln-flatpak-7fe63f2e
  patterns:
  - pattern: |
      flatpak_context_set_persistent($CONTEXT, $PATH)
  - pattern-not: |
      flatpak_context_set_persistent($CONTEXT, $PATH, $ERROR)
  languages:
  - c
  message: |
    The function `flatpak_context_set_persistent` is being called without proper validation of the `PATH` parameter, which can lead to security vulnerabilities. The patch adds validation for non-graphical and non-UTF8 characters in paths to prevent potential exploits. Always validate paths using `flatpak_validate_path_characters` and propagate errors properly.
  severity: ERROR
  metadata:
    source-url: github.com/flatpak/flatpak/commit/7fe63f2e8f1fd2dafc31d45154cf0b191ebec66c
    category: security
    cwe:
    - 'CWE-20: Improper Input Validation'
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-flatpak-a7401e63
  patterns:
  - pattern: |
      g_print (_("Skipping invalid Exec argument %s\n"), $ARG);
  - pattern-not: |
      {
        flatpak_fail_error ($ERROR, FLATPAK_ERROR_EXPORT_FAILED,
                           _("Invalid Exec argument %s"), $ARG);
        goto out;
      }
  languages:
  - c
  message: |
    The code prints an error message but does not handle the error properly, which can lead to continued execution with invalid arguments. This can cause security vulnerabilities by allowing invalid or malicious input to be processed. Use `flatpak_fail_error` to properly handle the error and terminate the execution.
  severity: ERROR
  metadata:
    source-url: github.com/flatpak/flatpak/commit/a7401e638bf0c03102039e216ab1081922f140ae
    category: security
    cwe:
    - 'CWE-391: Unchecked Error Condition'
    owasp:
    - 'A12: Security Misconfiguration'
    technology:
    - c
- id: vuln-flatpak-ba818f50
  patterns:
  - pattern: |
      g_bytes_new($METADATA, strlen($METADATA) + 1)
  - pattern-not: |
      g_bytes_new($METADATA, strlen($METADATA))
  languages:
  - c
  message: |
    Detected unsafe use of `g_bytes_new` with `strlen + 1` which can lead to buffer overflows or incorrect size calculations. This vulnerability occurs when the size of a string is incorrectly calculated by adding 1 to the result of `strlen`, potentially including the null terminator twice. This can lead to memory corruption or incorrect data handling. Always use `strlen` directly without adding 1 when passing the size to `g_bytes_new`.
  severity: ERROR
  metadata:
    source-url: https://github.com/flatpak/flatpak/commit/ba818f504c926baaf6e362be8159cfacf994310e
    category: security
    cwe:
    - 'CWE-131: Incorrect Calculation of Buffer Size'
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-flatpak-cc140104
  patterns:
  - pattern: |
      g_environ_setenv($ENV, $VAR, $VAL, TRUE)
  - pattern-not: |
      g_environ_setenv($ENV, $VAR, $VAL, TRUE);
      if ($VAR[0] == '\0') { ... }
      if (strchr($VAR, '=') != NULL) { ... }
      g_string_append($ENV_STRING, $VAR);
      g_string_append_c($ENV_STRING, '=');
      g_string_append($ENV_STRING, $VAL);
      g_string_append_c($ENV_STRING, '\0');
  languages:
  - c
  message: |
    Detected unsafe environment variable handling. The code does not validate the environment variable name, which could allow an attacker to inject malicious code. Ensure that environment variable names are not empty and do not contain '=' characters to prevent security vulnerabilities.
  severity: ERROR
  metadata:
    source-url: github.com/flatpak/flatpak/commit/cc1401043c075268ecc652eac557ef8076b5eaba
    category: security
    cwe:
    - CWE-78
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/78.html
    technology:
    - c
- id: vuln-flatpak-d9a8f9d8
  patterns:
  - pattern: |
      if (g_key_file_load_from_bytes($METADATA, $BYTES, G_KEY_FILE_NONE, NULL))
      {
        $RESOLVED_METADATA = g_bytes_ref($BYTES);
        $RESOLVED_METAKEY = g_steal_pointer(&$METAKEY);
      }
      else
      {
        g_message("Warning: Failed to parse metadata for %s\n", $REF);
      }
  - pattern-not: |
      if (!g_key_file_load_from_bytes($METADATA, $BYTES, G_KEY_FILE_NONE, NULL))
        return flatpak_fail_error($ERROR, FLATPAK_ERROR_INVALID_DATA, "Metadata for %s is invalid", $REF);

      $RESOLVED_METADATA = g_bytes_ref($BYTES);
      $RESOLVED_METAKEY = g_steal_pointer(&$METAKEY);
  languages:
  - c
  message: |
    The code fails to properly handle errors when parsing metadata, which can lead to undefined behavior or security issues.
    The patch introduces proper error handling by returning an error and ensuring the function fails safely.
    To fix this, ensure that all error conditions are properly checked and handled, and use appropriate error reporting mechanisms.
  severity: ERROR
  metadata:
    source-url: github.com/flatpak/flatpak/commit/d9a8f9d8ccc0b7c1135d0ecde006a75d25f66aee
    category: security
    cwe:
    - CWE-703
    owasp:
    - A10:2021 - Server-Side Request Forgery
    references:
    - https://cwe.mitre.org/data/definitions/703.html
    technology:
    - c
- id: vuln-flatpak-e26ac758
  patterns:
  - pattern: |
      seccomp_rule_add($SECCOMP, SCMP_ACT_ERRNO(EPERM), $SCALL, $ARG_COUNT, $ARG)
  - pattern-not: |
      seccomp_rule_add($SECCOMP, SCMP_ACT_ERRNO($ERRNUM), $SCALL, $ARG_COUNT, $ARG)
  languages:
  - c
  message: |
    The seccomp rule is using a hardcoded EPERM error code instead of a variable that can be validated. This can lead to security issues if the error code is not properly checked. Use a variable for the error code and ensure it is validated against acceptable values (e.g., EPERM or ENOSYS) before using it in the seccomp rule.
  severity: ERROR
  metadata:
    source-url: github.com/flatpak/flatpak/commit/e26ac7586c392b5eb35ff4609fe232c52523b2cf
    category: security
    cwe:
    - 'CWE-20: Improper Input Validation'
    owasp:
    - A10:2021 - Server-Side Request Forgery (SSRF)
    technology:
    - c
