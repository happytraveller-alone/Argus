- id: vuln-php-src-0e6c0654
  pattern: |
    zend_parse_parameters(ZEND_NUM_ARGS(), "ss", $FROM, $FROM_LEN, $TO, $TO_LEN) == FAILURE
  pattern-not: |
    zend_parse_parameters(ZEND_NUM_ARGS(), "pp", $FROM, $FROM_LEN, $TO, $TO_LEN) == FAILURE
  languages:
  - c
  message: |
    The use of "ss" format specifier in zend_parse_parameters can lead to incorrect handling of path strings, potentially causing security vulnerabilities. The "ss" specifier expects simple strings, which may not handle null bytes or other special characters correctly. Replace "ss" with "pp" to properly handle path strings with proper length checking and null byte handling.
  severity: ERROR
  metadata:
    source-url: github.com/php/php-src/commit/0e6c0654ed06751ced134515f7629c40bd979d7f
    category: security
    cwe:
    - CWE-170
    owasp:
    - 'A1: Injection'
    references:
    - https://www.php.net/manual/en/function.zend-parse-parameters.php
    technology:
    - c
- id: vuln-php-src-0f8cf3b8
  pattern: |
    memchr($VAR->ptr, '&', $VAR->end - $VAR->ptr)
  pattern-not: |
    memchr($VAR->ptr + $VAR->already_scanned, '&', $VAR->end - ($VAR->ptr + $VAR->already_scanned))
  languages:
  - c
  message: |
    The code uses memchr() to search for '&' characters in a string but doesn't account for previously scanned portions of the buffer. This can lead to incorrect parsing of URL query parameters and potential security vulnerabilities. The fix adds an 'already_scanned' field to track processed portions of the buffer. Always track and skip already processed portions of buffers when parsing.
  severity: ERROR
  metadata:
    source-url: github.com/php/php-src/commit/0f8cf3b8497dc45c010c44ed9e96518e11e19fc3
    category: security
    cwe:
    - 'CWE-20: Improper Input Validation'
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-php-src-16b3003f
  pattern: |
    return object_common2(UNSERIALIZE_PASSTHRU,
            object_common1(UNSERIALIZE_PASSTHRU, ZEND_STANDARD_CLASS_DEF_PTR));
  pattern-not: |
    $ELEMENTS = object_common1(UNSERIALIZE_PASSTHRU, ZEND_STANDARD_CLASS_DEF_PTR);
    if ($ELEMENTS < 0) {
        return 0;
    }
    return object_common2(UNSERIALIZE_PASSTHRU, $ELEMENTS);
  languages:
  - c
  message: |
    The code directly returns the result of `object_common2` without checking if `object_common1` returned a negative value, which can lead to unsafe unserialization. This vulnerability can be exploited to cause unexpected behavior or crashes. To fix this, ensure that the result of `object_common1` is checked before proceeding with `object_common2`.
  severity: ERROR
  metadata:
    source-url: github.com/php/php-src/commit/16b3003ffc6393e250f069aa28a78dc5a2c064b2
    category: security
    cwe:
    - 'CWE-20: Improper Input Validation'
    owasp:
    - A8:2017-Insecure Deserialization
    references:
    - https://cwe.mitre.org/data/definitions/20.html
    - https://owasp.org/www-project-top-ten/2017/A8_2017-Insecure_Deserialization
    technology:
    - c
- id: vuln-php-src-188c196d
  pattern: |
    $CTXT->options -= $XML_PARSE_DTDLOAD
  pattern-not: |
    $CTXT->options &= ~$XML_PARSE_DTDLOAD
  languages:
  - c
  message: |
    Using the subtraction operator (-) to unset bit flags is incorrect and can lead to undefined behavior.
    Instead, use the bitwise AND NOT operator (&~) to properly clear the flag.
    This vulnerability can cause unexpected behavior in XML parsing, potentially leading to security issues.
  severity: ERROR
  metadata:
    source-url: github.com/php/php-src/commit/188c196d4da60bdde9190d2fc532650d17f7af2d
    category: security
    cwe:
    - CWE-682
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-php-src-1a23ebc1
  pattern: |
    if (UNEXPECTED(Z_ISUNDEF_P(data))) {
      if (Z_TYPE(key) == IS_LONG) {
        zend_hash_index_del(ht, Z_LVAL(key));
      } else {
        zend_hash_del_ind(ht, Z_STR(key));
      }
    } else {
      var_push_dtor(var_hash, data);
    }
  pattern-not: |
    var_push_dtor(var_hash, data);
  languages:
  - c
  message: |
    The vulnerable code conditionally deletes hash entries when data is undefined,
    which can lead to memory corruption or use-after-free vulnerabilities. The fix
    removes this conditional deletion and always calls var_push_dtor, ensuring
    proper memory management. This vulnerability could be exploited to cause
    crashes or potentially execute arbitrary code.
  severity: ERROR
  metadata:
    source-url: github.com/php/php-src/commit/1a23ebc1fff59bf480ca92963b36eba5c1b904c4
