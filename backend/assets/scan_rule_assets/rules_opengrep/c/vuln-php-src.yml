    To fix this, use wide character string comparisons and proper path resolution functions as shown in the patched version.
  severity: ERROR
  metadata:
    source-url: github.com/php/php-src/commit/4b15f5d4ec750b31ec8911f5eb0915a45f96feca
    category: security
