- id: vuln-php-src-20ce2fe8
  pattern: |
    if ($VAR != ':') goto $LABEL;
  pattern-not: |
    if ($VAR <= '/') goto $LABEL;
    if ($VAR >= ';') goto $LABEL;
  languages:
  - c
  message: |
    The code contains an incomplete character range check in a conditional statement.
    This vulnerability arises when only a single character is checked instead of a range, which can lead to bypasses or incorrect parsing.
    The fix involves checking for a range of characters (<= '/' and >= ';') to ensure proper validation.
    Update the condition to use a range check instead of a single character comparison.
