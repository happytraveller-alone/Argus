- rules:
  - id: vuln-php-src-5c0455bf
  pattern: |
    if (yych <= '/') goto yy1287;
    if (yych <= '9') goto yy1286;
    goto yy1287;
  pattern-not: |
    if (yych <= '@') {
        if (yych <= 0x1F) {
            if (yych == '\t') goto yy1287;
        } else {
            if (yych <= ' ') goto yy1287;
            if (yych <= '/') goto yy1284;
            if (yych <= '9') goto yy1286;
        }
    } else {
        if (yych <= '`') {
            if (yych <= 'A') goto yy1289;
