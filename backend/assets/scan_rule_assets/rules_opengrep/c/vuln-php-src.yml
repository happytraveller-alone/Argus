- id: vuln-php-src-3c8c200d
  pattern: |
    safe_emalloc(1, 3 * $LENGTH + 3 * (((3 * $LENGTH)/PHP_QPRINT_MAXL) + 1), 0)
  pattern-not: |
    safe_emalloc(3, $LENGTH + (((3 * $LENGTH)/(PHP_QPRINT_MAXL-9)) + 1), 1)
  languages:
  - c
  message: |
    Detected a potential integer overflow vulnerability in memory allocation. The original calculation for memory allocation in `safe_emalloc` is unsafe because it multiplies the length by 3 multiple times without proper bounds checking, which could lead to integer overflow. This could result in insufficient memory allocation and potential buffer overflow vulnerabilities. To fix this, ensure that the memory allocation calculation is safe and does not risk integer overflow.
  severity: ERROR
  metadata:
    source-url: github.com/php/php-src/commit/3c8c200d0acd233cedb8fd58251f9cbf9aebca4a
    category: security
