  pattern: |
    static bool is_executed_by_cmd(const char *prog_name) {
        ...
        if (_stricmp("cmd.exe", prog_name) == 0 || _stricmp("cmd", prog_name) == 0
                || stricmp_end("\\cmd.exe", prog_name) == 0 || stricmp_end("\\cmd", prog_name) == 0) {
