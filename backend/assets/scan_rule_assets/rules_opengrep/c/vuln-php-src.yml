rules:
- id: vuln-php-src-0426b916
  pattern: |
    zval_ptr_dtor(&var_hash->data[$I]);
  pattern-not: |
    if (HAS_WAKEUP_FLAG($ZV)) {
      $ZV = WITHOUT_WAKEUP_FLAG($ZV);
      ...
      zval_ptr_dtor(&$ZV);
    } else {
      zval_ptr_dtor(&$ZV);
    }
  languages:
  - c
  message: |
    Direct zval destruction without checking for wakeup flags can lead to
    memory corruption and use-after-free vulnerabilities. The patch adds
    proper wakeup flag handling before destruction. Always check for wakeup
    flags and handle them appropriately before destroying zvals.
  severity: ERROR
  metadata:
    source-url: github.com/php/php-src/commit/0426b916df396a23e5c34514e4f2f0627efdcdf0
    category: security
    cwe:
    - CWE-416
    - CWE-825
    owasp:
    - 'A8: Insecure Deserialization'
    technology:
    - c
    references:
    - https://www.php.net/manual/en/language.oop5.magic.php#object.wakeup
    - https://www.php.net/manual/en/function.unserialize.php
- id: vuln-php-src-07c7df68
  pattern: |
    !zend_hash_exists($MANIFEST, $LINKNAME, strlen($LINKNAME))
  pattern-not: |
    !zend_hash_exists($MANIFEST, $LINKNAME, strnlen($LINKNAME, $MAXLEN))
  languages:
  - c
  message: |
    Unsafe use of strlen() on potentially non-null-terminated strings can lead to buffer overreads.
    Replace strlen() with strnlen() when handling strings with a known maximum length to prevent reading beyond the intended buffer.
  severity: ERROR
  metadata:
    source-url: github.com/php/php-src/commit/07c7df68bd68bbe706371fccc77c814ebb335d9e
    category: security
    cwe:
    - CWE-126
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-php-src-089f7c0b
  pattern: |
    $FUNC($IM, $OUT, ...);
    $RV = gdDPExtractData($OUT, $SIZE);
  pattern-not: |
    if (!$FUNC($IM, $OUT, ...)) {
      $RV = gdDPExtractData($OUT, $SIZE);
    } else {
      $RV = NULL;
    }
  languages:
  - c
  message: |
    Found unsafe handling of image processing function return value. The code directly calls
    gdDPExtractData without checking if the image processing function succeeded. This could lead
    to processing invalid image data or null pointers. Always check the return value of image
    processing functions before extracting data. Use the pattern 'if (!func(...)) { ... }' to
    properly handle errors.
  severity: ERROR
  metadata:
    source-url: github.com/php/php-src/commit/089f7c0bc28d399b0420aa6ef058e4c1c120b2ae
    category: security
    cwe:
    - 'CWE-252: Unchecked Return Value'
    owasp: A6:2017-Security Misconfiguration
    technology:
    - c
