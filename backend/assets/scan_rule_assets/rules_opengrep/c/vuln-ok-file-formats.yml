rules:
- id: vuln-ok-file-formats-7a9fe754
  pattern: 'malloc(8 * $VAR)

    '
  pattern-not: 'malloc($BYTES_PER_STRING)

    '
  languages:
  - c
  message: 'Potential integer overflow vulnerability in memory allocation. The expression ''8 * mo->num_strings'' can overflow
    if ''mo->num_strings'' is large, leading to insufficient memory allocation. This can result in buffer overflows or memory
    corruption. To fix this, ensure that the result of the multiplication does not exceed the maximum value of ''size_t''
    by using a separate variable to check for overflow before allocation.

    '
  severity: ERROR
  metadata:
    source-url: github.com/brackeen/ok-file-formats/commit/7a9fe7542c69a0f432060cdf3e86d66bf98b55d2
    category: security
    cwe:
    - CWE-190
    owasp:
    - A1:2017-Injection
    references:
    - https://cwe.mitre.org/data/definitions/190.html
    technology:
    - c
- id: vuln-ok-file-formats-a9cc1711
  pattern: "static void ok_jpg_generate_huffman_table(ok_jpg_huffman_table *$HUFF, const uint8_t *$BITS) {\n    ...\n    for\
    \ (int $J = 1; $J <= $BITS[$I]; $J++) {\n        $HUFF->size[$K++] = $I;\n    }\n    ...\n}\n"
  pattern-not: "static bool ok_jpg_generate_huffman_table(ok_jpg_huffman_table *$HUFF, const uint8_t *$BITS) {\n    ...\n\
    \    uint8_t $LEN = $BITS[$I];\n    if ($LEN == 0) {\n        continue;\n    } else if ((unsigned)$K + $LEN >= sizeof($HUFF->size))\
    \ {\n        return false;\n    } else {\n        memset($HUFF->size + $K, $I, $LEN);\n        $K += $LEN;\n    }\n  \
    \  ...\n    return true;\n}\n"
  languages:
  - c
  message: "The function `ok_jpg_generate_huffman_table` is vulnerable to a buffer overflow due to insufficient bounds checking.\
    \ \nThe loop iterates over the `bits` array and writes to the `size` array without verifying that the index `k` remains\
    \ within bounds. \nThis could lead to memory corruption and potential security exploits. \nThe fix introduces a bounds\
    \ check and uses `memset` to safely write multiple values at once.\n"
  severity: ERROR
  metadata:
    source-url: github.com/brackeen/ok-file-formats/commit/a9cc1711dd4ed6a215038f1c5c03af0ef52c3211
    category: security
    cwe:
    - CWE-120
    - CWE-787
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-ok-file-formats-ce43dd0a
  pattern: 'size_t $SIZE = $NUM_BLOCKS * 64 * sizeof(*$BLOCKS) + $EXTRA_SPACE;

    '
  pattern-not: 'size_t $SIZE = ($NUM_BLOCKS * 64 + $EXTRA_SPACE) * sizeof(*$BLOCKS);

    '
  languages:
  - c
  message: 'The vulnerability is caused by incorrect order of operations in memory allocation calculation.

    This can lead to insufficient memory allocation, potentially causing buffer overflows or crashes.

    The fix is to ensure the extra space is added before multiplying by the size of the block.

    '
  severity: ERROR
  metadata:
    source-url: github.com/brackeen/ok-file-formats/commit/ce43dd0a862485928dc30f282e69094b21d925fc
    category: security
    cwe:
    - 'CWE-131: Incorrect Calculation of Buffer Size'
    owasp:
    - 'A1: Injection'
    technology:
    - c
