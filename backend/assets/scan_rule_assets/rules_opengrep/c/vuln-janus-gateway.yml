rules:
- id: vuln-janus-gateway-11d78977
  patterns:
  - pattern: |
      void $FUNC(janus_dtls_srtp *$DTLS, char *$LABEL, char *$BUF, int $LEN) {
        ...
        janus_sctp_send_data($DTLS->sctp, $LABEL, $BUF, $LEN);
        ...
      }
  - pattern-not: |
      void $FUNC(janus_dtls_srtp *$DTLS, char *$LABEL, gboolean $TEXTDATA, char *$BUF, int $LEN) {
        ...
        janus_sctp_send_data($DTLS->sctp, $LABEL, $TEXTDATA, $BUF, $LEN);
        ...
      }
  languages:
  - c
  message: |
    The function does not distinguish between text and binary data, which can lead to incorrect handling of data packets. This vulnerability was fixed by adding a `gboolean textdata` parameter to explicitly specify the data type. To fix this, update the function signature and all call sites to include the `textdata` parameter.
  severity: ERROR
  metadata:
    source-url: github.com/meetecho/janus-gateway/commit/11d78977f333bcadf3c34d27f1e30225f19befbf
    category: security
    cwe:
    - 'CWE-20: Improper Input Validation'
    owasp:
    - A01:2021 - Broken Access Control
    technology:
    - c
- id: vuln-janus-gateway-5b15ded4
  patterns:
  - pattern: |
      g_strlcat($BUFFER, $BUFFER_PART, JANUS_BUFSIZE)
  - pattern-not: |
      g_strlcat($BUFFER, $BUFFER_PART, sizeof($BUFFER))
  languages:
  - c
  message: |
    The use of a fixed buffer size (JANUS_BUFSIZE) in g_strlcat can lead to buffer overflows if the buffer size is smaller than JANUS_BUFSIZE. This is dangerous because it can result in memory corruption, potentially leading to crashes or arbitrary code execution. Replace JANUS_BUFSIZE with sizeof(buffer) to ensure the correct buffer size is used.
  severity: ERROR
  metadata:
    source-url: github.com/meetecho/janus-gateway/commit/5b15ded4c3542ccef097da5088d01d977652fe9d
    category: security
    cwe:
    - CWE-120
    owasp:
    - A2:2017-Broken Authentication
    technology:
    - c
- id: vuln-janus-gateway-d5e786ee
  patterns:
  - pattern: |
      janus_videocall_session *session = (janus_videocall_session *)handle->plugin_handle;
      if(!session)
        return janus_plugin_result_new(JANUS_PLUGIN_ERROR, "No session associated with this handle", NULL);
  - pattern-not: |
      janus_mutex_lock(&sessions_mutex);
      janus_videocall_session *session = janus_videocall_lookup_session(handle);
      if(!session) {
        janus_mutex_unlock(&sessions_mutex);
        return janus_plugin_result_new(JANUS_PLUGIN_ERROR, "No session associated with this handle", NULL);
      }
      janus_mutex_unlock(&sessions_mutex);
  languages:
  - c
  message: |
    Direct access to the session handle without proper synchronization can lead to race conditions and undefined behavior. Use the janus_videocall_lookup_session function with mutex locking to safely access the session.
  severity: ERROR
  metadata:
    source-url: github.com/meetecho/janus-gateway/commit/d5e786eedf5bc5f200dfafa98177e793350e4e32
    category: security
    cwe:
    - 'CWE-362: Concurrent Execution using Shared Resource with Improper Synchronization (''Race Condition'')'
    owasp: 'A2: Broken Authentication'
    references:
    - https://cwe.mitre.org/data/definitions/362.html
    technology:
    - c
