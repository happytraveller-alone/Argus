rules:
- id: vuln-haproxy-146f53ae
  pattern: |
    for ($I = 0; $I < $LIST[$IDX].$N.$LEN; $I++)
      if ((uint8_t)($LIST[$IDX].$N.$PTR[$I] - 'A') < 'Z' - 'A')
        goto fail;
  pattern-not: |
    for ($I = !!$PHDR; $I < $LIST[$IDX].$N.$LEN; $I++)
      if ((uint8_t)($LIST[$IDX].$N.$PTR[$I] - 'A') < 'Z' - 'A' || !HTTP_IS_TOKEN($LIST[$IDX].$N.$PTR[$I]))
        goto fail;
  languages:
  - c
  message: |
    Detected a vulnerable HTTP/2 header validation that only checks for uppercase characters without validating token format.
    This can lead to security issues as per RFC7540#8.1.2 and RFC7540#10.3 which require header names to be valid tokens.
    Ensure to use HTTP_IS_TOKEN() to validate header names and start from the second character for pseudo-headers.
  severity: ERROR
  metadata:
    source-url: github.com/haproxy/haproxy/commit/146f53ae7e97dbfe496d0445c2802dd0a30b0878
    category: security
    cwe:
    - CWE-20
    owasp:
    - A03:2021-Injection
    references:
    - https://tools.ietf.org/html/rfc7540#section-8.1.2
    - https://tools.ietf.org/html/rfc7540#section-10.3
    technology:
    - c
- id: vuln-haproxy-3f0e1ec7
  pattern: |
    if ((int)$HDR.len < 0 || (int)$HDR.len > $H2C->mfs) {
      ...
    }
  pattern-not: |
    if ((int)$HDR.len < 0 || (int)$HDR.len > global.tune.bufsize) {
      ...
    }
  languages:
  - c
  message: |
    Detected a potential buffer overflow vulnerability due to incorrect size validation.
    The code checks if the length of a header exceeds the maximum frame size (h2c->mfs),
    but it should validate against the global buffer size (global.tune.bufsize) instead.
    This could allow an attacker to send maliciously crafted packets that exceed the
    expected size, leading to memory corruption or crashes.
    To fix this, replace 'h2c->mfs' with 'global.tune.bufsize' in the size validation check.
  severity: ERROR
  metadata:
    source-url: github.com/haproxy/haproxy/commit/3f0e1ec70173593f4c2b3681b26c04a4ed5fc588
    category: security
    cwe:
    - 'CWE-120: Buffer Copy without Checking Size of Input (''Classic Buffer Overflow'')'
    owasp: A2:2017 - Broken Authentication
    technology:
    - c
- id: vuln-haproxy-58df5aea
  pattern: |
    dns_read_name($RESP, $BUFEND, $READER, $NAME, $MAX_SIZE, $OFFSET)
  pattern-not: |
    dns_read_name($RESP, $BUFEND, $READER, $NAME, $MAX_SIZE, $OFFSET, $DEPTH)
  languages:
  - c
  message: |
    Detected a potential infinite recursion vulnerability in DNS name resolution. The function `dns_read_name` lacks a depth counter, which could lead to stack exhaustion or infinite recursion when processing malicious DNS responses. To fix this, add a depth parameter and check its value to limit recursion depth.
  severity: ERROR
  metadata:
    source-url: github.com/haproxy/haproxy/commit/58df5aea0a0c926b2238f65908f5e9f83d1cca25
    category: security
    cwe:
    - CWE-674
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/674.html
    technology:
    - c
- id: vuln-haproxy-bfb15ab3
  pattern: |
    if (!http_find_header($HTX, ist("Set-Cookie"), &$CTX, 1)) {
      ...
    }
  pattern-not: |
    if (is_cookie2 || !http_find_header($HTX, ist("Set-Cookie"), &$CTX, 1)) {
      ...
    }
  languages:
  - c
  message: |
    The code is vulnerable due to missing a check for `is_cookie2` before evaluating the `http_find_header` function. This can lead to incorrect handling of cookie headers, potentially causing security issues such as cookie manipulation or injection. To fix this, ensure that `is_cookie2` is checked before evaluating the `http_find_header` function.
  severity: ERROR
  metadata:
    source-url: github.com/haproxy/haproxy/commit/bfb15ab34ead85f64cd6da0e9fb418c9cd14cee8
    category: security
    cwe:
    - CWE-20
    owasp:
    - A03:2021 - Injection
    references:
    - https://cwe.mitre.org/data/definitions/20.html
    technology:
    - c
