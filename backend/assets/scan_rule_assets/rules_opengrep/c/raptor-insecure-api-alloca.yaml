rules:
- id: raptor-insecure-api-alloca
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/676
    - https://cwe.mitre.org/data/definitions/1325
    - https://nullprogram.com/blog/2019/10/28/
    - https://docs.microsoft.com/en-us/cpp/sanitizers/asan-error-examples
    confidence: HIGH
    cwe:
    - 'CWE-676: Use of a Potentially Dangerous Function'
    - 'CWE-121: Stack-based Buffer Overflow'
    - 'CWE-119: Improper Restriction of Operations within the Bounds of a Memory Buffer'
    - 'CWE-787: Out-of-bounds Write'
    - 'CWE-20: Improper Input Validation'
  message: |
    检测到缓冲区溢出/越界访问风险（规则：raptor-insecure-api-alloca）。危害：写入长度不受控或长度参数错误可能破坏内存，导致崩溃、数据破坏或代码执行。建议：使用带长度限制的安全
    API，并以目标缓冲区大小作为边界。 保留的关键标识：alloca()。
  severity: ERROR
  languages:
  - c
  pattern: alloca(...)
