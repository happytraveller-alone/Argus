rules:
- id: vuln-zziplib-2a84ae73
  patterns:
  - pattern: |
      $TAIL - $END >= __sizeof($STRUCT) - 2
  - pattern-not: |
      $TAIL - $END >= __sizeof($STRUCT)
  languages:
  - c
  message: |
    The vulnerability involves an incorrect boundary check when verifying zip file trailers. The original code subtracts 2 from the size of the trailer structure, which could lead to buffer over-reads or incorrect validation of zip files. This could be exploited to process malformed zip files, potentially leading to crashes or security issues. The fix removes the incorrect subtraction, ensuring proper boundary checks.
  severity: ERROR
  metadata:
    source-url: github.com/gdraheim/zziplib/commit/2a84ae73e93b0c1f4f12f2c58104f8327d10e41b
    category: security
    cwe:
    - CWE-125
    - CWE-126
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-zziplib-d2e5d5c5
  patterns:
  - pattern: |
      if ($COND) {
          ...
          if ($VAR != NULL)
              free($VAR);
          return $ERROR_CODE;
      }
  - pattern-not: |
      return ($COND) ? $ERROR_CODE : 0;
  languages:
  - c
  message: |
    The code contains a redundant and unsafe pattern where memory is freed and an error is returned within nested conditionals. This can lead to double-free vulnerabilities or memory leaks if not handled correctly. The fixed version simplifies the logic by using a ternary operator, which is safer and more efficient. Replace the nested conditionals with a direct return statement using a ternary operator.
  severity: ERROR
  metadata:
    source-url: github.com/gdraheim/zziplib/commit/d2e5d5c53212e54a97ad64b793a4389193fec687
    category: security
    cwe:
    - CWE-415
    - CWE-401
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    references:
    - https://cwe.mitre.org/data/definitions/415.html
    - https://cwe.mitre.org/data/definitions/401.html
    technology:
    - c
- id: vuln-zziplib-f609ae89
  patterns:
  - pattern: |
      return fopen($NAME, $MODE);
  - pattern-not: |
      $NAME_STRIPPED = strdup($NAME);
      remove_dotdotslash($NAME_STRIPPED);
      $NAME = $NAME_STRIPPED;
      $MUSTFREE = 1;
      $FP = fopen($NAME, $MODE);
      if ($MUSTFREE)
          free($NAME_STRIPPED);
      return $FP;
  languages:
  - c
  message: |
    Directly using a path without sanitizing it can lead to directory traversal attacks. The patch adds a function `remove_dotdotslash` to remove "../" components from the path before using it in `fopen`. Always sanitize paths that come from untrusted sources to prevent such vulnerabilities.
  severity: ERROR
  metadata:
    source-url: github.com/gdraheim/zziplib/commit/f609ae8971f3c0ce64d38276b778001d0bbfc84b
    category: security
    cwe:
    - 'CWE-22: Improper Limitation of a Pathname to a Restricted Directory (''Path Traversal'')'
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/22.html
    technology:
    - c
