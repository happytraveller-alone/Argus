rules:
- id: vuln-riot-07f1254d
  pattern: "if (($P[1] != '\\0') && ($P[2] != '\\0') && ($P[1] == '/') && ($P[2] == '/')) {\n  ...\n}\n"
  pattern-not: "if ((($URI_END - $P) > 2) && ($P[1] == '/') && ($P[2] == '/')) {\n  ...\n}\n"
  languages:
  - c
  message: 'Detected a potential out-of-bounds memory access vulnerability. The code checks if certain characters are ''/''
    without first ensuring the string is long enough. This could lead to reading beyond the end of the string. Fix by adding
    a length check before accessing the characters.

    '
  severity: ERROR
  metadata:
    source-url: github.com/RIOT-OS/RIOT/commit/07f1254d8537497552e7dce80364aaead9266bbe
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-riot-31c6191f
  pattern: "if ($FBUF->sfr.arq_timeout_event.msg.content.ptr != NULL) {\n  ...\n}\n"
  pattern-not: "if (_arq_scheduled($FBUF)) {\n  ...\n}\n"
  languages:
  - c
  message: 'Detected a direct check of `arq_timeout_event.msg.content.ptr` which is unsafe as it does not verify if the event
    is scheduled. This can lead to incorrect state management and potential use-after-free vulnerabilities. Use the `_arq_scheduled`
    function to safely check if the event is scheduled.

    '
  severity: ERROR
  metadata:
    source-url: github.com/RIOT-OS/RIOT/commit/31c6191f6196f1a05c9765cffeadba868e3b0723
    category: security
    cwe:
    - CWE-416
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-riot-89afc378
  pattern: "if ($LEN < (0xff - 7)) {\n  ...\n}\n"
  pattern-not: "if ($LEN < 0xff) {\n  ...\n}\n"
  languages:
  - c
  message: 'The condition `if (len < (0xff - 7))` is incorrect and can lead to buffer overflow vulnerabilities. The check
    should be `if (len < 0xff)` to ensure that `len` does not exceed the maximum allowed value. This vulnerability can be
    exploited to cause undefined behavior or security issues. Always verify that the length of data does not exceed the intended
    bounds.

    '
  severity: ERROR
  metadata:
    source-url: github.com/RIOT-OS/RIOT/commit/89afc378a92bf198246335fd2fa64a76dfe6e00e
    category: security
    cwe:
    - CWE-120
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
    - c
