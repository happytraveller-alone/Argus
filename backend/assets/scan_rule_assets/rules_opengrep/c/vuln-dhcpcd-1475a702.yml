rules:
- id: vuln-dhcpcd-1475a702
  patterns:
  - pattern: |
      if ($TYPE & $ADDRIPV4) {
        $SZ = sizeof(uint32_t);
      } else if ($TYPE & $UINT16) {
        $SZ = sizeof(uint16_t);
      } else if ($TYPE & ($UINT8 | $BITFLAG)) {
        $SZ = sizeof(uint8_t);
      } else if ($TYPE & $ADDRIPV6) {
        $SZ = $ADDR6SZ;
      } else {
        return (ssize_t)$DL;
      }
      return $DL < $SZ ? -1 : (ssize_t)$SZ;
  - pattern-not: |
      if ($TYPE & $ADDRIPV6)
        $SZ = $ADDR6SZ;
      else if ($TYPE & ($UINT32 | $ADDRIPV4))
        $SZ = sizeof(uint32_t);
      else if ($TYPE & $UINT16)
        $SZ = sizeof(uint16_t);
      else if ($TYPE & ($UINT8 | $BITFLAG))
        $SZ = sizeof(uint8_t);
      else if ($TYPE & $FLAG)
        return 0;
      else {
        if ((size_t)$OPT->len > $DL) {
          errno = ENODATA;
        }
      }
      if ($DL < $SZ) {
        errno = ENODATA;
        return -1;
      }
      if ($TYPE & $ARRAY)
        return (ssize_t)($DL - ($DL % $SZ));
      return (ssize_t)$SZ;
  languages:
  - c
  message: |
    The code does not properly validate the length of DHCP options, which can lead to buffer overflows or incorrect parsing of network packets. The vulnerability occurs because the code assumes certain sizes for various DHCP option types without proper validation. This can be exploited by an attacker to craft malicious DHCP packets that could lead to memory corruption or denial of service. The fix includes proper length validation and setting errno to ENODATA when invalid lengths are detected.
  severity: ERROR
  metadata:
    source-url: github.com/rsmarples/dhcpcd/commit/1475a702df74b120db847991bc011e3441a045b8
    category: security
    cwe:
    - CWE-120
    - CWE-125
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    - https://cwe.mitre.org/data/definitions/125.html
    technology:
    - c
