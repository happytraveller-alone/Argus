rules:
- id: c_buffer_rule-strcpy
  languages:
  - c
  message: 'The `strcpy` family of functions do not provide the ability to limit or
    check buffer

    sizes before copying to a destination buffer. This can lead to buffer overflows.
    Consider

    using more secure alternatives such as `strncpy` and provide the correct limit
    to the

    destination buffer and ensure the string is null terminated.


    For more information please see: https://linux.die.net/man/3/strncpy


    If developing for C Runtime Library (CRT), more secure versions of these functions
    should be

    used, see:

    https://learn.microsoft.com/en-us/cpp/c-runtime-library/reference/strncpy-s-strncpy-s-l-wcsncpy-s-wcsncpy-s-l-mbsncpy-s-mbsncpy-s-l?view=msvc-170

    '
  metadata:
    shortDescription: Insecure string processing function (strcpy)
    cwe: CWE-120
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: High
    category: security
  pattern: strcpy(...)
  severity: ERROR
