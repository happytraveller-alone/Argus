rules:
- id: vuln-freetype-010e0614
  patterns:
  - pattern: |
      cf2_stack_init($MEMORY, $ERROR)
  - pattern-not: |
      cf2_stack_init($MEMORY, $ERROR, $STACK_SIZE)
  languages:
  - c
  message: |
    The stack initialization is missing a stack size parameter, which can lead to stack overflow vulnerabilities. Always specify the stack size to ensure proper memory allocation and bounds checking.
  severity: ERROR
  metadata:
    source-url: github.com/freetype/freetype/commit/010e0614f2effe058855aacfc3e61c71e1cb5739
    category: security
    cwe:
    - CWE-787
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-freetype-0545ec1c
  patterns:
  - pattern: |
      $CHARSET->sids[$IDX] = FT_GET_USHORT();
  - pattern-not: |
      {
        FT_UShort $SID = FT_GET_USHORT();
        if ( $SID < 65000 )
          $CHARSET->sids[$IDX] = $SID;
        else
        {
          $CHARSET->sids[$IDX] = 0;
        }
      }
  languages:
  - c
  message: |
    Detected a potential vulnerability where a SID (String ID) value is assigned without validation.
    This can lead to invalid SID values being used, which may cause undefined behavior or crashes.
    The fix involves validating the SID value against the CFF specification (must be less than 65000)
    and setting it to zero if invalid. Always validate SID values as per the CFF specification.
  severity: ERROR
  metadata:
    source-url: github.com/freetype/freetype/commit/0545ec1ca36b27cb928128870a83e5f668980bc5
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    - 'CWE-787: Out-of-bounds Write'
    owasp: 'A1: Injection'
    references:
    - https://adobe-type-tools.github.io/font-tech-notes/pdfs/5176.CFF.pdf
    technology:
    - c
- id: vuln-freetype-45a3c76b
  patterns:
  - pattern: |
      $STREAM->pos + $COUNT > $STREAM->size
  - pattern-not: |
      $STREAM->size - $STREAM->pos < $COUNT
  languages:
  - c
  message: |
    This pattern detects integer overflow vulnerabilities caused by unsafe addition in bounds checking.
    The original code adds `stream->pos` and `count` directly, which can overflow, leading to incorrect bounds checking.
    The fixed version subtracts `stream->pos` from `stream->size`, which is safer and prevents integer overflow.
    To fix this, replace the addition-based check with a subtraction-based check.
  severity: ERROR
  metadata:
    source-url: github.com/freetype/freetype/commit/45a3c76b547511fa9d97aca34b150a0663257375
    category: security
    cwe:
    - CWE-190
    owasp:
    - A03:2021 - Injection
    technology:
    - c
- id: vuln-freetype-77930974
  patterns:
  - pattern: |
      if ( !$FUNC( $FACE, $TTAG_CFF, $STREAM, 0 ) )
        $NUM_INSTANCES = 0;
  languages:
  - c
  message: |
    This rule detects a vulnerability where the absence of a specific table (TTAG_CFF) is checked without first ensuring the presence of another required table (TTAG_glyf). This can lead to incorrect handling of font data, potentially causing crashes or undefined behavior. The fix involves adding a check for the presence of the TTAG_glyf table before checking for the TTAG_CFF table.
  severity: ERROR
  metadata:
    source-url: https://github.com/freetype/freetype/commit/779309744222a736eba0f1731e8162fce6288d4e
    category: security
    cwe:
    - CWE-476
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    references:
    - https://nvd.nist.gov/vuln/detail/CVE-2020-15999
    technology:
    - c
- id: vuln-freetype-8b281f83
  patterns:
  - pattern: |
      (void)$FUNC($PARSER, $NUM, $TEMP, $NUM2);
  - pattern-not: |
      $RESULT = $FUNC($PARSER, $NUM, $TEMP, $NUM2);
      if ($RESULT < $NUM) {
        ...
      }
  languages:
  - c
  message: |
    The function call result is ignored without checking if it meets the required conditions. This can lead to invalid file format processing and potential security vulnerabilities. Always check the return value of functions that parse or process data to ensure they meet expected conditions.
  severity: ERROR
  metadata:
    source-url: github.com/freetype/freetype/commit/8b281f83e8516535756f92dbf90940ac44bd45e1
    category: security
    cwe:
    - 'CWE-252: Unchecked Return Value'
    owasp:
    - 'A6: Security Misconfiguration'
    technology:
    - c
- id: vuln-freetype-8d22746c
  patterns:
  - pattern: |
      $VAR = $MASK->end_point;
  - pattern-not: |
      $VAR = $MASK->end_point > $GLYPH->num_points
                ? $GLYPH->num_points
                : $MASK->end_point;
  languages:
  - c
  message: |
    The vulnerability occurs due to a lack of bounds checking when assigning `mask->end_point` to a variable. This can lead to out-of-bounds access if `mask->end_point` exceeds the actual number of points in the glyph. To fix this, ensure that `mask->end_point` is within the bounds of `glyph->num_points` by using a conditional check.
  severity: ERROR
  metadata:
    source-url: github.com/freetype/freetype/commit/8d22746c9e5af80ff4304aef440986403a5072e2
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/125.html
    technology:
    - c
- id: vuln-freetype-cee5d593
  patterns:
  - pattern: |
      unsigned long $VAR = $OLDSIZE + ($OLDSIZE >> 1) + 4;
  - pattern-not: |
      unsigned long $VAR = $OLDSIZE + ($OLDSIZE >> 1) + 5;
  languages:
  - c
  message: |
    This rule detects an incorrect buffer size calculation that could lead to buffer overflow vulnerabilities. The original calculation uses `oldsize + (oldsize >> 1) + 4`, which might not allocate enough space in certain scenarios. The fix changes the constant to `5` to ensure sufficient buffer size. This vulnerability is dangerous because it could allow attackers to overwrite adjacent memory, potentially leading to arbitrary code execution. To fix this, ensure the buffer size calculation includes an appropriate safety margin.
  severity: ERROR
  metadata:
    source-url: https://github.com/freetype/freetype/commit/cee5d593582801f65c5e127d9de9ca24ebcdc747
    category: security
    cwe:
    - 'CWE-120: Buffer Copy without Checking Size of Input (''Classic Buffer Overflow'')'
    owasp:
    - 'A2: Cryptographic Failures'
    technology:
    - c
- id: vuln-freetype-e6fda039
  patterns:
  - pattern-inside: |
      static void tt_hvadvance_adjust(...) {
        ...
      }
  - pattern: |
      *$VAR += $DELTA;
  - pattern-not: |
      *$VAR = ADD_INT(*$VAR, $DELTA);
  - metavariable-regex:
      metavariable: $VAR
      regex: ^avalue$
  - metavariable-regex:
      metavariable: $DELTA
      regex: ^delta$
  languages:
  - c
  message: |
    Detected unsafe integer addition that may lead to overflow. Use the ADD_INT macro to perform safe addition.
    This vulnerability is dangerous because it can result in undefined behavior or security issues due to integer overflow.
    To fix this, replace the unsafe addition with the ADD_INT macro.
  severity: ERROR
  metadata:
    source-url: github.com/freetype/freetype/commit/e6fda039ad638866b7a6a5d046f03278ba1b7611
    category: security
    cwe:
    - CWE-190
    owasp:
    - A9:2021-Security Misconfiguration
    technology:
    - c
