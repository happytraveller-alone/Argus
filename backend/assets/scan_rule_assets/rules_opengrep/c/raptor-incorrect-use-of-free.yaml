rules:
- id: raptor-incorrect-use-of-free
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/590
    - https://github.com/shellphish/how2heap/blob/master/glibc_2.23/house_of_spirit.c
    confidence: MEDIUM
    cwe:
    - 'CWE-590: Free of Memory not on the Heap'
    - 'CWE-416: Use After Free'
  message: The software calls free() on a pointer to memory that has a short  lifetime and was not allocated using associated heap allocation  functions such as malloc(), calloc(), or realloc().
  severity: ERROR
  languages:
  - c
  pattern-either:
  - patterns:
    - pattern: free($PTR)
    - pattern-either:
      - pattern-inside: |
          $_ $PTR[$_];
          ...
      - pattern-inside: |
          $_ $PTR[$_] = $_;
          ...
      - pattern-inside: |
          $_ $ARR[$_];
          ...
          $PTR = $ARR;
          ...
      - pattern-inside: |
          $_ $ARR[$_] = $_;
          ...
          $PTR = $ARR;
          ...
  - patterns:
    - pattern: free(&$VAR)
    - pattern-either:
      - pattern-inside: |
          $_ $VAR;
          ...
      - pattern-inside: |
          $_ $VAR = $_;
          ...
      - pattern-inside: |
          $_ $VAR[$_];
          ...
      - pattern-inside: |
          $_ $VAR[$_] = $_;
          ...
      - pattern-inside: |
          $_ * $VAR;
          ...
      - pattern-inside: |
          $_ * $VAR = $_;
          ...
