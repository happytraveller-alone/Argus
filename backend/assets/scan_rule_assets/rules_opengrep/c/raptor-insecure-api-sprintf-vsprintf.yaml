rules:
- id: raptor-insecure-api-sprintf-vsprintf
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/676
    - https://cwe.mitre.org/data/definitions/120
    - https://cwe.mitre.org/data/definitions/787
    - https://g.co/kgs/PCHQjJ
    confidence: HIGH
    cwe:
    - 'CWE-134: Use of Externally-Controlled Format String'
  message: A buffer overflow condition exists when a program attempts to put more data in a buffer than it can hold, or when a program attempts to put data in a memory area outside of the boundaries of a buffer.
  severity: ERROR
  languages:
  - c
  patterns:
  - pattern-either:
    - pattern: sprintf($_, $FMT, ...)
    - pattern: vsprintf($_, $FMT, ...)
  - metavariable-regex:
      metavariable: $FMT
      regex: (".*%l?s.*"|".*%S.*"|[a-zA-Z_][a-zA-Z0-9_]*)
