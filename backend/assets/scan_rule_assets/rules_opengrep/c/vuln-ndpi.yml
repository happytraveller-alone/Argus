rules:
- id: vuln-ndpi-23594f03
  patterns:
  - pattern: |
      char $BUFFER[64] = { '\0' }, $RDNBUF[1024] = { '\0' };
  - pattern-not: |
      char $BUFFER[64] = { '\0' }, $RDNBUF[2048] = { '\0' };
  languages:
  - c
  message: |
    Detected a potential buffer overflow vulnerability due to insufficient buffer size.
    The buffer 'rdnSeqBuf' was originally allocated with a size of 1024 bytes, which may be insufficient for certain TLS operations, leading to buffer overflow.
    The fix increases the buffer size to 2048 bytes to prevent this issue.
    Always ensure buffers are appropriately sized to handle the maximum expected data.
  severity: ERROR
  metadata:
    source-url: github.com/ntop/nDPI/commit/23594f036536468072198a57c59b6e9d63caf6ce
    category: security
    cwe:
    - 'CWE-120: Buffer Copy without Checking Size of Input (''Classic Buffer Overflow'')'
    owasp: 'A2: Cryptographic Failures'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
    - c
- id: vuln-ndpi-61066fb1
  patterns:
  - pattern: |
      ndpi_min($PACKET->payload_packet_len - $A1, sizeof($FLOW->initial_binary_bytes))
  languages:
  - c
  message: |
    The vulnerability occurs due to a direct calculation of the minimum value between the packet length and the size of the buffer. This can lead to incorrect calculations and potential buffer overflows. The fix involves calculating the difference first and then applying the minimum function. Always ensure intermediate calculations are performed separately to avoid such issues.
  severity: ERROR
  metadata:
    source-url: github.com/ntop/nDPI/commit/61066fb106efa6d3d95b67e47b662de208b2b622
    category: security
    cwe:
    - CWE-120
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
    - c
- id: vuln-ndpi-b69177be
  patterns:
  - pattern: |
      ($PACKET->payload[0] == 0x07 && $PACKET->payload[1] == 0xff && $PACKET->payload[2] == 0x00)
  - pattern-not: |
      ($PACKET->payload_packet_len >= 3 && $PACKET->payload[0] == 0x07 && $PACKET->payload[1] == 0xff && $PACKET->payload[2] == 0x00)
  languages:
  - c
  message: |
    Detected a potential out-of-bounds read vulnerability due to missing length check before accessing packet payload. This can lead to reading beyond the allocated buffer, causing crashes or information leaks. Always verify the packet length before accessing payload data.
  severity: ERROR
  metadata:
    source-url: https://github.com/ntop/nDPI/commit/b69177be2fbe01c2442239a61832c44e40136c05
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-ndpi-b7e666e4
  patterns:
  - pattern: |
      if($SPORT == 1719 || $DPORT == 1719) {
        if($PAYLOAD[0] == 0x16 && $PAYLOAD[1] == 0x80 && $PAYLOAD[4] == 0x06 && $PAYLOAD[5] == 0x00) {
          ...
        }
      }
  - pattern-not: |
      if($SPORT == 1719 || $DPORT == 1719) {
        if(($PAYLOAD_PACKET_LEN >= 5)
           && ($PAYLOAD[0] == 0x16)
           && ($PAYLOAD[1] == 0x80)
           && ($PAYLOAD[4] == 0x06)
           && ($PAYLOAD[5] == 0x00)) {
          ...
        }
      }
  languages:
  - c
  message: |
    The original code lacks a check for the minimum payload length before accessing specific payload bytes, which could lead to out-of-bounds memory access. This vulnerability can cause crashes or potentially be exploited for arbitrary code execution. Always validate the payload length before accessing specific bytes.
  severity: ERROR
  metadata:
    source-url: github.com/ntop/nDPI/commit/b7e666e465f138ae48ab81976726e67deed12701
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    owasp:
    - 'A1: Injection'
    technology:
    - c
