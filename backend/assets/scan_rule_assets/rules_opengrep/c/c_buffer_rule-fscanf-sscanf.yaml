rules:
- id: c_buffer_rule-fscanf-sscanf
  languages:
  - c
  message: "Format specifiers can take optional field widths, which should be\nused\
    \ to limit how many characters are copied into the target buffer.\n\nExample:\n\
    ```\n  const char str[20] = \"AAAAAAAAAAAAAAAAAAA\";\n  char buf[11] = {0};\n\
    \  sscanf(str, \"%10s\", &buf); // buf = AAAAAAAAAA\\0\n```\n"
  metadata:
    shortDescription: sscanf() functions may allow format string based overflows
    cwe: CWE-120
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: High
    category: security
  pattern-either:
  - pattern: fscanf(...)
  - pattern: sscanf(...)
  - pattern: vsscanf(...)
  - pattern: vfscanf(...)
  - pattern: _ftscanf(...)
  - pattern: fwscanf(...)
  - pattern: vfwscanf(...)
  - pattern: vswscanf(...)
  severity: ERROR
