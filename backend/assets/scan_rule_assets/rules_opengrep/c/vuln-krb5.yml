- id: vuln-krb5-102bb6eb
  patterns:
  - pattern: |
      if (strcmp($VAR1, $VAR2)) {
        ...
      }
  - pattern-not: |
      $VAR3 = make_data((char *)$VAR2, strlen($VAR2) + 1);
      if (!data_eq($VAR1, $VAR3)) {
        ...
      }
  languages:
  - c
  message: |
    Detected use of strcmp() without proper null-terminated string handling.
    This can lead to incorrect comparisons and potential security vulnerabilities.
    Replace strcmp() with data_eq() after ensuring strings are properly null-terminated using make_data().
  severity: ERROR
  metadata:
    source-url: github.com/krb5/krb5/commit/102bb6ebf20f9174130c85c3b052ae104e5073ec
    category: security
    cwe:
    - CWE-170
    owasp:
    - A9:2021-Security Logging and Monitoring Failures
    technology:
    - c
- id: vuln-krb5-4fa89fc7
  patterns:
  - pattern: |
      if ($RETURN_TOKEN != $NO_TOKEN_SEND && $RETURN_TOKEN != $CHECK_MIC) {
        ...
      }
  - pattern-not: |
      if ($RETURN_TOKEN == $INIT_TOKEN_SEND ||
          $RETURN_TOKEN == $CONT_TOKEN_SEND) {
        ...
      }
  languages:
  - c
  message: |
    The condition checks for `return_token` values incorrectly, potentially allowing unintended token handling. This could lead to security vulnerabilities in the SPNEGO mechanism by processing tokens that should be rejected. The fix correctly checks for `INIT_TOKEN_SEND` and `CONT_TOKEN_SEND` to ensure proper token handling.
  severity: ERROR
  metadata:
    source-url: github.com/krb5/krb5/commit/4fa89fc784b87b22bb551e9a8dc754cb2392d732
    category: security
