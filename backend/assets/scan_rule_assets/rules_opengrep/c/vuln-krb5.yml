- id: vuln-krb5-57415dda
  patterns:
  - pattern: |
      get_tag($DER, $LEN, $TAG_OUT, $CONTENTS, $CLEN, $REMAINDER, $RLEN)
  - pattern-not: |
      get_tag($DER, $LEN, $TAG_OUT, $CONTENTS, $CLEN, $REMAINDER, $RLEN, $RECURSION)
  languages:
  - c
  message: |
    Missing recursion depth check in ASN.1 decoding function. This vulnerability can lead to stack overflow due to unbounded recursion. Add a recursion depth parameter and check it to prevent stack overflow. Example fix: `if (recursion >= 32) return ASN1_OVERFLOW;`
  severity: ERROR
  metadata:
    source-url: github.com/krb5/krb5/commit/57415dda6cf04e73ffc3723be518eddfae599bfd
    category: security
    cwe:
    - 'CWE-674: Uncontrolled Recursion'
    owasp: A9:2021-Security Logging and Monitoring Failures
    technology:
    - c
- id: vuln-krb5-5e6d1796
  patterns:
  - pattern: |
      if ($CODE == 0 || $CODE == KRB5_PREAUTH_FAILED) {
          ...
      }
  - pattern-not: |
      if (!$CODE || $CODE == KRB5_PREAUTH_FAILED || $CODE == KRB5KDC_ERR_KEY_EXP) {
          ...
      }
  languages:
  - c
  message: |
    The code fails to handle the case where the key is expired (KRB5KDC_ERR_KEY_EXP), which could lead to security vulnerabilities by allowing expired keys to be used. This was fixed by adding a check for KRB5KDC_ERR_KEY_EXP in the condition. Ensure that all relevant error codes are properly handled in authentication checks.
  severity: ERROR
  metadata:
