- id: vuln-krb5-6609658d
  patterns:
  - pattern: |
      if (strncmp($HANDLE->params.realm, $REALM->data, $REALM->length) == 0
          && strncmp("kadmin", $C1->data, $C1->length) == 0) {
          if (strncmp("history", $C2->data, $C2->length) == 0)
              goto $FAIL;
          else
              $SUCCESS = 1;
      }
  - pattern-not: |
      $SUCCESS = data_eq_string(*$REALM, $HANDLE->params.realm) &&
          data_eq_string(*$C1, "kadmin") && !data_eq_string(*$C2, "history");
  languages:
  - c
  message: |
    Detected insecure string comparison using `strncmp` which can lead to incorrect validation.
    The `strncmp` function is being used to compare sensitive data, which can be vulnerable to timing attacks or incorrect comparisons.
    Replace `strncmp` with a secure comparison function like `data_eq_string` to ensure proper validation.
  severity: ERROR
  metadata:
    source-url: github.com/krb5/krb5/commit/6609658db0799053fbef0d7d0aa2f1fd68ef32d8
    category: security
    cwe:
    - 'CWE-697: Incorrect Comparison'
    owasp:
    - 'A2: Broken Authentication'
    technology:
    - c
- id: vuln-krb5-8096a4aa
  patterns:
  - pattern: |
      if ($RETURN_TOKEN != NO_TOKEN_SEND && $RETURN_TOKEN != CHECK_MIC) {
          ...
          if ($SEND_TOKEN_INIT) {
              $TMPRET = make_spnego_tokenInit_msg($SC, 1, $MIC_OUT, 0, GSS_C_NO_BUFFER, $RETURN_TOKEN, $OUTPUT_TOKEN);
          } else {
              $TMPRET = make_spnego_tokenTarg_msg($NEG_STATE, $SC ? $SC->internal_mech : GSS_C_NO_OID, $MECHTOK_OUT, $MIC_OUT, $RETURN_TOKEN, $OUTPUT_TOKEN);
          }
          ...
      }
  - pattern-not: |
      if ($RETURN_TOKEN == INIT_TOKEN_SEND && $SEND_TOKEN_INIT) {
          $TMPRET = make_spnego_tokenInit_msg($SC, 1, $MIC_OUT, 0, GSS_C_NO_BUFFER, $RETURN_TOKEN, $OUTPUT_TOKEN);
          if ($TMPRET < 0)
              $RET = GSS_S_FAILURE;
      } else if ($RETURN_TOKEN != NO_TOKEN_SEND && $RETURN_TOKEN != CHECK_MIC) {
          $TMPRET = make_spnego_tokenTarg_msg($NEG_STATE, $SC ? $SC->internal_mech : GSS_C_NO_OID, $MECHTOK_OUT, $MIC_OUT, $RETURN_TOKEN, $OUTPUT_TOKEN);
      }
  languages:
  - c
  message: |
    The vulnerability in the code involves incorrect handling of token initialization in the SPNEGO mechanism. The original code could lead to incorrect token generation due to improper conditions, potentially causing security issues in authentication. The fix ensures that the token is only generated when the correct conditions are met, preventing potential misuse.
  severity: ERROR
  metadata:
    source-url: github.com/krb5/krb5/commit/8096a4aa162f87aaf2129a7300a3645518074b13
    category: security
    cwe:
    - CWE-284
    owasp:
    - 'A2: Broken Authentication'
    technology:
    - c
- id: vuln-krb5-83ed75fe
  patterns:
  - pattern: |
      gss_buffer_desc $CLIENT_NAME, $SERVICE_NAME;
  - pattern-not: |
      gss_buffer_desc $CLIENT_NAME = GSS_C_EMPTY_BUFFER;
      gss_buffer_desc $SERVICE_NAME = GSS_C_EMPTY_BUFFER;
  languages:
  - c
  message: |
    Uninitialized `gss_buffer_desc` variables can lead to undefined behavior when used with GSS-API functions. Always initialize `gss_buffer_desc` variables to `GSS_C_EMPTY_BUFFER` to avoid potential security vulnerabilities.
  severity: ERROR
  metadata:
    source-url: github.com/krb5/krb5/commit/83ed75feba32e46f736fcce0d96a0445f29b96c2
    category: security
    cwe:
    - 'CWE-909: Missing Initialization of Resource'
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    references:
    - https://tools.ietf.org/html/rfc2744
    technology:
    - c
- id: vuln-krb5-88a1701b
  patterns:
  - pattern: |
      $REPLY = *$TKT->header_tkt;
  - pattern-not: |
      $REPLY.server = $TKT->header_tkt->server;
  languages:
  - c
  message: |
    Detected unsafe copying of the entire header ticket structure, which may include sensitive authorization data. This can lead to security vulnerabilities by exposing unintended data. Instead, copy only the necessary fields explicitly, such as the server field, to avoid inadvertently including sensitive information.
  severity: ERROR
  metadata:
    source-url: github.com/krb5/krb5/commit/88a1701b423c13991a8064feeb26952d3641d840
    category: security
    cwe:
    - CWE-200
    owasp:
    - A03:2021 - Sensitive Data Exposure
    technology:
    - c
- id: vuln-krb5-8ee70ec6
  patterns:
  - pattern: |
      strlcpy($DST, $SRC->data, $SRC->length + 1);
  - pattern-not: |
      if ($SRC->data != NULL)
          memcpy($DST, $SRC->data, $SRC->length);
  languages:
  - c
  message: |
    Potential null pointer dereference and buffer overflow vulnerability detected.
    The code uses strlcpy with a source pointer that is not checked for NULL,
    which could lead to undefined behavior. Additionally, adding 1 to the length
    could cause a buffer overflow if the source data is exactly the length of the
    destination buffer. Always check for NULL pointers before copying data and
    use memcpy with the correct length to avoid overflow.
  severity: ERROR
  metadata:
    source-url: github.com/krb5/krb5/commit/8ee70ec63931d1e38567905387ab9b1d45734d81
    category: security
    cwe:
    - CWE-476
    - CWE-120
    owasp:
    - 'A1: Injection'
    - 'A8: Software and Data Integrity Failures'
    technology:
    - c
