- id: vuln-krb5-d1f70702
  patterns:
  - pattern: |
      if ($ENT != NULL) {
        if (($ST = $FUNC($CONTEXT, $LD, $ENT, $POL_NAME, $POLICY)) != 0)
          goto $CLEANUP;
      }
  - pattern-not: |
      if ($ENT == NULL) {
        $ST = $ERROR_CODE;
        goto $CLEANUP;
      }
      $ST = $FUNC($CONTEXT, $LD, $ENT, $POL_NAME, $POLICY);
  languages:
  - c
  message: |
    The code fails to handle the case where `ent` is NULL, which can lead to null pointer dereference or incorrect error handling. This vulnerability can cause undefined behavior or security issues. The fix ensures proper error handling by explicitly checking for NULL and setting an appropriate error code before jumping to the cleanup section.
  severity: ERROR
  metadata:
    source-url: github.com/krb5/krb5/commit/d1f707024f1d0af6e54a18885322d70fa15ec4d3
    category: security
