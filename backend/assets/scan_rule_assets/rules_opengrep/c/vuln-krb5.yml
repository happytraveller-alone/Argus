- id: vuln-krb5-d68398e1
  patterns:
  - pattern: |
      if ($SUBBUF->bound > $BUF->bound)
        return $ASN1_OVERRUN;
  - pattern-not: |
      if ($BUF->next > $BUF->bound + 1) return $ASN1_OVERRUN;
  languages:
  - c
  message: |
    Detected a potential buffer overrun vulnerability due to incorrect boundary checks.
    The original code compared the bounds of a sub-buffer with the main buffer, which could lead to buffer overruns if not properly validated.
    The fix ensures that the next pointer in the buffer does not exceed the bound by more than one, preventing overruns.
    Always validate buffer boundaries carefully to avoid memory corruption vulnerabilities.
  severity: ERROR
  metadata:
    source-url: github.com/krb5/krb5/commit/d68398e122cfd6c3fc35ab54b3cbeed38ae1e6a9
    category: security
    cwe:
    - CWE-120
    owasp:
    - A08:2021 - Software and Data Integrity Failures
    technology:
    - c
- id: vuln-krb5-e1caf6fb
  patterns:
  - pattern: |
      char **values = NULL;
      ...
      if ((values = ldap_get_values($LDAP, $ENTRY, "krbprincipalname")) != NULL) {
          $KRB_IDENTITY_EXISTS = TRUE;
          ldap_value_free(values);
      }
      ...
      if ($XARGS_DN != NULL && $KRB_IDENTITY_EXISTS == TRUE) {
          $ST = EINVAL;
          snprintf($ERRBUF, sizeof($ERRBUF), _("ldap object is already kerberized"));
          k5_setmsg($CONTEXT, $ST, "%s", $ERRBUF);
          goto $CLEANUP;
      }
  - pattern-not: |
      static krb5_error_code
      check_dn_exists(krb5_context context,
                      krb5_ldap_server_handle *ldap_server_handle,
                      const char *dn, krb5_boolean nonkrb_only)
      {
          ...
          values = ldap_get_values(ld, ent, "krbprincipalname");
          if (values != NULL) {
              ldap_value_free(values);
              if (nonkrb_only) {
                  st = EINVAL;
                  k5_setmsg(context, st, _("ldap object is already kerberized"));
                  goto cleanup;
              }
          }
          ...
      }
  languages:
  - c
  message: |
    The code fails to properly validate LDAP DN entries and check for existing Kerberos identities, which could allow unauthorized access or privilege escalation. The vulnerability occurs when adding a Kerberos principal to an LDAP object that already has a Kerberos identity, potentially bypassing security checks. The fix introduces proper validation functions to ensure DN entries are within the correct subtree and checks for existing Kerberos attributes before adding new ones.
  severity: ERROR
  metadata:
    source-url: github.com/krb5/krb5/commit/e1caf6fb74981da62039846931ebdffed71309d1
    category: security
    cwe:
    - CWE-287
    - CWE-285
    owasp: A04:2021 - Insecure Design
    references:
    - https://web.mit.edu/kerberos/
    technology:
    - c
- id: vuln-krb5-e3b5a5e5
  patterns:
  - pattern: |
      $FUNC($ARG, 0, $NULL, $NULL, $NULL);
  - pattern-not: |
      $FUNC($ARG, EINVAL, $NULL, $NULL, $NULL);
  languages:
  - c
  message: |
    The code uses a hardcoded error code (0) in a response function, which can mask actual errors. This can lead to incorrect handling of error conditions and potential security issues. Use the appropriate error code (EINVAL) instead of 0 to ensure proper error handling.
  severity: ERROR
