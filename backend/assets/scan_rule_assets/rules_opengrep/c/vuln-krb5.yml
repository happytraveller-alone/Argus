- id: vuln-krb5-e6ae703a
  patterns:
  - pattern: |
      if ($HEADER->buffer.length < $TOKEN_WRAPPER_LEN + 14) {
        ...
      }
  - pattern-not: |
      if ($HEADER->buffer.length < $TOKEN_WRAPPER_LEN + 22) {
        ...
