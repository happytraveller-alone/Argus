rules:
- id: vuln-mono-035c8587
  patterns:
  - pattern: |
      if (MONO_TYPE_IS_REFERENCE($TYPE) ||
          ($TYPE->type == MONO_TYPE_VALUETYPE &&
           (!mono_type_get_class($TYPE) ||
            mono_type_get_class($TYPE)->has_references))) {
        ...
      }
  - pattern-not: |
      if (MONO_TYPE_IS_REFERENCE($TYPE) || $TYPE->type == MONO_TYPE_VALUETYPE) {
        ...
      }
  languages:
  - c
  message: |
    Detected a potentially unsafe array initialization check that may allow
    initialization of arrays containing references. This could lead to
    unexpected behavior or security vulnerabilities. The check should be
    simplified to prevent initialization of arrays with non-primitive types.
    Update the condition to only check for reference types or value types
    without additional constraints.
  severity: ERROR
  metadata:
    source-url: github.com/mono/mono/commit/035c8587c0d8d307e45f1b7171a0d337bb451f1e
    category: security
    cwe:
    - CWE-665
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/665.html
    technology:
    - c
- id: vuln-mono-8e890a3b
  patterns:
  - pattern: |
      while ((full_name = mono_dl_build_path(".", $FILE_NAME, &$ITER))) {
        ...
      }
  - pattern-not: |
      while ((full_name = mono_dl_build_path($DIR, $FILE_NAME, &$ITER))) {
        ...
      }
  languages:
  - c
  message: |
    Detected unsafe use of hardcoded directory path in `mono_dl_build_path`.
    This can lead to arbitrary library loading from the current directory,
    potentially allowing DLL hijacking attacks.
    Instead, use a dynamic directory path or NULL to prevent this vulnerability.
  severity: ERROR
  metadata:
    source-url: github.com/mono/mono/commit/8e890a3bf80a4620e417814dc14886b1bbd17625
    category: security
    cwe:
    - CWE-426
    owasp:
    - A08:2021-Software and Data Integrity Failures
    technology:
    - c
