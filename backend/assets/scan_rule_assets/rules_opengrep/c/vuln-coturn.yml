rules:
- id: vuln-coturn-51a7c2b9
  patterns:
  - pattern: |
      while((*$DATA == '\r') || (*$DATA == '\n')) ++$DATA;
  - pattern-not: |
      while((*$DATA == '\r') || (*$DATA == '\n')) { ++$DATA; --$DATA_LEN; }
  languages:
  - c
  message: |
    Detected a potential buffer overflow vulnerability due to missing decrement of data length while incrementing the data pointer. This can lead to reading beyond the allocated buffer, causing crashes or security vulnerabilities.
    To fix this, ensure that the data length is decremented in sync with the data pointer increment.
  severity: ERROR
  metadata:
    source-url: github.com/coturn/coturn/commit/51a7c2b9bf924890c7a3ff4db9c4976c5a93340a
    category: security
    cwe:
    - CWE-119
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-coturn-e09bcd9f
  patterns:
  - pattern: |
      char *post_data = (char*)calloc($DATA_LEN + 1, sizeof(char));
      memcpy(post_data, $DATA, $DATA_LEN);
      char *fmarker = NULL;
      char *fsplit = strtok_r(post_data, "&", &fmarker);
      struct headers_list *list = (struct headers_list*)malloc(sizeof(struct headers_list));
      bzero(list,sizeof(struct headers_list));
      while (fsplit != NULL) {
        char *vmarker = NULL;
        char *key = strtok_r(fsplit, "=", &vmarker);
        char *value = strtok_r(NULL, "=", &vmarker);
        char empty[1];
        empty[0]=0;
        value = value ? value : empty;
        value = evhttp_decode_uri(value);
        char *p = value;
        while (*p) {
          if (*p == '+')
            *p = ' ';
          p++;
        }
        list->keys = (char**)realloc(list->keys,sizeof(char*)*(list->n+1));
        list->keys[list->n] = strdup(key);
        list->values = (char**)realloc(list->values,sizeof(char*)*(list->n+1));
        list->values[list->n] = value;
        ++(list->n);
        fsplit = strtok_r(NULL, "&", &fmarker);
      }
      free(post_data);
      return list;
  - pattern-not: |
      if ($DATA_LEN) {
        char *post_data = (char*)calloc($DATA_LEN + 1, sizeof(char));
        if (post_data != NULL) {
          memcpy(post_data, $DATA, $DATA_LEN);
          char *fmarker = NULL;
          char *fsplit = strtok_r(post_data, "&", &fmarker);
          struct headers_list *list = (struct headers_list*)malloc(sizeof(struct headers_list));
          bzero(list,sizeof(struct headers_list));
          while (fsplit != NULL) {
            char *vmarker = NULL;
            char *key = strtok_r(fsplit, "=", &vmarker);
            if (key == NULL)
              break;
            else {
              char *value = strtok_r(NULL, "=", &vmarker);
              char empty[1];
              empty[0]=0;
              value = value ? value : empty;
              value = evhttp_decode_uri(value);
              char *p = value;
              while (*p) {
                if (*p == '+')
                  *p = ' ';
                p++;
              }
              list->keys = (char**)realloc(list->keys,sizeof(char*)*(list->n+1));
              list->keys[list->n] = strdup(key);
              list->values = (char**)realloc(list->values,sizeof(char*)*(list->n+1));
              list->values[list->n] = value;
              ++(list->n);
              fsplit = strtok_r(NULL, "&", &fmarker);
            }
          }
          free(post_data);
          return list;
        }
      }
      return NULL;
  languages:
  - c
  message: |
    The code does not check if the memory allocation for `post_data` was successful before using it. This can lead to a NULL pointer dereference if `calloc` fails, potentially causing a crash or undefined behavior. Always check the return value of memory allocation functions before using the allocated memory.
  severity: ERROR
  metadata:
    source-url: github.com/coturn/coturn/commit/e09bcd9f7af5b32c81b37f51835b384b5a7d03a8
    category: security
    cwe:
    - CWE-476
    owasp:
    - A1:2017-Injection
    technology:
    - c
