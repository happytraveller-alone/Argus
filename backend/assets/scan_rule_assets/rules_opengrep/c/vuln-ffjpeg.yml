rules:
- id: vuln-ffjpeg-2ad299a3
  patterns:
  - pattern-inside: |
      static void huffman_decode(...) {
        ...
      }
  - pattern: |
      while ($VAR < $END) {
        ...
      }
  - pattern-not: |
      while ($SIZE > 0 && $VAR < $END) {
        $SIZE -= $EXPR;
        ...
      }
  languages:
  - c
  message: |
    Detected a potential buffer overflow vulnerability due to missing size check in a loop.
    This can lead to out-of-bounds memory access, causing crashes or arbitrary code execution.
    Always ensure that the loop condition includes a size check to prevent exceeding buffer boundaries.
  severity: ERROR
  metadata:
    source-url: github.com/rockcarry/ffjpeg/commit/2ad299a390c63895333f8ea51ff54f8765678494
    category: security
    cwe:
    - CWE-119
    - CWE-125
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-ffjpeg-31649ad6
  patterns:
  - pattern: |
      $BUF[0] = calloc(1, $JW * $JH / 1 * sizeof(int));
      $BUF[1] = calloc(1, $JW * $JH / 4 * sizeof(int));
      $BUF[2] = calloc(1, $JW * $JH / 4 * sizeof(int));
  - pattern-not: |
      $BUF[0] = calloc(1, sizeof(int) * $JW * $JH / 1);
      $BUF[1] = calloc(1, sizeof(int) * $JW * $JH / 4);
      $BUF[2] = calloc(1, sizeof(int) * $JW * $JH / 4);
  languages:
  - c
  message: |
    The vulnerable code uses an incorrect order of operations in the calloc function, which could lead to incorrect memory allocation sizes. This is dangerous because it may result in buffer overflows or underflows, potentially leading to memory corruption or arbitrary code execution. To fix this, ensure that the sizeof operator is applied first, followed by the multiplication with the dimensions.
  severity: ERROR
  metadata:
    source-url: github.com/rockcarry/ffjpeg/commit/31649ad67e232aaa31ceb7aaa3c3451e5bbcb4cb
    category: security
    cwe:
    - 'CWE-131: Incorrect Calculation of Buffer Size'
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/131.html
    technology:
    - c
- id: vuln-ffjpeg-82166f2b
  patterns:
  - pattern: |
      jfif->comp_num = $BUF[0];
  - pattern-not: |
      jfif->comp_num = $BUF[0] < 4 ? $BUF[0] : 4;
  languages:
  - c
  message: |
    The code directly assigns a value from a buffer to `comp_num` without bounds checking, which can lead to out-of-bounds access or memory corruption. This is dangerous because it can be exploited to cause undefined behavior or security vulnerabilities. To fix this, ensure the value is within the expected range before assignment.
  severity: ERROR
  metadata:
    source-url: github.com/rockcarry/ffjpeg/commit/82166f2b942405b11e40153c70551a48b7e6b4ab
    category: security
    cwe:
    - CWE-120
    - CWE-125
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-ffjpeg-caade60a
  patterns:
  - pattern: |
      bmp_load(&$BMP, $ARG);
  - pattern-not: |
      if (bmp_load(&$BMP, $ARG) == -1) {
          ...
          return -1;
      }
  languages:
  - c
  message: |
    The function `bmp_load` is called without checking its return value, which can lead to undefined behavior if the function fails. This can cause the program to continue executing with invalid data, potentially leading to crashes or security vulnerabilities. To fix this, always check the return value of `bmp_load` and handle errors appropriately.
  severity: ERROR
  metadata:
    source-url: github.com/rockcarry/ffjpeg/commit/caade60a69633d74100bd3c2528bddee0b6a1291
    category: security
    cwe:
    - CWE-252
    owasp:
    - A10:2021 - Server-Side Request Forgery (SSRF)
    technology:
    - c
- id: vuln-ffjpeg-e63a75fd
  patterns:
  - pattern: |
      $VAR->width = $WIDTH;
      $VAR->height = $HEIGHT;
      $VAR->stride = ALIGN($WIDTH * 3, 4);
      $VAR->pdata = malloc($VAR->stride * $HEIGHT);
  - pattern-not: |
      $VAR->width = (int)$WIDTH > 0 ? (int)$WIDTH : 0;
      $VAR->height = (int)$HEIGHT > 0 ? (int)$HEIGHT : 0;
      $VAR->stride = ALIGN($VAR->width * 3, 4);
      $VAR->pdata = malloc((size_t)$VAR->stride * $HEIGHT);
  languages:
  - c
  message: |
    The code directly assigns width and height values without validation, which can lead to integer overflow or negative values in memory allocation. This can cause heap corruption or buffer overflows. Always validate width and height values before using them in calculations or memory allocations.
  severity: ERROR
  metadata:
    source-url: github.com/rockcarry/ffjpeg/commit/e63a75fdc2ba931c90445037b225170c6c31ce5d
    category: security
    cwe:
    - CWE-190
    - CWE-787
    owasp: 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/190.html
    - https://cwe.mitre.org/data/definitions/787.html
    technology:
    - c
