rules:
- id: vuln-openldap-21981053
  patterns:
  - pattern: |
      if ($VAR != NULL) {
        vrFilter_free($OP, $VAR);
      }
  - pattern-not: |
      if ($VAR != NULL) {
        vrFilter_free($OP, $VAR);
        $VAR = NULL;
      }
  languages:
  - c
  message: |
    Detected a missing NULL assignment after freeing a pointer. This can lead to use-after-free vulnerabilities if the pointer is accessed after being freed. To fix this, always set the pointer to NULL after freeing it to prevent accidental reuse.
  severity: ERROR
  metadata:
    source-url: github.com/openldap/openldap/commit/21981053a1195ae1555e23df4d9ac68d34ede9dd
    category: security
    cwe:
    - CWE-416
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-openldap-2f1a2dd3
  patterns:
  - pattern: |
      ValuesReturnFilter *$P, *$NEXT;
      if ($VRF == NULL) {
        return;
      }
      for ($P = $VRF; $P != NULL; $P = $NEXT) {
        $NEXT = $P->vrf_next;
        ...
      }
  - pattern-not: |
      ValuesReturnFilter *$NEXT;
      for ( ; $VRF != NULL; $VRF = $NEXT ) {
        $NEXT = $VRF->vrf_next;
        ...
      }
  languages:
  - c
  message: |
    Detected a potential use-after-free vulnerability due to unnecessary variable declaration and incorrect loop structure.
    The original code declares an extra pointer variable `$P` and uses it in a loop, which can lead to use-after-free issues if `$P` is accessed after being freed.
    The fix removes the redundant variable and directly uses `$VRF` in the loop.
    To fix this, remove the unnecessary variable and directly iterate using the main pointer.
  severity: ERROR
  metadata:
    source-url: github.com/openldap/openldap/commit/2f1a2dd329b91afe561cd06b872d09630d4edb6a
    category: security
    cwe:
    - 'CWE-416: Use After Free'
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-openldap-463c1fa2
  patterns:
  - pattern: |
      for ( $J = 0; !BER_BVISNULL( &$A->a_nvals[$J] ); $J++ ) {
        assert( $J < $I );
        ber_dupbv( &$TMP->a_nvals[$J], &$A->a_nvals[$J] );
        if ( BER_BVISNULL( &$TMP->a_nvals[$J] ) ) break;
        ...
      }
      assert( $J == $I );
  - pattern-not: |
      $J = 0;
      if ( $I ) {
        for ( ; !BER_BVISNULL( &$A->a_nvals[$J] ); $J++ ) {
          assert( $J < $I );
          ber_dupbv( &$TMP->a_nvals[$J], &$A->a_nvals[$J] );
          if ( BER_BVISNULL( &$TMP->a_nvals[$J] ) ) break;
          ...
        }
        assert( $J == $I );
      }
  languages:
  - c
  message: |
    The code contains a potential out-of-bounds access vulnerability due to an unchecked loop condition.
    The loop iterates over an array without ensuring that the index stays within bounds, which could lead to memory corruption or crashes.
    To fix this, add a check to ensure the loop only runs if the array size is greater than zero.
  severity: ERROR
  metadata:
    source-url: github.com/openldap/openldap/commit/463c1fa25d45e393dc1f1ea235286f79e872fad0
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/125.html
    technology:
    - c
- id: vuln-openldap-6fe51a9a
  patterns:
  - pattern: |
      assert(0);
  - pattern-not: |
      /* invalid input */
  languages:
  - c
  message: |
    The use of `assert(0)` in the code indicates a potential issue where the program may terminate abruptly due to an invalid state. This can be dangerous as it may lead to denial of service or unexpected behavior in production environments. Instead of using `assert(0)`, handle the invalid input gracefully with appropriate error handling or logging.
  severity: ERROR
  metadata:
    source-url: https://github.com/openldap/openldap/commit/6fe51a9ab04fd28bbc171da3cf12f1c1040d6629
    category: security
    cwe:
    - CWE-617
    owasp:
    - A10:2021 - Server-Side Request Forgery
    technology:
    - c
- id: vuln-openldap-91dccd25
  patterns:
  - pattern: |
      if ( $VAR[0] != '{' && $VAR[$LEN-1] != '}' ) {
        ...
      }
  - pattern-not: |
      if ( $VAR[0] != '{' || $VAR[$LEN-1] != '}' ) {
        ...
      }
  languages:
  - c
  message: |
    The condition checks for the presence of curly braces at the beginning and end of a string using the logical AND operator (&&) instead of the logical OR operator (||). This can lead to incorrect validation, potentially allowing malformed input to bypass checks. Use the logical OR operator (||) to ensure that either condition being true results in the check failing.
  severity: ERROR
  metadata:
    source-url: github.com/openldap/openldap/commit/91dccd25c347733b365adc74cb07d074512ed5ad
    category: security
    cwe:
    - CWE-697
    owasp:
    - A03:2021 - Injection
    references:
    - https://cwe.mitre.org/data/definitions/697.html
    technology:
    - c
- id: vuln-openldap-fbe5611e
  patterns:
  - pattern: |
      if ($OP->o_conn->c_authz_backend && be_isroot_dn($OP->o_conn->c_authz_backend, $AUTHC_DN)) {
        $RC = LDAP_SUCCESS;
        goto DONE;
      }
  - pattern-not: |
      if ($OP->o_conn->c_authz_backend) {
        $ZBE = select_backend($AUTHZ_DN, 1);
        if ($ZBE && be_isroot_dn($ZBE, $AUTHC_DN)) {
          $RC = LDAP_SUCCESS;
          goto DONE;
        }
      }
  languages:
  - c
  message: |
    This rule detects a vulnerability where the manager can authorize as any DN without proper backend validation. This is dangerous because it could allow unauthorized access to sensitive data. The fix involves validating that the authorization is only allowed within the manager's own databases by checking the appropriate backend. Ensure that the authorization is properly validated within the correct backend context.
  severity: ERROR
  metadata:
    source-url: https://github.com/openldap/openldap/commit/fbe5611e606e80e56e158cc42f0c7289975836a8
    category: security
    cwe:
    - 'CWE-285: Improper Authorization'
    owasp:
    - A01:2021 - Broken Access Control
    technology:
    - c
