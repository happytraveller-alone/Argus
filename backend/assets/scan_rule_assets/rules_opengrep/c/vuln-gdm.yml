rules:
- id: vuln-gdm-6060db70
  pattern: |
    $DISPLAY = gdm_display_store_lookup($STORE, $ID);
    if ($DISPLAY != NULL) {
      ...
      g_signal_handlers_disconnect_by_func($DISPLAY, G_CALLBACK($CALLBACK), $CONTEXT);
      g_object_weak_unref(G_OBJECT($DISPLAY), (GWeakNotify)$NOTIFY, $CONTEXT);
      ...
    }
  pattern-not: |
    g_signal_handlers_disconnect_by_func($DISPLAY, G_CALLBACK($CALLBACK), $CONTEXT);
    g_object_weak_unref(G_OBJECT($DISPLAY), (GWeakNotify)$NOTIFY, $CONTEXT);
  languages:
  - c
  message: |
    Detected a potential vulnerability in the handling of display objects where the display lookup and subsequent operations are not atomic. This can lead to race conditions or use-after-free issues if the display object is accessed or modified concurrently. The fix involves directly passing the display object instead of looking it up by ID, ensuring safer and more consistent behavior. Always ensure that operations on shared resources are performed atomically or with proper synchronization.
  severity: ERROR
  metadata:
    source-url: github.com/GNOME/gdm/commit/6060db704a19b0db68f2e9e6a2d020c0c78b6bba
    category: security
    cwe:
    - CWE-362
    - CWE-416
    owasp:
    - 'A2: Broken Authentication'
    references:
    - https://cwe.mitre.org/data/definitions/362.html
    - https://cwe.mitre.org/data/definitions/416.html
    technology:
    - c
- id: vuln-gdm-8ce95db1
  pattern: |
    g_signal_connect(
      $DISPLAY_SKELETON,
      $SIGNAL_NAME,
      G_CALLBACK($HANDLER),
      $SELF
    );
  pattern-not: |
    g_signal_connect_object(
      $DISPLAY_SKELETON,
      $SIGNAL_NAME,
      G_CALLBACK($HANDLER),
      $SELF,
      $FLAGS
    );
  languages:
  - c
  message: |
    The use of `g_signal_connect` instead of `g_signal_connect_object` can lead to potential memory safety issues due to incorrect object lifecycle management.
    This can cause use-after-free vulnerabilities or other undefined behavior when the callback is invoked after the object has been destroyed.
    Replace `g_signal_connect` with `g_signal_connect_object` and ensure the appropriate flags are set to manage object references correctly.
  severity: ERROR
  metadata:
    source-url: github.com/GNOME/gdm/commit/8ce95db12cae23d558ff637c5e3c9e0b82937944
    category: security
    cwe:
    - 'CWE-416: Use After Free'
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    references:
    - https://developer.gnome.org/gobject/stable/gobject-Signals.html#g-signal-connect-object
    technology:
    - c
- id: vuln-gdm-94ea12bb
  pattern: |
    gchar **splitstr = g_strsplit($MSG, " ", 2);
    $FUNC($VAR);
  pattern-not: |
    gchar **splitstr = g_strsplit($MSG, " ", 2);
    if (splitstr == NULL || splitstr[0] == NULL) {
        $HANDLE_ERROR;
    }
    $FUNC($VAR);
  languages:
  - c
  message: |
    Detected a potential NULL pointer dereference vulnerability in g_strsplit usage.
    The code fails to check if splitstr or splitstr[0] is NULL before using it, which could lead to a crash or undefined behavior.
    Always check the return value of g_strsplit and ensure the array elements are not NULL before accessing them.
  severity: ERROR
  metadata:
    source-url: github.com/gnome/gdm/commit/94ea12bb61a1666d2d6d211e7100d6ad98731958
    category: security
    cwe:
    - CWE-476
    owasp:
    - A1:2017-Injection
    technology:
    - c
- id: vuln-gdm-dc823512
  pattern: |
    look_for_existing_users_sync($SELF);
  pattern-not: |
    if (!look_for_existing_users_sync($SELF)) {
        exit(EXIT_FAILURE);
    }
  languages:
  - c
  message: |
    The function `look_for_existing_users_sync` is called without checking its return value, which can lead to undefined behavior if the function fails. This vulnerability could allow the system to continue operating in an inconsistent state. To fix this, ensure the return value is checked and handle the failure appropriately, such as exiting with a failure status.
  severity: ERROR
  metadata:
    source-url: github.com/GNOME/gdm/commit/dc8235128c3a1fcd5da8f30ab6839d413d353f28
    category: security
    cwe:
    - CWE-252
    owasp: A10:2021-Server-Side Request Forgery
    technology:
    - c
