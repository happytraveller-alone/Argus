- id: vuln-curl-b3ee26c5
  pattern: |
    if(!strequal($VAR1, $VAR2) || !strequal($VAR3, $VAR4)) {
      ...
    }
  pattern-not: |
    if(strcmp($VAR1, $VAR2) || strcmp($VAR3, $VAR4)) {
      ...
    }
  languages:
  - c
  message: |
    The use of `strequal` for string comparison is vulnerable to timing attacks.
    `strequal` performs a byte-by-byte comparison and stops at the first mismatch,
    which can be exploited by attackers to deduce sensitive information.
    Replace `strequal` with `strcmp` to mitigate this risk.
  severity: ERROR
