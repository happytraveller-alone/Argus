rules:
- id: vuln-curl-058f98dc
  pattern: |
    msnprintf($BUF, $LEN, "%ld%s", $PORT, $HOSTNAME);
  pattern-not: |
    msnprintf($BUF, $LEN, "%ld/%s", $PORT, $HOSTNAME);
  languages:
  - c
  message: |
    Detected a vulnerable format string in msnprintf that may lead to incorrect hostname handling.
    The original code concatenates port and hostname directly without proper separation, which can cause issues with parsing and potential security vulnerabilities.
    The fix adds proper separation using slashes and includes scope_id for IPv6 support.
    Update the format string to use proper separators and include scope_id if IPv6 is enabled.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/058f98dc3fe595f21dc26a5b9b1699e519ba5705
    category: security
    cwe:
    - 'CWE-134: Use of Externally-Controlled Format String'
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-curl-0761a51e
  pattern: |
    Curl_add_buffer($BUF, ":", 1)
  pattern-not: |
    Curl_add_buffer($BUF, ": ", 2)
  languages:
  - c
  message: |
    Detected incorrect use of single character delimiter in Curl_add_buffer.
    Using ":" without a trailing space can lead to malformed HTTP headers.
    This might cause issues with HTTP/2 header parsing and potential security vulnerabilities.
    Always use ": " (colon followed by space) as the delimiter for HTTP headers.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/0761a51ee0551ad9e523cbdba24ce00d22fff9c1
    category: security
    cwe:
    - CWE-113
    owasp:
    - A6:2017-Security Misconfiguration
    references:
    - https://tools.ietf.org/html/rfc7540#section-8.1.2
    technology:
    - c
- id: vuln-curl-192c4f78
  pattern: |
    if(('%' == $IN) && ISXDIGIT($STRING[1]) && ISXDIGIT($STRING[2])) {
      ...
    }
  pattern-not: |
    if(('%' == $IN) && ($ALLOC > 2) && ISXDIGIT($STRING[1]) && ISXDIGIT($STRING[2])) {
      ...
    }
  languages:
  - c
  message: |
    The code checks for a percent-encoded character without verifying if there is sufficient allocated space in the buffer. This can lead to out-of-bounds read vulnerabilities when processing malformed input. To fix this, ensure that the buffer has enough space (greater than 2) before checking for percent-encoded characters.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/192c4f788d48f82c03e9cef40013f34370e90737
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-curl-2766262a
  pattern: |
    result = ($LINE[3] == ' ') ? TRUE : FALSE;
  pattern-not: |
    result = ($LINE[3] == ' ' || $LEN == 5) ? TRUE : FALSE;
  languages:
  - c
  message: |
    The code checks for a command response in SMTP protocol but does not account for servers that only send the response code without additional text. This can lead to incorrect handling of server responses, potentially causing security issues or unexpected behavior. The fix includes checking for a response code of length 5, which is valid according to RFC-4954. Update the condition to handle both cases.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/2766262a68688c1dd8143f9c4be84b46c408b70a
    category: security
    cwe:
    - 'CWE-20: Improper Input Validation'
    owasp:
    - 'A1: Injection'
    references:
    - https://tools.ietf.org/html/rfc4954
    - https://tools.ietf.org/html/rfc5321
    technology:
    - c
- id: vuln-curl-2b0994c2
  pattern: |
    const psl_ctx_t *$PSL = Curl_psl_use($DATA);
    int $ACCEPTABLE;
    if($PSL) {
      $ACCEPTABLE = psl_is_cookie_domain_acceptable($PSL, $DOMAIN, $CO_DOMAIN);
      Curl_psl_release($DATA);
    }
    else
      $ACCEPTABLE = !bad_domain($DOMAIN, strlen($DOMAIN));
  pattern-not: |
    bool $ACCEPTABLE = FALSE;
    char $LCASE[256];
    char $LCOOKIE[256];
    size_t $DLEN = strlen($DOMAIN);
    size_t $CLEN = strlen($CO_DOMAIN);
    if(($DLEN < sizeof($LCASE)) && ($CLEN < sizeof($LCOOKIE))) {
      const psl_ctx_t *$PSL = Curl_psl_use($DATA);
      if($PSL) {
        Curl_strntolower($LCASE, $DOMAIN, $DLEN + 1);
        Curl_strntolower($LCOOKIE, $CO_DOMAIN, $CLEN + 1);
        $ACCEPTABLE = psl_is_cookie_domain_acceptable($PSL, $LCASE, $LCOOKIE);
        Curl_psl_release($DATA);
      }
      else
        $ACCEPTABLE = !bad_domain($DOMAIN, strlen($DOMAIN));
    }
  languages:
  - c
  message: |
    The code directly uses the domain and cookie domain strings without converting them to lowercase, which can lead to incorrect domain matching and potential security vulnerabilities. This is dangerous because it can allow cookies to be set for incorrect or malicious domains. The fix involves converting the domain strings to lowercase before performing the domain acceptability check.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/2b0994c29a721c91c572cff7808c572a24d251eb
    category: security
    cwe:
    - 'CWE-178: Improper Handling of Case Sensitivity'
    owasp:
    - 'A2: Broken Authentication'
    references:
    - https://curl.se/docs/CVE-2023-XXXX.html
    technology:
    - c
- id: vuln-curl-2eb8dcf2
  pattern: |
    static bool tailmatch(const char *$LITTLE, const char *$BIGONE) {
      size_t $LITTLELEN = strlen($LITTLE);
      size_t $BIGLEN = strlen($BIGONE);
      if($LITTLELEN > $BIGLEN)
        return FALSE;
      return Curl_raw_equal($LITTLE, $BIGONE+$BIGLEN-$LITTLELEN) ? TRUE : FALSE;
    }
  pattern-not: |
    static bool tailmatch(const char *$COOKIE_DOMAIN, const char *$HOSTNAME) {
      size_t $COOKIE_DOMAIN_LEN = strlen($COOKIE_DOMAIN);
      size_t $HOSTNAME_LEN = strlen($HOSTNAME);
      if($HOSTNAME_LEN < $COOKIE_DOMAIN_LEN)
        return FALSE;
      if(!Curl_raw_equal($COOKIE_DOMAIN, $HOSTNAME+$HOSTNAME_LEN-$COOKIE_DOMAIN_LEN))
        return FALSE;
      if($HOSTNAME_LEN == $COOKIE_DOMAIN_LEN)
        return TRUE;
      if('.' == *($HOSTNAME + $HOSTNAME_LEN - $COOKIE_DOMAIN_LEN - 1))
        return TRUE;
      return FALSE;
    }
  languages:
  - c
  message: |
    The function 'tailmatch' is vulnerable to domain matching issues. The original implementation does not properly validate the domain against the hostname, which can lead to security vulnerabilities such as cookie hijacking. The fixed version ensures proper domain matching by checking the length and the leading character of the domain. Always validate domain names according to RFC6265 standards.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/2eb8dcf26cb37f09cffe26909a646e702dbcab66
    category: security
    cwe:
    - CWE-20
    owasp:
    - 'A2: Broken Authentication'
    references:
    - https://tools.ietf.org/html/rfc6265
    technology:
    - c
- id: vuln-curl-364f1747
  pattern: |
    if($CODE == $VALUE) {
      if($DATA->set.use_ssl && !$CONN->ssl[$FIRSTSOCKET].use) {
        if($TLS_SUPPORTED)
          $RESULT = $PERFORM_STARTTLS($DATA, $CONN);
        else if($DATA->set.use_ssl == CURLUSESSL_TRY)
          $RESULT = $PERFORM_AUTHENTICATION($DATA, $CONN);
        else {
          $FAILF($DATA, "STARTTLS not supported.");
          $RESULT = CURLE_USE_SSL_FAILED;
        }
      }
      else
        $RESULT = $PERFORM_AUTHENTICATION($DATA, $CONN);
    }
  pattern-not: |
    if($CODE == $VALUE) {
      if(!$DATA->set.use_ssl || $CONN->ssl[$FIRSTSOCKET].use)
        $RESULT = $PERFORM_AUTHENTICATION($DATA, $CONN);
      else if($CODE == $VALUE && $TLS_SUPPORTED)
        $RESULT = $PERFORM_STARTTLS($DATA, $CONN);
      else if($DATA->set.use_ssl <= CURLUSESSL_TRY)
        $RESULT = $PERFORM_AUTHENTICATION($DATA, $CONN);
      else {
        $FAILF($DATA, "STARTTLS not supported.");
        $RESULT = CURLE_USE_SSL_FAILED;
      }
    }
  languages:
  - c
  message: |
    The code fails to properly handle SSL/TLS fallback scenarios, potentially allowing
    cleartext authentication when TLS is required. This vulnerability could lead to
    sensitive data being transmitted insecurely. The fix ensures that SSL/TLS is
    properly enforced based on the configured security level (CURLUSESSL_TRY, etc.).
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/364f174724ef115c63d5e5dc1d3342c8a43b1cca
    category: security
    cwe:
    - 'CWE-319: Cleartext Transmission of Sensitive Information'
    owasp:
    - 'A2: Cryptographic Failures'
    references:
    - https://curl.se/docs/security.html
    technology:
    - c
- id: vuln-curl-39ce47f2
  pattern: |
    if(sscanf($DATA, "$FORMAT", $VAR1, $VAR2)) {
      ...
    }
  pattern-not: |
    if(sscanf($DATA, "$FORMAT", $VAR1, $VAR2) == $EXPECTED) {
      ...
    }
  languages:
  - c
  message: |
    The sscanf() function is used without checking the return value, which can lead to undefined behavior if the input does not match the expected format. This can cause security vulnerabilities such as buffer overflows or information leaks. Always check the return value of sscanf() to ensure it matches the expected number of conversions.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/39ce47f219b09c380b81f89fe54ac586c8db6bde
    category: security
    cwe:
    - CWE-252
    owasp:
    - A6:2017-Security Misconfiguration
    references:
    - https://cwe.mitre.org/data/definitions/252.html
    technology:
    - c
- id: vuln-curl-3bb273db
  pattern: |
    sscanf($URL, "%[^\n/?]%[^\n]", $HOST, $PATH);
  pattern-not: |
    sscanf($URL, "%[^\n/?#]%[^\n]", $HOST, $PATH);
  languages:
  - c
  message: |
    The sscanf pattern used for parsing URLs is incomplete and does not properly handle '#' characters in the path. This can lead to incorrect parsing of URLs, potentially causing security issues such as path traversal or misinterpretation of URL components. Update the sscanf pattern to include '#' in the character exclusion list.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/3bb273db7e40ebc284cff45f3ce3f0475c8339c2
    category: security
    cwe:
    - 'CWE-20: Improper Input Validation'
    owasp:
    - 'A1: Injection'
    references:
    - https://curl.se/docs/CVE-2021-22945.html
    technology:
    - c
- id: vuln-curl-3ee79c16
  pattern: |
    $DATA->info.header_size += $DELTA;
    $DATA->req.headerbytecount += $DELTA;
  pattern-not: |
    $RESULT = Curl_bump_headersize($DATA, $DELTA, $FLAG);
    if($RESULT) {
      ...
    }
  languages:
  - c
  message: |
    Directly incrementing header size and byte count without bounds checking can lead to integer overflow and security vulnerabilities. Use `Curl_bump_headersize` to properly check and handle header size limits.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/3ee79c1674fd6f99e8efca52cd7510e08b766770
    category: security
    cwe:
    - CWE-190
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-curl-453e7a7a
  pattern: |
    if(errno || ($END == ':')) {
      ...
    }
  pattern-not: |
    if(errno)
      /* overflow */
      $END = NULL;
    else if($END == ':') {
      ...
    }
  languages:
  - c
  message: |
    The code checks for both `errno` and `*endp == ':'` in the same condition, which can lead to undefined behavior if `errno` is set and `endp` is NULL. This can cause a null pointer dereference or other unexpected behavior. To fix this, separate the checks into distinct conditions, handling `errno` first and then checking `*endp == ':'`.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/453e7a7a03a2cec749abd3878a48e728c515cca7
    category: security
    cwe:
    - CWE-476
    owasp: 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-curl-57d299a4
  pattern: |
    unsigned char *$PW = $LEN ? malloc($LEN * 2) : strdup("");
  pattern-not: |
    unsigned char *$PW;
    if($LEN > SIZE_T_MAX/2)
      return $ERROR;
    $PW = $LEN ? malloc($LEN * 2) : strdup("");
  languages:
  - c
  message: |
    This code is vulnerable to integer overflow during memory allocation, which can lead to buffer overflow attacks. The multiplication of `len` by 2 in `malloc(len * 2)` can result in a value that exceeds the maximum size of a size_t, leading to a smaller buffer being allocated than expected. This can then be exploited to overwrite adjacent memory. To fix this, add a check to ensure that `len` is not larger than `SIZE_T_MAX/2` before performing the multiplication.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/57d299a499155d4b327e341c6024e293b0418243
    category: security
    cwe:
    - CWE-190
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/190.html
    technology:
    - c
- id: vuln-curl-5ea31458
  pattern: |
    SSL_SET_OPTION(issuercert)
  pattern-not: |
    SSL_CONN_CONFIG(issuercert)
  languages:
  - c
  message: |
    The use of `SSL_SET_OPTION(issuercert)` is unsafe and has been replaced with `SSL_CONN_CONFIG(issuercert)` in the patch. This change ensures proper handling of SSL issuer certificates, preventing potential security vulnerabilities such as incorrect certificate validation or memory corruption. Replace all instances of `SSL_SET_OPTION(issuercert)` with `SSL_CONN_CONFIG(issuercert)` to fix this issue.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/5ea3145850ebff1dc2b13d17440300a01ca38161
    category: security
    cwe:
    - 'CWE-295: Improper Certificate Validation'
    owasp:
    - A09:2021 - Security Logging and Monitoring Failures
    technology:
    - c
- id: vuln-curl-686d54ba
  pattern: |
    $FUNC(..., sizeof($BUFFER), ...);
  pattern-not: |
    $FUNC(..., sizeof($BUFFER) - 1, ...);
  languages:
  - c
  message: |
    The vulnerability occurs when the full size of a buffer is passed to a function without accounting for the null terminator, which can lead to buffer overflows. This is dangerous because it can result in memory corruption, crashes, or even arbitrary code execution. To fix this, subtract 1 from the buffer size to ensure space for the null terminator.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/686d54baf1df6e0775898f484d1670742898b3b2
    category: security
    cwe:
    - CWE-120
    owasp:
    - A2:2017-Broken Authentication
    technology:
    - c
- id: vuln-curl-6ecdf513
  pattern: |
    buf->size = $FUNC($ARG1, $ARG2, $ARG3, $ARG4, $ARG5);
  pattern-not: |
    $NREAD = $FUNC($ARG1, $ARG2, $ARG3, $ARG4, $ARG5);
    if($NREAD < 0)
      return $ERROR;
    buf->size = (size_t)$NREAD;
  languages:
  - c
  message: |
    The code directly assigns the result of a decode function to buf->size without checking for negative values. This can lead to buffer size corruption or security vulnerabilities if the decode function returns an error. Always check the return value of decode functions and handle errors appropriately.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/6ecdf5136b52af747e7bda08db9a748256b1cd09
    category: security
    cwe:
    - CWE-125
    - CWE-787
    owasp: 'A1: Injection'
    technology:
    - c
- id: vuln-curl-73980f9a
  pattern: |
    DEBUGASSERT($PREFIX[3] == L'\0');
  pattern-not: |
    DEBUGASSERT($PREFIX[2] == L'\0');
  languages:
  - c
  message: |
    The code contains an incorrect assertion that checks the null terminator at the wrong index in a wide character string. This could lead to incorrect assumptions about the string's length, potentially causing buffer overflows or other undefined behavior. The fix is to check the correct index (2) instead of (3) to ensure proper string termination validation.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/73980f9ace6c7577e7fcab8008bbde8a0a231692
    category: security
    cwe:
    - CWE-125
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/125.html
    technology:
    - c
- id: vuln-curl-73b65e94
  pattern: |
    unsigned char $RANDSUFFIX[9];
    ...
    $TEMPSTORE = aprintf("%s.%s.tmp", $FILENAME, $RANDSUFFIX);
  pattern-not: |
    unsigned char $RANDBUF[41];
    char *$DIR;
    $DIR = dirslash($FILENAME);
    ...
    $TEMPSTORE = aprintf("%s%s.tmp", $DIR, $RANDBUF);
    free($DIR);
  languages:
  - c
  message: |
    The code uses a fixed-size buffer for generating temporary filenames, which can lead to buffer overflows or truncation issues. The fix involves using a larger buffer and properly handling directory paths. Ensure temporary filenames are generated safely and handle memory allocation correctly.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/73b65e94f3531179de45c6f3c836a610e3d0a846
    category: security
    cwe:
    - 'CWE-120: Buffer Copy without Checking Size of Input (''Classic Buffer Overflow'')'
    owasp:
    - 'A2: Cryptographic Failures'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
    - c
- id: vuln-curl-75ca568f
  pattern: |
    $TYPE *$FUNC(CURL *$HANDLE, const char *$STRING, int $LENGTH, int *$OLEN) {
      ...
      int $STRINDEX = 0;
      ...
    }
  pattern-not: |
    $TYPE *$FUNC(CURL *$HANDLE, const char *$STRING, size_t $LENGTH, int *$OLEN) {
      ...
      size_t $STRINDEX = 0;
      ...
    }
  languages:
  - c
  message: |
    The use of 'int' instead of 'size_t' for string length and index variables can lead to integer overflow vulnerabilities. This is particularly dangerous in URL decoding functions where large inputs can cause buffer overflows or incorrect memory allocations. Always use 'size_t' for variables that represent sizes or indices to avoid such issues.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/75ca568fa1c19de4c5358fed246686de8467c238
    category: security
    cwe:
    - CWE-190
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-curl-7e92d12b
  pattern: |
    return !strchr($DOMAIN, '.') && !strcasecompare($DOMAIN, "localhost");
  pattern-not: |
    if(strcasecompare($DOMAIN, "localhost"))
      return $FALSE;
    else {
      char *$DOT = strchr($DOMAIN, '.');
      if($DOT)
        return $DOT[1] ? $FALSE : $TRUE;
    }
    return $TRUE;
  languages:
  - c
  message: |
    The code checks if a domain is valid by verifying it contains a dot and is not 'localhost'.
    This can lead to security vulnerabilities as it doesn't properly handle trailing dots or other edge cases.
    To fix this, ensure the domain validation correctly handles trailing dots and other edge cases by checking if the dot is not at the end of the string.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/7e92d12b4e6911f424678a133b19de670e183a59
    category: security
    cwe:
    - CWE-20
    owasp:
    - A6:2017-Security Misconfiguration
    technology:
    - c
- id: vuln-curl-7f2a1df6
  pattern: |
    size_t $IDENTITY_LEN = ($USERLEN + $DOMLEN) * 2;
    unsigned char *$IDENTITY = malloc($IDENTITY_LEN);
  pattern-not: |
    if(($USERLEN > SIZE_T_MAX/2) ||
       ($DOMLEN > SIZE_T_MAX/2) ||
       (($USERLEN + $DOMLEN) > SIZE_T_MAX/2))
      return $ERROR;
    size_t $IDENTITY_LEN = ($USERLEN + $DOMLEN) * 2;
    unsigned char *$IDENTITY = malloc($IDENTITY_LEN);
  languages:
  - c
  message: |
    Integer overflow in size calculation can lead to buffer under-allocation.
    This vulnerability occurs when the sum of userlen and domlen multiplied by 2 exceeds the maximum value of size_t, potentially leading to insufficient memory allocation.
    To fix this, add length checks before performing the calculation to ensure it won't overflow.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/7f2a1df6f5fc598750b2c6f34465c8d924db28cc
    category: security
    cwe:
    - CWE-190
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/190.html
    technology:
    - c
- id: vuln-curl-8236aba5
  pattern: |
    $RC = rename($OLD, $NEW);
    if($RC != 0) {
      warnf($GLOBAL, "Failed to rename %s -> %s: %s\n", $OLD, $NEW, strerror(errno));
    }
    if($ALLOC) {
      Curl_safefree($OLD);
    }
    if($RC != 0) {
      free($NEW);
      return $FAILURE;
    }
  pattern-not: |
    free($NEW);
    return $FAILURE;
  languages:
  - c
  message: |
    Potential file handling vulnerability detected. The code attempts to rename a file and handles failure by freeing resources but may leave the system in an inconsistent state. This could lead to resource leaks or security issues if the file operations are not properly handled. Ensure proper error handling and resource cleanup in file operations.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/8236aba58542c5f89f1d41ca09d84579efb05e22
    category: security
    cwe:
    - CWE-404
    owasp:
    - A9:2017-Using Components with Known Vulnerabilities
    technology:
    - c
- id: vuln-curl-894f6ec7
  pattern: |
    if(sscanf($DATA, "%127[^,],%127s", $VARNAME, $VARVAL) == 2) {
      ...
      msnprintf($BUFFER, $BUFFER_SIZE, "%c%s%c%s", $ENV_VAR, $VARNAME, $ENV_VALUE, $VARVAL);
      ...
    }
  pattern-not: |
    int $RV;
    char $SEP[2] = "";
    $VARVAL[0] = 0;
    $RV = sscanf($DATA, "%127[^,]%1[,]%127s", $VARNAME, $SEP, $VARVAL);
    if($RV == 1) {
      ...
      msnprintf($BUFFER, $BUFFER_SIZE, "%c%s", $ENV_VAR, $VARNAME);
      ...
    } else if($RV >= 2) {
      ...
      msnprintf($BUFFER, $BUFFER_SIZE, "%c%s%c%s", $ENV_VAR, $VARNAME, $ENV_VALUE, $VARVAL);
      ...
    }
  languages:
  - c
  message: |
    The use of sscanf without proper input validation can lead to buffer overflows or incorrect parsing of environment variables. This vulnerability occurs when parsing telnet environment variables without checking the return value of sscanf correctly. The fixed version properly handles the return value and ensures safe parsing. To fix this, always validate the return value of sscanf and handle different cases appropriately.
  severity: ERROR
  metadata:
    source-url: github.com/curl/curl/commit/894f6ec730597eb243618d33cc84d71add8d6a8a
    category: security
    cwe:
    - CWE-120
    - CWE-125
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    - https://cwe.mitre.org/data/definitions/125.html
    technology:
    - c
- id: vuln-curl-89721ff0
  pattern: |
    if(strequal($NEEDLE->protostr, "FTP")) {
      ...
    }
  pattern-not: |
    if($NEEDLE->protocol & PROT_FTP) {
      ...
    }
  languages:
  - c
  message: |
    The code uses 'strequal' to compare protocol strings, which can lead to security vulnerabilities if the strings are not properly validated. This can be exploited to bypass SSL/TLS verification checks. Use protocol flags (e.g., PROT_FTP) instead of string comparisons to ensure secure protocol handling.
  severity: ERROR
