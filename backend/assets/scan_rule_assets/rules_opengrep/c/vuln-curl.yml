- id: vuln-curl-8ae35102
  pattern: |
    bool $VAR = ($EXPR == $AUTH_TYPE) || ($EXPR == $AUTH_TYPE_WB) ? TRUE : FALSE;
  pattern-not: |
    bool $VAR = ($EXPR & $AUTH_TYPE) || ($EXPR & $AUTH_TYPE_WB) ? TRUE : FALSE;
  languages:
