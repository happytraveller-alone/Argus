rules:
- id: double-free
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/415
    - https://github.com/struct/mms
    - https://www.sei.cmu.edu/downloads/sei-cert-c-coding-standard-2016-v01.pdf
    - https://docs.microsoft.com/en-us/cpp/sanitizers/asan-error-examples
    - https://dustri.org/b/playing-with-weggli.html
    confidence: MEDIUM
    cwe:
    - 'CWE-415: Double Free'
    - 'CWE-416: Use After Free'
  message: The software calls free() twice on the same memory address, potentially  leading to memory corruption. This corruption can cause the program to  crash or cause two later calls to malloc() to return the same pointer.
  severity: ERROR
  languages:
  - c
  patterns:
  - pattern: |
      $FREE1($PTR);
      ...
      $FREE2($PTR);
  - pattern-not: |
      $FREE1($PTR);
      ...
      $PTR = $_;
      ...
      $FREE2($PTR);
  - metavariable-pattern:
      metavariable: $FREE1
      pattern: free
  - metavariable-pattern:
      metavariable: $FREE2
      pattern: free
  - focus-metavariable: $FREE2
- id: double-free_1
  languages:
  - c
  message: Variable '$VAR' was freed twice. This can lead to undefined behavior.
  metadata:
    category: security
    confidence: LOW
    cwe:
    - 'CWE-415: Double Free'
    impact: HIGH
    likelihood: LOW
    owasp:
    - A03:2021 - Injection
    - A01:2017 - Injection
    references:
    - https://cwe.mitre.org/data/definitions/415.html
    - https://owasp.org/www-community/vulnerabilities/Doubly_freeing_memory
    subcategory:
    - vuln
    technology:
    - c
  patterns:
  - pattern-not: |
      free($VAR);
      ...
      $VAR = NULL;
      ...
      free($VAR);
  - pattern-not: |
      free($VAR);
      ...
      $VAR = malloc(...);
      ...
      free($VAR);
  - pattern-inside: |
      free($VAR);
      ...
      $FREE($VAR);
  - metavariable-pattern:
      metavariable: $FREE
      pattern: free
  - focus-metavariable: $FREE
  severity: ERROR
