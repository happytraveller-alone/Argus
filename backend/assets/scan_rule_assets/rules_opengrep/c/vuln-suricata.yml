rules:
- id: vuln-suricata-18841a58
  pattern: "if ($HTTP_STATE != NULL && $HTTP_STATE->conn != NULL)\n    return htp_list_get($HTTP_STATE->conn->transactions,\
    \ $TX_ID);\n"
  pattern-not: "if ($HTTP_STATE != NULL && $HTTP_STATE->conn != NULL && $TX_ID >= $HTTP_STATE->tx_freed)\n    return htp_list_get($HTTP_STATE->conn->transactions,\
    \ $TX_ID - $HTTP_STATE->tx_freed);\n"
  languages:
  - c
  message: 'This rule detects a vulnerability where transactions are accessed without checking the `tx_freed` offset, which
    can lead to accessing invalid memory or incorrect transactions. This can cause crashes or security issues if an attacker
    can manipulate transaction IDs. To fix this, ensure that the `tx_id` is checked against `http_state->tx_freed` before
    accessing the transaction list.

    '
  severity: ERROR
  metadata:
    source-url: https://github.com/OISF/suricata/commit/18841a58da71e735ddf4e52cbfa6989755ecbeb7
    category: security
    cwe:
    - CWE-125
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-suricata-2a2120ec
  pattern: "static SMTPTransaction *SMTPTransactionCreate(void)\n{\n    ...\n}\n"
  pattern-not: "static SMTPTransaction *SMTPTransactionCreate(SMTPState *state)\n{\n    if (state->tx_cnt > smtp_config.max_tx)\
    \ {\n        return NULL;\n    }\n    ...\n}\n"
  languages:
  - c
  message: 'The function SMTPTransactionCreate does not validate the transaction count against the maximum allowed transactions,
    potentially allowing an unbounded number of transactions. This could lead to resource exhaustion or denial of service.
    Update the function to accept a state parameter and validate the transaction count against smtp_config.max_tx.

    '
  severity: ERROR
  metadata:
    source-url: github.com/OISF/suricata/commit/2a2120ecf10c5b5713ec2bf59469fe57f7b5b747
    category: security
    cwe:
    - CWE-400
    owasp: A9:2017-Insufficient Logging & Monitoring
    references:
    - https://cwe.mitre.org/data/definitions/400.html
    technology:
    - c
- id: vuln-suricata-2f39ba75
  pattern: "if (!$F->more_frags) {\n    break;\n}\n"
  pattern-not: "if (!more_frags && $F->offset > prev_offset) {\n    break;\n}\n"
  languages:
  - c
  message: 'Detected a potential vulnerability in packet defragmentation logic. The original code would break the defragmentation
    process when encountering a fragment marked as the last one, which could lead to incomplete reassembly of packets. This
    is dangerous as it may result in incorrect packet processing or security bypass. The fix involves continuing the defragmentation
    process even if a fragment is marked as the last one, as subsequent fragments with the same offset might contain preferred
    data. Always verify the complete packet payload to ensure proper reassembly.

    '
  severity: ERROR
  metadata:
    source-url: github.com/OISF/suricata/commit/2f39ba75f153ba9bdf8eedc2a839cc973dbaea66
    category: security
    cwe:
    - CWE-670
    owasp:
    - 'A1: Injection'
    references:
    - https://tools.ietf.org/html/rfc815
    technology:
    - c
- id: vuln-suricata-4a04f814
  pattern: 'BuildTestPacket($ID, $OFF, $MF, $CONTENT, $LEN)

    '
  pattern-not: 'BuildTestPacket($PROTO, $ID, $OFF, $MF, $CONTENT, $LEN)

