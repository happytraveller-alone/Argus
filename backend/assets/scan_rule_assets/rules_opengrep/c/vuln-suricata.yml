- id: vuln-suricata-b9579fbe
  pattern: "if (!($CD->flags & DETECT_CONTENT_RELATIVE_NEXT)) {\n  ...\n  goto match;\n}\n...\nif ($DET_CTX->discontinue_matching)\n\
    \  goto no_match;\n"
  pattern-not: "if (($CD->flags & (DETECT_CONTENT_DISTANCE|DETECT_CONTENT_WITHIN)) == 0) {\n  ...\n  $DET_CTX->discontinue_matching\
    \ = 1;\n}\n...\nif (($CD->flags & DETECT_CONTENT_RELATIVE_NEXT) == 0) {\n  ...\n  $DET_CTX->discontinue_matching = 1;\n\
    \  goto no_match;\n}\n"
  languages:
  - c
  message: 'The original code incorrectly handled the detection of content matches in Suricata, leading to potential false
    positives or negatives in rule matching. This could allow malicious traffic to bypass detection or cause legitimate traffic
    to be incorrectly flagged. The issue was fixed by properly handling the discontinue_matching flag and ensuring the correct
    conditions are checked before continuing or stopping the matching process. To fix this, ensure that the discontinue_matching
    flag is set appropriately and that the correct conditions are checked before proceeding with match or no-match decisions.

    '
  severity: ERROR
  metadata:
    source-url: github.com/OISF/suricata/commit/b9579fbe7dd408200ef03cbe20efddb624b73885
    category: security
    cwe:
    - CWE-670
    owasp:
    - 'A09: Security Logging and Monitoring Failures'
    references:
    - https://github.com/OISF/suricata/commit/b9579fbe7dd408200ef03cbe20efddb624b73885
    technology:
    - c
- id: vuln-suricata-bb26e621
  pattern: '$MODULE.PktAcqBreakLoop = NULL;

    '
  pattern-not: '$MODULE.PktAcqBreakLoop = $FUNC;

    '
  languages:
  - c
  message: 'A NULL assignment to PktAcqBreakLoop can lead to a potential null pointer dereference, causing undefined behavior
    or crashes. This vulnerability occurs when the function pointer is not properly initialized before being used. The fix
    involves assigning a valid function pointer to PktAcqBreakLoop, ensuring proper handling of the break loop functionality.
    Always ensure that function pointers are properly initialized before use.

    '
  severity: ERROR
  metadata:
    source-url: github.com/OISF/suricata/commit/bb26e6216e5190d841529c0ecb1292b9a358ed54
    category: security
    cwe:
    - CWE-476
    owasp: 'A9: Using Components with Known Vulnerabilities'
    references:
    - https://cwe.mitre.org/data/definitions/476.html
    technology:
    - c
- id: vuln-suricata-d13bd2ae
  pattern: 'len += $F->data_len;

    '
  pattern-not: 'len = MAX(len, $F->offset + $F->data_len);

    '
  languages:
  - c
  message: 'The vulnerability involves incorrect packet length calculation during defragmentation, which could lead to buffer
    overflows or incorrect packet reassembly. The issue occurs when the length is incremented by the fragment''s data length
    without considering the fragment''s offset. This can result in incorrect packet length calculations, potentially leading
    to security vulnerabilities. The fix is to use MAX(len, frag->offset + frag->data_len) to ensure the packet length is
    updated to the largest known data offset.

    '
  severity: ERROR
  metadata:
    source-url: github.com/OISF/suricata/commit/d13bd2ae217a6d2ceb347f74d27cbfcd37b9bda9
    category: security
    cwe:
    - 'CWE-130: Improper Handling of Length Parameter Inconsistency'
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/130.html
    technology:
    - c
- id: vuln-suricata-d8634daf
  pattern: "if ($PROTO == IPPROTO_TCP && $PROTOCTX != NULL) {\n  ...\n}\n"
  pattern-not: "if ($PROTO == IPPROTO_TCP && $PROTOCTX != NULL &&\n    ($FLAGS & PKT_STREAM_EST)) {\n  ...\n}\n"
  languages:
  - c
  message: 'Detected a missing check for PKT_STREAM_EST in TCP protocol handling. This vulnerability could allow processing
    of packets that are not part of an established stream, potentially leading to security issues such as bypassing security
    controls or processing malformed packets. Always verify that the packet is part of an established stream using the PKT_STREAM_EST
    flag when handling TCP packets.

    '
  severity: ERROR
  metadata:
    source-url: github.com/OISF/suricata/commit/d8634daf74c882356659addb65fb142b738a186b
    category: security
    cwe:
    - CWE-20
    owasp:
    - 'A1: Injection'
    references:
    - https://suricata.io/
    technology:
    - c
