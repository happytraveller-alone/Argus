- id: vuln-ffmpeg-54655623
  pattern: |
    if ($S->ref) {
        av_log($S->avctx, AV_LOG_ERROR, "Two slices reporting being the first in the same frame.\n");
        goto fail;
    }
  pattern-not: |
    if ($S->ref && $SH->first_slice_in_pic_flag) {
        av_log($S->avctx, AV_LOG_ERROR, "Two slices reporting being the first in the same frame.\n");
        return 1;
    }
  languages:
  - c
  message: |
    The code fails to properly check for the first slice in a frame, which can lead to state corruption. This vulnerability occurs when two slices incorrectly report being the first in the same frame, causing the decoder to enter an inconsistent state. The fix adds an additional check for `first_slice_in_pic_flag` and returns an error code instead of jumping to a fail label, preventing state corruption.
  severity: ERROR
