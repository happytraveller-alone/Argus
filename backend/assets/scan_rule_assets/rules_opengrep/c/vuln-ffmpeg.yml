- id: vuln-ffmpeg-3e5959b3
  pattern: |
    for ($Y = 0; $Y < $STRUCT->ymin; $Y++) {
      ...
    }
  pattern-not: |
    for ($Y = 0; $Y < FFMIN($STRUCT->ymin, $STRUCT->h); $Y++) {
      ...
    }
  languages:
  - c
  message: |
    The loop condition does not properly check the bounds of the `ymin` value against the height `h` of the structure, which could lead to out-of-bounds access. This can cause memory corruption or crashes. Always use FFMIN to ensure the loop does not exceed valid bounds.
