- id: vuln-ffmpeg-e6d3fd94
  pattern: |
    avpriv_request_sample($TRACK->par, "Multiple independent substreams")
  pattern-not: |
    avpriv_request_sample($MOV->fc, "Multiple independent substreams")
  languages:
  - c
  message: |
    The vulnerability occurs due to incorrect parameter usage in the `avpriv_request_sample` function.
    The original code uses `track->par`, which is incorrect and could lead to undefined behavior or crashes.
    The fix replaces it with `mov->fc`, which is the correct parameter.
    This issue is dangerous as it could cause the application to behave unpredictably or crash when handling multiple independent substreams.
    To fix this, ensure the correct parameter is passed to the function.
  severity: ERROR
