- id: vuln-ffmpeg-611b3562
  pattern: |
    $STRUCT->remaining = $FUNC1($CID);
    if ($STRUCT->remaining <= 0) {
        $STRUCT->remaining = $FUNC2($CID, $W, $H);
        if ($STRUCT->remaining <= 0)
            return $STRUCT->remaining;
    }
  pattern-not: |
    $VAR = $FUNC1($CID);
    if ($VAR <= 0) {
        $VAR = $FUNC2($CID, $W, $H);
        if ($VAR <= 0)
            continue;
    }
    $STRUCT->remaining = $VAR;
  languages:
  - c
  message: |
    Detected a potential vulnerability where a negative value is directly returned from a function call without proper handling. This can lead to incorrect error handling and potential security issues. The fix involves assigning the result to a local variable first and properly handling the error condition before assigning it to the structure field.
  severity: ERROR
