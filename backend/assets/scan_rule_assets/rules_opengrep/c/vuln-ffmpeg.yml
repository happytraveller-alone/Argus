rules:
- id: vuln-ffmpeg-02f909dc
  pattern: |
    if ((ret = av_image_check_size($WIDTH, $HEIGHT, 0, $AVCTX)) < 0) {
      ...
    }
  pattern-not: |
    if ((ret = ff_set_dimensions($AVCTX, $WIDTH, $HEIGHT)) < 0) {
      ...
    }
  languages:
  - c
  message: |
    The use of `av_image_check_size` without proper dimension setting can lead to incorrect image processing or security vulnerabilities. This function checks the dimensions but does not set them, which can cause issues in subsequent operations. Replace it with `ff_set_dimensions` to ensure proper dimension handling.
  severity: ERROR
  metadata:
    source-url: github.com/FFmpeg/FFmpeg/commit/02f909dc24b1f05cfbba75077c7707b905e63cd2
    category: security
    cwe:
    - CWE-682
    technology:
    - c
- id: vuln-ffmpeg-0b3bd001
  pattern: |
    int $FUNC(Layer *$LAYER, AVIOContext *$CTX, int $SIZE)
    {
      ...
    }
  pattern-not: |
    int $FUNC(Layer *$LAYER, AVIOContext *$CTX, int $SIZE, int $OPERANDS_NUM)
    {
      ...
      if ($LAYER->input_operand_indexes[0] >= $OPERANDS_NUM || $LAYER->output_operand_index >= $OPERANDS_NUM) {
        return 0;
      }
      ...
    }
  languages:
  - c
  message: |
    The function does not validate the operand indexes against the total number of operands, which can lead to out-of-bounds access. This vulnerability can cause memory corruption or crashes. To fix this, ensure that the function validates the operand indexes by adding a check against the total number of operands.
  severity: ERROR
  metadata:
    source-url: github.com/FFmpeg/FFmpeg/commit/0b3bd001ac1745d9d008a2d195817df57d7d1d14
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    - 'CWE-787: Out-of-bounds Write'
    owasp: 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/125.html
    - https://cwe.mitre.org/data/definitions/787.html
    technology:
    - c
- id: vuln-ffmpeg-23ccf3ca
  pattern: |
    sscanf($IN, "%127[^<>]>%n", $BUFFER, $LENP)
  pattern-not: |
    scantag($IN, $BUFFER, $LENP)
  languages:
  - c
  message: |
    Detected use of sscanf with a fixed-width format specifier, which can lead to buffer overflows if the input exceeds the specified length. This vulnerability was addressed in FFmpeg by replacing sscanf with a safer custom function (scantag) that explicitly checks the input length. Use bounded string operations or custom parsing functions to safely handle input.
  severity: ERROR
  metadata:
    source-url: github.com/FFmpeg/FFmpeg/commit/23ccf3cabb4baf6e8af4b1af3fcc59c904736f21
    category: security
    cwe:
    - 'CWE-120: Buffer Copy without Checking Size of Input (''Classic Buffer Overflow'')'
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
    - c
- id: vuln-ffmpeg-273f2755
  pattern: |
    $LEN = 0;
    $AN += sscanf($IN, "{\\an%*1u}%n", &$LEN) >= 0 && $LEN > 0;
  pattern-not: |
    $AN += scanbraces($IN);
  languages:
  - c
  message: |
    Detected unsafe use of sscanf for parsing input, which can lead to parsing errors or vulnerabilities.
    The function sscanf is often unsafe for parsing input because it does not handle buffer overflows or unexpected input formats properly.
    Replace with a safer custom parsing function like `scanbraces`, which explicitly checks input format and length.
  severity: ERROR
  metadata:
    source-url: github.com/FFmpeg/FFmpeg/commit/273f2755ce8635d42da3cde0eeba15b2e7842774
    category: security
    cwe:
    - 'CWE-20: Improper Input Validation'
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-ffmpeg-27a99e2c
  pattern: |
    int $XD_SIZE = 0;
    ...
    $XD_SIZE += $LEN;
    ...
    ff_alloc_extradata($ST->codecpar, $CONST + $XD_SIZE + $XD_SIZE / 255);
  pattern-not: |
    int $XD_SIZE = 1;
    ...
    $XD_SIZE += $LEN + 1 + $LEN / 255;
    ...
    ff_alloc_extradata($ST->codecpar, $XD_SIZE);
  languages:
  - c
  message: |
    This rule detects a vulnerability where the size calculation for extra data is incorrect, potentially leading to buffer overflows or memory corruption. The original code miscalculates the size by not accounting for additional bytes needed for encoding, which can result in insufficient buffer allocation. The fix ensures proper size calculation by adding necessary padding. To fix, update the size calculation logic to include the correct padding.
  severity: ERROR
  metadata:
    source-url: github.com/FFmpeg/FFmpeg/commit/27a99e2c7d450fef15594671eef4465c8a166bd7
    category: security
    cwe:
    - 'CWE-131: Incorrect Calculation of Buffer Size'
    owasp: 'A9: Security Misconfiguration'
    references:
    - https://cwe.mitre.org/data/definitions/131.html
    technology:
    - c
- id: vuln-ffmpeg-27f8d386
  pattern: |
    int $VAR = (unsigned) $IX >= $WIDTH - $W || (unsigned) $IY >= $HEIGHT - $H;
  pattern-not: |
    int $VAR = (unsigned) $IX >= $WIDTH - $W || $WIDTH < $W || (unsigned) $IY >= $HEIGHT - $H || $HEIGHT < $H;
  languages:
  - c
  message: |
    This rule detects a vulnerability where bounds checking is incomplete, potentially leading to out-of-bounds memory access. The original code fails to check if the width or height values are smaller than the required dimensions, which could result in security issues such as buffer overflows. To fix this, ensure that both the width and height are validated against the required dimensions.
  severity: ERROR
  metadata:
    source-url: github.com/FFmpeg/FFmpeg/commit/27f8d386829689c346ff0cef00d3af57b9fb8903
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    - 'CWE-787: Out-of-bounds Write'
    owasp: 'A1: Injection'
    technology:
    - c
- id: vuln-ffmpeg-35eeff30
  pattern: |
    strcpy($DST, $SRC);
  pattern-not: |
    if (av_strlcpy($DST, $SRC, sizeof($DST)) >= sizeof($DST))
        return $ERROR;
  languages:
  - c
  message: |
    Detected use of unsafe `strcpy` function which can lead to buffer overflow vulnerabilities.
    This is dangerous because it can allow attackers to overwrite adjacent memory, potentially leading to arbitrary code execution.
    Use `av_strlcpy` or similar safe string copy functions that check buffer bounds.
  severity: ERROR
