rules:
- id: vuln-mysql-server-044e3b1d
  pattern: 'parse_option($ARG1, $ARG2, $ARG3);

    '
  pattern-not: "if(parse_option($ARG1, $ARG2, $ARG3) == -1) {\n  ...\n  return ...;\n}\n"
  languages:
  - c
  message: 'The function `parse_option` is called without checking its return value, which can lead to unhandled errors. This
    can result in undefined behavior or security vulnerabilities if the function fails. Always check the return value of `parse_option`
    and handle errors appropriately.

    '
  severity: ERROR
  metadata:
    source-url: github.com/mysql/mysql-server/commit/044e3b1d07c0854c39178d3054ab0cd0a3188436
    category: security
    cwe:
    - 'CWE-252: Unchecked Return Value'
    owasp:
    - A10:2021 - Server-Side Request Forgery
    technology:
    - c
- id: vuln-mysql-server-3d8134d2
  pattern: "if (($RC = stmt_command($MYSQL, $COM_STMT_CLOSE, $BUFF, $SIZE, $STMT))) {\n  set_stmt_errmsg($STMT, &$MYSQL->net);\n\
    }\n"
  pattern-not: '$RC = stmt_command($MYSQL, $COM_STMT_CLOSE, $BUFF, $SIZE, $STMT);

    '
  languages:
  - c
  message: 'The vulnerable code pattern handles errors by setting a statement error message without considering that the error
    might have already been set by the `stmt_command` function. This could lead to inconsistent error handling and potential
    memory leaks. The fix removes the redundant error handling and relies on the caller to check for errors using `mysql_error()`
    or `mysql_errno()`.

    '
  severity: ERROR
  metadata:
    source-url: github.com/mysql/mysql-server/commit/3d8134d2c9b74bc8883ffe2ef59c168361223837
    category: security
    cwe:
    - 'CWE-703: Improper Check or Handling of Exceptional Conditions'
    owasp:
    - 'A10: Server-Side Request Forgery (SSRF)'
    technology:
    - c
- id: vuln-mysql-server-4797ea0b
  pattern: "LIST *element = $MYSQL->stmts;\nLIST *pruned_list = $INIT;\nfor (; element; element = element->next) {\n  MYSQL_STMT\
    \ *stmt = (MYSQL_STMT *) element->data;\n  ...\n}\n"
  pattern-not: "LIST *pruned_list = NULL;\nwhile ($MYSQL->stmts) {\n  LIST *element = $MYSQL->stmts;\n  MYSQL_STMT *stmt;\n\
    \  $MYSQL->stmts = list_delete(element, element);\n  stmt = (MYSQL_STMT *) element->data;\n  ...\n}\n"
  languages:
  - c
  message: 'Incorrect handling of LIST in mysql_prune_stmt_list() can lead to memory corruption or use-after-free vulnerabilities.
    The original code iterates over a linked list without properly managing the list''s state during deletion, which can result
    in undefined behavior. The fix involves using a while loop and properly deleting elements from the list. To fix this issue,
    ensure that list elements are properly deleted during iteration to prevent memory corruption.

    '
  severity: ERROR
  metadata:
    source-url: github.com/mysql/mysql-server/commit/4797ea0b772d5f4c5889bc552424132806f46e93
    category: security
    cwe:
    - 'CWE-416: Use After Free'
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    references:
    - https://cwe.mitre.org/data/definitions/416.html
    technology:
    - c
- id: vuln-mysql-server-d982e717
  pattern: 'fix_identifier_with_newline($VAR)

    '
  pattern-not: 'fix_identifier_with_newline($VAR, &$FREEMEM)

    '
  languages:
  - c
  message: 'The function `fix_identifier_with_newline` is used without a `freemem` parameter,

    which can lead to memory management issues. This function was modified to include

    a `freemem` parameter to properly handle dynamic memory allocation and deallocation.

    Using the old version without this parameter can cause memory leaks or undefined

    behavior. Always use the updated version that includes the `freemem` parameter.

    '
  severity: ERROR
  metadata:
    source-url: github.com/mysql/mysql-server/commit/d982e717aba67227ec40761a21a4211db91aa0e2
    category: security
    cwe:
    - 'CWE-401: Improper Release of Memory Before Removing Last Reference'
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
