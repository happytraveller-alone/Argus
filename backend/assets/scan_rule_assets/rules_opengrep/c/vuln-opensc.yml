rules:
- id: vuln-opensc-03628449
  pattern: "if ($LPATH.len >= 2 && $LPATH.value[0] == 0x3F && $LPATH.value[1] == 0x00) {\n  memmove(&$LPATH.value[0], &$LPATH.value[2],\
    \ $LPATH.len - 2);\n  $LPATH.len -= 2;\n}\n"
  pattern-not: "if ($PATH->type != SC_PATH_TYPE_DF_NAME\n    && $LPATH.len >= 2\n    && $LPATH.value[0] == 0x3F && $LPATH.value[1]\
    \ == 0x00) {\n  memmove(&$LPATH.value[0], &$LPATH.value[2], $LPATH.len - 2);\n  $LPATH.len -= 2;\n}\n"
  languages:
  - c
  message: 'The code performs a memmove operation without first checking the path type, which could lead to incorrect handling
    of directory paths. This vulnerability could cause data corruption or unintended behavior when processing certain types
    of paths. To fix this, ensure that the path type is checked before performing the memmove operation.

    '
  severity: ERROR
  metadata:
    source-url: https://github.com/OpenSC/OpenSC/commit/03628449b75a93787eb2359412a3980365dda49b
    category: security
    cwe:
    - 'CWE-20: Improper Input Validation'
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-opensc-1db88374
  pattern: "$RV = sc_pkcs15_get_objects($P15CARD, $TYPE, $OBJS, $SIZE);\nif ($RV != SC_SUCCESS) {\n  ...\n}\nfor ($II = 0;\
    \ $II < $RV; $II++) {\n  ...\n}\n"
  pattern-not: "$NOBJS = sc_pkcs15_get_objects($P15CARD, $TYPE, $OBJS, $SIZE);\nif ($NOBJS < 1) {\n  ...\n}\nfor ($II = 0;\
    \ $II < $NOBJS; $II++) {\n  ...\n}\n"
  languages:
  - c
  message: 'The code incorrectly uses the return value of `sc_pkcs15_get_objects` as both the status check and the loop counter.
    This can lead to incorrect loop iterations if the function returns a non-error status code that doesn''t match the actual
    number of objects. Instead, store the number of objects in a separate variable and use it for the loop.

    '
  severity: ERROR
  metadata:
    source-url: github.com/OpenSC/OpenSC/commit/1db88374
    category: security
    cwe:
    - CWE-697
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-opensc-40c50a3a
  pattern: "unsigned char *$BLOB;\n...\nif ($COND) {\n  ...\n}\n"
  pattern-not: "unsigned char *$BLOB = NULL;\n...\nif ($COND) {\n  free($BLOB);\n  ...\n}\n"
  languages:
  - c
  message: 'Detected potential memory leak in error handling paths. The code fails to free allocated memory before returning
    in error conditions, which could lead to memory leaks. Ensure that all allocated memory is properly freed in error handling
    paths.

    '
  severity: ERROR
  metadata:
    source-url: github.com/OpenSC/OpenSC/commit/40c50a3a
    category: security
    cwe:
    - 'CWE-401: Missing Release of Memory after Effective Lifetime'
    owasp:
    - 'A9: Security Misconfiguration'
    technology:
    - c
- id: vuln-opensc-6903aebf
  pattern: 'int $REC;

    int $OFFS = 0;

    int $REC_LEN = $FILE->record_length;

    '
  pattern-not: 'size_t $REC;

    size_t $OFFS = 0;

    size_t $REC_LEN = $FILE->record_length;

    '
  languages:
  - c
  message: "The use of `int` for record-related variables can lead to integer overflow vulnerabilities. \nThis is dangerous\
    \ because it can cause buffer overflows or incorrect memory access when handling large records. \nThe fix is to use `size_t`\
    \ for these variables to ensure proper handling of large sizes.\n"
  severity: ERROR
  metadata:
    source-url: github.com/OpenSC/OpenSC/commit/6903aebfddc466d966c7b865fae34572bf3ed23e
    category: security
    cwe:
    - 'CWE-190: Integer Overflow or Wraparound'
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-opensc-6ce61522
  pattern: "if ($VAR1->flags & SC_ASN1_PRESENT && $VAR1[0].flags & SC_ASN1_PRESENT) {\n  free($VAR1[0].parm);\n}\n"
  pattern-not: 'free(info.subject.value);

    '
  languages:
  - c
  message: 'This rule detects a vulnerability where memory is freed based on a condition that checks flags in a structure.
    The issue arises because the code might free memory incorrectly, leading to potential use-after-free vulnerabilities.
    The fix involves directly freeing the correct memory location without the conditional check. To fix this, ensure that
    memory is freed directly and correctly, avoiding conditional checks that might lead to incorrect memory management.

    '
  severity: ERROR
  metadata:
    source-url: github.com/OpenSC/OpenSC/commit/6ce6152284c47ba9b1d4fe8ff9d2e6a3f5ee02c7
    category: security
    cwe:
    - CWE-416
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    references:
    - https://cwe.mitre.org/data/definitions/416.html
    technology:
    - c
- id: vuln-opensc-7114fb71
  pattern: '$VAR.value.value = NULL;

    '
  pattern-not: 'memset(&$VAR, 0, sizeof($VAR));

    '
  languages:
  - c
  message: 'Setting a pointer to NULL without clearing the entire structure can lead to information disclosure vulnerabilities.
    The patch replaces the assignment with a memset to ensure all fields are properly initialized. This prevents potential
    exposure of sensitive data in uninitialized memory. Always use memset to clear structures completely.

    '
  severity: ERROR
  metadata:
    source-url: github.com/OpenSC/OpenSC/commit/7114fb71b54ddfe06ce5dfdab013f4c38f129d14
    category: security
    cwe:
    - CWE-909
    owasp:
    - A3:2017-Sensitive Data Exposure
    technology:
    - c
- id: vuln-opensc-868f76fb
  pattern: "if ($PINLEN == 0) {\n    $R = sc_pkcs15_get_pin_info($P15CARD, $PIN_OBJ);\n    if ($R == SC_SUCCESS && $AUTH_INFO->logged_in\
    \ == SC_PIN_STATE_LOGGED_IN) {\n        LOG_FUNC_RETURN($CTX, $R);\n    }\n}\n"
  pattern-not: "if ($PINLEN == 0) {\n    ...\n}\n"
  languages:
  - c
  message: 'The code checks if the PIN length is zero and returns success if the PIN is already logged in, which can lead
    to bypassing PIN verification. This is dangerous as it may allow unauthorized access even when PIN caching is disabled.
    To fix this, ensure proper PIN verification is always enforced regardless of the logged-in state.

    '
  severity: ERROR
  metadata:
    source-url: github.com/OpenSC/OpenSC/commit/868f76fb31255fd3fdacfc3e476452efeb61c3e7
    category: security
    cwe:
    - CWE-287
    owasp:
    - 'A2: Broken Authentication'
    technology:
    - c
- id: vuln-opensc-c3f23b83
  pattern: '$VAR = $EXPR - 1;

    '
  pattern-not: '$VAR = $EXPR > 0 ? $EXPR - 1 : 0;

    '
  languages:
  - c
  message: 'Detected potential integer underflow vulnerability. Subtracting 1 from a variable without checking if it is greater
    than 0 can lead to underflow, which may cause unexpected behavior or security issues. Always ensure the variable is greater
    than 0 before performing the subtraction. The fix involves using a ternary operator to check the value before subtracting.

    '
  severity: ERROR
  metadata:
    source-url: github.com/OpenSC/OpenSC/commit/c3f23b836e5a1766c36617fe1da30d22f7b63de2
    category: security
    cwe:
    - CWE-191
    owasp:
    - A9:2017-Using Components with Known Vulnerabilities
    technology:
    - c
- id: vuln-opensc-ed55fcd2
  pattern: "for ($I = 7; $I < 16; $I++) {\n  ...\n}\n"
  pattern-not: "for ($I = 0x7; $I <= 0xF; $I++) {\n  ...\n}\n"
  languages:
  - c
  message: 'The loop condition uses an incorrect upper bound, which can lead to out-of-bounds access. The condition should
    be adjusted to use hexadecimal notation and a less-than-or-equal comparison to ensure proper iteration over the intended
    range. This vulnerability can cause memory corruption or undefined behavior. Fix by using hexadecimal notation and a less-than-or-equal
    comparison in the loop condition.

    '
  severity: ERROR
  metadata:
    source-url: https://github.com/OpenSC/OpenSC/commit/ed55fcd2996930bf58b9bb57e9ba7b1f3a753c43
    category: security
    cwe:
    - CWE-125
    - CWE-787
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/125.html
    - https://cwe.mitre.org/data/definitions/787.html
    technology:
    - c
- id: vuln-opensc-f015746d
  pattern: "*$TNAME = malloc($SIZE);\nif (*$TNAME == NULL) {\n  ...\n}\n$FUNC($CARD, $OFFSET, (unsigned char *)*$TNAME, $SIZE,\
    \ $FLAGS);\n...\nfree(*$TNAME);\n...\nif ((*$TNAME)[$R-1] != '\\0') {\n  (*$TNAME)[$R-1] = '\\0';\n}\n"
  pattern-not: "$NAME = malloc($SIZE);\nif ($NAME == NULL) {\n  ...\n}\n$FUNC($CARD, $OFFSET, (unsigned char *)$NAME, $SIZE,\
    \ $FLAGS);\n...\nfree($NAME);\n...\nif ($NAME[$R-1] != '\\0') {\n  $NAME[$R-1] = '\\0';\n}\n*$TNAME = $NAME;\n"
  languages:
  - c
  message: "Directly using a double-pointer in memory allocation and manipulation can lead to unsafe memory access and potential\
    \ vulnerabilities. \nThe original code dereferences the pointer multiple times, which can cause issues if the memory allocation\
    \ fails or if the pointer is used incorrectly.\nTo fix this, allocate memory to a local pointer first, perform all necessary\
    \ operations, and then assign it to the double-pointer.\n"
  severity: ERROR
  metadata:
    source-url: https://github.com/OpenSC/OpenSC/commit/f015746d
    category: security
    cwe:
    - CWE-119
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/119.html
    technology:
    - c
