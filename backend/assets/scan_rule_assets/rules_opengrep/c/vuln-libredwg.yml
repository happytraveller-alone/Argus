rules:
- id: vuln-libredwg-3d7053eb
  pattern: "if (($OBJ = dwg_ref_object($DWG, $DWG->header_vars.$VAR)))\n  $FUNC($DAT, $OBJ);\n"
  pattern-not: "if (($OBJ = dwg_ref_object($DWG, $DWG->header_vars.$VAR))\n    && $OBJ->type == $TYPE)\n  $FUNC($DAT, $OBJ);\n"
  languages:
  - c
  message: 'The code directly uses the result of `dwg_ref_object` without checking the object type,

    which could lead to using an object of the wrong type. This could cause undefined behavior

    or security vulnerabilities. Always verify the object type before using it.

    '
  severity: ERROR
  metadata:
    source-url: https://github.com/LibreDWG/libredwg/commit/3d7053eb248036dd9a724d08a17523d35617dcf3
    category: security
    cwe:
    - CWE-484
    owasp:
    - A1:2017-Injection
    technology:
    - c
- id: vuln-libredwg-66a3484b
  pattern: 'LOG_WARN("obj_string_stream overflow");

    '
  pattern-not: "LOG_ERROR(\"obj_string_stream overflow, bitsize \" FORMAT_RL \" => \" FORMAT_RL,\n          $OBJ->bitsize,\
    \ $OBJ->size * 8);\n$STR->byte = $OLD_BYTE;\n$STR->size = $OLD_SIZE;\n$OBJ->has_strings = 0;\n$OBJ->bitsize = $OBJ->size\
    \ * 8;\n"
  languages:
  - c
  message: 'Detected a potential overflow vulnerability in the obj_string_stream handling.

    The original code only logs a warning without properly handling the overflow, which could lead to undefined behavior or
    security issues.

    The fix includes logging an error, restoring the stream state, and properly setting the object''s bitsize.

    '
  severity: ERROR
  metadata:
    source-url: github.com/LibreDWG/libredwg/commit/66a3484bda00ff5af2bdb79e41db3b066fdd0d00
    category: security
    cwe:
    - 'CWE-190: Integer Overflow or Wraparound'
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-libredwg-757b87f2
  pattern: "log_if_error(\"reference_get_object\");\n...\nif (!$HDR)\n{\n  fprintf(stderr, \"Found null ref->obj\\n\");\n\
    \  return;\n}\n"
  pattern-not: 'if (!$HDR || $ERROR) log_error("dwg_ref_get_object");

    ...

    if (!_hdr) log_error("dwg_object_to_BLOCK_HEADER");

    '
  languages:
  - c
  message: 'The code checks for a null header but does not handle the error condition properly, potentially leading to undefined
    behavior. This vulnerability can cause crashes or other unexpected behavior if the header is null. The fix ensures that
    both the header and error conditions are checked and logged appropriately.

    '
  severity: ERROR
  metadata:
    source-url: github.com/LibreDWG/libredwg/commit/757b87f2d01127df1fa890f7a6c8608ffe9cd23e
    category: security
    cwe:
    - CWE-476
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    references:
    - https://cwe.mitre.org/data/definitions/476.html
    technology:
    - c
- id: vuln-libredwg-bcec483e
  pattern: "for ($I = 0; $I < $INFO->num_sections; ++$I) {\n  ...\n  memcpy(&$DECOMP[$I * $INFO->size], ...);\n  ...\n}\n"
  pattern-not: "for ($I = $J = 0; $I < $INFO->num_sections; ++$I, ++$J) {\n  ...\n  memcpy(&$DECOMP[$J * $INFO->size], ...);\n\
    \  ...\n}\n"
  languages:
  - c
  message: 'Detected potential out-of-bounds memory access due to incorrect index usage in a loop.

    This vulnerability can lead to memory corruption or data leakage. The fix involves using

    a separate index variable (`j`) for writing to the `decomp` array to ensure proper

    bounds checking. Always verify array indices to prevent out-of-bounds access.

    '
  severity: ERROR
  metadata:
    source-url: github.com/LibreDWG/libredwg/commit/bcec483e73819af29787d5ed87fc515e1dfd0411
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    - 'CWE-787: Out-of-bounds Write'
    owasp:
    - 'A1: Injection'
    technology:
    - c
