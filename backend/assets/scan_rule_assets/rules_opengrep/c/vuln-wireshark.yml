    Detected unsafe memory handling in set_dnet_address function call.
    The original code passes addresses directly without proper memory management,
    which can lead to use-after-free or memory corruption vulnerabilities.
    The fix adds a packet_info parameter and uses wmem_strdup to safely duplicate strings.
    Always use proper memory management functions when handling string addresses.
