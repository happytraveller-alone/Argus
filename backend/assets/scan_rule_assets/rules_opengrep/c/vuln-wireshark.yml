rules:
- id: vuln-wireshark-11f40896
  patterns:
  - pattern: |
      if ($GVCP_TELEGRAM_TREE != NULL)
      {
        if ($EXTENDEDBLOCKIDS)
        {
          proto_tree_add_item($GVCP_TELEGRAM_TREE, $HF_GVCP_EVENTCMD_EXTID_LENGTH, $TVB, $OFFSET, 2, $ENC_BIG_ENDIAN);
          $DATA_LENGTH = tvb_get_ntohs($TVB, $OFFSET);
        }
        offset += 2;
        ...
        if ($EXTENDEDBLOCKIDS)
        {
          if ($DATA_LENGTH > 24)
          {
            proto_tree_add_item($GVCP_TELEGRAM_TREE, $HF_GVCP_EVENTCMD_DATA, $TVB, $OFFSET, $DATA_LENGTH - 24, $ENC_NA);
            $OFFSET += $DATA_LENGTH - 24;
          }
        }
        else
        {
          proto_tree_add_item($GVCP_TELEGRAM_TREE, $HF_GVCP_EVENTCMD_DATA, $TVB, $OFFSET, -1, $ENC_NA);
          return;
        }
      }
  - pattern-not: |
      if ($EXTENDEDBLOCKIDS)
      {
        proto_tree_add_item($GVCP_TELEGRAM_TREE, $HF_GVCP_EVENTCMD_EXTID_LENGTH, $TVB, $OFFSET, 2, $ENC_BIG_ENDIAN);
        $DATA_LENGTH = tvb_get_ntohs($TVB, $OFFSET);
      }
      offset += 2;
      ...
      if ($EXTENDEDBLOCKIDS)
      {
        if ($DATA_LENGTH > 24)
        {
          proto_tree_add_item($GVCP_TELEGRAM_TREE, $HF_GVCP_EVENTCMD_DATA, $TVB, $OFFSET, $DATA_LENGTH - 24, $ENC_NA);
          $OFFSET += $DATA_LENGTH - 24;
        }
      }
      else
      {
        proto_tree_add_item($GVCP_TELEGRAM_TREE, $HF_GVCP_EVENTCMD_DATA, $TVB, $OFFSET, -1, $ENC_NA);
        return;
      }
  languages:
  - c
  message: |
    The vulnerability occurs due to incorrect handling of the `gvcp_telegram_tree` pointer check, which can lead to null pointer dereference or incorrect data processing. The fix ensures that the `gvcp_telegram_tree` pointer is not checked unnecessarily and the logic is streamlined to handle `extendedblockids` correctly. This prevents potential crashes or incorrect protocol dissections.
  severity: ERROR
  metadata:
    source-url: github.com/wireshark/wireshark/commit/11f40896b696e4e8c7f8b2ad96028404a83a51a4
    category: security
    cwe:
    - CWE-476
    owasp: 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-wireshark-16a52bff
  patterns:
  - pattern: |
      while ($TP && $TP->lastseq >= $SEQ && $TP->lastseq >= $SAVE_SEQ) {
        ...
        $SAVE_SEQ = $TP->lastseq + 1;
        $TP = ($TYPE *)wmem_tree_lookup32_le($RCONV->packets[$CDIR], $TP->lastseq - 1);
      }
  - pattern-not: |
      while ($TP && $TP->lastseq >= $SEQ) {
        ...
        if ($TP->seq == 0) {
          break;
        }
        $TP = ($TYPE *)wmem_tree_lookup32_le($RCONV->packets[$CDIR], $TP->seq - 1);
      }
  languages:
  - c
  message: |
    Detected a potential infinite loop vulnerability in packet processing code. The original code could enter an infinite loop due to incorrect sequence number comparison logic. The fix involves removing the redundant comparison and adding a check for the first segment (seq == 0). This vulnerability could lead to denial of service or excessive resource consumption.
  severity: ERROR
  metadata:
    source-url: github.com/wireshark/wireshark/commit/16a52bff6cf8ddfec8126bd40c50b65465ede0cd
    category: security
    cwe:
    - CWE-835
    owasp: A9:2017 - Using Components with Known Vulnerabilities
    technology:
    - c
- id: vuln-wireshark-177962a5
  patterns:
  - pattern: |
      copy_address_shallow(&$VAR1, &$VAR2);
  - pattern-not: |
      copy_address_wmem(wmem_file_scope(), &$VAR1, &$VAR2);
  languages:
  - c
  message: |
    The use of 'copy_address_shallow' can lead to memory management issues and potential vulnerabilities. This function does not allocate memory properly, which can cause undefined behavior or crashes. Replace 'copy_address_shallow' with 'copy_address_wmem(wmem_file_scope(), ...)' to ensure proper memory allocation and management.
  severity: ERROR
  metadata:
    source-url: github.com/wireshark/wireshark/commit/177962a5b4a05759b40fb6fc07a4a6eec306a9bf
    category: security
    cwe:
    - CWE-119
    - CWE-787
    owasp:
    - 'A1: Injection'
    references:
    - https://www.wireshark.org/docs/wsdg_html_chunked/ChDissectMemory.html
    technology:
    - c
- id: vuln-wireshark-212b1882
  patterns:
  - pattern: |
      g_snprintf($S, $ITEM_LABEL_LENGTH, "%d [Mired] (%d [K])", $VALUE, 1000000/$VALUE);
  - pattern-not: |
      g_snprintf($S, $ITEM_LABEL_LENGTH, "%u [Mired]", $VALUE);
      g_snprintf($S, $ITEM_LABEL_LENGTH, "%u [Mired] (%u [K])", $VALUE, 1000000/$VALUE);
  languages:
  - c
  message: |
    Potential division by zero vulnerability detected. The expression '1000000/$VALUE' can lead to a division by zero if $VALUE is 0. This can cause undefined behavior or crashes. Add a check to ensure $VALUE is not zero before performing the division.
  severity: ERROR
  metadata:
    source-url: github.com/wireshark/wireshark/commit/212b18825d9b668cda23d334c48867dfa66b2b36
    category: security
    cwe:
    - CWE-369
    owasp: A9:2017-Using Components with Known Vulnerabilities
    technology:
    - c
- id: vuln-wireshark-30651ab1
  patterns:
  - pattern: |
      tvb_memcpy($TVB, $BYTES, $OFFSET, ($OPTLEN - 4));
  - pattern-not: |
      tvb_memcpy($TVB, $BYTES, $OFFSET, $ADDR_LEN);
  languages:
  - c
  message: |
    The calculation of the length parameter in tvb_memcpy is unsafe as it directly uses (optlen - 4) without proper bounds checking. This can lead to buffer overflows if optlen is not validated. Use a pre-calculated and validated length variable instead.
  severity: ERROR
  metadata:
    source-url: github.com/wireshark/wireshark/commit/30651ab18b42e666f57ea239e58f3ff3a5e9c4ad
    category: security
    cwe:
    - CWE-120
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
    - c
- id: vuln-wireshark-4425716d
  patterns:
  - pattern: |
      if ($TYPE == T_SRV) {
        ...
      }
  - pattern-not: |
      if ($TYPE == T_SRV && $NAME[0]) {
        ...
      }
  languages:
  - c
  message: |
    Missing null check for DNS SRV record name before accessing first character.
    This could lead to null pointer dereference if the name is empty.
    Always validate that the name string is not empty before accessing its first character.
