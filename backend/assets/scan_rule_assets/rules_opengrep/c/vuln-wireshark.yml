- id: vuln-wireshark-4fdfccd5
  patterns:
  - pattern: |
      proto_tree_add_int($TREE, $HF, $TVB, $OFFSET, $LENGTH, $PINFO->pseudo_header->erf.subhdr.mc_hdr)
  - pattern-not: |
      proto_tree_add_uint($TREE, $HF, $TVB, $OFFSET, $LENGTH, $PINFO->pseudo_header->erf.subhdr.mc_hdr)
  languages:
  - c
  message: |
    The use of proto_tree_add_int() with potentially unsigned values can lead to incorrect value representation and potential security issues. The function proto_tree_add_uint() should be used instead for unsigned values to ensure proper handling. This vulnerability could cause misinterpretation of network packet data and lead to incorrect protocol analysis.
  severity: ERROR
  metadata:
    source-url: github.com/wireshark/wireshark/commit/4fdfccd56d020c1d41235994d277fc0000c0f110
    category: security
    cwe:
    - 'CWE-681: Incorrect Conversion between Numeric Types'
    owasp: 'A6: Security Misconfiguration'
    references:
    - https://www.wireshark.org/docs/wsdg_html_chunked/libr_packet_info.html
    technology:
    - c
- id: vuln-wireshark-55d8c445
  patterns:
  - pattern: |
      length = (gint)tvb_ensure_captured_length_remaining(tvb, offset);
  - pattern-not: |
      length = tvb_captured_length_remaining(tvb, offset);
  languages:
  - c
  message: |
    The use of `(gint)tvb_ensure_captured_length_remaining` is potentially dangerous as it may lead to integer overflow or truncation issues. This can cause incorrect length calculations and lead to security vulnerabilities such as buffer overflows or data corruption. Replace it with `tvb_captured_length_remaining` to avoid casting and ensure proper length handling.
  severity: ERROR
  metadata:
    source-url: github.com/wireshark/wireshark/commit/55d8c445b47375a813c9ebb2b398951f65145a84
    category: security
    cwe:
    - CWE-190
    - CWE-681
    owasp:
    - 'A1: Injection'
    references:
    - https://www.wireshark.org/docs/wsdg_html_chunked/libtvbuff.html
    technology:
    - c
- id: vuln-wireshark-565b4266
  patterns:
  - pattern: |
      tvb_get_ascii_7bits_string(wmem_packet_scope(), tvb, (offset << 3) + bit, num_fields)
  - pattern-not: |
      tvb_get_ascii_7bits_string(wmem_packet_scope(), tvb_out, (offset << 3) + bit, num_fields)
  languages:
  - c
  message: |
    The function `tvb_get_ascii_7bits_string` is being called with the wrong buffer parameter (`tvb` instead of `tvb_out`). This could lead to incorrect data processing or potential security vulnerabilities due to improper memory access. Always ensure the correct buffer is passed to the function. Replace `tvb` with `tvb_out` to fix this issue.
  severity: ERROR
  metadata:
    source-url: github.com/wireshark/wireshark/commit/565b42660e80e928a4f92491ba41d73f3ade4cfa
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-wireshark-5a8020a1
  patterns:
  - pattern: |
      static const char *$VAR;
      ...
      $VAR = $EXPR;
  - pattern-not: |
      static const char *$VAR = NULL;
      ...
      if ($VAR) {
        wmem_free(wmem_file_scope(), (void*)$VAR);
      }
      $VAR = (const char *)wmem_strdup(wmem_file_scope(), $EXPR);
  languages:
  - c
  message: |
    Detected uninitialized static pointer and unsafe assignment.
    This can lead to memory leaks or undefined behavior if the pointer is reused without proper initialization or cleanup.
    Initialize the pointer to NULL and ensure proper memory management using wmem_strdup and wmem_free.
  severity: ERROR
  metadata:
    source-url: github.com/wireshark/wireshark/commit/5a8020a1b6bb73fcb8bb7eb7d53177bc8a9fc703
    category: security
    cwe:
    - CWE-908
    - CWE-665
    owasp: A9:2017-Using Components with Known Vulnerabilities
    technology:
    - c
- id: vuln-wireshark-66417b17
  patterns:
  - pattern: |
      const int elsize = $VARSIZE ? (int)sizeof(struct data_blob) : $TYPE->size;
      guint8 *data = (guint8*)wmem_alloc(wmem_packet_scope(), elsize * $NUM);
  - pattern-not: |
      const guint elsize = $VARSIZE ? (guint)sizeof(struct data_blob) : (guint)$TYPE->size;
      guint8 *data;
      if ((guint64)elsize * (guint64)$NUM > G_MAXUINT) {
        THROW(ReportedBoundsError);
      }
      tvb_ensure_bytes_exist($TVB, $OFFSET, elsize * $NUM);
      data = (guint8*)wmem_alloc(wmem_packet_scope(), elsize * $NUM);
  languages:
  - c
  message: |
    Detected a potential integer overflow vulnerability in memory allocation.
    The code does not check for integer overflow before allocating memory, which can lead to a buffer overflow.
    To fix this, ensure that the multiplication of 'elsize' and 'num' does not exceed G_MAXUINT before allocating memory.
    Additionally, verify that the required data exists in the tvbuff before allocation.
  severity: ERROR
  metadata:
    source-url: github.com/wireshark/wireshark/commit/66417b17b3570b163a16ca81f71ce5bcb10548d2
    category: security
    cwe:
    - CWE-190
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/190.html
    technology:
    - c
- id: vuln-wireshark-81216a17
  patterns:
  - pattern: |
      guint $VAR = ipmi_get_hdr($PIN)->rs_sa == $VAL;
  - pattern-not: |
      const ipmi_header_t *$HEADER = ipmi_get_hdr($PIN);
      if ($HEADER == NULL)
          return;
      guint $VAR = $HEADER->rs_sa == $VAL;
  languages:
  - c
  message: |
    Directly dereferencing the result of ipmi_get_hdr() without NULL check can lead to null pointer dereference. This is dangerous as it can cause application crashes or undefined behavior. Always check if the pointer returned by ipmi_get_hdr() is NULL before accessing its fields.
  severity: ERROR
  metadata:
    source-url: github.com/wireshark/wireshark/commit/81216a176b25dd8a616e11808a951e141a467009
    category: security
    cwe:
    - CWE-476
    owasp: A1:2017-Injection
    technology:
    - c
- id: vuln-wireshark-81c4eee8
  patterns:
  - pattern: |
      if ($VAR1->rtp_dyn_payload != $VAR2)
          rtp_free_hash_dyn_payload($VAR1->rtp_dyn_payload);
  - pattern-not: |
      /* if ($VAR1->rtp_dyn_payload != $VAR2) */
      /*     rtp_free_hash_dyn_payload($VAR1->rtp_dyn_payload); */
  languages:
  - c
  message: |
    This rule detects a potential vulnerability where a dynamic payload is freed based on an equality comparison.
    This can lead to memory corruption or use-after-free vulnerabilities if the payload is incorrectly freed.
    The fix involves commenting out the problematic code to prevent unsafe memory operations.
  severity: ERROR
  metadata:
    source-url: github.com/wireshark/wireshark/commit/81c4eee84b6ee19fd27929856fa1465b1af148c6
    category: security
    cwe:
    - 'CWE-416: Use After Free'
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-wireshark-867a1827
  patterns:
  - pattern: |
      *length = tvb_captured_length_remaining($TVB, $START);
      if (*length < 0) {
        ...
        tvb_ensure_bytes_exist($TVB, $START, 0);
      }
      DISSECTOR_ASSERT(*length >= 0);
  - pattern-not: |
      *length = tvb_ensure_captured_length_remaining($TVB, $START);
  languages:
  - c
  message: |
    Detected unsafe length calculation in Wireshark's protocol dissector. The original code uses `tvb_captured_length_remaining` followed by a manual check for negative values, which can lead to incorrect handling of buffer boundaries. This could potentially cause security vulnerabilities by allowing improper buffer access. Use `tvb_ensure_captured_length_remaining` instead, which properly validates the length and throws an exception if the offset is past the buffer end.
  severity: ERROR
  metadata:
    source-url: https://github.com/wireshark/wireshark/commit/867a1827e7dc88896ee27a107eb35c4b3973d270
    category: security
    cwe:
    - CWE-119
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-wireshark-8ed057f7
  patterns:
  - pattern: |
      copy_address(&$VAR1, &$VAR2);
  - pattern-not: |
      copy_address_wmem(wmem_file_scope(), &$VAR1, &$VAR2);
  languages:
  - c
  message: |
    Detected unsafe use of copy_address() without memory scope. This can lead to memory management issues and potential security vulnerabilities. Always use copy_address_wmem() with an explicit memory scope like wmem_file_scope() to ensure proper memory management.
  severity: ERROR
