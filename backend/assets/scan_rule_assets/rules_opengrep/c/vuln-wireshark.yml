- id: vuln-wireshark-95571f17
  patterns:
  - pattern: |
      if ($SPLIT[1] == NULL) {
        ...
      }
  - pattern-not: |
      if ($SPLIT == NULL || $SPLIT[0] == NULL || $SPLIT[1] == NULL) {
        ...
      }
  languages:
  - c
  message: |
    Detected a potential NULL pointer dereference vulnerability. The code checks only the second element of the split array for NULL, but does not verify the array itself or the first element. This can lead to a crash or undefined behavior if either the array or the first element is NULL. To fix this, ensure you check the array and all relevant elements for NULL before accessing them.
