    technology:
    - c
- id: vuln-wireshark-4a2cd6c7
  patterns:
  - pattern: |
      dissect_llrp_parameters($TVB, $PINFO, $PARAM_TREE, $SUBOFFSET, $PARAM_END)
  - pattern-not: |
      dissect_llrp_parameters($TVB, $PINFO, $PARAM_TREE, $SUBOFFSET, $PARAM_END, $DEPTH)
  languages:
  - c
  message: |
    Missing depth parameter in recursive function call to dissect_llrp_parameters. This can lead to unbounded recursion, potentially causing a stack overflow. Add a depth parameter to limit recursion depth and prevent stack overflow.
  severity: ERROR
