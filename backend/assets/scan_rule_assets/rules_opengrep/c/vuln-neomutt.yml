rules:
- id: vuln-neomutt-36a29280
  pattern: |
    mutt_error("%s", $S + 3);
  pattern-not: |
    mutt_error("%s", $S + 2);
  languages:
  - c
  message: |
    The vulnerability involves an incorrect offset in the `mutt_error` function, which could lead to incorrect error message handling or potential information disclosure. The offset `+3` should be `+2` to correctly reference the intended string. This issue could be dangerous as it might expose sensitive information or cause incorrect error messages to be displayed. To fix this, ensure the correct offset is used when referencing the string.
  severity: ERROR
  metadata:
    source-url: github.com/neomutt/neomutt/commit/36a29280448097f34ce9c94606195f2ac643fed1
    category: security
    cwe:
    - CWE-193
    owasp: A6:2021 - Vulnerable and Outdated Components
    technology:
    - c
- id: vuln-neomutt-6f163e07
  pattern: |
    mutt_b64_decode($OUT, $IN)
  pattern-not: |
    mutt_b64_decode($OUT, $IN, $OLEN)
  languages:
  - c
  message: |
    The function `mutt_b64_decode` is being called without specifying the output buffer size, which can lead to buffer overflows. This is dangerous because it can result in memory corruption, potentially allowing an attacker to execute arbitrary code or crash the application. Always pass the size of the output buffer as the third argument to `mutt_b64_decode` to prevent buffer overflows.
  severity: ERROR
  metadata:
    source-url: github.com/neomutt/neomutt/commit/6f163e07ae68654d7ac5268cbb7565f6df79ad85
    category: security
    cwe:
    - CWE-120
    owasp:
    - 'A2: Broken Authentication'
    technology:
    - c
- id: vuln-neomutt-9c36717a
  pattern: |
    goto err_close_conn;
  pattern-not: |
    goto bail;
  languages:
  - c
  message: |
    The vulnerability involves the use of an incorrect goto label 'err_close_conn' which is conditionally compiled under USE_SSL. This can lead to inconsistent error handling and resource management, potentially causing resource leaks or undefined behavior. The fix replaces 'err_close_conn' with 'bail' to ensure consistent error handling regardless of SSL usage. Always use consistent error handling labels to avoid such issues.
  severity: ERROR
  metadata:
    source-url: github.com/neomutt/neomutt/commit/9c36717a3e2af1f2c1b7242035455ec8112b4b06
    category: security
    cwe:
    - CWE-665
    owasp:
    - 'A9: Security Misconfiguration'
    references:
    - https://cwe.mitre.org/data/definitions/665.html
    technology:
    - c
- id: vuln-neomutt-e5239374
  pattern: |
    imap_quote_string($DEST, $DLEN, $SRC)
  pattern-not: |
    imap_quote_string($DEST, $DLEN, $SRC, $QUOTE_BACKTICK)
  languages:
  - c
  message: |
    The `imap_quote_string` function is being called without the `quote_backtick` parameter, which could lead to improper string quoting and potential security vulnerabilities. Always specify whether backticks should be quoted by passing the `quote_backtick` parameter explicitly.
  severity: ERROR
  metadata:
    source-url: github.com/neomutt/neomutt/commit/e52393740334443ae0206cab2d7caef381646725
    category: security
    cwe:
    - 'CWE-116: Improper Encoding or Escaping of Output'
    owasp:
    - 'A1: Injection'
    technology:
    - c
