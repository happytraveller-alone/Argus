rules:
- id: vuln-bluez-0388794d
  pattern: "if (sizeof(*$CAP) + $CAP->length >= $SIZE) {\n  ...\n}\n"
  pattern-not: "if (sizeof(*$CAP) + $CAP->length > $SIZE) {\n  ...\n}\n"
  languages:
  - c
  message: 'This vulnerability occurs due to an incorrect boundary check in a memory comparison operation.

    The original code uses `>=` which can lead to a buffer overflow if the condition is met exactly.

    This is dangerous as it can allow an attacker to read or write beyond the allocated memory, potentially leading to arbitrary
    code execution.

    To fix this, replace `>=` with `>` to ensure proper boundary checking.

    '
  severity: ERROR
  metadata:
    source-url: github.com/bluez/bluez/commit/0388794dc5fdb73a4ea88bcf148de0a12b4364d4
    category: security
    cwe:
    - CWE-125
    - CWE-126
    owasp: 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/125.html
    - https://cwe.mitre.org/data/definitions/126.html
    technology:
    - c
- id: vuln-bluez-35d8d895
  pattern: "if (!device_is_bonded($DEVICE, btd_device_get_bdaddr_type($DEVICE)))\n  return -ECONNREFUSED;\n"
  pattern-not: "if (!device_is_bonded($DEVICE, btd_device_get_bdaddr_type($DEVICE))) {\n  struct bt_gatt_client *$CLIENT;\n\
    \  $CLIENT = btd_device_get_gatt_client($DEVICE);\n  if (!bt_gatt_client_set_security($CLIENT, BT_ATT_SECURITY_MEDIUM))\
    \ {\n    return -ECONNREFUSED;\n  }\n}\n"
  languages:
  - c
  message: 'The code directly returns -ECONNREFUSED without setting the required GATT security level, which could allow unauthorized
    access to Bluetooth devices. This vulnerability can be exploited to bypass security checks. The fix involves setting the
    GATT security level to medium before rejecting the connection.

    '
  severity: ERROR
  metadata:
    source-url: github.com/bluez/bluez/commit/35d8d895cd0b724e58129374beb0bb4a2edf9519
    category: security
    cwe:
    - 'CWE-284: Improper Access Control'
    owasp:
    - 'A2: Broken Authentication'
    technology:
    - c
- id: vuln-bluez-3cccdbab
  pattern: "if ($REQ->subclass & 0x40) {\n  ...\n}\n"
  pattern-not: "if ($CLASSIC_BONDED_ONLY || $REQ->subclass & 0x40) {\n  ...\n}\n"
  languages:
  - c
  message: 'This pattern detects a missing check for classic bonded devices in the Bluetooth input profile, which could allow
    unauthorized connections. The vulnerability occurs when the code fails to verify if a device is bonded before processing
    its connection request. This can lead to security risks where unauthenticated devices gain access. The fix requires adding
    a check for `classic_bonded_only` in conjunction with the existing subclass check.

    '
  severity: ERROR
  metadata:
    source-url: github.com/bluez/bluez/commit/3cccdbab2324086588df4ccf5f892fb3ce1f1787
    category: security
    cwe:
    - CWE-284
    owasp:
    - 'A2: Broken Authentication'
    references:
    - https://bluetooth.com
    technology:
    - c
- id: vuln-bluez-5ab53525
  pattern: "if (memcmp($STRUCT->$FIELD, $DATA, $LEN)) {\n  ...\n}\n"
  pattern-not: "if ($LEN == sizeof($STRUCT->$FIELD) && memcmp($STRUCT->$FIELD, $DATA, $LEN)) {\n  ...\n}\n"
  languages:
  - c
  message: 'Detected a potential buffer overflow vulnerability due to missing length check before memcmp.

    This is dangerous because it can lead to out-of-bounds memory access, potentially causing crashes or security exploits.

    To fix this, ensure the length of the data being compared matches the size of the target buffer.

    '
  severity: ERROR
  metadata:
    source-url: https://github.com/bluez/bluez/commit/5ab5352531a9cc7058cce569607f3a6831464443
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-bluez-7a80d209
  pattern: "static GSList *caps_to_list(uint8_t *data, int size, ...) {\n  ...\n  for ($PROCESSED = 0, $CAPS = NULL; $PROCESSED\
    \ + 2 <= $SIZE;) {\n    ...\n    if ($PROCESSED + 2 + $LENGTH > $SIZE) {\n      ...\n    }\n    ...\n    $PROCESSED +=\
    \ 2 + $LENGTH;\n    $DATA += 2 + $LENGTH;\n    ...\n  }\n  ...\n}\n"
  pattern-not: "static GSList *caps_to_list(uint8_t *data, size_t size, ...) {\n  ...\n  if ($SIZE < sizeof(*$CAP)) return\
    \ NULL;\n  ...\n  for ($CAPS = NULL; $SIZE >= sizeof(*$CAP);) {\n    ...\n    if (sizeof(*$CAP) + $CAP->length >= $SIZE)\
    \ {\n      ...\n    }\n    ...\n    $SIZE -= sizeof(*$CAP) + $CAP->length;\n    $DATA += sizeof(*$CAP) + $CAP->length;\n\
    \    ...\n  }\n  ...\n}\n"
  languages:
  - c
  message: 'The function ''caps_to_list'' contains a potential integer overflow vulnerability due to improper bounds checking.

    The original code uses ''int'' for the size parameter and performs arithmetic operations that could lead to overflow.

    This could result in memory corruption or out-of-bounds access.

    To fix this, use ''size_t'' for size parameters and ensure proper bounds checking before arithmetic operations.

    '
  severity: ERROR
  metadata:
    source-url: github.com/bluez/bluez/commit/7a80d2096f1b7125085e21448112aa02f49f5e9a
    category: security
    cwe:
    - CWE-190
    - CWE-787
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/190.html
    - https://cwe.mitre.org/data/definitions/787.html
    technology:
    - c
- id: vuln-bluez-838c0dc7
  pattern: "static struct pending_op *$FUNC(struct btd_device *$DEVICE, ...) {\n  ...\n  $OP->device = $DEVICE;\n  ...\n}\n"
  pattern-not: "static struct pending_op *$FUNC(struct bt_att *$ATT, ...) {\n  ...\n  $OP->att = bt_att_ref($ATT);\n  ...\n\
    }\n"
  languages:
  - c
  message: 'The code uses `btd_device` directly without proper connection handling, which can lead to use-after-free or invalid
    memory access if the device disconnects. The vulnerability was fixed by replacing `btd_device` with `bt_att` and adding
    disconnect handlers. To fix, ensure proper connection state management by using `bt_att` and registering disconnect callbacks.

    '
  severity: ERROR
  metadata:
    source-url: github.com/bluez/bluez/commit/838c0dc7641e1c991c0f3027bf94bee4606012f8
    category: security
    cwe:
    - 'CWE-416: Use After Free'
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-bluez-93b64d9c
  pattern: "static bool parse_value_arg(DBusMessage *$MSG, uint8_t **$VALUE, size_t *$VALUE_LEN) {\n  ...\n  if ($LEN < 0)\n\
    \    return false;\n  ...\n}\n"
  pattern-not: "static int parse_value_arg(DBusMessageIter *$ITER, uint8_t **$VALUE, int *$LEN) {\n  ...\n  if (dbus_message_iter_get_arg_type($ITER)\
    \ != DBUS_TYPE_ARRAY)\n    return -EINVAL;\n  ...\n}\n"
  languages:
  - c
  message: 'The function `parse_value_arg` incorrectly handles negative length values by returning `false` instead of an error
    code. This can lead to undefined behavior when negative values are passed. The fix involves returning a proper error code
    (`-EINVAL`) and using `DBusMessageIter` for safer message parsing.

    '
  severity: ERROR
  metadata:
    source-url: github.com/bluez/bluez/commit/93b64d9ca8a2bb663e37904d4b2c702c58a36e4f
    category: security
    cwe:
    - 'CWE-687: Function Call With Incorrectly Specified Argument Value'
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-bluez-b497b594
  pattern: "if ($ADAPTER->discovery_discoverable)\n  set_discovery_discoverable($ADAPTER, false);\n"
  pattern-not: "if (!($ADAPTER->current_settings & MGMT_OP_SET_DISCOVERABLE)) {\n  ...\n  set_discovery_discoverable($ADAPTER,\
    \ false);\n}\n"
  languages:
  - c
  message: 'The code unconditionally sets the adapter to non-discoverable without checking if it was set temporarily by discovery.
    This can lead to incorrect state management and potential security issues where the adapter remains discoverable when
    it should not. Fix by adding a condition to check `current_settings` before modifying the discoverable state.

    '
  severity: ERROR
  metadata:
    source-url: github.com/bluez/bluez/commit/b497b5942a8beb8f89ca1c359c54ad67ec843055
    category: security
    cwe:
    - CWE-284
    owasp: A9:2017-Insufficient Logging & Monitoring
    references: https://git.kernel.org/pub/scm/bluetooth/bluez.git/commit/?id=b497b5942a8beb8f89ca1c359c54ad67ec843055
    technology:
    - c
- id: vuln-bluez-e79417ed
  pattern: "static sdp_cstate_list_t *cstates;\n...\nstatic sdp_buf_t *sdp_get_cached_rsp(sdp_cont_state_t *cstate) {\n  sdp_cstate_list_t\
    \ *p;\n  for (p = cstates; p; p = p->next) {\n    if (p->timestamp != cstate->timestamp)\n      continue;\n    if (cstate->cStateValue.maxBytesSent\
    \ < p->buf.data_size)\n      return &p->buf;\n  }\n  return 0;\n}\n"
  pattern-not: "static sdp_list_t *cstates;\n...\nstatic sdp_cont_info_t *sdp_get_cont_info(sdp_req_t *req, sdp_cont_state_t\
    \ *cstate) {\n  sdp_list_t *list;\n  list = sdp_list_find(cstates, cstate, cstate_match);\n  if (list) {\n    sdp_cont_info_t\
    \ *cinfo = list->data;\n    if (cinfo->opcode == req->opcode)\n      return cinfo;\n    sdp_cont_info_free(cinfo);\n \
    \   return NULL;\n  }\n  sdp_cstate_cleanup(req->sock);\n  return NULL;\n}\n"
  languages:
  - c
  message: 'Detected unsafe continuation state handling in BlueZ SDP implementation. The vulnerability arises from directly
    accessing and manipulating a linked list of continuation states without proper synchronization or validation, which could
    lead to memory corruption or use-after-free vulnerabilities. The fix introduced proper cleanup and validation mechanisms
    using sdp_list_find and sdp_cont_info_free functions. To fix similar vulnerabilities, ensure proper state handling with
    validation, cleanup, and synchronization mechanisms.

    '
  severity: ERROR
  metadata:
    source-url: github.com/bluez/bluez/commit/e79417ed7185b150a056d4eb3a1ab528b91d2fc0
    category: security
    cwe:
    - CWE-416
    - CWE-787
    owasp:
    - 'A1: Injection'
    references:
    - https://en.wikipedia.org/wiki/Use-after-free
    technology:
    - c
