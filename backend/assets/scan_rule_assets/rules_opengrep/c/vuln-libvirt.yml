rules:
- id: vuln-libvirt-15073504
  pattern: |
    g_strdup_printf("%s:c%d", $SENS, $CATMIN + $C1)
  pattern-not: |
    continue
  languages:
  - c
  message: |
    The code generates an MCS (Multi-Category Security) label without considering the subset relationship between categories. This can lead to improper access control as a process can access a file if the set of MCS categories for the file is equal to or a subset of the set of MCS categories for the process. The fix is to discard cases where the categories are equal, as they are subsets of other category pairs.
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/15073504dbb624d3f6c911e85557019d3620fdb2
    category: security
    cwe:
    - CWE-284
    owasp:
    - A01:2021-Broken Access Control
    references:
    - https://selinuxproject.org/page/MCS
    technology:
    - c
- id: vuln-libvirt-28f8dfdc
  pattern: |
    qemuDomainDefFormatXML($DRIVER, $DEF, $FLAGS, false)
  pattern-not: |
    qemuDomainDefFormatXML($DRIVER, $DEF, $FLAGS)
  languages:
  - c
  message: |
    The function `qemuDomainDefFormatXML` is being called without the `VIR_DOMAIN_XML_MIGRATABLE` flag, which can lead to XML output that is not suitable for migrations. This can cause issues during VM migrations, potentially leading to data loss or service interruption. Ensure that the `VIR_DOMAIN_XML_MIGRATABLE` flag is included when calling this function.
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/28f8dfdcccd4c0f69063ef741545b37d8a7f7935
    category: security
    cwe:
    - CWE-665
    owasp:
    - A9:2021-Security Logging and Monitoring Failures
    technology:
    - c
- id: vuln-libvirt-29fe5d74
  pattern: |
    virSecurityDACGetIds($DEF, $PRIV, $USER, $GROUP)
  pattern-not: |
    virSecurityDACGetIds($DEF, $PRIV, $USER, $GROUP, $GROUPS, $NGROUPS)
  languages:
  - c
  message: |
    The function `virSecurityDACGetIds` is called without the `groups` and `ngroups` parameters, which can lead to improper handling of group permissions. This vulnerability could allow unauthorized access or privilege escalation. Always pass the `groups` and `ngroups` parameters to ensure proper group permission handling.
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/29fe5d745fbe207ec2415441d4807ae76be05974
    category: security
    cwe:
    - 'CWE-276: Incorrect Default Permissions'
    owasp:
    - A04:2021 - Insecure Design
    technology:
    - c
- id: vuln-libvirt-47b9127e
  pattern: |
    if (virBitmapIsSet($BITMAP, $BIT)) {
      ignore_value(virBitmapClearBit($BITMAP, $BIT));
      $RET--;
    }
  pattern-not: |
    if (virBitmapClearBit($BITMAP, $BIT) < 0)
      goto error;
  languages:
  - c
  message: |
    Detected unsafe bitmap manipulation where error handling is ignored.
    This can lead to inconsistent state and potential security vulnerabilities.
    Always check the return value of bitmap operations and handle errors appropriately.
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/47b9127e883677a0d60d767030a147450e919a25
    category: security
    cwe:
    - CWE-252
    owasp: A9:2017-Using Components with Known Vulnerabilities
    technology:
    - c
- id: vuln-libvirt-484cc321
  pattern: |
    qemuDomainObjEnterMonitor($DRIVER, $VM);
  pattern-not: |
    if (qemuDomainObjEnterMonitorAsync($DRIVER, $VM, $JOB) < 0)
        return -1;
  languages:
  - c
  message: |
    Direct call to qemuDomainObjEnterMonitor without error handling can lead to unsafe state transitions.
    This can cause race conditions or undefined behavior during migration operations.
    Use qemuDomainObjEnterMonitorAsync with proper error handling to ensure safe state transitions.
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/484cc3217b73b865f00bf42a9c12187b37200699
    category: security
    cwe:
    - CWE-362
    owasp:
    - A03:2021 - Injection
    technology:
    - c
- id: vuln-libvirt-4c4d0e2d
  pattern: |
    virMediatedDeviceTypeFree(*$VAR[i])
  pattern-not: |
    virMediatedDeviceTypeFree((*$VAR)[i])
  languages:
  - c
  message: |
    Incorrect pointer dereferencing in virMediatedDeviceTypeFree call.
    This can lead to undefined behavior or memory corruption.
    The correct usage is to dereference the pointer array before accessing its elements, e.g., virMediatedDeviceTypeFree((*$VAR)[i]).
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/4c4d0e2da07b5a035b26a0ff13ec27070f7c7b1a
    category: security
    cwe:
    - 'CWE-476: NULL Pointer Dereference'
    technology:
    - c
- id: vuln-libvirt-524de6cc
  pattern: |
    virDomainDiskSourceFormat($BUF, $SRC, "source", 0, false, 0, true, NULL)
  pattern-not: |
    virDomainDiskSourceFormat($BUF, $SRC, "source", 0, false, $FLAGS, true, NULL)
  languages:
  - c
  message: |
    The function `virDomainDiskSourceFormat` is called with a hardcoded value of `0` for the `xmlformatflags` parameter, which can lead to insecure XML formatting. This vulnerability could allow for XML injection or other security issues. Use a secure flag like `VIR_DOMAIN_DEF_FORMAT_SECURE` instead.
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/524de6cc35d3b222f0e940bb0fd027f5482572c5
    category: security
    cwe:
    - CWE-91
    owasp:
    - 'A1: Injection'
    references:
    - https://libvirt.org/formatdomain.html
    technology:
    - c
- id: vuln-libvirt-7c2d65dd
  pattern: |
    fchmod($FD, $PERMS->mode)
  pattern-not: |
    fchmod($FD, ($PERMS->mode == (mode_t) -1 ? $DEFAULT_MODE : $PERMS->mode))
  languages:
  - c
  message: |
    Detected unsafe use of file permissions without default fallback. This can lead to insecure file permissions if the mode is not properly set. Always use a safe default mode when the specified mode is invalid (e.g., (mode_t) -1).
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/7c2d65dde2595c07d56aad1e043f7b1836592d89
    category: security
    cwe:
    - 'CWE-276: Incorrect Default Permissions'
    owasp:
    - A01:2021 - Broken Access Control
    technology:
    - c
- id: vuln-libvirt-87b9437f
  pattern: |
    $RET = $BACKEND->uploadVol($CONN, $POOL, $VOL, $STREAM, $OFFSET, $LENGTH, $FLAGS);
  pattern-not: |
    if (($RET = $BACKEND->uploadVol($CONN, $POOL, $VOL, $STREAM, $OFFSET, $LENGTH, $FLAGS)) < 0)
        goto $CLEANUP;
  languages:
  - c
  message: |
    The function `uploadVol` is called without checking its return value, which can lead to unhandled errors. This is dangerous because it may cause the program to continue execution with an undefined state, potentially leading to security vulnerabilities or crashes. To fix this, always check the return value of `uploadVol` and handle errors appropriately, for example by using a `goto` to a cleanup section.
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/87b9437f8951f9d24f9a85c6bbfff0e54df8c984
    category: security
    cwe:
    - 'CWE-252: Unchecked Return Value'
    owasp:
    - A10:2021 - Server-Side Request Forgery (SSRF)
    technology:
    - c
- id: vuln-libvirt-9d73efdb
  pattern: |
    qemuDomainObjEnterMonitorWithDriver($DRIVER, $VM);
    $RET = qemuMonitorSetVNCPassword($PRIV->mon, $PASSWD ? $PASSWD : $DEFAULT_PASSWD);
    qemuDomainObjExitMonitorWithDriver($DRIVER, $VM);
  pattern-not: |
    qemuDomainChangeGraphicsPasswords($DRIVER, $VM, $TYPE, $AUTH, $DEFAULT_PASSWD);
  languages:
  - c
  message: |
    Direct use of `qemuMonitorSetVNCPassword` without handling password expiration or other graphics types (like SPICE) can lead to incomplete password management. This vulnerability could result in insecure password handling, especially when dealing with multiple graphics types or password expiration policies. The fix involves using `qemuDomainChangeGraphicsPasswords` to handle both VNC and SPICE graphics securely.
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/9d73efdbe3ea61a13a11fdc24a2cb530eaa0b66f
    category: security
    cwe:
    - CWE-287
    - CWE-640
    owasp:
    - 'A2: Broken Authentication'
    technology:
    - c
- id: vuln-libvirt-a4947e8f
  pattern: |
    return virNWFilterObjListNumOfNWFilters($DRIVER, $CONN, $ACL);
  pattern-not: |
    nwfilterDriverLock();
    $RET = virNWFilterObjListNumOfNWFilters($DRIVER, $CONN, $ACL);
    nwfilterDriverUnlock();
    return $RET;
  languages:
  - c
  message: |
    Direct return of virNWFilterObjListNumOfNWFilters without proper locking can lead to race conditions. This is dangerous as it can cause inconsistent state or data corruption in multi-threaded environments. To fix this, ensure the function is called between nwfilterDriverLock() and nwfilterDriverUnlock() calls.
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/a4947e8f63c3e6b7b067b444f3d6cf674c0d7f36
    category: security
    cwe:
    - 'CWE-362: Concurrent Execution using Shared Resource with Improper Synchronization (''Race Condition'')'
    owasp: 'A2: Broken Authentication'
    technology:
    - c
- id: vuln-libvirt-a5b064bf
  pattern: |
    virDomainDiskSourceFormatNetworkCookies($CHILD_BUF, $SRC)
  pattern-not: |
    virDomainDiskSourceFormatNetworkCookies($CHILD_BUF, $SRC, $FLAGS)
  languages:
  - c
  message: |
    The function `virDomainDiskSourceFormatNetworkCookies` is being called without the `flags` parameter, which can lead to insecure handling of network cookies. This vulnerability could allow attackers to exploit insecure cookie handling in network storage configurations. Always include the `flags` parameter and check for `VIR_DOMAIN_DEF_FORMAT_SECURE` to ensure secure handling.
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/a5b064bf4b17a9884d7d361733737fb614ad8979
    category: security
    cwe:
    - CWE-284
    owasp:
    - A05:2021 - Security Misconfiguration
    technology:
    - c
- id: vuln-libvirt-aed6a032
  pattern: |
    if (($CONN->flags & VIR_CONNECT_RO) &&
        ($FLAGS & VIR_DOMAIN_SAVE_IMAGE_XML_SECURE)) {
        virReportError(VIR_ERR_OPERATION_DENIED, "%s",
                       _("virDomainSaveImageGetXMLDesc with secure flag"));
        goto error;
    }
  pattern-not: |
    virCheckReadOnlyGoto($CONN->flags, error);
  languages:
  - c
  message: |
    The code fails to properly check for read-only connections when using the VIR_DOMAIN_SAVE_IMAGE_XML_SECURE flag, potentially allowing unauthorized access to sensitive information. This vulnerability can be exploited by attackers to bypass security checks. The issue was fixed by using the `virCheckReadOnlyGoto` function to properly validate read-only connections.
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/aed6a032cead4386472afb24b16196579e239580
    category: security
    cwe:
    - 'CWE-862: Missing Authorization'
    owasp:
    - A01:2021 - Broken Access Control
    technology:
    - c
- id: vuln-libvirt-b7ff9e69
  pattern: |
    return &$PROG->procs[$PROCEDURE];
  pattern-not: |
    $PROC = &$PROG->procs[$PROCEDURE];
    if (!$PROC->func)
        return NULL;
    return $PROC;
  languages:
  - c
  message: |
    Directly returning a pointer from an array without checking its validity can lead to NULL pointer dereference vulnerabilities. This could cause crashes or undefined behavior if the function pointer is NULL. Always check the validity of the returned pointer before using it.
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/b7ff9e696063189a715802d081d55a398663c15a
    category: security
    cwe:
    - CWE-476
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/476.html
    technology:
    - c
- id: vuln-libvirt-d53d4650
  pattern: |
    virBufferAsprintf($BUF, "password-secret=%s,", $ARG);
  pattern-not: |
    virBufferAsprintf($BUF, "file.password-secret=%s,", $ARG);
  languages:
  - c
  message: |
    The use of the legacy 'password-secret' format in virBufferAsprintf is vulnerable to security issues. The modern 'file.password-secret' format should be used instead to ensure proper security handling. This vulnerability could lead to improper handling of sensitive credentials. Update the code to use the 'file.password-secret' format to mitigate this risk.
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/d53d465083edeb64cc7b78249c030734c0d91c6b
    category: security
    cwe:
    - 'CWE-312: Cleartext Storage of Sensitive Information'
    owasp:
    - A02:2021 - Cryptographic Failures
    references:
    - https://libvirt.org/
    technology:
    - c
- id: vuln-libvirt-dfff16a7
  pattern: |
    STREQ($PATH, $TARGET.path)
  pattern-not: |
    STREQ_NULLABLE($PATH, $TARGET.path)
  languages:
  - c
  message: |
    Use of STREQ instead of STREQ_NULLABLE can lead to null pointer dereference vulnerabilities.
    This is dangerous because it can cause crashes or undefined behavior when null pointers are passed.
    To fix this, replace STREQ with STREQ_NULLABLE to safely handle null pointers.
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/dfff16a7c261f8d28e3abe60a47165f845fa952f
    category: security
    cwe:
    - CWE-476
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-libvirt-e7f400a1
  pattern: |
    struct _virDomainMemoryStat *stats;
  pattern-not: |
    struct _virDomainMemoryStat *stats = NULL;
  languages:
  - c
  message: |
    Uninitialized pointer in struct declaration can lead to undefined behavior.
    This is dangerous because using an uninitialized pointer can cause crashes or security vulnerabilities.
    Always initialize pointers to NULL or a valid memory address to avoid undefined behavior.
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/e7f400a110e2e3673b96518170bfea0855dd82c0
    category: security
    cwe:
    - CWE-457
    owasp: 'A9: Using Components with Known Vulnerabilities'
    references:
    - https://cwe.mitre.org/data/definitions/457.html
    technology:
    - c
- id: vuln-libvirt-f32441c6
  pattern: |
    qemuMonitorSetPassword($MON, $TYPE, $AUTH->passwd ? $AUTH->passwd : $DEFAULTPASSWD, $CONNECTED)
  pattern-not: |
    $PASSWORD = $AUTH->passwd ? $AUTH->passwd : $DEFAULTPASSWD;
    qemuMonitorSetPassword($MON, $TYPE, $PASSWORD, $CONNECTED)
  languages:
  - c
  message: |
    The use of a ternary operator directly in function calls can lead to potential security vulnerabilities, such as password exposure or incorrect handling of default values. Extract the password value into a separate variable before passing it to the function to ensure consistent and secure handling.
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/f32441c69bf450d6ac593c3acd621c37e120cdaf
    category: security
    cwe:
    - 'CWE-312: Cleartext Storage of Sensitive Information'
    owasp:
    - 'A02: Cryptographic Failures'
    references:
    - https://libvirt.org/
    technology:
    - c
- id: vuln-libvirt-f44bfb7f
  pattern: |
    virErrorPtr $VERR;
    if ($CONN)
        $VERR = virConnGetLastError($CONN);
    else
        $VERR = virGetLastError();
  pattern-not: |
    virErrorPtr $VERR = virGetLastError();
  languages:
  - c
  message: |
    The code incorrectly handles error retrieval by conditionally calling `virConnGetLastError` or `virGetLastError`. This can lead to inconsistent error handling and potential null pointer dereferences. Always directly use `virGetLastError()` for consistent error retrieval.
  severity: ERROR
  metadata:
    source-url: github.com/libvirt/libvirt/commit/f44bfb7fb978c9313ce050a1c4149bf04aa0a670
    category: security
    cwe:
    - CWE-476
    owasp:
    - A9:2021-Security Logging and Monitoring Failures
    technology:
    - c
