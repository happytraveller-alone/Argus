rules:
- id: vuln-ettercap-31b93729
  pattern: 'char *$P;

    '
  pattern-not: 'u_char *$P;

    '
  languages:
  - c
  message: "The use of 'char *' for pointer arithmetic can lead to vulnerabilities due to signedness issues. \nThis can cause\
    \ incorrect calculations and potential buffer overflows. \nReplace 'char *' with 'u_char *' to ensure proper unsigned\
    \ arithmetic.\n"
  severity: ERROR
  metadata:
    source-url: github.com/Ettercap/ettercap/commit/31b937298c8067e6b0c3217c95edceb983dfc4a2
    category: security
    cwe:
    - CWE-190
    owasp:
    - 'A1: Injection'
    technology:
    - c
- id: vuln-ettercap-e3abe7d7
  pattern: 'strncpy((char*)$PASSWORD, (char*)$SRC, $LENGTH);

    $PASSWORD[$LENGTH] = 0;

    '
  pattern-not: 'snprintf((char*)$PASSWORD, $LENGTH+1, "%s", (char*)$SRC);

    '
  languages:
  - c
  message: 'Detected unsafe use of strncpy without proper length validation, which can lead to buffer overflows.

    This vulnerability occurs when the destination buffer size is not properly checked, potentially allowing an attacker to
    overwrite adjacent memory.

    Replace strncpy with snprintf and ensure proper length validation to prevent buffer overflows.

    '
  severity: ERROR
  metadata:
    source-url: github.com/Ettercap/ettercap/commit/e3abe7d7585ecc420a7cab73313216613aadad5a
    category: security
    cwe:
    - CWE-120
    owasp:
    - 'A2: Broken Authentication'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
    - c
