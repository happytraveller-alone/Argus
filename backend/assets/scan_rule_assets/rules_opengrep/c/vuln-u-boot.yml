rules:
- id: vuln-u-boot-2ac0baab
  pattern: 'strncpy($DEST, $SRC, $SIZE + 1);

    $DEST[$SIZE + 1] = ''\0'';

    '
  pattern-not: 'strncpy($DEST, $SRC, min_t(u16, $SIZE + 1, FS_DIRENT_NAME_LEN - 1));

    $DEST[min_t(u16, $SIZE + 1, FS_DIRENT_NAME_LEN - 1)] = ''\0'';

    '
  languages:
  - c
  message: 'Detected a potential buffer overflow vulnerability in string copying. The code directly uses `name_size + 1` as
    the length for `strncpy`, which could lead to buffer overflow if the source string is longer than the destination buffer.
    This can be exploited to overwrite adjacent memory, potentially leading to arbitrary code execution or crashes. To fix,
    use `min_t` to cap the size at `FS_DIRENT_NAME_LEN - 1` to ensure it doesn''t exceed the destination buffer size.

    '
  severity: ERROR
  metadata:
    source-url: github.com/u-boot/u-boot/commit/2ac0baab4aff1a0b45067d0b62f00c15f4e86856
    category: security
    cwe:
    - 'CWE-120: Buffer Copy without Checking Size of Input (''Classic Buffer Overflow'')'
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
    - c
- id: vuln-u-boot-878269db
  pattern: "if ($BLOCKSIZE <= 0) {\n  return -1;\n}\n"
  pattern-not: "if ($BLOCKSIZE <= 0 || $LEN <= 0) {\n  ext_cache_fini(&$CACHE);\n  return -1;\n}\n"
  languages:
  - c
  message: 'The code does not properly validate the `len` parameter, which could lead to undefined behavior or security vulnerabilities.
    Always validate all input parameters before using them. The fix includes checking `len` and properly cleaning up with
    `ext_cache_fini` before returning an error.

    '
  severity: ERROR
  metadata:
    source-url: github.com/u-boot/u-boot/commit/878269dbe74229005dd7f27aca66c554e31dad8e
    category: security
    cwe:
    - CWE-20
    owasp:
    - A1:2017-Injection
    references:
    - https://cwe.mitre.org/data/definitions/20.html
    technology:
    - c
- id: vuln-u-boot-8f8c04bf
  pattern: 'int $ALEN;

    int $J;

    int $COUNT;

    int $NBYTES;

    int $LINEBYTES;

    '
  pattern-not: 'uint $ALEN;

    uint $J;

    uint $COUNT;

    uint $NBYTES;

    uint $LINEBYTES;

    '
  languages:
  - c
  message: 'Using `int` instead of `uint` for variables that should not hold negative values can lead to unexpected behavior
    and potential security vulnerabilities. This is particularly dangerous in low-level operations like I2C communication
    where data integrity is critical. Replace `int` with `uint` for variables that should only store non-negative values.

    '
  severity: ERROR
  metadata:
    source-url: github.com/u-boot/u-boot/commit/8f8c04bf1ebbd2f72f1643e7ad9617dafa6e5409
    category: security
    cwe:
    - CWE-190
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
