rules:
- id: vuln-libplist-3a55ddd3
  pattern: |
    int $W1, $W2, $W3, $W4;
    ...
    while (...) {
      $W1 = $TABLE[(int)$DATA[$N]];
      $W2 = $TABLE[(int)$DATA[$N+1]];
      $W3 = $TABLE[(int)$DATA[$N+2]];
      $W4 = $TABLE[(int)$DATA[$N+3]];
      ...
      if ($W2 >= 0) {
        $TARGET[$I++] = (char)(($W1*4 + ($W2 >> 4)) & 255);
      }
      if ($W3 >= 0) {
        $TARGET[$I++] = (char)(($W2*16 + ($W3 >> 2)) & 255);
      }
      if ($W4 >= 0) {
        $TARGET[$I++] = (char)(($W3*64 + $W4) & 255);
      }
    }
  pattern-not: |
    int $WV, $W1, $W2, $W3, $W4;
    int $TMPVAL[4];
    int $TMPCNT = 0;
    ...
    if (($WV = $TABLE[(int)(unsigned char)*$PTR++]) == -1) {
      continue;
    }
    $TMPVAL[$TMPCNT++] = $WV;
    if ($TMPCNT == 4) {
      $TMPCNT = 0;
      $W1 = $TMPVAL[0];
      $W2 = $TMPVAL[1];
      $W3 = $TMPVAL[2];
      $W4 = $TMPVAL[3];
      if ($W2 >= 0) {
        $OUTBUF[$P++] = (unsigned char)((($W1 << 2) + ($W2 >> 4)) & 0xFF);
      }
      if ($W3 >= 0) {
        $OUTBUF[$P++] = (unsigned char)((($W2 << 4) + ($W3 >> 2)) & 0xFF);
      }
      if ($W4 >= 0) {
        $OUTBUF[$P++] = (unsigned char)((($W3 << 6) + $W4) & 0xFF);
      }
    }
  languages:
  - c
  message: |
    The original base64 decoding implementation processes input in fixed-size blocks without proper validation, which can lead to out-of-bounds memory access or incorrect decoding. The vulnerability arises from directly accessing the input data without checking for invalid characters or buffer boundaries. The fix introduces proper character validation and processes input in a safer manner using temporary storage and explicit checks. To fix this, ensure that all input characters are validated before processing and use temporary storage to handle decoded values safely.
  severity: ERROR
  metadata:
    source-url: https://github.com/libimobiledevice/libplist/commit/3a55ddd3c4c11ce75a86afbefd085d8d397ff957
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    - 'CWE-20: Improper Input Validation'
    owasp:
    - A01:2021 - Broken Access Control
    references:
    - https://en.wikipedia.org/wiki/Base64
    technology:
    - c
- id: vuln-libplist-4765d9a6
  pattern: |
    uint32_t $STR_J = 0;
    uint32_t $INDEX1;
    ...
    $INDEX1 = UINT_TO_HOST((*$BNODE) + $STR_J, $BPLIST->ref_size);
  pattern-not: |
    uint64_t $STR_J = 0;
    uint64_t $INDEX1;
    const char *const $END_DATA = $BPLIST->data + $BPLIST->size;
    const char *$INDEX1_PTR = NULL;
    ...
    $INDEX1_PTR = (*$BNODE) + $STR_J;
    if ($INDEX1_PTR < $BPLIST->data || $INDEX1_PTR + $BPLIST->ref_size >= $END_DATA) {
        plist_free($NODE);
        return NULL;
    }
    $INDEX1 = UINT_TO_HOST($INDEX1_PTR, $BPLIST->ref_size);
  languages:
  - c
  message: |
    Detected a potential integer overflow vulnerability due to the use of 32-bit integers for pointer arithmetic. This can lead to out-of-bounds memory access, causing crashes or security vulnerabilities. Upgrade to 64-bit integers and add bounds checking to prevent this issue.
  severity: ERROR
  metadata:
    source-url: github.com/libimobiledevice/libplist/commit/4765d9a60ca4248a8f89289271ac69cbffcc29bc
    category: security
    cwe:
    - CWE-190
    - CWE-787
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/190.html
    - https://cwe.mitre.org/data/definitions/787.html
    technology:
    - c
- id: vuln-libplist-c086cb13
  pattern: |
    xmlDocPtr $DOC = xmlParseMemory($XML, $LEN);
    xmlNodePtr $NODE = xmlDocGetRootElement($DOC);
    ...
    xmlFreeDoc($DOC);
  pattern-not: |
    xmlSetExternalEntityLoader($LOADER);
    xmlDocPtr $DOC = xmlReadMemory($XML, $LEN, $NAME, $OPTIONS, XML_PARSE_NONET);
    if ($DOC) {
        xmlNodePtr $NODE = xmlDocGetRootElement($DOC);
        ...
        xmlFreeDoc($DOC);
    }
  languages:
  - c
  message: |
    Detected potential XXE vulnerability due to unsafe XML parsing with xmlParseMemory.
    This function does not disable external entity loading, which can lead to XML External Entity (XXE) attacks.
    To fix this, use xmlReadMemory with XML_PARSE_NONET flag to disable network access and set an external entity loader that returns NULL.
  severity: ERROR
  metadata:
    source-url: github.com/libimobiledevice/libplist/commit/c086cb139af7c82845f6d565e636073ff4b37440
    category: security
    cwe:
    - CWE-611
    owasp:
    - A4:2017-XML External Entities (XXE)
    references:
    - https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html
    technology:
    - c
