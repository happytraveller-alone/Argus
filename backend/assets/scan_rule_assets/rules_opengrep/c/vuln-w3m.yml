rules:
- id: vuln-w3m-d43527cf
  pattern: '$NEWLEN = $X->length * 6 / 5;

    if ($NEWLEN == $X->length) { ... }

    '
  pattern-not: '$NEWLEN = $X->area_size * 6 / 5;

    if ($NEWLEN == $X->area_size) { ... }

    '
  languages:
  - c
  message: 'The code incorrectly uses `length` instead of `area_size` for buffer size calculation.

    This can lead to incorrect buffer sizing, potentially causing buffer overflows or underflows.

    Use `area_size` instead of `length` for accurate buffer size calculations.

    '
  severity: ERROR
  metadata:
    source-url: github.com/tats/w3m/commit/d43527cfa0dbb3ccefec4a6f7b32c1434739aa29
    category: security
    cwe:
    - 'CWE-131: Incorrect Calculation of Buffer Size'
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-w3m-ddf28e2c
  pattern: "if ($A->start.line != $A->end.line || $SPOS > $EPOS)\n  $EPOS = $SPOS;\n"
  pattern-not: "if ($A->start.line != $A->end.line || $SPOS > $EPOS || $EPOS >= $L->len)\n  break;\n"
  languages:
  - c
  message: 'This code is vulnerable to an out-of-bounds write due to insufficient boundary checks.

    The condition does not verify if `epos` is within the bounds of `l->len`, which could lead to memory corruption.

    To fix this, ensure that `epos` is checked against `l->len` before assignment.

    '
  severity: ERROR
  metadata:
    source-url: github.com/tats/w3m/commit/ddf28e2cf9e16a559a08ee10ea60d1683b894a16
    category: security
    cwe:
    - CWE-787
    owasp:
    - 'A1: Injection'
    technology:
    - c
