rules:
- id: vuln-yara-0a3ede01
  pattern: '_yr_arena_page_for_address($ARENA, $ADDRESS)

    '
  pattern-not: 'yr_arena_page_for_address($ARENA, $ADDRESS)

    '
  languages:
  - c
  message: 'The function `_yr_arena_page_for_address` was renamed to `yr_arena_page_for_address` to address a vulnerability.
    Ensure to use the updated function name to avoid potential issues.

    '
  severity: ERROR
  metadata:
    cwe: 'CWE-477: Use of Obsolete Function'
    owasp: 'A9: Using Components with Known Vulnerabilities'
    source-url: github.com/VirusTotal/yara/commit/0a3ede0125c8b88a020fa4c98df78f6eea7eb9ab
    category: security
    technology:
    - c
- id: vuln-yara-1ecb0e66
  pattern: '(int) get_integer($OBJECT, $PATTERN, $INDEX)

    '
  pattern-not: 'dex_get_integer($OBJECT, $PATTERN, $INDEX)

    '
  languages:
  - c
  message: 'Direct casting of get_integer results without bounds checking can lead to integer overflow or undefined behavior.
    The vulnerability was fixed by introducing dex_get_integer which includes bounds checking. Always validate integer inputs
    before casting to prevent potential security issues.

    '
  severity: ERROR
  metadata:
    source-url: github.com/VirusTotal/yara/commit/1ecb0e66431bf5c5b4c2fdf622be969eb5f4a7cc
    category: security
    cwe:
    - CWE-190
    - CWE-681
    owasp: A9:2017-Using Components with Known Vulnerabilities
    technology:
    - c
- id: vuln-yara-4a342f01
  pattern: 'count = yr_max(64, ($INDEX + 1) * 2);

    '
  pattern-not: "count = 64;\nwhile (count <= $INDEX)\n  count *= 2;\n"
  message: 'The original code uses `yr_max(64, (index + 1) * 2)` to calculate the array size, which can lead to insufficient
    allocation if `index` is large. This can cause buffer overflow or out-of-bounds access. The fix uses a while loop to ensure
    the allocated size is sufficient by doubling the count until it exceeds the index. Always ensure dynamic array sizes are
    calculated safely to prevent memory corruption.

    '
  languages:
  - c
  severity: ERROR
  metadata:
    source-url: github.com/VirusTotal/yara/commit/4a342f01e5439b9bb901aff1c6c23c536baeeb3f
    category: security
    cwe:
    - CWE-787
    - CWE-125
    owasp: 'A1: Injection'
    technology:
    - c
