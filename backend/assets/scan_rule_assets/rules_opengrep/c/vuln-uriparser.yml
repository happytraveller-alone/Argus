rules:
- id: vuln-uriparser-987b046e
  patterns:
  - pattern: |
      if ((uri->hostData.ip4 == NULL) && (uri->hostData.ip6 == NULL)) {
        if (uri->hostData.ipFuture.first != NULL) {
          ...
        } else if (uri->hostText.first != NULL) {
          ...
        }
      }
  - pattern-not: |
      if (uri->hostData.ipFuture.first != NULL) {
        ...
      } else if (uri->hostText.first != NULL) {
        ...
      }
  languages:
  - c
  message: |
    The code previously checked for both ip4 and ip6 being NULL before handling ipFuture and hostText, which could lead to incorrect handling of host data. This has been fixed by directly checking ipFuture and hostText without the redundant ip4/ip6 check. This vulnerability could cause improper host data normalization, potentially leading to security issues in URI parsing. To fix this, remove the unnecessary ip4/ip6 NULL checks and handle ipFuture and hostText directly.
  severity: ERROR
  metadata:
    source-url: github.com/uriparser/uriparser/commit/987b046e41f407d17c622e580fc82a5e834b4329
    category: security
    cwe:
    - CWE-20
    owasp:
    - 'A1: Injection'
    references:
    - https://github.com/uriparser/uriparser/issues/123
    technology:
    - c
- id: vuln-uriparser-b1a34743
  patterns:
  - pattern: |
      if ((uri->hostText.first != NULL)
              && (uri->hostData.ip4 == NULL)
              && (uri->hostData.ip6 == NULL)) {
          ...
      }
  - pattern-not: |
      if (uri->hostText.first != NULL) {
          ...
      }
  languages:
  - c
  message: |
    Detected a potential double-free vulnerability in URI host text handling. The code checks for `hostText.first` being non-NULL without considering that `hostData.ipFuture` might share the same memory range, which could lead to freeing the same memory twice. The fix involves ensuring that `hostText` pointers are set to NULL when they reference the same memory as `hostData.ipFuture`.
  severity: ERROR
  metadata:
    source-url: github.com/uriparser/uriparser/commit/b1a34743bc1472e055d886e29e9b53f670eb3282
    category: security
    cwe:
    - CWE-415
    owasp:
    - A9:2017-Using Components with Known Vulnerabilities
    references:
    - https://cwe.mitre.org/data/definitions/415.html
    technology:
    - c
