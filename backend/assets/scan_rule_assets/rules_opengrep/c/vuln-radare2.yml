- id: vuln-radare2-a07dedb8
  pattern: |
    ut64 $PAGE_SIZE = $OBJ->chained_starts[$I]->page_size;
  pattern-not: |
    int $PAGE_SIZE = $OBJ->chained_starts[$I]->page_size;
    if ($PAGE_SIZE < 1) {
      $PAGE_SIZE = 4096;
    }
  languages:
  - c
  message: |
    Unsafe use of ut64 for page_size without validation can lead to integer overflow or unexpected behavior.
    This vulnerability occurs because the page_size variable is declared as ut64 (unsigned 64-bit integer) without checking for valid values.
    An attacker could potentially exploit this by providing a maliciously crafted binary with a page_size of 0 or a very large value.
    The fix involves changing the type to int and adding a validation check to ensure page_size is at least 1, defaulting to 4096 if invalid.
  severity: ERROR
  metadata:
    source-url: github.com/radareorg/radare2/commit/a07dedb804a82bc01c07072861942dd80c6b6d62
    category: security
    cwe:
    - CWE-190
    owasp:
    - A9:2021-Security Logging and Monitoring Failures
    technology:
    - c
- id: vuln-radare2-a8806994
  pattern: |
    memcpy($DST, $SRC, R_MIN($BUFSIZE - 1, $LEN));
    ...
    r_hex_bin2str($SRC, R_MIN($ADDRBYTES * $LEN, (sizeof($HEXBUF) - 1) / 2), $HEXBUF);
  pattern-not: |
    int $DSTLEN = R_MIN($BUFSIZE - 1, $LEN);
    int $CPYLEN = R_MIN($DSTLEN, $LEN);
    if ($CPYLEN > 0) {
      memcpy($DST, $SRC, $CPYLEN);
      ...
      r_hex_bin2str($SRC, R_MIN($ADDRBYTES * $LEN, (sizeof($HEXBUF) - 1) / 2), $HEXBUF);
    }
  languages:
  - c
  message: |
    This rule detects potential out-of-bounds write vulnerabilities caused by unsafe usage of `memcpy` and `r_hex_bin2str` without proper length checks. The original code could write beyond the allocated buffer size, leading to memory corruption. The fix introduces proper length checks and ensures that the copy operation is safe. Always validate buffer sizes before performing memory operations to prevent such vulnerabilities.
  severity: ERROR
  metadata:
    source-url: github.com/radareorg/radare2/commit/a88069940950999d5e2fd16cd7d16c7e956bf516
