- id: vuln-radare2-bd276ef2
  pattern: |
    for ($I = 0; $I < $COUNT && strlen($OP->txt) + $VAL < $BUFSIZE; $I++) {
      $TXTLEN = strlen($OP->txt);
      snprintf($OP->txt + $TXTLEN, $BUFSIZE - $TXTLEN, $FORMAT, $TABLE[$I]);
    }
  pattern-not: |
    for ($I = 0; $I < $COUNT && $TXTLEN + $VAL < $BUFSIZE; $I++) {
      snprintf($TXT, $TXTLEFT, $FORMAT, $TABLE[$I]);
      $TXTLEN = strlen($TXT);
      $TXT += $TXTLEN;
      $TXTLEFT -= $TXTLEN;
    }
  languages:
  - c
  message: |
    Detected a potential buffer overflow vulnerability caused by incorrect buffer size calculation in a loop. The issue arises from repeatedly using strlen() on the buffer within the loop, which can lead to miscalculations of remaining buffer space. This could result in buffer overflow and potential memory corruption. To fix this, maintain a separate variable tracking the buffer length and remaining space, and update it within the loop.
