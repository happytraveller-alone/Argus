  message: |
    The function `va2pa` is called with `hdr->mappingCount` directly, which can lead to out-of-bounds access if `hdr->mappingCount` exceeds the valid range. This vulnerability can result in memory corruption or crashes. To fix this, ensure `hdr->mappingCount` is bounded by `n_maps` using `R_MIN(hdr->mappingCount, n_maps)`.
