    r_anal_str_to_fcn($ANAL, $F, $VAR);
  pattern-not: |
    char *$VAR = r_str_newf(...), *$VAR_COPY = strdup($VAR);
    char *$FCNNAME = strrchr(r_str_trim_tail(strtok($VAR_COPY, "(")), ' ');
    if ($FCNNAME) {
      $FCNNAME++;
      if (strcmp($F->name, $FCNNAME)) {
        setFunctionName($CORE, $ADDR, $FCNNAME, false);
        $F = r_anal_get_fcn_in($ANAL, $ADDR, -1);
      }
      r_anal_str_to_fcn($ANAL, $F, $VAR);
    }
    free($VAR_COPY);
