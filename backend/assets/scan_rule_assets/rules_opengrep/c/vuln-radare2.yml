- id: vuln-radare2-3fcf41ed
  pattern: |
    ut8 *$BUF = calloc($EXPR1 - $EXPR2, 1);
    ...
    r_buf_read_at($BF_BUF, $FROM, $BUF, $EXPR1 - $EXPR2);
    ...
    if (($EXPR1 - $NEEDLE) > $CONST) {
      ...
    }
  pattern-not: |
    int $LEN = $EXPR1 - $EXPR2;
    ut8 *$BUF = calloc($LEN, 1);
    ...
    r_buf_read_at($BF_BUF, $FROM, $BUF, $LEN);
    ...
    if (($EXPR1 - $NEEDLE) > $CONST + $RC) {
      ...
    }
  languages:
  - c
  message: |
    Detected a potential integer overflow vulnerability due to repeated calculation of buffer length.
    The original code calculates `to - from` multiple times, which can lead to inconsistencies if the values change or if there's an overflow.
    The fix introduces a variable `len` to store the result of `to - from` and uses it consistently, preventing potential issues.
    To fix, store the result of length calculations in a variable and reuse it consistently.
  severity: ERROR
  metadata:
    source-url: github.com/radareorg/radare2/commit/3fcf41ed96ffa25b38029449520c8d0a198745f3
    category: security
    cwe:
    - CWE-190
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-radare2-40c9f50e
  pattern: |
    for ($J = 0; $J < $SECTION->size; $J += 8) {
      ...
    }
  pattern-not: |
    for ($J = 0; $J + 7 < $SECTION->size; $J += 8) {
      ...
    }
  languages:
  - c
  message: |
    This loop condition may lead to an out-of-bounds read due to insufficient bounds checking.
    The condition `j < section->size` does not account for the fact that 8 bytes are read at each iteration,
    which could result in reading past the end of the section buffer. The fix ensures that there are
    at least 8 bytes remaining before accessing the memory.
  severity: ERROR
  metadata:
    source-url: github.com/radare/radare2/commit/40c9f50e127be80b9d816bce2ab2ee790831aefd
    category: security
    cwe:
    - CWE-125
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/125.html
    technology:
    - c
- id: vuln-radare2-4d381168
  pattern: |
    RAnalFunction *$FUNC = r_anal_get_fcn_in($ANAL, $OFFSET, -1);
    ut32 $FUNC_SIZE = r_anal_function_size_from_entry($FUNC);
  pattern-not: |
    RAnalFunction *$FUNC = r_anal_get_fcn_in($ANAL, $OFFSET, R_ANAL_FCN_TYPE_ANY);
    ut32 $FUNC_SIZE = r_anal_function_size_from_entry($FUNC);
  languages:
  - c
  message: |
    Detected unsafe usage of `r_anal_get_fcn_in` with a hardcoded `-1` as the function type.
    This can lead to incorrect function resolution or unexpected behavior.
    Use `R_ANAL_FCN_TYPE_ANY` or a specific function type instead to ensure proper function resolution.
  severity: ERROR
  metadata:
    source-url: github.com/radareorg/radare2/commit/4d3811681a80f92a53e795f6a64c4b0fc2c8dd22
    category: security
    cwe:
