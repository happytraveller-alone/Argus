rules:
- id: vuln-radare2-021ad4d5
  pattern: |
    if ($VAR) {
      ...
      free($TOKENS);
      free($LBUF);
      return $FUNC($ACODE);
    }
  pattern-not: |
    if ($VAR) {
      ...
      goto fail;
    }
  languages:
  - c
  message: |
    Detected direct resource cleanup and return statements without using a common failure handler.
    This pattern can lead to inconsistent resource management and potential memory leaks.
    Use a common failure handler (goto fail) to ensure consistent resource cleanup.
  severity: ERROR
  metadata:
    source-url: github.com/radare/radare2/commit/021ad4d59bb14fd6439cc324692a0d38359d1f4c
    category: security
    cwe:
    - CWE-404
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-radare2-0a557045
  pattern: |
    ut16 $VAR = *($TYPE *)($PTR + $OFF);
    if ($SEGNUM > 0) {
      ...
    }
  pattern-not: |
    if ($OFF > $PTR->ne_header->EntryTableLength) {
      break;
    }
    ut16 $VAR = r_read_le16($PTR + $OFF);
    if ($SEGNUM > 0 && $SEGNUM < $PTR->ne_header->SegCount) {
      ...
    }
  languages:
  - c
  message: |
    The vulnerability involves unsafe pointer arithmetic and lack of bounds checking when reading from a buffer. This can lead to out-of-bounds memory access, potentially causing crashes or arbitrary code execution. The fix includes proper bounds checking and using a safer function (r_read_le16) to read the value. Always validate offsets and use safer memory access functions when dealing with binary data.
  severity: ERROR
  metadata:
    source-url: github.com/radareorg/radare2/commit/0a557045476a2969c7079aec9eeb29d02f2809c6
    category: security
    cwe:
    - CWE-125
    - CWE-787
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/125.html
    - https://cwe.mitre.org/data/definitions/787.html
    technology:
    - c
- id: vuln-radare2-153bcdc2
  pattern: |
    char *$NAME;
    if ($COND) {
      ...
      $NAME = __read_nonnull_str_at($BUF, $OFFSET);
    } else {
      $NAME = r_str_newf($FORMAT, ...);
    }
    ...
    $IMP->name = r_str_newf("%s.%s", $NAME, __func_name_from_ord($NAME, $ORD));
  pattern-not: |
    char *$NAME = NULL;
    if ($COND) {
      ...
      $NAME = __read_nonnull_str_at($BUF, $OFFSET);
    } else if ($INDEX > 0) {
      ...
    }
    ...
    char *$FNAME = __func_name_from_ord($NAME, $ORD);
    $IMP->name = r_str_newf("%s.%s", $NAME, $FNAME);
    free($FNAME);
  languages:
  - c
  message: |
    Detected a potential memory leak and unsafe string handling vulnerability. The original code
    fails to free dynamically allocated memory and does not properly handle the case where
    the index is out of bounds. This could lead to memory leaks and undefined behavior.
    The fix ensures proper memory management and adds a bounds check for the index.
  severity: ERROR
  metadata:
    source-url: github.com/radareorg/radare2/commit/153bcdc29f11cd8c90e7d639a7405450f644ddb6
    category: security
    cwe:
    - CWE-401
    - CWE-190
    owasp: 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-radare2-1f37c04f
  pattern: |
    for (i = 0; i < $SIZE; i += $STEP) {
      ...
    }
  pattern-not: |
    for (i = 0; (i + $OFFSET) < $SIZE; i += $STEP) {
      ...
    }
  languages:
  - c
  message: |
    Detected a potential buffer overflow in loop iteration. The loop condition does not account for the step size, which could lead to accessing memory beyond the intended bounds. This can cause undefined behavior, crashes, or security vulnerabilities. To fix, ensure the loop condition checks that the index plus the step size minus one is less than the size limit.
  severity: ERROR
  metadata:
    source-url: github.com/radareorg/radare2/commit/1f37c04f2a762500222dda2459e6a04646feeedf
