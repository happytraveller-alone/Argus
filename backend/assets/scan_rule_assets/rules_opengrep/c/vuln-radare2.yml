    owasp: 'A9: Using Components with Known Vulnerabilities'
    technology:
    - c
- id: vuln-radare2-52b15264
  pattern: |
    for ($I = 0; $I < $COUNT && strlen($TXT) < $BUFSIZE; $I++) {
      snprintf($TXT + strlen($TXT), $BUFSIZE, $FORMAT, $TABLE[$I]);
    }
  pattern-not: |
    for ($I = 0; $I < $COUNT && strlen($TXT) + $OFFSET < $BUFSIZE; $I++) {
      $OPTXTLEN = strlen($TXT);
      snprintf($TXT + $OPTXTLEN, $BUFSIZE - $OPTXTLEN, $FORMAT, $TABLE[$I]);
    }
  languages:
  - c
  message: |
    This code is vulnerable to buffer overflow due to incorrect buffer size calculation in snprintf.
    The original code does not account for the length of the string being appended, which can lead to writing beyond the allocated buffer size.
    To fix this, ensure that the buffer size passed to snprintf is correctly calculated by subtracting the current length of the string from the total buffer size.
  severity: ERROR
  metadata:
    source-url: github.com/radareorg/radare2/commit/52b1526443c1f433087928291d1c3d37a5600515
    category: security
    cwe:
    - CWE-120
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
    - c
- id: vuln-radare2-59a9dfb6
  pattern: |
    RRegItem *$VAR;
    ...
    r_reg_set_value($REG, $VAR, $EXPR);
  pattern-not: |
    RRegItem *$VAR = NULL;
    ...
    ut64 $N = r_num_math($NUM, $ARG);
    r_reg_set_value($REG, $VAR, $N);
  languages:
  - c
  message: |
    The code directly uses the result of `r_num_math` in `r_reg_set_value` without checking if the `RRegItem` pointer is valid. This can lead to undefined behavior if the pointer is NULL. The fix involves initializing the `RRegItem` pointer to NULL and using an intermediate variable to store the result of `r_num_math` before passing it to `r_reg_set_value`.
  severity: ERROR
  metadata:
    source-url: github.com/radareorg/radare2/commit/59a9dfb60acf8b5c0312061cffd9693fc9526053
    category: security
    cwe:
    - CWE-476
    owasp:
    - A9:2017-Using Components with Known Vulnerabilities
    technology:
    - c
- id: vuln-radare2-637f4bd1
  pattern: |
    const ut8 *$DUMP = &$BLOCK.data[++$I];
    $OFFSET = r_sleb128(&$DUMP, &$BLOCK.data[$LOC->block.length]);
  pattern-not: |
    const ut8 *$DUMP = $BLOCK.data + $I;
    if ($LOC->block.length > $BLOCK.length) {
      return NULL;
    }
    $OFFSET = r_sleb128(&$DUMP, $BLOCK.data + $LOC->block.length);
  languages:
  - c
  message: |
    The code contains a potential out-of-bounds read vulnerability due to insufficient bounds checking when processing DWARF block data. The vulnerability occurs when accessing memory locations without verifying that the length of the block being processed is within the bounds of the available data. This could lead to memory corruption or information disclosure. The fix adds a bounds check to ensure the block length does not exceed the available data length before processing.
  severity: ERROR
  metadata:
    source-url: github.com/radare/radare2/commit/637f4bd1af6752e28e0a9998e954e2e9ce6fa992
    category: security
    cwe:
    - 'CWE-125: Out-of-bounds Read'
    owasp:
    - 'A1: Injection'
    technology:
    - c
