- id: vuln-radare2-c84b7232
  pattern: |
    ut64 offset = va2pa($VAR, hdr->mappingCount, $MAPS, $BUF, 0, NULL, NULL);
  pattern-not: |
    ut64 offset = va2pa($VAR, R_MIN(hdr->mappingCount, $N_MAPS), $MAPS, $BUF, 0, NULL, NULL);
  languages:
