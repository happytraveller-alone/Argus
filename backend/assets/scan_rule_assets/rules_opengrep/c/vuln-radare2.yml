- id: vuln-radare2-27fe8031
  pattern: |
    for (i = 0; i < $LIST.number_of_entries; i++) {
      ...
    }
  pattern-not: |
    for (i = 0; i < $LIST.number_of_entries && $OFFSET < $OBJ->size; i++) {
      ...
    }
  languages:
