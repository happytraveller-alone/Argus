rules:
- id: vuln-gpac-0fc71487
  patterns:
  - pattern: |
      char $VAR[500];
      ...
      $VAR[...] = ...;
  - pattern-not: |
      char $VAR[1025];
      ...
      $VAR[1024] = 0;
      if (len>1024) {
        ...
      }
  languages:
  - c
  message: |
    Detected a potential buffer overflow vulnerability due to insufficient buffer size.
    The original code uses a fixed-size buffer of 500 bytes, which may not be sufficient for all inputs, leading to buffer overflow.
    This can be exploited to execute arbitrary code or cause a denial of service.
    To fix this, increase the buffer size to 1025 bytes and add a length check to ensure the input does not exceed the buffer size.
  severity: ERROR
  metadata:
    source-url: github.com/gpac/gpac/commit/0fc714872ba4536a1190f93aa278b6e08f8c60df
    category: security
    cwe:
    - CWE-120
    owasp:
    - 'A1: Injection'
    references:
    - https://cwe.mitre.org/data/definitions/120.html
    technology:
    - c
- id: vuln-gpac-14ec709a
  patterns:
  - pattern: |
      if (version == 1 && read->jpeg_hdr_size) {
        ...
