  message: |
    This rule detects an off-by-one error in the comparison of sample_index with traf->sdtp->sampleCount.
    The original code used a '>' comparison, which could lead to accessing an out-of-bounds index.
    This vulnerability can cause undefined behavior or crashes.
    The fix changes the comparison to '>=' to properly handle the boundary condition.
