- id: vuln-gpac-3fcf66c6
  patterns:
  - pattern: |
      $SIZE = (u32) $PTR->size;
      $STR = (char *)gf_malloc(sizeof(char)*$SIZE);
      ...
      while ($SIZE) {
        $STR[$I] = gf_bs_read_u8($BS);
        $SIZE--;
        if (!$STR[$I])
          break;
        $I++;
      }
      if ($I) $PTR->config = gf_strdup($STR);
      gf_free($STR);
  - pattern-not: |
      $PTR->config = (char *)gf_malloc(sizeof(char)*((u32) $PTR->size+1));
      gf_bs_read_data($BS, $PTR->config, (u32) $PTR->size);
      $PTR->config[$PTR->size] = 0;
  languages:
  - c
  message: |
    The code manually reads data into a buffer without properly null-terminating it,
    which can lead to buffer overflows or undefined behavior. The vulnerability occurs
    because the allocated buffer size does not account for the null terminator, and
    the manual reading loop does not ensure proper termination. The fix involves
    allocating an extra byte for the null terminator and using gf_bs_read_data to
    safely read the data. Always ensure buffers are properly null-terminated when
    handling string data.
  severity: ERROR
  metadata:
    source-url: https://github.com/gpac/gpac/commit/3fcf66c6031da966cf33ee89bcbefa2f8bec4b02
    category: security
    cwe:
    - CWE-170
    owasp:
    - 'A1: Injection'
    technology:
    - c
