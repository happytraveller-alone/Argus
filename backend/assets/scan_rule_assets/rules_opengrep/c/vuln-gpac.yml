        if ($PREV_NODE) $E = gf_node_unregister($PREV_NODE, $NODE);
      }
  - pattern-not: |
      if ($FIELD.fieldType == GF_SG_VRML_SFNODE) {
        if (*((GF_Node **) $FIELD->far_ptr) != NULL) {
          gf_node_unregister(*((GF_Node **) $FIELD->far_ptr), $NODE);
          *((GF_Node **) $FIELD->far_ptr) = NULL;
