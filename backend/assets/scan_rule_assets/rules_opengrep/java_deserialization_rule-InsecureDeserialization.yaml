rules:
- id: java_deserialization_rule-InsecureDeserialization
  languages:
  - java
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-inside: "$FUNC (..., byte[] $X, ...) { \n  ... \n}\n"
    - focus-metavariable: $X
  pattern-propagators:
  - pattern: $V = new ObjectInputStream($X)
    from: $X
    to: $V
  pattern-sinks:
  - pattern: $V.readObject(...)
  message: "Deserialization attacks exploit the process of reading serialized data\
    \ and turning it back into an\nobject. By constructing malicious objects and serializing\
    \ them, an adversary may attempt to:\n\n- Inject code that is executed upon object\
    \ construction, which occurs during the deserialization process.\n- Exploit mass\
    \ assignment by including fields that are not normally a part of the serialized\
    \ data but are\n  read in during deserialization.\n\nConsider safer alternatives\
    \ such as serializing data in the JSON format. Ensure any format chosen allows\n\
    the application to specify exactly which object types are allowed to be deserialized.\
    \ Additionally, when\ndeserializing, never deserialize to base object types like\
    \ `Object` and only cast to the exact object\ntype that is expected.\n\nTo protect\
    \ against mass assignment, only allow deserialization of the specific fields that\
    \ are required.\nIf this is not easily done, consider creating an intermediary\
    \ type that can be serialized with only the\nnecessary fields exposed.\n\nFor\
    \ more details on deserialization attacks in general, see OWASP's guide:\nhttps://cheatsheetseries.owasp.org/cheatsheets/Deserialization_Cheat_Sheet.html\n"
  severity: WARNING
  metadata:
    shortDescription: Deserialization of Untrusted Data
    category: security
    cwe: CWE-502
    owasp:
    - A8:2017-Insecure Deserialization
    - A08:2021-Software and Data Integrity Failures
    technology:
    - java
    security-severity: Medium
