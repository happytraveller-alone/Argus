rules:
- id: samesite_cookie
  severity: WARNING
  metadata:
    author: Maurizio Siddu
    references:
    - https://cwe.mitre.org/data/definitions/1275.html
    - https://owasp.org/www-community/SameSite
    category: security
    cwe:
    - 'CWE-1275: SameSite Cookie Attribute Not Set or Incorrect'
    - 'CWE-352: Cross-Site Request Forgery (CSRF) — misconfigured/missing SameSite
      increases risk of CSRF attacks'
    - 'CWE-200: Exposure of Sensitive Information to an Unauthorized Actor'
  message: This Java application seems having the attribute SameSite disabled on some
    cookies, if these cookies contain sensitive information (i.e. session cookies)
    the flag SameSite should not be configured to None value. When the SameSite attribute
    is enabled (configured to Strict or Lax values), prevents the browser from sending
    the cookie along with cross-site requests, then provides some mitigations against
    CSRF attacks. It is recommended to properly set the security flag SameSite on
    the session cookies of the web application.
  languages:
  - java
  patterns:
  - pattern-not-inside: $COOKIE.setValue("");
  - pattern-not-inside: $COOKIE.setValue(null);
  - pattern-not-inside: "$RET $METHOD(...) {\n  ...\n  $COOKIE = ResponseCookie.from(...)\n\
      \    . ...\n    .sameSite(\"=~/(Strict|strict|Lax|lax)/\")\n    . ...\n    ;\n\
      \  ...\n}\n"
  - pattern-either:
    - patterns:
      - pattern: $RESPONSE.setHeader("Set-Cookie", $ITEM);
      - metavariable-regex:
          metavariable: $ITEM
          regex: (?i).*(SameSite=none).*$
    - patterns:
      - pattern: $RESPONSE.addHeader("Set-Cookie", $ITEM);
      - metavariable-regex:
          metavariable: $ITEM
          regex: (?i).*(SameSite=none).*$
    - patterns:
      - pattern-either:
        - pattern: $RESPONSE.addCookie($COOKIE);
        - pattern-inside: "$RET $METHOD(...) {\n  ...\n  $COOKIE = ResponseCookie.from(...)\n\
            \    . ...\n    ;\n  ...\n}\n"
        - pattern: $COOKIE.setSameSite("=~/(None|none)/");
