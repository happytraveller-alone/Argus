rules:
- id: aws-insecure-redshift-ssl-configuration
  patterns:
  - pattern: "resource \"aws_redshift_parameter_group\" $ANYTHING {\n  ...\n}\n"
  - pattern-not-inside: "resource \"aws_redshift_parameter_group\" $ANYTHING {\n \
      \ ...\n  parameter {\n    name  = \"require_ssl\"\n    value = \"true\"\n  }\n\
      \  ...\n}\n"
  - pattern-not-inside: "resource \"aws_redshift_parameter_group\" $ANYTHING {\n \
      \ ...\n  parameter {\n    name  = \"require_ssl\"\n    value = true\n  }\n \
      \ ...\n}\n"
  message: Detected an AWS Redshift configuration with a SSL disabled. To fix this,
    set your `require_ssl` to `"true"`.
  metadata:
    category: security
    technology:
    - terraform
    - aws
    owasp:
    - A03:2017 - Sensitive Data Exposure
    - A02:2021 - Cryptographic Failures
    cwe:
    - 'CWE-326: Inadequate Encryption Strength'
    references:
    - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    subcategory:
    - vuln
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: MEDIUM
  languages:
  - hcl
  severity: WARNING
