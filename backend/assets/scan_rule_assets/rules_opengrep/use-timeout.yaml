rules:
- id: use-timeout
  patterns:
  - pattern-not: requests.$W(..., timeout=$N, ...)
  - pattern-not: requests.$W(..., **$KWARGS)
  - pattern-either:
    - pattern: requests.request(...)
    - pattern: requests.get(...)
    - pattern: requests.post(...)
    - pattern: requests.put(...)
    - pattern: requests.delete(...)
    - pattern: requests.head(...)
    - pattern: requests.patch(...)
  fix-regex:
    regex: (.*)\)
    replacement: \1, timeout=30)
  message: "By default, 'requests' calls wait until the connection is closed.\nThis\
    \ means a 'requests' call without a timeout will hang the program\nif a response\
    \ is never received. Consider setting a timeout for all \n'requests'.\n"
  languages:
  - python
  severity: WARNING
  metadata:
    cwe:
    - 'CWE-400: Uncontrolled Resource Consumption'
    - 'CWE-770: Allocation of Resources Without Limits or Throttling'
