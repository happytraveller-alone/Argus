rules:
- id: detect-angular-trust-as-method
  patterns:
  - pattern-either:
    - pattern: '$SOURCE = $scope.$INPUT;

        $sce.trustAs($sce.$TRUSTMETHOD,$SOURCE);

        '
    - pattern: '$sce.trustAs($sce.$TRUSTMETHOD,$INPUT);

        '
  - pattern-inside: "app.controller(..., function($scope,$sce){ \n...\n});\n"
  message: 'The use of $sce.trustAs can be dangerous if unsantiized user input flows
    through this API.

    '
  languages:
  - javascript
  metadata:
    references:
    - https://docs.angularjs.org/api/ng/service/$sce
    - https://owasp.org/www-chapter-london/assets/slides/OWASPLondon20170727_AngularJS.pdf
    cwe:
    - 'CWE-79: Cross-site Scripting'
    - 'CWE-116: Improper Encoding or Escaping of Output'
    - 'CWE-20: Improper Input Validation'
  fix: ''
  severity: WARNING
