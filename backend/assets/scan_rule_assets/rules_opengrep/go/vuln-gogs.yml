rules:
- id: vuln-gogs-012a1ba1
  pattern: 'conf.App.Version = "0.12.8"

    '
  pattern-not: 'conf.App.Version = "0.12.9"

    '
  languages:
  - go
  message: 'The version of the application is outdated and may contain security vulnerabilities.

    Using an outdated version can expose the application to known exploits and attacks.

    Update to the latest version to mitigate these risks.

    '
  severity: ERROR
  metadata:
    source-url: github.com/gogs/gogs/commit/012a1ba19ed2f8f5185be4254f655ba6c4b34db2
    category: security
    cwe:
    - CWE-1104
    owasp:
    - 'A9: Using Components with Known Vulnerabilities'
    references:
    - https://cwe.mitre.org/data/definitions/1104.html
    technology:
    - go
- id: vuln-gogs-4677b469
  pattern: "if len($SID) > 0 && $PROVIDER.Exist($SID) {\n  return $READ($SID)\n}\n"
  pattern-not: "if len($SID) > 0 && $VALID($SID) && $PROVIDER.Exist($SID) {\n  return $PROVIDER.Read($SID)\n}\n"
  languages:
  - go
  message: 'Detected a session ID validation bypass vulnerability. The code checks if a session ID exists but does not validate
    its format, which could allow session file forgery attacks. Ensure session IDs are properly validated using a function
    like `validSessionID` to check for correct length and character set.

    '
  severity: ERROR
  metadata:
    source-url: github.com/gogs/gogs/commit/4677b469044bc23e98b4cd265495dbffb9be335a
    category: security
    cwe:
    - CWE-20
    owasp:
    - 'A2: Broken Authentication'
    technology:
    - go
