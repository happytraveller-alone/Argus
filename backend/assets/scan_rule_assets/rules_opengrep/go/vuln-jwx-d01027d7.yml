rules:
- id: vuln-jwx-d01027d7
  patterns:
  - pattern: |
      func uncompress($PLAINTEXT []byte) ([]byte, error) {
        return ioutil.ReadAll(flate.NewReader(bytes.NewReader($PLAINTEXT)))
      }
  - pattern-not: |
      func uncompress($SRC []byte, $MAXBUFFERSIZE int64) ([]byte, error) {
        ...
        for {
          $N, $READERR := $R.Read($BUF[:])
          $SOFAR += int64($N)
          if $SOFAR > $MAXBUFFERSIZE {
            return nil, errors.New(`compressed payload exceeds maximum allowed size`)
          }
          ...
        }
      }
  languages:
  - go
  message: |
    The function `uncompress` lacks a maximum buffer size check, which could lead to
    unbounded memory allocation when decompressing maliciously crafted input. This
    vulnerability could be exploited in a denial-of-service attack by sending a
    compressed payload that expands to a very large size. To fix this, implement a
    maximum buffer size check during decompression, as shown in the patched version.
  severity: ERROR
  metadata:
    source-url: github.com/lestrrat-go/jwx/commit/d01027d74c7376d66037a10f4f64af9af26a7e34
    category: security
    cwe:
    - CWE-770
    owasp:
    - A1:2017-Injection
    references:
    - https://cwe.mitre.org/data/definitions/770.html
    technology:
    - go
