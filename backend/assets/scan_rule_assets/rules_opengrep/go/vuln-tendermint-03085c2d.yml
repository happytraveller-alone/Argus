rules:
- id: vuln-tendermint-03085c2d
  pattern: |
    &http.Transport{
        Dial: $DIAL,
    }
  pattern-not: |
    &http.Transport{
        DisableCompression: true,
        Dial: $DIAL,
    }
  languages:
  - go
  message: |
    The HTTP transport configuration is missing `DisableCompression: true`, which can lead to GZIP-bomb DoS attacks.
    An attacker could exploit this by sending a small, highly compressed payload that expands to a large size when decompressed,
    consuming excessive server resources. To fix this, set `DisableCompression: true` in the http.Transport configuration.
  severity: ERROR
  metadata:
    source-url: github.com/tendermint/tendermint/commit/03085c2da23b179c4a51f59a03cb40aa4e85a613
    category: security
    cwe:
    - CWE-409
    owasp:
    - A06:2021-Vulnerable and Outdated Components
    references:
    - https://en.wikipedia.org/wiki/Zip_bomb
    technology:
    - go
