rules:
- id: vuln-docker-73db8c77
  pattern: |
    for _, $M := range []string{"password", "secret", "jointoken", "unlockkey", "signingcakey"} {
      ...
    }
  pattern-not: |
    for _, $M := range $SCRUB {
      ...
    }
  languages:
  - go
  message: |
    Sensitive data fields such as "password", "secret", "jointoken", "unlockkey", and "signingcakey" should be scrubbed from logs to prevent exposure of sensitive information. The code was updated to use a centralized list of fields to scrub, ensuring consistent handling of sensitive data. Update the code to use a centralized list of fields to scrub.
  severity: ERROR
  metadata:
    source-url: github.com/docker/docker/commit/73db8c77bfb2d0cbdf71ce491f3d3e66c9dd5be6
    category: security
    cwe:
    - CWE-200
    - CWE-532
    owasp:
    - A3:2017-Sensitive Data Exposure
    references:
    - https://owasp.org/www-project-top-ten/2017/A3_2017-Sensitive_Data_Exposure
    technology:
    - go
- id: vuln-docker-c9379eb3
  pattern: |
    func parseSecurityOpt($CONTAINER *Container, $CONFIG *runconfig.Config) error {
      ...
      $LABEL_OPTS = append($LABEL_OPTS, $CON[1])
      ...
      $CONTAINER.ProcessLabel, $CONTAINER.MountLabel, $ERR = label.InitLabels($LABEL_OPTS)
      ...
    }
  pattern-not: |
    func parseSecurityOpt($CONTAINER *Container, $CONFIG *runconfig.HostConfig) error {
      ...
      $LABELOPTS = append($LABELOPTS, $CON[1])
      ...
      $CONTAINER.ProcessLabel, $CONTAINER.MountLabel, $ERR = label.InitLabels($LABELOPTS)
      ...
    }
  languages:
  - go
  message: |
    The function `parseSecurityOpt` uses an incorrect configuration type (`runconfig.Config`) for handling security options. This can lead to misconfiguration of container security settings. The correct type to use is `runconfig.HostConfig`. This vulnerability could allow for incorrect security settings to be applied to containers, potentially leading to security breaches. To fix this, update the function signature to use `runconfig.HostConfig` instead of `runconfig.Config`.
  severity: ERROR
  metadata:
    source-url: github.com/docker/docker/commit/c9379eb3fbbc484c056f5a5e49d8d0b755a29c45
    category: security
    cwe:
    - 'CWE-269: Improper Privilege Management'
    owasp:
    - 'A6: Security Misconfiguration'
    references:
    - https://docs.docker.com/engine/security/security/
    technology:
    - go
