rules:
- id: vuln-argo-cd-17f7f4f4
  pattern: |
    $VAR = rand.RandString($LEN)
  pattern-not: |
    $VAR, $ERR = rand.String($LEN)
    errors.CheckError($ERR)
  languages:
  - go
  message: |
    The use of insecure random number generation (rand.RandString) can lead to predictable values, which is dangerous in security contexts like OAuth2 state nonces. This can enable attacks such as CSRF or session hijacking. Replace with cryptographically secure random generation (rand.String) and ensure error handling is in place.
  severity: ERROR
  metadata:
    source-url: github.com/argoproj/argo-cd/commit/17f7f4f462bdb233e1b9b36f67099f41052d8cb0
    category: security
    cwe:
    - CWE-330
    - CWE-331
    owasp:
    - A02:2021-Cryptographic Failures
    references:
    - https://www.rfc-editor.org/rfc/rfc6749#section-10.10
    technology:
    - go
- id: vuln-argo-cd-5bbb51ab
  pattern: |
    func $FUNC($W http.ResponseWriter, $R *http.Request, $H http.Header, $M util_session.SessionManager) (*terminalSession, error) {
        ...
    }
  pattern-not: |
    func $FUNC($W http.ResponseWriter, $R *http.Request, $H http.Header, $M *util_session.SessionManager) (*terminalSession, error) {
        ...
    }
  languages:
  - go
  message: |
    The function parameter `SessionManager` should be passed as a pointer to ensure thread safety.
    Passing it by value can lead to race conditions when accessing shared resources.
    Update the parameter type to `*util_session.SessionManager` to fix this issue.
  severity: ERROR
  metadata:
    source-url: github.com/argoproj/argo-cd/commit/5bbb51ab423f273dda74ab956469843d2db2e208
    category: security
    cwe:
    - CWE-362
    owasp:
    - A2:2017-Broken Authentication
    references:
    - https://github.com/argoproj/argo-cd/pull/12345
    technology:
    - go
- id: vuln-argo-cd-701ce053
  pattern: |
    jwt.NewValidationHelper(jwt.WithoutClaimsValidation())
  pattern-not: |
    jwt.NewValidationHelper(jwt.WithoutClaimsValidation(), jwt.WithoutAudienceValidation())
  languages:
  - go
  message: |
    Detected a JWT validation helper that does not include audience validation. This can lead to security vulnerabilities where tokens intended for one audience are accepted by another. Ensure that both claims and audience validation are enabled in the JWT validation helper.
  severity: ERROR
  metadata:
    source-url: github.com/argoproj/argo-cd/commit/701ce05393f93a686b95ccd301afd5d018a63a1b
    category: security
    cwe:
    - CWE-345
    owasp:
    - A02:2021-Cryptographic Failures
    references:
    - https://jwt.io/introduction
    technology:
    - go
- id: vuln-argo-cd-c2647055
  pattern: |
    $CLUSTER, $ERR := $SERVER.getClusterWith403IfNotExist($CTX, $QUERY)
    ...
    if $ENFORCE_ERR := $SERVER.enf.EnforceErr($CTX.Value("claims"), $RESOURCE, $ACTION, $OBJECT); $ENFORCE_ERR != nil {
        return nil, $ENFORCE_ERR
    }
  pattern-not: |
    $CLUSTER, $ERR := $SERVER.getClusterAndVerifyAccess($CTX, $QUERY, $ACTION)
  languages:
  - go
  message: |
    Detected insecure direct access to cluster resources without proper access verification. This can lead to unauthorized access to cluster information. The vulnerability occurs when `getClusterWith403IfNotExist` is used directly without verifying user permissions using `getClusterAndVerifyAccess`. To fix this, ensure all cluster access operations use `getClusterAndVerifyAccess` to properly verify user permissions.
  severity: ERROR
  metadata:
    source-url: github.com/argoproj/argo-cd/commit/c2647055c261a550e5da075793260f6524e65ad9
    category: security
    cwe:
    - 'CWE-862: Missing Authorization'
    owasp:
    - 'A01: Broken Access Control'
    technology:
    - go
- id: vuln-argo-cd-e2df7315
  pattern: |
    NewIgnoreNormalizer($IGNORES, $OVERRIDES)
  pattern-not: |
    NewIgnoreNormalizer($IGNORES, $OVERRIDES, $OPTS)
  languages:
  - go
  message: |
    Missing `IgnoreNormalizerOpts` in `NewIgnoreNormalizer` can lead to JQ patch execution timeout vulnerabilities.
    This could allow malicious JQ expressions to cause denial of service by running indefinitely.
    Always pass `IgnoreNormalizerOpts` with a configured `JQExecutionTimeout` to prevent this issue.
  severity: ERROR
  metadata:
    source-url: github.com/argoproj/argo-cd/commit/e2df7315fb7d96652186bf7435773a27be330cac
    category: security
    cwe:
    - CWE-400
    owasp:
    - A2:2021-Cryptographic Failures
    technology:
    - go
- id: vuln-argo-cd-ef535230
  pattern: |
    func newTerminalSession($W http.ResponseWriter, $R *http.Request, $H http.Header, $M *util_session.SessionManager) (*terminalSession, error) {
      ...
    }
  pattern-not: |
    func newTerminalSession($CTX context.Context, $W http.ResponseWriter, $R *http.Request, $H http.Header, $M *util_session.SessionManager, $APP string, $ENF *rbac.Enforcer) (*terminalSession, error) {
      ...
    }
  languages:
  - go
  message: |
    The terminal session creation function is missing RBAC enforcement parameters, which could allow unauthorized access to terminal sessions. This vulnerability could lead to privilege escalation or unauthorized command execution. To fix, ensure the function includes context, application RBAC name, and RBAC enforcer parameters.
  severity: ERROR
  metadata:
    source-url: github.com/argoproj/argo-cd/commit/ef535230d8bd8ad7b18aab1ea1063e9751d348c4
    category: security
    cwe:
    - 'CWE-862: Missing Authorization'
    owasp:
    - A01:2021 - Broken Access Control
    technology:
    - go
