rules:
- id: vuln-helm-055dd41c
  patterns:
  - pattern: |
      if err := yaml.Unmarshal($DATA, $VAR); $ERR {
        ...
      }
  - pattern-not: |
      if err := yaml.UnmarshalStrict($DATA, $VAR); $ERR {
        ...
      }
  languages:
  - go
  message: |
    Using yaml.Unmarshal instead of yaml.UnmarshalStrict can lead to security vulnerabilities by silently ignoring unknown fields. This can allow malicious YAML content to bypass validation. Always use yaml.UnmarshalStrict to ensure strict parsing and validation of YAML content.
  severity: ERROR
  metadata:
    source-url: github.com/helm/helm/commit/055dd41cbe53ce131ab0357524a7f6729e6e40dc
    category: security
    cwe:
    - CWE-20
    owasp:
    - A03:2021-Injection
    references:
    - https://helm.sh/docs/chart_template_guide/yaml_techniques/
    technology:
    - go
- id: vuln-helm-293b50c6
  patterns:
  - pattern: |
      engine.Render($CHART, $VALUES)
  - pattern-not: |
      $E := engine.New($CONFIG)
      $E.EnableDNS = $DNS
      $E.Render($CHART, $VALUES)
  languages:
  - go
  message: |
    Detected direct usage of engine.Render without enabling DNS lookups.
    This can lead to DNS resolution vulnerabilities in templating.
    To fix this, create a new engine instance with EnableDNS set appropriately.
  severity: ERROR
  metadata:
    source-url: github.com/helm/helm/commit/293b50c65d4d56187cd4e2f390f0ada46b4c4737
    category: security
    cwe:
    - CWE-200
    owasp:
    - A03:2021-Injection
    references:
    - https://helm.sh/docs/chart_template_guide/functions_and_pipelines/#using-the-sprig-library
    technology:
    - go
- id: vuln-helm-a34f3115
  patterns:
  - pattern: |
      if $DV, $OK := $DST[$KEY]; $OK && istable($DV) {
        ...
      } else if !$OK {
        ...
      }
  - pattern-not: |
      if $DV, $OK := $DST[$KEY]; $OK && $DV == nil {
        delete($DST, $KEY)
      } else if !$OK {
        $DST[$KEY] = $VAL
      } else if istable($VAL) {
        if istable($DV) {
          CoalesceTables($DV.(map[string]interface{}), $VAL.(map[string]interface{}))
        } else {
          ...
        }
      }
  languages:
  - go
  message: |
    The code fails to properly handle nested map deletions when coalescing values, which can lead to unexpected data retention and potential security issues. This vulnerability can cause sensitive information to be inadvertently retained in the resulting map. The fix ensures that nil values are properly deleted from nested maps. To fix this, ensure that nil values are explicitly deleted from the map before proceeding with the coalescing logic.
  severity: ERROR
  metadata:
    source-url: github.com/helm/helm/commit/a34f3115395474fbf3b8a167ef3473eb8b0952e9
    category: security
    cwe:
    - CWE-200
    owasp:
    - A3:2017-Sensitive Data Exposure
    references:
    - https://cwe.mitre.org/data/definitions/200.html
    technology:
    - go
