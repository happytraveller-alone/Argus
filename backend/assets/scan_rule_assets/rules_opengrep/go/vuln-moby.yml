rules:
- id: vuln-moby-f0ab919f
  pattern: 'idtools.MkdirAllAndChown($PATH, 0701, idtools.CurrentIdentity())

    '
  pattern-not: 'idtools.MkdirAllAndChown($PATH, 0710, idtools.Identity{UID: idtools.CurrentIdentity().UID, GID: $GID})

    '
  languages:
  - go
  message: 'Detected insecure directory creation with mode 0701. This mode allows excessive permissions and may expose sensitive
    data. Use mode 0710 and ensure proper GID mapping for secure directory creation.

    '
  severity: ERROR
  metadata:
    source-url: github.com/moby/moby/commit/f0ab919f518c47240ea0e72d0999576bb8008e64
    category: security
    cwe:
    - CWE-732
    owasp:
    - A01:2021-Broken Access Control
    technology:
    - go
- id: vuln-moby-fc274cd2
  pattern: "func sendBody($URL string, $HEADER http.Header) bool {\n  ...\n  if strings.HasSuffix($URL, \"/auth\") {\n   \
    \ ...\n  }\n}\n"
  pattern-not: "func sendBody($INURL string, $HEADER http.Header) bool {\n  $U, $ERR := url.Parse($INURL)\n  if $ERR != nil\
    \ {\n    return false\n  }\n  $ISAUTH, $ERR := isAuthEndpoint($U.Path)\n  if $ISAUTH || $ERR != nil {\n    ...\n  }\n\
    }\n"
  languages:
  - go
  message: 'The function `sendBody` uses a simple string suffix check to determine if a URL is an auth endpoint, which can
    lead to false positives. This can cause sensitive data to be sent to unauthorized endpoints. The fix involves properly
    parsing the URL and using a regex pattern to accurately identify auth endpoints. Update the code to use `url.Parse` and
    `isAuthEndpoint` for more secure endpoint validation.

    '
  severity: ERROR
  metadata:
    source-url: github.com/moby/moby/commit/fc274cd2ff4cf3b48c91697fb327dd1fb95588fb
    category: security
    cwe:
    - CWE-20
    owasp:
    - A1:2017-Injection
    references:
    - https://tools.ietf.org/html/rfc7230
    technology:
    - go
