rules:
- id: vuln-jaeger-360c38be
  patterns:
  - pattern: |
      type $STRUCT struct {
          Password string `mapstructure:"password"`
      }
  - pattern-not: |
      type $STRUCT struct {
          Password string `mapstructure:"password" json:"-"`
      }
  languages:
  - go
  message: |
    Sensitive fields like passwords should not be exposed in JSON output.
    Adding `json:"-"` tag prevents the field from being serialized, reducing the risk of accidental exposure in logs or API responses.
    This vulnerability could lead to sensitive information disclosure.
  severity: ERROR
  metadata:
    source-url: github.com/jaegertracing/jaeger/commit/360c38bec3f9718ebba7ddbf0b409b05995f3ace
    category: security
    cwe:
    - CWE-312
    owasp:
    - A03:2021 - Sensitive Data Exposure
    technology:
    - go
