rules:
- id: newrelic-start-without-end
  patterns:
  - pattern-not-inside: |
      $TXN := $NR.StartTransaction($N)
      ...
      defer $TXN.End()
  - pattern-not-inside: |
      $TXN := $NR.StartTransaction($N)
      ...
      $TXN.End()
  - pattern-either:
    - pattern: $TXN := $NR.StartTransaction($N)
  message: missing new relic end transaction
  languages:
  - go
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-772: Missing Release of Resource after Effective Lifetime'
    - 'CWE-401: Memory Leak'
