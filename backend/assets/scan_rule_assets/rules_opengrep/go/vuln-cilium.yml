rules:
- id: vuln-cilium-a652c123
  pattern: |
    $INPUT := append($GLOBALKEY, $SRCNODEIP...)
    $INPUT = append($INPUT, $SRCBOOTID...)
    $INPUT = append($INPUT, $DSTBOOTID...)
  pattern-not: |
    $INPUTLEN := len($GLOBALKEY) + len($SRCNODEIP) + len($DSTNODEIP) + len($SRCBOOTID) + len($DSTBOOTID)
    $INPUT := make([]byte, 0, $INPUTLEN)
    $INPUT = append($INPUT, $GLOBALKEY...)
    $INPUT = append($INPUT, $SRCNODEIP...)
    $INPUT = append($INPUT, $SRCBOOTID[:36]...)
    $INPUT = append($INPUT, $DSTBOOTID[:36]...)
  languages:
  - go
  message: |
    Detected potential buffer overflow vulnerability due to unsafe concatenation of byte slices.
    The original code appends multiple byte slices without pre-allocating the required memory,
    which can lead to buffer overflows and undefined behavior. The fix pre-allocates the
    required memory and ensures proper bounds checking by truncating the boot IDs to 36 bytes.
    To fix this, pre-allocate the memory using `make` and ensure proper bounds checking.
  severity: ERROR
  metadata:
    source-url: github.com/cilium/cilium/commit/a652c123331852cca90c74202f993d4170fd37fa
    category: security
    cwe: 'CWE-120: Buffer Copy without Checking Size of Input (''Classic Buffer Overflow'')'
    owasp: A9:2017 - Using Components with Known Vulnerabilities
    technology:
    - go
- id: vuln-cilium-bf9a1ae1
  pattern: |
    func dumpEnvoy($ROOTDIR string, $RESOURCE string, $FILENAME string) error {
      ...
      return downloadToFile($CLIENT, $RESOURCE, filepath.Join($ROOTDIR, $FILENAME))
    }
  pattern-not: |
    func dumpEnvoy($ROOTDIR string, $RESOURCE string, $FILENAME string, $POSTPROCESS postProcessFunc) error {
      ...
      return downloadToFileWithPostProcess($CLIENT, $RESOURCE, filepath.Join($ROOTDIR, $FILENAME), $POSTPROCESS)
    }
  languages:
  - go
  message: |
    The function `dumpEnvoy` is vulnerable because it does not apply post-processing to sensitive data before writing it to a file. This can lead to exposure of sensitive information such as API keys, certificates, and private keys. The fix involves using `downloadToFileWithPostProcess` to apply a post-processing function that masks sensitive data. Always ensure sensitive data is properly masked or redacted before writing it to a file.
  severity: ERROR
  metadata:
    source-url: github.com/cilium/cilium/commit/bf9a1ae1b2d2b2c9cca329d7aa96aa4858032a61
    category: security
    cwe:
    - CWE-200
    owasp:
    - A3:2017-Sensitive Data Exposure
    references:
    - https://github.com/cilium/cilium/commit/bf9a1ae1b2d2b2c9cca329d7aa96aa4858032a61
    technology:
    - go
- id: vuln-cilium-d367fb38
  pattern: |
    if $ID.ID == $NEWID.ID {
      ...
    }
  pattern-not: |
    if $ID.ID == $NEWID.ID && $PREFIXINFO.Source() == $ID.Source {
      ...
    }
  languages:
  - go
  message: |
    Detected a vulnerability where the ipcache upsert operation only checks the ID without verifying the source. This can lead to incorrect ipcache entries when the same identity is sourced from different locations. Always verify both the ID and the source to ensure correct ipcache updates. See GH-24502 for more details.
  severity: ERROR
  metadata:
    source-url: github.com/cilium/cilium/commit/d367fb38acef88ab7e8d308ec167721dad2e1c82
    category: security
    cwe:
    - CWE-664
    owasp:
    - A1:2017-Injection
    references:
    - https://github.com/cilium/cilium/issues/24502
    technology:
    - go
