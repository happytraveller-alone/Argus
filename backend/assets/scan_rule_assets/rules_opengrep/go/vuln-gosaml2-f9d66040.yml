rules:
- id: vuln-gosaml2-f9d66040
  patterns:
  - pattern: |
      func maybeDeflate($DATA []byte, $DECODER func([]byte) error) error {
        ...
        $DEFLATED, $ERR := ioutil.ReadAll(flate.NewReader(bytes.NewReader($DATA)))
        ...
      }
  - pattern-not: |
      func maybeDeflate($DATA []byte, $MAXSIZE int64, $DECODER func([]byte) error) error {
        ...
        $LR := io.LimitReader(flate.NewReader(bytes.NewReader($DATA)), $MAXSIZE+1)
        $DEFLATED, $ERR := io.ReadAll($LR)
        if int64(len($DEFLATED)) > $MAXSIZE {
          return fmt.Errorf("deflated response exceeds maximum size of %d bytes", $MAXSIZE)
        }
        ...
      }
  languages:
  - go
  message: |
    The function `maybeDeflate` is vulnerable to compression bomb attacks as it doesn't limit the size of decompressed data. This can lead to resource exhaustion. Add a maximum size parameter and use `io.LimitReader` to restrict the decompressed data size.
  severity: ERROR
  metadata:
    source-url: github.com/russellhaering/gosaml2/commit/f9d66040241093e8702649baff50cc70d2c683c0
    category: security
    cwe:
    - CWE-409
    owasp: A6:2017-Security Misconfiguration
    technology:
    - go
