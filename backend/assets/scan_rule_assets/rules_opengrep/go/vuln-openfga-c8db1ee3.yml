rules:
- id: vuln-openfga-c8db1ee3
  patterns:
  - pattern: |
      func isUsersetRewriteValid(allRelations map[string]struct{}, relationsOnType map[string]struct{}, objectType, relation string, rewrite *openfgapb.Userset) error {
          ...
          if _, ok := relationsOnType[tupleset]; !ok {
              ...
          }
          ...
      }
  - pattern-not: |
      func isUsersetRewriteValid(allRelations map[string]*openfgapb.Relation, relationsOnType map[string]*openfgapb.Relation, objectType, relation string, rewrite *openfgapb.Userset) error {
          ...
          tuplesetRelation, ok := relationsOnType[tupleset]
          if !ok {
              ...
          }
          tuplesetRewrite := tuplesetRelation.GetRewrite()
          if reflect.TypeOf(tuplesetRewrite.GetUserset()) != reflect.TypeOf(&openfgapb.Userset_This{}) {
              return errors.Errorf("the '%s#%s' relation is referenced in at least one tupleset and thus must be a direct relation", objectType, tupleset)
          }
          ...
      }
  languages:
  - go
  message: |
    The function `isUsersetRewriteValid` does not properly validate tupleset relations. Tupleset relations must only be direct relationships and cannot involve rewrites like `ComputedUserset`, `Union`, `Intersection`, or `Exclusion`. This could lead to security vulnerabilities in the authorization model. Update the function to check that tupleset relations are direct relationships only.
  severity: ERROR
  metadata:
    source-url: github.com/openfga/openfga/commit/c8db1ee3d2a366f18e585dd33236340e76e784c4
    category: security
    cwe:
    - 'CWE-285: Improper Authorization'
    owasp:
    - 'A01: Broken Access Control'
    technology:
    - go
