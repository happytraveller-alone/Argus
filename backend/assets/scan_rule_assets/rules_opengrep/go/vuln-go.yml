- id: vuln-go-0bf7ee99
  patterns:
  - pattern: |
      $VAR, $ERR := io.ReadAll($R)
      ...
      if $ERR != nil {
        ...
      }
  - pattern-not: |
      $VAR, $ERR := readSpecialFile($R)
      ...
      if $ERR != nil {
        ...
      }
  languages:
  - go
  message: |
    Detected use of io.ReadAll without size limit on special file reading.
    This can lead to unbounded memory allocation when reading malicious
    tar archives. Use readSpecialFile instead which enforces a maximum
    size limit of 1MB on special file content.
  severity: ERROR
  metadata:
    source-url: github.com/golang/go/commit/0bf7ee9977c0218562c50a0b0f0d9cbdf33f65e6
    category: security
    cwe:
    - CWE-770
    owasp:
    - A1:2017-Injection
    technology:
    - go
- id: vuln-go-0d1615b2
  patterns:
  - pattern: |
      if _, ok := $E.(bailout); !ok {
        ...
      }
  - pattern-not: |
      $BAIL, $OK := $E.(bailout)
      if !$OK {
        ...
      } else if $BAIL.$MSG != "" {
        ...
      }
  languages:
  - go
  message: |
    Potential stack exhaustion vulnerability detected. The code does not properly handle
    bailout panics with message and position information, which could lead to
    insufficient error reporting and potential stack exhaustion. Update the code to
    properly handle bailout panics with message and position information as shown in
    the pattern-not example.
  severity: ERROR
  metadata:
    source-url: github.com/golang/go/commit/0d1615b23f9a558aa0a1957b4c81596220eb8ec4
    category: security
    cwe:
    - CWE-400
    - CWE-755
    owasp:
    - A9:2017-Using Components with Known Vulnerabilities
    technology:
    - go
- id: vuln-go-0d347544
  patterns:
  - pattern: |
      {
          "_html_template_attrescaper": true,
          "_html_template_nospaceescaper": true,
          "_html_template_htmlescaper": true,
      }
  - pattern-not: |
      {
          "_html_template_attrescaper": true,
          "_html_template_htmlescaper": true,
      }
  languages:
  - go
  message: |
    Detected the presence of '_html_template_nospaceescaper' in the template escaper map. This can lead to incorrect handling of empty attribute values in HTML templates, potentially causing XSS vulnerabilities. Remove '_html_template_nospaceescaper' to ensure proper escaping of empty attributes.
  severity: ERROR
  metadata:
    source-url: github.com/golang/go/commit/0d347544cbca0f42b160424f6bc2458ebcc7b3fc
    category: security
    cwe:
    - CWE-79
    owasp:
    - 'A7: Cross-Site Scripting (XSS)'
    technology:
    - go
- id: vuln-go-1008486a
  patterns:
  - pattern: |
      fmt.Fprintf($F, "_CGO_%s=%s\n", $ARG)
  - pattern-not: |
      fmt.Fprintf($F, "_CGO_%s=%s\n", $K, $ARG)
  languages:
  - go
  message: |
    Incorrect format string usage in fmt.Fprintf detected. The format string expects two
    arguments but only one is provided. This can lead to format string vulnerabilities
    and undefined behavior. Always ensure the number of format specifiers matches the
    number of arguments provided. The fix is to add the missing argument.
  severity: ERROR
  metadata:
    source-url: github.com/golang/go/commit/1008486a9ff979dbd21c7466eeb6abf378f9c637
    category: security
    cwe:
    - CWE-134
    owasp: A9:2017-Using Components with Known Vulnerabilities
    references:
    - https://pkg.go.dev/fmt#Fprintf
    technology:
    - go
- id: vuln-go-1102616c
  patterns:
  - pattern: |
      func validateRepoRootScheme($REPO_ROOT string) error {
          $END := strings.Index($REPO_ROOT, "://")
          if $END <= 0 {
              return errors.New("no scheme")
          }
          ...
          return nil
      }
  - pattern-not: |
      func validateRepoRoot($REPO_ROOT string) error {
          $URL, $ERR := url.Parse($REPO_ROOT)
          if $ERR != nil {
              return $ERR
          }
          if $URL.Scheme == "" {
              return errors.New("no scheme")
          }
          return nil
      }
  languages:
  - go
  message: |
    The vulnerable function validateRepoRootScheme uses manual string parsing to validate URL schemes, which can lead to incorrect validation of malicious URLs. This could allow attackers to bypass URL scheme restrictions. Use the standard library's url.Parse function instead, as shown in the fixed version.
  severity: ERROR
  metadata:
    source-url: github.com/golang/go/commit/1102616c772c262175f5ba5f12d6b574d0ad9101
    category: security
    cwe:
    - CWE-20
    owasp: A6:2021 - Vulnerable and Outdated Components
    technology:
    - go
- id: vuln-go-179821c9
  patterns:
  - pattern: |
      if $COND {
        return errors.New("http: invalid Host header")
      }
  - pattern-not: |
      if $COND {
        $HOST = ""
      } else {
        return errors.New("http: invalid Host header")
      }
  languages:
  - go
  message: |
    Detected a potential Host header validation vulnerability. Previously, invalid Host headers would return an error, which could lead to header or request smuggling. The fix ensures that invalid Host headers are zeroed out when not using a proxy, preventing potential smuggling vectors. Update the code to handle invalid Host headers by setting them to an empty string when not using a proxy.
  severity: ERROR
  metadata:
    source-url: github.com/golang/go/commit/179821c9e12d18c8134429fabe50d3dfaecb948e
    category: security
    cwe:
    - CWE-113
    owasp:
    - A01:2021-Broken Access Control
    references:
    - https://go.dev/issue/61431
    technology:
    - go
- id: vuln-go-1dd24caf
  patterns:
  - pattern: |
      if ($SIZE - $DIR_SIZE)/$DIV >= $RECORDS {
        ...
      }
  - pattern-not: |
      if $DIR_SIZE < $SIZE && ($SIZE - $DIR_SIZE)/$DIV >= $RECORDS {
        ...
      }
  languages:
  - go
  message: |
    Detected potential integer overflow vulnerability in archive/zip reader.
    The code performs arithmetic operations without checking for overflow conditions,
    which could allow bypassing security checks. Always verify that the first operand
    is smaller than the second before subtraction to prevent overflow.
  severity: ERROR
  metadata:
    source-url: github.com/golang/go/commit/1dd24caf08985066b309af6bc461780c73e05c35
    category: security
    cwe:
    - CWE-190
    owasp: A10:2021 - Server-Side Request Forgery
    technology:
    - go
- id: vuln-go-222ee24a
  patterns:
  - pattern: |
      if !ascii.EqualFold(textproto.TrimString($VAR), "chunked") {
        ...
      }
  - pattern-not: |
      if !ascii.EqualFold($VAR, "chunked") {
