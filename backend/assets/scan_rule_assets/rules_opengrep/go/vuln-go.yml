- id: vuln-go-23c943e5
  patterns:
  - pattern: |
      scheme := $VCS.Scheme[0]
      if $VCS.PingCmd != "" {
        ...
        if $VCS.Ping($S, $REPO) == nil {
          scheme = $S
          break
        }
      }
  - pattern-not: |
      scheme, err := func() (string, error) {
        ...
        if $VCS.PingCmd == "" {
          return $S, nil
        }
        if err := $VCS.Ping($S, $REPO); err == nil {
          return $S, nil
        }
        return "", fmt.Errorf("no %sprotocol found for repository", $SECURITYFRAG)
      }()
      if err != nil {
        return nil, err
      }
  languages:
  - go
  message: |
    The code directly assigns the first scheme without proper error handling when pinging repositories.
    This can lead to using insecure protocols when secure ones are available.
    The fix adds proper error handling and security checks when selecting repository protocols.
    Always handle errors properly and verify protocol security when working with VCS repositories.
  severity: ERROR
  metadata:
    source-url: github.com/golang/go/commit/23c943e5296c6fa3a6f9433bd929306c4dbf2aa3
    category: security
    cwe:
    - CWE-358
    owasp:
    - A02:2021 - Cryptographic Failures
    references:
    - https://cwe.mitre.org/data/definitions/358.html
    - https://owasp.org/www-project-top-ten/2021/A02_2021-Cryptographic_Failures
    technology:
    - go
