- id: vuln-go-cdcd0284
  patterns:
  - pattern: |
      func (r *Resolver) LookupCNAME(ctx context.Context, host string) (string, error) {
        return r.lookupCNAME(ctx, host)
      }
  - pattern-not: |
      func (r *Resolver) LookupCNAME(ctx context.Context, host string) (string, error) {
        cname, err := r.lookupCNAME(ctx, host)
        if err != nil {
          return "", err
        }
        if !isDomainName(cname) {
          return "", &DNSError{Err: "CNAME target is invalid", Name: host}
        }
        return cname, nil
      }
  languages:
  - go
  message: |
    The LookupCNAME function does not validate the CNAME target domain name, which could lead to DNS spoofing or injection attacks. Always validate domain names using isDomainName to ensure they are properly formatted and safe to use.
