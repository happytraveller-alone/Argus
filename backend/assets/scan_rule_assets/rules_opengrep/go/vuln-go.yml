- id: vuln-go-fb979a50
  patterns:
  - pattern: |
      func ($DEC *Decoder) decIgnoreOpFor($WIREID typeId, $INPROGRESS map[typeId]*decOp) *decOp {
          ...
          $ELEMOP := $DEC.decIgnoreOpFor($ELEMID, $INPROGRESS)
          ...
      }
  - pattern-not: |
      func ($DEC *Decoder) decIgnoreOpFor($WIREID typeId, $INPROGRESS map[typeId]*decOp, $DEPTH int) *decOp {
          ...
          if $DEPTH > maxIgnoreNestingDepth {
              error_(errors.New("invalid nesting depth"))
          }
          $ELEMOP := $DEC.decIgnoreOpFor($ELEMID, $INPROGRESS, $DEPTH+1)
          ...
      }
  languages:
  - go
  message: |
    Detected recursive decoding operation without depth limit check.
    This can lead to unbounded recursion and stack exhaustion when decoding maliciously crafted data.
    Add a depth parameter and check against maxIgnoreNestingDepth to prevent stack overflow attacks.
