- id: vuln-go-618120c1
  patterns:
  - pattern: |
      const $MAX_CACHED_HEADERS = $N
      ...
      if len($SC.canonHeader) < $MAX_CACHED_HEADERS {
          ...
      }
  - pattern-not: |
      const $MAX_CACHED_HEADERS_SIZE = $SIZE
      ...
      if $SC.canonHeaderKeysSize + $SIZE <= $MAX_CACHED_HEADERS_SIZE {
          $SC.canonHeaderKeysSize += $SIZE
          ...
      }
  languages:
  - go
  message: |
    Detected a vulnerable header cache size check that could lead to unbounded memory usage.
    The original code only checks the number of cached headers but doesn't account for their size,
    which could allow an attacker to cause excessive memory consumption by sending many unique headers.
    Fix by implementing a size-based limit on the total size of cached headers, as shown in the patch.
  severity: ERROR
  metadata:
    source-url: github.com/golang/go/commit/618120c165669c00a1606505defea6ca755cdc27
    category: security
    cwe:
    - 'CWE-770: Allocation of Resources Without Limits or Throttling'
    owasp:
    - 'A2: Cryptographic Failures'
    technology:
    - go
