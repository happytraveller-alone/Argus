- id: vuln-go-77013065
  patterns:
  - pattern: |
      func ($C *Certificate) buildChains($CACHE map[int][][]*Certificate, $CURRENT_CHAIN []*Certificate, $OPTS *VerifyOptions) ([][]*Certificate, error) {
        $ROOTS, $FAILED_ROOT, $ROOT_ERR := $OPTS.Roots.findVerifiedParents($C)
        ...
        $INTERMEDIATES, $FAILED_INTERMEDIATE, $INTERMEDIATE_ERR := $OPTS.Intermediates.findVerifiedParents($C)
        ...
      }
  - pattern-not: |
      func ($C *Certificate) buildChains($CACHE map[*Certificate][][]*Certificate, $CURRENT_CHAIN []*Certificate, $SIG_CHECKS *int, $OPTS *VerifyOptions) ([][]*Certificate, error) {
        ...
        for _, $ROOT_NUM := range $OPTS.Roots.findPotentialParents($C) {
          ...
        }
        for _, $INTERMEDIATE_NUM := range $OPTS.Intermediates.findPotentialParents($C) {
          ...
        }
      }
  languages:
  - go
  message: |
    Detected use of findVerifiedParents in certificate chain verification which can lead to excessive signature checks and potential DoS. The function may perform an unbounded number of signature verification attempts when processing malicious certificate chains. Use findPotentialParents with a signature check counter instead to limit the number of verification attempts.
  severity: ERROR
  metadata:
    source-url: github.com/golang/go/commit/770130659b6fb2acf271476579a3644e093dda7f
