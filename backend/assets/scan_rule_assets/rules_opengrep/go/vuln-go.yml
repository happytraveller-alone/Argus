- id: vuln-go-33d725e5
  patterns:
  - pattern: |
      if $N + $DIRLEN + $I <= len($B) {
        return $I
      }
  - pattern-not: |
      if $N + $DIRLEN + $I > len($B) {
        return -1
      }
      return $I
  languages:
  - go
  message: |
    Detected unsafe ZIP comment boundary check that could lead to truncated comment processing.
    This vulnerability could allow malicious ZIP files to bypass validation checks by hiding
    additional data in truncated comments. The fix is to return -1 when the comment is truncated
    rather than proceeding with potentially invalid data.
  severity: ERROR
  metadata:
    source-url: github.com/golang/go/commit/33d725e5758bf1fea62e6c77fc70b57a828a49f5
    category: security
    cwe:
    - 'CWE-20: Improper Input Validation'
    owasp:
    - A03:2021 - Injection
    technology:
    - go
- id: vuln-go-43063521
  patterns:
  - pattern: |
      $Z[$N-1] = $C1 + $C2
      if $Z[$N-1] < $C1 { ... }
  - pattern-not: |
      $CX := $C1 + $C2
      $CY := $CX + $C3
      $Z[$N-1] = $CY
      if $CX < $C2 || $CY < $C3 { ... }
  languages:
  - go
  message: |
    The original code contains a vulnerability in the Montgomery multiplication implementation where it fails to properly handle carry propagation. This can lead to incorrect results in cryptographic operations, potentially causing security vulnerabilities. The fix introduces additional carry checks to ensure correctness. To fix this, ensure that all carry bits are properly accounted for and checked.
  severity: ERROR
  metadata:
    source-url: github.com/golang/go/commit/4306352182bf94f86f0cfc6a8b0ed461cbf1d82c
    category: security
    cwe:
