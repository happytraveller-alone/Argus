rules:
- id: err-todo
  patterns:
  - pattern-either:
    - patterns:
      - pattern-inside: if err != nil { ... }
      - pattern-regex: // ?(TODO|FIXME).*
  - pattern-either:
    - patterns:
      - pattern-inside: |
          if ... ; err != nil {
                  ...
          }
      - pattern-regex: // ?(TODO|FIXME).*
  message: TODO in error handling code
  languages:
  - go
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-703: Improper Check or Handling of Errors'
    - 'CWE-252: Unchecked Return Value'
