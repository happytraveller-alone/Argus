rules:
- id: vuln-go-ethereum-7ec60d5f
  patterns:
  - pattern: |
      go SendItems($RW, pongMsg)
  - pattern-not: |
      select {
      case $P.pingRecv <- struct{}{}:
      case <-$P.closed:
      }
  languages:
  - go
  message: |
    The vulnerability involves directly sending a pong message without proper synchronization, which can lead to race conditions or deadlocks. This is dangerous because it can cause the application to hang or behave unpredictably under certain conditions. The fix involves using a channel to synchronize the pong message sending, ensuring proper handling of the ping-pong protocol. Always use proper synchronization mechanisms when dealing with concurrent operations.
  severity: ERROR
  metadata:
    source-url: github.com/ethereum/go-ethereum/commit/7ec60d5f0c45bc68fd4e814479df065acec95d60
    category: security
    cwe:
    - CWE-362
    owasp:
    - 'A2: Broken Authentication'
    references:
    - https://cwe.mitre.org/data/definitions/362.html
    technology:
    - go
- id: vuln-go-ethereum-a5237a27
  patterns:
  - pattern: |
      if $HEADER := $BLOCKCHAIN.GetHeaderByNumber($ORIGIN.Number.Uint64() + $QUERY.Skip + 1); $HEADER != nil {
        if $BLOCKCHAIN.GetBlockHashesFromHash($HEADER.Hash(), $QUERY.Skip+1)[$QUERY.Skip] == $QUERY.Origin.Hash {
          $QUERY.Origin.Hash = $HEADER.Hash()
        }
      } else {
        $UNKNOWN = true
      }
  - pattern-not: |
      var (
        $CURRENT = $ORIGIN.Number.Uint64()
        $NEXT = $CURRENT + $QUERY.Skip + 1
      )
      if $NEXT <= $CURRENT {
        $INFOS, _ := json.MarshalIndent($PEER.Info(), "", "  ")
        $LOG().Warn("GetBlockHeaders skip overflow attack", "current", $CURRENT, "skip", $QUERY.Skip, "next", $NEXT, "attacker", $INFOS)
        $UNKNOWN = true
      } else {
        if $HEADER := $BLOCKCHAIN.GetHeaderByNumber($NEXT); $HEADER != nil {
          if $BLOCKCHAIN.GetBlockHashesFromHash($HEADER.Hash(), $QUERY.Skip+1)[$QUERY.Skip] == $QUERY.Origin.Hash {
            $QUERY.Origin.Hash = $HEADER.Hash()
          } else {
            $UNKNOWN = true
          }
        }
      }
  languages:
  - go
  message: |
    The code is vulnerable to a skip overflow attack in the GetBlockHeaders function. The vulnerability occurs because there is no check to prevent integer overflow when calculating the next block number. This could allow an attacker to manipulate the skip parameter and cause unexpected behavior or crashes. The fix adds a check to ensure that the next block number is greater than the current block number before proceeding with the operation. To fix this, always validate the result of arithmetic operations to prevent integer overflow.
  severity: ERROR
  metadata:
    source-url: github.com/ethereum/go-ethereum/commit/a5237a27eaf81946a3edb4fafe13ed6359d119e4
    category: security
    cwe:
    - CWE-190
    owasp:
    - 'A1: Injection'
    references:
    - https://swcregistry.io/docs/SWC-101
    technology:
    - go
