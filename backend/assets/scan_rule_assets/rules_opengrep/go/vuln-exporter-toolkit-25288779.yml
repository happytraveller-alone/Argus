rules:
- id: vuln-exporter-toolkit-25288779
  pattern: |
    cacheKey := hex.EncodeToString(append(append([]byte($USER), []byte($HASHED_PASSWORD)...), []byte($PASS)...))
  pattern-not: |
    cacheKey := strings.Join(
      []string{
        hex.EncodeToString([]byte($USER)),
        hex.EncodeToString([]byte($HASHED_PASSWORD)),
        hex.EncodeToString([]byte($PASS)),
      }, ":")
  languages:
  - go
  message: |
    The code is vulnerable to a cache poisoning attack due to improper construction of the cache key.
    By appending byte arrays directly, it allows for potential collisions in the cache key, which can lead to authentication bypass.
    The fix involves using `strings.Join` to create a more secure cache key with proper separation between components.
  severity: ERROR
  metadata:
    source-url: github.com/prometheus/exporter-toolkit/commit/25288779bc59d00c41b4a1706c6b87f0561ef2d7
    category: security
    cwe:
    - 'CWE-294: Authentication Bypass by Capture-replay'
    owasp:
    - 'A2: Broken Authentication'
    references:
    - https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2022-46146
    technology:
    - go
