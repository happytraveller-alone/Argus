rules:
- id: vuln-saml-aee3fb1e
  pattern: |
    func (sp *ServiceProvider) validateSigned($RESPONSE *etree.Element) error {
      ...
      if $SIG != nil {
        if err = sp.validateSignature($RESPONSE); err != nil {
          return fmt.Errorf("cannot validate signature on Response: %v", err)
        }
        $HAVE_SIG = true
      }
      ...
      if !$HAVE_SIG {
        return errors.New("either the Response or Assertion must be signed")
      }
      return nil
    }
  pattern-not: |
    func (sp *ServiceProvider) validateSignature($EL *etree.Element) error {
      $SIG, err := findChild($EL, "http://www.w3.org/2000/09/xmldsig#", "Signature")
      if $SIG == nil {
        return errSignatureElementNotPresent
      }
      return fmt.Errorf("cannot validate signature on %s: %v", $EL.Tag, err)
    }
  languages:
  - go
  message: |
    The SAML response validation incorrectly handles signature verification by
    only checking the Response element's signature and not properly validating
    Assertion signatures. This could allow unsigned or improperly signed
    assertions to be accepted. The fix properly separates signature validation
    logic and provides more specific error messages for each element type.
  severity: ERROR
  metadata:
    source-url: github.com/crewjam/saml/commit/aee3fb1edeeaf1088fcb458727e0fd863d277f8b
    category: security
    cwe:
    - CWE-345
    owasp:
    - A02:2021-Cryptographic Failures
    references:
    - https://www.oasis-open.org/committees/download.php/56776/sstc-saml-core-errata-2.0-wd-07.pdf
    technology:
    - go
    - saml
