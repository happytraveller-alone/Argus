rules:
- id: csharp_crypto_rule-WeakCipherAlgorithm_1
  patterns:
  - pattern-inside: 'using System.Security.Cryptography;

      ...

      '
  - pattern-either:
    - pattern-regex: .*DES\.Create\(\);
    - pattern: new DESCryptoServiceProvider();
    - pattern-regex: .*TripleDES\.Create\(\);
    - pattern: new TripleDESCryptoServiceProvider();
    - pattern-regex: .*RC2\.Create\(\);
    - pattern: new RC2CryptoServiceProvider();
  message: "DES, TripleDES and RC2 are all considered broken or insecure cryptographic\
    \ algorithms.\nIf using .NET Framework greater than version 6.0 consider using\
    \ `ChaCha20Poly1305`\ninstead as it is easier and faster than the alternatives\
    \ such as `AES-256-GCM`.\n\nFor older applications, `AES-256-GCM` is recommended,\
    \ however it has many drawbacks:\n- Slower than `ChaCha20Poly1305`.\n- Catastrophic\
    \ failure if nonce values are reused.\n\nExample using `ChaCha20Poly1305`:\n```\n\
    // Generate a random key\nbyte[] key = new byte[32];\nRandomNumberGenerator.Fill(key);\n\
    \n// Note nonce values _must_ be regenerated every time they are used.\nbyte[]\
    \ nonce = new byte[12];\nRandomNumberGenerator.Fill(nonce);\n\nbyte[] authTag\
    \ = new byte[16];\nbyte[] cipherText;\n\nusing (ChaCha20Poly1305 encryptor = new\
    \ ChaCha20Poly1305(key))\n{\n    byte[] plainText = System.Text.Encoding.UTF8.GetBytes(\"\
    Secret text to encrypt\");\n    cipherText = new byte[plainText.Length];\n   \
    \ encryptor.Encrypt(nonce, plainText, cipherText, authTag);\n}\n\nusing (ChaCha20Poly1305\
    \ decryptor = new ChaCha20Poly1305(key))\n{\n    byte[] output = new byte[cipherText.Length];\n\
    \    decryptor.Decrypt(nonce, cipherText, authTag, output);\n    Console.WriteLine(\"\
    Output: {0}\", System.Text.Encoding.UTF8.GetString(output));\n}\n```\n\nExample\
    \ using `AES-256-GCM`:\n```\n// Generate a random key\nbyte[] key = new byte[32];\n\
    RandomNumberGenerator.Fill(key);\n\n// Note nonce values _must_ be regenerated\
    \ every time they are used.\nbyte[] nonce = new byte[AesGcm.NonceByteSizes.MaxSize];\n\
    RandomNumberGenerator.Fill(nonce);\n\nbyte[] authTag = new byte[AesGcm.TagByteSizes.MaxSize];\n\
    byte[] cipherText;\n\nusing (AesGcm encryptor = new AesGcm(key))\n{\n    byte[]\
    \ plainText = Encoding.UTF8.GetBytes(\"Secret text to encrypt\");\n    cipherText\
    \ = new byte[plainText.Length];\n    encryptor.Encrypt(nonce, plainText, cipherText,\
    \ authTag);\n}\n\nusing (AesGcm decryptor = new AesGcm(key))\n{\n    byte[] output\
    \ = new byte[cipherText.Length];\n    decryptor.Decrypt(nonce, cipherText, authTag,\
    \ output);\n    Console.WriteLine(\"Output: {0}\",  Encoding.UTF8.GetString(output));\n\
    }\n```\n"
  languages:
  - csharp
  severity: WARNING
  metadata:
    shortDescription: Use of a broken or risky cryptographic algorithm
    category: security
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    cwe: CWE-327
    security-severity: Medium
