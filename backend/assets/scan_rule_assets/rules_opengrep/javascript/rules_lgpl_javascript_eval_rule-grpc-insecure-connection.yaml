rules:
- id: rules_lgpl_javascript_eval_rule-grpc-insecure-connection
  patterns:
  - pattern-either:
    - pattern-inside: |
        require('grpc')
        ...
    - pattern-inside: |
        import $MOD from 'grpc'
        ...
  - pattern: $CREDENTIALS.createInsecure()
  message: |
    检测到不安全反序列化风险（规则：rules_lgpl_javascript_eval_rule-grpc-insecure-connection）。危害：恶意序列化数据可能触发对象构造、代码执行或业务状态篡改。建议：只反序列化可信数据，使用安全加载函数或限制可反序列化类型。
  metadata:
    owasp:
    - A8:2017-Insecure Deserialization
    - A08:2021-Software and Data Integrity Failures
    cwe: CWE-502
    shortDescription: Deserialization of Untrusted Data
    security-severity: CRITICAL
    category: security
  severity: ERROR
  languages:
  - javascript
