rules:
- id: unzipper_unsafe_unpacking
  languages:
  - javascript
  severity: ERROR
  message: |
    检测到路径穿越/不安全解包风险（规则：unzipper_unsafe_unpacking）。危害：归档条目、路径输入或服务端视图路径可能访问/写入目标目录之外，造成敏感文件泄露、任意文件覆盖或恶意内容植入。建议：规范化路径并校验其仍位于目标目录内，拒绝绝对路径和
    `..` 路径段，避免把用户输入直接作为视图或文件路径。
  patterns:
  - patterns:
    - pattern-either:
      - pattern-inside: |
          $UNZIPPER = require('unzipper')
          ...
      - pattern-inside: |
          import $UNZIPPER from 'unzipper'
          ...
    - pattern-either:
      - pattern-inside: |
          $ZIP = $UNZIPPER.Parse()
          ...
          $ZIP.on('entry', entry => {
            ...
          })
      - pattern-inside: |
          $FS.createReadStream($FILENAME).pipe($UNZIPPER.Parse()).on('entry', $ENTRY => {
            ...
          })
      - pattern-inside: |
          $UNZIPPER.Parse($FILE).on('entry', $ENTRY => {
            ...
          })
  - pattern-either:
    - pattern-either:
      - pattern: $FS.writeFileSync(<... $ENTRY.path ...>, ...)
      - pattern: $FS.writeFileAsync(<... $ENTRY.path ...>, ...)
      - patterns:
        - pattern-inside: |
            entry.pipe(...)
        - pattern: $FS.createWriteStream(<... $ENTRY.path ...>, ...)
      - pattern: $FS.createWriteStream(<... $ENTRY.path ...>, ...)
    - patterns:
      - pattern-either:
        - pattern: $FS.writeFileSync($PATH, ...)
        - pattern: $FS.writeFileAsync($PATH, ...)
        - patterns:
          - pattern-inside: |
              entry.pipe(...)
          - pattern: $FS.createWriteStream(<... $PATH ...>, ...)
        - pattern: $FS.createWriteStream(<... $ENTRY.path ...>, ...)
      - pattern-not-inside: |
          $PATH = path.join(..., path.basename(<... $ENTRY.path ...>))
          ...
      - pattern-either:
        - pattern-inside: |
            $PATH = path.join(..., <... $ENTRY.path ...>)
            ...
        - pattern-inside: |
            $PATH = <... $ENTRY.path ...>
            ...
  metadata:
    cwe:
    - 'CWE-22: Path Traversal'
    - 'CWE-36: Absolute Path Traversal'
    - 'CWE-73: External Control of File Name or Path'
    - 'CWE-20: Improper Input Validation'
    - 'CWE-400: Uncontrolled Resource Consumption'
