rules:
- id: unzipper_unsafe_unpacking
  languages:
  - javascript
  severity: ERROR
  message: Unsafe Zip Unpacking
  patterns:
  - patterns:
    - pattern-either:
      - pattern-inside: '$UNZIPPER = require(''unzipper'')

          ...

          '
      - pattern-inside: 'import $UNZIPPER from ''unzipper''

          ...

          '
    - pattern-either:
      - pattern-inside: "$ZIP = $UNZIPPER.Parse()\n...\n$ZIP.on('entry', entry =>\
          \ {\n  ...\n})\n"
      - pattern-inside: "$FS.createReadStream($FILENAME).pipe($UNZIPPER.Parse()).on('entry',\
          \ $ENTRY => {\n  ...\n})\n"
      - pattern-inside: "$UNZIPPER.Parse($FILE).on('entry', $ENTRY => {\n  ...\n})\n"
  - pattern-either:
    - pattern-either:
      - pattern: $FS.writeFileSync(<... $ENTRY.path ...>, ...)
      - pattern: $FS.writeFileAsync(<... $ENTRY.path ...>, ...)
      - patterns:
        - pattern-inside: 'entry.pipe(...)

            '
        - pattern: $FS.createWriteStream(<... $ENTRY.path ...>, ...)
      - pattern: $FS.createWriteStream(<... $ENTRY.path ...>, ...)
    - patterns:
      - pattern-either:
        - pattern: $FS.writeFileSync($PATH, ...)
        - pattern: $FS.writeFileAsync($PATH, ...)
        - patterns:
          - pattern-inside: 'entry.pipe(...)

              '
          - pattern: $FS.createWriteStream(<... $PATH ...>, ...)
        - pattern: $FS.createWriteStream(<... $ENTRY.path ...>, ...)
      - pattern-not-inside: '$PATH = path.join(..., path.basename(<... $ENTRY.path
          ...>))

          ...

          '
      - pattern-either:
        - pattern-inside: '$PATH = path.join(..., <... $ENTRY.path ...>)

            ...

            '
        - pattern-inside: '$PATH = <... $ENTRY.path ...>

            ...

            '
  metadata:
    cwe:
    - 'CWE-22: Path Traversal'
    - 'CWE-36: Absolute Path Traversal'
    - 'CWE-73: External Control of File Name or Path'
    - 'CWE-20: Improper Input Validation'
    - 'CWE-400: Uncontrolled Resource Consumption'
