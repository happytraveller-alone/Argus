rules:
- id: rules_lgpl_javascript_database_rule-sequelize-weak-tls
  message: |
    检测到SQL 注入风险（规则：rules_lgpl_javascript_database_rule-sequelize-weak-tls）。危害：未受信任输入可能改变 SQL
    语义，导致数据泄露、篡改或越权查询。建议：使用参数化查询、绑定变量或 ORM 的安全 API，避免拼接原始 SQL。
  metadata:
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    cwe: CWE-757
    shortDescription: Selection of Less-Secure Algorithm During Negotiation (Algorithm Downgrade)
    security-severity: CRITICAL
    category: security
  severity: ERROR
  languages:
  - javascript
  patterns:
  - pattern-inside: |
      {
        host: $HOST,
        database: $DATABASE,
        dialect: $DIALECT,
        dialectOptions:
          { ssl: ... }
       }
  - pattern-either:
    - pattern: |
        {
          minVersion: 'TLSv1'
        }
    - pattern: |
        {
          minVersion: 'TLSv1.1'
        }
  - metavariable-regex:
      metavariable: $DIALECT
      regex: '[''"](mariadb|mysql|postgres)[''"]'
