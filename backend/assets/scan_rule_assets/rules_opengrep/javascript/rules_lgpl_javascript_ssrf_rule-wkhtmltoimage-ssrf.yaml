rules:
- id: rules_lgpl_javascript_ssrf_rule-wkhtmltoimage-ssrf
  patterns:
  - pattern-inside: |
      require('wkhtmltoimage')
      ...
  message: |
    检测到服务端请求伪造（SSRF）风险（规则：rules_lgpl_javascript_ssrf_rule-wkhtmltoimage-ssrf）。危害：攻击者可能诱导服务端访问内网、云元数据或受保护资源，造成信息泄露或横向探测。建议：对协议、主机和端口做白名单校验，并禁止转发敏感响应。
    保留的关键标识：`wkhtmltoimage`。
  languages:
  - javascript
  severity: ERROR
  metadata:
    owasp: A1:2017-Injection
    cwe: 'CWE-918: Server-Side Request Forgery (SSRF)'
    security-severity: CRITICAL
