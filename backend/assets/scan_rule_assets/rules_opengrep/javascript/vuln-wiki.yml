rules:
- id: vuln-wiki-57b56d3a
  patterns:
  - pattern: |
      if ($CONFIG.scanSVG && $OPTS.mimetype === 'image/svg+xml') {
        ...
      }
  - pattern-not: |
      if (
        $CONFIG.scanSVG &&
        (
          $OPTS.mimetype.toLowerCase().startsWith('image/svg') ||
          $OPTS.ext.toLowerCase() === 'svg'
        )
      ) {
        ...
      }
  languages:
  - javascript
  message: |
    Incomplete SVG file type validation detected. The original check only verifies the MIME type 'image/svg+xml', which can be bypassed by using alternative MIME types or file extensions. This could allow malicious SVG files to bypass security checks. To fix this, ensure the validation checks for both the MIME type and file extension, and use case-insensitive comparison.
  severity: ERROR
  metadata:
    source-url: github.com/Requarks/wiki/commit/57b56d3a5b9c00358814e76f3ee5b4bb353ad62f
    category: security
    cwe: CWE-434
    owasp: 'A1: Injection'
    references:
    - https://owasp.org/www-community/attacks/File_Upload
    technology:
    - javascript
- id: vuln-wiki-9e08718e
  patterns:
  - pattern: |
      if ($RAW_TEXT.indexOf('{{') >= 0 && $RAW_TEXT.indexOf('}}') > 1) {
        ...
      }
  - pattern-not: |
      const $REGEX = /(\{|&#x7b;?){2}(.+?)(\}|&#x7d;?){2}/i;
      if ($REGEX.test($RAW_TEXT)) {
        ...
      }
  languages:
  - javascript
  message: Insecure detection of Mustache templates using string indexOf. This can lead to template injection vulnerabilities. Use a regular expression to properly validate Mustache templates.
  severity: ERROR
  metadata:
    source-url: github.com/Requarks/wiki/commit/9e08718ee904046f8b2294ef6ac79e8a75a451e3
    category: security
    cwe: CWE-94
    owasp: A1:2017-Injection
    references:
    - https://mustache.github.io/mustache.5.html
    technology:
    - javascript
