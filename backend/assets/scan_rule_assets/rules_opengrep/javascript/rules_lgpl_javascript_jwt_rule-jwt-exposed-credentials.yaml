rules:
- id: rules_lgpl_javascript_jwt_rule-jwt-exposed-credentials
  patterns:
  - pattern-either:
    - pattern-inside: |
        const $JWT = require("jsonwebtoken");
        ...
    - pattern-inside: |
        const $JOSE = require("jose");
        ...
    - pattern-inside: |
        import $JWT from "jsonwebtoken"
        ...
    - pattern-inside: |
        import $JOSE from "jose"
        ...
  - pattern-either:
    - pattern: '$JWT.sign(<... {$PASSWORD: $VALUE} ...>, ...)'
    - patterns:
      - pattern: |
          $OBJ = <... {$PASSWORD: $VALUE} ...>
          ...
          $TOKEN = $JWT.sign(<... $OBJ ...>, ...)
      - pattern: $TOKEN = $JWT.sign(<... $OBJ ...>, ...)
    - patterns:
      - pattern: |
          $OBJ. ... .$PASSWORD = ...
          ...
          $TOKEN = $JWT.sign(<... $OBJ ...>, ...)
      - pattern: $TOKEN = $JWT.sign(<... $OBJ ...>, ...)
    - pattern: 'new $JOSE.SignJWT(<... {$PASSWORD: $VALUE} ...>)'
    - patterns:
      - pattern: |
          $OBJ = <... {$PASSWORD: $VALUE} ...>
          ...
          new $JOSE.SignJWT(<... $OBJ ...>)
      - pattern: new $JOSE.SignJWT(<... $OBJ ...>)
    - patterns:
      - pattern: |
          $OBJ. ... .$PASSWORD = ...
          ...
          new $JOSE.SignJWT(<... $OBJ ...>)
      - pattern: new $JOSE.SignJWT(<... $OBJ ...>)
  - metavariable-regex:
      metavariable: $PASSWORD
      regex: (?i)\b(?:.*password.*)\b
  severity: ERROR
  languages:
  - javascript
  metadata:
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    cwe: CWE-522
    shortDescription: Insufficiently protected credentials
    security-severity: HIGH
    category: security
  message: |
    检测到JWT
    验证/密钥配置风险（规则：rules_lgpl_javascript_jwt_rule-jwt-exposed-credentials）。危害：令牌可能被伪造、绕过签名校验，或因硬编码密钥泄露导致身份冒用。建议：强制校验签名和算法，使用安全随机密钥并通过配置/密钥管理系统加载。
