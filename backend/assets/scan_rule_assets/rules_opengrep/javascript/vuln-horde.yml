rules:
- id: vuln-horde-578ff073
  pattern: '$ELT = ''<span class="'' + $C + ''" title="'' + $L.escapeHTML() + ''" style="background:'' + (($B) ? $B.escapeHTML()
    : '''') + '';color:'' + $F.escapeHTML() + ''">'' + $L.truncate(10).escapeHTML() + ''</span>'';

    '
  pattern-not: '$ELT = ''<span class="'' + $C + ''" title="'' + $L.escapeHTML().gsub(''"'', ''&quot;'') + ''" style="background:''
    + (($B) ? $B.escapeHTML().gsub(''"'', ''&quot;'') : '''') + '';color:'' + $F.escapeHTML().gsub(''"'', ''&quot;'') + ''">''
    + $L.truncate(10).escapeHTML() + ''</span>'';

    '
  languages:
  - javascript
  message: "Potential XSS vulnerability due to unescaped double quotes in HTML attributes. \nThis can allow attackers to inject\
    \ arbitrary HTML or JavaScript. \nFix by properly escaping double quotes using .gsub('\"', '&quot;') on all user-controlled\
    \ strings.\n"
  severity: ERROR
  metadata:
    source-url: github.com/horde/horde/commit/578ff073724d9c179663098d8ff0076e8b361cfb
    category: security
    cwe: CWE-79
    owasp: 'A1: Injection'
    references:
    - https://owasp.org/www-community/attacks/xss/
    - https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html
    technology: javascript
- id: vuln-horde-7ce7ed91
  pattern: "this.auto_save_interval = new PeriodicalExecuter(function() {\n    if ($('compose').visible()) {\n        var\
    \ curr_hash = MD5.hash($('to', 'cc', 'bcc', 'subject').invoke('getValue').join('\\0') + (IMP_Compose_Base.editor_on ?\
    \ this.rte.getData() : $F('composeMessage')));\n        if (this.last_msg && curr_hash != this.last_msg) {\n         \
    \   this.uniqueSubmit('autoSaveDraft');\n        }\n        this.last_msg = curr_hash;\n    }\n}.bind(this), DIMP.conf_compose.auto_save_interval_val\
    \ * 60);\n"
  pattern-not: "this.auto_save_interval = new PeriodicalExecuter(function() {\n    if ($('compose').visible()) {\n       \
    \ var hdrs = MD5.hash($('to', 'cc', 'bcc', 'subject').invoke('getValue').join('\\0')), msg;\n        if (this.md5_hdrs)\
    \ {\n            msg = this.msgHash();\n            if (this.md5_hdrs != hdrs || this.md5_msg != msg) {\n            \
    \    this.uniqueSubmit('autoSaveDraft');\n            }\n        } else {\n            msg = this.md5_msgOrig;\n     \
    \   }\n        this.md5_hdrs = hdrs;\n        this.md5_msg = msg;\n    }\n}.bind(this), DIMP.conf_compose.auto_save_interval_val\
    \ * 60);\n"
  languages:
  - javascript
  message: Insecure message hash comparison detected. The original patch separates header and message hashes to ensure accurate
    change detection. Use separate hashes for headers and message content to prevent false positives in auto-save drafts.
  severity: ERROR
  metadata:
    source-url: github.com/horde/horde/commit/7ce7ed91b17089d0468c00ae9f743b58516d9bef
    category: security
    cwe:
    - CWE-345
    owasp:
    - A02:2021-Cryptographic Failures
    technology:
    - javascript
