rules:
- id: vuln-openpgpjs-0be91133
  patterns:
  - pattern: |
      s2k_iteration_count_byte: 96
  - pattern-not: |
      s2k_iteration_count_byte: 224
  languages:
  - javascript
  message: |
    Insecure S2K iteration count byte detected. The value 96 for s2k_iteration_count_byte is too low and can weaken cryptographic security. Use a higher value like 224 to ensure stronger key derivation.
  severity: ERROR
  metadata:
    source-url: github.com/openpgpjs/openpgpjs/commit/0be91133665e81d2007cdfa02cd3cf1d839ee4f1
    category: security
    cwe: CWE-326
    owasp: A02:2021-Cryptographic Failures
    references: https://www.openpgp.org/
    technology:
    - javascript
- id: vuln-openpgpjs-6b43e02a
  patterns:
  - pattern: |
      $HEADER.match(/Hash: (.+)/)
  - pattern-not: |
      $HEADER.match(/^Hash: (.+)$/)
  languages:
  - javascript
  message: |
    Insecure regex pattern for matching "Hash" header in cleartext messages. This can lead to header spoofing attacks where arbitrary text can be inserted around the hash header. Use a regex that anchors the pattern to the start and end of the line to prevent this.
  severity: ERROR
  metadata:
    source-url: github.com/openpgpjs/openpgpjs/commit/6b43e02a254853f5ff508ebd1b07541f78b7c566
    category: security
    cwe: CWE-20
    owasp: A1:2017-Injection
    references:
    - https://github.com/openpgpjs/openpgpjs/commit/6b43e02a254853f5ff508ebd1b07541f78b7c566
    technology:
    - javascript
- id: vuln-openpgpjs-804e9114
  patterns:
  - pattern: |
      $PACKET.preferredSymmetricAlgorithms = [];
      $PACKET.preferredSymmetricAlgorithms.push($ALGO1);
      $PACKET.preferredSymmetricAlgorithms.push($ALGO2);
      $PACKET.preferredSymmetricAlgorithms.push($ALGO3);
  - pattern-not: |
      $PACKET.preferredSymmetricAlgorithms = createdPreferredAlgos([$ALGO1, $ALGO2, $ALGO3], $CONFIG);
  languages:
  - javascript
  message: Insecure algorithm preference ordering detected. Use the `createdPreferredAlgos` function to ensure secure and configurable algorithm ordering.
  severity: ERROR
  metadata:
    source-url: github.com/openpgpjs/openpgpjs/commit/804e91140a83cdc1e2d8477b690a756162fd8102
    category: security
    cwe: CWE-327
    owasp: A6:2017-Security Misconfiguration
    references: https://www.chromium.org/blink/webcrypto#TOC-AES-support
    technology: javascript
