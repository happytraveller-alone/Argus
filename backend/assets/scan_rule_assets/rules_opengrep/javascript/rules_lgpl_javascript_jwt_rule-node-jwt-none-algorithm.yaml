rules:
- id: rules_lgpl_javascript_jwt_rule-node-jwt-none-algorithm
  mode: taint
  pattern-sources:
  - pattern: $JWT = require("jsonwebtoken")
  - pattern: import $JWT from "jsonwebtoken"
  pattern-sinks:
  - pattern: $JWT.verify($P, $X, {...,algorithms:[...,'none',...],...},...)
  - pattern: $JWT.sign($P, $X, {...,algorithm:'none',...},...)
  message: |
    检测到JWT
    验证/密钥配置风险（规则：rules_lgpl_javascript_jwt_rule-node-jwt-none-algorithm）。危害：令牌可能被伪造、绕过签名校验，或因硬编码密钥泄露导致身份冒用。建议：强制校验签名和算法，使用安全随机密钥并通过配置/密钥管理系统加载。
    保留的关键标识：'none'、`{algorithm:'none'}`、`jsonwebtoken`。
  languages:
  - javascript
  severity: ERROR
  metadata:
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    cwe: CWE-327
    shortDescription: Use of a broken or risky cryptographic algorithm
    security-severity: CRITICAL
    category: security
