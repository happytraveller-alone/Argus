rules:
- id: vuln-bigbluebutton-39a685be
  pattern: |
    const $DIV = document.createElement('div');
    $DIV.innerHTML = $INPUT;
    ...
  pattern-not: |
    import { stripTags, unescapeHtml, escapeHtml } from '/imports/utils/string-utils';
    ...
    unescapeHtml(stripTags($INPUT));
    ...
    escapeHtml($INPUT);
  languages:
  - javascript
  message: Potential XSS vulnerability due to unsafe HTML manipulation. Use the provided string-utils functions (stripTags, unescapeHtml, escapeHtml) for safe HTML handling.
  severity: ERROR
  metadata:
    source-url: github.com/bigbluebutton/bigbluebutton/commit/39a685be8b006d4d5472f54dda0657851a726569
    category: security
    cwe:
    - CWE-79
    owasp:
    - 'A7: Cross-Site Scripting (XSS)'
    references:
    - https://owasp.org/www-community/attacks/xss/
    technology:
    - javascript
- id: vuln-bigbluebutton-d43ea3f9
  pattern: |
    WebApp.connectHandlers.use('/useragent', (req, res) => {
      const $USER_AGENT = req.headers['user-agent'];
      ...
      res.writeHead(200);
      res.end($RESPONSE);
    });
  pattern-not: |
    WebApp.connectHandlers.use('/useragent', (req, res) => {
      const $USER_AGENT = req.headers['user-agent'];
      ...
      res.setHeader('Content-Type', 'application/json');
      res.writeHead(200);
      res.end($RESPONSE);
    });
  languages:
  - javascript
  message: |
    Missing Content-Type header in HTTP response can lead to security issues like MIME sniffing attacks.
    Always set the appropriate Content-Type header to prevent browsers from interpreting responses incorrectly.
  severity: ERROR
  metadata:
    source-url: github.com/bigbluebutton/bigbluebutton/commit/d43ea3f94c9814b9cdfca4581aa26008e15572c6
    category: security
    cwe: CWE-116
    owasp: 'A6: Security Misconfiguration'
    references:
    - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Type
    technology:
    - javascript
