rules:
- id: rules_lgpl_javascript_jwt_rule-hardcoded-jwt-secret
  patterns:
  - pattern-either:
    - pattern-inside: |
        const $JWT = require("jsonwebtoken");
        ...
    - pattern-inside: |
        const $JOSE = require("jose");
        ...
    - pattern-inside: |
        import $JWT from "jsonwebtoken"
        ...
    - pattern-inside: |
        import $JOSE from "jose"
        ...
  - pattern-either:
    - pattern: $JWT.sign($PAYLOAD, "...", ...)
    - pattern: $JWT.verify($PAYLOAD, "...", ...)
    - pattern: new $JOSE.SignJWT(...). ... .sign("...")
    - pattern: |
        var $TOKEN = new $JOSE.SignJWT(...). ...
        ...
        $TOKEN. ... .sign("...")
    - pattern: $JOSE.jwtVerify( $TKN, "...", ... )
    - patterns:
      - pattern-either:
        - patterns:
          - pattern-inside: |
              var $KEY = $X
                ...
          - pattern-either:
            - pattern: new $JOSE.SignJWT(...). ... .sign($KEY)
            - patterns:
              - pattern: |
                  var $TOKEN = new $JOSE.SignJWT(...). ...
                  ...
                  $TOKEN. ... .sign($KEY)
              - pattern: $TOKEN. ... .sign($KEY)
            - pattern: $JOSE.jwtVerify( $TKN, $KEY, ... )
        - pattern: new $JOSE.SignJWT(...). ... .sign($X)
        - patterns:
          - pattern: |
              var $TOKEN = new $JOSE.SignJWT(...). ...
              ...
              $TOKEN. ... .sign($X)
          - pattern: $TOKEN. ... .sign($X)
        - pattern: $JOSE.jwtVerify( $TKN, $X, ... )
      - metavariable-pattern:
          metavariable: $X
          pattern-either:
          - pattern: new TextEncoder().encode( "...",... )
          - pattern: Uint8Array.from("...", ...)
  message: |
    检测到JWT
    验证/密钥配置风险（规则：rules_lgpl_javascript_jwt_rule-hardcoded-jwt-secret）。危害：令牌可能被伪造、绕过签名校验，或因硬编码密钥泄露导致身份冒用。建议：强制校验签名和算法，使用安全随机密钥并通过配置/密钥管理系统加载。
  languages:
  - javascript
  severity: ERROR
  metadata:
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    cwe: CWE-798
    shortDescription: Use of hard-coded credentials
    security-severity: HIGH
    category: security
