rules:
- id: detect-angular-open-redirect
  patterns:
  - pattern-either:
    - pattern: |
        $SOURCE = $INPUT;
        $window.location.href = $SOURCE + $STATICVALUE;
    - pattern: |
        $window.location.href = $SOURCE + $STATICVALUE;
  message: |
    检测到开放重定向风险（规则：detect-angular-open-redirect）。危害：攻击者可能把用户重定向到钓鱼站点或恶意页面，破坏登录和授权流程。建议：只允许跳转到可信域名或使用服务端固定路径映射。
    保留的关键标识：$window。
  languages:
  - javascript
  metadata:
    references:
    - https://docs.angularjs.org/api/ng/service/$sce#trustAsJs
    - https://owasp.org/www-chapter-london/assets/slides/OWASPLondon20170727_AngularJS.pdf
    cwe:
    - 'CWE-601: URL Redirection to Untrusted Site (Open Redirect)'
    - 'CWE-20: Improper Input Validation'
  fix: ''
  severity: ERROR
