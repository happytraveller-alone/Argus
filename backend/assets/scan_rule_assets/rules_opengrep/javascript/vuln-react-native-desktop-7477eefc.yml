rules:
- id: vuln-react-native-desktop-7477eefc
  patterns:
  - pattern: |
      child_process.exec($BUILD_COMMAND, {cwd: $CWD}, (error, stdout, stderr) => {
        if (error)
          $REJECT(error);
        else {
          console.log(stdout);
          $RESOLVE();
        }
      });
  - pattern-not: |
      child_process.spawn($BUILD_COMMAND, $BUILD_ARGUMENTS, {cwd: $CWD});
      ...
      child.on('close', function (code) {
        if (code != 0) {
          $REJECT();
        } else {
          $RESOLVE();
        }
      });
  languages:
  - javascript
  message: |
    Detected use of child_process.exec() which can lead to command injection vulnerabilities.
    The command string is constructed by concatenating user-controlled input, making it vulnerable to injection attacks.
    Use child_process.spawn() with an array of arguments instead to safely handle command execution.
  severity: ERROR
  metadata:
    source-url: github.com/status-im/react-native-desktop/commit/7477eefc1736017ddb9bd2de259e2f0301332847
    category: security
    cwe:
    - CWE-78
    owasp:
    - 'A1: Injection'
    references:
    - https://nodejs.org/api/child_process.html#child_process_child_process_exec_command_options_callback
    technology:
    - javascript
