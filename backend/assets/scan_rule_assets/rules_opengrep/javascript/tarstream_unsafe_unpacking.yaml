rules:
- id: tarstream_unsafe_unpacking
  languages:
  - javascript
  severity: ERROR
  message: |
    检测到路径穿越/不安全解包风险（规则：tarstream_unsafe_unpacking）。危害：归档条目、路径输入或服务端视图路径可能访问/写入目标目录之外，造成敏感文件泄露、任意文件覆盖或恶意内容植入。建议：规范化路径并校验其仍位于目标目录内，拒绝绝对路径和
    `..` 路径段，避免把用户输入直接作为视图或文件路径。
  patterns:
  - patterns:
    - pattern-either:
      - pattern-inside: |
          $TARSTREAM = require('tar-stream')
          ...
      - pattern-inside: |
          import $TARSTREAM from 'tar-stream'
          ...
    - pattern-either:
      - pattern-inside: |
          $TAR = $TARSTREAM.extract()
          ...
          $TAR.on('entry', ($ENTRY, $STREAM, ...) => {
              ...
          })
  - pattern-either:
    - pattern-either:
      - pattern: $FS.writeFileSync(<... $ENTRY.name ...>, ..., ...)
      - pattern: $FS.writeFileAsync(<... $ENTRY.name ...>, ..., ...)
      - patterns:
        - pattern-inside: |
            $STREAM.pipe(...)
        - pattern: $FS.createWriteStream(<... $ENTRY.name ...>, ...)
      - pattern: $FS.createWriteStream(<... $PATH ...>, ...)
    - patterns:
      - pattern-either:
        - pattern: $FS.writeFileSync($PATH, ..., ...)
        - pattern: $FS.writeFileAsync($PATH, ..., ...)
        - patterns:
          - pattern-inside: |
              $STREAM.pipe(...)
          - pattern: $FS.createWriteStream(<... $PATH ...>, ...)
        - pattern: $FS.createWriteStream(<... $PATH ...>, ...)
      - pattern-not-inside: |
          $PATH = path.join(..., path.basename(<... $ENTRY.name ...>))
          ...
      - pattern-either:
        - pattern-inside: |
            $PATH = path.join(..., <... $ENTRY.name ...>)
            ...
        - pattern-inside: |
            $PATH = <... $ENTRY.name ...>
            ...
  metadata:
    cwe:
    - 'CWE-22: Path Traversal'
    - 'CWE-23: Relative Path Traversal'
    - 'CWE-36: Absolute Path Traversal'
    - 'CWE-73: External Control of File Name or Path'
    - 'CWE-59: Link Following'
