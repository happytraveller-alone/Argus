rules:
- id: express-jwt-hardcoded-secret
  message: |
    检测到JWT
    验证/密钥配置风险（规则：express-jwt-hardcoded-secret）。危害：令牌可能被伪造、绕过签名校验，或因硬编码密钥泄露导致身份冒用。建议：强制校验签名和算法，使用安全随机密钥并通过配置/密钥管理系统加载。
    保留的关键标识：https://cwe.mitre.org/data/definitions/522.html。
  severity: ERROR
  languages:
  - javascript
  metadata:
    cwe: 'CWE-522: Insufficiently Protected Credentials'
    owasp: 'A2: Broken Authentication'
    source-rule-url: https://r2c.dev/blog/2020/hardcoded-secrets-unverified-tokens-and-other-common-jwt-mistakes/
  patterns:
  - pattern-inside: |
      ...
      $JWT = require('express-jwt');
      ...
  - pattern-either:
    - pattern: |
        $JWT(<... {secret: "..."} ...>,...);
    - pattern: |
        $SECRET = "...";
        ...
        $JWT(<... {secret: $SECRET} ...>,...);
    - pattern: |
        $OPTS = <... {secret: "..."} ...>;
        ...
        $JWT($OPTS,...);
    - pattern: |-
        $SECRET = "...";
        ...
        $OPTS = <... {secret: $SECRET} ...>;
        ...
        $JWT($OPTS,...);
