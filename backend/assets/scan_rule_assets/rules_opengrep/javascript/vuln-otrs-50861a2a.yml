rules:
- id: vuln-otrs-50861a2a
  pattern: |
    $($IFRAME).load($SOURCE, $OPTIONS, function() {
        $BODY
    })
  pattern-not: |
    $($IFRAME).on('load', function() {
        $BODY
    })
  languages:
  - javascript
  message: |
    Potential security issue detected: Using .load() with dynamic content can lead to XSS vulnerabilities.
    The .load() method can execute arbitrary JavaScript if the source is controlled by an attacker.
    Use .on('load', ...) instead to safely handle iframe loading events.
  severity: ERROR
  metadata:
    source-url: github.com/OTRS/otrs/commit/50861a2a1183a07daf99cc2e71395e79f022338f
    category: security
    cwe: CWE-79
    owasp: A3:2017-Cross-Site Scripting (XSS)
    technology:
    - javascript
