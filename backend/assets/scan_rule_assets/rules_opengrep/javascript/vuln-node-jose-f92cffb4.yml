rules:
- id: vuln-node-jose-f92cffb4
  pattern: |
    var $PRIVKEY = ecUtil.convertToForge($KEY, false);
    if (!$PROPS.public) {
      return Promise.reject(new Error("invalid EC public key"));
    }
    var $PUBKEY = ecUtil.convertToForge($PROPS.public, true);
    var $SECRET = $PRIVKEY.computeSecret($PUBKEY);
  pattern-not: |
    var $PRIVKEY = ecUtil.convertToForge($KEY, false);
    var $P = validatePublic($PROPS.public, "forge");
    $P = $P.then(function($PUBKEY) {
      var $SECRET = $PRIVKEY.computeSecret($PUBKEY);
  languages:
  - javascript
  message: |
    Missing public key validation in ECDH key exchange. The original code did not validate the public key before using it in computeSecret, which could lead to cryptographic vulnerabilities. The fix introduces a validatePublic function to ensure the public key is valid before use.
  severity: ERROR
  metadata:
    source-url: github.com/cisco/node-jose/commit/f92cffb4a0398b4b1158be98423369233282e0af
    category: security
    cwe: CWE-327
    owasp: A03:2021 - Cryptographic Failures
    technology:
    - javascript
