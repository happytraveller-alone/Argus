rules:
- id: vuln-trudesk-d107f12e
  patterns:
  - pattern: |
      const $MIMETYPE = $INFO.mimeType;
      if ($MIMETYPE.indexOf('image/') === -1) {
        ...
      }
  - pattern-not: |
      const $ALLOWED_EXTS = [...];
      if (!$ALLOWED_EXTS.includes($EXT)) {
        ...
      }
  languages:
  - javascript
  message: |
    Insecure file type validation detected. Checking only the MIME type is insufficient as it can be spoofed.
    Use a whitelist of allowed file extensions to ensure only safe file types are accepted.
  severity: ERROR
  metadata:
    source-url: github.com/polonel/trudesk/commit/d107f12e71c0fe1e7ac0fdc7463f59c4965a42cd
    category: security
    cwe: CWE-434
    owasp: 'A1: Injection'
    references:
    - https://owasp.org/www-community/vulnerabilities/Unrestricted_File_Upload
    technology:
    - javascript
- id: vuln-trudesk-fb2ef82b
  patterns:
  - pattern: |
      router.post('/tickets/uploadattachment', $MIDDLEWARE, $CONTROLLER)
  - pattern-not: |
      router.post(
        '/tickets/uploadattachment',
        middleware.redirectToLogin,
        middleware.csrfCheck,
        controllers.tickets.uploadAttachment
      )
  languages:
  - javascript
  message: Missing CSRF protection in file upload endpoint. This can lead to CSRF attacks where an attacker can upload malicious files. Add CSRF middleware to protect the endpoint.
  severity: ERROR
  metadata:
    source-url: github.com/polonel/trudesk/commit/fb2ef82b0a39d0a560a261e07c3c73ba25332ecb
    category: security
    cwe: CWE-352
    owasp: A05:2021-Security Misconfiguration
    technology: javascript
