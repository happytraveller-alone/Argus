rules:
- id: express-phantom-injection
  message: 'If unverified user data can reach the `phantom` methods it can result in Server-Side Request Forgery vulnerabilities

    '
  metadata:
    owasp: 'A1: Injection'
    cwe: 'CWE-918: Server-Side Request Forgery (SSRF)'
  severity: ERROR
  languages:
  - javascript
  patterns:
  - pattern-inside: '...

      require(''phantom'');

      ...

      '
  - pattern-inside: '...

      require(''express'');

      ...

      '
  - pattern-either:
    - pattern-inside: function $FUNC($REQ, $RES, ...) {...}
    - pattern-inside: $X = function $FUNC($REQ, $RES, ...) {...}
    - pattern-inside: var $X = function $FUNC($REQ, $RES, ...) {...};
    - pattern-inside: $APP.$METHOD(..., function $FUNC($REQ, $RES, ...) {...})
  - pattern-either:
    - pattern: $PAGE.open(<... $REQ.$QUERY.$FOO ...>,...)
    - pattern: $PAGE.setContent(<... $REQ.$QUERY.$FOO ...>,...)
    - pattern: $PAGE.open(<... $REQ.$BODY ...>,...)
    - pattern: $PAGE.setContent(<... $REQ.$BODY ...>,...)
    - pattern: $PAGE.openUrl(<... $REQ.$QUERY.$FOO ...>,...)
    - pattern: $PAGE.openUrl(<... $REQ.$BODY ...>,...)
    - pattern: $PAGE.evaluateJavaScript(<... $REQ.$QUERY.$FOO ...>,...)
    - pattern: $PAGE.evaluateJavaScript(<... $REQ.$BODY ...>,...)
    - pattern: $PAGE.property("content",<... $REQ.$QUERY.$FOO ...>,...)
    - pattern: $PAGE.property("content",<... $REQ.$BODY ...>,...)
    - pattern: '$INPUT = <... $REQ.$QUERY.$FOO ...>;

        ...

        $PAGE.open(<... $INPUT ...>,...);

        '
    - pattern: '$INPUT = <... $REQ.$BODY ...>;

        ...

        $PAGE.open(<... $INPUT ...>,...);

        '
    - pattern: '$INPUT = <... $REQ.$QUERY.$FOO ...>;

        ...

        $PAGE.setContent(<... $INPUT ...>,...);

        '
    - pattern: '$INPUT = <... $REQ.$BODY ...>;

        ...

        $PAGE.setContent(<... $INPUT ...>,...);

        '
    - pattern: '$INPUT = <... $REQ.$QUERY.$FOO ...>;

        ...

        $PAGE.openUrl(<... $INPUT ...>,...);

        '
    - pattern: '$INPUT = <... $REQ.$BODY ...>;

        ...

        $PAGE.openUrl(<... $INPUT ...>,...);

        '
    - pattern: '$INPUT = <... $REQ.$QUERY.$FOO ...>;

        ...

        $PAGE.evaluateJavaScript(<... $INPUT ...>,...);

        '
    - pattern: '$INPUT = <... $REQ.$BODY ...>;

        ...

        $PAGE.evaluateJavaScript(<... $INPUT ...>,...);

        '
    - pattern: '$INPUT = <... $REQ.$QUERY.$FOO ...>;

        ...

        $PAGE.property("content",<... $INPUT ...>,...);

        '
    - pattern: '$INPUT = <... $REQ.$BODY ...>;

        ...

        $PAGE.property("content",<... $INPUT ...>,...);'
- id: express-phantom-injection_1
  languages:
  - javascript
  message: If unverified user data can reach the `phantom` methods it can result in Server-Side Request Forgery vulnerabilities
  metadata:
    category: security
    confidence: MEDIUM
    cwe:
    - 'CWE-918: Server-Side Request Forgery (SSRF)'
    cwe2021-top25: true
    cwe2022-top25: true
    impact: MEDIUM
    likelihood: MEDIUM
    owasp:
    - A10:2021 - Server-Side Request Forgery (SSRF)
    references:
    - https://phantomjs.org/page-automation.html
    subcategory:
    - vuln
    technology:
    - express
  mode: taint
  pattern-sinks:
  - patterns:
    - pattern-either:
      - pattern-inside: 'require(''phantom'');

          ...

          '
      - pattern-inside: 'import ''phantom'';

          ...

          '
    - pattern-either:
      - pattern: $PAGE.open($SINK,...)
      - pattern: $PAGE.setContent($SINK,...)
      - pattern: $PAGE.openUrl($SINK,...)
      - pattern: $PAGE.evaluateJavaScript($SINK,...)
      - pattern: $PAGE.property("content",$SINK,...)
    - focus-metavariable: $SINK
  pattern-sources:
  - patterns:
    - pattern-either:
      - pattern-inside: function ... ($REQ, $RES) {...}
      - pattern-inside: function ... ($REQ, $RES, $NEXT) {...}
      - patterns:
        - pattern-either:
          - pattern-inside: $APP.$METHOD(..., function $FUNC($REQ, $RES) {...})
          - pattern-inside: $APP.$METHOD(..., function $FUNC($REQ, $RES, $NEXT) {...})
        - metavariable-regex:
            metavariable: $METHOD
            regex: ^(get|post|put|head|delete|options)$
    - pattern-either:
      - pattern: $REQ.query
      - pattern: $REQ.body
      - pattern: $REQ.params
      - pattern: $REQ.cookies
      - pattern: $REQ.headers
  - patterns:
    - pattern-either:
      - pattern-inside: '({ $REQ }: Request,$RES: Response, $NEXT: NextFunction) =>

          {...}

          '
      - pattern-inside: '({ $REQ }: Request,$RES: Response) => {...}

          '
    - focus-metavariable: $REQ
    - pattern-either:
      - pattern: params
      - pattern: query
      - pattern: cookies
      - pattern: headers
      - pattern: body
  severity: ERROR
