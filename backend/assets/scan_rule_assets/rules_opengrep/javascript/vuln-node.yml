rules:
- id: vuln-node-1780bbc3
  pattern: |
    if ($OPTIONS.rejectUnauthorized) {
      ...
    }
  pattern-not: |
    if ($OPTIONS.rejectUnauthorized !== false) {
      ...
    }
  languages:
  - javascript
  message: |
    The `rejectUnauthorized` property check is vulnerable when explicitly set to `undefined`. This can cause the default value (`true`) to fail, potentially allowing unauthorized connections. Always explicitly check if `rejectUnauthorized` is `false` to ensure secure TLS connections.
  severity: ERROR
  metadata:
    source-url: github.com/nodejs/node/commit/1780bbc3291357f7c3370892eb311fc7a62afe8d
    category: security
    cwe:
    - CWE-295
    owasp:
    - A02:2021-Cryptographic Failures
    technology:
    - javascript
- id: vuln-node-9aeda47d
  pattern: |
    if ($SLASHES && !($PROTO && $HOSTLESS_PROTOCOL.has($LOWER_PROTO))) {
      $REST = $REST.slice(2);
      $THIS.slashes = true;
    }
  pattern-not: |
    if (!($PROTO && $HOSTLESS_PROTOCOL.has($LOWER_PROTO))) {
      if ($SLASHES) {
        $REST = $REST.slice(2);
        $THIS.slashes = true;
      } else if ($AT) {
        $REST = $REST.slice(1);
      }
    }
  languages:
  - javascript
  message: |
    URL parsing vulnerability detected. The code fails to properly handle URLs with an '@' character, which can lead to incorrect URL resolution. This can be exploited to bypass security checks or manipulate URL parsing behavior. Update the code to handle '@' characters correctly by checking for them explicitly before processing the URL.
  severity: ERROR
  metadata:
    source-url: github.com/nodejs/node/commit/9aeda47d9c
    category: security
    cwe:
    - CWE-20
    owasp:
    - 'A1: Injection'
    references:
    - https://nodejs.org/api/url.html
    technology:
    - javascript
- id: vuln-node-bf00665a
  pattern: |
    const $RESULT = win32SplitPath($PATH);
    const $ROOT = $RESULT[0];
    var $DIR = $RESULT[1];
    if (!$ROOT && !$DIR) {
      ...
    }
    if ($DIR) {
      $DIR = $DIR.substr(0, $DIR.length - 1);
    }
    return $ROOT + $DIR;
  pattern-not: |
    const $LEN = $PATH.length;
    if ($LEN === 0)
    ...
    for (var $I = $LEN - 1; $I >= $OFFSET; --$I) {
      $CODE = $PATH.charCodeAt($I);
      if ($CODE === 47 || $CODE === 92) {
        if (!$MATCHEDSLASH) {
          $END = $I;
          break;
        }
      } else {
        $MATCHEDSLASH = false;
      }
    }
    if ($END === -1) {
      if ($ROOTEND === -1)
        return ".";
      else
        $END = $ROOTEND;
    }
    return $PATH.slice(0, $END);
  languages:
  - javascript
  message: |
    Insecure path handling detected. The old implementation used a regex-based split approach that could be vulnerable to path manipulation attacks. The new implementation uses a more secure character-by-character parsing approach. Update your path handling code to use the new secure implementation.
  severity: ERROR
  metadata:
    source-url: github.com/nodejs/node/commit/bf00665af68c8aaf43112a244535bd1094d68f16
    category: security
    cwe: CWE-22
    owasp: A1:2017-Injection
    technology:
    - javascript
    - nodejs
    references:
    - https://nodejs.org/api/path.html
    - https://cwe.mitre.org/data/definitions/22.html
