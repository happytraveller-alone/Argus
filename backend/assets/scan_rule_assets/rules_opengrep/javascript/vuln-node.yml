rules:
- id: vuln-node-1780bbc3
  pattern: "if ($OPTIONS.rejectUnauthorized) {\n  ...\n}\n"
  pattern-not: "if ($OPTIONS.rejectUnauthorized !== false) {\n  ...\n}\n"
  languages:
  - javascript
  message: 'The `rejectUnauthorized` property check is vulnerable when explicitly set to `undefined`. This can cause the default
    value (`true`) to fail, potentially allowing unauthorized connections. Always explicitly check if `rejectUnauthorized`
    is `false` to ensure secure TLS connections.

    '
  severity: ERROR
  metadata:
    source-url: github.com/nodejs/node/commit/1780bbc3291357f7c3370892eb311fc7a62afe8d
    category: security
    cwe:
    - CWE-295
    owasp:
    - A02:2021-Cryptographic Failures
    technology:
    - javascript
- id: vuln-node-9aeda47d
  pattern: "if ($SLASHES && !($PROTO && $HOSTLESS_PROTOCOL.has($LOWER_PROTO))) {\n  $REST = $REST.slice(2);\n  $THIS.slashes\
    \ = true;\n}\n"
  pattern-not: "if (!($PROTO && $HOSTLESS_PROTOCOL.has($LOWER_PROTO))) {\n  if ($SLASHES) {\n    $REST = $REST.slice(2);\n\
    \    $THIS.slashes = true;\n  } else if ($AT) {\n    $REST = $REST.slice(1);\n  }\n}\n"
  languages:
  - javascript
  message: 'URL parsing vulnerability detected. The code fails to properly handle URLs with an ''@'' character, which can
    lead to incorrect URL resolution. This can be exploited to bypass security checks or manipulate URL parsing behavior.
    Update the code to handle ''@'' characters correctly by checking for them explicitly before processing the URL.

    '
  severity: ERROR
  metadata:
    source-url: github.com/nodejs/node/commit/9aeda47d9c
    category: security
    cwe:
    - CWE-20
    owasp:
    - 'A1: Injection'
    references:
    - https://nodejs.org/api/url.html
    technology:
    - javascript
- id: vuln-node-bf00665a
  pattern: "const $RESULT = win32SplitPath($PATH);\nconst $ROOT = $RESULT[0];\nvar $DIR = $RESULT[1];\nif (!$ROOT && !$DIR)\
    \ {\n  ...\n}\nif ($DIR) {\n  $DIR = $DIR.substr(0, $DIR.length - 1);\n}\nreturn $ROOT + $DIR;\n"
  pattern-not: "const $LEN = $PATH.length;\nif ($LEN === 0)\n...\nfor (var $I = $LEN - 1; $I >= $OFFSET; --$I) {\n  $CODE\
    \ = $PATH.charCodeAt($I);\n  if ($CODE === 47 || $CODE === 92) {\n    if (!$MATCHEDSLASH) {\n      $END = $I;\n      break;\n\
    \    }\n  } else {\n    $MATCHEDSLASH = false;\n  }\n}\nif ($END === -1) {\n  if ($ROOTEND === -1)\n    return \".\";\n\
    \  else\n    $END = $ROOTEND;\n}\nreturn $PATH.slice(0, $END);\n"
  languages:
  - javascript
  message: 'Insecure path handling detected. The old implementation used a regex-based split approach that could be vulnerable
    to path manipulation attacks. The new implementation uses a more secure character-by-character parsing approach. Update
    your path handling code to use the new secure implementation.

    '
  severity: ERROR
  metadata:
    source-url: github.com/nodejs/node/commit/bf00665af68c8aaf43112a244535bd1094d68f16
    category: security
    cwe: CWE-22
    owasp: A1:2017-Injection
    technology:
    - javascript
    - nodejs
    references:
    - https://nodejs.org/api/path.html
    - https://cwe.mitre.org/data/definitions/22.html
