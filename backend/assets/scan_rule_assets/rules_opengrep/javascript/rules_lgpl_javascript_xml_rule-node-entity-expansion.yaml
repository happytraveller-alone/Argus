rules:
- id: rules_lgpl_javascript_xml_rule-node-entity-expansion
  patterns:
  - pattern-either:
    - pattern-inside: function ($REQ, $RES, ...) {...}
    - pattern-inside: function $FUNC($REQ, $RES, ...) {...}
    - pattern-inside: $X = function $FUNC($REQ, $RES, ...) {...}
    - pattern-inside: var $X = function $FUNC($REQ, $RES, ...) {...};
    - pattern-inside: $APP.$METHOD(..., function $FUNC($REQ, $RES, ...) {...})
  - pattern-either:
    - pattern: |
        $PARSER = new expat.Parser()
        ...
        $PARSER.write(..., <... $REQ.$QUERY ...>, ...)
    - pattern: |
        $PARSER = new expat.Parser()
        ...
        $PARSER.write(..., <... $REQ.$QUERY.$FOO ...>, ...)
    - pattern: |
        $PARSER = new expat.Parser()
        ...
        $PARSER.write(..., <... $REQ.$QUERY.$FOO.$FILE ...>, ...)
  message: |
    检测到XML
    外部实体（XXE）/实体扩展风险（规则：rules_lgpl_javascript_xml_rule-node-entity-expansion）。危害：攻击者可能读取服务器本地文件、发起内网请求，或通过实体扩展造成资源耗尽。建议：禁用外部实体和危险的
    DOCTYPE/实体扩展能力，并只解析可信 XML。
  languages:
  - javascript
  severity: ERROR
  metadata:
    owasp:
    - A4:2017-XML External Entities (XXE)
    - A05:2021-Security Misconfiguration
    cwe: CWE-776
    shortDescription: Improper restriction of recursive entity references in DTDs (XML Entity Expansion)
    security-severity: CRITICAL
    category: security
