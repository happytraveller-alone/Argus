rules:
- id: c_buffer_rule-getwd
  languages:
  - c
  - cpp
  message: '`getwd` does not contain a parameter to limit how many characters can
    be copied into the

    destination buffer. For portability and security reasons `getwd` has been deprecated
    in

    favor of `getcwd`.


    For more information please see: https://linux.die.net/man/3/getcwd

    '
  metadata:
    shortDescription: Insufficient protection against buffer overflow (getwd)
    cwe: CWE-120
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: High
    category: security
  pattern: getwd(...)
  severity: WARNING
