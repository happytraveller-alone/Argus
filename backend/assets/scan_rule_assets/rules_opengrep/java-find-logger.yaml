rules:
- id: java-find-logger
  languages:
  - java
  severity: ERROR
  patterns:
  - pattern-either:
    - pattern: 'LOG.info($VALUE1 + $VALUE2)

        '
    - pattern: 'LOG.info($VALUE1 + $VALUE2 + $VALUE3)

        '
  message: '$VALUE1, $VALUE2, $VALUE3

    '
  metadata:
    cwe:
    - 'CWE-532: Inclusion of Sensitive Information in Log Files'
    - 'CWE-117: Improper Output Neutralization for Logs'
