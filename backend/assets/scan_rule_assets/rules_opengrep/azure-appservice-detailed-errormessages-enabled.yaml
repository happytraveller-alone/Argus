rules:
- id: azure-appservice-detailed-errormessages-enabled
  message: Ensure that App service enables detailed error messages
  patterns:
  - pattern: resource
  - pattern-not-inside: "resource \"azurerm_app_service\" \"...\" {\n...\nlogs {\n\
      \  ...\n  detailed_error_messages_enabled = true\n  ...\n}\n...\n}\n"
  - pattern-inside: 'resource "azurerm_app_service" "..." {

      ...

      }

      '
  metadata:
    owasp:
    - A10:2017 - Insufficient Logging & Monitoring
    - A09:2021 - Security Logging and Monitoring Failures
    cwe:
    - 'CWE-778: Insufficient Logging'
    category: security
    technology:
    - terraform
    - azure
    references:
    - https://owasp.org/Top10/A09_2021-Security_Logging_and_Monitoring_Failures
    subcategory:
    - vuln
    likelihood: LOW
    impact: LOW
    confidence: MEDIUM
  languages:
  - hcl
  severity: WARNING
