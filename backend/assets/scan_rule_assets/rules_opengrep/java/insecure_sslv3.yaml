rules:
- id: insecure_sslv3
  patterns:
  - pattern-either:
    - pattern: |
        $S.getInstance("SSLv3");
  message: |
    检测到TLS/证书或主机校验配置不当风险（规则：insecure_sslv3）。危害：跳过证书、主机密钥校验或使用弱 TLS
    配置会使连接暴露于中间人攻击，导致数据被窃听或篡改。建议：启用证书链、主机名或主机密钥校验，禁用过时协议和弱加密套件。
  languages:
  - java
  severity: ERROR
  metadata:
    cwe: cwe-327
    owasp-mobile: m5
    masvs: crypto-4
    reference: https://github.com/MobSF/owasp-mstg/blob/master/Document/0x04g-Testing-Cryptography.md#identifying-insecure-andor-deprecated-cryptographic-algorithms-mstg-crypto-4
