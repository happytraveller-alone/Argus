rules:
- id: java_crypto_rule-CipherECBMode
  languages:
  - java
  patterns:
  - pattern-inside: javax.crypto.Cipher.getInstance("...")
  - pattern-regex: (AES|DES(ede)?)(/ECB/*)
  message: |
    检测到弱加密/加密参数错误风险（规则：java_crypto_rule-CipherECBMode）。危害：过时算法、重复
    nonce/IV、弱密钥长度或缺少认证校验会削弱机密性和完整性，可能导致明文恢复或数据篡改。建议：使用现代算法和正确参数，例如 AES-GCM/ChaCha20-Poly1305，保证
    nonce/IV 唯一，使用足够密钥长度并完成认证校验。
    保留的关键标识：https://docs.oracle.com/en/java/javase/15/security/java-cryptography-architecture-jca-reference-guide.html、`ChaCha20Poly1305`、`AES-256-GCM`。
  severity: ERROR
  metadata:
    shortDescription: Use of a broken or risky cryptographic algorithm
    category: security
    cwe: CWE-327
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    technology:
    - java
    security-severity: Medium
