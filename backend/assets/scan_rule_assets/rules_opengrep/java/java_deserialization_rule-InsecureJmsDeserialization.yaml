rules:
- id: java_deserialization_rule-InsecureJmsDeserialization
  languages:
  - java
  patterns:
  - pattern-inside: |
      class $JMS_LISTENER implements MessageListener {
        ...
        public void onMessage(Message $JMS_MSG) {
            ...
        }
      }
  - pattern: $Y.getObject(...);
  message: |
    检测到不安全反序列化风险（规则：java_deserialization_rule-InsecureJmsDeserialization）。危害：恶意序列化数据可能触发对象构造、代码执行或业务状态篡改。建议：只反序列化可信数据，使用安全加载函数或限制可反序列化类型。
    保留的关键标识：ObjectMessage.getObject()、`ObjectMessage.getObject()`。
  metadata:
    cwe: CWE-502
    owasp:
    - A8:2017-Insecure Deserialization
    - A08:2021-Software and Data Integrity Failures
    category: security
    shortDescription: Deserialization of untrusted data
    security-severity: High
    references:
    - https://www.blackhat.com/docs/us-16/materials/us-16-Kaiser-Pwning-Your-Java-Messaging-With-Deserialization-Vulnerabilities-wp.pdf
    technology:
    - java
    cwe2022-top25: 'true'
    cwe2021-top25: 'true'
    subcategory:
    - vuln
    likelihood: LOW
    impact: MEDIUM
    confidence: MEDIUM
    license: Commons Clause License Condition v1.0[LGPL-2.1-only]
    vulnerability_class:
    - 'Insecure Deserialization '
  severity: ERROR
