rules:
- id: java_password_rule-EmptyDBPassword
  languages:
  - java
  patterns:
  - pattern: java.sql.DriverManager.getConnection($URI, $USR, "");
  message: |
    检测到硬编码凭据风险（规则：java_password_rule-EmptyDBPassword）。危害：密钥或口令进入源码后容易泄露，导致认证绕过、会话伪造或横向访问。建议：改用环境变量、密钥管理服务或安全配置注入。
    保留的关键标识：https://cloud.google.com/kms/docs、https://aws.amazon.com/kms/、https://www.vaultproject.io/。
  severity: ERROR
  metadata:
    shortDescription: Missing authentication for critical function (database)
    category: security
    cwe: CWE-306
    owasp:
    - A2:2017-Broken Authentication
    - A07:2021-Identification and Authentication Failures
    technology:
    - java
    security-severity: Critical
