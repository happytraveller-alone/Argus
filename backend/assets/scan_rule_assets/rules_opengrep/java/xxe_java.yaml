rules:
- id: XXE
  metadata:
    owasp: 'A4: XXE'
    cwe: CWE-611
    references:
    - https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html
    - https://github.com/OWASP/CheatSheetSeries/blob/master/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.md
  patterns:
  - pattern-either:
    - pattern: |
        JAXBContext $JC = $W.newInstance($CLASS);
        ...
        Unmarshaller $JU = $JC.createUnmarshaller();
  - pattern-not-inside: "$RETURNTYPE $METHOD(...) {\n  ...\n  $X.setFeature(\"http://xml.org/sax/features/external-general-entities\", false);\n  $X.setFeature(\"http://xml.org/sax/features/external-parameter-entities\", false);\n  $X.setFeature(\"http://apache.org/xml/features/nonvalidating/load-external-dtd\", false);\n  ...\n}     \n"
  message: |
    检测到XML 外部实体（XXE）/实体扩展风险（规则：XXE）。危害：攻击者可能读取服务器本地文件、发起内网请求，或通过实体扩展造成资源耗尽。建议：禁用外部实体和危险的
    DOCTYPE/实体扩展能力，并只解析可信 XML。 保留的关键标识：$JC、'javax.xml.bind.Unmarshaller'、`$JC`。
  languages:
  - java
  severity: ERROR
