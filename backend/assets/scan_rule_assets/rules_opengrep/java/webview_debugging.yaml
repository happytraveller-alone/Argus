rules:
- id: webview_debugging
  patterns:
  - pattern-not-inside: |
      if (BuildConfig.DEBUG) {
        ...
      }
  - pattern-not-inside: |
      if ($X.DEBUG) {
        ...
      }
  - pattern-either:
    - pattern: |
        $WB.setWebContentsDebuggingEnabled(true);
  message: |
    检测到客户端容器安全配置风险（规则：webview_debugging）。危害：WebView/Electron
    安全配置过宽可能允许调试、明文加载或跨域访问，扩大代码执行和数据窃取风险。建议：关闭危险调试/禁用项，只加载可信 HTTPS 内容并隔离不可信页面。
  languages:
  - java
  severity: ERROR
  metadata:
    cwe: cwe-489
    owasp-mobile: m1
    masvs: resilience-2
    reference: https://github.com/MobSF/owasp-mstg/blob/master/Document/0x05j-Testing-Resiliency-Against-Reverse-Engineering.md#testing-anti-debugging-detection-mstg-resilience-2
