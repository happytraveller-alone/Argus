rules:
- id: rsa_no_oeap
  patterns:
  - pattern-either:
    - pattern: |
        Cipher.getInstance($X, ...)
    - pattern: |
        javax.crypto.Cipher.getInstance($X, ...)
  - metavariable-regex:
      metavariable: $X
      regex: (?i:^.{0,100}rsa/.{1,23}/nopadding.{0,100})
  message: |
    检测到弱加密/加密参数错误风险（规则：rsa_no_oeap）。危害：过时算法、重复
    nonce/IV、弱密钥长度或缺少认证校验会削弱机密性和完整性，可能导致明文恢复或数据篡改。建议：使用现代算法和正确参数，例如 AES-GCM/ChaCha20-Poly1305，保证
    nonce/IV 唯一，使用足够密钥长度并完成认证校验。
  languages:
  - java
  severity: ERROR
  metadata:
    cwe: cwe-780
    owasp-mobile: m5
    masvs: crypto-3
    reference: https://github.com/MobSF/owasp-mstg/blob/master/Document/0x04g-Testing-Cryptography.md#mobile-app-cryptography
