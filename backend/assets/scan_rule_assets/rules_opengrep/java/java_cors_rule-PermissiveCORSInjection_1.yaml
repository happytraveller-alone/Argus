rules:
- id: java_cors_rule-PermissiveCORSInjection_1
  languages:
  - java
  mode: taint
  pattern-sources:
  - pattern: (HttpServletRequest $REQ).getParameter(...)
  - pattern: (HttpServletRequest $REQ).getHeader(...)
  - pattern: (HttpServletRequest $REQ).getPathInfo()
  - pattern: (HttpServletRequest $REQ).getQueryString()
  - pattern: (HttpServletRequest $REQ).getAttribute(...)
  - pattern: (HttpServletRequest $REQ).getSession().getAttribute(...)
  - pattern: (HttpServletRequest $REQ).getServletContext().getAttribute(...)
  - pattern: (HttpServletRequest $REQ).getParameterValues(...)
  - pattern: (HttpServletRequest $REQ).getParameterNames()
  - pattern: (HttpServletRequest $REQ).getParameterMap()
  pattern-sinks:
  - patterns:
    - pattern-either:
      - pattern: (HttpServletResponse $RES).setHeader("$HEADER", ...)
      - pattern: (HttpServletResponse $RES).addHeader("$HEADER", ...)
    - metavariable-regex:
        metavariable: $HEADER
        regex: (?i)(Access-Control-Allow-Origin)
  message: "This application potentially allows user-supplied input into the value\
    \ of the\n`Access-Control-Allow-Origin` response header. This header is part of\
    \ the\n[Cross-Origin Resource Sharing](https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS)\
    \ CORS\nspecification. By allowing user input to specify which domains can communicate\
    \ with this\nserver,\nan adversary could exploit a weakness in this server to\
    \ force clients to send credentials (such\nas session\nidentifiers) to the adversary's\
    \ server.\n\nFor the above attack to work, the application would need to suffer\
    \ from an additional\nvulnerability,\nsuch as Cross-Site Scripting (XSS).\n\n\
    To remediate this issue, do not use user-supplied information when calling\n`HttpServletResponse.setHeader`\
    \ or `HttpServletResponse.addHeader`\nfor the `Access-Control-Allow-Origin` header's\
    \ value. Instead, hardcode the allowed domain(s)\nand reference them in a lookup\n\
    table:\nExample allowing dynamic but safe domains in `Access-Control-Allow-Origin`:\n\
    \n```\n  // this data should be in the class constructor or taken from a trusted\
    \ datasource\n  Map<String, String> allowedDomains = new HashMap();\n  allowedDomains.put(\"\
    sub1\", \"sub1.example.com\");\n  allowedDomains.put(\"sub2\", \"sub2.example.com\"\
    );\n\n  // extract the allowedDomain parameters value as a key to look up which\
    \ domain to provide\nvia the allowedDomains map\n  // if not found, sets sub1\
    \ as the default\n  String headerValue = allowedDomains.getOrDefault(request.getParameter(\"\
    allowedDomain\"),\nallowedDomains.get(\"sub1\"));\n\n  // add the header with\
    \ our trusted sub1.example.com or sub2.example.com domains.\n  response.addHeader(\"\
    Access-Control-Allow-Origin\", headerValue);\n}\n```\n\nFor more information on\
    \ `Access-Control-Allow-Origin` see:\nhttps://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Access-Control-Allow-Origin\n"
  severity: ERROR
  metadata:
    shortDescription: Permissive cross-domain policy with untrusted domains
    cwe: CWE-942
    category: security
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    technology:
    - java
    security-severity: Low
