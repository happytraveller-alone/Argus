rules:
- id: java_inject_rule-SeamLogInjection
  languages:
  - java
  patterns:
  - pattern: |
      $LOG.$INFO($X + $Y,...)
  - pattern-either:
    - pattern-inside: |
        import org.jboss.seam.log.Log;
        ...
    - pattern-inside: |
        org.jboss.seam.log.Log $LOG = ...;
        ...
  - metavariable-regex:
      metavariable: $INFO
      regex: (debug|error|fatal|info|trace|warn)
  message: |
    检测到代码执行/模板注入风险（规则：java_inject_rule-SeamLogInjection）。危害：未受信任内容可能被当作代码、模块名或模板表达式执行，导致任意代码执行或敏感数据泄露。建议：不要执行用户可控代码；使用沙箱白名单、禁用动态执行或改用安全模板
    API。 保留的关键标识：https://docs.jboss.org/seam/2.1.2/reference/en-US/html/concepts.html#d0e4244。
  severity: ERROR
  metadata:
    category: security
    shortDescription: Improper neutralization of directives in dynamically evaluated code ('Eval Injection')
    cwe: CWE-95
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    references:
    - https://owasp.org/Top10/A03_2021-Injection
    license: Commons Clause License Condition v1.0[LGPL-2.1-only]
    security-severity: CRITICAL
