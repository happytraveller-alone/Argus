rules:
- id: java_inject_rule-EnvInjection
  message: |
    检测到命令注入风险（规则：java_inject_rule-EnvInjection）。危害：外部输入可能被解释为系统命令或参数，导致任意命令执行、权限滥用或数据破坏。建议：避免拼接命令；使用固定命令、参数数组和严格白名单校验。
    保留的关键标识：Runtime.exec()、'exec'。
  languages:
  - java
  severity: ERROR
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-either:
      - pattern: |
          (HttpServletRequest $REQ)
  - patterns:
    - pattern-inside: |
        $FUNC(..., $VAR, ...) {
        ...
        }
    - pattern: $VAR
  pattern-sinks:
  - pattern-either:
    - patterns:
      - pattern: (java.lang.Runtime $R).exec($CMD, $ENV_ARGS, ...);
      - focus-metavariable: $ENV_ARGS
    - patterns:
      - pattern: (ProcessBuilder $PB).environment().put($...ARGS);
      - focus-metavariable: $...ARGS
    - patterns:
      - pattern: |
          $ENV = (ProcessBuilder $PB).environment();
          ...
          $ENV.put($...ARGS);
      - focus-metavariable: $...ARGS
  pattern-sanitizers:
  - patterns:
    - pattern-either:
      - pattern: |
          if($VALIDATION){
          ...
          }
      - patterns:
        - pattern-inside: |
            $A = $VALIDATION;
            ...
        - pattern: |
            if($A){
            ...
            }
    - metavariable-pattern:
        metavariable: $VALIDATION
        pattern-either:
        - pattern: |
            $AL.contains(...)
  metadata:
    shortDescription: Improper neutralization of special elements used in an OS command ('OS Command Injection')
    category: security
    technology:
    - java
    cwe: CWE-78
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    references:
    - https://owasp.org/Top10/A03_2021-Injection
    subcategory:
    - vuln
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: MEDIUM
    license: Commons Clause License Condition v1.0[LGPL-2.1-only]
    vulnerability_class:
    - Other
    security-severity: HIGH
