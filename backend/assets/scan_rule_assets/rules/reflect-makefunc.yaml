rules:
- id: reflect-makefunc
  message: "'reflect.MakeFunc' detected. This will sidestep protections that are\n\
    normally afforded by Go's type system. Audit this call and be sure that \nuser\
    \ input cannot be used to affect the code generated by MakeFunc; \notherwise,\
    \ you will have a serious security vulnerability.\n"
  metadata:
    owasp: 'A8: Insecure Deserialization'
    cwe: 'CWE-913: Improper Control of Dynamically-Managed Code Resources'
  severity: WARNING
  pattern: reflect.MakeFunc(...)
  languages:
  - go
