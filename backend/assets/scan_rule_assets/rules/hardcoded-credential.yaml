rules:
- id: hardcoded-credential
  languages:
  - java
  severity: INFO
  pattern-either:
  - pattern: $PASSWD = "=~/[0-9a-zA-Z]+/";
  - pattern: password = "...";
  - pattern: key = "...";
  message: '"Found hardcoded credential"

    '
  metadata:
    cwe:
    - 'CWE-798: Use of Hard-coded Credentials'
    - 'CWE-259: Use of Hard-coded Password'
