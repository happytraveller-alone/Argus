rules:
- id: raptor-pointer-subtraction
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/469
    - https://github.com/struct/mms
    confidence: MEDIUM
    cwe:
    - 'CWE-469: Use of Pointer Subtraction to Determine Size'
    - 'CWE-758: Reliance on Undefined, Unspecified, or Implementation-specific Behavior'
    - 'CWE-805: Buffer Access with Incorrect Length Value'
    - 'CWE-119: Improper Restriction of Operations within the Bounds of a Memory Buffer'
    - 'CWE-125: Out-of-bounds Read'
    - 'CWE-787: Out-of-bounds Write'
  message: The software subtracts one pointer from another in order to determine size,
    but this calculation can be incorrect if the pointers do not exist in the same
    memory chunk.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: (char * $_) - (char * $_)
  - pattern: (int * $_) - (int * $_)
  - pattern: (float * $_) - (float * $_)
  - pattern: (double * $_) - (double * $_)
  - patterns:
    - pattern-either:
      - pattern: $PTR1 - $PTR2
      - pattern: $PTR2 - $PTR1
    - pattern-either:
      - pattern-inside: '$_ * $PTR1;

          $_ * $PTR2;

          ...

          '
      - pattern-inside: '$_ * $PTR1 = $_;

          $_ * $PTR2 = $_;

          ...

          '
      - pattern-inside: '$_ * $PTR1 = $_;

          $_ * $PTR2;

          ...

          '
      - pattern-inside: '$_ * $PTR1;

          $_ * $PTR2 = $_;

          ...

          '
      - pattern-inside: '$_ * $PTR3 = $PTR1;

          $_ * $PTR2;

          ...

          '
      - pattern-inside: '$_ * $PTR2;

          $_ * $PTR3 = $PTR1;

          ...

          '
