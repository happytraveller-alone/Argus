rules:
- id: return-nil-err
  patterns:
  - pattern-either:
    - pattern: "if err == nil {\n        return err\n}\n"
    - pattern: "if err == nil {\n        return ..., err\n}\n"
  message: return nil err instead of nil value
  languages:
  - go
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-253: Incorrect Check for Function Return Value'
    - 'CWE-703: Improper Check or Handling of Exceptional Conditions'
