rules:
- id: read-io-eof
  patterns:
  - pattern: "$N, $ERR := $R.Read(($SLICE : []byte))\nif $ERR != nil {\n    return\
      \ ...\n}\n"
  - pattern-not: "$N, $ERR := rand.Read(($SLICE : []byte))\nif $ERR != nil {\n   \
      \ return ...\n}\n"
  message: Read() can return n bytes and io.EOF
  languages:
  - go
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-703: Improper Check or Handling of Exceptional Conditions'
