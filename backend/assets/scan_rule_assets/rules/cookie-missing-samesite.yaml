rules:
- id: cookie-missing-samesite
  metadata:
    cwe: 'CWE-352: Cross-Site Request Forgery (CSRF)'
    owasp: 'A6: Security Misconfiguration'
    references:
    - https://stackoverflow.com/questions/42717210/samesite-cookie-in-java-application
  message: 'Detected cookie without the SameSite attribute.

    '
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-not-inside: "$RETURNTYPE $METHOD(..., HttpServletResponse $RESP, ...)\
      \ {\n  ...\n  $RESP.setHeader(\"Set-Cookie\", \"=~/.*SameSite=.*/\");\n  ...\n\
      }\n"
  - pattern-either:
    - pattern: $RESP.addCookie(...);
    - pattern: $RESP.setHeader("Set-Cookie", ...);
