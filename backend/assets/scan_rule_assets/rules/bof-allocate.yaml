rules:
- id: bof-allocate
  severity: WARNING
  metadata:
    author: Maurizio Siddu
    confidence: high
    cwe:
    - 'CWE-120: Buffer Copy without Checking Size of Input'
    - 'CWE-119: Improper Restriction of Operations within the Bounds of a Memory Buffer'
    - 'CWE-787: Out-of-bounds Write'
    - 'CWE-20: Improper Input Validation'
  references:
  - https://owasp.org/www-community/vulnerabilities/Buffer_Overflow
  - https://cwe.mitre.org/data/definitions/120.html
  category: security
  message: Detected COBOL code that seems vulnerable to Buffer Overflow due the absence
    of size controls during dynamic allocation operation to avoid the writing of user
    controlled data from larger to smaller field. It is recommended to perform a proper
    data validation to limit the size of user controlled data before storing it.
  languages:
  - generic
  options:
    generic_engine: aliengrep
    generic_multiline: true
    generic_extra_word_characters:
    - '-'
    generic_caseless: true
  paths:
    include:
    - '*.cbl'
    - '*.cob'
    - '*.ccp'
    - '*.cpy'
    - '*.sqb'
  patterns:
  - pattern-either:
    - patterns:
      - pattern-inside: "WORKING-STORAGE SECTION\n...\n$PTR USAGE POINTER\n...\n$LONG\
          \ PIC $X($VAL1)\n...\nALLOCATE $LEN CHARACTERS INITIALIZED RETURNING $PTR\n\
          ...\nSET ADDRESS OF $SHORT TO $PTR\n...\nMOVE $LONG TO $SHORT \n"
      - metavariable-comparison:
          comparison: $LEN < $VAL1
          metavariable: $VAL1 $LEN
    - patterns:
      - pattern-inside: "WORKING-STORAGE SECTION\n...\n$PTR USAGE POINTER\n...\n$LONG\
          \ PIC $X($VAL1)\n...\nALLOCATE $LEN CHARACTERS RETURNING $PTR\n...\nSET\
          \ ADDRESS OF $SHORT TO $PTR\n...\nMOVE $LONG TO $SHORT \n"
      - metavariable-comparison:
          comparison: $LEN < $VAL1
          metavariable: $VAL1 $LEN
    - patterns:
      - pattern-inside: "WORKING-STORAGE SECTION\n...\n$SHORT PIC $X($VAL2) BASED\n\
          ...\n$LONG PIC $X($VAL1)\n...\nALLOCATE $SHORT INITIALIZED\n...\nMOVE $LONG\
          \ TO $SHORT \n"
      - metavariable-comparison:
          comparison: $VAL2 < $VAL1
          metavariable: $VAL1 $VAL2
    - patterns:
      - pattern-inside: "WORKING-STORAGE SECTION\n...\n$LONG PIC $X($VAL1)\n...\n\
          $SHORT PIC $X($VAL2) BASED\n...\nALLOCATE $SHORT INITIALIZED\n...\nMOVE\
          \ $LONG TO $SHORT \n"
      - metavariable-comparison:
          comparison: $VAL2 < $VAL1
          metavariable: $VAL1 $VAL2
    - patterns:
      - pattern-inside: "WORKING-STORAGE SECTION\n...\n$SHORT PIC $X($VAL2) BASED\n\
          ...\n$LONG PIC $X($VAL1)\n...\nALLOCATE $SHORT\n...\nMOVE $LONG TO $SHORT\
          \ \n"
      - metavariable-comparison:
          comparison: $VAL2 < $VAL1
          metavariable: $VAL1 $VAL2
    - patterns:
      - pattern-inside: "WORKING-STORAGE SECTION\n...\n$LONG PIC $X($VAL1)\n...\n\
          $SHORT PIC $X($VAL2) BASED\n...\nALLOCATE $SHORT\n...\nMOVE $LONG TO $SHORT\
          \ \n"
      - metavariable-comparison:
          comparison: $VAL2 < $VAL1
          metavariable: $VAL1 $VAL2
