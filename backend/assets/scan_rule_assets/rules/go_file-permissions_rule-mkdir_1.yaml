rules:
- id: go_file-permissions_rule-mkdir_1
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: os.Mkdir(...,$MASK)
    - pattern: os.MkdirAll(...,$MASK)
  - metavariable-comparison:
      metavariable: $MASK
      comparison: $MASK > 0o750
      base: 8
  message: "The application was found setting directory permissions to overly permissive\
    \ values. Consider\nusing the following values if the application user is the\
    \ only process to access\nfiles in the directory specified:\n- 0700 - read/write\
    \ access to the files in the directory\n\nAnother common value is `0750` which\
    \ allows the application user read/write access and group\nusers to read the files\
    \ contained in the directory.\n\nExample creating a directory with read/write\
    \ permissions for only the application user:\n```\nerr := os.Mkdir(\"directory\"\
    , 0700)\nif err != nil {\n  log.Fatal(err)\n}\n```\n\nFor all other values please\
    \ see:\nhttps://en.wikipedia.org/wiki/File-system_permissions#Numeric_notation\n"
  metadata:
    shortDescription: Incorrect permission assignment for critical resource
    cwe: CWE-732
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    security-severity: Medium
    category: security
  severity: WARNING
