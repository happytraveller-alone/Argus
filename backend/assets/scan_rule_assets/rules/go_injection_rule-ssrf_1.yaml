rules:
- id: go_injection_rule-ssrf_1
  languages:
  - go
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-not-inside: 'import "testing"

        ...

        '
    - pattern-either:
      - pattern: os.Stdin
      - pattern: os.Getenv(...)
      - pattern: '($REQ: *http.Request).$ANY

          '
      - pattern: '($REQ: http.Request).$ANY

          '
      - patterns:
        - pattern: '($REQ : *http.Request)'
        - pattern-inside: "func $FUNC( $W http.ResponseWriter, $R *http.Request, ...)\
            \ {\n  ...\n}\n"
  pattern-sinks:
  - pattern: http.Head(...)
  - pattern: http.Get(...)
  - pattern: http.Post(...)
  - pattern: http.PostForm(...)
  - pattern: http.NewRequest($METHOD,...)
  - pattern: http.DefaultClient.Head(...)
  - pattern: http.DefaultClient.Get(...)
  - pattern: http.DefaultClient.Post(...)
  - pattern: http.DefaultClient.PostForm(...)
  - pattern: http.NewRequestWithContext($CONTEXT, $METHOD, ...)
  - pattern: ftp.Dial(...)
  - pattern: ldap.DialURL(...)
  - pattern: smtp.Dial(...)
  - pattern: retryablehttp.NewRequest($METHOD, ..., $BODY)
  - patterns:
    - pattern-inside: '$C := retryablehttp.NewClient()

        ...

        '
    - pattern-either:
      - pattern: $C.Get(...)
      - pattern: $C.Post(..., $BODYTYPE, $BODY)
      - pattern: $C.PostForm(..., $VALS)
      - pattern: $C.Head(...)
  pattern-propagators:
  - pattern: $R := $D.NewDecoder($P)
    from: $P
    to: $R
  - pattern: $S.Decode(&$P)
    from: $S
    to: $P
  - pattern: $S.Decode($P)
    from: $S
    to: $P
  - pattern: $S.Unmarshal($B, &$P)
    from: $B
    to: $P
  - pattern: $S.Unmarshal($B, $P)
    from: $B
    to: $P
  message: "Server-Side-Request-Forgery (SSRF) exploits backend systems that initiate\
    \ requests to third\nparties.\nIf user input is used in constructing or sending\
    \ these requests, an attacker could supply\nmalicious\ndata to force the request\
    \ to other systems or modify request data to cause unwanted actions.\n\nEnsure\
    \ user input is not used directly in constructing URLs or URIs when initiating\
    \ requests\nto third party\nsystems from back end systems. Care must also be taken\
    \ when constructing payloads using user\ninput. Where\npossible restrict to known\
    \ URIs or payloads. Consider using a server side map where key's are\nused to\
    \ return\nURLs such as `https://site/goto?key=1` where `{key: 1, url: 'http://some.url/',\
    \ key: 2, url:\n'http://...'}`.\n\nIf you must use user supplied input for requesting\
    \ URLs, it is strongly recommended that the\nHTTP client\nchosen allows you to\
    \ customize and block certain IP ranges at the network level. By blocking\nRFC\
    \ 1918\naddresses or other network address ranges, you can limit the severity\
    \ of a successful SSRF\nattack. Care must\nalso be taken to block certain protocol\
    \ or address formatting such as IPv6.\n\nIf you can not block address ranges at\
    \ the client level, you may want to run the HTTP client\nas a protected\nuser,\
    \ or in a protected network where you can apply IP Table or firewall rules to\
    \ block access\nto dangerous\naddresses. Finally, if none of the above protections\
    \ are available, you could also run a\ncustom HTTP proxy\nand force all requests\
    \ through it to handle blocking dangerous addresses.\n\nExample HTTP client that\
    \ disallows access to loopback and RFC-1918 addresses\n```\n// IsDisallowedIP\
    \ parses the ip to determine if we should allow the HTTP client to continue\n\
    func IsDisallowedIP(hostIP string) bool {\n  ip := net.ParseIP(hostIP)\n  return\
    \ ip.IsMulticast() || ip.IsUnspecified() || ip.IsLoopback() || ip.IsPrivate()\n\
    }\n\n// SafeTransport uses the net.Dial to connect, then if successful check if\
    \ the resolved\n// ip address is disallowed. We do this due to hosts such as localhost.lol\
    \ being resolvable to\n// potentially malicious URLs. We allow connection only\
    \ for resolution purposes.\nfunc SafeTransport(timeout time.Duration) *http.Transport\
    \ {\n  return &http.Transport{\n    DialContext: func(ctx context.Context, network,\
    \ addr string) (net.Conn, error) {\n      c, err := net.DialTimeout(network, addr,\
    \ timeout)\n      if err != nil {\n        return nil, err\n      }\n      ip,\
    \ _, _ := net.SplitHostPort(c.RemoteAddr().String())\n      if IsDisallowedIP(ip)\
    \ {\n        return nil, errors.New(\"ip address is not allowed\")\n      }\n\
    \      return c, err\n    },\n    DialTLS: func(network, addr string) (net.Conn,\
    \ error) {\n      dialer := &net.Dialer{Timeout: timeout}\n      c, err := tls.DialWithDialer(dialer,\
    \ network, addr, &tls.Config{})\n      if err != nil {\n        return nil, err\n\
    \      }\n\n      ip, _, _ := net.SplitHostPort(c.RemoteAddr().String())\n   \
    \   if IsDisallowedIP(ip) {\n        return nil, errors.New(\"ip address is not\
    \ allowed\")\n      }\n\n      err = c.Handshake()\n      if err != nil {\n  \
    \      return c, err\n      }\n\n      return c, c.Handshake()\n    },\n    TLSHandshakeTimeout:\
    \ timeout,\n  }\n}\n\nfunc httpRequest(requestUrl string) {\n  const clientConnectTimeout\
    \ = time.Second * 10\n  httpClient := &http.Client{\n    Transport: SafeTransport(clientConnectTimeout),\n\
    \  }\n  resp, err := httpClient.Get(requestUrl)\n  if err != nil {\n    log.Fatal(err)\n\
    \  }\n  defer resp.Body.Close()\n  // work with resp\n}\n```\n\nFor more information\
    \ on SSRF see OWASP:\nhttps://owasp.org/www-community/attacks/Server_Side_Request_Forgery\n"
  metadata:
    shortDescription: Server Side Request Forgery (SSRF)
    cwe: CWE-918
    owasp:
    - A1:2017-Injection
    - A10:2021-Server-Side Request Forgery
    security-severity: Medium
    category: security
  severity: WARNING
