rules:
- id: aws-cloudwatch-log-group-no-retention
  patterns:
  - pattern: "resource \"aws_cloudwatch_log_group\" $ANYTHING {\n  ...\n}\n"
  - pattern-not-inside: "resource \"aws_cloudwatch_log_group\" $ANYTHING {\n  ...\n\
      \  retention_in_days = ...\n  ...\n}\n"
  message: The AWS CloudWatch Log Group has no retention. Missing retention in log
    groups can cause losing important event information.
  languages:
  - hcl
  severity: WARNING
  metadata:
    owasp:
    - A03:2017 - Sensitive Data Exposure
    cwe:
    - 'CWE-320: CWE CATEGORY: Key Management Errors'
    technology:
    - aws
    - terraform
    category: security
    references:
    - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    subcategory:
    - vuln
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: MEDIUM
