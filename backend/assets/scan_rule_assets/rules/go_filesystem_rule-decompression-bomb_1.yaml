rules:
- id: go_filesystem_rule-decompression-bomb_1
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: gzip.NewReader(...)
  - pattern: zlib.NewReader(...)
  - pattern: bzip2.NewReader(...)
  - pattern: flate.NewReader(...)
  - pattern: lzw.NewReader(...)
  - pattern: tar.NewReader(...)
  - pattern: zip.NewReader(...)
  - pattern: zlib.NewReaderDict(...)
  - pattern: flate.NewReaderDict(...)
  - pattern: zip.OpenReader(...)
  pattern-sanitizers:
  - patterns:
    - pattern: io.LimitReader($TAINTED, ...)
    - focus-metavariable: $TAINTED
  pattern-sinks:
  - patterns:
    - pattern: io.Copy($DST, $TAINTED)
    - focus-metavariable: $TAINTED
  - patterns:
    - pattern: io.CopyBuffer($DST, $TAINTED, $BUF)
    - focus-metavariable: $TAINTED
  message: "Directly decompressing files or buffers may lead to a potential Denial\
    \ of Service (DoS)\ndue to a decompression bomb. Decompression bombs are maliciously\
    \ compressed files\nor data that decompresses to extremely large sizes. This can\
    \ cause the process to run\nout of memory, or the disk to fill up.\n\nTo protect\
    \ against decompression bombs, an\n[io.LimitReader(...)](https://pkg.go.dev/io#LimitReader)\n\
    should be used to limit how much can be read during the decompression routine.\n\
    \nExample using `io.LimitReader` to protect against a decompression bomb:\n```\n\
    f, err := os.Open(\"some.gz\")\nif err != nil {\n  log.Fatal(err)\n}\n\nr, err\
    \ := gzip.NewReader(f)\nif err != nil {\n  log.Fatal(err)\n}\n\nconst oneMegabyte\
    \ = 1024 * 1024\nlimitedReader := io.LimitReader(r, oneMegabyte)\n\n// use limitedReader\
    \ to stop copying after 1 MB\nif _, err := io.Copy(os.Stdout, limitedReader);\
    \ err != nil {\n  log.Fatal(err)\n}\n```\n"
  metadata:
    shortDescription: Improper handling of highly compressed data
    cwe: CWE-409
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: Medium
    category: security
  severity: WARNING
