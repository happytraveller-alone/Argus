rules:
- id: javascript_buf_rule-buffer-noassert-write
  patterns:
  - pattern: $OBJ.$METHOD(..., true)
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^(writeUInt8|writeUInt16LE|writeUInt16BE|writeUInt32LE|writeUInt32BE|writeInt8|writeInt16LE|writeInt16BE|writeInt32LE|writeInt32BE|writeFloatLE|writeFloatBE|writeDoubleLE|writeDoubleBE)$
  severity: WARNING
  languages:
  - javascript
  metadata:
    owasp:
    - A6:2017-Security Misconfiguration
    - A05:2021-Security Misconfiguration
    cwe: CWE-787
    shortDescription: Out-of-bounds write
    security-severity: MEDIUM
    category: security
    source-rule-url: https://github.com/nodesecurity/eslint-plugin-security/blob/master/rules/detect-buffer-noassert.js
  message: "The application is using Buffer API methods with the `noAssert` \nparameter\
    \ set to `true` for the write buffer methods. This disables \nthe bounds checking\
    \ and could result in writing beyond the end of \nthe buffer, leading to potential\
    \ memory corruption and security \nvulnerabilities. When `noAssert` is set to\
    \ `true`, the methods \ndo not perform bounds checking, allowing the offset to\
    \ be beyond \nthe end of the buffer. This can lead to out-of-bounds memory access,\
    \ \ncausing undefined behavior, crashes, or potential security exploits.\n\nTo\
    \ mitigate the issue, ensure that the `noAssert` parameter is not \nset to `true`.\
    \ Always use bounds checking to prevent out-of-bounds \nmemory access. Validate\
    \ the offset before performing write operations \non the buffer.\n\nSecure Code\
    \ Example:\n```\n  const buffer = Buffer.alloc(10); // Allocate a buffer of 10\
    \ bytes\n\n  function safeBufferMethods(buf) {\n    const safeOffset = 5; // An\
    \ offset within the bounds of the buffer\n\n    // Secure write methods\n    if\
    \ (safeOffset < buf.length) {\n      buf.writeUInt8(0, safeOffset);\n      buf.writeUInt16LE(0,\
    \ safeOffset);\n      buf.writeUInt16BE(0, safeOffset);\n      buf.writeUInt32LE(0,\
    \ safeOffset);\n      buf.writeUInt32BE(0, safeOffset);\n      buf.writeInt8(0,\
    \ safeOffset);\n      buf.writeInt16LE(0, safeOffset);\n      buf.writeInt16BE(0,\
    \ safeOffset);\n      buf.writeInt32LE(0, safeOffset);\n      buf.writeInt32BE(0,\
    \ safeOffset);\n      buf.writeFloatLE(0, safeOffset);\n      buf.writeFloatBE(0,\
    \ safeOffset);\n      buf.writeDoubleLE(0, safeOffset);\n      buf.writeDoubleBE(0,\
    \ safeOffset);\n    }\n  }\n\n  try {\n    safeBufferMethods(buffer);\n  } catch\
    \ (error) {\n    console.error('Caught an error:', error);\n  }\n```\n"
