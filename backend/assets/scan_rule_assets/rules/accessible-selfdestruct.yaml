rules:
- id: accessible-selfdestruct
  severity: ERROR
  languages:
  - solidity
  message: Contract can be destructed by anyone in $FUNC
  metadata:
    category: security
    technology:
    - solidity
    cwe: 'CWE-284: Improper Access Control'
    confidence: LOW
    likelihood: HIGH
    impact: HIGH
    subcategory:
    - vuln
    references:
    - https://www.parity.io/blog/a-postmortem-on-the-parity-multi-sig-library-self-destruct/
  mode: taint
  pattern-sources:
  - patterns:
    - focus-metavariable:
      - $ADDR
    - pattern-either:
      - pattern: function $FUNC(..., address $ADDR, ...) external { ... }
      - pattern: function $FUNC(..., address $ADDR, ...) public { ... }
    - pattern-not: function $FUNC(...) $MODIFIER { ... }
    - pattern-not: function $FUNC(...) $MODIFIER(...) { ... }
    - pattern-not: "function $FUNC(...) {\n  ...\n  require(<... msg.sender ...>,\
        \ ...);\n  ...\n}\n"
    - pattern-not: "function $FUNC(...) {\n  ...\n  assert(<... msg.sender ...>, ...);\n\
        \  ...\n}\n"
    - pattern-not: "function $FUNC(...) {\n  ...\n  require(<... _msgSender ...>,\
        \ ...);\n  ...\n}\n"
    - pattern-not: "function $FUNC(...) {\n  ...\n  assert(<... _msgSender ...>, ...);\n\
        \  ...\n}\n"
    - pattern-not: "function $FUNC(...) {\n  ...\n  if (<... msg.sender ...>) {\n\
        \    ...\n  }\n  ...\n}\n"
    - pattern-not: "function $FUNC(...) {\n  ...\n  if (<... _msgSender ...>) {\n\
        \    ...\n  }\n  ...\n}\n"
    - pattern-not: "function $FUNC(...) {\n  ...\n  onlyOwner(...);\n  ...\n}\n"
    - pattern-not: "function $FUNC(...) {\n  ...\n  requireOwner(...);\n  ...\n}\n"
    - pattern-not: "function $FUNC(...) {\n  ...\n  _requireOwnership(...);\n  ...\n\
        }\n"
    - pattern-not: "function $FUNC(...) {\n  ...\n  $C._enforceIsContractOwner(...);\n\
        \  ...\n}\n"
    - pattern-not: "function $FUNC(...) {\n  ...\n  $C._enforceOwner(...);\n  ...\n\
        }\n"
    - pattern-not: "function $FUNC(...) {\n  ...\n  $C.enforceIsContractOwner(...);\n\
        \  ...\n}\n"
  pattern-sinks:
  - pattern-either:
    - pattern: selfdestruct(...);
    - pattern: suicide(...);
