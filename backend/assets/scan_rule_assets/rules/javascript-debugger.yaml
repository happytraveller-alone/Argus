rules:
- id: javascript-alert
  patterns:
  - pattern-either:
    - pattern: alert()
    - pattern: alert($X)
  message: found alert() call; should this be in production code?
  languages:
  - javascript
  severity: WARNING
  metadata:
    cwe:
    - 'CWE-79: Cross-site Scripting'
    - 'CWE-200: Exposure of Sensitive Information to an Unauthorized Actor'
    - 'CWE-749: Exposed Dangerous Method or Function'
- id: javascript-debugger
  pattern: debugger;
  message: found debugger call; should this be in production code?
  languages:
  - javascript
  severity: WARNING
  metadata:
    cwe:
    - 'CWE-489: Leftover Debug Code'
- id: javascript-confirm
  pattern: confirm(...)
  message: found conform() call; should this be in production code?
  languages:
  - javascript
  severity: WARNING
  metadata:
    cwe:
    - 'CWE-602: Client-Side Enforcement of Server-Side Security'
- id: javascript-prompt
  patterns:
  - pattern-either:
    - pattern: prompt()
    - pattern: prompt($X)
    - pattern: prompt($X, $Y)
  message: found prompt() call; should this be in production code?
  languages:
  - javascript
  severity: WARNING
  metadata:
    cwe:
    - 'CWE-20: Improper Input Validation'
    - 'CWE-79: Improper Neutralization of Input During Web Page Generation (Cross-site
      Scripting)'
