rules:
- id: java_inject_rule-CommandInjection_1
  languages:
  - java
  pattern-either:
  - patterns:
    - pattern-inside: "$FUNC(...,String $PARAM, ...) {\n  ...\n}\n"
    - pattern-either:
      - pattern: (Runtime $R).exec(<...$PARAM...>,...);
      - patterns:
        - pattern-either:
          - pattern: '$CMDARR = new String[]{"$SHELL",...,<...$PARAM...>,...};

              ...

              (Runtime $R).exec($CMDARR,...);

              '
          - pattern: 'String[] $CMDARR = {"$SHELL",...,<...$PARAM...>,...};

              ...

              (Runtime $R).exec($CMDARR,...);

              '
          - pattern: (Runtime $R).exec(new String[]{"$SHELL",...,<...$PARAM...>,...},
              ...);
          - pattern: (Runtime $R).exec(java.util.String.format("...", ...,<...$PARAM...>,...));
          - pattern: (Runtime $R).exec((String $A) + (String $B));
        - metavariable-regex:
            metavariable: $SHELL
            regex: (/.../)?(sh|bash|ksh|csh|tcsh|zsh)$
    - pattern-not: (Runtime $R).exec("...","...","...",...);
    - pattern-not: '(Runtime $R).exec(new String[]{"...","...","...",...},...);

        '
  - patterns:
    - pattern-inside: "$FUNC(...,String $PARAM, ...) {\n  ...\n}\n"
    - pattern-either:
      - pattern: (ProcessBuilder $PB).command(<...$PARAM...>,...);
      - patterns:
        - pattern-inside: $VAL = <...$PARAM...>; ...
        - pattern: (ProcessBuilder $PB).command(<...$VAL...>,...);
      - patterns:
        - pattern-either:
          - pattern: (ProcessBuilder $PB).command("$SHELL",...,<...$PARAM...>,...);
          - pattern: '$CMDARR = java.util.Arrays.asList("$SHELL",...,<...$PARAM...>,...);

              ...

              (ProcessBuilder $PB).command($CMDARR,...);

              '
          - pattern: (ProcessBuilder $PB).command(java.util.Arrays.asList("$SHELL",...,<...$PARAM...>,...),...);
          - pattern: (ProcessBuilder $PB).command(java.util.String.format("...", ...,<...$PARAM...>,...));
          - pattern: (ProcessBuilder $PB).command((String $A) + (String $B));
        - metavariable-regex:
            metavariable: $SHELL
            regex: (/.../)?(sh|bash|ksh|csh|tcsh|zsh)$
    - pattern-not: (ProcessBuilder $PB).command("...","...","...",...);
    - pattern-not: '(ProcessBuilder $PB).command(java.util.Arrays.asList("...","...","...",...));

        '
  message: "OS command injection is a critical vulnerability that can lead to a full\
    \ system\ncompromise as it may allow an adversary to pass in arbitrary commands\
    \ or arguments\nto be executed.\n\nUser input should never be used in constructing\
    \ commands or command arguments\nto functions which execute OS commands. This\
    \ includes filenames supplied by\nuser uploads or downloads.\n\nEnsure your application\
    \ does not:\n\n- Use user-supplied information in the process name to execute.\n\
    - Use user-supplied information in an OS command execution function which does\n\
    not escape shell meta-characters.\n- Use user-supplied information in arguments\
    \ to OS commands.\n\nThe application should have a hardcoded set of arguments\
    \ that are to be passed\nto OS commands. If filenames are being passed to these\
    \ functions, it is\nrecommended that a hash of the filename be used instead, or\
    \ some other unique\nidentifier. It is strongly recommended that a native library\
    \ that implements\nthe same functionality be used instead of using OS system commands,\
    \ due to the\nrisk of unknown attacks against third party commands.\n\nWhen specifying\
    \ the OS command, ensure the application uses the full path\ninformation, otherwise\
    \ the OS may attempt to look up which process to execute\nand could be vulnerable\
    \ to untrusted search path vulnerabilities (CWE-426).\n\nExample of safely executing\
    \ an OS command:\n```\npublic static void executeCommand(String userFileData)\
    \ throws java.io.IOException {\n    // Generate a random filename, do not use\
    \ user input\n    String fileName = UUID.randomUUID().toString();\n    // Create\
    \ a Buffered/FileWriter\n    BufferedWriter writer = new BufferedWriter(new FileWriter(fileName));\n\
    \    // Write the user content to our random file\n    writer.write(userFileData);\n\
    \    // Close the file to flush contents\n    writer.close();\n    // Create the\
    \ process builder with a hardcoded path to the binary, and our randomly\ngenerated\
    \ filename\n    ProcessBuilder processBuilder = new ProcessBuilder(\"/opt/app/path\"\
    , fileName);\n    // Start the process\n    Process process = processBuilder.start();\n\
    \    // Handle/redirect output of process here\n    // ...\n}\n```\n\nFor more\
    \ information on OS command injection, see OWASP's guide:\nhttps://cheatsheetseries.owasp.org/cheatsheets/OS_Command_Injection_Defense_Cheat_Sheet.html\n"
  severity: WARNING
  metadata:
    shortDescription: Improper neutralization of special elements used in an OS command
      ('OS Command Injection')
    category: security
    cwe: CWE-78
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    technology:
    - java
    security-severity: High
