rules:
- id: wip-xss-using-responsewriter-and-printf_1
  languages:
  - go
  message: Found data going from url query parameters into formatted data written
    to ResponseWriter. This could be XSS and should not be done. If you must do this,
    ensure your data is sanitized or escaped.
  metadata:
    category: security
    confidence: MEDIUM
    cwe:
    - 'CWE-79: Improper Neutralization of Input During Web Page Generation (''Cross-site
      Scripting'')'
    cwe2021-top25: true
    cwe2022-top25: true
    impact: MEDIUM
    likelihood: LOW
    owasp:
    - A07:2017 - Cross-Site Scripting (XSS)
    - A03:2021 - Injection
    references:
    - https://owasp.org/Top10/A03_2021-Injection
    subcategory:
    - vuln
    technology:
    - go
  patterns:
  - pattern-inside: "func $FUNC(..., $W http.ResponseWriter, ...) {\n  ...\n  var\
      \ $TEMPLATE = \"...\"\n  ...\n  $W.Write([]byte(fmt.$PRINTF($TEMPLATE, ...)),\
      \ ...)\n  ...\n}\n"
  - pattern-either:
    - pattern: '$PARAMS = r.URL.Query()

        ...

        $DATA, $ERR := $PARAMS[...]

        ...

        $INTERM = $ANYTHING(..., $DATA, ...)

        ...

        $W.Write([]byte(fmt.$PRINTF(..., $INTERM, ...)))

        '
    - pattern: '$PARAMS = r.URL.Query()

        ...

        $DATA, $ERR := $PARAMS[...]

        ...

        $INTERM = $DATA[...]

        ...

        $W.Write([]byte(fmt.$PRINTF(..., $INTERM, ...)))

        '
    - pattern: '$DATA, $ERR := r.URL.Query()[...]

        ...

        $INTERM = $DATA[...]

        ...

        $W.Write([]byte(fmt.$PRINTF(..., $INTERM, ...)))

        '
    - pattern: '$DATA, $ERR := r.URL.Query()[...]

        ...

        $INTERM = $ANYTHING(..., $DATA, ...)

        ...

        $W.Write([]byte(fmt.$PRINTF(..., $INTERM, ...)))

        '
    - pattern: '$PARAMS = r.URL.Query()

        ...

        $DATA, $ERR := $PARAMS[...]

        ...

        $W.Write([]byte(fmt.$PRINTF(..., $DATA, ...)))

        '
  severity: WARNING
