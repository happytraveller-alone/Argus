rules:
- id: blowfish_cipher
  severity: WARNING
  metadata:
    author: Maurizio Siddu
    references:
    - https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html#algorithms
    - https://cwe.mitre.org/data/definitions/327.html
    category: security
    cwe:
    - 'CWE-327: Use of a Broken or Risky Cryptographic Algorithm'
    - 'CWE-326: Inadequate Encryption Strength'
  message: This Java application uses a weak cipher, the data encrypted using Blowfish
    cipher results vulnerable to various cryptographic attacks, which could allow
    to retrieve its plain-text value.  It is recommended to avoid the use of Blowfish
    cipher.
  languages:
  - java
  patterns:
  - pattern: 'Cipher $VAR = Cipher.getInstance("=~/(Blowfish\/.*\/.*|Blowfish)/",
      ...);

      '
