rules:
- id: java_crypto_rule-RsaNoPadding_1
  languages:
  - java
  pattern-either:
  - patterns:
    - pattern: '$VAR = "$ALG";

        ...

        javax.crypto.Cipher.getInstance($VAR);

        '
    - metavariable-regex:
        metavariable: $ALG
        regex: .*RSA.*NoPadding.*
  - patterns:
    - pattern: javax.crypto.Cipher.getInstance($ALG,...);
    - metavariable-regex:
        metavariable: $ALG
        regex: .*RSA.*NoPadding.*
  message: "The software uses the RSA algorithm but does not incorporate Optimal Asymmetric\n\
    Encryption Padding (OAEP). By not enabling padding, the algorithm maybe vulnerable\n\
    to [chosen plaintext attacks](https://en.wikipedia.org/wiki/Chosen-plaintext_attack).\n\
    \nTo enable OAEP mode, pass `RSA/ECB/OAEPWithSHA-256AndMGF1Padding` to the `Cipher.getInstance`\n\
    method.\n\nExample encrypting and decrypting a message using RSA with OAEP:\n\
    ```\npublic static void encryptWithRSA() throws InvalidKeyException, NoSuchAlgorithmException,\n\
    NoSuchPaddingException, IllegalBlockSizeException, BadPaddingException {\n   \
    \ // Generate an RSA Public and Private Key Pair\n    KeyPair keyPair = generateRSAKeys();\n\
    \    // Create a Cipher instance using RSA, ECB with OAEP\n    Cipher rsaEncryptor\
    \ = Cipher.getInstance(\"RSA/ECB/OAEPWithSHA-256AndMGF1Padding\");\n    // Initialize\
    \ to ENCRYPT_MODE with the public key\n    rsaEncryptor.init(Cipher.ENCRYPT_MODE,\
    \ keyPair.getPublic());\n    // Encrypt our secret message\n    byte[] cipherText\
    \ = rsaEncryptor.doFinal(\"Some secret\nmessage\".getBytes(StandardCharsets.UTF_8));\n\
    \n    // Create a Cipher instance using RSA, ECB with OAEP\n    Cipher rsaDecryptor\
    \ = Cipher.getInstance(\"RSA/ECB/OAEPWithSHA-256AndMGF1Padding\");\n    // Initialize\
    \ to DECRYPT_MODE with the private key\n    rsaDecryptor.init(Cipher.DECRYPT_MODE,\
    \ keyPair.getPrivate());\n    // Decrypt the secret message\n    byte[] plainText\
    \ = rsaDecryptor.doFinal(cipherText);\n    // Debug output\n    System.out.println(new\
    \ String(plainText));\n}\n```\nMore information on Optimal asymmetric encryption\
    \ padding:\nhttps://en.wikipedia.org/wiki/Optimal_asymmetric_encryption_padding\n\
    \nFor more information on Java Cryptography see:\nhttps://docs.oracle.com/en/java/javase/15/security/java-cryptography-architecture-jca-reference-guide.html\n"
  metadata:
    shortDescription: Use of RSA algorithm without OAEP
    category: security
    cwe: CWE-780
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    security-severity: Medium
  severity: WARNING
