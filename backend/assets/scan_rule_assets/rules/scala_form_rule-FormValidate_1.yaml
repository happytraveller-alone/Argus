rules:
- id: scala_form_rule-FormValidate_1
  languages:
  - scala
  message: 'Form inputs should have minimal input validation. Preventive validation
    helps provide defense

    in depth against a variety of risks.

    '
  metadata:
    category: security
    cwe: CWE-20
    shortDescription: Improper Input Validation
    security-severity: Info
  patterns:
  - pattern-inside: "class $CLASS extends $SC {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $SC
      regex: (ActionForm|ValidatorForm)
  - pattern-not: public void validate() { ... }
  severity: WARNING
