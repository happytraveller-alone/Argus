rules:
- id: java_inject_rule-HttpParameterPollution_1
  languages:
  - java
  mode: taint
  pattern-sources:
  - pattern: (HttpServletRequest $REQ).getParameter(...)
  pattern-sanitizers:
  - pattern: java.net.URLEncoder.encode(...)
  - pattern: com.google.common.net.UrlEscapers.urlPathSegmentEscaper().escape(...)
  pattern-sinks:
  - pattern: new org.apache.http.client.methods.HttpGet(...)
  - pattern: new org.apache.commons.httpclient.methods.GetMethod(...)
  - pattern: (org.apache.commons.httpclient.methods.GetMethod $GM).setQueryString(...)
  message: "The application was found including unvalidated user input into a URL,\
    \ which could lead to\nHTTP Parameter Pollution (HPP) or worse, Server Side Request\
    \ Forgery (SSRF). This could\nallow an adversary to override the value of a URL\
    \ or a request parameter.  HTTP Parameter\nPollution\n(HPP) attacks consist of\
    \ injecting encoded query string delimiters into other existing\nparameters. If\
    \ a web\napplication does not properly sanitize the user input, an adversary may\
    \ modify the logic of\nthese\nrequests to other applications.\n\nTo remediate\
    \ this issue, never allow user input directly into creation of a URL or URL\n\
    parameter. Consider\nusing a map to look up user-supplied information and return\
    \ exact values to be used in the\ngeneration of\nrequests.\n\nExample using a\
    \ map to look up a key to be used in a HTTP request:\n```\nHashMap<String, String>\
    \ lookupTable = new HashMap<>();\nlookupTable.put(\"key1\", \"value1\");\nlookupTable.put(\"\
    key2\", \"value2\");\nString userInput = request.getParameter(\"key\");\n\n//\
    \ Create a CloseableHttpClient, ideally any requests issued should be done\n//\
    \ out-of-band from the servlet request itself (such as using a separate thread/scheduler\n\
    system)\ntry (final CloseableHttpClient httpClient = HttpClients.createDefault())\
    \ {\n    // Lookup the value from our user input from our lookupTable\n    String\
    \ value = lookupTable.getOrDefault(userInput, \"value1\");\n    // Construct the\
    \ url, with the hardcoded url and only pass in the value from the\nlookupTable,\n\
    \    // not direct user input\n    final HttpGet httpget = new HttpGet(\"https://example.com/getId?key=\"\
    +value);\n    // Execute the request\n    CloseableHttpResponse clientResponse\
    \ = httpClient.execute(httpget);\n    // Read the response\n    byte[] responseData\
    \ = clientResponse.getEntity().getContent().readAllBytes();\n    // Handle the\
    \ response\n    // ...\n}\n```\n\nIf using a map is not possible, the user-supplied\
    \ input must be encoded prior to use, and\nnever allow full\nURLs:\n```\n// Get\
    \ user input\nString userInput = request.getParameter(\"key\");\n// Encode the\
    \ string using java.net.URLEncoder with the UTF-8 character set\nString encodedString\
    \ = java.net.URLEncoder.encode(userInput, StandardCharsets.UTF_8);\n// Create\
    \ a CloseableHttpClient, ideally any requests issued should be done\n// out-of-band\
    \ from the servlet request itself (such as using a separate thread/scheduler\n\
    system)\ntry (final CloseableHttpClient httpClient = HttpClients.createDefault())\
    \ {\n  // Construct the url, with the hardcoded url and only pass in the encoded\
    \ value, never a\nfull URL\n  final HttpGet httpget = new HttpGet(\"https://example.com/getId?key=\"\
    +encodedString);\n  // Execute the request\n  CloseableHttpResponse clientResponse\
    \ = httpClient.execute(httpget);\n  // Read the response\n  byte[] responseData\
    \ = clientResponse.getEntity().getContent().readAllBytes();\n  // handle the response\n\
    }\n```\n\nFor more information on SSRF see OWASP:\nhttps://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html\n\
    \nFor more information on HTTP Parameter Pollution see:\nhttps://en.wikipedia.org/wiki/HTTP_parameter_pollution\n"
  severity: ERROR
  metadata:
    shortDescription: Improper neutralization of argument delimiters in a command
      ('Argument Injection')
    category: security
    cwe: CWE-88
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    technology:
    - java
    security-severity: Medium
