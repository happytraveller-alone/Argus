rules:
- id: tarstream_unsafe_unpacking
  languages:
  - javascript
  severity: ERROR
  message: Unsafe Tar Unpacking
  patterns:
  - patterns:
    - pattern-either:
      - pattern-inside: '$TARSTREAM = require(''tar-stream'')

          ...

          '
      - pattern-inside: 'import $TARSTREAM from ''tar-stream''

          ...

          '
    - pattern-either:
      - pattern-inside: "$TAR = $TARSTREAM.extract()\n...\n$TAR.on('entry', ($ENTRY,\
          \ $STREAM, ...) => {\n    ...\n})\n"
  - pattern-either:
    - pattern-either:
      - pattern: $FS.writeFileSync(<... $ENTRY.name ...>, ..., ...)
      - pattern: $FS.writeFileAsync(<... $ENTRY.name ...>, ..., ...)
      - patterns:
        - pattern-inside: '$STREAM.pipe(...)

            '
        - pattern: $FS.createWriteStream(<... $ENTRY.name ...>, ...)
      - pattern: $FS.createWriteStream(<... $PATH ...>, ...)
    - patterns:
      - pattern-either:
        - pattern: $FS.writeFileSync($PATH, ..., ...)
        - pattern: $FS.writeFileAsync($PATH, ..., ...)
        - patterns:
          - pattern-inside: '$STREAM.pipe(...)

              '
          - pattern: $FS.createWriteStream(<... $PATH ...>, ...)
        - pattern: $FS.createWriteStream(<... $PATH ...>, ...)
      - pattern-not-inside: '$PATH = path.join(..., path.basename(<... $ENTRY.name
          ...>))

          ...

          '
      - pattern-either:
        - pattern-inside: '$PATH = path.join(..., <... $ENTRY.name ...>)

            ...

            '
        - pattern-inside: '$PATH = <... $ENTRY.name ...>

            ...

            '
  metadata:
    cwe:
    - 'CWE-22: Path Traversal'
    - 'CWE-23: Relative Path Traversal'
    - 'CWE-36: Absolute Path Traversal'
    - 'CWE-73: External Control of File Name or Path'
    - 'CWE-59: Link Following'
