rules:
- id: csharp_password_rule-PasswordComplexity_1
  languages:
  - csharp
  pattern-either:
  - pattern: $OPT.Password.RequireDigit = false;
  - pattern: $OPT.Password.RequireLowercase = false;
  - pattern: $OPT.Password.RequireNonAlphanumeric = false;
  - pattern: $OPT.Password.RequireUppercase = false;
  - patterns:
    - pattern: $OPT.Password.RequiredLength = $LEN;
    - metavariable-comparison:
        metavariable: $LEN
        comparison: $LEN < 8
  - patterns:
    - pattern: $OPT.Password.RequiredUniqueChars = $LEN;
    - metavariable-comparison:
        metavariable: $LEN
        comparison: $LEN < 1
  message: "The application's `PasswordValidator.RequiredLength` property allows passwords\n\
    to be less than 8 characters. Consider requiring a length of at least 8 or more\n\
    characters to reduce the chance of passwords being brute forced.\n\nExample of\
    \ setting the RequiredLength to 8 in ASP.NET Core Identity:\n```\nbuilder.Services.Configure<IdentityOptions>(options\
    \ =>\n{\n    // Default Password settings.\n    options.Password.RequireDigit\
    \ = true;\n    options.Password.RequireLowercase = true;\n    options.Password.RequireNonAlphanumeric\
    \ = true;\n    options.Password.RequireUppercase = true;\n    options.Password.RequiredLength\
    \ = 8;\n    options.Password.RequiredUniqueChars = 1;\n});\n```\n\nFor more information\
    \ on configuring ASP.NET Core Identity see:\nhttps://learn.microsoft.com/en-us/aspnet/core/security/authentication/identity-configuration\n"
  severity: WARNING
  metadata:
    shortDescription: Weak password requirements
    category: security
    cwe: CWE-521
    owasp:
    - A2:2017-Broken Authentication
    - A07:2021-Identification and Authentication Failures
    security-severity: Info
