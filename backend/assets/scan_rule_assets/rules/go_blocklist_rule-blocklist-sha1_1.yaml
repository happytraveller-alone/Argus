rules:
- id: go_blocklist_rule-blocklist-sha1_1
  languages:
  - go
  patterns:
  - pattern: 'import "crypto/sha1"

      '
  message: "The SHA-1 message-digest algorithm has been cryptographically broken and\n\
    is unsuitable for further use. It is\nrecommended that the SHA-3, or BLAKE2 family\
    \ of algorithms be used for non-password based\ncryptographic hashes instead.\
    \ For password based cryptographic hashes, consider using the\nbcrypt or Argon2id\
    \ family of cryptographic hashes.\n\nHashing values using [BLAKE2](https://pkg.go.dev/golang.org/x/crypto/blake2b):\n\
    ```\nfileContents := []byte(\"some file contents to create hash for\")\nblake2bHasher,\
    \ err := blake2b.New512(nil)\nif err != nil {\n  log.Fatal(err)\n}\nhashedValue\
    \ := blake2bHasher.Sum(fileContents)\nfmt.Printf(\"%s\\n\", hex.EncodeToString(hashedValue))\n\
    ```\n\nHashing and securely comparing passwords using\n[Argon2id](https://pkg.go.dev/golang.org/x/crypto/argon2#hdr-Argon2id):\n\
    ```\ntype argonParameters struct {\n  variant     string\n  version     int\n\
    \  memory      uint32\n  iterations  uint32\n  parallelism uint8\n  saltLength\
    \  uint32\n  keyLength   uint32\n}\n\nfunc (a argonParameters) StringFormat(salt,\
    \ derivedKey []byte) string {\n  encodedSalt := base64.RawStdEncoding.EncodeToString(salt)\n\
    \  encodedKey := base64.RawStdEncoding.EncodeToString(derivedKey)\n\n  return\
    \ fmt.Sprintf(\"$argon2id$v=%d$m=%d,t=%d,p=%d$%s$%s\",\n    argon2.Version,\n\
    \    a.memory,\n    a.iterations,\n    a.parallelism,\n    encodedSalt,\n    encodedKey,\n\
    \  )\n}\n\nfunc main() {\n  // Initialize Argon2id parameters\n  p := argonParameters{\n\
    \    memory:      64 * 1024,\n    iterations:  3,\n    parallelism: 2,\n    saltLength:\
    \  16,\n    keyLength:   32,\n  }\n\n  // Generate random salt (to be stored alongside\
    \ derived hash key)\n  salt := make([]byte, p.saltLength)\n  if _, err := io.ReadFull(rand.Reader,\
    \ salt); err != nil {\n    log.Fatal(err)\n  }\n\n  usersPassword := []byte(\"\
    User's Very S3cur3P4ss@rd@#$%\")\n\n  var derivedKey []byte\n  // Create key hash\
    \ derived from user's password\n  {\n    derivedKey = argon2.IDKey(usersPassword,\
    \ salt, p.iterations, p.memory, p.parallelism,\np.keyLength)\n    // store p.StringFormat(...)\
    \ result in a data store...\n    fmt.Printf(\"%s\\n\", p.StringFormat(salt, derivedKey))\n\
    \  }\n\n  // Verify a user's password against key\n  {\n    keyToCompare := argon2.IDKey(usersPassword,\
    \ salt, p.iterations, p.memory, p.parallelism,\np.keyLength)\n\n    // Use subtle.ConstantTimeCompare(...,\
    \ ...) to ensure no side channel leaks used in timing\nattacks\n    if subtle.ConstantTimeCompare(derivedKey,\
    \ keyToCompare) == 1 {\n      fmt.Printf(\"Passwords match\\n\")\n    } else {\n\
    \      fmt.Printf(\"Passwords do not match\\n\")\n    }\n  }\n}\n```\n\nFor more\
    \ information on password storage see OWASP's guide:\nhttps://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html\n"
  metadata:
    shortDescription: Use of a broken or risky cryptographic algorithm
    cwe: CWE-327
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    security-severity: Medium
    category: security
  severity: WARNING
