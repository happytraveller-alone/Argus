rules:
- id: java_inject_rule-ELInjection_1
  languages:
  - java
  message: "This rule identifies potential Expression Language (EL) injection vulnerabilities\
    \ within Java applications. \nThe rule targets use of `createValueExpression`,\
    \ `createMethodExpression`, `ELProcessor.eval`, `getValue`, \nand `setValue` methods,\
    \ particularly when input to these methods is not a hardcoded string, indicating\
    \ dynamic \nevaluation of potentially untrusted input. \n\n`createValueExpression`\
    \ creates a `ValueExpression` object which gets evaluated upon calling methods\
    \ like \n`getValue()` and `setValue()` or a Lambda `invoke()` i.e. it evaluates\
    \ the expression passed to the \n`createValueExpression` method.\n\nSimilarly,\
    \ `createMethodExpression` creates a `MethodExpression` object which gets evaluated\
    \ upon calling \nmethods like `invoke()` and `getMethodInfo()`.\n`ELProcessor.eval`,\
    \ `getValue()`, and `setValue()` methods all evaluate their expressions which\
    \ are passed \nas parameters.\n\nCalling these method directly with user-supplied\
    \ input may allow an adversary to execute arbitrary Java \ncode, including OS\
    \ system commands. Never call these methods directly with user-supplied input.\
    \ Consider \nalternate methods such as a lookup table to take user input and resolve\
    \ hardcoded values.\n\nSecure example:\n\n```\nimport javax.el.ELProcessor;\n\
    import java.util.Set;\n\npublic class SafeELHandling {\n    private static final\
    \ Set<String> ALLOWED_VALUES = Set.of(\"value1\", \"value2\", \"value3\");\n\n\
    \    public void processInput(String userInput) {\n        // Validate user input\
    \ against the allowlist\n        if (!ALLOWED_VALUES.contains(userInput)) {\n\
    \            throw new IllegalArgumentException(\"Invalid input\");\n        }\n\
    \        \n        ELProcessor elProcessor = new ELProcessor();\n        elProcessor.defineBean(\"\
    userInput\", userInput);\n        \n        // Example EL expression using the\
    \ safe, predefined input\n        String result = (String) elProcessor.eval(userInput);\n\
    \    }\n}\n```\n"
  metadata:
    category: security
    cwe: CWE-917
    shortDescription: Improper neutralization of special elements used in an expression
      language statement ('Expression Language Injection')
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    technology:
    - java
    security-severity: Info
  pattern-either:
  - patterns:
    - pattern: '(ExpressionFactory $EXP).createValueExpression((ELContext $CTX), $EXPR,

        ...)

        '
    - pattern-not: '(ExpressionFactory $EXP).createValueExpression((ELContext $CTX),
        "...",

        ...)

        '
  - patterns:
    - pattern: '(ExpressionFactory $EXP).createMethodExpression((ELContext $CTX),
        $EXPR,

        ...)

        '
    - pattern-not: '(ExpressionFactory $EXP).createMethodExpression((ELContext $CTX),
        "...",

        ...)

        '
  - patterns:
    - pattern: '($X.el.ELProcessor $P).eval(...)

        '
    - pattern-not: '($X.el.ELProcessor $P).eval("...", ...)

        '
  - patterns:
    - pattern: '($X.el.ELProcessor $P).getValue(...)

        '
    - pattern-not: '($X.el.ELProcessor $P).getValue("...", ...)

        '
  - patterns:
    - pattern: '($X.el.ELProcessor $P).setValue(...)

        '
    - pattern-not: "($X.el.ELProcessor $P).setValue(\"...\", \"...\")   \n"
  severity: WARNING
