rules:
- id: scala_xss_rule-MVCApi_1
  languages:
  - scala
  message: 'Disabling HTML escaping put the application at risk for Cross-Site Scripting
    (XSS).

    '
  metadata:
    category: security
    cwe: CWE-79
    shortDescription: Improper Neutralization of Input During Web Page Generation
      ('Cross-site Scripting')
    security-severity: Info
  mode: taint
  pattern-sanitizers:
  - pattern: org.owasp.encoder.Encode.forHtml(...)
  pattern-sinks:
  - pattern: Ok(...)
  pattern-sources:
  - patterns:
    - pattern-inside: "def $FUNC(..., $ARG: String, ...) = Action {\n  ...\n}\n"
    - focus-metavariable: $ARG
  severity: WARNING
