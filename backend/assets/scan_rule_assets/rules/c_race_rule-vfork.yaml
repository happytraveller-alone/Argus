rules:
- id: c_race_rule-vfork
  languages:
  - c
  - cpp
  message: 'The `vfork` function is suffers from portability issues and is not recommended.
    In

    some Linux systems `vfork` is vulnerable to a race condition while the child process

    is running as the user''s UID but hasn''t executed `execve`. The user may be able
    to send

    signals to this process, which in `vfork` would not be sent to the parent process.
    As

    a result a user may be able to cause a denial of service against the privileged
    process.


    Use `fork` instead and be aware of other potential Time Of Check Time Of Use (TOCTOU)

    vulnerabilities.


    For more information please see:

    https://wiki.sei.cmu.edu/confluence/display/c/POS38-C.+Beware+of+race+conditions+when+using+fork+and+file+descriptors

    '
  metadata:
    shortDescription: Potential time of check time of use vulnerability (vfork)
    cwe: CWE-362
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    security-severity: Medium
    category: security
  pattern: vfork(...)
  severity: INFO
