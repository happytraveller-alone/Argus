rules:
- id: request-session-with-http
  pattern-either:
  - patterns:
    - pattern-either:
      - pattern: "def $FUNC(..., $URL = \"=~/[Hh][Tt][Tt][Pp]:\\/\\/.*/\", ...):\n\
          \  ...\n  $SESSION = requests.Session(...)\n  ...\n  $SESSION.$W($URL, ...)\n"
      - pattern: "def $FUNC(..., $URL = \"=~/[Hh][Tt][Tt][Pp]:\\/\\/.*/\", ...):\n\
          \  ...\n  $SESSION = requests.Session(...)\n  ...\n  $SESSION.request($METHOD,\
          \ $URL, ...)\n"
  - patterns:
    - pattern-inside: '$SESSION = requests.Session(...)

        ...

        '
    - pattern-either:
      - pattern: $SESSION.$W("=~/[Hh][Tt][Tt][Pp]:\/\/.*/", ...)
      - pattern: '$URL = "=~/[Hh][Tt][Tt][Pp]:\/\/.*/"

          ...

          $SESSION.$W($URL, ...)

          '
      - pattern: $SESSION.request($METHOD, "=~/[Hh][Tt][Tt][Pp]:\/\/.*/", ...)
      - pattern: '$URL = "=~/[Hh][Tt][Tt][Pp]:\/\/.*/"

          ...

          $SESSION.request($METHOD, $URL, ...)

          '
  fix-regex:
    regex: '[Hh][Tt][Tt][Pp]://'
    replacement: https://
    count: 1
  message: 'Detected a request using ''http://''. This request will be unencrypted.
    Use ''https://'' instead.

    '
  metadata:
    owasp: 'A3: Sensitive Data Exposure'
    cwe: 'CWE-319: Cleartext Transmission of Sensitive Information'
  languages:
  - python
  severity: ERROR
