rules:
- id: manual-defaultdict-dict-create
  patterns:
  - pattern-either:
    - pattern: "$DICT = {}\n...\nfor $KEY, $VALUE in $OTHERDICT.items():\n    ...\n\
        \    if $KEY not in $DICT:\n        ...\n        $DICT[$KEY] = {}\n      \
        \  ...\n    $DICT[$KEY].update(...)\n"
    - pattern: "$DICT = {}\n...\nfor $KEY, $VALUE in $OTHERDICT.items():\n    ...\n\
        \    $DICT.setdefault($KEY, {}).update(...)\n"
  message: manually creating a defaultdict - use collections.defaultdict(dict)
  languages:
  - python
  severity: WARNING
  metadata:
    cwe:
    - 'CWE-362: Race Condition'
    - 'CWE-367: Time-of-check Time-of-use (TOCTOU) Race Condition'
    - 'CWE-665: Improper Initialization'
- id: manual-defaultdict-set-create
  patterns:
  - pattern-either:
    - pattern: "$DICT = {}\n...\nfor $KEY, $VALUE in $OTHERDICT.items():\n    ...\n\
        \    if $KEY not in $DICT:\n        ...\n        $DICT[$KEY] = set()\n   \
        \     ...\n    $DICT[$KEY].add(...)\n"
    - pattern: "$DICT = {}\n...\nfor $KEY, $VALUE in $OTHERDICT.items():\n    ...\n\
        \    $DICT.setdefault($KEY, set()).add(...)\n"
  message: manually creating a defaultdict - use collections.defaultdict(set)
  languages:
  - python
  severity: WARNING
  metadata:
    cwe:
    - 'CWE-398: Poor Code Quality'
- id: manual-defaultdict-list-create
  patterns:
  - pattern-either:
    - pattern: "$DICT = {}\n...\nfor $KEY, $VALUE in $OTHERDICT.items():\n    ...\n\
        \    if $KEY not in $DICT:\n        ...\n        $DICT[$KEY] = []\n      \
        \  ...\n    $DICT[$KEY].append(...)\n"
    - pattern: "$DICT = {}\n...\nfor $KEY, $VALUE in $OTHERDICT.items():\n    ...\n\
        \    $DICT.setdefault($KEY, []).append(...)\n"
  message: manually creating a defaultdict - use collections.defaultdict(list)
  languages:
  - python
  severity: WARNING
  metadata:
    cwe:
    - 'CWE-398: Indicator of Poor Code Quality'
    - 'CWE-665: Improper Initialization'
- id: manual-counter-create
  pattern: "$DICT = {}\n...\nfor $KEY, $VALUE in $OTHERDICT.items():\n    ...\n  \
    \  if $KEY not in $DICT:\n        ...\n        $DICT[$KEY] = 0\n        ...\n\
    \    $DICT[$KEY] += 1\n"
  message: manually creating a counter - use collections.Counter
  languages:
  - python
  severity: WARNING
  metadata:
    cwe:
    - 'CWE-398: Indicator of Poor Code Quality'
