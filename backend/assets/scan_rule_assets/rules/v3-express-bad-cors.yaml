rules:
- id: v3-express-no-cors
  languages:
  - javascript
  - typescript
  message: The Apollo GraphQL server lacks a CORS policy. By default, the server uses
    the Access-Control-Allow-Origin HTTP header with the wildcard value (*).
  severity: WARNING
  metadata:
    category: security
    cwe: 'CWE-942: Permissive Cross-domain Policy with Untrusted Domains'
    subcategory:
    - vuln
    confidence: HIGH
    likelihood: LOW
    impact: LOW
    technology:
    - graphql
    - apollo-graphql-server
    - apollo-graphql-server-v3
    description: Lack of CORS policy
    references:
    - https://www.apollographql.com/docs/apollo-server/v3/security/cors#configuring-cors-options-for-apollo-server
  patterns:
  - pattern-either:
    - pattern-inside: '$X = require(''apollo-server-express'');

        ...

        '
    - pattern-inside: 'import ''apollo-server-express'';

        ...

        '
  - pattern: '$X = new ApolloServer({...})

      '
  - pattern-not-inside: '$X = new ApolloServer({...})

      ...

      $X.applyMiddleware({..., cors: ..., ...})

      '
- id: v3-express-bad-cors
  languages:
  - javascript
  - typescript
  message: The Apollo GraphQL server is setup with a CORS policy that reflects any
    origin, or with a regex that has known flaws.
  severity: ERROR
  metadata:
    category: security
    cwe: 'CWE-942: Permissive Cross-domain Policy with Untrusted Domains'
    subcategory:
    - vuln
    confidence: MEDIUM
    likelihood: HIGH
    impact: HIGH
    technology:
    - graphql
    - apollo-graphql-server
    - apollo-graphql-server-v3
    description: Bad CORS policy
    references:
    - https://www.apollographql.com/docs/apollo-server/v3/security/cors#configuring-cors-options-for-apollo-server
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-inside: '{ origin: $BAD_CORS_ORIGIN }

        '
    - metavariable-pattern:
        metavariable: $BAD_CORS_ORIGIN
        pattern-either:
        - pattern: 'true

            '
        - patterns:
          - pattern-either:
            - pattern: '$CORS_SINGLE_ORIGIN

                '
            - pattern: '[..., $CORS_SINGLE_ORIGIN, ...]

                '
          - metavariable-pattern:
              metavariable: $CORS_SINGLE_ORIGIN
              pattern-either:
              - pattern-regex: ^/.*[^\\]\..*/$
              - pattern-regex: ^/.*[^$]/$
              - pattern: '''null''

                  '
  pattern-sinks:
  - patterns:
    - pattern-either:
      - pattern-inside: '$X = require(''apollo-server-express'');

          ...

          '
      - pattern-inside: 'import ''apollo-server-express'';

          ...

          '
    - pattern-either:
      - patterns:
        - pattern-inside: '$X = new ApolloServer({...})

            ...

            $X.applyMiddleware({...})

            '
        - pattern: '$X.applyMiddleware({..., cors: $CORS_ORIGIN, ...})

            '
    - focus-metavariable: $CORS_ORIGIN
