rules:
- id: java_crypto_rule-CipherDESInsecure_1
  languages:
  - java
  patterns:
  - pattern-inside: javax.crypto.Cipher.getInstance("$ALG")
  - metavariable-regex:
      metavariable: $ALG
      regex: ^(DES)/.*
  message: "DES, TripleDES and RC2 are all considered broken or insecure cryptographic\
    \ algorithms.\nNewer algorithms  apply message integrity to validate ciphertext\
    \ has not been tampered\nwith. Consider using `ChaCha20Poly1305` instead as it\
    \ is easier and faster than the\nalternatives such as `AES-256-GCM`.\n\nFor older\
    \ applications that don't have support for `ChaCha20Poly1305`,\n`AES-256-GCM`\
    \ is recommended, however it has many drawbacks:\n- Slower than `ChaCha20Poly1305`.\n\
    - Catastrophic failure if nonce values are reused.\n\nExample using `ChaCha20Poly1305`:\n\
    ```\npublic encrypt() throws Exception {\n    chaChaEncryption(\"Secret text to\
    \ encrypt\".getBytes(StandardCharsets.UTF_8));\n}\n\npublic SecureRandom getSecureRandomDRBG()\
    \ throws NoSuchAlgorithmException {\n    // Use DRBG according to\nhttp://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-90Ar1.pdf\n\
    \    return SecureRandom.getInstance(\"DRBG\",\n            // Security strength\
    \ in bits (default is 128)\n            DrbgParameters.instantiation(256,\n  \
    \              // Set prediction resistance and re-seeding\n                DrbgParameters.Capability.PR_AND_RESEED,\n\
    \                // Set the personalization string (optional, not necessary)\n\
    \                \"some_personalization_string\".getBytes()\n            )\n \
    \   );\n}\n\npublic Cipher getChaCha20Poly1305(int mode, byte[] ivKey, byte[]\
    \ secretKey) throws\nNoSuchAlgorithmException, NoSuchPaddingException, InvalidKeyException,\n\
    InvalidAlgorithmParameterException  {\n    // Get a DRBG random number generator\
    \ instance\n    SecureRandom random = getSecureRandomDRBG();\n    // Create a\
    \ ChaCha20-Poly1305 cipher instance\n    Cipher chaChaCipher = Cipher.getInstance(\"\
    ChaCha20-Poly1305/None/NoPadding\");\n    // Create our parameterSpec using our\
    \ ivKey\n    AlgorithmParameterSpec parameterSpec = new IvParameterSpec(ivKey);\n\
    \    // Create a SecretKeySpec using our secretKey\n    SecretKeySpec secretKeySpec\
    \ = new SecretKeySpec(secretKey, \"ChaCha20\");\n    // Initialize and return\
    \ the cipher for the provided mode\n    chaChaCipher.init(mode, secretKeySpec,\
    \ parameterSpec, random);\n    return chaChaCipher;\n}\n\npublic void chaChaEncryption(byte[]\
    \ plainText) throws NoSuchAlgorithmException,\nNoSuchPaddingException, InvalidKeyException,\
    \ InvalidAlgorithmParameterException {\n    // Get a DRBG random number generator\
    \ instance\n    SecureRandom random = getSecureRandomDRBG();\n    // Create secretKey\n\
    \    byte[] secretKey = new byte[32];\n    random.nextBytes(secretKey);\n    //\
    \ Create an IV Key\n    byte[] ivKey = new byte[12];\n    random.nextBytes(ivKey);\n\
    \n    // Create a chaCha encryption cipher instance\n    Cipher chaChaEncryptor\
    \ = getChaCha20Poly1305(Cipher.ENCRYPT_MODE, ivKey, secretKey);\n\n    // Encrypt\
    \ the text using ChaCha20Poly1305\n    byte[] cipherText = null;\n    try {\n\
    \        cipherText = chaChaEncryptor.doFinal(plainText);\n    } catch (IllegalBlockSizeException\
    \ | BadPaddingException e) {\n        System.out.println(\"failed to encrypt text\"\
    );\n        return;\n    }\n    System.out.println(\"encrypted: \" + Base64.getEncoder().encodeToString(cipherText));\n\
    \n     // Create a chaCha decryption cipher instance\n    Cipher chaChaDecryptor\
    \ = getChaCha20Poly1305(Cipher.DECRYPT_MODE, ivKey, secretKey);\n\n    // Decrypt\
    \ the text\n    byte[] decryptedText = null;\n    try {\n        decryptedText\
    \ = chaChaDecryptor.doFinal(cipherText);\n    } catch (IllegalBlockSizeException\
    \ | BadPaddingException e) {\n        System.out.println(\"failed to decrypt text\"\
    );\n        return;\n    }\n    System.out.println(\"decrypted: \" + new String(decryptedText,\
    \ StandardCharsets.UTF_8));\n}\n```\n\nFor more information on Java Cryptography\
    \ see:\nhttps://docs.oracle.com/en/java/javase/15/security/java-cryptography-architecture-jca-reference-guide.html\n"
  severity: WARNING
  metadata:
    shortDescription: Inadequate encryption strength
    category: security
    cwe: CWE-326
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    technology:
    - java
    security-severity: Medium
