rules:
- id: generic_injection_rule-BiDiTrojanSource
  languages:
  - generic
  pattern-regex: '[\x{202A}-\x{202E}\x{2066}-\x{2069}\x{200E}\x{200F}\x{061C}]'
  message: "Unicode bidirectional (BiDi) control characters were detected in source\
    \ code.\nThese characters can be used to reorder text and hide malicious code\
    \ \n(CVE-2021-42574).\n\nBiDi override characters can make code appear different\
    \ from its actual logic:\n- Text that appears as a comment might actually be executable\
    \ code\n- Code that appears harmless might contain hidden malicious logic\n- Variable\
    \ names and string literals may not reflect their true content\n\nMitigation Steps:\n\
    - Remove any BiDi override characters\n- Only use standard ASCII characters in\
    \ source code\n- If BiDi characters are required, thoroughly review the code\n\
    \nSecure Code Example:\n```java\npublic class DataProcessor {\n    // Use standard\
    \ ASCII characters only\n    public void processData(String data) {\n        String\
    \ cleanInput = data.trim();  // Clean the input\n        System.out.println(\"\
    Processing: \" + cleanInput);  // Clear, readable code\n    }\n}\n```\n\nReferences:\n\
    - https://nvd.nist.gov/vuln/detail/CVE-2021-42574\n- https://trojansource.codes/\n"
  metadata:
    shortDescription: Improper control of generation of code ('Code Injection')
    cwe: CWE-94
    owasp:
    - A03:2021-Injection
    - A1:2017-Injection
    category: security
    security-severity: Low
  severity: WARNING
  paths:
    include:
    - '*.py'
    - '*.js'
    - '*.java'
    - '*.c'
    - '*.cpp'
    - '*.cs'
    - '*.go'
    - '*.rs'
    - '*.php'
    - '*.rb'
    - '*.scala'
    - '*.ts'
    - '*.kt'
    - '*.m'
    - '*.swift'
