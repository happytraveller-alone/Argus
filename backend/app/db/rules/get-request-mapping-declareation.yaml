rules:
- id: get-request-mapping-declareation
  languages:
  - java
  severity: INFO
  pattern-either:
  - pattern: "public $TYPE $FUNCTIONNAME(...){\n  ...\n  flexibleSearchService.search(query,\
      \ params);\n  ...\n}\n"
  - pattern: "public $TYPE $FUNCTIONNAME(...){\n  ...\n  final SearchResult<BrandCategoryModel>\
      \ $VARIABLE = flexibleSearchService.search($QUERY);\n  ...\n}\n"
  - pattern: "public $TYPE $FUNCTIONNAME(...){\n  ...\n  getFlexibleSearchService().searchUnique(query);\n\
      \  ...\n}\n"
  - pattern: "public $TYPE $FUNCTIONAME(...){\n  ...\n  FlexibleSearchQuery fQuery\
      \ = new FlexibleSearchQuery($SOMETHING);\n  ...\n}\n"
  message: '$FUNCTIONNAME, $VARIABLE, $QUERY

    '
  metadata:
    cwe:
    - 'CWE-89: SQL Injection'
    - 'CWE-20: Improper Input Validation'
