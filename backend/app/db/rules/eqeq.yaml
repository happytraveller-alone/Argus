rules:
- id: eqeq
  patterns:
  - pattern-not-inside: assert $X;
  - pattern-not-inside: 'assert $X : $Y;

      '
  - pattern-either:
    - pattern: $X == $X
    - pattern: $X != $X
  - pattern-not: 1 == 1
  message: '`$X == $X` or `$X != $X` is a useless comparison unless the value compared
    is a float or double. To test if `$X` is not-a-number, use `Double.isNaN($X)`.'
  languages:
  - java
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-570: Expression is always true/false'
    - 'CWE-480: Use of Incorrect Operator'
    - 'CWE-561: Dead Code'
