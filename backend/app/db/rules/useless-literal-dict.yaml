rules:
- id: useless-literal-dict
  patterns:
  - pattern-either:
    - pattern: '{..., $X: $A, ..., $X: $B, ...}

        '
  message: key `$X` is uselessly assigned twice
  languages:
  - python
  severity: WARNING
  metadata:
    cwe:
    - 'CWE-561: Dead Code'
    - 'CWE-563: Assignment to Variable without Use'
