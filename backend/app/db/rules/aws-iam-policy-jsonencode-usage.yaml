rules:
- id: aws-iam-policy-jsonencode-usage
  patterns:
  - pattern-either:
    - pattern-inside: "resource \"aws_iam_role\" $ANYTHING {\n  ...\n}\n"
    - pattern-inside: "resource \"aws_iam_policy\" $ANYTHING {\n  ...\n}\n"
    - pattern-inside: "resource \"aws_iam_role_policy\" $ANYTHING {\n  ...\n}\n"
  - pattern-either:
    - pattern: policy = jsonencode($STATEMENT)
    - pattern: assume_role_policy = jsonencode($STATEMENT)
  message: 'Usage of jsonencode() with IAM resource policy configurations may be prone
    to silent squashing of duplicate JSON keys. While the `terraform plan` output
    will correctly reflect the end state, it may not match the intent of the configuration
    author.


    Review the guidance at https://developer.hashicorp.com/terraform/tutorials/aws/aws-iam-policy,
    and consider using the aws_iam_policy_document data source instead.

    '
  languages:
  - terraform
  severity: WARNING
