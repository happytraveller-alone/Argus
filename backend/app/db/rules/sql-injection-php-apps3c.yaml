rules:
- id: sql-injection-php-apps3c
  languages:
  - php
  severity: WARNING
  message: Detected a formatted string starting with a SQL operation with a concatenated  value
    that came from a function argument. This could lead to SQL injection if variables
    in the SQL statement are not properly sanitized.
  pattern-either:
  - patterns:
    - pattern-either:
      - pattern-inside: "function $FUNC(...,$PAR,...) {\n  ...\n}\n"
      - pattern-inside: "function $FUNC(...,$PAR = $PVAL,...) {\n  ...\n}        \
          \ \n"
    - pattern-either:
      - pattern: $SELECT . $PRE . <... $PAR ...> . $POST;
      - pattern: $SELECT . <... $PAR ...> . $POST;
      - pattern: $SELECT . $PRE . <... $PAR ...>;
      - pattern: $SELECT . <... $PAR ...>;
      - pattern: '$COPY = $PAR;

          ...

          $SELECT . $PRE . <... $COPY ...> . $POST;

          '
      - pattern: '$COPY = $PAR;

          ...

          $SELECT . <... $COPY ...> . $POST;

          '
      - pattern: '$COPY = $PAR;

          ...

          $SELECT . $PRE . <... $COPY ...>;

          '
      - pattern: '$COPY = $PAR;

          ...

          $SELECT . <... $COPY ...>;

          '
      - pattern: '$COPY = $PAR->$ARGUM;

          ...

          $SELECT . $PRE . <... $COPY ...> . $POST;

          '
      - pattern: '$COPY = $PAR->$ARGUM;

          ...

          $SELECT . <... $COPY ...> . $POST;

          '
      - pattern: '$COPY = $PAR->$ARGUM;

          ...

          $SELECT . $PRE . <... $COPY ...>;

          '
      - pattern: '$COPY = $PAR->$ARGUM;

          ...

          $SELECT . <... $COPY ...>;

          '
      - pattern: '$COPY = $PAR.$ARGUM;

          ...

          $SELECT . $PRE . <... $COPY ...> . $POST;

          '
      - pattern: '$COPY = $PAR.$ARGUM;

          ...

          $SELECT . <... $COPY ...> . $POST;

          '
      - pattern: '$COPY = $PAR.$ARGUM;

          ...

          $SELECT . $PRE . <... $COPY ...>;

          '
      - pattern: "$COPY = $PAR.$ARGUM;\n...\n$SELECT . <... $COPY ...>;  \n"
    - metavariable-regex:
        metavariable: $SELECT
        regex: (?is)^["']+\s*(select |delete |insert |create |update |alter |drop
          ).*["']+
  - patterns:
    - pattern-either:
      - pattern-inside: "function $FUNC(...,$PAR,...) {\n  ...\n}\n"
      - pattern-inside: "function $FUNC(...,$PAR = $PVAL,...) {\n  ...\n}   \n"
    - pattern: $QUERY = <... $PAR ...>;
    - pattern: $QUERY = $SELECT;
    - metavariable-regex:
        metavariable: $SELECT
        regex: (?is)^["']+\s*(select |delete |insert |create |update |alter |drop
          ).*["']+
  - patterns:
    - pattern-either:
      - pattern-inside: "function $FUNC(...,$PAR,...) {\n  ...\n  $COPY = $PAR;\n\
          \  ...            \n  $QUERY = $SELECT;\n  ...\n}\n"
      - pattern-inside: "function $FUNC(...,$PAR = $PVAL,...) {\n  ...\n  $COPY =\
          \ $PAR;\n  ...            \n  $QUERY = $SELECT;\n  ...\n}         \n"
    - pattern: '$COPY = $PAR;

        ...

        $QUERY = <... $COPY ...>;

        '
    - metavariable-regex:
        metavariable: $SELECT
        regex: (?is)^["']+\s*(select |delete |insert |create |update |alter |drop
          ).*["']+
  - patterns:
    - pattern-either:
      - pattern-inside: "function $FUNC(...,$PAR,...) {\n  ...\n  $QUERYMETHOD($SELECT);\n\
          \  ...\n}\n"
      - pattern-inside: "function $FUNC(...,$PAR = $PVAL,...) {\n  ...\n  $QUERYMETHOD($SELECT);\n\
          \  ...\n}        \n"
    - pattern: $QUERYMETHOD(<... $PAR ...>);
    - metavariable-regex:
        metavariable: $SELECT
        regex: (?is)^["']+\s*(select |delete |insert |create |update |alter |drop
          ).*["']+
  - patterns:
    - pattern-either:
      - pattern-inside: "function $FUNC(...,$PAR,...) {\n  ...\n  $COPY = $PAR;\n\
          \  ...            \n  $QUERYMETHOD($SELECT);\n  ...\n}\n"
      - pattern-inside: "function $FUNC(...,$PAR = $PVAL,...) {\n  ...\n  $COPY =\
          \ $PAR;\n  ...            \n  $QUERYMETHOD($SELECT);\n  ...\n}        \n"
    - pattern: '$COPY = $PAR;

        ...

        $QUERYMETHOD(<... $COPY ...>);

        '
    - metavariable-regex:
        metavariable: $SELECT
        regex: (?is)^["']+\s*(select |delete |insert |create |update |alter |drop
          ).*["']+
