rules:
- id: javascript-alert
  patterns:
  - pattern-either:
    - pattern: alert()
    - pattern: alert($X)
  message: found alert() call; should this be in production code?
  languages:
  - javascript
  severity: WARNING
  metadata:
    cwe:
    - 'CWE-79: Improper Neutralization of Input During Web Page Generation'
    - 'CWE-200: Exposure of Sensitive Information to an Unauthorized Actor'
- id: javascript-debugger
  pattern: debugger;
  message: found debugger call; should this be in production code?
  languages:
  - javascript
  severity: WARNING
- id: javascript-confirm
  pattern: confirm(...)
  message: found conform() call; should this be in production code?
  languages:
  - javascript
  severity: WARNING
- id: javascript-prompt
  patterns:
  - pattern-either:
    - pattern: prompt()
    - pattern: prompt($X)
    - pattern: prompt($X, $Y)
  message: found prompt() call; should this be in production code?
  languages:
  - javascript
  severity: WARNING
