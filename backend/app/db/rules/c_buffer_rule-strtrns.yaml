rules:
- id: c_buffer_rule-strtrns
  languages:
  - c
  - cpp
  message: 'This function is easy to misuse by not accounting for the space necessary
    when transforming

    strings. Ensure that the destination buffer is large enough to fit the transformed
    output.


    For more information please see:

    https://docs.oracle.com/cd/E36784_01/html/E36877/strtrns-3gen.html

    '
  metadata:
    shortDescription: Insecure string processing function
    cwe: CWE-120
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: High
    category: security
  pattern: strtrns(...)
  severity: WARNING
