rules:
- id: improper_cookie
  severity: WARNING
  metadata:
    author: Maurizio Siddu
    references:
    - https://cwe.mitre.org/data/definitions/319.html
    - https://cwe.mitre.org/data/definitions/1004.html
    - https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/06-Session_Management_Testing/02-Testing_for_Cookies_Attributes
    category: security
  message: This Java application seems not properly setting the security flags Secure
    and HttpOnly on some cookies, if these cookies contain sensitive information (i.e.
    session cookies) the attributes Secure and HttpOnly should be enabled. The Secure
    flag ensures that the cookie is sent only over HTTPS, this avoid to pass the cookie
    in unencrypted requests. The HttpOnly flag does not allow the cookie to be accessed
    via a client-side script such as JavaScript, preventing session leakages.  It
    is recommended to properly set the security flags on the session cookies of the
    web application.
  languages:
  - java
  patterns:
  - pattern-not-inside: "$RET $METHOD(...) {\n ...\n $COOKIE.setSecure(true);\n $COOKIE.setHttpOnly(true);\n\
      \ ...\n}\n"
  - pattern-not-inside: "$RET $METHOD(...) {\n ...\n $COOKIE.setHttpOnly(true);\n\
      \ $COOKIE.setSecure(true);\n ...\n}\n"
  - pattern-not-inside: $COOKIE.setValue("");
  - pattern-not-inside: $COOKIE.setValue(null);
  - pattern-not-inside: "$RET $METHOD(...) {\n  ...\n  $COOKIE = ResponseCookie.from(...)\n\
      \    . ...\n    .httpOnly(true)\n    . ...\n    .secure(true)\n    . ...\n \
      \   ;\n  ...\n}\n"
  - pattern-not-inside: "$RET $METHOD(...) {\n  ...\n  $COOKIE = ResponseCookie.from(...)\n\
      \    . ...\n    .secure(true)\n    . ...\n    .httpOnly(true)\n    . ...\n \
      \   ;\n  ...\n}\n"
  - pattern-either:
    - patterns:
      - pattern: $RESPONSE.setHeader("Set-Cookie", $ITEM);
      - metavariable-regex:
          metavariable: $ITEM
          regex: (?i)(?!.*\bSecure\b)|(?!.*\bHttpOnly\b).*$
    - patterns:
      - pattern: $RESPONSE.addHeader("Set-Cookie", $ITEM);
      - metavariable-regex:
          metavariable: $ITEM
          regex: (?i)(?!.*\bSecure\b)|(?!.*\bHttpOnly\b).*$
    - patterns:
      - pattern-either:
        - pattern: $RESPONSE.addCookie($COOKIE);
        - pattern-inside: "$RET $METHOD(...) {\n  ...\n  $COOKIE = ResponseCookie.from(...)\n\
            \    . ...\n    ;\n  ...\n}\n"
        - pattern: $COOKIE.setUseHttpOnlyCookie(false);
        - pattern: $COOKIE.setUseSecureCookie(false);
