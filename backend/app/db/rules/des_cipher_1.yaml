rules:
- id: des_cipher_1
  severity: WARNING
  metadata:
    author: Maurizio Siddu
    references:
    - https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html#algorithms
    - https://cwe.mitre.org/data/definitions/327.html
    category: security
    cwe:
    - 'CWE-327: Use of a Broken or Risky Cryptographic Algorithm'
    - 'CWE-326: Inadequate Encryption Strength'
  message: This Java application uses a weak cipher, the data encrypted using 3DES
    cipher results vulnerable to various cryptographic attacks, which could allow
    to retrieve its plain-text value.  It is recommended to avoid the usage of 3DES
    cipher.
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: 'Cipher $VAR = Cipher.getInstance("=~/((3DES|DESede|DESEDEWRAP)\/.*\/.*|(3DES|DESede|DESEDEWRAP))/i",
        ...);

        '
    - pattern: SecretKeyFactory $VAR = SecretKeyFactory.getInstance("=~/((3DES|DESede|DESEDEWRAP)\/.*\/.*|(3DES|DESede|DESEDEWRAP))/i",
        ...);
