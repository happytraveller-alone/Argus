rules:
- id: java_crypto_rule-WeakTLSProtocol-DefaultHttpClient_1
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: new org.apache.http.impl.client.DefaultHttpClient();
  message: "The `org.apache.http.impl.client.DefaultHttpClient` does not verify the\
    \ hostnames upon connection.\n\nThis allows for an adversary who is in between\
    \ the application and the target host to intercept\npotentially sensitive information\
    \ or transmit malicious data.\n\nDo not use the `org.apache.http.impl.client.DefaultHttpClient();`\
    \ as it is deprecated. Instead\nuse the new `java.net.http.HttpClient` that was\
    \ introduced in Java 9.\n\nExample connecting to a host that will automatically\
    \ do TLS validation:\n```\n// Create a new java.net.http.HttpClient\nHttpClient\
    \ httpClient = HttpClient.newHttpClient();\n// Create a HttpRequest builder\n\
    HttpRequest request = HttpRequest.newBuilder()\n        // Create a URI for a\
    \ website which requires TLS\n        .uri(URI.create(\"https://www.example.com/\"\
    ))\n        // Build the request\n        .build();\n\n// Use the httpClient to\
    \ send the request and use an HttpResponse.BodyHandlers String type\nHttpResponse<String>\
    \ response = httpClient.send(request, HttpResponse.BodyHandlers.ofString());\n\
    // Debug print\nSystem.out.println(response);\n```\n"
  metadata:
    shortDescription: Improper certificate validation
    category: security
    cwe: CWE-295
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    security-severity: Medium
  severity: WARNING
