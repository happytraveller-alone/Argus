rules:
- id: not-after
  patterns:
  - pattern: $T1.UnixNano() <= $T2.UnixNano()
  message: 'unless checking for wall clock inconsistencies, use !$T1.After($T2)

    '
  languages:
  - go
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-367: Time-of-check Time-of-use Race Condition'
    - 'CWE-287: Improper Authentication'
    - 'CWE-703: Improper Check or Handling of Exceptional Conditions'
    - 'CWE-20: Improper Input Validation'
- id: not-before
  patterns:
  - pattern: $T1.UnixNano() >= $T2.UnixNano()
  message: 'unless checking for wall clock inconsistencies, use !$T1.Before($T2)

    '
  languages:
  - go
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-367: Time-of-check Time-of-use Race Condition'
