rules:
- id: tarfile_unsafe_unpacking
  languages:
  - python
  severity: ERROR
  message: Unsafe Tarfile Unpacking
  patterns:
  - pattern-inside: 'import tarfile

      ...

      '
  - pattern-either:
    - pattern-inside: "with tarfile.open($FILE, ...) as $FD:\n  ...\n"
    - pattern-inside: '$FD = tarfile.open($FILE, ...)

        ...

        '
  - pattern-either:
    - patterns:
      - pattern: $FD.extract($MEMBER, ...)
      - pattern: $FD.extract($MEMBER, ..., ...)
      - pattern: $FD.extract($MEMBER, ..., ..., ...)
      - pattern: $FD.extract($MEMBER, ..., ..., ..., ...)
      - pattern-either:
        - pattern-inside: "$FILELIST = $FD.getmembers()\n...\nfor $MEMBER in $FILELIST:\n\
            \  ...\n"
        - pattern-inside: "for $MEMBER in $FD.getmembers():\n  ...\n"
    - pattern: $FD.extractall(..., ..., ..., ..., ...)
