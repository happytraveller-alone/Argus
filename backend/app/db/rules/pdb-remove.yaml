rules:
- id: pdb-remove
  pattern-either:
  - pattern: pdb.$X(...)
  - pattern: pdb.Pdb.$X(...)
  message: 'pdb is an interactive debugging tool and you may have forgotten to remove
    it before committing your code

    '
  languages:
  - python
  severity: WARNING
  metadata:
    cwe:
    - 'CWE-534: Information Exposure Through Debug Information'
    - 'CWE-200: Exposure of Sensitive Information'
