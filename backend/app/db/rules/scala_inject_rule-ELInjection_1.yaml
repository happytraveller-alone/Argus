rules:
- id: scala_inject_rule-ELInjection_1
  languages:
  - scala
  message: 'An expression is built with a dynamic value. The source of the value(s)
    should be verified to

    avoid that unfiltered values fall into this risky code evaluation.

    '
  metadata:
    category: security
    cwe: CWE-94
    shortDescription: Improper Control of Generation of Code ('Code Injection')
    technology:
    - scala
    security-severity: High
  patterns:
  - pattern-inside: 'import javax.el._

      ...

      '
  - pattern-either:
    - pattern-inside: "def $FUNC(..., $EXPR: String, ...) : $TYPE = {\n  ...\n}\n"
    - pattern-inside: "def $FUNC(..., $EXPR: String, ...) = {\n  ...\n}\n"
  - pattern-either:
    - pattern: $X.createValueExpression(..., $EXPR, ...)
    - pattern: $X.createMethodExpression(..., $EXPR, ...)
  severity: WARNING
