rules:
- id: zip_shutil_unsafe_unpacking
  languages:
  - python
  severity: ERROR
  message: Unsafe Zip Unpacking
  patterns:
  - pattern-either:
    - pattern: shutil.copyfileobj($SOURCE, $DESTINATION)
  - pattern-inside: 'import zipfile

      ...

      '
  - pattern-either:
    - pattern-inside: "with zipfile.ZipFile($FILE, ...) as $FD:\n  ...\n"
    - pattern-inside: '$FD = zipfile.ZipFile($FILE, ...)

        ...

        '
  - pattern-either:
    - pattern-inside: "$FILELIST = $FD.namelist()\n...\nfor $FILENAME in $FILELIST:\n\
        \  ...\n"
    - pattern-inside: "for $FILENAME in $FD.namelist():\n  ...\n"
  - pattern-either:
    - pattern-inside: "with open($FILENAME, ...) as $DESTINATION:\n  ...\n"
    - pattern-inside: '$DESTINATION = open($FILENAME, ...)

        ...

        '
    - pattern-inside: "$DESTINATION_PATH = os.path.join(..., $FILENAME)\n...\nwith\
        \ open($DESTINATION_PATH, ...) as $DESTINATION:\n  ...\n"
    - pattern-inside: '$DESTINATION_PATH = os.path.join(..., $FILENAME)

        ...

        $DESTINATION = open($DESTINATION_PATH, ...)

        ...'
  metadata:
    cwe:
    - 'CWE-22: Improper Limitation of a Pathname to a Restricted Directory'
    - 'CWE-73: External Control of File Name or Path'
