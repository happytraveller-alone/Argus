rules:
- id: odd-comparison-subtract-eq-zero
  patterns:
  - pattern: $X - $Y == 0
  fix: $X == $Y
  message: Odd comparison
  languages:
  - go
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-682: Incorrect Calculation'
    - 'CWE-190: Integer Overflow or Wraparound'
    - 'CWE-480: Use of Incorrect Operator'
- id: odd-comparison-subtract-neq-zero
  patterns:
  - pattern: $X - $Y != 0
  fix: $X != $Y
  message: Odd comparison
  languages:
  - go
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-190: Integer Overflow or Wraparound'
- id: odd-comparison-subtract-lt-zero
  patterns:
  - pattern: $X - $Y < 0
  fix: $Y > $X
  message: Odd comparison
  languages:
  - go
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-190: Integer Overflow or Wraparound'
    - 'CWE-398: Indicator of Poor Code Quality'
- id: odd-comparison-subtract-lte-zero
  patterns:
  - pattern: $X - $Y <= 0
  fix: $Y >= $X
  message: Odd comparison
  languages:
  - go
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-682: Incorrect Calculation'
- id: odd-comparison-subtract-gt-zero
  patterns:
  - pattern: $X - $Y > 0
  fix: $X > $Y
  message: Odd comparison
  languages:
  - go
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-190: Integer Overflow or Wraparound'
- id: odd-comparison-subtract-gte-zero
  patterns:
  - pattern: $X - $Y >= 0
  fix: $X >= $Y
  message: Odd comparison
  languages:
  - go
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-190: Integer Overflow or Wraparound'
- id: odd-comparison-xor-eq-zero
  patterns:
  - pattern: $X ^ $Y == 0
  fix: $X == $Y
  message: Odd comparison
  languages:
  - go
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-480: Use of Incorrect Operator'
- id: odd-comparison-xor-neq-zero
  patterns:
  - pattern: $X ^ $Y != 0
  fix: $X != $Y
  message: Odd comparison
  languages:
  - go
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-480: Use of Incorrect Operator'
