rules:
- id: should-be-fstring
  patterns:
  - pattern: '$X = $Y

      ...

      print(''...{$X}...'')

      '
  fix-regex:
    regex: (['|"])
    replacement: f\1
    count: 1
  message: Missing an f-string specifier for string containing variable '$X'.
  languages:
  - python
  severity: WARNING
  metadata:
    cwe:
    - 'CWE-134: Use of Externally-Controlled Format String'
    - 'CWE-20: Improper Input Validation'
