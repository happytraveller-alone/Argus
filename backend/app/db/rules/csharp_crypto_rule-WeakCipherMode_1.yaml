rules:
- id: csharp_crypto_rule-WeakCipherMode_1
  languages:
  - csharp
  patterns:
  - pattern-inside: 'using System.Security.Cryptography;

      ...

      '
  - metavariable-regex:
      metavariable: $CIPHER
      regex: ^(ECB|CBC|OFB|CFB|CTS)$
  - pattern: CipherMode.$CIPHER
  message: "Cryptographic algorithms provide many different modes of operation, only\
    \ some of which provide\nmessage integrity. Without message integrity it could\
    \ be possible for an adversary to attempt\nto tamper with the ciphertext which\
    \ could lead to compromising the encryption key. Newer\nalgorithms\napply message\
    \ integrity to validate ciphertext has not been tampered with.\n\nInstead of using\
    \ an algorithm that requires configuring a `CipherMode`, an algorithm\nthat has\
    \ built-in message integrity should be used. If using .NET Framework greater\n\
    than version 6.0 consider using `ChaCha20Poly1305` or `AES-256-GCM`.\n\nFor older\
    \ applications, `AES-256-GCM` is recommended, however it has many drawbacks:\n\
    - Slower than `ChaCha20Poly1305`.\n- Catastrophic failure if nonce values are\
    \ re-used.\n\nExample using `ChaCha20Poly1305`:\n```\n// Generate a random key\n\
    byte[] key = new byte[32];\nRandomNumberGenerator.Fill(key);\n\nChaCha20Poly1305\
    \ encryptor = new ChaCha20Poly1305(key);\n\n// Note nonce values _must_ be regenerated\
    \ every time they are used.\nvar nonce = new byte[12];\nRandomNumberGenerator.Fill(nonce);\n\
    \nbyte[] plainText = System.Text.Encoding.UTF8.GetBytes(\"Secret text to encrypt\"\
    );\nbyte[] cipherText = new byte[plainText.Length];\nvar authTag = new byte[16];\n\
    \nencryptor.Encrypt(nonce, plainText, cipherText, authTag);\nbyte[] output = new\
    \ byte[cipherText.Length];\nencryptor.Decrypt(nonce, cipherText, authTag, output);\n\
    Console.WriteLine(\"Output: {0}\", System.Text.Encoding.UTF8.GetString(output));\n\
    ```\n\nExample using `AES-256-GCM`:\n```\nvar plaintextBytes = Encoding.UTF8.GetBytes(\"\
    Secret text to encrypt\");\nvar key = new byte[32];\nRandomNumberGenerator.Fill(key);\n\
    \nusing var aes = new AesGcm(key);\nvar nonce = new byte[AesGcm.NonceByteSizes.MaxSize];\n\
    RandomNumberGenerator.Fill(nonce);\n\nvar cipherText = new byte[plaintextBytes.Length];\n\
    var tag = new byte[AesGcm.TagByteSizes.MaxSize];\n\naes.Encrypt(nonce, plaintextBytes,\
    \ cipherText, tag);\n\n// Decrypt\nusing (var decrypt = new AesGcm(key))\n{\n\
    \    var decryptedBytes = new byte[cipherText.Length];\n\n    decrypt.Decrypt(nonce,\
    \ cipherText, tag, decryptedBytes);\n\n    Console.WriteLine(\"Decrypted: {0}\"\
    ,  Encoding.UTF8.GetString(decryptedBytes));\n}\n```\n"
  severity: WARNING
  metadata:
    shortDescription: Use of a broken or risky cryptographic algorithm
    category: security
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    cwe: CWE-327
    security-severity: Medium
