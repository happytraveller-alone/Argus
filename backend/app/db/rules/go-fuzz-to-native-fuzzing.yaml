rules:
- id: go-fuzz-to-native-fuzzing
  patterns:
  - pattern: func Fuzz($DATA []byte) int { $...BODY }
  fix: "// remove gofuzz build tag\n// rename file to _test.go\n// convert corpus\
    \ with file2fuzz\nfunc FuzzData(f *testing.F) {\n  f.Fuzz(func(t *testing.T, $DATA\
    \ []byte) {\n    func() int {\n      $...BODY\n    }()\n  })\n}\n"
  message: old-style go-fuzz fuzz function found
  languages:
  - go
  severity: ERROR
