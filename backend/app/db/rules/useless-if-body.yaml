rules:
- id: useless-if-conditional
  patterns:
  - pattern-either:
    - pattern: "if ($X) {\n    ...\n} else if ($X) {\n    ...\n}"
  message: 'Detected an if block that checks for the same condition on both branches
    (`$X`)

    '
  languages:
  - go
  severity: WARNING
  metadata:
    cwe:
    - 'CWE-571: Expression is Always True/False'
    - 'CWE-561: Dead Code'
- id: useless-if-body
  patterns:
  - pattern: "if ($X) {\n    $S\n} else {\n    $S\n}"
  message: 'Detected identical if-statement bodies. Is this intentional?

    '
  languages:
  - go
  severity: WARNING
  metadata:
    cwe:
    - 'CWE-398: Indicator of Poor Code Quality'
    - 'CWE-561: Dead Code'
