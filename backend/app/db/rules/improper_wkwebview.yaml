rules:
- id: improper_wkwebview
  severity: WARNING
  metadata:
    author: Maurizio Siddu
    references:
    - https://mas.owasp.org/MASTG/iOS/0x06h-Testing-Platform-Interaction
    - https://developer.apple.com/documentation/webkit/wkwebview
    category: security
    confidence: MEDIUM
    likelihood: LOW
    impact: MEDIUM
    technology:
    - ios
  message: "This iOS mobile application seems using a WKWebView object weakly configured\
    \ from a security point of view, as its settings present any of the following\
    \ flaws:\n  - WKWebView has JavaScript support not explicitly disabled (enabled\
    \ by default)\n  - WKWebView has enabled JavaScript to access content from other\
    \ \"file://\" scheme URLs (allowFileAccessFromFileURLs default false)\n  - WKWebView\
    \ has enabled JavaScript to access content from any origin (allowUniversalAccessFromFileURLs\
    \ default false)\nThis configuration of WKWebView increases the attack surface\
    \ of the mobile app and could lead to various kind of vulnearbilities (i.e. reflected\
    \ XSS, code injection, information disclosure, etc.). If possible it is recommended\
    \ to configure WKWebView in the mobile app with JavaScript disabled, and disabling\
    \  the permission to access content from any origin or other file scheme URLs."
  languages:
  - swift
  patterns:
  - pattern-either:
    - patterns:
      - pattern: 'let $PREFS = WKPreferences()

          ...

          let $WEBVIEW = WKWebView(...)

          ...

          $WEBVIEW.$LOADFUNC(...)

          '
      - metavariable-regex:
          metavariable: $LOADFUNC
          regex: (?i)(loadHTMLString|loadData)
      - pattern-not-inside: "func $FUNC() {\n    ...\n    $PREFS.javaScriptEnabled\
          \ = false\n    ...\n}\n"
    - patterns:
      - pattern-inside: 'let $PREFS = WKPreferences()

          ...

          let $WEBVIEW : WKWebView

          ...

          $WEBVIEW.$LOADFUNC(...)

          '
      - metavariable-regex:
          metavariable: $LOADFUNC
          regex: (?i)(loadHTMLString|loadData)
      - pattern-not-inside: "func $FUNC() {\n    ...\n    $PREFS.javaScriptEnabled\
          \ = false\n    ...\n}\n"
    - patterns:
      - pattern-inside: 'let $PREFS = WKWebpagePreferences()

          ...

          let $WEBVIEW = WKWebView(...)

          ...

          $WEBVIEW.$LOADFUNC(...)

          '
      - metavariable-regex:
          metavariable: $LOADFUNC
          regex: (?i)(loadHTMLString|loadData)
      - pattern-not-inside: "func $FUNC() {\n    ...\n    $PREFS.allowsContentJavaScript\
          \ = false\n    ...\n}\n"
    - patterns:
      - pattern-inside: 'let $PREFS = WKWebpagePreferences()

          ...

          let $WEBVIEW : WKWebView

          ...

          $WEBVIEW.$LOADFUNC(...)

          '
      - metavariable-regex:
          metavariable: $LOADFUNC
          regex: (?i)(loadHTMLString|loadData)
      - pattern-not-inside: "func $FUNC() {\n    ...\n    $PREFS.allowsContentJavaScript\
          \ = false\n    ...\n}\n"
    - patterns:
      - pattern-inside: "func $FUNC() {\n  ...\n  let $WEBVIEW = WKWebView(...)\n\
          \  ...\n  $WEBVIEW.$LOADFUNC(...)\n  ...\n}\n"
      - metavariable-regex:
          metavariable: $LOADFUNC
          regex: (?i)(loadHTMLString|loadData)
      - pattern-not-inside: "func $FUNC() {\n  ...\n  let $PREFS = WKPreferences()\n\
          \  ...\n}\n"
      - pattern-not-inside: "func $FUNC() {\n  ...\n  let $PREFS = WKWebpagePreferences()\n\
          \  ...\n}\n"
      - pattern-not-inside: "func $FUNC() {\n  ...\n  $WEBVIEW.configuration.preferences.javaScriptEnabled\
          \ = false\n  ...\n}\n"
      - pattern-not-inside: "func $FUNC() {\n  ...\n  $WEBVIEW.configuration.defaultWebpagePreferences.allowsContentJavaScript\
          \ = false\n  ...\n}\n"
    - patterns:
      - pattern-inside: "func $FUNC() {\n  ...\n  let $WEBVIEW : WKWebView\n  ...\n\
          \  $WEBVIEW.$LOADFUNC(...)\n  ...\n}\n"
      - metavariable-regex:
          metavariable: $LOADFUNC
          regex: (?i)(loadHTMLString|loadData)
      - pattern-not-inside: "func $FUNC() {\n  ...\n  let $PREFS = WKPreferences()\n\
          \  ...\n}\n"
      - pattern-not-inside: "func $FUNC() {\n  ...\n  let $PREFS = WKWebpagePreferences()\n\
          \  ...\n}\n"
      - pattern-not-inside: "func $FUNC() {\n  ...\n  $WEBVIEW.configuration.preferences.javaScriptEnabled\
          \ = false\n  ...\n}\n"
      - pattern-not-inside: "func $FUNC() {\n  ...\n  $WEBVIEW.configuration.defaultWebpagePreferences.allowsContentJavaScript\
          \ = false\n  ...\n}\n"
    - patterns:
      - pattern-either:
        - pattern: $PREFS.allowFileAccessFromFileURLs = true
        - pattern: $PREFS.allowUniversalAccessFromFileURLs = true
        - pattern: '$WEBVIEW.configuration.preferences.setValue(true, forKey: "allowFileAccessFromFileURLs")

            '
        - pattern: '$WEBVIEW.configuration.preferences.setValue(true, forKey: "allowUniversalAccessFromFileURLs")

            '
