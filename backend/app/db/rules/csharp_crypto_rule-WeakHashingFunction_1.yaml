rules:
- id: csharp_crypto_rule-WeakHashingFunction_1
  languages:
  - csharp
  patterns:
  - pattern-either:
    - patterns:
      - metavariable-regex:
          metavariable: $HASH_PROVIDER
          regex: ^(SHA1CryptoServiceProvider|MD5CryptoServiceProvider)$
      - pattern: new $HASH_PROVIDER
    - patterns:
      - metavariable-regex:
          metavariable: $HASH_CLASS
          regex: ^System.Security.Cryptography.(SHA1|MD5)$
      - pattern: $HASH_CLASS.$METHOD();
  message: "Both MD5 and SHA1 hash algorithms have been found to be vulnerable to\
    \ producing collisions.\nThis means\nthat two different values, when hashed, can\
    \ lead to the same hash value. If the application is\ntrying\nto use these hash\
    \ methods for storing passwords, then it is recommended to switch to a\npassword\
    \ hashing\nalgorithm such as Argon2id or PBKDF2. Currently there is no vetted\
    \ Argon2id implementation for\nC# so\nit is recommended that PBKDF2 be used until\
    \ one is available.\n\nExample using PBKDF2 to generate and compare passwords:\n\
    ```\nconst int SaltSize = 24;\nconst int HashSize = 24;\n// number of pbkdf2 iterations,\
    \ Rfc2898DeriveBytes uses hmac-sha1\n// so set a high iteration count\nconst int\
    \ Iterations = 1_300_000;\nbyte[] salt = new byte[SaltSize];\nRandomNumberGenerator.Fill(salt);\n\
    \nRfc2898DeriveBytes pbkdf2 = new Rfc2898DeriveBytes(\"some password\", salt,\
    \ Iterations);\nbyte[] hashBytes = pbkdf2.GetBytes(HashSize);\n// Store salt and\
    \ hashedBytes in a data store such as database for authentication\nConsole.WriteLine(\"\
    Hash {0}\", BitConverter.ToString(hashBytes).Replace(\"-\", \"\"));\n// Do a constant\
    \ time comparison as to not leak data based on timing\nif (CryptographicOperations.FixedTimeEquals(hashBytes,\
    \ hashBytes)) {\n    Console.WriteLine(\"hashes are equal\");\n}\n```\nFor more\
    \ information on PBKDF2 see:\nhttps://learn.microsoft.com/en-us/dotnet/api/system.security.cryptography.rfc2898derivebytes\n\
    \nFor more information on secure password storage see OWASP:\nhttps://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html\n"
  severity: WARNING
  metadata:
    shortDescription: Use of a broken or risky cryptographic algorithm (SHA1/MD5)
    category: security
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    cwe: CWE-327
    security-severity: Medium
