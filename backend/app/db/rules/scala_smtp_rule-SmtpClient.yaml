  severity: WARNING
  message: "The application was found using `noAssert` when calling the Buffer API.\
    \ The `noAssert`\nargument has\nbeen deprecated since Node 10. Calling the Buffer\
    \ API with this argument allows the offset\nspecified to\nbe beyond the end of\
    \ the buffer. This could result in writing or reading beyond the end of the\n\
    buffer and\ncause a segmentation fault, leading to the application crashing.\n\
    \nTo remediate this issue, remove the `true` argument when calling any of the\
    \ Buffer read or\nwrite methods.\nThe application should still handle `RangeError`\
    \ exception cases where the offset is beyond\nthe end of the\nbuffer.\n\nExample\
    \ reading from a Buffer without the `noAssert` argument and gracefully handling\
    \ errors:\n```\n// Create a new buffer\nconst buf = Buffer.from([1, 2, 3, 4]);\n\
    try {\n    // Read a single byte from it, starting at offset 1\n    const b =\
    \ buf.readInt8(1);\n    // Work with b\n} catch (e) {\n    if (e instanceof RangeError)\
    \ {\n        console.log('Invalid offset: %s', e.message);\n    }\n    // handle\
    \ other errors\n}\n```\n"
