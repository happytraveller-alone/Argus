  message: "The application is generating an RSA key that is less than the recommended\
    \ 2048 bits.\nThe National Institute of Standards and Technology (NIST) deprecated\
    \ signing Digital\nCertificates that contained RSA Public Keys of 1024 bits in\
    \ December 2010. While\n1024-bit RSA keys have not been factored yet, advances\
    \ in compute may make it possible\nin the near future.\n\nConsider upgrading to\
    \ the newer asymmetric algorithm such as `Ed25519` which handles\nthe complexities\
    \ of generating key pairs and choosing correct key sizes for you:\n```\npublic\
    \ static KeyPair generateEd25519() throws NoSuchAlgorithmException {\n    // Choose\
    \ Ed25519 for KeyPairGenerator Instance\n    KeyPairGenerator keyPairGenerator\
    \ = KeyPairGenerator.getInstance(\"Ed25519\");\n    // Generate a KeyPair and\
    \ return\n    return keyPairGenerator.generateKeyPair();\n}\n```\n\nOtherwise\
    \ use a key size greater than 2048 when generating RSA keys:\n```\npublic static\
    \ KeyPair generateRSA() throws NoSuchAlgorithmException {\n    // Choose RSA for\
    \ KeyPairGenerator Instance\n    KeyPairGenerator keyPairGenerator = KeyPairGenerator.getInstance(\"\
    RSA\");\n    // Initialize with 2048 key size\n    keyPairGenerator.initialize(2048);\n\
