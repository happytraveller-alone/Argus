  severity: WARNING
  message: "The application was found calling the `eval` function OR Function()\n\
    \  constructor OR setTimeout() OR setInterval() methods. If the\n\n  variables\
    \ or strings or functions passed to these methods contains user-supplied input,\
    \ an adversary could attempt to execute arbitrary\n\n  JavaScript\n\n  code. This\
    \ could lead to a full system compromise in Node applications or Cross-site Scripting\n\
    \n  (XSS) in web applications.\n\n\n  To remediate this issue, remove all calls\
    \ to above methods and consider alternative methods for\n\n  executing\n\n  the\
    \ necessary business logic. There is almost no safe method of calling `eval` or\
    \ other above stated sinks with\n\n  user-supplied input.\n\n  Instead, consider\
    \ alternative methods such as using property accessors to dynamically access\n\
    \n  values.\n\n\n  Example using property accessors to dynamically access an object's\
    \ property:\n\n  ```\n\n  // Define an object\n\n  const obj = {key1: 'value1',\
    \ key2: 'value2'};\n\n  // Get key dynamically from user input\n\n  const key\
    \ = getUserInput();\n\n  // Check if the key exists in our object and return it,\
    \ or a default empty string\n\n  const value = (obj.hasOwnProperty(key)) ? obj[key]\
    \ : '';\n\n  // Work with the value\n\n  ```\n\n\n  For more information on why\
    \ not to use `eval`, and alternatives see:\n\n  - https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/eval#never_use_eval!\n\
    \n  Other References:\n\n  - https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Function/Function\n\
    \n  - https://developer.mozilla.org/en-US/docs/Web/API/setTimeout\n\n  - https://developer.mozilla.org/en-US/docs/Web/API/setInterval\n"
  metadata:
    cwe: CWE-95
    shortDescription: Improper neutralization of directives in dynamically evaluated
      code ('Eval Injection')
    category: security
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    source-rule-url: https://github.com/nodesecurity/eslint-plugin-security/blob/master/rules/detect-eval-with-expression.js
    security-severity: High
- id: javascript_random_rule-pseudo-random-bytes
  languages:
  - javascript
  - typescript
  pattern: crypto.pseudoRandomBytes
  severity: WARNING
  message: 'Depending on the context, generating weak random numbers may expose cryptographic
    functions,

    which rely on these numbers, to be exploitable. When generating numbers for sensitive
    values

    such as tokens, nonces, and cryptographic keys, it is recommended that the `randomBytes`
    method

    of the `crypto` module be used instead of `pseudoRandomBytes`.


    Example using `randomBytes`:

    ```

    // Generate 256 bytes of random data

    const randomBytes = crypto.randomBytes(256);

    ```


    For more information on JavaScript Cryptography see:

    https://nodejs.org/api/crypto.html#cryptorandombytessize-callback

    '
  metadata:
    cwe: CWE-338
    shortDescription: Use of cryptographically weak pseudo-random number generator
      (PRNG)
    category: security
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    source-rule-url: https://github.com/nodesecurity/eslint-plugin-security/blob/master/rules/detect-pseudoRandomBytes.js
    security-severity: Medium
- id: javascript_react_rule-dangerouslysetinnerhtml
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: '<$X dangerouslySetInnerHTML=... />

      '
  - pattern: '{dangerouslySetInnerHTML: ...}

      '
  severity: WARNING
  message: 'The application was found calling `dangerouslySetInnerHTML` which may
    lead to Cross Site

    Scripting (XSS). By default, React components will encode the data properly before
    rendering.

    Calling `dangerouslySetInnerHTML` disables this encoding and allows raw markup

    and JavaScript to be executed.


    XSS is an attack which exploits a web application or system to treat

    user input as markup or script code. It is important to encode the data, depending
    on the

    specific context it is used in. There are at least six context types:


    - Inside HTML tags `<div>context 1</div>`

    - Inside attributes: `<div class="context 2"></div>`

    - Inside event attributes `<button onclick="context 3">button</button>`

    - Inside script blocks: `<script>var x = "context 4"</script>`

    - Unsafe element HTML assignment: `element.innerHTML = "context 5"`

    - Inside URLs: `<iframe src="context 6"></iframe><a href="context 6">link</a>`


    Script blocks alone have multiple ways they need to be encoded. Extra care must
    be taken if

    user input

    is ever output inside of script tags.


    User input that is displayed within the application must be encoded, sanitized
    or validated

    to ensure it cannot be treated as HTML or executed as Javascript code. Care must
    also be

    taken

    to not mix server-side templating with client-side templating, as the server-side
    templating

    will

    not encode things like {{ 7*7 }} which may execute client-side templating features.


    It is _NOT_ advised to encode user input prior to inserting into a data store.
    The data will

    need to be

    encoded depending on context of where it is output. It is much safer to force
    the displaying

    system to

    handle the encoding and not attempt to guess how it should be encoded.


    Remove the call to `dangerouslySetInnerHTML` or ensure that the data used in this
    call does

    not come from user-supplied input.


    For more information on dangerously setting inner HTML see:

    - https://react.dev/reference/react-dom/components/common#dangerously-setting-the-inner-html

    '
  metadata:
    cwe: CWE-79
    owasp:
    - A7:2017-Cross-Site Scripting (XSS)
    - A03:2021-Injection
    shortDescription: Improper neutralization of input during web page generation
      ('Cross-site Scripting')
    category: security
    security-severity: Medium
