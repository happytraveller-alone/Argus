- id: java_xss_rule-WicketXSS
  languages:
  - java
  patterns:
  - pattern-inside: 'import org.apache.wicket.$A;

      ...

      '
  - pattern: '$OBJ.setEscapeModelStrings(false);

      '
  message: "The application is disabling Wicket's string escaping functionality by\
    \ calling\n`setEscapeModelStrings(false)`.\nThis could lead to Cross Site Scripting\
    \ (XSS) if used with user-supplied input. XSS is an\nattack which exploits\n a\
    \ web application or system to treat    user input\nas markup or script code.\
    \ It is important to encode the data depending on the specific context\nit\nis\
    \ used in. There are at least six context types:\n\n- Inside HTML tags `<div>context\
    \ 1</div>`\n- Inside attributes: `<div class=\"context 2\"></div>`\n- Inside event\
    \ attributes `<button onclick=\"context 3\">button</button>`\n- Inside script\
    \ blocks: `<script>var x = \"context 4\"</script>`\n- Unsafe element HTML assignment:\
    \ `element.innerHTML = \"context 5\"`\n- Inside URLs: `<iframe src=\"context 6\"\
    ></iframe><a href=\"context 6\">link</a>`\n\nScript blocks alone have multiple\
    \ ways they need to be encoded. Extra care must be taken if\nuser input\nis ever\
    \ output inside of script tags.\n\nUser input that is displayed within the application\
    \ must be encoded, sanitized or validated\nto ensure it cannot be treated as HTML\
    \ or executed as JavaScript code. Care must also be\ntaken\nto not mix server-side\
    \ templating with client-side templating, as the server-side templating\nwill\n\
    not encode things like {{ 7*7 }} which may execute client-side templating features.\n\
    \nIt is _NOT_ advised to encode user input prior to inserting into a data store.\
    \ The data will\nneed to be\nencoded depending on context of where it is output.\
    \ It is much safer to force the displaying\nsystem to\nhandle the encoding and\
    \ not attempt to guess how it should be encoded.\n\nUse Wicket's built in escaping\
    \ feature by calling `Component.setEscapeModelStrings(true);`\n\nFor more information\
    \ on Wicket components see:\n- https://nightlies.apache.org/wicket/apidocs/9.x/org/apache/wicket/Component.html\n\
    \nFor more information on XSS see OWASP:\n- https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html\n"
  metadata:
    shortDescription: Improper neutralization of input during web page generation
      ('Cross-site Scripting')
    category: security
    cwe: CWE-79
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: Medium
