  message: "HTTP Response Splitting is a vulnerability where Carriage Return (CR `\\\
    r`) and Line Feed (LF\n`\\n`)\ncharacters are introduced into an HTTP header from\
    \ user-supplied input. By injecting the\n`\\r\\n`\ncharacter sequence, an adversary\
    \ could potentially modify how the response is interpreted by\nthe\nclient or\
    \ any down stream caching services. This could allow an adversary to poison the\
    \ cache\ndata or execute Cross-Site Scripting (XSS) attacks.\n\nSome Java application\
    \ servers such as [Apache Tomcat](https://tomcat.apache.org/) will\nautomatically\
    \ encode\ncharacters from being set in response headers as a space `0x20` character.\
    \ If your application\nserver does\nnot automatically provide this functionality,\
    \ user-supplied input that is used in header keys\nor values must be\nvalidated.\n\
    \nExample of validating headers to only allow valid characters:\n```\n// throws\
