- id: java_templateinjection_rule-TemplateInjection
  languages:
  - java
  message: 'The application may allow control over a template string. Providing user
    input directly in the

    template by

    dynamically creating template strings may allow an adversary to execute arbitrary
    Java code,

    including

    OS system commands.


    For Velocity, never call `evaluate` with user-supplied input in the template string.
    Use a

    `VelocityContext`

    object instead to data-bind user-supplied information as it will be treated as
    an underlying

    data type and not

    template code.


    Example using Apache Velocity''s `VelocityContext` and escape tools to pass in
    user-supplied

    data to a template:

    ```

    // Create a tool manager

    ToolManager manager = new ToolManager(true);

    // Create a context from the tool manager

    Context context = manager.createContext();

    // For demonstration purposes, alternatively configure from a properties file

    context.put("esc", new EscapeTool());

    // For demonstration purposes, create an output buffer

    StringWriter stringWriter = new StringWriter();

    // Get userInput

    String userInput = "potentially malicious data";

    // Use the context to pass in the userInput value

    context.put("userInput", userInput);

    // Pass in the context, the output buffer, a logtag (demo), and the template with
    userInput

    // making sure to escape it if in the context of HTML.

    Velocity.evaluate(context, stringWriter, "demo", "Hello $esc.html($userInput)");

    // Work with the output buffer

    // ...

    ```


    For other templating engines, please see your framework''s documentation.

    '
