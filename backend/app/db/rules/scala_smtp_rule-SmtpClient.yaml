- id: java_endpoint_rule-UnvalidatedRedirect
  languages:
  - java
  message: "Unvalidated redirects occur when an application redirects a user to a\n\
    destination URL specified by a user supplied parameter that is not validated.\n\
    Such vulnerabilities can be used to facilitate phishing attacks.\n\nTo avoid open\
    \ redirect vulnerabilities in Java, one effective strategy is to\nonly allow redirection\
    \ to URLs that are pre-defined in a safe list. This safe\nlist can be implemented\
    \ using a collection like a Map, List, or Dictionary,\nwhere you store all the\
    \ valid URLs or URL patterns. When a redirect request is\nmade, you can check\
    \ if the requested URL is in this safe list before proceeding \nwith the redirection.\
    \ For example:\n\n```\n  protected void doGet(HttpServletRequest request, HttpServletResponse\
    \ response) throws ServletException, IOException {\n      private List<String>\
    \ safeUrls = new ArrayList<>();\n      safeUrls.add(\"/home\");\n      safeUrls.add(\"\
    /user/profile\");\n      safeUrls.add(\"/dashboard\");\n      \n      String redirectUrl\
    \ = request.getParameter(\"url\");\n\n      if (safeUrls.contains(redirectUrl))\
    \ {\n          response.sendRedirect(redirectUrl);\n      } else {\n         \
    \ response.sendRedirect(\"/errorPage\");\n      }\n  }\"\n```  \n"
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: '$URL = ($X.servlet.http.HttpServletRequest $REQ).$M(...);

        '
    - metavariable-regex:
        metavariable: $M
        regex: (getParameter|getCookies|getHeader|getHeaders|getHeaderNames|getPathInfo|getPathTranslated|getContextPath|getQueryString|getRemoteUser|getRequestedSessionId|getRequestURI|getRequestURL|getServletPath|getParts|getPart|getReader)
  pattern-sinks:
