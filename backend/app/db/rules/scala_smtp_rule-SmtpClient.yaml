- id: csharp_csrf_rule-Csrf
  languages:
  - csharp
  patterns:
  - pattern: "[$HTTPMETHOD]\npublic $RET $FOO(...) {\n  ...\n}\n"
  - pattern-not: "[ValidateAntiForgeryToken]\npublic $RET $FOO(...) {\n  ...\n}\n"
  - pattern-not-inside: "[AutoValidateAntiforgeryToken]\nclass $CLASS{\n  ...\n}\n"
  - pattern-not-inside: "[ValidateAntiForgeryToken]\nclass $CLASS{\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $HTTPMETHOD
      regex: Http(Post|Delete|Patch|Put)
  message: 'The application failed to protect against Cross-Site Request Forgery (CSRF)

    due to not including the `[ValidateAntiForgeryToken]` attribute on an

    HTTP method handler that could change user state (usually in the form of POST
    or PUT

    methods).


    The vulnerability can be exploited by an adversary creating a link or form on
    a third

    party site and tricking an authenticated victim to access them.


    Add the `[ValidateAntiForgeryToken]` to all methods which take in user data and
    change

    user state (such as updating a database with a new value). This is especially
    true for

    functionality such as updating passwords or other security sensitive functions.


    Alternatively, applications can enable a global

    [AutoValidateAntiforgeryTokenAttribute](https://learn.microsoft.com/en-us/dotnet/api/microsoft.aspnetcore.mvc.autovalidateantiforgerytokenattribute)

    filter.


    For more information on ValidateAntiForgeryToken and other CSRF protections in
    .NET

    see the following URL:

    https://learn.microsoft.com/en-us/aspnet/core/security/anti-request-forgery


    Additionally, consider setting all session cookies to have the `SameSite=Strict`
    attribute.

    It should be noted that this may impact usability when sharing links across other
    mediums.

    It is recommended that a two cookie based approach is taken, as outlined in the

    [Top level

    navigations](https://datatracker.ietf.org/doc/html/draft-ietf-httpbis-rfc6265bis-08#section-8.8.2)

    section

    of the SameSite RFC.


    For more information on CSRF see OWASP''s guide:

    https://owasp.org/www-community/attacks/csrf

    '
  severity: WARNING
  metadata:
    shortDescription: Potential Cross-Site Request Forgery (CSRF)
    category: security
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    cwe: CWE-352
    security-severity: Medium
