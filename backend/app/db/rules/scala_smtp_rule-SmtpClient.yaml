          regex: ^System.Security.Cryptography.(SHA1|MD5)$
      - pattern: $HASH_CLASS.$METHOD();
  message: "Both MD5 and SHA1 hash algorithms have been found to be vulnerable to\
    \ producing collisions.\nThis means\nthat two different values, when hashed, can\
    \ lead to the same hash value. If the application is\ntrying\nto use these hash\
    \ methods for storing passwords, then it is recommended to switch to a\npassword\
    \ hashing\nalgorithm such as Argon2id or PBKDF2. Currently there is no vetted\
    \ Argon2id implementation for\nC# so\nit is recommended that PBKDF2 be used until\
    \ one is available.\n\nExample using PBKDF2 to generate and compare passwords:\n\
    ```\nconst int SaltSize = 24;\nconst int HashSize = 24;\n// number of pbkdf2 iterations,\
    \ Rfc2898DeriveBytes uses hmac-sha1\n// so set a high iteration count\nconst int\
    \ Iterations = 1_300_000;\nbyte[] salt = new byte[SaltSize];\nRandomNumberGenerator.Fill(salt);\n\
    \nRfc2898DeriveBytes pbkdf2 = new Rfc2898DeriveBytes(\"some password\", salt,\
    \ Iterations);\nbyte[] hashBytes = pbkdf2.GetBytes(HashSize);\n// Store salt and\
    \ hashedBytes in a data store such as database for authentication\nConsole.WriteLine(\"\
    Hash {0}\", BitConverter.ToString(hashBytes).Replace(\"-\", \"\"));\n// Do a constant\
    \ time comparison as to not leak data based on timing\nif (CryptographicOperations.FixedTimeEquals(hashBytes,\
    \ hashBytes)) {\n    Console.WriteLine(\"hashes are equal\");\n}\n```\nFor more\
    \ information on PBKDF2 see:\nhttps://learn.microsoft.com/en-us/dotnet/api/system.security.cryptography.rfc2898derivebytes\n\
    \nFor more information on secure password storage see OWASP:\nhttps://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html\n"
  severity: WARNING
  metadata:
    shortDescription: Use of a broken or risky cryptographic algorithm (SHA1/MD5)
    category: security
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    cwe: CWE-327
    security-severity: Medium
- id: csharp_crypto_rule-WeakCipherMode
  languages:
  - csharp
  patterns:
  - pattern-inside: 'using System.Security.Cryptography;

      ...

      '
  - metavariable-regex:
      metavariable: $CIPHER
      regex: ^(ECB|CBC|OFB|CFB|CTS)$
  - pattern: CipherMode.$CIPHER
  message: "Cryptographic algorithms provide many different modes of operation, only\
    \ some of which provide\nmessage integrity. Without message integrity it could\
    \ be possible for an adversary to attempt\nto tamper with the ciphertext which\
    \ could lead to compromising the encryption key. Newer\nalgorithms\napply message\
    \ integrity to validate ciphertext has not been tampered with.\n\nInstead of using\
    \ an algorithm that requires configuring a `CipherMode`, an algorithm\nthat has\
    \ built-in message integrity should be used. If using .NET Framework greater\n\
    than version 6.0 consider using `ChaCha20Poly1305` or `AES-256-GCM`.\n\nFor older\
    \ applications, `AES-256-GCM` is recommended, however it has many drawbacks:\n\
    - Slower than `ChaCha20Poly1305`.\n- Catastrophic failure if nonce values are\
    \ re-used.\n\nExample using `ChaCha20Poly1305`:\n```\n// Generate a random key\n\
    byte[] key = new byte[32];\nRandomNumberGenerator.Fill(key);\n\nChaCha20Poly1305\
    \ encryptor = new ChaCha20Poly1305(key);\n\n// Note nonce values _must_ be regenerated\
    \ every time they are used.\nvar nonce = new byte[12];\nRandomNumberGenerator.Fill(nonce);\n\
    \nbyte[] plainText = System.Text.Encoding.UTF8.GetBytes(\"Secret text to encrypt\"\
    );\nbyte[] cipherText = new byte[plainText.Length];\nvar authTag = new byte[16];\n\
    \nencryptor.Encrypt(nonce, plainText, cipherText, authTag);\nbyte[] output = new\
    \ byte[cipherText.Length];\nencryptor.Decrypt(nonce, cipherText, authTag, output);\n\
    Console.WriteLine(\"Output: {0}\", System.Text.Encoding.UTF8.GetString(output));\n\
    ```\n\nExample using `AES-256-GCM`:\n```\nvar plaintextBytes = Encoding.UTF8.GetBytes(\"\
    Secret text to encrypt\");\nvar key = new byte[32];\nRandomNumberGenerator.Fill(key);\n\
    \nusing var aes = new AesGcm(key);\nvar nonce = new byte[AesGcm.NonceByteSizes.MaxSize];\n\
    RandomNumberGenerator.Fill(nonce);\n\nvar cipherText = new byte[plaintextBytes.Length];\n\
    var tag = new byte[AesGcm.TagByteSizes.MaxSize];\n\naes.Encrypt(nonce, plaintextBytes,\
    \ cipherText, tag);\n\n// Decrypt\nusing (var decrypt = new AesGcm(key))\n{\n\
    \    var decryptedBytes = new byte[cipherText.Length];\n\n    decrypt.Decrypt(nonce,\
    \ cipherText, tag, decryptedBytes);\n\n    Console.WriteLine(\"Decrypted: {0}\"\
    ,  Encoding.UTF8.GetString(decryptedBytes));\n}\n```\n"
  severity: WARNING
  metadata:
    shortDescription: Use of a broken or risky cryptographic algorithm
    category: security
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    cwe: CWE-327
    security-severity: Medium
- id: csharp_crypto_rule-WeakRNG
  languages:
  - csharp
  patterns:
  - pattern: (Random $RNG).$METHOD(...);
  - focus-metavariable: $RNG
  message: 'Depending on the context, generating weak random numbers may expose cryptographic
    functions

    which rely on these numbers to be exploitable. When generating numbers for sensitive
    values

    such as tokens, nonces, and cryptographic keys, it is recommended that the

    `RandomNumberGenerator` class be used.


    Example `RandomNumberGenerator` usage:

    ```

    Int32 randInt = RandomNumberGenerator.GetInt32(32000);

    byte[] randomBytes = new byte[64];

    RandomNumberGenerator.Fill(randomBytes);

    Console.WriteLine("Random Int32: {0}", randInt);

    Console.WriteLine("Random Bytes: {0}", BitConverter.ToString(randomBytes).Replace("-",
    ""));

    ```


    For more information see:

    https://learn.microsoft.com/en-us/dotnet/api/system.security.cryptography.randomnumbergenerator

    '
  severity: WARNING
  metadata:
    shortDescription: Use of cryptographically weak Pseudo-Random Number Generator
      (PRNG)
    category: security
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    cwe: CWE-338
    security-severity: Medium
- id: csharp_crypto_rule-WeakCipherAlgorithm
  patterns:
  - pattern-inside: 'using System.Security.Cryptography;

      ...

      '
  - pattern-either:
    - pattern-regex: .*DES\.Create\(\);
    - pattern: new DESCryptoServiceProvider();
    - pattern-regex: .*TripleDES\.Create\(\);
    - pattern: new TripleDESCryptoServiceProvider();
    - pattern-regex: .*RC2\.Create\(\);
    - pattern: new RC2CryptoServiceProvider();
  message: "DES, TripleDES and RC2 are all considered broken or insecure cryptographic\
    \ algorithms.\nIf using .NET Framework greater than version 6.0 consider using\
    \ `ChaCha20Poly1305`\ninstead as it is easier and faster than the alternatives\
    \ such as `AES-256-GCM`.\n\nFor older applications, `AES-256-GCM` is recommended,\
    \ however it has many drawbacks:\n- Slower than `ChaCha20Poly1305`.\n- Catastrophic\
    \ failure if nonce values are reused.\n\nExample using `ChaCha20Poly1305`:\n```\n\
    // Generate a random key\nbyte[] key = new byte[32];\nRandomNumberGenerator.Fill(key);\n\
    \n// Note nonce values _must_ be regenerated every time they are used.\nbyte[]\
    \ nonce = new byte[12];\nRandomNumberGenerator.Fill(nonce);\n\nbyte[] authTag\
    \ = new byte[16];\nbyte[] cipherText;\n\nusing (ChaCha20Poly1305 encryptor = new\
    \ ChaCha20Poly1305(key))\n{\n    byte[] plainText = System.Text.Encoding.UTF8.GetBytes(\"\
    Secret text to encrypt\");\n    cipherText = new byte[plainText.Length];\n   \
    \ encryptor.Encrypt(nonce, plainText, cipherText, authTag);\n}\n\nusing (ChaCha20Poly1305\
    \ decryptor = new ChaCha20Poly1305(key))\n{\n    byte[] output = new byte[cipherText.Length];\n\
    \    decryptor.Decrypt(nonce, cipherText, authTag, output);\n    Console.WriteLine(\"\
    Output: {0}\", System.Text.Encoding.UTF8.GetString(output));\n}\n```\n\nExample\
    \ using `AES-256-GCM`:\n```\n// Generate a random key\nbyte[] key = new byte[32];\n\
    RandomNumberGenerator.Fill(key);\n\n// Note nonce values _must_ be regenerated\
    \ every time they are used.\nbyte[] nonce = new byte[AesGcm.NonceByteSizes.MaxSize];\n\
    RandomNumberGenerator.Fill(nonce);\n\nbyte[] authTag = new byte[AesGcm.TagByteSizes.MaxSize];\n\
    byte[] cipherText;\n\nusing (AesGcm encryptor = new AesGcm(key))\n{\n    byte[]\
    \ plainText = Encoding.UTF8.GetBytes(\"Secret text to encrypt\");\n    cipherText\
    \ = new byte[plainText.Length];\n    encryptor.Encrypt(nonce, plainText, cipherText,\
    \ authTag);\n}\n\nusing (AesGcm decryptor = new AesGcm(key))\n{\n    byte[] output\
    \ = new byte[cipherText.Length];\n    decryptor.Decrypt(nonce, cipherText, authTag,\
    \ output);\n    Console.WriteLine(\"Output: {0}\",  Encoding.UTF8.GetString(output));\n\
    }\n```\n"
  languages:
  - csharp
  severity: WARNING
  metadata:
    shortDescription: Use of a broken or risky cryptographic algorithm
    category: security
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    cwe: CWE-327
