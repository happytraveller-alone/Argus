rules:
- id: go_crypto_rule-tlsversion
  languages:
  - go
  pattern-either:
  - patterns:
    - pattern-either:
      - patterns:
        - pattern-inside: 'tls.Config{...}

            '
        - pattern: 'MinVersion: $VAL

            '
      - patterns:
        - pattern-inside: '$VAR = uint16($VAL)

            ...

            '
        - pattern-inside: 'tls.Config{...}

            '
        - pattern: 'MinVersion: $VAR

            '
    - metavariable-pattern:
        metavariable: $VAL
        pattern-either:
        - pattern: tls.VersionTLS11
        - pattern: tls.VersionTLS10
  - patterns:
    - pattern-inside: 'tls.Config{...}

        '
    - pattern: 'MaxVersion: $ANYVAL

        '
    - pattern-not-inside: 'tls.Config{..., MinVersion: ..., ...}

        '
  message: "TLS versions 1.1 and 1.0 were deprecated by the IETF in June 2018 due\
    \ to \na number of attacks against the vulnerable versions. Use of a deprecated\
    \ \nTLS version may result in the unauthorized retrieval of sensitive \ninformation.\
    \ It is strongly recommended that all TLS connections\nuse TLS 1.3 as Go will\
    \ automatically choose the most secure cipher when \nnegotiating the TLS handshake\
    \ with client or servers. TLS 1.3 cipher suites \nare configured to require Perfect\
    \ Forward Secrecy (PFS). PFS is an important \nproperty as it will ensure that\
    \ past encrypted transmissions could not be\ndecrypted if the TLS certificate\
    \ was compromised.\n\nExample using TLS 1.3 for a Go server:\n```\ncert, err :=\
    \ tls.LoadX509KeyPair(\"server.crt\", \"server.key\")\nif err != nil {\n  log.Fatal(err)\n\
    }\n\ncfg := &tls.Config{Certificates: []tls.Certificate{cert}, \n            \
    \      MinVersion: tls.VersionTLS13}\n\nsrv := &http.Server{\n  Addr:        \
    \ \":8999\",\n  TLSConfig:    cfg,\n  ReadTimeout:  time.Minute,\n  WriteTimeout:\
    \ time.Minute,\n}\nlog.Fatal(srv.ListenAndServeTLS(\"cert.pem\", \"key.pem\"))\n\
    ```\n"
  metadata:
    shortDescription: Use of deprecated TLS version
    cwe: CWE-310
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    security-severity: Medium
    category: security
  severity: WARNING
- id: go_crypto_rule-badtlssettings
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'tls.Config{..., CipherSuites: []$SLICE{..., $CIPHERS, ...}, ...}

        '
    - pattern: 'tls.CipherSuite{..., ID: $CIPHERS, ...}

        '
  - metavariable-regex:
      metavariable: $CIPHERS
      regex: ((?!tls.TLS_AES_128_GCM_SHA256)|(?!tls.TLS_AES_256_GCM_SHA384)|(?!tls.TLS_CHACHA20_POLY1305_SHA256)|
        (?!tls.TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256)|(?!tls.TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256)|
        (?!tls.TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384)|(?!tls.TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384)|
        (?!tls.TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305)|(?!tls.TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256)|
        (?!tls.TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305)|(?!tls.TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256)|
        (?!tls.TLS_DHE_RSA_WITH_AES_128_GCM_SHA256)|(?!tls.TLS_DHE_RSA_WITH_AES_256_GCM_SHA384))
  message: "Usage of a cryptographically insecure cipher suite has been detected.\
    \ It is recommended that\nalternative ciphers be used instead. It is strongly\
    \ recommended that all TLS connections\nuse TLS 1.3 as Go will automatically choose\
    \ the most secure cipher when negotiating the\nTLS handshake with client or servers.\
    \ TLS 1.3 cipher suites are configured to require Perfect\nForward Secrecy (PFS).\n\
    PFS is an important property as it will ensure that past encrypted transmissions\
    \ could not be\ndecrypted\nif the TLS certificate was compromised.\n\nExample\
    \ using TLS 1.3 for a Go server:\n```\ncert, err := tls.LoadX509KeyPair(\"server.crt\"\
    , \"server.key\")\nif err != nil {\n  log.Fatal(err)\n}\n\ncfg := &tls.Config{Certificates:\
    \ []tls.Certificate{cert}, MinVersion: tls.VersionTLS13}\nsrv := &http.Server{\n\
    \  Addr:         \":8999\",\n  TLSConfig:    cfg,\n  ReadTimeout:  time.Minute,\n\
    \  WriteTimeout: time.Minute,\n}\nlog.Fatal(srv.ListenAndServeTLS(\"\", \"\"))\n\
    ```\n\nIf TLS 1.0-1.2 must be used, then the following list of ciphers should\
    \ be chosen as they\nsupport\nPerfect Forward Secrecy (PFS):\n\n- TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384\n\
    - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256\n- TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256\n\
    - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384\n- TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305\n\
    - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305\n\n\nExample `tls.Config` using the recommended\
    \ cipher suites:\n```\ncfg := &tls.Config{\n    MinVersion: tls.VersionTLS12,\n\
    \    CipherSuites: []uint16{\n        tls.TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,\n\
    \        tls.TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,\n        tls.TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,\n\
    \        tls.TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,\n        tls.TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305,\n\
    \        tls.TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305,\n    },\n}\n```\n\nFor more\
    \ information on cipher suites in Go see: https://go.dev/blog/tls-cipher-suites\n"
  metadata:
    shortDescription: Use of a broken or risky cryptographic algorithm
    cwe: CWE-327
    category: security
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    security-severity: Medium
  severity: WARNING
- id: go_crypto_rule-weakkeystrength
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'rsa.GenerateKey(..., $ARG)

        '
  - metavariable-comparison:
      metavariable: $ARG
      comparison: $ARG < 2048
  message: "The application is generating an RSA key that is less than the recommended\
    \ 2048 bits.\nThe National Institute of Standards and Technology (NIST) deprecated\
    \ signing Digital\nCertificates that contained RSA Public Keys of 1024 bits in\
    \ December 2010. While\n1024-bit RSA keys have not been factored yet, advances\
    \ in compute may make it possible\nin the near future.\n\nTo generate an RSA key\
    \ of 2048 pass the number of bits as the second parameter to\nthe `rsa.GenerateKey`\
    \ function:\n```\nimport (\n  \"crypto/rand\"\n  \"crypto/rsa\"\n)\n\nfunc generate()\
    \ {\n  key, err := rsa.GenerateKey(rand.Reader, 2048)\n  if err != nil {\n   \
    \ log.Fatal(err)\n  }\n}\n```\n"
  metadata:
    shortDescription: Inadequate encryption strength
    cwe: CWE-326
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    security-severity: Medium
    category: security
  severity: WARNING
- id: go_crypto_rule-weakrandsource
  languages:
  - go
  patterns:
  - patterns:
    - pattern-inside: 'import $IMPORT "math/rand"

        ...

        '
    - pattern-not-inside: 'import "crypto/rand"

        '
    - pattern-either:
      - pattern: $IMPORT.$METHOD(...)
      - pattern: rand.$METHOD(...)
  - metavariable-regex:
      metavariable: $METHOD
      regex: (Float32|Float64|Int31|Int31n|Int63|Int63n|NormalFloat64|Uint32|Uint64)
  message: 'Go''s `math/rand` is not meant for use in generating random numbers for
    any cryptographic or

    security sensitive context. This includes generating random numbers that could
    be used in

    user specific identifiers or where the random number that is generated is considered
    to

    be secret.


    Replace all imports of `math/rand` with `crypto/rand`.

    '
  metadata:
    shortDescription: Use of cryptographically weak Pseudo-Random Number Generator
      (PRNG)
    cwe: CWE-338
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    security-severity: Medium
    category: security
  severity: WARNING
- id: go_crypto_rule-insecure-ignore-host-key
  languages:
  - go
  patterns:
  - pattern: ssh.InsecureIgnoreHostKey(...)
  message: "The application was found to ignore host keys. Host keys are important\
    \ as\nthey provide assurance that the client can prove that the host is trusted.\n\
    By ignoring these host keys, it is impossible for the client to validate the\n\
    connection is to a trusted host.\n\nFor the `ssh.ClientConfig` `HostKeyCallback`\
    \ property, consider using the\n[knownhosts](https://pkg.go.dev/golang.org/x/crypto/ssh/knownhosts)\
    \ package that\nparses OpenSSH's `known_hosts` key database.\n\nExample configuration\
    \ connecting to a known, trusted host:\n```\nknownHostCallback, err := knownhosts.New(\"\
    /home/user/.ssh/known_hosts\")\nif err != nil {\n  log.Fatal(err)\n}\n\n// Create\
    \ client config using the knownHost callback function\nconfig := &ssh.ClientConfig{\n\
    \  ...\n  HostKeyCallback: knownHostCallback,\n}\n\n// Connect to ssh server\n\
    conn, err := ssh.Dial(\"tcp\", \"localhost:22\", config)\nif err != nil {\n  log.Fatal(\"\
    unable to connect: \", err)\n}\ndefer conn.Close()\n```\n"
  metadata:
    shortDescription: Key exchange without entity authentication
    cwe: CWE-322
    owasp:
    - A2:2017-Broken Authentication
    - A07:2021-Identification and Authentication Failures
    security-severity: Medium
    category: security
  severity: WARNING
- id: go_memory_rule-integer-overflow
  languages:
  - go
  patterns:
  - pattern-either:
    - patterns:
      - pattern-inside: '$X, ... := strconv.Atoi(...)

          ...

          '
      - pattern-either:
        - pattern: int32($X)
        - pattern: int16($X)
  message: "Golang's `int` type size depends on the architecture of where the application\
    \ is running. For\n32-bit systems, `int` is\n32-bit, for 64-bit systems, `int`\
    \ will be 64-bit. By calling `strconv.Atoi` with a large\nnumber, the integer\
    \ may overflow\nif the `int` return value is type converted into a smaller type\
    \ (`int32` or `int16`). This\ncould cause unexpected application\nbehavior depending\
    \ on how the resultant value is used.\n\nPrior to running any type conversion,\
    \ check that the value returned from `strconv.Atoi` will\nfit in the resulting\
    \ integer.\n\nExample of checking the return value before type conversion:\n```\n\
    bigValue, _ := strconv.Atoi(\"32768\")\nif bigValue > math.MaxInt16 {\n  log.Fatal(\"\
    value too large to fit in int16\")\n}\nvalue := int16(bigValue)\nfmt.Println(value)\n\
    ```\n\nFor more information on integer min/max constants see: https://pkg.go.dev/math#pkg-constants\n"
  metadata:
    shortDescription: Integer overflow or wraparound
    cwe: CWE-190
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: Medium
    category: security
  severity: ERROR
- id: go_memory_rule-memoryaliasing
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "for ..., $ARG := range $SLICE {\n  <... &($ARG) ...>\n}\n"
    - pattern: "for ..., $ARG := range $SLICE {\n  <... func() { <... &$ARG ...> }\
        \ ...>\n}\n"
    - pattern: "for ..., $ARG := range $SLICE {\n  <... $X(..., <... &$ARG ...>, ...)\
        \ ...>\n}\n"
  - pattern-not: "for ..., $ARG := range $SLICE {\n  <... *$ARG ...>\n}\n"
  - pattern-not-inside: for ..., $ARG := range $SLICE { return ... }
  message: "Go's `for ... range` statements create an iteration variable for each\
    \ iteration of the loop.\nBy taking the address of this iteration variable, the\
    \ value of the address will be re-used\nand always point to the same location\
    \ in memory. This can have unexpected behavior if the\naddress is stored or re-used.\n\
    \nThis can be fixed by:\n- Not referencing the address of the variable\n- Re-assigning\
    \ the iteration variable to a new variable\n- Using the address of the indexed\
    \ variable\n\nExample not referencing the address:\n```\ntype someStruct struct\
    \ {\n  x int\n}\n\nfor _, n := range []someStruct{{1}, {2}, {3}, {4}} {\n  fmt.Printf(\"\
    %d\\n\", n.x)\n}\n```\n\nExample reassigning the iteration variable to a new variable:\n\
    ```\ntype someStruct struct {\n  x int\n}\n\nfor _, n := range []someStruct{{1},\
    \ {2}, {3}, {4}} {\n  p := n\n  fmt.Printf(\"%p\\n\", &p)\n}\n```\n\nExample using\
    \ the address of the indexed variable:\n```\ntype someStruct struct {\n  x int\n\
    }\n\nstructData := []someStruct{{1}, {2}, {3}, {4}}\nfor idx := range structData\
    \ {\n  fmt.Printf(\"%p\\n\", &structData[idx])\n}\n```\n\nFor more information\
    \ on how the `for ... range` statement works see:\nhttps://go.dev/ref/spec#For_statements\n"
  metadata:
    shortDescription: Incorrect access of indexable resource ('Range Error')
    cwe: CWE-118
    owasp:
    - A6:2017-Security Misconfiguration
    - A05:2021-Security Misconfiguration
    security-severity: Info
    category: security
  severity: WARNING
- id: go_network_rule-bind-to-all-interfaces
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: net.Listen(..., "$ADDR")
    - pattern: tls.Listen(..., "$ADDR", ...)
  - metavariable-regex:
      metavariable: $ADDR
      regex: ^(0\.0\.0\.0|\[::\])?(:[0-9]*)?$
  message: "Binding to all network interfaces can potentially open up a service to\n\
    traffic on unintended interfaces, that may not be properly documented or\nsecured.\
    \ By passing \"0.0.0.0\" as the address to the `Listen` family of functions,\n\
    the application will bind to all interfaces.\n\nConsider passing in the interface\
    \ ip address through an environment variable,\nconfiguration file, or by determining\
    \ the primary interface(s) IP address.\n\nExample getting the IP address from\
    \ an environment variable `IP_ADDRESS`:\n```\naddr := os.Getenv(\"IP_ADDRESS\"\
    )\nlistener, err := net.Listen(\"tcp\", addr)\nif err != nil {\n  log.Fatal(err)\n\
    }\n```\n"
  metadata:
    shortDescription: Exposure of sensitive information to an unauthorized actor
    cwe: CWE-200
    owasp:
    - A6:2017-Security Misconfiguration
    - A05:2021-Security Misconfiguration
    security-severity: Low
    category: security
  severity: WARNING
- id: go_filesystem_rule-decompression-bomb
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: gzip.NewReader(...)
  - pattern: zlib.NewReader(...)
  - pattern: bzip2.NewReader(...)
  - pattern: flate.NewReader(...)
  - pattern: lzw.NewReader(...)
  - pattern: tar.NewReader(...)
  - pattern: zip.NewReader(...)
  - pattern: zlib.NewReaderDict(...)
  - pattern: flate.NewReaderDict(...)
  - pattern: zip.OpenReader(...)
  pattern-sanitizers:
  - patterns:
    - pattern: io.LimitReader($TAINTED, ...)
    - focus-metavariable: $TAINTED
  pattern-sinks:
  - patterns:
    - pattern: io.Copy($DST, $TAINTED)
    - focus-metavariable: $TAINTED
  - patterns:
    - pattern: io.CopyBuffer($DST, $TAINTED, $BUF)
    - focus-metavariable: $TAINTED
  message: "Directly decompressing files or buffers may lead to a potential Denial\
    \ of Service (DoS)\ndue to a decompression bomb. Decompression bombs are maliciously\
    \ compressed files\nor data that decompresses to extremely large sizes. This can\
    \ cause the process to run\nout of memory, or the disk to fill up.\n\nTo protect\
    \ against decompression bombs, an\n[io.LimitReader(...)](https://pkg.go.dev/io#LimitReader)\n\
    should be used to limit how much can be read during the decompression routine.\n\
    \nExample using `io.LimitReader` to protect against a decompression bomb:\n```\n\
    f, err := os.Open(\"some.gz\")\nif err != nil {\n  log.Fatal(err)\n}\n\nr, err\
    \ := gzip.NewReader(f)\nif err != nil {\n  log.Fatal(err)\n}\n\nconst oneMegabyte\
    \ = 1024 * 1024\nlimitedReader := io.LimitReader(r, oneMegabyte)\n\n// use limitedReader\
    \ to stop copying after 1 MB\nif _, err := io.Copy(os.Stdout, limitedReader);\
    \ err != nil {\n  log.Fatal(err)\n}\n```\n"
  metadata:
    shortDescription: Improper handling of highly compressed data
    cwe: CWE-409
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: Medium
    category: security
  severity: WARNING
- id: go_filesystem_rule-httprootdir
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'import $NET "net/http"

        ...

        $NET.Dir("/")

        '
    - pattern: 'import "net/http"

        ...

        http.Dir("/")

        '
  message: 'The application is potentially exposing the entire filesystem by mounting
    the root

    directory `/` to an HTTP handler function. Anyone who is able to access this HTTP

    server may be able to access any file that the HTTP server has access to.


    Restrict the `http.Dir` path to only a specific folder instead of the entire

    filesystem.


    Example server only allowing directory listing on a public directory:

    ```

    const path = "/var/www/html/public"

    fs := http.FileServer(http.Dir(path))

    log.Fatal(http.ListenAndServe(":9000", fs))

    ```

    '
  metadata:
    shortDescription: Files or directories accessible to external parties
    cwe: CWE-552
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    security-severity: Medium
    category: security
  severity: WARNING
- id: go_filesystem_rule-tempfiles
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'os.WriteFile("$ARG", ...)

        '
    - pattern: 'ioutil.WriteFile("$ARG", ...)

        '
    - pattern: 'os.OpenFile("$ARG", <... os.O_CREATE ...>, ...)

        '
    - pattern: 'os.Create("$ARG")

        '
  - metavariable-regex:
      metavariable: $ARG
      regex: (/tmp/.*|/var/tmp/.*)
  message: "The application was found creating files in shared system temporary directories\n\
    (`/tmp` or `/var/tmp`) without using the `os.CreateTemp` function. Depending\n\
    on how the application uses this temporary file, an attacker may be able to create\n\
    symlinks that point to other files prior to the application creating or writing\n\
    to the target file, leading to unintended files being created or overwritten.\n\
    \nExample using `os.CreateTemp` in an application restricted directory:\n```\n\
    // assumes /opt/appdir/ is chown'd to the running application user\nif err :=\
    \ os.MkdirAll(\"/opt/appdir/restricted\", 0700); err != nil {\n  log.Fatal(err)\n\
    }\n\n// create a temporary file in the restricted directory in the form of temp-952569059.txt\n\
    f, err := os.CreateTemp(\"/opt/appdir/restricted\", \"temp-*.txt\")\nif err !=\
    \ nil {\n  log.Fatal(err)\n}\n\ndefer f.Close()\n// clean up on exit\ndefer os.Remove(f.Name())\n\
    // work with file\n```\n"
  metadata:
    shortDescription: Creation of temporary file with insecure permissions
    cwe: CWE-378
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    security-severity: Medium
    category: security
  severity: WARNING
- id: go_filesystem_rule-poorwritepermissions
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'ioutil.WriteFile(..., ..., $ARG)

        '
  - metavariable-comparison:
      metavariable: $ARG
      comparison: $ARG > 0o600
      base: 8
  message: "The application was found setting file permissions to overly permissive\
    \ values. Consider\nusing the following values if the application user is the\
    \ only process to access\nthe file:\n\n- 0400 - read only access to the file\n\
    - 0200 - write only access to the file\n- 0600 - read/write access to the file\n\
    \nExample writing file contents with read/write permissions for the application\
    \ user:\n```\ndat := []byte(\"sensitive data\")\nif err := os.WriteFile(\"file.txt\"\
    , dat, 0600); err != nil {\n  log.Fatal(err)\n}\n```\n\nFor all other values please\
    \ see:\nhttps://en.wikipedia.org/wiki/File-system_permissions#Numeric_notation\n"
  metadata:
    shortDescription: Incorrect default permissions
    cwe: CWE-276
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    security-severity: Medium
    category: security
  severity: WARNING
- id: go_filesystem_rule-fileread
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: os.Getenv(...)
  - pattern: fmt.Sprintf(...)
  - pattern: filepath.Join(...)
  - pattern: path.Join(...)
  - patterns:
    - pattern-either:
      - pattern: '... + $TAINTED'
      - pattern: '... + $TAINTED + ...'
      - pattern: $TAINTED + ...
    - pattern-not: '"..." + $TAINTED'
    - pattern-not: '"..." + $TAINTED + "..."'
    - pattern-not: $TAINTED + "..."
    - pattern-not: fmt.Sprintf("...", "...")
  - patterns:
    - pattern-either:
      - pattern: '($REQUEST : *http.Request).$SOURCE_METHOD

          '
      - pattern: '($REQUEST : http.Request).$SOURCE_METHOD

          '
    - metavariable-regex:
        metavariable: $SOURCE_METHOD
        regex: ^(BasicAuth|Body|Cookie|Cookies|Form|FormValue|GetBody|Host|MultipartReader|ParseForm|ParseMultipartForm|PostForm|PostFormValue|Referer|RequestURI|Trailer|TransferEncoding|UserAgent|URL)$
  pattern-sanitizers:
  - patterns:
    - pattern-either:
      - pattern: '$CLEAN := $PKG.Clean(...)

          ...

          if !strings.HasPrefix($CLEAN, "...") {...}

          '
      - pattern: '$CLEAN := $PKG.Clean(...)

          ...

          if strings.HasPrefix($CLEAN, "...") {...}

          '
      - pattern: '$CLEAN := $PKG.Clean(...)

          ...

          if strings.HasPrefix($CLEAN, "...") == false {...}

          '
    - metavariable-regex:
        metavariable: $PKG
        regex: ^((file)?path)$
  pattern-sinks:
  - pattern: os.OpenFile(...)
  - pattern: os.Open(...)
  - pattern: os.ReadFile(...)
  - pattern: ioutil.ReadFile(...)
  message: "The application dynamically constructs file or path information. If the\
    \ path\ninformation comes from user input, it could be abused to read sensitive\
    \ files,\naccess other users data or aid in exploitation to gain further system\
    \ access.\n\nUser input should never be used in constructing paths or files for\
    \ interacting\nwith the filesystem. This includes filenames supplied by user uploads\
    \ or downloads.\nIf possible, consider hashing user input or replacing it with\
    \ unique values.\nAdditionally, use `filepath.Base` to only use the filename and\
    \ not path information.\nAlways validate the full path prior to opening or writing\
    \ to any file.\n\nExample using `filepath.Base`, generating a unique filename\
    \ without using\nuser input to construct filepath information:\n```\ntype userData\
    \ struct {\n    id           string\n    userFilename string\n}\n\nfunc newUserData(userFilename\
    \ string) userData {\n    return userData{\n        id:           randomFileID(),\
    \ // random id as the filename\n        userFilename: userFilename,\n    }\n}\n\
    \n// randomFileID generates a random id, to be used as a filename\nfunc randomFileID()\
    \ string {\n    id := make([]byte, 16)\n    if _, err := io.ReadFull(rand.Reader,\
    \ id); err != nil {\n        log.Fatal(err)\n    }\n    return hex.EncodeToString(id)\n\
    }\n\nfunc main() {\n\n    // user input, saved only as a reference\n    data :=\
    \ newUserData(\"../../possibly/malicious\")\n\n    // restrict all file access\
    \ to this path\n    const basePath = \"/tmp/\"\n\n    // resolve the full path,\
    \ but only use our random generated id\n    resolvedPath, err := filepath.Join(basePath,\
    \ filepath.Base(data.id))\n    if err != nil {\n        log.Fatal(err)\n    }\n\
    \n    // verify the path is prefixed with our basePath\n    if !strings.HasPrefix(resolvedPath,\
    \ basePath) {\n        log.Fatal(\"path does not start with basePath\")\n    }\n\
    \    // process / work with file\n}\n```\n\nFor more information on path traversal\
    \ issues see OWASP:\nhttps://owasp.org/www-community/attacks/Path_Traversal\n"
  metadata:
    shortDescription: Improper limitation of a pathname to a restricted directory
      ('Path Traversal')
    cwe: CWE-22
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    security-severity: Medium
