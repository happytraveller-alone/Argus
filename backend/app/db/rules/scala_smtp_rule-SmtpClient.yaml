  - pattern: (javax.servlet.http.HttpServletRequest $REQ).getHeader(...);
  - pattern: (javax.servlet.http.HttpServletRequest $REQ).getPathInfo();
  message: "HTTP Response Splitting is a vulnerability where Carriage Return (CR `\\\
    r`) and Line Feed (LF\n`\\n`)\ncharacters are introduced into an HTTP header from\
    \ user-supplied input. By injecting the\n`\\r\\n`\ncharacter sequence, an adversary\
    \ could potentially modify how the response is interpreted by\nthe\nclient or\
    \ any downstream caching services. This could allow an adversary to poison the\
    \ cache\ndata or execute Cross-Site Scripting (XSS) attacks.\n\nSome Java application\
    \ servers such as [Apache Tomcat](https://tomcat.apache.org/) as of version\n\
    8.0, newer versions of Jetty and other servers that implement the [RFC 6265 Standard](https://datatracker.ietf.org/doc/html/rfc6265)\
    \ will\ndisallow `\\r' and '\\n` characters characters from being set in cookies.\
    \ If your application server does not\nautomatically provide this functionality,\
    \ user-supplied input that is used in cookie keys or\nvalues must be validated.\n\
    \nExample of validating cookies to only allow valid characters:\n```\n// throws\
    \ an IllegalArgumentException if the provided value contains invalid characters\n\
    public void validateRfc6265CookieValue(String value) throws IllegalArgumentException\
    \ {\n    char[] chars = value.toCharArray();\n\n    // iterate over every character\n\
    \    for (int i = 0; i < chars.length; i++) {\n        char c = chars[i];\n\n\
    \        // check for any characters below 0x21 as well as: '\"' ',' ';' '\\'\
    \ and 0x7f.\n        if (c < 0x21 || c == '\"' || c == ',' || c == ';' || c ==\
    \ '\\\\' || c == 0x7f) {\n            throw new IllegalArgumentException(\"Invalid\
    \ character in cookie detected:\n{0}\".format(Integer.toString(c)));\n       \
    \ }\n    }\n}\n```\n\nAlternatively, you could use a string escape package such\
    \ as\n[Apache Commons Text](https://commons.apache.org/proper/commons-text/) to\
    \ escape the input:\n```\npublic String escapeValue(String value) {\n  return\
    \ StringEscapeUtils.escapeJava(value);\n}\n```\n\nFor more information on response\
    \ splitting attacks see OWASP:\nhttps://owasp.org/www-community/attacks/HTTP_Response_Splitting\n"
  severity: WARNING
  metadata:
    shortDescription: Improper neutralization of CRLF sequences in HTTP headers ('HTTP
      Response Splitting')
    category: security
    cwe: CWE-113
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    technology:
    - java
    security-severity: High
