- id: java_smtp_rule-InsecureSmtp
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern-inside: '$E = new org.apache.commons.mail.SimpleEmail(...);

        ...

        '
    - pattern-inside: '$E = new org.apache.commons.mail.Email(...);

        ...

