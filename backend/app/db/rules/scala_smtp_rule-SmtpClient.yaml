        ...

        $S.bind(("0.0.0.0", ...))

        '
    - pattern: '$S = socket.socket(...)

        ...

        $S.bind(("::", ...))

        '
    - pattern: '$S = socket.socket(...)

        ...

        $S.bind(("", ...))

        '
