  message: "By using the `[ValidateInput(false)]` attribute in a controller\nclass,\
    \ the application will disable request validation for that\nmethod. This disables\
    \ ASP.NET from examining requests for injection\nattacks such as Cross-Site-Scripting\
    \ (XSS).\n\nIf possible, re-enable validation by using `ValidateInput(true)`.\n\
    In some cases this may not be possible, in which case ensure how the\nrequest\
    \ data used is validated and this method does not\noutput user input directly\
    \ into the view.\n\nFor more information on protecting ASP.NET Core applications\
    \ from XSS see:\nhttps://learn.microsoft.com/en-us/aspnet/core/security/cross-site-scripting\n\
    \nExample of enabling `ValidateInput` attribute:\n```\nclass ControllerClass\n\
    {\n    [ValidateInput(true)]\n    public void SomeActionMethod()\n    {\n    }\n\
    }\n```\n\nFor more information on ASP.NET request validation see OWASP:\nhttps://owasp.org/www-community/ASP-NET_Request_Validation\n"
  severity: WARNING
