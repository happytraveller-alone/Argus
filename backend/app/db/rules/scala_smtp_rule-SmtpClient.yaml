- id: go_filesystem_rule-ziparchive
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: zip.OpenReader(...)
  - pattern: tar.OpenReader(...)
  pattern-sanitizers:
  - patterns:
    - pattern-either:
      - pattern: '$CLEAN := $PKG.Clean(...)

          ...

          if !strings.HasPrefix($CLEAN, "...") {...}

          '
      - pattern: '$CLEAN := $PKG.Clean(...)

          ...

          if strings.HasPrefix($CLEAN, "...") {...}

          '
      - pattern: '$CLEAN := $PKG.Clean(...)

          ...

          if strings.HasPrefix($CLEAN, "...") == false {...}

          '
    - metavariable-regex:
        metavariable: $PKG
        regex: ^((file)?path)$
  pattern-sinks:
  - pattern: filepath.Join(...)
  message: "The application may be vulnerable to a path traversal if it extracts untrusted\
    \ archive files.\nThis vulnerability is colloquially known as 'Zip Slip'. Archive\
    \ files may contain folders\nwhich,\nwhen extracted, may write outside of the\
    \ intended directory. This is exploited by including\npath traversal characters\
    \ such as `../../other/directory` to overwrite or place files in system\nor application\
    \ directories.\n\nExtra care must be taken when extracting archive files as there\
    \ are numerous concerns:\n\n- Limit the size of the zip archive as it may contain\
    \ \"Zip Bombs\", files that extract to\nextremely\nlarge sizes.\n- If possible,\
    \ generate unique filenames instead of using the archives file names, as it may\
    \ be\npossible for users to overwrite files if the filenames are the same.\n-\
    \ Validate file paths are written with a prefixed, known trusted directory.\n\
    - Only process regular files and not symbolic links, as some applications may\
    \ attempt to\nread/follow\nthe symbolic link, leading to arbitrary file read /\
    \ write vulnerabilities.\n\n\nExample of securely processing an archive file:\n\
    ```\nr, err := zip.OpenReader(\"trusted.zip\")\nif err != nil {\n  log.Fatal(err)\n\
    }\n\n// Ensure archive contains only the expected number of files\nconst expectedFileCount\
    \ = 10\nif len(r.File) > expectedFileCount {\n  log.Fatalf(\"too many files in\
    \ archive: %d\\n\", len(r.File))\n}\n\n// One approach is to sum up all files\
    \ before attempting to process\n// them.\nconst totalAllowedSize = 1024 * 1024\
    \ * 10 // 10MB\nvar totalSize uint64\nfor _, f := range r.File {\n  totalSize\
    \ += f.UncompressedSize64\n}\n\nif totalSize > totalAllowedSize {\n  log.Fatalf(\"\
    archive exceeds total allowed size: %d\\n\", totalSize)\n}\n\n// configure a max\
    \ size per file allowed\nconst maxFileSize = 1024 * 1024 // 1 MB\n\n// set restricted\
    \ basePath\nconst basePath = \"/var/restricted/\"\n\n// iterate over the files\
    \ in the archive\nfor _, f := range r.File {\n\n  // Ensure uncompressed size\
    \ does not exceed our allowed file size\n  if f.UncompressedSize64 > maxFileSize\
    \ {\n    log.Printf(\"skipping file as it exceeds maxFileSize: %s\\n\", f.Name)\n\
    \    continue\n  }\n\n  // Ensure file is a regular file and not a symbolic link\
    \ or has other mode type\n  // bits set\n  if !f.Mode().IsRegular() {\n    log.Printf(\"\
    skipping non regular file: %s\\n\", f.Name)\n    continue\n  }\n\n  // if possible\
    \ consider not using the name at all, but generating a random id instead.\n  //\
    \ If the filename must be used, extract the base name and not folder path information\n\
    \  name := filepath.Base(f.Name)\n\n  // Join the file name to the basePath.\n\
    \  resolvedPath, err := filepath.Join(basePath, name)\n  if err != nil {\n   \
    \ log.Fatal(err)\n  }\n\n  // Application must still verify the path is prefixed\
    \ by the basePath\n  if !strings.HasPrefix(resolvedPath, basePath) {\n    log.Fatal(\"\
    path does not start with basePath\")\n  }\n\n  // process / work with file\n}\n\
    ```\n\nIf the application must process directory names as well, use the following\
    \ code:\n```\n// Join the cleaned name to the basePath, note if 'name' starts\
    \ with `../../` it\n// will still allow for traversal, so you _must_ verify the\
    \ path prefix below\nresolvedPath := filepath.Join(basePath, filepath.Clean(name))\n\
    \n// Application must still verify the path is prefixed by the basePath\nif !strings.HasPrefix(resolvedPath,\
    \ basePath) {\n  log.Fatal(\"path does not start with basePath\")\n}\n\n// process\
    \ / work with file\n```\n"
  metadata:
    shortDescription: Improper limitation of a pathname to a restricted directory
      ('Path Traversal')
    cwe: CWE-22
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    security-severity: Medium
    category: security
  severity: WARNING
- id: go_subproc_rule-subproc
  languages:
  - go
  patterns:
  - pattern-either:
    - patterns:
      - pattern: exec.CommandContext($CTX, $EXE, ...)
      - pattern-not: exec.CommandContext($CTX, "...", ...)
    - patterns:
      - pattern: exec.Command($EXE, ...)
      - pattern-not: exec.Command("...", ...)
    - patterns:
      - pattern: syscall.ForkExec($EXE, ...)
      - pattern-not: syscall.ForkExec("...", ...)
    - patterns:
      - pattern: syscall.StartProcess($EXE, ...)
      - pattern-not: syscall.StartProcess("...", ...)
  message: "OS command injection is a critical vulnerability that can lead to a full\
    \ system\ncompromise as it may allow an adversary to pass in arbitrary commands\
    \ or arguments\nto be executed.\n\nUser input should never be used in constructing\
    \ commands or command arguments\nto functions which execute OS commands. This\
    \ includes filenames supplied by\nuser uploads or downloads.\n\nEnsure your application\
    \ does not:\n\n- Use user-supplied information in the process name to execute.\n\
    - Use user-supplied information in an OS command execution function which does\n\
    not escape shell meta-characters.\n- Use user-supplied information in arguments\
    \ to OS commands.\n\nThe application should have a hardcoded set of arguments\
    \ that are to be passed\nto OS commands. If filenames are being passed to these\
    \ functions, it is\nrecommended that a hash of the filename be used instead, or\
    \ some other unique\nidentifier. It is strongly recommended that a native library\
    \ that implements\nthe same functionality be used instead of using OS system commands,\
    \ due to the\nrisk of unknown attacks against third party commands.\n\nIf operating\
    \ in Windows environments, when specifying the OS command, ensure\nthe application\
    \ uses the full path\ninformation, otherwise the OS may attempt to look up which\
    \ process to execute\nand could be vulnerable to untrusted search path vulnerabilities\
    \ (CWE-426).\n\nExample of safely executing an OS command:\n```\nuserData := []byte(\"\
    user data\")\n// create a temporary file in the application specific directory\n\
    f, err := ioutil.TempFile(\"/var/app/restricted\", \"temp-*.dat\")\nif err !=\
    \ nil {\n  log.Fatal(err)\n}\n\nif _, err := f.Write(userData); err != nil {\n\
    \  log.Fatal(err)\n}\n\nif err := f.Close(); err != nil {\n  log.Fatal(err)\n\
    }\n\n// pass the full path to the binary and the name of the temporary file\n\
    // instead of any user supplied filename\nout, err := exec.Command(\"/bin/cat\"\
    , f.Name()).Output()\nif err != nil {\n  log.Fatal(err)\n}\n```\n\nFor more information\
    \ on OS command injection, see OWASP's guide:\nhttps://cheatsheetseries.owasp.org/cheatsheets/OS_Command_Injection_Defense_Cheat_Sheet.html\n"
  metadata:
    shortDescription: Improper neutralization of special elements used in an OS command
      ('OS Command Injection')
    cwe: CWE-78
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: High
    category: security
  severity: WARNING
- id: go_blocklist_rule-blocklist-rc4
  languages:
  - go
  patterns:
  - pattern: 'import "crypto/rc4"

      '
  message: "The RC4 stream-cipher has been cryptographically broken and is unsuitable\n\
    for use in production. It is recommended that ChaCha20 or Advanced Encryption\n\
    Standard (AES) be used instead. Consider using `XChaCha20Poly1305` or `AES-256-GCM`.\n\
    \nFor older applications, `AES-256-GCM` is recommended, however it has many drawbacks:\n\
    - Slower than `XChaCha20Poly1305`\n- Smaller nonce value size compared to `XChaCha20Poly1305`\n\
    - Catastrophic failure if nonce values are re-used\n\nExample using\n[XChaCha20Poly1305](https://pkg.go.dev/golang.org/x/crypto/chacha20poly1305#NewX):\n\
    ```\nkey := make([]byte, chacha20poly1305.KeySize)\nif _, err := io.ReadFull(rand.Reader,\
    \ key); err != nil {\n  log.Fatal(err)\n}\n\n// NewX is a variant that uses longer\
    \ nonce values for better security\naead, err := chacha20poly1305.NewX(key)\n\
    if err != nil {\n  log.Fatal(err)\n}\n\nvar encrypted = []byte{}\nvar nonce =\
    \ []byte{}\n\n// Encryption routine\n{\n  msg := []byte(\"Some secret message\"\
    )\n  nonce = make([]byte, aead.NonceSize())\n  if _, err := io.ReadFull(rand.Reader,\
    \ nonce); err != nil {\n    log.Fatal(\"failed to generate nonce\")\n  }\n\n \
    \ encrypted = aead.Seal(nil, nonce, msg, nil)\n}\n\n// Decryption routine\n{\n\
    \  if len(encrypted) < aead.NonceSize() {\n    log.Fatal(\"incorrect ciphertext\
    \ length\")\n  }\n\n  msg, err := aead.Open(nil, nonce, encrypted, nil)\n  if\
    \ err != nil {\n    log.Fatal(err)\n  }\n  fmt.Printf(\"Decrypted: %s\\n\", msg)\n\
    }\n```\n\nExample using [AES-256-GCM](https://pkg.go.dev/crypto/cipher#NewGCM):\n\
    ```\n// 32 byte keys will configure AES-256\nkey := make([]byte, 32)\nif _, err\
    \ := io.ReadFull(rand.Reader, key); err != nil {\n  log.Fatal(err)\n}\n\nblockCipher,\
    \ err := aes.NewCipher(key)\nif err != nil {\n  log.Fatal(err)\n}\n\naead, err\
    \ := cipher.NewGCM(blockCipher)\nif err != nil {\n  log.Fatal(err)\n}\n\nvar encrypted\
    \ = []byte{}\nvar nonce = []byte{}\n// Encryption routine\n{\n  msg := []byte(\"\
    Some secret message\")\n  // note that the key must be rotated every 2^32 random\
    \ nonces used otherwise\n  // cipher text could be repeated\n  nonce = make([]byte,\
    \ 12)\n  if _, err := io.ReadFull(rand.Reader, nonce); err != nil {\n    log.Fatal(err)\n\
    \  }\n  encrypted = aead.Seal(nil, nonce, msg, nil)\n}\n\n// Decryption routine\n\
    {\n  msg, err := aead.Open(nil, nonce, encrypted, nil)\n  if err != nil {\n  \
    \  log.Fatal(err)\n  }\n  fmt.Printf(\"Decrypted: %s\\n\", msg)\n}\n```\n"
  metadata:
    shortDescription: Use of a broken or risky cryptographic algorithm
    cwe: CWE-327
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    security-severity: Medium
    category: security
  severity: WARNING
- id: go_blocklist_rule-blocklist-sha1
  languages:
  - go
  patterns:
  - pattern: 'import "crypto/sha1"

      '
  message: "The SHA-1 message-digest algorithm has been cryptographically broken and\n\
    is unsuitable for further use. It is\nrecommended that the SHA-3, or BLAKE2 family\
    \ of algorithms be used for non-password based\ncryptographic hashes instead.\
    \ For password based cryptographic hashes, consider using the\nbcrypt or Argon2id\
    \ family of cryptographic hashes.\n\nHashing values using [BLAKE2](https://pkg.go.dev/golang.org/x/crypto/blake2b):\n\
    ```\nfileContents := []byte(\"some file contents to create hash for\")\nblake2bHasher,\
    \ err := blake2b.New512(nil)\nif err != nil {\n  log.Fatal(err)\n}\nhashedValue\
    \ := blake2bHasher.Sum(fileContents)\nfmt.Printf(\"%s\\n\", hex.EncodeToString(hashedValue))\n\
    ```\n\nHashing and securely comparing passwords using\n[Argon2id](https://pkg.go.dev/golang.org/x/crypto/argon2#hdr-Argon2id):\n\
    ```\ntype argonParameters struct {\n  variant     string\n  version     int\n\
    \  memory      uint32\n  iterations  uint32\n  parallelism uint8\n  saltLength\
    \  uint32\n  keyLength   uint32\n}\n\nfunc (a argonParameters) StringFormat(salt,\
    \ derivedKey []byte) string {\n  encodedSalt := base64.RawStdEncoding.EncodeToString(salt)\n\
    \  encodedKey := base64.RawStdEncoding.EncodeToString(derivedKey)\n\n  return\
    \ fmt.Sprintf(\"$argon2id$v=%d$m=%d,t=%d,p=%d$%s$%s\",\n    argon2.Version,\n\
    \    a.memory,\n    a.iterations,\n    a.parallelism,\n    encodedSalt,\n    encodedKey,\n\
    \  )\n}\n\nfunc main() {\n  // Initialize Argon2id parameters\n  p := argonParameters{\n\
    \    memory:      64 * 1024,\n    iterations:  3,\n    parallelism: 2,\n    saltLength:\
    \  16,\n    keyLength:   32,\n  }\n\n  // Generate random salt (to be stored alongside\
    \ derived hash key)\n  salt := make([]byte, p.saltLength)\n  if _, err := io.ReadFull(rand.Reader,\
    \ salt); err != nil {\n    log.Fatal(err)\n  }\n\n  usersPassword := []byte(\"\
    User's Very S3cur3P4ss@rd@#$%\")\n\n  var derivedKey []byte\n  // Create key hash\
    \ derived from user's password\n  {\n    derivedKey = argon2.IDKey(usersPassword,\
    \ salt, p.iterations, p.memory, p.parallelism,\np.keyLength)\n    // store p.StringFormat(...)\
    \ result in a data store...\n    fmt.Printf(\"%s\\n\", p.StringFormat(salt, derivedKey))\n\
    \  }\n\n  // Verify a user's password against key\n  {\n    keyToCompare := argon2.IDKey(usersPassword,\
    \ salt, p.iterations, p.memory, p.parallelism,\np.keyLength)\n\n    // Use subtle.ConstantTimeCompare(...,\
    \ ...) to ensure no side channel leaks used in timing\nattacks\n    if subtle.ConstantTimeCompare(derivedKey,\
    \ keyToCompare) == 1 {\n      fmt.Printf(\"Passwords match\\n\")\n    } else {\n\
    \      fmt.Printf(\"Passwords do not match\\n\")\n    }\n  }\n}\n```\n\nFor more\
    \ information on password storage see OWASP's guide:\nhttps://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html\n"
  metadata:
    shortDescription: Use of a broken or risky cryptographic algorithm
    cwe: CWE-327
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    security-severity: Medium
    category: security
  severity: WARNING
- id: go_blocklist_rule-blocklist-md5
  languages:
