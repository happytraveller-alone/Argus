- id: java_xss_rule-XSSReqParamToServletWriter
  languages:
  - java
  mode: taint
  pattern-sanitizers:
  - patterns:
    - pattern-inside: org.owasp.encoder.Encode.forHtml($TAINTED);
    - pattern: $TAINTED
  pattern-sinks:
  - patterns:
    - pattern-inside: $FUNC(..., HttpServletResponse $RES, ...) {...}
    - pattern-inside: '$WRITER = $RES.getWriter();

        ...

        '
    - pattern: $WRITER.write($DATA,...);
    - pattern: $DATA
  - patterns:
    - pattern-inside: $FUNC(..., HttpServletResponse $RES, ...) {...}
    - pattern: $RES.getWriter().write($DATA,...);
    - pattern: $DATA
  pattern-sources:
  - patterns:
    - pattern-inside: $FUNC(..., HttpServletRequest $REQ, ...) {...}
    - pattern: $REQ.getParameter(...);
  message: 'The application is returning user-supplied data from an HTTP request directly
    into an HTTP

    response output

    writer. This could lead to Cross Site Scripting (XSS) if the input were malicious

    script code and the application server is not properly validating the output.


    XSS is an attack which exploits a web application or system to treat user input

    as markup or script code. It is important to encode the data depending on the
    specific context

    it is used in. There are at least six context types:


    - Inside HTML tags `<div>context 1</div>`

    - Inside attributes: `<div class="context 2"></div>`

    - Inside event attributes `<button onclick="context 3">button</button>`

    - Inside script blocks: `<script>var x = "context 4"</script>`

    - Unsafe element HTML assignment: `element.innerHTML = "context 5"`

    - Inside URLs: `<iframe src="context 6"></iframe><a href="context 6">link</a>`


    Script blocks alone have multiple ways they need to be encoded. Extra care must
    be taken if

    user input

    is ever output inside of script tags.


    User input that is displayed within the application must be encoded, sanitized
    or validated

    to ensure it cannot be treated as HTML or executed as Javascript code. Care must
    also be

    taken

    to not mix server-side templating with client-side templating, as the server-side
    templating

    will

    not encode things like {{ 7*7 }} which may execute client-side templating features.


    It is _NOT_ advised to encode user input prior to inserting into a data store.
    The data will

    need to be

    encoded depending on context of where it is output. It is much safer to force
    the displaying

    system to

    handle the encoding and not attempt to guess how it should be encoded.


    If possible do not use user input directly in the output to the response writer.


    If the application must output user-supplied input, it will need to encode the
    data depending

    on

    the output context.


    Consider using [Apache Commons Text](https://commons.apache.org/proper/commons-text/)

    `StringEscapeUtils` methods for various context. Please note there is no way to
    safely

    output script code in most circumstances, regardless of encoding. If calling the
    HTTP

    response writer directly, ensure that the `Content-Type` is set to `text/plain`
    so it will

    not be accidentally interpreted by HTML by modern browsers.

    ```

    // Get user input

    String htmlInput = request.getParameter("userInput");

    // Encode the input using the Html4 encoder

    String htmlEncoded = StringEscapeUtils.escapeHtml4(htmlInput);

    // Force the HTTP response to be content type of text/plain so it is not interpreted
    as HTML

    response.setContentType("text/plain");

    // Ensure UTF-8

    response.setCharacterEncoding("UTF-8");

    // Write response

    response.getWriter().write(htmlEncoded);

    ```


    For more information on XSS see OWASP:

    - https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html

    '
  severity: WARNING
  metadata:
    shortDescription: Improper neutralization of input during web page generation
      ('Cross-site Scripting')
    category: security
    cwe: CWE-79
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    technology:
    - java
    security-severity: Medium
- id: java_script_rule-SpringSpelExpressionParser
  languages:
  - java
  patterns:
  - pattern: ($PARSER $P).$METHOD($ARG);
  - pattern-not: ($PARSER $P).$METHOD("...");
  - metavariable-pattern:
      metavariable: $PARSER
      pattern-either:
      - pattern: org.springframework.expression.spel.standard.SpelExpressionParser
      - pattern: org.springframework.expression.ExpressionParser
  - metavariable-regex:
      metavariable: $METHOD
      regex: (parseExpression|parseRaw)
  message: "The application was found calling SpringFramework's `SpelExpressionParser.parseExpression`.\n\
    Calling this method directly with user-supplied input may allow an adversary to\n\
    execute arbitrary Java code including OS system commands.\n\nNever call `parseExpression`\
    \ or `parseRaw` directly with user-supplied input. Consider\nalternate\nmethods\
    \ such as a lookup table to take user input and resolve hardcoded values.\n\n\
    Later versions of SpringFramework introduced a `SimpleEvaluationContext` which\
    \ can be\nused to access bound data when calling the `getValue` result of `parseExpression`.\
    \ This\n`SimpleEvaluationContext` has a reduced set of functionality and can restrict\
    \ data binding\nto read-only or read-write contexts. An adversary could still\
    \ access public properties\nor fields on custom types that have been provided\
    \ to the evaluation context. Use with caution.\n\nExample using `SimpleEvaluationContext`\
    \ with a read-write data binding context:\n```\n@RequestMapping(value=\"/spel\"\
    , method=RequestMethod.POST)\npublic String spel(@Validated User user, Model model)\
    \  {\n  // Create the Expression Parser\n  SpelExpressionParser parser = new SpelExpressionParser();\n\
    \  // Parse the expression\n  Expression parsedExpression = parser.parseExpression(model.getPossiblyUnsafeData());\n\
    \  // Create the read-write data binding context\n  SimpleEvaluationContext context\
    \ = SimpleEvaluationContext.forReadWriteDataBinding().build();\n  // Execute the\
    \ expression, passing in the read-write context\n  Object result = parsedExpression.getValue(context);\n\
    \  // work with the result\n  // ...\n  return \"user\";\n}\n```\n\nFor more information\
    \ on SimpleEvaluationContext see:\nhttps://docs.spring.io/spring-framework/docs/current/javadoc-api/org/springframework/expression/spel/support/SimpleEvaluationContext.html\n"
  severity: ERROR
  metadata:
    shortDescription: Improper neutralization of special elements used in an expression
      language statement ('Expression Language Injection')
    category: security
    cwe: CWE-917
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: High
- id: java_script_rule-ScriptInjection
  languages:
  - java
  mode: taint
  pattern-sinks:
  - patterns:
    - pattern: (javax.script.ScriptEngine $ENGINE).eval($ARG, ...);
    - pattern-not: (javax.script.ScriptEngine $ENGINE).eval("...");
    - pattern-not: (javax.script.ScriptEngine $ENGINE).eval("...", (javax.script.Bindings
        $BINDING));
  - patterns:
    - pattern-either:
      - pattern: (javax.script.Invocable $INVC).invokeFunction(..., $ARG)
      - pattern: (javax.script.Invocable $INVC).invokeMethod(..., $ARG)
  pattern-sources:
  - patterns:
    - pattern-inside: $FUNC(..., $VAR, ...) { ... }
    - pattern: $VAR
  message: "The application executes an argument using a `ScriptEngine`'s `eval` method.\
    \ This\nmay allow for direct OS commands to be executed as it's possible to pass\
    \ in strings\nsuch as `java.lang.Runtime.getRuntime().exec('/bin/sh ...');`.\n\
    \nNever pass user-supplied input directly to the `eval` function. If possible\
    \ hardcode all\nJavasScript code or use a lookup table to resolve user input to\
    \ known values. If none of these\ntechniques are possible, use `javax.script.Bindings`\
    \ to pass input to the script engine.\n\nExample using `Binding` to safely pass\
    \ in string values:\n```\n// Get ECMAScript engine\nScriptEngine engine = new\
    \ ScriptEngineManager().getEngineByName(\"ECMAScript\");\n\n// User input, consisting\
    \ of first and last name\nString userFirstName = \"John\";\nString userLastName\
    \ = \"Snow\";\n\n// Create bindings to pass into our script, forcing the values\
    \ to be String.\nBindings bindings = engine.createBindings();\nbindings.put(\"\
    fname\", new String(userFirstName));\nbindings.put(\"lname\", new String(userLastName));\n\
    \n// Example script that concatenates a greeting with the user-supplied input\
    \ first/last name\nString script = \"var greeting='Hello ';\" +\n// fname and\
    \ lname variables will be resolved by our bindings defined above\n\"greeting +=\
    \ fname + ' ' + lname;\" +\n// prints greeting\n\"greeting\";\n\ntry {\n  // Execute\
    \ the script, passing in the bindings\n  Object bindingsResult = engine.eval(script,\
    \ bindings);\n  // Work with result\n  // ...\n} catch (ScriptException e) {\n\
    \  // Handle exception\n  e.printStackTrace();\n}\n```\n"
  severity: ERROR
  metadata:
    shortDescription: Improper control of generation of code ('Code Injection')
    category: security
    cwe: CWE-94
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: High
- id: java_xml_rule-SAMLIgnoreComments
  languages:
  - java
  message: "SAML parses attestations as an XML document. By processing XML comments,\
    \ comment\nfields can end up modifying the interpretation of input fields. This\
    \ could allow\nan adversary to insert an XML comment to break up the attestation's\
    \ username\nor other fields, allowing an attacker to bypass authorization or authentication\
    \ checks.\n\nTo remediate this issue, when using `org.opensaml.xml.parse.BasicParserPool`\
    \ ensure\n`setIgnoreComments(false)` is not called.\n\nThe default value of `ignoreComments`\
    \ is true, which is safe. \n\nRef:\n- https://javadoc.io/doc/org.opensaml/xmltooling/latest/org/opensaml/xml/parse/BasicParserPool.html#ignoreComments\n\
    \nFor more information on how this issue can be exploited see:\nhttps://developer.okta.com/blog/2018/02/27/a-breakdown-of-the-new-saml-authentication-bypass-vulnerability\n\
    \nFor more information on SAML security see OWASP:\nhttps://cheatsheetseries.owasp.org/cheatsheets/SAML_Security_Cheat_Sheet.html\n"
