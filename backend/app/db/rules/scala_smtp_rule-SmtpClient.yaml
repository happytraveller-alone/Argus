- id: java_crypto_rule-RsaNoPadding
  languages:
  - java
  pattern-either:
  - patterns:
    - pattern: '$VAR = "$ALG";

        ...

        javax.crypto.Cipher.getInstance($VAR);

        '
    - metavariable-regex:
        metavariable: $ALG
