          - pattern: new $IMPL($ARG, ...);
          - pattern-not: new $IMPL("...", ...);
        - patterns:
          - pattern: ($IMPL $CMD).CommandText = <...$ARG...>;
          - pattern-not: ($IMPL $CMD).CommandText = "...";
    - patterns:
      - metavariable-regex:
          metavariable: $FUNC
          regex: ^(ExecuteDataRow|ExecuteDataRowAsync|ExecuteDataset|ExecuteDatasetAsync|ExecuteNonQuery|ExecuteNonQueryAsync|ExecuteReader|ExecuteReaderAsync|ExecuteScalar|ExecuteScalarAsync|UpdateDataSet|UpdateDataSetAsync)$
      - pattern-inside: 'using MySql.Data.MySqlClient;

          ...

          '
      - pattern: MySqlHelper.$FUNC("...", $ARG, ...);
    - patterns:
      - pattern-inside: 'using Cassandra;

          ...

          '
      - pattern: (Session $SESS).Execute($ARG, ...);
      - pattern-not: (Session $SESS).Execute("...", ...);
  message: "SQL Injection is a critical vulnerability that can lead to data or system\
    \ compromise. By\ndynamically generating SQL query strings, user input may be\
    \ able to influence the logic of\nthe SQL statement. This could lead to an adversary\
    \ accessing information they should\nnot have access to, or in some circumstances,\
    \ being able to execute OS functionality or code.\n\nReplace all dynamically generated\
    \ SQL queries with parameterized queries. In situations where\ndynamic queries\
    \ must be created, never use direct user input, but instead use a map or\ndictionary\
    \ of valid values and resolve them using a user supplied key.\n\nFor example,\
    \ some database drivers do not allow parameterized queries for `>` or `<` comparison\n\
    operators. In these cases, do not use a user supplied `>` or `<` value, but rather\
    \ have the\nuser\nsupply a `gt` or `lt` value. The alphabetical values are then\
    \ used to look up the `>` and `<`\nvalues to be used in the construction of the\
    \ dynamic query. The same goes for other queries\nwhere\ncolumn or table names\
    \ are required but cannot be parameterized.\n\nExample using parameterized queries\
    \ with `SqlCommand`:\n```\nstring userInput = \"someUserInput\";\nstring connectionString\
    \ = ...;\nusing (SqlConnection connection = new SqlConnection(connectionString))\n\
    {\n    connection.Open();\n    String sql = \"SELECT name, value FROM table where\
    \ name=@Name\";\n\n    using (SqlCommand command = new SqlCommand(sql, connection))\n\
    \    {\n        command.Parameters.Add(\"@Name\", System.Data.SqlDbType.NVarChar);\n\
    \        command.Parameters[\"@Name\"].Value = userInput;\n        using (SqlDataReader\
    \ reader = command.ExecuteReader())\n        {\n            while (reader.Read())\n\
    \            {\n                Console.WriteLine(\"{0} {1}\", reader.GetString(0),\
    \ reader.GetString(1));\n            }\n        }\n    }\n}\n```\n\nFor more information\
    \ on SQL Injection see OWASP:\nhttps://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html\n"
  severity: ERROR
  metadata:
    shortDescription: Improper Neutralization of Special Elements used in an SQL Command
      ('SQL Injection')
    category: security
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    cwe: CWE-89
    security-severity: High
- id: csharp_injection_rule-XPathInjection
  languages:
