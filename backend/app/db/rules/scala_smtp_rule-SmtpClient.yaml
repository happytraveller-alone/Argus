- id: java_endpoint_rule-X509TrustManager
  languages:
  - java
  message: "The `X509TrustManager` has been configured to return null. This effectively\
    \ disables the\nvalidation of server or client certificates. This could allow\
    \ an adversary who is in \nbetween the application and the target host to launch\
    \ a Man in the middle attack (MITM) i.e \nintercept potentially sensitive information\
    \ or inject malicious content into the \ncommunication stream.\n\nConsider using\
    \ the \ndefault `TrustManager` instead of implementing a custom one. If you must\
    \ override\nthe default verification process, implement proper TrustManager verification\
    \ for\n`checkServerTrusted` and `checkClientTrusted` by throwing `CertificateException`\
    \ if \nthe certificate is invalid.\n\nFor most applications, using the default\
    \ TrustManager provided by the Java runtime is \nsufficient and recommended. Following\
    \ is an example using the built in `TrustManagerFactory` \nto manage validating\
    \ certificate chains:\n```\n// Use the default TrustManagerFactory\nTrustManagerFactory\
    \ trustManagerFactory =\nTrustManagerFactory.getInstance(TrustManagerFactory.getDefaultAlgorithm());\n\
    // Use default system KeyStore, alternatively pass in your own keystore.\ntrustManagerFactory.init((KeyStore)\
    \ null);\n// Create SSLContext for TLS connections\nSSLContext tlsContext = SSLContext.getInstance(\"\
    TLS\");\n// Initialize the tlsContext with our trust manager and a SecureRandom\
    \ number generator.\ntlsContext.init(null, trustManagerFactory.getTrustManagers(),\
    \ new SecureRandom());\n```\nFor more information on TLS security, refer the following\
    \ OWASP documentation:\nhttps://cheatsheetseries.owasp.org/cheatsheets/Transport_Layer_Protection_Cheat_Sheet.html\n"
  metadata:
