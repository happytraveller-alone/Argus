- id: java_ssrf_rule-SSRF
  languages:
  - java
  message: "Server-Side-Request-Forgery (SSRF) exploits backend systems that initiate\
    \ requests to third\nparties.\nIf user input is used in constructing or sending\
    \ these requests, an attacker could supply\nmalicious\ndata to force the request\
    \ to other systems or modify request data to cause unwanted actions.\n\nEnsure\
    \ user input is not used directly in constructing URLs or URIs when initiating\
    \ requests\nto third party\nsystems from back end systems. Care must also be taken\
    \ when constructing payloads using user\ninput. Where\npossible restrict to known\
    \ URIs or payloads. Consider using a server-side map where keys are\nused to return\n\
    URLs such as `https://site/goto?key=1` where `{key: 1, url: 'http://some.url/',\
    \ key: 2, url:\n'http://...'}`.\n\nIf you must use user-supplied input for requesting\
    \ URLs, it is strongly recommended that the\nHTTP client\nchosen allows you to\
    \ customize and block certain IP ranges at the network level. By blocking\nRFC\
    \ 1918\naddresses or other network address ranges, you can limit the severity\
    \ of a successful SSRF\nattack. Care must\nalso be taken to block certain protocol\
    \ or address formatting such as IPv6.\n\nIf you cannot block address ranges at\
    \ the client level, you may want to run the HTTP client\nas a protected\nuser,\
    \ or in a protected network where you can apply IP Table or firewall rules to\
    \ block access\nto dangerous\naddresses. Finally, if none of the above protections\
    \ are available, you could also run a\ncustom HTTP proxy\nand force all requests\
    \ through it to handle blocking dangerous addresses.\n\nExample using a map to\
    \ look up a key to be used in a HTTP request:\n```\nHashMap<String, String> lookupTable\
    \ = new HashMap<>();\nlookupTable.put(\"key1\", \"https://example.com/\");\nlookupTable.put(\"\
    key2\", \"https://safeurl.com/\");\nString userInput = request.getParameter(\"\
    key\");\n\n// Create a CloseableHttpClient, ideally any requests issued should\
    \ be done\n// out-of-band from the servlet request itself (such as using a separate\
    \ thread/scheduler\nsystem)\ntry (final CloseableHttpClient httpClient = HttpClients.createDefault())\
    \ {\n    // Lookup the value from our user input from our lookupTable\n    String\
    \ value = lookupTable.getOrDefault(userInput, \"https://example.com/\");\n   \
    \ // Construct the url, with the hardcoded url and only pass in the value from\
    \ the\nlookupTable,\n    // not direct user input\n    final HttpGet httpget =\
    \ new HttpGet(value);\n    // Execute the request\n    CloseableHttpResponse clientResponse\
    \ = httpClient.execute(httpget);\n    // Read the response\n    byte[] responseData\
    \ = clientResponse.getEntity().getContent().readAllBytes();\n    // Handle the\
    \ response\n    // ...\n}\n```\n\nIf using a map is not possible, the user-supplied\
    \ input must be encoded prior to use, and\nnever allow full\nURLs:\n```\n// Get\
    \ user input\nString userInput = request.getParameter(\"key\");\n// Encode the\
    \ string using java.net.URLEncoder with the UTF-8 character set\nString encodedString\
    \ = java.net.URLEncoder.encode(userInput, StandardCharsets.UTF_8);\n// Create\
    \ a CloseableHttpClient, ideally any requests issued should be done\n// out-of-band\
    \ from the servlet request itself (such as using a separate thread/scheduler\n\
    system)\ntry (final CloseableHttpClient httpClient = HttpClients.createDefault())\
    \ {\n  // Construct the url, with the hardcoded url and only pass in the encoded\
    \ value, never a\nfull URL\n  final HttpGet httpget = new HttpGet(\"https://example.com/getId?key=\"\
    +encodedString);\n  // Execute the request\n  CloseableHttpResponse clientResponse\
    \ = httpClient.execute(httpget);\n  // Read the response\n  byte[] responseData\
    \ = clientResponse.getEntity().getContent().readAllBytes();\n  // handle the response\n\
    }\n```\n\nFor more information on SSRF see OWASP:\nhttps://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html\n"
