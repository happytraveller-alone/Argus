- id: java_file_rule-FilenameUtils
  languages:
  - java
  message: "The filename provided by the FileUpload API can be tampered with by the\
    \ client to reference\nunauthorized files. The provided filename should be properly\
    \ validated to ensure it's properly\nstructured, contains no unauthorized path\
    \ characters (e.g., / \\), and refers to an authorized\nfile.\n\nThe application\
    \ was found to take a parameter from user input to construct a path name. If an\n\
    unfiltered parameter is passed to this file API, files from an arbitrary filesystem\
    \ location\ncould be read. When data from an unstrusted source is untrusted source\
    \ is used to construct\na file path, an attacker could potentially gain access\
    \ to restrcited files locations outside\nthe relevant context.\n\nFor example,\
    \ if the application tries to access the users profile picture based on their\
    \ user\nname by concatenating the username to the filepath:\n\n\"images/userprofiles/\"\
    \ + username\n\nThe expected result of this would be \"images/userprofiles/alice\"\
    , however an attacker could\nuse a malicious input such as \"../../../etc/passwd\"\
    \ to gain access to and/or manipulate\nsensitive information\n\nAssume all input\
    \ is malicious. Use an \"accept known good\" input validation strategy.\n\nInputs\
    \ can be sanitized by using the getName() method with concat() method to remove\
    \ the \npotentially malicious path traversal and limit the scope to a restricted\
    \ directory. Or \ninput can also be sanitized by using resolve() method alongwith\
    \ startsWith() method to \nverify that the base path of the file is safe and expected.\n\
    \nExample of limiting path traversal using getName:\n\n```\nprotected void doPut(HttpServletRequest\
    \ req, HttpServletResponse resp) throws ServletException, IOException {\n\n  \
    \  String input = req.getHeader(\"input\");\n\n    input = getName(input);\n \
    \   \n    String safePath = concat(basePath, input);\n\n    // Read the contents\
    \ of the file\n    File file = new File(safePath);\n}\n```\n"
  metadata:
    category: security
    cwe: CWE-22
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
