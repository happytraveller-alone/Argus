    - pattern-either:
      - pattern: $C.Get(...)
      - pattern: $C.Post(..., $BODYTYPE, $BODY)
      - pattern: $C.PostForm(..., $VALS)
      - pattern: $C.Head(...)
  pattern-propagators:
  - pattern: $R := $D.NewDecoder($P)
    from: $P
    to: $R
  - pattern: $S.Decode(&$P)
    from: $S
    to: $P
  - pattern: $S.Decode($P)
    from: $S
    to: $P
  - pattern: $S.Unmarshal($B, &$P)
    from: $B
    to: $P
  - pattern: $S.Unmarshal($B, $P)
    from: $B
    to: $P
  message: "Server-Side-Request-Forgery (SSRF) exploits backend systems that initiate\
    \ requests to third\nparties.\nIf user input is used in constructing or sending\
    \ these requests, an attacker could supply\nmalicious\ndata to force the request\
    \ to other systems or modify request data to cause unwanted actions.\n\nEnsure\
    \ user input is not used directly in constructing URLs or URIs when initiating\
    \ requests\nto third party\nsystems from back end systems. Care must also be taken\
    \ when constructing payloads using user\ninput. Where\npossible restrict to known\
    \ URIs or payloads. Consider using a server side map where key's are\nused to\
    \ return\nURLs such as `https://site/goto?key=1` where `{key: 1, url: 'http://some.url/',\
    \ key: 2, url:\n'http://...'}`.\n\nIf you must use user supplied input for requesting\
    \ URLs, it is strongly recommended that the\nHTTP client\nchosen allows you to\
    \ customize and block certain IP ranges at the network level. By blocking\nRFC\
    \ 1918\naddresses or other network address ranges, you can limit the severity\
    \ of a successful SSRF\nattack. Care must\nalso be taken to block certain protocol\
    \ or address formatting such as IPv6.\n\nIf you can not block address ranges at\
    \ the client level, you may want to run the HTTP client\nas a protected\nuser,\
    \ or in a protected network where you can apply IP Table or firewall rules to\
    \ block access\nto dangerous\naddresses. Finally, if none of the above protections\
    \ are available, you could also run a\ncustom HTTP proxy\nand force all requests\
    \ through it to handle blocking dangerous addresses.\n\nExample HTTP client that\
    \ disallows access to loopback and RFC-1918 addresses\n```\n// IsDisallowedIP\
    \ parses the ip to determine if we should allow the HTTP client to continue\n\
    func IsDisallowedIP(hostIP string) bool {\n  ip := net.ParseIP(hostIP)\n  return\
    \ ip.IsMulticast() || ip.IsUnspecified() || ip.IsLoopback() || ip.IsPrivate()\n\
    }\n\n// SafeTransport uses the net.Dial to connect, then if successful check if\
    \ the resolved\n// ip address is disallowed. We do this due to hosts such as localhost.lol\
    \ being resolvable to\n// potentially malicious URLs. We allow connection only\
    \ for resolution purposes.\nfunc SafeTransport(timeout time.Duration) *http.Transport\
    \ {\n  return &http.Transport{\n    DialContext: func(ctx context.Context, network,\
    \ addr string) (net.Conn, error) {\n      c, err := net.DialTimeout(network, addr,\
    \ timeout)\n      if err != nil {\n        return nil, err\n      }\n      ip,\
    \ _, _ := net.SplitHostPort(c.RemoteAddr().String())\n      if IsDisallowedIP(ip)\
    \ {\n        return nil, errors.New(\"ip address is not allowed\")\n      }\n\
    \      return c, err\n    },\n    DialTLS: func(network, addr string) (net.Conn,\
    \ error) {\n      dialer := &net.Dialer{Timeout: timeout}\n      c, err := tls.DialWithDialer(dialer,\
    \ network, addr, &tls.Config{})\n      if err != nil {\n        return nil, err\n\
    \      }\n\n      ip, _, _ := net.SplitHostPort(c.RemoteAddr().String())\n   \
    \   if IsDisallowedIP(ip) {\n        return nil, errors.New(\"ip address is not\
    \ allowed\")\n      }\n\n      err = c.Handshake()\n      if err != nil {\n  \
    \      return c, err\n      }\n\n      return c, c.Handshake()\n    },\n    TLSHandshakeTimeout:\
    \ timeout,\n  }\n}\n\nfunc httpRequest(requestUrl string) {\n  const clientConnectTimeout\
    \ = time.Second * 10\n  httpClient := &http.Client{\n    Transport: SafeTransport(clientConnectTimeout),\n\
    \  }\n  resp, err := httpClient.Get(requestUrl)\n  if err != nil {\n    log.Fatal(err)\n\
    \  }\n  defer resp.Body.Close()\n  // work with resp\n}\n```\n\nFor more information\
    \ on SSRF see OWASP:\nhttps://owasp.org/www-community/attacks/Server_Side_Request_Forgery\n"
  metadata:
    shortDescription: Server Side Request Forgery (SSRF)
    cwe: CWE-918
    owasp:
    - A1:2017-Injection
    - A10:2021-Server-Side Request Forgery
    security-severity: Medium
    category: security
  severity: WARNING
- id: go_injection_rule-template-injection
  languages:
  - go
  patterns:
  - pattern-either:
    - patterns:
      - pattern: template.HTML($IN)
      - pattern-not: template.HTML("...")
    - patterns:
      - pattern: template.JS($IN)
      - pattern-not: template.JS("...")
    - patterns:
      - pattern: template.URL($IN)
      - pattern-not: template.URL("...")
    - patterns:
      - pattern: template.HTMLAttr($IN)
      - pattern-not: template.HTMLAttr("...")
  message: "Cross Site Scripting (XSS) is an attack which exploits a web application\
    \ or system to treat\nuser input\nas markup or script code. It is important to\
    \ encode the data depending on the specific context\nit\nis used in. There are\
    \ at least six context types:\n\n- Inside HTML tags `<div>context 1</div>`\n-\
    \ Inside attributes: `<div class=\"context 2\"></div>`\n- Inside event attributes\
    \ `<button onclick=\"context 3\">button</button>`\n- Inside script blocks: `<script>var\
    \ x = \"context 4\"</script>`\n- Unsafe element HTML assignment: `element.innerHTML\
    \ = \"context 5\"`\n- Inside URLs: `<iframe src=\"context 6\"></iframe><a href=\"\
    context 6\">link</a>`\n\nScript blocks alone have multiple ways they need to be\
    \ encoded. Extra care must be taken if\nuser input\nis ever output inside of script\
    \ tags.\n\nUser input that is displayed within the application must be encoded,\
    \ sanitized or validated\nto ensure it cannot be treated as HTML or executed as\
    \ Javascript code. Care must also be\ntaken\nto not mix server-side templating\
    \ with client-side templating, as the server-side templating\nwill\nnot encode\
    \ things like {{ 7*7 }} which may execute client-side templating features.\n\n\
    It is _NOT_ advised to encode user input prior to inserting into a data store.\
    \ The data will\nneed to be\nencoded depending on context of where it is output.\
    \ It is much safer to force the displaying\nsystem to\nhandle the encoding and\
    \ not attempt to guess how it should be encoded.\n\nUse of the following template\
    \ types with user input denotes a security risk:\n\n- [template.HTML](https://pkg.go.dev/html/template#HTML)\n\
    - [template.JS](https://pkg.go.dev/html/template#JS)\n- [template.URL](https://pkg.go.dev/html/template#URL)\n\
    - [template.HTMLAttr](https://pkg.go.dev/html/template#HTMLAttr)\n\nEither remove\
    \ these types from the application or hardcode as const strings prior\nto conversion:\n\
    ```\ntestTemplate, err := template.New(\"testTemplate\").Funcs(template.FuncMap{\n\
    \  \"SafeHTML\": func() template.HTML {\n    const safeHTML = \"<div>hardcoded,\
    \ safe html</div>\"\n    return template.HTML(safeHTML)\n  },\n}).Parse(`<html><body>{{\
    \ SafeHTML }}</body>`)\nif err != nil {\n  log.Fatal(err)\n}\n\nif err := testTemplate.Execute(os.Stdout,\
    \ nil); err != nil {\n  log.Fatal(err)\n}\n```\n"
  metadata:
    shortDescription: Improper neutralization of input during web page generation
      ('Cross-site Scripting')
    cwe: CWE-79
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: Medium
    category: security
  severity: WARNING
- id: go_http_rule-http-serve
  languages:
  - go
  patterns:
  - pattern-inside: 'import "net/http"

      ...

      '
  - pattern-either:
    - pattern: http.ListenAndServe(...)
    - pattern: http.ListenAndServeTLS(...)
    - pattern: http.Serve(...)
    - pattern: http.ServeTLS(...)
    - patterns:
      - pattern-not-inside: "&http.Server{\n  ...,\n  ReadHeaderTimeout: ...,\n  ...,\n\
          }\n"
      - pattern-not-inside: "&http.Server{\n  ...,\n  ReadTimeout: ...,\n  ...,\n\
          }\n"
      - pattern-not-inside: "$S = &http.Server{\n  ...,\n}\n$S.ReadHeaderTimeout =\
          \ ...\n...\n"
      - pattern-not-inside: "$S = &http.Server{\n  ...,\n}\n$S.ReadTimeout = ...\n\
          ...\n"
      - pattern: "&http.Server{\n  ...,\n}\n"
  message: "Go's `net/http` serve functions may be vulnerable to resource consumption\
    \ attacks if timeouts\nare not properly configured\nprior to starting the HTTP\
    \ server. An adversary may open up thousands of connections but never\ncomplete\
    \ sending all data,\nor never terminate the connections. This may lead to the\
    \ server no longer accepting new\nconnections.\n\nTo protect against this style\
    \ of resource consumption attack, timeouts should be set in the\n`net/http` server\
    \ prior to calling\nthe listen or serve functions. What this means is that the\
    \ default `http.ListenAndServe` and\n`http.Serve` functions should not\nbe used\
    \ in a production setting as they are unable to have timeouts configured. Instead\
    \ a\ncustom `http.Server` object must be\ncreated with the timeouts configured.\n\
    \nExample setting timeouts on a `net/http` server:\n```\n// All values chosen\
    \ below are dependent on application logic and\n// should be tailored per use-case\n\
    srv := &http.Server{\n  Addr: \"localhost:8000\",\n  // ReadHeaderTimeout is the\
    \ amount of time allowed to read\n  // request headers. The connection's read\
    \ deadline is reset\n  // after reading the headers and the Handler can decide\
    \ what\n  // is considered too slow for the body. If ReadHeaderTimeout\n  // is\
    \ zero, the value of ReadTimeout is used. If both are\n  // zero, there is no\
    \ timeout.\n  ReadHeaderTimeout: 15 * time.Second,\n\n  // ReadTimeout is the\
    \ maximum duration for reading the entire\n  // request, including the body. A\
    \ zero or negative value means\n  // there will be no timeout.\n  //\n  // Because\
    \ ReadTimeout does not let Handlers make per-request\n  // decisions on each request\
    \ body's acceptable deadline or\n  // upload rate, most users will prefer to use\n\
    \  // ReadHeaderTimeout. It is valid to use them both.\n  ReadTimeout: 15 * time.Second,\n\
    \n  // WriteTimeout is the maximum duration before timing out\n  // writes of\
    \ the response. It is reset whenever a new\n  // request's header is read. Like\
    \ ReadTimeout, it does not\n  // let Handlers make decisions on a per-request\
    \ basis.\n  // A zero or negative value means there will be no timeout.\n  WriteTimeout:\
    \ 10 * time.Second,\n\n  // IdleTimeout is the maximum amount of time to wait\
    \ for the\n  // next request when keep-alives are enabled. If IdleTimeout\n  //\
    \ is zero, the value of ReadTimeout is used. If both are\n  // zero, there is\
    \ no timeout.\n  IdleTimeout: 30 * time.Second,\n}\n\n// For per request timeouts\
    \ applications can wrap all `http.HandlerFunc(...)` in\n// `http.TimeoutHandler``\
    \ and specify a timeout, but note the TimeoutHandler does not\n// start ticking\
    \ until all headers have been read.\n\n// Listen with our custom server with timeouts\
    \ configured\nif err := srv.ListenAndServe(); err != nil {\n  log.Fatal(err)\n\
    }\n```\nFor more information on the `http.Server` timeouts, see: https://pkg.go.dev/net/http#Server\n\
    \nFor information on setting request based timeouts, see:\nhttps://pkg.go.dev/net/http#TimeoutHandler\n\
    \nFor more information on the Slowloris attack see:\nhttps://en.wikipedia.org/wiki/Slowloris_(computer_security)\n"
  metadata:
    shortDescription: Uncontrolled resource consumption (Slowloris)
    cwe: CWE-400
    owasp:
    - A6:2017-Security Misconfiguration
    - A05:2021-Security Misconfiguration
    security-severity: Medium
    category: security
  severity: WARNING
- id: go_unsafe_rule-unsafe
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: unsafe.Alignof(...)
    - pattern: unsafe.Offsetof(...)
    - pattern: unsafe.Sizeof(...)
    - pattern: unsafe.Pointer(...)
  message: "The `unsafe` package in Go allows low-level access to memory management\
    \ features.\nThis includes pointers and direct access to memory. The Go compiler\
    \ will no longer\nbe able to enforce type safety when working with the `unsafe`\
    \ pointer types.\n\nWhile powerful, access to these functions can lead to many\
    \ security related issues\n such as:\n\n- [Buffer overflows](https://owasp.org/www-community/vulnerabilities/Buffer_Overflow)\
    \ which\ncan lead to code execution.\n- [Use after free](https://owasp.org/www-community/vulnerabilities/Using_freed_memory)\
    \ which\ncan lead to code execution.\n- [Information/Memory leaks](https://owasp.org/www-community/vulnerabilities/Memory_leak)\n\
    which can leak sensitive information, including data which can\ndefeat other protection\
    \ mechanisms or cause the system to run out of memory.\n\nUnless required, all\
    \ calls to the `unsafe` package should be removed.\n"
  metadata:
    shortDescription: Use of inherently dangerous function (unsafe package)
    cwe: CWE-242
    owasp:
    - A9:2017-Using Components with Known Vulnerabilities
    - A06:2021-Vulnerable and Outdated Components
    security-severity: High
    category: security
  severity: INFO
- id: go_file-permissions_rule-fileperm
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: os.Chmod(...,$MASK)
    - pattern: os.OpenFile(...,$MASK)
    - pattern: os.WriteFile(...,$MASK)
  - metavariable-comparison:
      metavariable: $MASK
      comparison: $MASK > 0o640
      base: 8
  message: "The application was found setting file permissions to overly permissive\
    \ values. Consider\nusing the following values if the application user is the\
    \ only process to access\nthe file:\n\n- 0400 - read only access to the file\n\
    - 0200 - write only access to the file\n- 0600 - read/write access to the file\n\
    \nExample creating a file with read/write permissions for the application user:\n\
    ```\nf, err := os.OpenFile(\"file.txt\", os.O_CREATE, 0600)\nif err != nil {\n\
    \  log.Fatal(err)\n}\ndefer f.Close()\n// continue to work with file here\n```\n\
    \nFor all other values please see:\nhttps://en.wikipedia.org/wiki/File-system_permissions#Numeric_notation\n"
  metadata:
    shortDescription: Incorrect permission assignment for critical resource
    cwe: CWE-732
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    security-severity: Medium
    category: security
  severity: WARNING
- id: go_file-permissions_rule-mkdir
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: os.Mkdir(...,$MASK)
    - pattern: os.MkdirAll(...,$MASK)
  - metavariable-comparison:
      metavariable: $MASK
      comparison: $MASK > 0o750
      base: 8
  message: "The application was found setting directory permissions to overly permissive\
    \ values. Consider\nusing the following values if the application user is the\
    \ only process to access\nfiles in the directory specified:\n- 0700 - read/write\
    \ access to the files in the directory\n\nAnother common value is `0750` which\
    \ allows the application user read/write access and group\nusers to read the files\
    \ contained in the directory.\n\nExample creating a directory with read/write\
    \ permissions for only the application user:\n```\nerr := os.Mkdir(\"directory\"\
    , 0700)\nif err != nil {\n  log.Fatal(err)\n}\n```\n\nFor all other values please\
    \ see:\nhttps://en.wikipedia.org/wiki/File-system_permissions#Numeric_notation\n"
  metadata:
    shortDescription: Incorrect permission assignment for critical resource
    cwe: CWE-732
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    security-severity: Medium
    category: security
  severity: WARNING
- id: go_sql_rule-concat-sqli
  languages:
  - go
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: fmt.Sprintf(...)
    - pattern-not: 'fmt.Sprintf("...", "...")

        '
  - patterns:
    - pattern: '"..." + $X

        '
    - pattern-not: '"..." + "..."

        '
  - pattern: '($SB : strings.Builder).String()

      '
  pattern-sinks:
  - patterns:
    - pattern: $DB.$METHOD(...)
    - metavariable-regex:
        metavariable: $METHOD
        regex: ^(Exec(Context)?|Query(Context)?|QueryRow(Context)?)$
  message: "SQL Injection is a critical vulnerability that can lead to data or system\
    \ compromise. By\ndynamically generating SQL query strings, user input may be\
    \ able to influence the logic of\nthe SQL statement. This could lead to an adversary\
    \ accessing information they should\nnot have access to or in some circumstances,\
    \ being able to execute OS functionality or code.\n\nReplace all dynamically generated\
    \ SQL queries with parameterized queries. In situations where\ndynamic queries\
    \ must be created, never use direct user input, but instead use a map or\ndictionary\
    \ of valid values and resolve them using a user supplied key.\n\nFor example,\
    \ some database drivers do not allow parameterized queries for `>` or `<` comparison\n\
    operators. In these cases, do not use a user supplied `>` or `<` value, but rather\
    \ have the\nuser\nsupply a `gt` or `lt` value. The alphabetical values are then\
    \ used to look up the `>` and `<`\nvalues to be used in the construction of the\
    \ dynamic query. The same goes for other queries\nwhere\ncolumn or table names\
    \ are required but cannot be parameterized.\n\nExample using parameterized queries\
    \ with `sql.Query`:\n```\nrows, err := db.Query(\"SELECT * FROM users WHERE userName\
    \ = ?\", userName)\nif err != nil {\n    return nil, err\n}\ndefer rows.Close()\n\
    for rows.Next() {\n  // ... process rows\n}\n```\n\nFor more information on SQL\
    \ Injection see OWASP:\nhttps://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html\n"
  metadata:
    shortDescription: Improper neutralization of special elements used in an SQL command
      ('SQL Injection')
    cwe: CWE-89
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: High
    category: security
  severity: WARNING
- id: python_flask_rule-app-debug
  languages:
  - python
  message: 'The Flask application is running with `debug=True` configured. By enabling
    this option, certain

    exceptions or errors could cause sensitive information to be leaked in HTTP responses.


    Additionally, it is not recommended to run a Flask application using `Flask.run(...)`
    in

    production. Instead, a WSGI server such as

    [gunicorn](https://flask.palletsprojects.com/en/2.3.x/deploying/gunicorn/)

    or [waitress](https://flask.palletsprojects.com/en/2.3.x/deploying/waitress/)
    be used instead.


    For more information on deployment options for Flask applications see:

    - https://flask.palletsprojects.com/en/2.3.x/deploying/

    '
  metadata:
    cwe: CWE-489
    category: security
    owasp:
    - A6:2017-Security Misconfiguration
    - A05:2021-Security Misconfiguration
    shortDescription: Active debug code
    security-severity: Medium
  patterns:
  - pattern-inside: 'import flask

      ...

      '
  - pattern: $APP.run(..., debug=True, ...)
  severity: WARNING
- id: python_ftp_rule-ftplib
  languages:
  - python
  message: "The application was found using an FTP library. As FTP does not provide\
    \ encryption, it is\nstrongly recommended that any file transfers be done over\
    \ a more secure transport such as\nSSH.\n\nThe [paramiko](https://www.paramiko.org/)\
    \ library can be used with an SCP module to allow\nsecure file transfers.\n\n\
    Example using `paramiko` SSH client and the `scp` module:\n```\nimport paramiko\n\
    import scp\n\n# Create an SSH client\nwith paramiko.SSHClient() as ssh:\n    #\
    \ Load the system host keys so we can confirm the\n    # host we are connecting\
    \ to is legitimate\n    ssh.load_system_host_keys('/home/appuser/.ssh/known_hosts')\n\
    \n    # Connect to the remote host using our SSH private key\n    ssh.connect(hostname='example.org',\n\
    \                port=22,\n                username='appuser',\n             \
    \   key_filename='/home/appuser/.ssh/private_key')\n\n    # Create an SCP client\
    \ with the ssh transport and copy files\n    with scp.SCPClient(ssh.get_transport())\
    \ as secure_copy:\n        secure_copy.get('remote/test.file', 'local/test.file')\n\
    \        secure_copy.put('local/some.file', 'remote/some.file')\n```\n\nFor more\
    \ information on the paramiko module see:\n- https://www.paramiko.org/\n\nFor\
    \ more information on the scp module see:\n- https://github.com/jbardin/scp.py\n"
  metadata:
    cwe: CWE-319
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    category: security
    shortDescription: Cleartext transmission of sensitive information
    security-severity: Medium
  pattern: ftplib.$ANYTHING(...)
  severity: WARNING
- id: python_crypto_rule-crypto-cipher-des
  languages:
  - python
  message: 'DES, TripleDES, RC2 and RC4 are all considered broken or insecure cryptographic
    algorithms.

    Newer algorithms apply message integrity to validate ciphertext has not been tampered

    with. Consider using `ChaCha20Poly1305` instead as it is easier and faster than
    the

    alternatives such as `AES-256-GCM`.


    For older applications that don''t have support for `ChaCha20Poly1305`,

    `AES-256-GCM` is recommended, however it has many drawbacks:

    - Slower than `ChaCha20Poly1305`.

    - Catastrophic failure if nonce values are reused.


    Note that the `Crypto` and `Cryptodome` Python packages are no longer recommended
    for

    new applications, instead consider using the [cryptography](https://cryptography.io/)
    package.


    Example using `ChaCha20Poly1305`:

    ```

    import os

    # Import ChaCha20Poly1305 from cryptography

    from cryptography.hazmat.primitives.ciphers.aead import ChaCha20Poly1305

    # Our plaintext to encrypt

    plain_text = b"Secret text to encrypt"

    # We do not require authenticated but unencrypted data, so set to None

    aad = None

    # Generate a secure key

    key = ChaCha20Poly1305.generate_key()

    # Create a new ChaCha20Poly1305 instance with our secure key

    chacha = ChaCha20Poly1305(key)

    # Note: nonce values _must_ be regenerated every time they are used.

    nonce = os.urandom(12)

    # Encrypt our plaintext

    cipher_text = chacha.encrypt(nonce, plain_text, aad)

    # Decrypt the plain text using the nonce and cipher_text

    chacha.decrypt(nonce, cipher_text, aad)

    ```


    Example using `AESGCM`:

    ```

    import os

    # Import AESGCM from cryptography

    from cryptography.hazmat.primitives.ciphers.aead import AESGCM

    # Our plaintext to encrypt

    plain_text = b"Secret text to encrypt"

    # We do not require authenticated but unencrypted data, so set to None

    aad = None

    # Generate a secure key

    key = AESGCM.generate_key(bit_length=128)

    # Create a new AESGCM instance with our secure key

    aesgcm = AESGCM(key)

    # Note: nonce values _must_ be regenerated every time they are used.

    nonce = os.urandom(12)

    # Encrypt our plaintext

    cipher_text = aesgcm.encrypt(nonce, plain_text, aad)

    # Decrypt the plain text using the nonce and cipher_text

    aesgcm.decrypt(nonce, cipher_text, aad)

    ```


    For more information on the cryptography module see:

    - https://cryptography.io/en/latest/

    '
  metadata:
    cwe: CWE-327
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    category: security
    shortDescription: Use of a broken or risky cryptographic algorithm
    security-severity: Medium
  patterns:
  - pattern-either:
    - pattern: Cryptodome.Cipher.DES.new(...)
    - pattern: Crypto.Cipher.DES.new(...)
  severity: WARNING
- id: python_crypto_rule-crypto.hazmat-hash-sha1
  languages:
  - python
  message: 'The application was found using an insecure or risky digest or signature
    algorithm. MD2, MD5

    and SHA1 hash algorithms have been found to be vulnerable to producing collisions.


    This means

    that two different values, when hashed, can lead to the same hash value. If the
    application is

    trying

    to use these hash methods for storing passwords, then it is recommended to switch
    to a

    password hashing

    algorithm such as Argon2id or PBKDF2.

    It is strongly recommended that a standard digest algorithm be chosen instead
    as implementing

    a custom algorithm is prone to error.


    Example of creating a SHA-384 hash using the `cryptography` package:

    ```

    from cryptography.hazmat.primitives import hashes

    # Create a SHA384 digest

    digest = hashes.Hash(hashes.SHA384())

    # Update the digest with some initial data

