  message: "The application dynamically constructs file or path information. If the\
    \ path\ninformation comes from user-supplied input, it could be abused to read\
    \ sensitive files,\naccess other users' data, or aid in exploitation to gain further\
    \ system access.\n\nUser input should never be used in constructing paths or files\
    \ for interacting\nwith the filesystem. This includes filenames supplied by user\
    \ uploads or downloads.\nIf possible, consider hashing user input or using unique\
    \ values and\nuse `path.normalize` to resolve and validate the path information\n\
    prior to processing any file functionality.\n\nExample using `path.normalize`\
    \ and not allowing direct user input:\n```\n// User input, saved only as a reference\n\
    // id is a randomly generated UUID to be used as the filename\nconst userData\
    \ = {userFilename: userSuppliedFilename, id: crypto.randomUUID()};\n// Restrict\
    \ all file processing to this directory only\nconst basePath = '/app/restricted/';\n\
    \n// Create the full path, but only use our random generated id as the filename\n\
    const joinedPath = path.join(basePath, userData.id);\n// Normalize path, removing\
    \ any '..'\nconst fullPath = path.normalize(joinedPath);\n// Verify the fullPath\
    \ is contained within our basePath\nif (!fullPath.startsWith(basePath)) {\n  \
    \  console.log(\"Invalid path specified!\");\n}\n// Process / work with file\n\
    // ...\n```\n\nFor more information on path traversal issues see OWASP:\nhttps://owasp.org/www-community/attacks/Path_Traversal\n"
  metadata:
    shortDescription: Improper limitation of a pathname to a restricted directory
      ('Path Traversal')
    cwe: CWE-22
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    security-severity: Medium
    category: security
  severity: WARNING
