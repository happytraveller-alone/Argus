        - pattern: FileName = ...
  message: "OS command injection is a critical vulnerability that can lead to a full\
    \ system\ncompromise as it may allow an adversary to pass in arbitrary commands\
    \ or arguments\nto be executed.\n\nUser input should never be used in constructing\
    \ commands or command arguments\nto functions which execute OS commands. This\
    \ includes filenames supplied by\nuser uploads or downloads.\n\nEnsure your application\
    \ does not:\n\n- Use user-supplied information in the process name to execute.\n\
    - Use user-supplied information in an OS command execution function which does\n\
    not escape shell meta-characters.\n- Use user-supplied information in arguments\
    \ to OS commands.\n\nThe application should have a hardcoded set of arguments\
    \ that are to be passed\nto OS commands. If filenames are being passed to these\
    \ functions, it is\nrecommended that a hash of the filename be used instead, or\
    \ some other unique\nidentifier. It is strongly recommended that a native library\
    \ that implements\nthe same functionality be used instead of using OS system commands,\
    \ due to the\nrisk of unknown attacks against third party commands.\n\nWhen specifying\
    \ the OS command, ensure the application uses the full path\ninformation, otherwise\
    \ the OS may attempt to look up which process to execute\nand could be vulnerable\
    \ to untrusted search path vulnerabilities (CWE-426).\n\nExample of safely executing\
    \ an OS command:\n```\npublic void ExecuteCommand(string userFileData) {\n   \
    \ // generate a random filename, do not using user input\n    string fileName\
    \ = \"C:\\\\Temp\\\\\" + Guid.NewGuid();\n    File.WriteAllText(fileName, userFileData);\n\
    \n    using (Process process = new Process())\n    {\n        // hardcode the\
    \ full process path\n        ProcessStartInfo processInfo = new ProcessStartInfo(\"\
    C:\\\\App\\\\FileReader.exe\");\n        // only pass in trust arguments, and\
    \ never direct user input.\n        processInfo.Arguments = fileName;\n      \
    \  processInfo.UseShellExecute = false;\n        process.StartInfo = processInfo;\n\
    \        process.Start();\n    }\n}\n```\n\nFor more information on OS command\
    \ injection, see OWASP's guide:\nhttps://cheatsheetseries.owasp.org/cheatsheets/OS_Command_Injection_Defense_Cheat_Sheet.html\n"
  severity: ERROR
  metadata:
    shortDescription: Improper neutralization of special elements used in an OS command
      ('OS Command Injection')
    category: security
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    cwe: CWE-78
    security-severity: High
- id: csharp_injection_rule-XmlReaderXXEInjection
  languages:
  - csharp
  mode: taint
  pattern-sinks:
  - patterns:
    - pattern-either:
      - pattern-inside: '$SETTINGS.ProhibitDtd = false;

          ...

          '
      - pattern-inside: '$SETTINGS.DtdProcessing = DtdProcessing.Parse;

          ...

          '
    - pattern: System.Xml.XmlReader.Create(..., $SETTINGS);
  pattern-sources:
  - pattern: var $SETTINGS = new XmlReaderSettings();
  message: 'External XML entities are a feature of XML parsers that allow documents
    to contain references

    to

    other documents or data. This feature can be abused to read files, communicate
    with external

    hosts,

    exfiltrate data, or cause a Denial of Service (DoS).


    XML parsers and document loaders must be configured to not resolve entities. This
    can be done

    by:

    - Ensuring you are running a version of .NET Framework greater than 4.5.2 (released
    in 2014).

    - Setting `XmlTextReader`''s  `ProhibitDtd` to `true`

    - Setting `XmlReaderSettings` `DtdProcessing` to `DtdProcessing.Prohibit`


    Example of safely loading an XML file using `XmlDocument`:

    ```

    var settings = new XmlReaderSettings();

    settings.DtdProcessing = DtdProcessing.Prohibit;

    XmlReader reader = XmlReader.Create(path, settings);

    ```


    For more information on XML security, see OWASP''s guide:

    https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html#net

    '
  severity: WARNING
  metadata:
    shortDescription: Improper restriction of XML external entity reference ('XXE')
    category: security
    cwe: CWE-611
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: MEDIUM
- id: csharp_injection_rule-LdapInjection
  languages:
  - csharp
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-inside: '$RET $METHOD(...,$VAR,...){...}

        '
    - pattern: $VAR
  pattern-sinks:
  - pattern: (System.DirectoryServices.DirectoryEntry $SOURCE).Path = ...
  - pattern: (System.DirectoryServices.DirectorySearcher $SEARCHER).Filter = ...
  - pattern: new System.DirectoryServices.DirectoryEntry(...)
  - pattern: new System.DirectoryServices.DirectorySearcher(...)
  - pattern: new System.DirectoryServices.Protocols.SearchRequest(...)
  - pattern: (System.DirectoryServices.Protocols.SearchRequest $SEARCHREQ).Filter
      = ...
  - pattern: (System.DirectoryServices.Protocols.SearchRequest $SEARCHREQ).DistinguishedName
      = ...
  - pattern: (System.DirectoryServices.AccountManagement.UserPrincipal $SEARCHREQ).$PROP
      = ...
  - pattern: System.DirectoryServices.AccountManagement.UserPrincipal.FindByIdentity(...)
  message: "LDAP injection attacks exploit LDAP queries to influence how data is returned\
    \ by\nthe LDAP, or in this case an Active Directory server.\n\nIt is recommended\
    \ that newer applications use the `System.DirectoryServices.AccountManagement`\n\
    API instead of `DirectorySearcher` API as it hides the complexity of querying\
    \ LDAP directly.\nHowever,\nthe `AccountManagement` API is still susceptible to\
    \ LDAP injection if a user inputs LDAP\nqueries,\nincluding LDAP filter characters\
    \ such as `*`.\n\nIt is recommended that all input passed to LDAP querying systems\
    \ encode the following values:\n\n- Any occurrence of the null character must\
    \ be escaped as “\\00”.\n- Any occurrence of the open parenthesis character must\
    \ be escaped as “\\28”.\n- Any occurrence of the close parenthesis character must\
    \ be escaped as “\\29”.\n- Any occurrence of the asterisk character must be escaped\
    \ as “\\2a”.\n- Any occurrence of the backslash character must be escaped as “\\\
    5c”.\n\nExample code that safely encodes input for use in an LDAP query using\
    \ the `AccountManagement`\nAPI:\n```\nusing System.DirectoryServices.AccountManagement;\n\
    \nstring EncodeLDAPString(string input) {\n    // Note the \\ character is replaced\
    \ first\n    char[] chars = new char[] { '\\\\', '\\0', '(', ')', '*' };\n   \
    \ string[] encoded = new string[] { \"\\\\5c\", \"\\\\00\", \"\\\\28\", \"\\\\\
    29\", \"\\\\2a\" };\n\n    for (int i = 0; i < chars.Length; i++)\n    {\n   \
    \     input = input.Replace(chars[i].ToString(), encoded[i]);\n    }\n\n    return\
    \ input;\n}\n\n// unsafe, do not use without encoding first\nstring userInput\
    \ = \"Administrator\";\nPrincipalContext AD = new PrincipalContext(ContextType.Domain,\
    \ \"ad.example.dev\");\n\nUserPrincipal u = new UserPrincipal(AD);\nstring encodedUserName\
    \ = EncodeLDAPString(userInput);\n\n// The AD search term, encoded prior to calling\
    \ search\nu.SamAccountName = encodedUserName;\n\n// Search for user\nPrincipalSearcher\
    \ search = new PrincipalSearcher(u);\n\n// Use FindOne to only return a single\
    \ result\nUserPrincipal result = (UserPrincipal)search.FindOne();\nsearch.Dispose();\n\
    \n// show some details\nif (result != null) {\n    Console.WriteLine(\"User: {0}\"\
    , result.DisplayName);\n} else {\n    Console.WriteLine(\"user not found\");\n\
    }\n```\n\nThe same encoding method shown in `EncodeLDAPString` can also be used\
    \ when using the\nolder `DirectorySearcher` API.\n\nFor more information see OWASP's\
    \ guide:\nhttps://cheatsheetseries.owasp.org/cheatsheets/LDAP_Injection_Prevention_Cheat_Sheet.html\n"
  severity: WARNING
  metadata:
    shortDescription: Improper neutralization of special elements used in an LDAP
      query ('LDAP Injection')
    category: security
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    cwe: CWE-90
    security-severity: Medium
