  message: 'The `HttpRequest.getRequestDispatcher()`''s `include` and `forward` methods
    will return

    any file that is resolvable within the web application context. This includes
    the `web.xml`

    file, any compiled classes, `jsp` files, and additional JAR or WAR libraries that
    are

    accessible.


    Never pass user-supplied input directly to any of these methods. Use a lookup
    table or

    hardcode

    which views or paths the user should be directed to. Another option is to use
    a simple HTTP

    redirect by returning an empty response body with a 301 status code and a `Location`
    redirect

    header. In Java servlets, this can be done by using the `response.sendRedirect(...)`
    method.


    Example using a redirect instead of a `RequestDispatcher`:

    ```

    // Create a look up table or pull from a data source

    HashMap<String, String> lookupTable = new HashMap<>();

    lookupTable.put("key1", "/Resource1");

    lookupTable.put("key2", "/Resource2");

    // Get user input

    String userInput = request.getParameter("key");

    // Look up resource to redirect to from the user input

    String redirectValue = lookupTable.getOrDefault(userInput, "/Resource1");

    // Redirect the user

    response.sendRedirect(redirectValue);

    ```

    '
