rules:
- id: raptor-typos
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/480
    - https://cwe.mitre.org/data/definitions/481
    - https://cwe.mitre.org/data/definitions/482
    - https://cwe.mitre.org/data/definitions/483
    - https://g.co/kgs/PCHQjJ
    - https://www.sei.cmu.edu/downloads/sei-cert-c-coding-standard-2016-v01.pdf
    confidence: LOW
    cwe:
    - 'CWE-480: Use of Incorrect Operator'
    - 'CWE-481: Assigning Instead of Comparing'
    - 'CWE-482: Comparing Instead of Assigning'
    - 'CWE-483: Incorrect Block Delimitation'
    - 'CWE-571: Expression Is Always True'
    - 'CWE-682: Incorrect Calculation'
    - 'CWE-704: Incorrect Type Conversion or Cast'
    - 'CWE-119: Improper Restriction of Operations within the Bounds of a Memory Buffer'
    - 'CWE-120: Buffer Copy without Checking Size of Input'
  message: The programmer accidentally uses the wrong operator, which changes the
    application logic in security-relevant ways. This rule also covers some other
    common typo patterns.
  severity: INFO
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: for ($_ == $_; $_; $_) ...
  - patterns:
    - pattern: $_ == $_;
    - pattern-not-inside: return $_;
    - pattern-not-inside: assert(...);
  - patterns:
    - pattern: if (<... $EXPR1 = $EXPR2 ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 = $EXPR2) == $_ ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 = $EXPR2) != $_ ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 = $EXPR2) < $_ ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 = $EXPR2) <= $_ ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 = $EXPR2) > $_ ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 = $EXPR2) >= $_ ...>) ...
  - patterns:
    - pattern: if (<... $EXPR1 & $EXPR2 ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 & $EXPR2) == $_ ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 & $EXPR2) != $_ ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 & $EXPR2) < $_ ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 & $EXPR2) <= $_ ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 & $EXPR2) > $_ ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 & $EXPR2) >= $_ ...>) ...
  - patterns:
    - pattern: if (<... $EXPR1 | $EXPR2 ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 | $EXPR2) == $_ ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 | $EXPR2) != $_ ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 | $EXPR2) < $_ ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 | $EXPR2) <= $_ ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 | $EXPR2) > $_ ...>) ...
    - pattern-not-inside: if (<... ($EXPR1 | $EXPR2) >= $_ ...>) ...
  - pattern: $_ =+ $_
  - pattern: ($EXPR && $EXPR)
  - pattern: ($EXPR || $EXPR)
  - pattern: ($EXPR == $EXPR)
  - pattern: ($EXPR != $EXPR)
  - pattern: ($EXPR < $EXPR)
  - pattern: ($EXPR <= $EXPR)
  - pattern: ($EXPR > $EXPR)
  - pattern: ($EXPR >= $EXPR)
  - pattern: (char * $_) = '\0'
  - pattern: (char * $_) == '\0'
  - pattern: (char * $_) != '\0'
  - pattern: if (<... strcpy(...) ...>) ...
  - pattern: if (<... strncpy(...) ...>) ...
  - pattern: if ($_);
  - pattern: for ($_; $_; $_);
  - patterns:
    - pattern-either:
      - pattern: $_ $_[$LEN];
      - pattern: $_ $_[$LEN] = $_;
    - metavariable-regex:
        metavariable: $LEN
        regex: ^0[^xX].*
