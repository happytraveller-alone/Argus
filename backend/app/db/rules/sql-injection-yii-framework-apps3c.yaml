rules:
- id: sql-injection-yii-framework-apps3c
  languages:
  - php
  severity: WARNING
  message: Detected a formatted string in a Yii SQL operation with a concatenated  value
    that came from a function argument. This could lead to SQL injection if variables
    in the SQL statement are not properly sanitized.
  patterns:
  - pattern-either:
    - pattern-inside: "function $FUNC(...,$PAR,...) {\n  ...\n}\n"
    - pattern-inside: "function $FUNC(...,$PAR = $PVAL,...) {\n  ...\n}    \n"
  - pattern-either:
    - pattern: $SELECT([...,$PRE . <... $PAR ...> . $POST,...])
    - pattern: $SELECT([...,<... $PAR ...> . $POST,...])
    - pattern: $SELECT([...,$PRE . <... $PAR ...>,...])
    - pattern: $SELECT([...,$PAR,...])
    - pattern: $SELECT($PRE . <... $PAR ...> . $POST,...)
    - pattern: $SELECT(<... $PAR ...> . $POST,...)
    - pattern: $SELECT($PRE . <... $PAR ...>,...)
    - pattern: $SELECT($PAR,...)
    - pattern: $SELECT($PRE . <... $PAR ...> . $POST)
    - pattern: $SELECT(<... $PAR ...> . $POST)
    - pattern: $SELECT($PRE . <... $PAR ...>)
    - pattern: $SELECT($PAR)
    - pattern: $AAA->$SELECT([...,$PRE . <... $PAR ...> . $POST,...])
    - pattern: $AAA->$SELECT([...,<... $PAR ...> . $POST,...])
    - pattern: $AAA->$SELECT([...,$PRE . <... $PAR ...>,...])
    - pattern: $AAA->$SELECT([...,$PAR,...])
    - pattern: $AAA->$SELECT($PRE . <... $PAR ...> . $POST,...)
    - pattern: $AAA->$SELECT(<... $PAR ...> . $POST,...)
    - pattern: $AAA->$SELECT($PRE . <... $PAR ...>,...)
    - pattern: $AAA->$SELECT($PAR,...)
    - pattern: $AAA->$SELECT($PRE . <... $PAR ...> . $POST)
    - pattern: $AAA->$SELECT(<... $PAR ...> . $POST)
    - pattern: $AAA->$SELECT($PRE . <... $PAR ...>)
    - pattern: $AAA->$SELECT($PAR)
    - pattern: '$COPY = $PAR;

        ...

        $SELECT($PRE . <... $COPY ...> . $POST);

        '
    - pattern: '$COPY = $PAR;

        ...

        $SELECT(<... $COPY ...> . $POST);

