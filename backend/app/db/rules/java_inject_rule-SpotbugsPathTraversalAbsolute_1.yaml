rules:
- id: java_inject_rule-SpotbugsPathTraversalAbsolute_1
  languages:
  - java
  mode: taint
  pattern-sanitizers:
  - pattern: org.apache.commons.io.FilenameUtils.getName(...)
  pattern-sinks:
  - patterns:
    - pattern-inside: '$U = new java.net.URI($VAR)

        '
    - pattern-either:
      - pattern-inside: new java.io.File($U)
      - pattern-inside: java.nio.file.Paths.get($U)
    - pattern: $VAR
  - patterns:
    - pattern-inside: new java.io.RandomAccessFile($INPUT,...)
    - pattern: $INPUT
  - pattern: new java.io.FileReader(...)
  - pattern: new javax.activation.FileDataSource(...)
  - pattern: new java.io.FileInputStream(...)
  - pattern: new java.io.File(...)
  - pattern: java.nio.file.Paths.get(...)
  - pattern: java.io.File.createTempFile(...)
  - pattern: java.io.File.createTempDirectory(...)
  - pattern: java.nio.file.Files.createTempFile(...)
  - pattern: java.nio.file.Files.createTempDirectory(...)
  - patterns:
    - pattern: $SRC.$METHOD(...)
    - metavariable-pattern:
        metavariable: $SRC
        pattern-either:
        - pattern: getClass()
        - pattern: getClass().getClassLoader()
        - pattern: (ClassLoader $C)
        - pattern: (Class $C)
        - pattern: $CLZ.getClassLoader()
    - metavariable-pattern:
        metavariable: $METHOD
        pattern-either:
        - pattern: getResourceAsStream
        - pattern: getResource
  - patterns:
    - pattern-inside: new java.io.FileWriter($PATH, ...)
    - pattern: $PATH
  - patterns:
    - pattern-inside: new java.io.FileOutputStream($PATH, ...)
    - pattern: $PATH
  pattern-sources:
  - pattern: (HttpServletRequest $REQ).getParameter(...)
  - patterns:
    - pattern-inside: $FUNC(..., @RequestParam $TYPE $REQ, ...) {...}
    - focus-metavariable: $REQ
  message: "The application dynamically constructs file or path information. If the\
    \ path\ninformation comes from user input, it could be abused to read sensitive\
    \ files,\naccess other users' data, or aid in exploitation to gain further system\
    \ access.\n\nUser input should never be used in constructing paths or files for\
    \ interacting\nwith the filesystem. This includes filenames supplied by user uploads\
    \ or downloads.\nIf possible, consider hashing user input or replacing it with\
    \ unique values and\nuse `Path.resolve` to resolve and validate the path information\n\
    prior to processing any file functionality.\n\nExample using `Path.resolve` and\
    \ not allowing direct user input:\n```\n// Class to store our user data along\
    \ with a randomly generated file name\npublic static class UserData {\n    private\
    \ String userFileNameUnsafe;\n    private String fileName;\n    public UserData(String\
    \ userFileName) {\n        this.userFileNameUnsafe = userFileName;\n        //\
    \ Generate a random ID for the filename\n        this.fileName = UUID.randomUUID().toString();\n\
    \    }\n    public String getUserFileNameUnsafe() { return userFileNameUnsafe;\
    \ };\n    public String getFileName() { return fileName; };\n}\n\npublic static\
    \ void main(String[] args) throws Exception {\n    // User input, saved only as\
    \ a reference\n    UserData userData = new UserData(\"..\\\\test.txt\");\n   \
    \ // Restrict all file processing to this directory only\n    String base = \"\
    /var/app/restricted\";\n    Path basePath = Paths.get(base);\n    // Resolve the\
    \ full path, but only use our random generated filename\n    Path fullPath = basePath.resolve(userData.getFileName());\n\
    \    // verify the path is contained within our basePath\n    if (!fullPath.startsWith(base))\
    \ {\n        throw new Exception(\"Invalid path specified!\");\n    }\n    //\
    \ process / work with file\n}\n```\n\nFor more information on path traversal issues\
    \ see OWASP:\nhttps://owasp.org/www-community/attacks/Path_Traversal\n"
  metadata:
    shortDescription: Improper limitation of a pathname to a restricted directory
      ('Path Traversal')
    cwe: CWE-22
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    security-severity: Medium
    technology:
    - java
    category: security
  severity: WARNING
