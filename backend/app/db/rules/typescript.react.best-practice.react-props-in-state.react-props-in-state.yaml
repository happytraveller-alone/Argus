rules:
- id: typescript.react.best-practice.react-props-in-state.react-props-in-state
  pattern-either:
  - patterns:
    - pattern-inside: "class $CN extends React.Component {\n  ...\n}\n"
    - pattern-either:
      - pattern: 'state = {$NAME: <... this.props.$PROP ...>}

          '
      - pattern: 'this.state = {$NAME: <... this.props.$PROP ...>}

          '
  - patterns:
    - pattern-inside: "function $FN({$PROP},...) {\n  ...\n}\n"
    - pattern-inside: useState(...)
    - pattern: $PROP
  - patterns:
    - pattern-inside: "function $FN($PROP,...) {\n  ...\n}\n"
    - pattern-inside: useState(...)
    - pattern-not: $PROP
  message: It is a bad practice to stop the data flow in rendering by copying props
    into state.
  metadata:
    references:
    - https://overreacted.io/writing-resilient-components/#principle-1-dont-stop-the-data-flow
  languages:
  - typescript
  - javascript
  severity: WARNING
