rules:
- id: detect-angular-trust-as-url-method
  patterns:
  - pattern-either:
    - pattern: '$SOURCE = $scope.$INPUT;

        $sce.trustAsUrl($SOURCE);

        '
    - pattern: '$sce.trustAsUrl($scope.$INPUT);

        '
  - pattern-inside: "app.controller(..., function($scope,$sce){ \n...\n});\n"
  message: 'The use of $sce.trustAsUrl can be dangerous if unsantiized user input
    flows through this API.

    '
  languages:
  - javascript
  severity: WARNING
  metadata:
    references:
    - https://docs.angularjs.org/api/ng/service/$sce#trustAsUrl
    - https://owasp.org/www-chapter-london/assets/slides/OWASPLondon20170727_AngularJS.pdf
    cwe:
    - 'CWE-79: Cross-site Scripting'
    - 'CWE-601: URL Redirection to Untrusted Site'
    - 'CWE-20: Improper Input Validation'
    - 'CWE-116: Improper Encoding or Escaping of Output'
  fix: ''
