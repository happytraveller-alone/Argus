rules:
- id: raptor-interesting-api-calls
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://github.com/0xdea/rhabdomancer
    - https://github.com/0xdea/ghidra-scripts/blob/main/Rhabdomancer.java
    - https://github.com/x509cert/banned/blob/master/banned.h
    - https://g.co/kgs/PCHQjJ
    - https://www.sei.cmu.edu/downloads/sei-cert-c-coding-standard-2016-v01.pdf
    - https://learn.microsoft.com/en-us/windows-hardware/drivers/devtest/28719-banned-api-usage-use-updated-function-replacement
    confidence: MEDIUM
  message: Locate all calls to interesting and potentially insecure API functions
    (candidate points). The auditor can backtrace from these candidate points to find
    pathways allowing access from untrusted input.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - patterns:
    - pattern: $FUN(...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*set\w*(u|g)id\s*$|^\w*(init|set)groups\s*$
  - patterns:
    - pattern: $FUN(...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*str\w?cpy(_s)?(_l)?\s*$|^\w*stpn?cpy(_s)?(_l)?\s*$|^\w*(wc|mb)s\w?cpy(_s)?(_l)?\s*$|^\w*wcpn?cpy(_s)?(_l)?\s*$
  - patterns:
    - pattern: $FUN(...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*str\w?cat(_s)?(_l)?\s*$|^\w*(wc|mb)s\w?cat(_s)?(_l)?\s*$
  - patterns:
    - pattern: $FUN(...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*strtok(_s)?(_l)?\s*$|^\w*(wc|mb)stok(_s)?(_l)?\s*$
  - patterns:
    - pattern: $FUN(...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*s\w?printf(_s)?(_l)?\w*\s*$
  - patterns:
    - pattern: $FUN(...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*scanf(_s)?(_l)?\s*$
  - patterns:
    - pattern: $FUN(...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*get(s|c|char|pw|pass|wd|cwd|opt|opt_long)\s*$
  - patterns:
    - pattern: $FUN(...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*(get|set|put|unset)env\s*$
  - patterns:
    - pattern: $FUN($_, $_, $LEN, ...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*memc?cpy(_s)?\s*$|^\w*memmove(_s)?\s*$|^\w*bcopy\s*$
    - pattern-not: $FUN($_, $_, sizeof(...), ...)
    - metavariable-regex:
        metavariable: $LEN
        regex: ^(?!\s*(?:0[xX][0-9A-Fa-f]+|0[bB][01]+|0[0-7]*|[1-9][0-9]*)[uUlL]*\s*$).+
  - patterns:
    - pattern: $FUN(...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*alloc(a|f)?\s*$|^\w*alloc_?array\s*$
  - patterns:
    - pattern: $FUN(...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*exec(l|v)?(p|e)?e?\s*$|^\w*system\s*$
  - patterns:
    - pattern: $FUN(...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*open(at)?(64)?\s*$|^\w*pipe\s*$|^\w*read\s*$|^\w*recv(from)?\s*$
  - patterns:
    - pattern: $FUN(...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*fork\s*$
  - patterns:
    - pattern: $FUN(...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*rand\s*$
  - patterns:
    - pattern: $FUN(...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*mk\w?temp(64)?\s*$|^\w*te?mpnam\s*$|^\w*tmpfile\s*$
  - patterns:
    - pattern: $FUN(...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*mkdir\s*$|^\w*creat\s*$|^\w*link(at)?\s*$|^\w*rename(at)?\s*$|^\w*access(at|_ok)?\s*$|^\w*stat(at)?\s*$|^\w*ch(own|mod)(at)?\s*$|^\w*realpath(at)?\s*$|^\w*readlink\s*$
  - patterns:
    - pattern: $FUN(...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*locale\s*$|^\w*(make|split)path\s*$
  - patterns:
    - pattern: $FUN(...)
    - metavariable-regex:
        metavariable: $FUN
        regex: (?i)^\w*copy_(from|to)_user\s*$|^\w*(get|put)_user\s*$|^\w*copy(in|out)\s*$
