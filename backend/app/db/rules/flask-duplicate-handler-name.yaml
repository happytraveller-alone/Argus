rules:
- id: flask-duplicate-handler-name
  pattern: "@app.route(\"...\", ...)\ndef $R(...):\n    ...\n...\n@app.route(\"...\"\
    , ...)\ndef $R(...):\n    ...\n"
  message: Looks like `$R` is a flask function handler that registered to two different
    routes. This will cause a runtime error
  languages:
  - python
  severity: WARNING
