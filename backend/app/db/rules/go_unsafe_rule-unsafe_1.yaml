rules:
- id: go_unsafe_rule-unsafe_1
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: unsafe.Alignof(...)
    - pattern: unsafe.Offsetof(...)
    - pattern: unsafe.Sizeof(...)
    - pattern: unsafe.Pointer(...)
  message: "The `unsafe` package in Go allows low-level access to memory management\
    \ features.\nThis includes pointers and direct access to memory. The Go compiler\
    \ will no longer\nbe able to enforce type safety when working with the `unsafe`\
    \ pointer types.\n\nWhile powerful, access to these functions can lead to many\
    \ security related issues\n such as:\n\n- [Buffer overflows](https://owasp.org/www-community/vulnerabilities/Buffer_Overflow)\
    \ which\ncan lead to code execution.\n- [Use after free](https://owasp.org/www-community/vulnerabilities/Using_freed_memory)\
    \ which\ncan lead to code execution.\n- [Information/Memory leaks](https://owasp.org/www-community/vulnerabilities/Memory_leak)\n\
    which can leak sensitive information, including data which can\ndefeat other protection\
    \ mechanisms or cause the system to run out of memory.\n\nUnless required, all\
    \ calls to the `unsafe` package should be removed.\n"
  metadata:
    shortDescription: Use of inherently dangerous function (unsafe package)
    cwe: CWE-242
    owasp:
    - A9:2017-Using Components with Known Vulnerabilities
    - A06:2021-Vulnerable and Outdated Components
    security-severity: High
    category: security
  severity: INFO
