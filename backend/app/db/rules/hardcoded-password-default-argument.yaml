rules:
- id: hardcoded-password-default-argument
  patterns:
  - pattern: "def $FUNC(..., password=\"...\", ...):\n  ...\n"
  message: 'Hardcoded password is used as a default argument to ''$FUNC''. This could
    be dangerous if

    a real password is not supplied.

    '
  languages:
  - python
  severity: WARNING
