id = "report"
role = "report"
image = "vulhunter/hermes-agent:latest"
container_name = "hermes-report"
enabled = true
dispatch_timeout_seconds = 180
terminal_cwd = "/scan"
project_mount = "/scan"
artifacts_dir = "artifacts"
runtime_home_dir = "data"

[input_contract]
fields = ["task_id", "project_id", "correlation_id", "payload"]

[output_contract]
fields = ["status", "summary", "structured_outputs", "diagnostics"]

[healthcheck]
command = "hermes --version"
interval_seconds = 30
