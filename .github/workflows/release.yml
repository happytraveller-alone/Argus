name: Release Branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-release-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate slim release tree
        run: |
          ./scripts/generate-release-branch.sh \
            --output "${RUNNER_TEMP}/release-tree" \
            --validate

      - name: Validate compose entrypoints
        working-directory: ${{ runner.temp }}/release-tree
        run: |
          docker compose config >/dev/null
          docker compose -f docker-compose.yml -f docker-compose.hybrid.yml config >/dev/null

      - name: Publish release branch
        env:
          RELEASE_DIR: ${{ runner.temp }}/release-tree
        run: |
          set -euo pipefail

          PUBLISH_DIR="${RUNNER_TEMP}/release-publish"
          git worktree add --force "${PUBLISH_DIR}" HEAD

          cleanup() {
            git worktree remove --force "${PUBLISH_DIR}" || true
          }
          trap cleanup EXIT

          cd "${PUBLISH_DIR}"

          if git ls-remote --exit-code --heads origin release >/dev/null 2>&1; then
            git fetch origin release
            git checkout -B release origin/release
          else
            git checkout --orphan release
          fi

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "${RELEASE_DIR}/." .

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "release branch already up to date"
            exit 0
          fi

          git commit -m "chore: update release branch from ${GITHUB_SHA}"
          git push --force origin HEAD:release
