name: Release Branch

on:
  workflow_call:
    inputs:
      source_sha:
        required: true
        type: string
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-branch
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  detect-release-carrying-changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}

    steps:
      - name: Checkout main
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect release-carrying changes
        if: ${{ github.event_name == 'push' }}
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            release_carrying:
              - 'backend/**'
              - 'frontend/**'
              - 'env.example'
              - 'docker/frontend.Dockerfile'
              - 'LICENSE'
              - 'scripts/generate-release-branch.sh'
              - 'scripts/release-allowlist.txt'
              - 'scripts/release-templates/**'
              - '!backend/tests/**'
              - '!backend/docs/**'
              - '!backend/.venv/**'
              - '!backend/.pytest_cache/**'
              - '!backend/.mypy_cache/**'
              - '!backend/target/**'
              - '!backend/uploads/**'
              - '!backend/log/**'
              - '!backend/data/**'
              - '!backend/.env'
              - '!backend/README.md'
              - '!frontend/tests/**'
              - '!frontend/docs/**'
              - '!frontend/dist/**'
              - '!frontend/node_modules/**'
              - '!frontend/scripts/dev-entrypoint.sh'
              - '!frontend/scripts/generate-cwe-catalog.mjs'
              - '!frontend/scripts/run-in-dev-container.sh'
              - '!frontend/scripts/run-node-tests.mjs'
              - '!frontend/scripts/setup.cjs'
              - '!frontend/scripts/setup.sh'

      - name: Resolve release gate
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_CARRYING: ${{ steps.filter.outputs.release_carrying || 'false' }}
        run: |
          if [ "${EVENT_NAME}" != "push" ] || [ "${RELEASE_CARRYING}" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  generate-release-branch:
    needs: detect-release-carrying-changes
    if: ${{ needs.detect-release-carrying-changes.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_call' && inputs.source_sha || github.sha }}

      - name: Generate slim release tree
        run: |
          ./scripts/generate-release-branch.sh \
            --output "${RUNNER_TEMP}/release-tree" \
            --validate

      - name: Validate compose entrypoints
        working-directory: ${{ runner.temp }}/release-tree
        run: |
          docker compose config >/dev/null

      - name: Delete public release tags and releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLEANUP_FILE: scripts/release-tag-cleanup.txt
        run: |
          set -euo pipefail

          if [[ ! -f "${CLEANUP_FILE}" ]]; then
            echo "No release tag cleanup file found; skipping."
            exit 0
          fi

          while IFS= read -r raw_tag || [[ -n "${raw_tag}" ]]; do
            tag="$(printf '%s' "${raw_tag}" | sed 's/[[:space:]]*#.*$//; s/^[[:space:]]*//; s/[[:space:]]*$//')"
            [[ -n "${tag}" ]] || continue

            if git ls-remote --tags --refs origin "refs/tags/${tag}" | grep -q .; then
              release_id=""
              if release_id="$(gh api -X GET "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq '.id' 2>/dev/null)"; then
                if [[ "${release_id}" =~ ^[0-9]+$ ]]; then
                  gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
                fi
              fi
              git push origin --delete "${tag}" || true
            fi

            git tag -d "${tag}" >/dev/null 2>&1 || true
          done < "${CLEANUP_FILE}"

      - name: Publish release branch
        env:
          RELEASE_DIR: ${{ runner.temp }}/release-tree
        run: |
          set -euo pipefail

          PUBLISH_DIR="${RUNNER_TEMP}/release-publish"
          git worktree add --detach --force "${PUBLISH_DIR}" HEAD

          cleanup() {
            git worktree remove --force "${PUBLISH_DIR}" || true
          }
          trap cleanup EXIT

          cd "${PUBLISH_DIR}"

          git checkout --orphan "release-publish-${GITHUB_RUN_ID}"

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "${RELEASE_DIR}/." .

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          git commit -m "chore: refresh release branch snapshot"
          git push --force origin HEAD:release
