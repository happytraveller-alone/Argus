name: Publish Runtime Images

on:
  workflow_call:
    inputs:
      build_backend:
        required: false
        type: boolean
        default: false
      build_frontend:
        required: false
        type: boolean
        default: false
      build_opengrep_runner:
        required: false
        type: boolean
        default: false
      build_flow_parser_runner:
        required: false
        type: boolean
        default: false
      build_sandbox_runner:
        required: false
        type: boolean
        default: false
    outputs:
      selected_count:
        description: Number of runtime images selected for publish.
        value: ${{ jobs.publish-summary.outputs.selected_count }}
      publish_summary_json:
        description: Machine-readable summary of selected runtime images.
        value: ${{ jobs.publish-summary.outputs.publish_summary_json }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GHCR_REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish-backend:
    if: ${{ inputs.build_backend }}
    uses: ./.github/workflows/docker-publish.yml
    with:
      image_name: vulhunter-backend
      context: .
      file: ./docker/backend.Dockerfile
      build_args: |
        DOCKERHUB_LIBRARY_MIRROR=docker.m.daocloud.io/library
      platforms: linux/amd64,linux/arm64
    secrets: inherit

  publish-frontend:
    if: ${{ inputs.build_frontend }}
    uses: ./.github/workflows/docker-publish.yml
    with:
      image_name: vulhunter-frontend
      context: ./frontend
      file: ./docker/frontend.Dockerfile
      platforms: linux/amd64,linux/arm64
    secrets: inherit

  publish-opengrep-runner:
    if: ${{ inputs.build_opengrep_runner }}
    uses: ./.github/workflows/docker-publish.yml
    with:
      image_name: vulhunter-opengrep-runner
      context: .
      file: ./docker/opengrep-runner.Dockerfile
      platforms: linux/amd64,linux/arm64
    secrets: inherit

  publish-flow-parser-runner:
    if: ${{ inputs.build_flow_parser_runner }}
    uses: ./.github/workflows/docker-publish.yml
    with:
      image_name: vulhunter-flow-parser-runner
      context: .
      file: ./docker/flow-parser-runner.Dockerfile
      platforms: linux/amd64,linux/arm64
    secrets: inherit

  publish-sandbox-runner:
    if: ${{ inputs.build_sandbox_runner }}
    uses: ./.github/workflows/docker-publish.yml
    with:
      image_name: vulhunter-sandbox-runner
      context: .
      file: ./docker/sandbox-runner.Dockerfile
      platforms: linux/amd64,linux/arm64
    secrets: inherit

  publish-summary:
    name: 汇总发布结果
    runs-on: ubuntu-latest
    needs:
      - publish-backend
      - publish-frontend
      - publish-opengrep-runner
      - publish-flow-parser-runner
      - publish-sandbox-runner
    if: ${{ always() }}
    outputs:
      selected_count: ${{ steps.summary.outputs.selected_count }}
      publish_summary_json: ${{ steps.summary.outputs.publish_summary_json }}

    steps:
      - name: 生成发布摘要
        id: summary
        env:
          BUILD_BACKEND: ${{ inputs.build_backend }}
          BUILD_FRONTEND: ${{ inputs.build_frontend }}
          BUILD_OPENGREP_RUNNER: ${{ inputs.build_opengrep_runner }}
          BUILD_FLOW_PARSER_RUNNER: ${{ inputs.build_flow_parser_runner }}
          BUILD_SANDBOX_RUNNER: ${{ inputs.build_sandbox_runner }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          python3 - <<'PY'
          import json
          import os

          catalog = [
              ("BUILD_BACKEND", "vulhunter-backend"),
              ("BUILD_FRONTEND", "vulhunter-frontend"),
              ("BUILD_OPENGREP_RUNNER", "vulhunter-opengrep-runner"),
              ("BUILD_FLOW_PARSER_RUNNER", "vulhunter-flow-parser-runner"),
              ("BUILD_SANDBOX_RUNNER", "vulhunter-sandbox-runner"),
          ]

          selected = [
              image_name
              for env_name, image_name in catalog
              if os.environ.get(env_name, "").strip().lower() == "true"
          ]
          published = [
              f"ghcr.io/{os.environ['REPOSITORY_OWNER']}/{image_name}:latest"
              for image_name in selected
          ]
          payload = {
              "schema_version": 1,
              "channel": "latest",
              "selected_images": selected,
              "published_images": published,
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"selected_count={len(selected)}\n")
              handle.write(
                  "publish_summary_json="
                  f"{json.dumps(payload, separators=(',', ':'))}\n"
              )
          PY

      - name: 输出发布摘要
        env:
          SELECTED_COUNT: ${{ steps.summary.outputs.selected_count }}
          PUBLISH_SUMMARY_JSON: ${{ steps.summary.outputs.publish_summary_json }}
        run: |
          echo "## Runtime image publish summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- selected_count: \`${SELECTED_COUNT}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- publish_summary_json: \`${PUBLISH_SUMMARY_JSON}\`" >> "$GITHUB_STEP_SUMMARY"
