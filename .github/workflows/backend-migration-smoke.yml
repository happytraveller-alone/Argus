name: Backend Migration Smoke

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-migration-smoke.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-migration-smoke.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  migration-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vulhunter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vulhunter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Run Rust backend migration smoke
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/vulhunter
          ZIP_STORAGE_PATH: /tmp/vulhunter-zip-storage
        run: |
          mkdir -p "$ZIP_STORAGE_PATH"
          cargo test -- --nocapture
