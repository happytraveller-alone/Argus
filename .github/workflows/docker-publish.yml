name: Docker Publish

# 只构建并推送 Docker 镜像，不创建 Release 或 Tag
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签 (例如: latest, dev, v3.0.0)'
        required: true
        default: 'latest'
        type: string
      build_frontend:
        description: '构建前端镜像'
        required: false
        type: boolean
        default: true
      build_backend:
        description: '构建后端镜像'
        required: false
        type: boolean
        default: true
      build_yasa_runner:
        description: '构建 YASA runner 镜像'
        required: false
        type: boolean
        default: true
      build_opengrep_runner:
        description: '构建 OpenGrep runner 镜像'
        required: false
        type: boolean
        default: true
      build_bandit_runner:
        description: '构建 Bandit runner 镜像'
        required: false
        type: boolean
        default: true
      build_gitleaks_runner:
        description: '构建 Gitleaks runner 镜像'
        required: false
        type: boolean
        default: true
      build_phpstan_runner:
        description: '构建 PHPStan runner 镜像'
        required: false
        type: boolean
        default: true
      build_flow_parser_runner:
        description: '构建 flow/parser runner 镜像'
        required: false
        type: boolean
        default: true
      build_pmd_runner:
        description: '构建 PMD runner 镜像'
        required: false
        type: boolean
        default: true
      build_sandbox:
        description: '构建沙箱镜像'
        required: false
        type: boolean
        default: true
      build_sandbox_runner:
        description: '构建 sandbox-runner 镜像'
        required: false
        type: boolean
        default: true
      build_nexus_web:
        description: '构建 nexus-web 镜像'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GHCR_REGISTRY: ghcr.io
  VULHUNTER_IMAGE_NAMESPACE: unbengable12
  NEXUS_WEB_IMAGE_NAMESPACE: unbengable12

jobs:
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 确定镜像标签
        id: image-tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "${EVENT_NAME}" == "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "build_all=true" >> $GITHUB_OUTPUT
          else
            echo "tag=${INPUT_TAG}" >> $GITHUB_OUTPUT
            echo "build_all=false" >> $GITHUB_OUTPUT
          fi

      - name: 设置 Node.js
        if: ${{ steps.image-tag.outputs.build_all == 'true' || github.event.inputs.build_frontend == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: 安装 pnpm
        if: ${{ steps.image-tag.outputs.build_all == 'true' || github.event.inputs.build_frontend == 'true' }}
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: 安装前端依赖
        if: ${{ steps.image-tag.outputs.build_all == 'true' || github.event.inputs.build_frontend == 'true' }}
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: 构建前端项目
        if: ${{ steps.image-tag.outputs.build_all == 'true' || github.event.inputs.build_frontend == 'true' }}
        working-directory: ./frontend
        run: pnpm build
        env:
          VITE_USE_LOCAL_DB: 'true'

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 构建并推送前端 Docker 镜像
        if: ${{ steps.image-tag.outputs.build_all == 'true' || github.event.inputs.build_frontend == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./docker/frontend.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-frontend:${{ steps.image-tag.outputs.tag }}
            ${{ steps.image-tag.outputs.build_all == 'true' && format('{0}/{1}/vulhunter-frontend:latest', env.GHCR_REGISTRY, env.VULHUNTER_IMAGE_NAMESPACE) || '' }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: 构建并推送后端 Docker 镜像
        if: ${{ steps.image-tag.outputs.build_all == 'true' || github.event.inputs.build_backend == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/backend.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-backend:${{ steps.image-tag.outputs.tag }}
            ${{ steps.image-tag.outputs.build_all == 'true' && format('{0}/{1}/vulhunter-backend:latest', env.GHCR_REGISTRY, env.VULHUNTER_IMAGE_NAMESPACE) || '' }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: 构建并推送 YASA runner Docker 镜像
        if: ${{ steps.image-tag.outputs.build_all == 'true' || github.event.inputs.build_yasa_runner == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/yasa-runner.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-yasa-runner:${{ steps.image-tag.outputs.tag }}
            ${{ steps.image-tag.outputs.build_all == 'true' && format('{0}/{1}/vulhunter-yasa-runner:latest', env.GHCR_REGISTRY, env.VULHUNTER_IMAGE_NAMESPACE) || '' }}
          cache-from: type=gha,scope=yasa-runner
          cache-to: type=gha,mode=max,scope=yasa-runner

      - name: 构建并推送 OpenGrep runner Docker 镜像
        if: ${{ steps.image-tag.outputs.build_all == 'true' || github.event.inputs.build_opengrep_runner == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/opengrep-runner.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-opengrep-runner:${{ steps.image-tag.outputs.tag }}
            ${{ steps.image-tag.outputs.build_all == 'true' && format('{0}/{1}/vulhunter-opengrep-runner:latest', env.GHCR_REGISTRY, env.VULHUNTER_IMAGE_NAMESPACE) || '' }}
          cache-from: type=gha,scope=opengrep-runner
          cache-to: type=gha,mode=max,scope=opengrep-runner

      - name: 构建并推送 Bandit runner Docker 镜像
        if: ${{ steps.image-tag.outputs.build_all == 'true' || github.event.inputs.build_bandit_runner == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/bandit-runner.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-bandit-runner:${{ steps.image-tag.outputs.tag }}
            ${{ steps.image-tag.outputs.build_all == 'true' && format('{0}/{1}/vulhunter-bandit-runner:latest', env.GHCR_REGISTRY, env.VULHUNTER_IMAGE_NAMESPACE) || '' }}
          cache-from: type=gha,scope=bandit-runner
          cache-to: type=gha,mode=max,scope=bandit-runner

      - name: 构建并推送 Gitleaks runner Docker 镜像
        if: ${{ steps.image-tag.outputs.build_all == 'true' || github.event.inputs.build_gitleaks_runner == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/gitleaks-runner.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-gitleaks-runner:${{ steps.image-tag.outputs.tag }}
            ${{ steps.image-tag.outputs.build_all == 'true' && format('{0}/{1}/vulhunter-gitleaks-runner:latest', env.GHCR_REGISTRY, env.VULHUNTER_IMAGE_NAMESPACE) || '' }}
          cache-from: type=gha,scope=gitleaks-runner
          cache-to: type=gha,mode=max,scope=gitleaks-runner

      - name: 构建并推送 PHPStan runner Docker 镜像
        if: ${{ steps.image-tag.outputs.build_all == 'true' || github.event.inputs.build_phpstan_runner == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/phpstan-runner.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-phpstan-runner:${{ steps.image-tag.outputs.tag }}
            ${{ steps.image-tag.outputs.build_all == 'true' && format('{0}/{1}/vulhunter-phpstan-runner:latest', env.GHCR_REGISTRY, env.VULHUNTER_IMAGE_NAMESPACE) || '' }}
          cache-from: type=gha,scope=phpstan-runner
          cache-to: type=gha,mode=max,scope=phpstan-runner

      - name: 构建并推送 flow/parser runner Docker 镜像
        if: ${{ steps.image-tag.outputs.build_all == 'true' || github.event.inputs.build_flow_parser_runner == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/flow-parser-runner.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-flow-parser-runner:${{ steps.image-tag.outputs.tag }}
            ${{ steps.image-tag.outputs.build_all == 'true' && format('{0}/{1}/vulhunter-flow-parser-runner:latest', env.GHCR_REGISTRY, env.VULHUNTER_IMAGE_NAMESPACE) || '' }}
          cache-from: type=gha,scope=flow-parser-runner
          cache-to: type=gha,mode=max,scope=flow-parser-runner

      - name: 构建并推送 PMD runner Docker 镜像
        if: ${{ steps.image-tag.outputs.build_all == 'true' || github.event.inputs.build_pmd_runner == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/pmd-runner.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-pmd-runner:${{ steps.image-tag.outputs.tag }}
            ${{ steps.image-tag.outputs.build_all == 'true' && format('{0}/{1}/vulhunter-pmd-runner:latest', env.GHCR_REGISTRY, env.VULHUNTER_IMAGE_NAMESPACE) || '' }}
          cache-from: type=gha,scope=pmd-runner
          cache-to: type=gha,mode=max,scope=pmd-runner

      - name: 构建并推送沙箱 Docker 镜像
        if: ${{ steps.image-tag.outputs.build_all == 'true' || github.event.inputs.build_sandbox == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/sandbox.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-sandbox:${{ steps.image-tag.outputs.tag }}
            ${{ steps.image-tag.outputs.build_all == 'true' && format('{0}/{1}/vulhunter-sandbox:latest', env.GHCR_REGISTRY, env.VULHUNTER_IMAGE_NAMESPACE) || '' }}
          cache-from: type=gha,scope=sandbox
          cache-to: type=gha,mode=max,scope=sandbox

      - name: 构建并推送 sandbox-runner Docker 镜像
        if: ${{ steps.image-tag.outputs.build_all == 'true' || github.event.inputs.build_sandbox_runner == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/sandbox-runner.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-sandbox-runner:${{ steps.image-tag.outputs.tag }}
            ${{ steps.image-tag.outputs.build_all == 'true' && format('{0}/{1}/vulhunter-sandbox-runner:latest', env.GHCR_REGISTRY, env.VULHUNTER_IMAGE_NAMESPACE) || '' }}
          cache-from: type=gha,scope=sandbox-runner
          cache-to: type=gha,mode=max,scope=sandbox-runner

      - name: 构建并推送 nexus-web Docker 镜像
        if: ${{ github.event.inputs.build_nexus_web == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ./nexus-web/src
          file: ./nexus-web/src/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.NEXUS_WEB_IMAGE_NAMESPACE }}/nexus-web:${{ steps.image-tag.outputs.tag }}
          cache-from: type=gha,scope=nexus-web
          cache-to: type=gha,mode=max,scope=nexus-web

      - name: 验证 GHCR 匿名拉取
        shell: bash
        run: |
          set -euo pipefail
          images=()

          add_image() {
            images+=("$1")
          }

          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_frontend }}" == "true" ]; then
            add_image "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-frontend:${{ steps.image-tag.outputs.tag }}"
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_backend }}" == "true" ]; then
            add_image "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-backend:${{ steps.image-tag.outputs.tag }}"
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_yasa_runner }}" == "true" ]; then
            add_image "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-yasa-runner:${{ steps.image-tag.outputs.tag }}"
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_opengrep_runner }}" == "true" ]; then
            add_image "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-opengrep-runner:${{ steps.image-tag.outputs.tag }}"
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_bandit_runner }}" == "true" ]; then
            add_image "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-bandit-runner:${{ steps.image-tag.outputs.tag }}"
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_gitleaks_runner }}" == "true" ]; then
            add_image "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-gitleaks-runner:${{ steps.image-tag.outputs.tag }}"
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_phpstan_runner }}" == "true" ]; then
            add_image "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-phpstan-runner:${{ steps.image-tag.outputs.tag }}"
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_flow_parser_runner }}" == "true" ]; then
            add_image "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-flow-parser-runner:${{ steps.image-tag.outputs.tag }}"
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_pmd_runner }}" == "true" ]; then
            add_image "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-pmd-runner:${{ steps.image-tag.outputs.tag }}"
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_sandbox }}" == "true" ]; then
            add_image "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-sandbox:${{ steps.image-tag.outputs.tag }}"
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_sandbox_runner }}" == "true" ]; then
            add_image "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-sandbox-runner:${{ steps.image-tag.outputs.tag }}"
          fi
          if [ "${{ github.event.inputs.build_nexus_web }}" == "true" ]; then
            add_image "${GHCR_REGISTRY}/${NEXUS_WEB_IMAGE_NAMESPACE}/nexus-web:${{ steps.image-tag.outputs.tag }}"
          fi

          docker logout ghcr.io || true

          for image in "${images[@]}"; do
            echo "Verifying anonymous pull access for ${image}"
            if ! docker manifest inspect "${image}" >/dev/null; then
              echo "::error::Anonymous pull check failed for ${image}. Ensure the package exists, uses the expected namespace, and is public."
              exit 1
            fi
          done

      - name: 输出镜像信息
        run: |
          echo "## 镜像已推送到 GHCR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_frontend }}" == "true" ]; then
            echo "- \`${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-frontend:${{ steps.image-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_backend }}" == "true" ]; then
            echo "- \`${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-backend:${{ steps.image-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_yasa_runner }}" == "true" ]; then
            echo "- \`${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-yasa-runner:${{ steps.image-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_opengrep_runner }}" == "true" ]; then
            echo "- \`${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-opengrep-runner:${{ steps.image-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_bandit_runner }}" == "true" ]; then
            echo "- \`${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-bandit-runner:${{ steps.image-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_gitleaks_runner }}" == "true" ]; then
            echo "- \`${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-gitleaks-runner:${{ steps.image-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_phpstan_runner }}" == "true" ]; then
            echo "- \`${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-phpstan-runner:${{ steps.image-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_flow_parser_runner }}" == "true" ]; then
            echo "- \`${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-flow-parser-runner:${{ steps.image-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_pmd_runner }}" == "true" ]; then
            echo "- \`${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-pmd-runner:${{ steps.image-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_sandbox }}" == "true" ]; then
            echo "- \`${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-sandbox:${{ steps.image-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.image-tag.outputs.build_all }}" == "true" ] || [ "${{ github.event.inputs.build_sandbox_runner }}" == "true" ]; then
            echo "- \`${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-sandbox-runner:${{ steps.image-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.build_nexus_web }}" == "true" ]; then
            echo "- \`${{ env.GHCR_REGISTRY }}/${{ env.NEXUS_WEB_IMAGE_NAMESPACE }}/nexus-web:${{ steps.image-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
