name: Docker Publish Reusable

on:
  workflow_call:
    inputs:
      image_name:
        description: "镜像名，不含 registry/namespace/tag"
        required: true
        type: string
      context:
        description: "docker build context"
        required: true
        type: string
      file:
        description: "Dockerfile 路径"
        required: true
        type: string
      build_args:
        description: "多行 build args"
        required: false
        type: string
        default: ""
      platforms:
        description: "发布架构列表"
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      image_namespace:
        description: "GHCR namespace，留空时默认使用当前仓库 owner"
        required: false
        type: string
        default: ""
      package_visibility:
        description: "GHCR package visibility"
        required: false
        type: string
        default: "public"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GHCR_REGISTRY: ghcr.io
  VULHUNTER_IMAGE_NAMESPACE: ${{ inputs.image_namespace != '' && inputs.image_namespace || github.repository_owner }}
  GHCR_PACKAGE_VISIBILITY: ${{ inputs.package_visibility }}
  VULHUNTER_IMAGE_TAG: latest

jobs:
  build-and-publish:
    name: 发布 ${{ inputs.image_name }}
    runs-on: ubuntu-latest

    concurrency:
      group: docker-publish-${{ inputs.image_name }}-${{ github.ref_name }}
      cancel-in-progress: true

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: 校验 GHCR 发布凭据
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${VULHUNTER_IMAGE_NAMESPACE}" != "${GITHUB_REPOSITORY_OWNER}" ] && { [ -z "${GHCR_USERNAME}" ] || [ -z "${GHCR_TOKEN}" ]; }; then
            echo "::error::Publishing to ghcr.io/${VULHUNTER_IMAGE_NAMESPACE} from repository owner ${GITHUB_REPOSITORY_OWNER} requires GHCR_USERNAME and GHCR_TOKEN secrets."
            exit 1
          fi

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: 安装 Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.3"

      - name: 安装 Syft (SBOM 生成)
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: "v1.18.0"

      - name: 设置 QEMU
        if: contains(inputs.platforms, 'arm64')
        uses: docker/setup-qemu-action@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 构建并推送 Docker 镜像
        id: build-image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          push: true
          platforms: ${{ inputs.platforms }}
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/${{ inputs.image_name }}:${{ env.VULHUNTER_IMAGE_TAG }}
          cache-from: type=gha,scope=${{ inputs.image_name }}-latest
          cache-to: type=gha,mode=max,scope=${{ inputs.image_name }}-latest
          build-args: ${{ inputs.build_args }}

      - name: 签名并附加 SBOM
        env:
          DIGEST: ${{ steps.build-image.outputs.digest }}
          IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/${{ inputs.image_name }}
          TAG: ${{ env.VULHUNTER_IMAGE_TAG }}
          SBOM_PATH: /tmp/${{ inputs.image_name }}.spdx.json
        run: |
          cosign sign --yes "${IMAGE}:${TAG}@${DIGEST}"
          syft "${IMAGE}@${DIGEST}" -o spdx-json --file "${SBOM_PATH}"
          cosign attest --yes \
            --predicate "${SBOM_PATH}" \
            --type spdx \
            "${IMAGE}:${TAG}@${DIGEST}"

      - name: 设置并校验 GHCR 包可见性
        id: package-visibility
        if: env.GHCR_PACKAGE_VISIBILITY == 'public'
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
          PACKAGE_OWNER: ${{ env.VULHUNTER_IMAGE_NAMESPACE }}
          PACKAGE_NAME: ${{ inputs.image_name }}
        run: |
          set -euo pipefail

          echo "visibility=unknown" >> "$GITHUB_OUTPUT"
          package_endpoint=""

          if gh api --method PATCH "/orgs/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}" \
            -f visibility=public --silent 2>/dev/null; then
            echo "${PACKAGE_NAME} set to public successfully via org API"
            package_endpoint="/orgs/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}"
          elif gh api --method PATCH "/users/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}" \
            -f visibility=public --silent 2>/dev/null; then
            echo "${PACKAGE_NAME} set to public successfully via user API"
            package_endpoint="/users/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}"
          else
            echo "::warning::Could not set ${PACKAGE_NAME} to public via API (may already be public or require manual action)."
            if gh api --method GET "/orgs/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}" --silent >/dev/null 2>&1; then
              package_endpoint="/orgs/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}"
            elif gh api --method GET "/users/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}" --silent >/dev/null 2>&1; then
              package_endpoint="/users/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}"
            fi
          fi

          if [ -n "${package_endpoint}" ]; then
            visibility="$(gh api --method GET "${package_endpoint}" --jq '.visibility' 2>/dev/null || true)"
            if [ "${visibility}" = "public" ]; then
              echo "visibility=public" >> "$GITHUB_OUTPUT"
              echo "Verified ${PACKAGE_NAME} is public."
            elif [ -n "${visibility}" ]; then
              echo "visibility=${visibility}" >> "$GITHUB_OUTPUT"
              echo "::error::${PACKAGE_NAME} visibility is '${visibility}', so anonymous pulls will not work."
              exit 1
            else
              echo "::warning::Could not read ${PACKAGE_NAME} visibility via GitHub API. Skipping anonymous pull validation."
            fi
          else
            echo "::warning::Could not resolve GitHub Packages API endpoint for ${PACKAGE_NAME}. Skipping anonymous pull validation."
          fi

      - name: 验证 GHCR 匿名拉取
        if: env.GHCR_PACKAGE_VISIBILITY == 'public' && steps.package-visibility.outputs.visibility == 'public'
        env:
          IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/${{ inputs.image_name }}:${{ env.VULHUNTER_IMAGE_TAG }}
        run: |
          set -euo pipefail
          docker logout ghcr.io || true
          for attempt in 1 2 3; do
            if docker manifest inspect "${IMAGE}" >/dev/null 2>&1; then
              exit 0
            fi
            echo "Attempt ${attempt}/3 failed, waiting 20s before retry..."
            sleep 20
          done
          echo "::error::Anonymous pull check failed for ${IMAGE}. Ensure the package visibility allows anonymous pulls."
          exit 1

      - name: 跳过无法校验的匿名拉取验证
        if: env.GHCR_PACKAGE_VISIBILITY == 'public' && steps.package-visibility.outputs.visibility != 'public'
        run: |
          echo "Skipping anonymous pull validation because the workflow could not confirm that the package is public with the current GHCR credentials." >> "$GITHUB_STEP_SUMMARY"
          echo "If anonymous pulls are required, configure GHCR_TOKEN with package admin permissions or set the package visibility manually in GHCR." >> "$GITHUB_STEP_SUMMARY"

      - name: 跳过匿名拉取验证
        if: env.GHCR_PACKAGE_VISIBILITY != 'public'
        run: |
          echo "Skipping anonymous pull validation because GHCR package visibility is set to '${GHCR_PACKAGE_VISIBILITY}'." >> "$GITHUB_STEP_SUMMARY"

      - name: 输出镜像信息
        run: |
          echo "## 镜像已推送到 GHCR" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/${{ inputs.image_name }}:${{ env.VULHUNTER_IMAGE_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- package visibility: \`${{ env.GHCR_PACKAGE_VISIBILITY }}\`" >> "$GITHUB_STEP_SUMMARY"
