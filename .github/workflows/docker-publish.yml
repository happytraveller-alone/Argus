name: Docker Publish

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker-publish.yml"
      - ".dockerignore"
      - "docker/backend.Dockerfile"
      - "docker/frontend.Dockerfile"
      - "docker/opengrep-runner.Dockerfile"
      - "docker/opengrep-scan.sh"
      - "docker/codeql-runner.Dockerfile"
      - "docker/codeql-scan.sh"
      - "docker/codeql-compile-sandbox.sh"
      - "backend/Cargo.toml"
      - "backend/Cargo.lock"
      - "backend/assets/scan_rule_assets/**"
      - "backend/src/**"
      - "backend/scripts/**"
      - "backend/**"
      - "frontend/**"
      - "frontend/.dockerignore"
  workflow_dispatch:
    inputs:
      build_all:
        description: "构建全部容器镜像"
        required: false
        type: boolean
        default: false
      build_backend:
        description: "构建 backend 镜像"
        required: false
        type: boolean
        default: false
      build_frontend:
        description: "构建 frontend 镜像"
        required: false
        type: boolean
        default: false
      build_opengrep_runner:
        description: "构建 OpenGrep runner 镜像"
        required: false
        type: boolean
        default: false
      build_codeql_runner:
        description: "构建 CodeQL runner 镜像"
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GHCR_REGISTRY: ghcr.io
  GHCR_PACKAGE_VISIBILITY: public
  Argus_IMAGE_TAG: latest

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: docker-publish-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  plan-publish:
    name: 计算需要发布的容器镜像
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      selected_count: ${{ steps.plan.outputs.selected_count }}
      publish_summary_json: ${{ steps.plan.outputs.publish_summary_json }}

    steps:
      - name: 检出代码
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 检测容器相关变更
        if: ${{ github.event_name == 'push' }}
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - '.github/workflows/docker-publish.yml'
              - '.dockerignore'
              - 'docker/backend.Dockerfile'
              - 'backend/**'
            frontend:
              - '.github/workflows/docker-publish.yml'
              - '.dockerignore'
              - 'docker/frontend.Dockerfile'
              - 'frontend/**'
              - 'frontend/.dockerignore'
            opengrep_runner:
              - '.github/workflows/docker-publish.yml'
              - '.dockerignore'
              - 'backend/Cargo.toml'
              - 'backend/Cargo.lock'
              - 'backend/assets/scan_rule_assets/**'
              - 'backend/src/**'
              - 'docker/opengrep-runner.Dockerfile'
              - 'docker/opengrep-scan.sh'
            codeql_runner:
              - '.github/workflows/docker-publish.yml'
              - '.dockerignore'
              - 'backend/assets/scan_rule_assets/**'
              - 'docker/codeql-runner.Dockerfile'
              - 'docker/codeql-scan.sh'
              - 'docker/codeql-compile-sandbox.sh'

      - name: 生成发布矩阵
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          PUSH_BACKEND: ${{ steps.filter.outputs.backend || 'false' }}
          PUSH_FRONTEND: ${{ steps.filter.outputs.frontend || 'false' }}
          PUSH_OPENGREP_RUNNER: ${{ steps.filter.outputs.opengrep_runner || 'false' }}
          PUSH_CODEQL_RUNNER: ${{ steps.filter.outputs.codeql_runner || 'false' }}
          DISPATCH_BUILD_ALL: ${{ inputs.build_all || false }}
          DISPATCH_BUILD_BACKEND: ${{ inputs.build_backend || false }}
          DISPATCH_BUILD_FRONTEND: ${{ inputs.build_frontend || false }}
          DISPATCH_BUILD_OPENGREP_RUNNER: ${{ inputs.build_opengrep_runner || false }}
          DISPATCH_BUILD_CODEQL_RUNNER: ${{ inputs.build_codeql_runner || false }}
        run: |
          python3 - <<'PY'
          import json
          import os

          def is_true(name: str) -> bool:
              return os.environ.get(name, "").strip().lower() == "true"

          catalog = [
              {
                  "key": "backend",
                  "image_name": "argus-backend",
                  "context": ".",
                  "file": "./docker/backend.Dockerfile",
                  "platforms": "linux/amd64,linux/arm64",
                  "build_args": "DOCKERHUB_LIBRARY_MIRROR=docker.m.daocloud.io/library",
                  "push_env": "PUSH_BACKEND",
                  "dispatch_env": "DISPATCH_BUILD_BACKEND",
              },
              {
                  "key": "frontend",
                  "image_name": "argus-frontend",
                  "context": "./frontend",
                  "file": "./docker/frontend.Dockerfile",
                  "platforms": "linux/amd64,linux/arm64",
                  "build_args": "",
                  "push_env": "PUSH_FRONTEND",
                  "dispatch_env": "DISPATCH_BUILD_FRONTEND",
              },
              {
                  "key": "opengrep_runner",
                  "image_name": "argus-opengrep-runner",
                  "context": ".",
                  "file": "./docker/opengrep-runner.Dockerfile",
                  "platforms": "linux/amd64,linux/arm64",
                  "build_args": "",
                  "push_env": "PUSH_OPENGREP_RUNNER",
                  "dispatch_env": "DISPATCH_BUILD_OPENGREP_RUNNER",
              },
              {
                  "key": "codeql_runner",
                  "image_name": "argus-codeql-runner",
                  "context": ".",
                  "file": "./docker/codeql-runner.Dockerfile",
                  "platforms": "linux/amd64,linux/arm64",
                  "build_args": "",
                  "push_env": "PUSH_CODEQL_RUNNER",
                  "dispatch_env": "DISPATCH_BUILD_CODEQL_RUNNER",
              },
          ]

          event_name = os.environ["EVENT_NAME"]
          if event_name == "workflow_dispatch":
              build_all = is_true("DISPATCH_BUILD_ALL")
              selected = [
                  item
                  for item in catalog
                  if build_all or is_true(item["dispatch_env"])
              ]
          else:
              selected = [
                  item
                  for item in catalog
                  if is_true(item["push_env"])
              ]

          selected_images = [item["image_name"] for item in selected]
          published_images = [
              f"ghcr.io/{os.environ['REPOSITORY_OWNER']}/{image_name}:latest"
              for image_name in selected_images
          ]
          summary = {
              "schema_version": 1,
              "channel": "latest",
              "selected_images": selected_images,
              "published_images": published_images,
          }

          matrix = {
              "include": [
                  {
                      key: item[key]
                      for key in (
                          "key",
                          "image_name",
                          "context",
                          "file",
                          "platforms",
                          "build_args",
                      )
                  }
                  for item in selected
              ]
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"selected_count={len(selected)}\n")
              handle.write(
                  "matrix="
                  f"{json.dumps(matrix, separators=(',', ':'))}\n"
              )
              handle.write(
                  "publish_summary_json="
                  f"{json.dumps(summary, separators=(',', ':'))}\n"
              )
          PY

      - name: 输出计划摘要
        env:
          SELECTED_COUNT: ${{ steps.plan.outputs.selected_count }}
          PUBLISH_SUMMARY_JSON: ${{ steps.plan.outputs.publish_summary_json }}
        run: |
          echo "## Container publish plan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- selected_count: \`${SELECTED_COUNT}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- publish_summary_json: \`${PUBLISH_SUMMARY_JSON}\`" >> "$GITHUB_STEP_SUMMARY"

  publish-images:
    name: 发布 ${{ matrix.image_name }}
    needs: plan-publish
    if: ${{ needs.plan-publish.outputs.selected_count != '0' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-publish.outputs.matrix) }}

    env:
      Argus_IMAGE_NAMESPACE: ${{ github.repository_owner }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 校验 GHCR 发布凭据
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${Argus_IMAGE_NAMESPACE}" != "${GITHUB_REPOSITORY_OWNER}" ] && { [ -z "${GHCR_USERNAME}" ] || [ -z "${GHCR_TOKEN}" ]; }; then
            echo "::error::Publishing to ghcr.io/${Argus_IMAGE_NAMESPACE} from repository owner ${GITHUB_REPOSITORY_OWNER} requires GHCR_USERNAME and GHCR_TOKEN secrets."
            exit 1
          fi

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: 安装 Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.3"

      - name: 安装 Syft (SBOM 生成)
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: "v1.18.0"

      - name: 设置 QEMU
        if: contains(matrix.platforms, 'arm64')
        uses: docker/setup-qemu-action@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 构建并推送 Docker 镜像
        id: build-image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          platforms: ${{ matrix.platforms }}
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.Argus_IMAGE_NAMESPACE }}/${{ matrix.image_name }}:${{ env.Argus_IMAGE_TAG }}
          cache-from: type=gha,scope=${{ matrix.image_name }}-latest
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}-latest
          build-args: ${{ matrix.build_args }}

      - name: 签名并附加 SBOM
        env:
          DIGEST: ${{ steps.build-image.outputs.digest }}
          IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.Argus_IMAGE_NAMESPACE }}/${{ matrix.image_name }}
          TAG: ${{ env.Argus_IMAGE_TAG }}
          SBOM_PATH: /tmp/${{ matrix.image_name }}.spdx.json
        run: |
          cosign sign --yes "${IMAGE}:${TAG}@${DIGEST}"
          syft "${IMAGE}@${DIGEST}" -o spdx-json --file "${SBOM_PATH}"
          cosign attest --yes \
            --predicate "${SBOM_PATH}" \
            --type spdx \
            "${IMAGE}:${TAG}@${DIGEST}"

      - name: 设置并校验 GHCR 包可见性
        id: package-visibility
        if: env.GHCR_PACKAGE_VISIBILITY == 'public'
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
          PACKAGE_OWNER: ${{ env.Argus_IMAGE_NAMESPACE }}
          PACKAGE_NAME: ${{ matrix.image_name }}
        run: |
          set -euo pipefail

          echo "visibility=unknown" >> "$GITHUB_OUTPUT"
          package_endpoint=""

          if gh api --method PATCH "/orgs/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}" \
            -f visibility=public --silent 2>/dev/null; then
            echo "${PACKAGE_NAME} set to public successfully via org API"
            package_endpoint="/orgs/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}"
          elif gh api --method PATCH "/users/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}" \
            -f visibility=public --silent 2>/dev/null; then
            echo "${PACKAGE_NAME} set to public successfully via user API"
            package_endpoint="/users/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}"
          else
            echo "::warning::Could not set ${PACKAGE_NAME} to public via API (may already be public or require manual action)."
            if gh api --method GET "/orgs/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}" --silent >/dev/null 2>&1; then
              package_endpoint="/orgs/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}"
            elif gh api --method GET "/users/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}" --silent >/dev/null 2>&1; then
              package_endpoint="/users/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}"
            fi
          fi

          if [ -n "${package_endpoint}" ]; then
            visibility="$(gh api --method GET "${package_endpoint}" --jq '.visibility' 2>/dev/null || true)"
            if [ "${visibility}" = "public" ]; then
              echo "visibility=public" >> "$GITHUB_OUTPUT"
              echo "Verified ${PACKAGE_NAME} is public."
            elif [ -n "${visibility}" ]; then
              echo "visibility=${visibility}" >> "$GITHUB_OUTPUT"
              echo "::warning::${PACKAGE_NAME} visibility is '${visibility}', so anonymous pull validation will be skipped."
            else
              echo "::warning::Could not read ${PACKAGE_NAME} visibility via GitHub API. Skipping anonymous pull validation."
            fi
          else
            echo "::warning::Could not resolve GitHub Packages API endpoint for ${PACKAGE_NAME}. Skipping anonymous pull validation."
          fi

      - name: 验证 GHCR 匿名拉取
        if: env.GHCR_PACKAGE_VISIBILITY == 'public' && steps.package-visibility.outputs.visibility == 'public'
        env:
          IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.Argus_IMAGE_NAMESPACE }}/${{ matrix.image_name }}:${{ env.Argus_IMAGE_TAG }}
        run: |
          set -euo pipefail
          docker logout ghcr.io || true
          for attempt in 1 2 3; do
            if docker manifest inspect "${IMAGE}" >/dev/null 2>&1; then
              exit 0
            fi
            echo "Attempt ${attempt}/3 failed, waiting 20s before retry..."
            sleep 20
          done
          echo "::error::Anonymous pull check failed for ${IMAGE}. Ensure the package visibility allows anonymous pulls."
          exit 1

      - name: 跳过无法校验的匿名拉取验证
        if: env.GHCR_PACKAGE_VISIBILITY == 'public' && steps.package-visibility.outputs.visibility != 'public'
        run: |
          echo "Skipping anonymous pull validation because the workflow could not confirm that the package is public with the current GHCR credentials." >> "$GITHUB_STEP_SUMMARY"
          echo "If anonymous pulls are required, configure GHCR_TOKEN with package admin permissions or set the package visibility manually in GHCR." >> "$GITHUB_STEP_SUMMARY"

      - name: 跳过匿名拉取验证
        if: env.GHCR_PACKAGE_VISIBILITY != 'public'
        run: |
          echo "Skipping anonymous pull validation because GHCR package visibility is set to '${GHCR_PACKAGE_VISIBILITY}'." >> "$GITHUB_STEP_SUMMARY"

      - name: 输出镜像信息
        run: |
          echo "## 镜像已推送到 GHCR" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.GHCR_REGISTRY }}/${{ env.Argus_IMAGE_NAMESPACE }}/${{ matrix.image_name }}:${{ env.Argus_IMAGE_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- package visibility: \`${{ env.GHCR_PACKAGE_VISIBILITY }}\`" >> "$GITHUB_STEP_SUMMARY"

  nothing-to-publish:
    name: 无需发布
    needs: plan-publish
    if: ${{ needs.plan-publish.outputs.selected_count == '0' }}
    runs-on: ubuntu-latest

    steps:
      - name: 输出跳过说明
        run: |
          echo "## 无需发布" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- 本次触发没有选中任何需要构建的容器镜像。" >> "$GITHUB_STEP_SUMMARY"

  publish-summary:
    name: 汇总发布结果
    needs:
      - plan-publish
      - publish-images
      - nothing-to-publish
    if: ${{ always() }}
    runs-on: ubuntu-latest

    steps:
      - name: 输出发布摘要
        env:
          SELECTED_COUNT: ${{ needs.plan-publish.outputs.selected_count }}
          PUBLISH_SUMMARY_JSON: ${{ needs.plan-publish.outputs.publish_summary_json }}
        run: |
          echo "## Runtime image publish summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- selected_count: \`${SELECTED_COUNT}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- publish_summary_json: \`${PUBLISH_SUMMARY_JSON}\`" >> "$GITHUB_STEP_SUMMARY"
