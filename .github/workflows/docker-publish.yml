name: Docker Publish

# 只构建并推送 Docker 镜像，不创建 Release 或 Tag
on:
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签 (例如: latest, dev, v3.0.0)'
        required: true
        default: 'latest'
        type: string
      build_frontend:
        description: '构建前端镜像'
        required: false
        type: boolean
        default: true
      build_backend:
        description: '构建后端镜像'
        required: false
        type: boolean
        default: true
      build_yasa_runner:
        description: '构建 YASA runner 镜像'
        required: false
        type: boolean
        default: true
      build_opengrep_runner:
        description: '构建 OpenGrep runner 镜像'
        required: false
        type: boolean
        default: true
      build_bandit_runner:
        description: '构建 Bandit runner 镜像'
        required: false
        type: boolean
        default: true
      build_gitleaks_runner:
        description: '构建 Gitleaks runner 镜像'
        required: false
        type: boolean
        default: true
      build_phpstan_runner:
        description: '构建 PHPStan runner 镜像'
        required: false
        type: boolean
        default: true
      build_flow_parser_runner:
        description: '构建 flow/parser runner 镜像'
        required: false
        type: boolean
        default: true
      build_pmd_runner:
        description: '构建 PMD runner 镜像'
        required: false
        type: boolean
        default: true
      build_sandbox:
        description: '构建沙箱镜像'
        required: false
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Node.js
        if: ${{ github.event.inputs.build_frontend == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: 安装 pnpm
        if: ${{ github.event.inputs.build_frontend == 'true' }}
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: 安装前端依赖
        if: ${{ github.event.inputs.build_frontend == 'true' }}
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: 构建前端项目
        if: ${{ github.event.inputs.build_frontend == 'true' }}
        working-directory: ./frontend
        run: pnpm build
        env:
          VITE_USE_LOCAL_DB: 'true'

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 构建并推送前端 Docker 镜像
        if: ${{ github.event.inputs.build_frontend == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./docker/frontend.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/vulhunter-frontend:${{ github.event.inputs.tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: 构建并推送后端 Docker 镜像
        if: ${{ github.event.inputs.build_backend == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/backend.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/vulhunter-backend:${{ github.event.inputs.tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: 构建并推送 YASA runner Docker 镜像
        if: ${{ github.event.inputs.build_yasa_runner == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/yasa-runner.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/vulhunter-yasa-runner:${{ github.event.inputs.tag }}
          cache-from: type=gha,scope=yasa-runner
          cache-to: type=gha,mode=max,scope=yasa-runner

      - name: 构建并推送 OpenGrep runner Docker 镜像
        if: ${{ github.event.inputs.build_opengrep_runner == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/opengrep-runner.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/vulhunter-opengrep-runner:${{ github.event.inputs.tag }}
          cache-from: type=gha,scope=opengrep-runner
          cache-to: type=gha,mode=max,scope=opengrep-runner

      - name: 构建并推送 Bandit runner Docker 镜像
        if: ${{ github.event.inputs.build_bandit_runner == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/bandit-runner.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/vulhunter-bandit-runner:${{ github.event.inputs.tag }}
          cache-from: type=gha,scope=bandit-runner
          cache-to: type=gha,mode=max,scope=bandit-runner

      - name: 构建并推送 Gitleaks runner Docker 镜像
        if: ${{ github.event.inputs.build_gitleaks_runner == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/gitleaks-runner.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/vulhunter-gitleaks-runner:${{ github.event.inputs.tag }}
          cache-from: type=gha,scope=gitleaks-runner
          cache-to: type=gha,mode=max,scope=gitleaks-runner

      - name: 构建并推送 PHPStan runner Docker 镜像
        if: ${{ github.event.inputs.build_phpstan_runner == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/phpstan-runner.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/vulhunter-phpstan-runner:${{ github.event.inputs.tag }}
          cache-from: type=gha,scope=phpstan-runner
          cache-to: type=gha,mode=max,scope=phpstan-runner

      - name: 构建并推送 flow/parser runner Docker 镜像
        if: ${{ github.event.inputs.build_flow_parser_runner == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/flow-parser-runner.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/vulhunter-flow-parser-runner:${{ github.event.inputs.tag }}
          cache-from: type=gha,scope=flow-parser-runner
          cache-to: type=gha,mode=max,scope=flow-parser-runner

      - name: 构建并推送 PMD runner Docker 镜像
        if: ${{ github.event.inputs.build_pmd_runner == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/pmd-runner.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/vulhunter-pmd-runner:${{ github.event.inputs.tag }}
          cache-from: type=gha,scope=pmd-runner
          cache-to: type=gha,mode=max,scope=pmd-runner

      - name: 构建并推送沙箱 Docker 镜像
        if: ${{ github.event.inputs.build_sandbox == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ./docker/sandbox
          file: ./docker/sandbox/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/vulhunter-sandbox:${{ github.event.inputs.tag }}
          cache-from: type=gha,scope=sandbox
          cache-to: type=gha,mode=max,scope=sandbox

      - name: 输出镜像信息
        run: |
          echo "## 镜像已推送到 GHCR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.build_frontend }}" == "true" ]; then
            echo "- \`ghcr.io/${{ github.repository_owner }}/vulhunter-frontend:${{ github.event.inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.build_backend }}" == "true" ]; then
            echo "- \`ghcr.io/${{ github.repository_owner }}/vulhunter-backend:${{ github.event.inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.build_yasa_runner }}" == "true" ]; then
            echo "- \`ghcr.io/${{ github.repository_owner }}/vulhunter-yasa-runner:${{ github.event.inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.build_opengrep_runner }}" == "true" ]; then
            echo "- \`ghcr.io/${{ github.repository_owner }}/vulhunter-opengrep-runner:${{ github.event.inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.build_bandit_runner }}" == "true" ]; then
            echo "- \`ghcr.io/${{ github.repository_owner }}/vulhunter-bandit-runner:${{ github.event.inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.build_gitleaks_runner }}" == "true" ]; then
            echo "- \`ghcr.io/${{ github.repository_owner }}/vulhunter-gitleaks-runner:${{ github.event.inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.build_phpstan_runner }}" == "true" ]; then
            echo "- \`ghcr.io/${{ github.repository_owner }}/vulhunter-phpstan-runner:${{ github.event.inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.build_flow_parser_runner }}" == "true" ]; then
            echo "- \`ghcr.io/${{ github.repository_owner }}/vulhunter-flow-parser-runner:${{ github.event.inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.build_pmd_runner }}" == "true" ]; then
            echo "- \`ghcr.io/${{ github.repository_owner }}/vulhunter-pmd-runner:${{ github.event.inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.build_sandbox }}" == "true" ]; then
            echo "- \`ghcr.io/${{ github.repository_owner }}/vulhunter-sandbox:${{ github.event.inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
