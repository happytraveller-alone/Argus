name: Docker Publish Frontend

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker-publish.yml"
      - ".github/workflows/publish-runtime-images.yml"
      - ".github/workflows/docker-publish-frontend.yml"
      - ".dockerignore"
      - "docker/frontend.Dockerfile"
      - "frontend/**"
      - "frontend/.dockerignore"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish-frontend:
    uses: ./.github/workflows/publish-runtime-images.yml
    with:
      build_backend: false
      build_frontend: true
      build_opengrep_runner: false
      build_flow_parser_runner: false
      build_sandbox_runner: false
    secrets: inherit
