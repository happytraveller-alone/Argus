name: Docker Publish Runners

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker-publish.yml"
      - ".github/workflows/publish-runtime-images.yml"
      - ".github/workflows/docker-publish-runners.yml"
      - ".dockerignore"
      - "docker/opengrep-runner.Dockerfile"
      - "docker/opengrep-scan.sh"
      - "docker/flow-parser-runner.Dockerfile"
      - "docker/flow-parser-runner.requirements.txt"
      - "docker/sandbox-runner.Dockerfile"
      - "backend/Cargo.toml"
      - "backend/Cargo.lock"
      - "backend/assets/scan_rule_assets/**"
      - "backend/src/**"
      - "backend/scripts/**"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  detect-runner-changes:
    name: 计算需要发布的 runner 镜像
    runs-on: ubuntu-latest

    outputs:
      opengrep_runner: ${{ steps.filter.outputs.opengrep_runner || 'false' }}
      flow_parser_runner: ${{ steps.filter.outputs.flow_parser_runner || 'false' }}
      sandbox_runner: ${{ steps.filter.outputs.sandbox_runner || 'false' }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 检测 runner 相关变更
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            opengrep_runner:
              - '.github/workflows/docker-publish.yml'
              - '.github/workflows/publish-runtime-images.yml'
              - '.github/workflows/docker-publish-runners.yml'
              - '.dockerignore'
              - 'backend/Cargo.toml'
              - 'backend/Cargo.lock'
              - 'backend/assets/scan_rule_assets/**'
              - 'backend/src/**'
              - 'docker/opengrep-runner.Dockerfile'
              - 'docker/opengrep-scan.sh'
            flow_parser_runner:
              - '.github/workflows/docker-publish.yml'
              - '.github/workflows/publish-runtime-images.yml'
              - '.github/workflows/docker-publish-runners.yml'
              - '.dockerignore'
              - 'docker/flow-parser-runner.Dockerfile'
              - 'docker/flow-parser-runner.requirements.txt'
              - 'backend/scripts/**'
            sandbox_runner:
              - '.github/workflows/docker-publish.yml'
              - '.github/workflows/publish-runtime-images.yml'
              - '.github/workflows/docker-publish-runners.yml'
              - '.dockerignore'
              - 'docker/sandbox-runner.Dockerfile'

  publish-runners:
    name: 发布选中的 runner 镜像
    needs: detect-runner-changes
    if: ${{ needs.detect-runner-changes.outputs.opengrep_runner == 'true' || needs.detect-runner-changes.outputs.flow_parser_runner == 'true' || needs.detect-runner-changes.outputs.sandbox_runner == 'true' }}
    uses: ./.github/workflows/publish-runtime-images.yml
    with:
      build_backend: false
      build_frontend: false
      build_opengrep_runner: ${{ needs.detect-runner-changes.outputs.opengrep_runner == 'true' }}
      build_flow_parser_runner: ${{ needs.detect-runner-changes.outputs.flow_parser_runner == 'true' }}
      build_sandbox_runner: ${{ needs.detect-runner-changes.outputs.sandbox_runner == 'true' }}
    secrets: inherit

  nothing-to-publish:
    name: 无需发布
    needs: detect-runner-changes
    if: ${{ needs.detect-runner-changes.outputs.opengrep_runner != 'true' && needs.detect-runner-changes.outputs.flow_parser_runner != 'true' && needs.detect-runner-changes.outputs.sandbox_runner != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: 输出跳过说明
        run: |
          echo "## 无需发布" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- 本次触发没有命中任何需要构建的 runner 镜像。" >> "$GITHUB_STEP_SUMMARY"
