name: Docker Publish Backend

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker-publish.yml"
      - ".github/workflows/publish-runtime-images.yml"
      - ".github/workflows/docker-publish-backend.yml"
      - ".dockerignore"
      - "docker/backend.Dockerfile"
      - "backend/**"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish-backend:
    uses: ./.github/workflows/publish-runtime-images.yml
    with:
      build_backend: true
      build_frontend: false
      build_opengrep_runner: false
      build_flow_parser_runner: false
      build_sandbox_runner: false
    secrets: inherit
