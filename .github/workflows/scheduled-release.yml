name: 定时发布

on:
  schedule:
    - cron: '0 0 1 * *'

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish-latest-images:
    name: 刷新 latest 镜像
    uses: ./.github/workflows/publish-runtime-images.yml
    with:
      build_backend: false
      build_frontend: false
      build_opengrep_runner: true
      build_flow_parser_runner: true
      build_sandbox_runner: true
    secrets: inherit
