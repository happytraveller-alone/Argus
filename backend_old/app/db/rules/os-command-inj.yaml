rules:
- id: os-command-inj
  severity: WARNING
  metadata:
    author: Maurizio Siddu
    confidence: high
    cwe:
    - 'CWE-78: OS Command Injection'
    - 'CWE-77: Command Injection'
    - 'CWE-20: Improper Input Validation'
  references:
  - https://owasp.org/www-community/attacks/Command_Injection
  - https://cwe.mitre.org/data/definitions/77.html
  category: security
  message: Detected COBOL code that seems vulnerable to Command Injection, because
    unvalidated user input is passed to call a SYSTEM command. It is recommended to
    perform a proper data validation before process user controlled input.
  languages:
  - generic
  options:
    generic_engine: aliengrep
    generic_multiline: true
    generic_extra_word_characters:
    - '-'
    generic_caseless: true
  paths:
    include:
    - '*.cbl'
    - '*.cob'
    - '*.ccp'
    - '*.cpy'
    - '*.sqb'
  patterns:
  - pattern-either:
    - patterns:
      - pattern: ACCEPT $INPUT ... CALL "$OS" USING $INPUT
      - metavariable-regex:
          metavariable: $OS
          regex: (?i)(\bSYSTEM\b)
      - metavariable-regex:
          metavariable: $INPUT
          regex: ([A-Za-z0-9\-]+)
    - patterns:
      - pattern: ACCEPT $INPUT ... CALL '$OS' USING $INPUT
      - metavariable-regex:
          metavariable: $OS
          regex: (?i)(\bSYSTEM\b)
      - metavariable-regex:
          metavariable: $INPUT
          regex: ([A-Za-z0-9\-]+)
    - patterns:
      - pattern: ACCEPT $INPUT ... CALL "$OS" USING ..., $INPUT
      - metavariable-regex:
          metavariable: $OS
          regex: (?i)(\bSYSTEM\b)
      - metavariable-regex:
          metavariable: $INPUT
          regex: ([A-Za-z0-9\-]+)
    - patterns:
      - pattern: ACCEPT $INPUT ... CALL '$OS' USING ..., $INPUT
      - metavariable-regex:
          metavariable: $OS
          regex: (?i)(\bSYSTEM\b)
      - metavariable-regex:
          metavariable: $INPUT
          regex: ([A-Za-z0-9\-]+)
    - patterns:
      - pattern: ACCEPT $INPUT ... CALL "$OS" USING ..., ..., $INPUT
      - metavariable-regex:
          metavariable: $OS
          regex: (?i)(\bSYSTEM\b)
      - metavariable-regex:
          metavariable: $INPUT
          regex: ([A-Za-z0-9\-]+)
    - patterns:
      - pattern: ACCEPT $INPUT ... CALL '$OS' USING ..., ..., $INPUT
      - metavariable-regex:
          metavariable: $OS
          regex: (?i)(\bSYSTEM\b)
      - metavariable-regex:
          metavariable: $INPUT
          regex: ([A-Za-z0-9\-]+)
    - patterns:
      - pattern-inside: 'ACCEPT $INPUT

          ...

          STRING ... $INPUT... INTO $CMD

          ...

          CALL "$OS" USING $CMD

          '
      - metavariable-regex:
          metavariable: $OS
          regex: (?i)(\bSYSTEM\b)
      - metavariable-regex:
          metavariable: $INPUT
          regex: ([A-Za-z0-9\-]+)
      - metavariable-regex:
          metavariable: $CMD
          regex: ([A-Za-z0-9\-]+)
    - patterns:
      - pattern-inside: 'ACCEPT $INPUT

          ...

          STRING ... $INPUT... INTO $CMD

          ...

          CALL ''$OS'' USING $CMD

          '
      - metavariable-regex:
          metavariable: $OS
          regex: (?i)(\bSYSTEM\b)
      - metavariable-regex:
          metavariable: $INPUT
          regex: ([A-Za-z0-9\-]+)
      - metavariable-regex:
          metavariable: $CMD
          regex: ([A-Za-z0-9\-]+)
