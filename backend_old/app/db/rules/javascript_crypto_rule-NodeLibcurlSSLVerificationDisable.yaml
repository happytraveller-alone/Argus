rules:
- id: javascript_crypto_rule-NodeLibcurlSSLVerificationDisable
  languages:
  - javascript
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-either:
      - pattern-inside: '$Y = require(''node-libcurl'')

          ...

          '
      - pattern-inside: 'import { $Y } from ''node-libcurl''

          ...

          '
      - pattern-inside: 'import { $K as $Y } from ''node-libcurl''

          ...

          '
    - pattern: '$X = new $Y()

        '
  pattern-sinks:
  - patterns:
    - pattern-either:
      - pattern: '$X.setOpt($SSL, 0)

          '
      - pattern: '$X.setOpt($SSL, false)

          '
    - metavariable-pattern:
        metavariable: $SSL
        pattern-either:
        - pattern: '"SSL_VERIFYHOST"

            '
        - pattern: '"SSL_VERIFYPEER"

            '
        - pattern: '$Y.option.SSL_VERIFYHOST

            '
        - pattern: '$Y.option.SSL_VERIFYPEER

            '
  message: "The application was identified disabling the `SSL_VERIFYPEER` and/or the\
    \ \n`SSL_VERIFYHOST` options of the node-libcurl library. These options control\
    \ \nthe verification process of SSL/TLS certificates and hostnames. \n\n- SSL_VERIFYPEER:\
    \ This option, when enabled, ensures that the SSL certificate \npresented by the\
    \ server is valid and trusted by a Certificate Authority (CA) \nthat the client\
    \ also trusts. This is crucial for verifying that the server with \nwhich the\
    \ client is connecting is authenticated and its certificate is not forged.\n-\
    \ SSL_VERIFYHOST: This option, when enabled, makes sure that the certificate's\
    \ \ncommon name (CN) or one of its subject alternative names (SANs) matches the\
    \ \nhost name in the URL being connected . This is essential for ensuring that\
    \ \nthe client is communicating with the correct server and not another server\
    \ \npresenting a valid certificate.\n\nDisabling these options compromises the\
    \ security of SSL/TLS connections. It \nexposes the application to MITM attacks,\
    \ where an attacker could intercept, \nread, or modify the data sent and received\
    \ over what is assumed to be a secure \nconnection.\n\nMitigation Strategy:\n\
    To mitigate this vulnerability and ensure secure communication, enable SSL/TLS\
    \ \ncertificate and hostname verification by setting `SSL_VERIFYPEER` to `1` or\
    \ \n`true` and `SSL_VERIFYHOST` to `2`. These options are enabled by default as\
    \ \nwell. This configuration ensures that the server's SSL certificate is validated\
    \ \nagainst trusted CAs and that the hostname in the certificate matches the hostname\
    \ \nthe client intends to communicate with.\n\nSecure Code Example:\n```\nconst\
    \ { Curl } = require('node-libcurl')\nconst curl = new Curl()\ncurl.setOpt('SSL_VERIFYPEER',\
    \ 1)\ncurl.setOpt('SSL_VERIFYHOST', 2)\ncurl.setOpt('URL', 'https://yourserver.com:443')\n\
    ```\n"
  severity: WARNING
  metadata:
    owasp:
    - A6:2017-Security Misconfiguration
    - A05:2021-Security Misconfiguration
    cwe: CWE-599
    shortDescription: Missing validation of OpenSSL certificate
    security-severity: MEDIUM
    category: security
