rules:
- id: csharp_injection_rule-XPathInjection_1
  languages:
  - csharp
  patterns:
  - pattern-inside: 'using System.Xml;

      ...

      '
  - pattern-either:
    - patterns:
      - metavariable-regex:
          metavariable: $FUNC
          regex: ^(SelectNodes|SelectSingleNode|Compile|Evaluate|Matches|Select|SelectAncestors|SelectChildren|SelectDescendants)$
      - metavariable-regex:
          metavariable: $TY
          regex: ^(XPathNavigator|XmlDocument|XmlNode|XmlDocumentXPathExtensions)$
      - pattern: ($TY $VAR).$FUNC(<...$ARG...>, ...)
      - pattern-not: ($TY $VAR).$FUNC("...", ...)
    - patterns:
      - pattern-inside: 'using System.Xml.Linq;

          ...

          '
      - metavariable-regex:
          metavariable: $FUNC
          regex: ^(XPathEvaluate|XPathSelectElement|XPathSelectElements)$
      - pattern: $VAR.$FUNC(<...$ARG...>, ...)
      - pattern-not: $VAR.$FUNC("...", ...)
    - patterns:
      - pattern-inside: 'using System.Xml.Schema;

          ...

          '
      - pattern-either:
        - patterns:
          - pattern: $VAR.XPath = <...$ARG...>;
          - pattern-not: $VAR.XPath = "..."
        - patterns:
          - pattern: new XmlSchemaXPath { XPath = <...$ARG...> };
          - focus-metavariable: $ARG
  message: "XPath injection is a vulnerability that can allow an adversary to inject\
    \ or modify how an XML\nquery\nis structured. Depending on the logic of the original\
    \ query, this could lead to adversaries\nextracting unauthorized information or\
    \ in rare cases bypassing authorization checks.\n\nIt is recommended that LINQ\
    \ to XML is used instead of XPath for querying XML documents. Care\nmust be taken\
    \ to **not** call these LINQ functions with user input as they can still lead\
    \ to\nXPath\ninjection:\n\n- `XPathEvaluate`\n- `XPathSelectElement`\n- `XPathSelectElements`\n\
    \nExample using LINQ to XML to safely extract the first user from a list of users:\n\
    ```\n// XDocument is safe from XXE attacks as the resolver is disabled by default\n\
    XDocument doc = XDocument.Load(\"users.xml\");\nXNamespace ns = \"urn:users-schema\"\
    ;\n\nstring userInput = \"LastName\";\n\n// Get all the users.\nvar user = doc.Descendants(ns\
    \ + \"user\")\n               .Select(u => new {\n                  FirstName\
    \ = (string)u.Element(ns + \"first-name\"),\n                  LastName = (string)u.Element(ns\
    \ + \"last-name\")\n               }).Where(u => u.LastName == userInput).FirstOrDefault();\n\
    \nConsole.WriteLine(user.FirstName + \" \" + user.LastName);\n```\n\nFor more\
    \ information on LINQ to XML security see:\nhttps://learn.microsoft.com/en-us/dotnet/standard/linq/linq-xml-security\n\
    \nFor more information on XML security see OWASP's guide:\nhttps://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html#net\n"
  severity: INFO
  metadata:
    shortDescription: Improper neutralization of data within XPath expressions ('XPath
      Injection')
    category: security
    cwe: CWE-643
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: Medium
