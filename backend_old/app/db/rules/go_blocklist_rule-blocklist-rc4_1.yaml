rules:
- id: go_blocklist_rule-blocklist-rc4_1
  languages:
  - go
  patterns:
  - pattern: 'import "crypto/rc4"

      '
  message: "The RC4 stream-cipher has been cryptographically broken and is unsuitable\n\
    for use in production. It is recommended that ChaCha20 or Advanced Encryption\n\
    Standard (AES) be used instead. Consider using `XChaCha20Poly1305` or `AES-256-GCM`.\n\
    \nFor older applications, `AES-256-GCM` is recommended, however it has many drawbacks:\n\
    - Slower than `XChaCha20Poly1305`\n- Smaller nonce value size compared to `XChaCha20Poly1305`\n\
    - Catastrophic failure if nonce values are re-used\n\nExample using\n[XChaCha20Poly1305](https://pkg.go.dev/golang.org/x/crypto/chacha20poly1305#NewX):\n\
    ```\nkey := make([]byte, chacha20poly1305.KeySize)\nif _, err := io.ReadFull(rand.Reader,\
    \ key); err != nil {\n  log.Fatal(err)\n}\n\n// NewX is a variant that uses longer\
    \ nonce values for better security\naead, err := chacha20poly1305.NewX(key)\n\
    if err != nil {\n  log.Fatal(err)\n}\n\nvar encrypted = []byte{}\nvar nonce =\
    \ []byte{}\n\n// Encryption routine\n{\n  msg := []byte(\"Some secret message\"\
    )\n  nonce = make([]byte, aead.NonceSize())\n  if _, err := io.ReadFull(rand.Reader,\
    \ nonce); err != nil {\n    log.Fatal(\"failed to generate nonce\")\n  }\n\n \
    \ encrypted = aead.Seal(nil, nonce, msg, nil)\n}\n\n// Decryption routine\n{\n\
    \  if len(encrypted) < aead.NonceSize() {\n    log.Fatal(\"incorrect ciphertext\
    \ length\")\n  }\n\n  msg, err := aead.Open(nil, nonce, encrypted, nil)\n  if\
    \ err != nil {\n    log.Fatal(err)\n  }\n  fmt.Printf(\"Decrypted: %s\\n\", msg)\n\
    }\n```\n\nExample using [AES-256-GCM](https://pkg.go.dev/crypto/cipher#NewGCM):\n\
    ```\n// 32 byte keys will configure AES-256\nkey := make([]byte, 32)\nif _, err\
    \ := io.ReadFull(rand.Reader, key); err != nil {\n  log.Fatal(err)\n}\n\nblockCipher,\
    \ err := aes.NewCipher(key)\nif err != nil {\n  log.Fatal(err)\n}\n\naead, err\
    \ := cipher.NewGCM(blockCipher)\nif err != nil {\n  log.Fatal(err)\n}\n\nvar encrypted\
    \ = []byte{}\nvar nonce = []byte{}\n// Encryption routine\n{\n  msg := []byte(\"\
    Some secret message\")\n  // note that the key must be rotated every 2^32 random\
    \ nonces used otherwise\n  // cipher text could be repeated\n  nonce = make([]byte,\
    \ 12)\n  if _, err := io.ReadFull(rand.Reader, nonce); err != nil {\n    log.Fatal(err)\n\
    \  }\n  encrypted = aead.Seal(nil, nonce, msg, nil)\n}\n\n// Decryption routine\n\
    {\n  msg, err := aead.Open(nil, nonce, encrypted, nil)\n  if err != nil {\n  \
    \  log.Fatal(err)\n  }\n  fmt.Printf(\"Decrypted: %s\\n\", msg)\n}\n```\n"
  metadata:
    shortDescription: Use of a broken or risky cryptographic algorithm
    cwe: CWE-327
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    security-severity: Medium
    category: security
  severity: WARNING
