rules:
- id: scala_perm_rule-OverlyPermissiveFilePermissionObj_1
  languages:
  - scala
  message: 'Overly permissive file permission

    '
  metadata:
    category: security
    confidence: HIGH
    cwe: CWE-732
    shortDescription: Incorrect Permission Assignment for Critical Resource
    security-severity: Medium
  patterns:
  - pattern-inside: '...

      java.nio.file.Files.setPosixFilePermissions(..., $PERMS);

      '
  - pattern-either:
    - pattern: $PERMS.add($P);
    - pattern: $A = $B + $P;
  - metavariable-regex:
      metavariable: $P
      regex: (PosixFilePermission.){0,1}(OTHERS_)
  severity: WARNING
