rules:
- id: javascript_dos_rule-non-literal-regexp_1
  languages:
  - javascript
  - typescript
  pattern-either:
  - patterns:
    - pattern: 'new RegExp(...)

        '
    - pattern-not: 'new RegExp("...", ...)

        '
    - pattern-not: 'new RegExp(/.../, ...)

        '
  - patterns:
    - pattern: 'RegExp(...)

        '
    - pattern-not: 'RegExp("...", ...)

        '
    - pattern-not: 'RegExp(/.../, ...)

        '
  - patterns:
    - pattern: '"...".$METHOD(...)

        '
    - pattern-not: '"...".$METHOD("...")

        '
    - pattern-not: '"...".$METHOD(/.../)

        '
    - metavariable-regex:
        metavariable: $METHOD
        regex: ^(match|search)$
  message: "The `RegExp` constructor was called with a non-literal value. If an adversary\
    \ were able to\nsupply a malicious regex, they could cause a Regular Expression\
    \ Denial of Service (ReDoS)\nagainst the application. In Node applications, this\
    \ could cause the entire application to no\nlonger be responsive to other users'\
    \ requests.\n\nTo remediate this issue, never allow user-supplied regular expressions.\
    \ Instead, the regular \nexpression should be  hardcoded. If this is not possible,\
    \ consider using an alternative regular\nexpression engine such as [node-re2](https://www.npmjs.com/package/re2).\
    \ RE2 is a safe alternative \nthat does not support backtracking, which is what\
    \ leads to ReDoS.\n\nExample using re2 which does not support backtracking (Note:\
    \ it is still recommended to\nnever use user-supplied input):\n```\n// Import\
    \ the re2 module\nconst RE2 = require('re2');\n\nfunction match(userSuppliedRegex,\
    \ userInput) {\n    // Create a RE2 object with the user supplied regex, this\
    \ is relatively safe\n    // due to RE2 not supporting backtracking which can\
    \ be abused to cause long running\n    // queries\n    var re = new RE2(userSuppliedRegex);\n\
    \    // Execute the regular expression against some userInput\n    var result\
    \ = re.exec(userInput);\n    // Work with the result\n}\n```\n\nFor more information\
    \ on Regular Expression DoS see:\n- https://owasp.org/www-community/attacks/Regular_expression_Denial_of_Service_-_ReDoS\n"
  metadata:
    cwe: CWE-185
    shortDescription: Regular expression with non-literal value
    category: security
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: Medium
  severity: WARNING
