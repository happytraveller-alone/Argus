    - pattern: "function (...,$INPUT,...) {\n  ...\n  $OPTS = {sandbox: <... $INPUT\
        \ ...>};\n  ...\n  new NodeVM($OPTS,...);\n  ...\n}\n"
    - pattern: "function (...,$INPUT,...) {\n  ...\n  $CONTEXT = <... $INPUT ...>;\n\
