rules:
- id: balancer-readonly-reentrancy-getrate
  message: $VAR.getRate() call on a Balancer pool is not protected from the read-only
    reentrancy.
  metadata:
    category: security
    technology:
    - solidity
    cwe: 'CWE-841: Improper Enforcement of Behavioral Workflow'
    confidence: HIGH
    likelihood: MEDIUM
    impact: HIGH
    subcategory:
    - vuln
    references:
    - https://forum.balancer.fi/t/reentrancy-vulnerability-scope-expanded/4345
  patterns:
  - pattern: "function $F(...) {\n  ...\n  $VAR.getRate();\n  ...\n}\n"
  - pattern-not-inside: "function $F(...) {\n  ...\n  VaultReentrancyLib.ensureNotInVaultContext(...);\n\
      \  ...\n}\n"
  - pattern-not-inside: "function $F(...) {\n  ...\n  $VAULT.manageUserBalance(...);\n\
      \  ...\n}\n"
  - pattern-not-inside: "function _updateTokenRateCache(...) {\n  ...\n}\n"
  - pattern-not-inside: "contract PoolRecoveryHelper {\n  ...\n}\n"
  - pattern-not-inside: "contract ComposableStablePoolRates {\n  ...\n}\n"
  - pattern-not-inside: "contract WeightedPoolProtocolFees {\n  ...\n}\n"
  - pattern-not-inside: "contract $C {\n  ...\n  function $CHECKFUNC(...) {\n    ...\n\
      \    VaultReentrancyLib.ensureNotInVaultContext(...);\n    ...\n  }\n  ...\n\
      \  function $F(...) {\n    ...\n    $CHECKFUNC(...);\n    ...\n    $VAR.getRate();\n\
      \    ...\n  }\n  ...\n}\n"
  - pattern-not-inside: "contract $C {\n  ...\n  function $CHECKFUNC(...) {\n    ...\n\
      \    VaultReentrancyLib.ensureNotInVaultContext(...);\n    ...\n  }\n  ...\n\
      \  function $F(...) {\n    ...\n    $VAR.getRate();\n    ...\n    $CHECKFUNC(...);\n\
      \    ...\n  }\n  ...\n}\n"
  - pattern-not-inside: "contract $C {\n  ...\n  function $CHECKFUNC(...) {\n    ...\n\
      \    $VAULT.manageUserBalance(...);\n    ...\n  }\n  ...\n  function $F(...)\
      \ {\n    ...\n    $VAR.getRate();\n    ...\n    $CHECKFUNC(...);\n    ...\n\
      \  }\n  ...\n}\n"
  - pattern-not-inside: "contract $C {\n  ...\n  function $CHECKFUNC(...) {\n    ...\n\
      \    $VAULT.manageUserBalance(...);\n    ...\n  }\n  ...\n  function $F(...)\
      \ {\n    ...\n    $CHECKFUNC(...);\n    ...\n    $VAR.getRate();\n    ...\n\
      \  }\n  ...\n}\n"
  - focus-metavariable: $VAR
  languages:
  - solidity
  severity: ERROR
