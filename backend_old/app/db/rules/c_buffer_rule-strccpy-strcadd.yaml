rules:
- id: c_buffer_rule-strccpy-strcadd
  languages:
  - c
  - cpp
  message: 'The `strccpy` and `strcadd` functions do not allow the caller to check
    that the destination

    size

    of the buffer will fit the input buffer prior to copying.


    For more information please see:

    https://docs.oracle.com/cd/E18752_01/html/816-5172/streadd-3gen.html

    '
  metadata:
    shortDescription: Insecure string processing functions
    cwe: CWE-120
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: High
    category: security
  pattern-either:
  - pattern: strccpy(...)
  - pattern: strcadd(...)
  severity: INFO
