rules:
- id: odd-bitwise
  patterns:
  - pattern-either:
    - pattern: $X | $X
    - pattern: $X | ^$X
    - pattern: ^$X | $X
    - pattern: $X & $X
    - pattern: $X & ^$X
    - pattern: ^$X & $X
    - pattern: $X &^ $X
  message: Odd bitwise expression
  languages:
  - go
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-571: Expression is Always True/False'
    - 'CWE-682: Incorrect Calculation'
