rules:
- id: spring-unvalidated-redirect_1
  languages:
  - java
  message: Application redirects a user to a destination URL specified by a user supplied
    parameter that is not validated.
  metadata:
    category: security
    confidence: MEDIUM
    cwe:
    - 'CWE-601: URL Redirection to Untrusted Site (''Open Redirect'')'
    impact: MEDIUM
    likelihood: MEDIUM
    owasp:
    - A01:2021 - Broken Access Control
    references:
    - https://owasp.org/Top10/A01_2021-Broken_Access_Control
    source-rule-url: https://find-sec-bugs.github.io/bugs.htm#UNVALIDATED_REDIRECT
    subcategory:
    - vuln
    technology:
    - spring
  pattern-either:
  - pattern: "$X $METHOD(...,String $URL,...) {\n  return \"redirect:\" + $URL;\n\
      }\n"
  - pattern: "$X $METHOD(...,String $URL,...) {\n  ...\n  String $REDIR = \"redirect:\"\
      \ + $URL;\n  ...\n  return $REDIR;\n  ...\n}\n"
  - pattern: "$X $METHOD(...,String $URL,...) {\n  ...\n  new ModelAndView(\"redirect:\"\
      \ + $URL);\n  ...\n}\n"
  - pattern: "$X $METHOD(...,String $URL,...) {\n  ...\n  String $REDIR = \"redirect:\"\
      \ + $URL;\n  ...\n  new ModelAndView($REDIR);\n  ...\n}"
  severity: WARNING
