rules:
- id: java_xml_rule-XmlDecoder_1
  languages:
  - java
  message: "Deserialization attacks exploit the process of reading serialized data\
    \ and turning it back\ninto an object. By constructing malicious objects and serializing\
    \ them, an adversary may\nattempt to:\n\n- Inject code that is executed upon object\
    \ construction, which occurs during the\ndeserialization process.\n- Exploit mass\
    \ assignment by including fields that are not normally a part of the serialized\n\
    data but are read in during deserialization.\n\nConsider safer alternatives such\
    \ as serializing data in the JSON format. Ensure any format\nchosen allows\nthe\
    \ application to specify exactly which object types are allowed to be deserialized.\n\
    Additionally, when\ndeserializing, never deserialize to base object types like\
    \ `Object` and only cast to the exact\nobject\ntype that is expected.\n\nTo protect\
    \ against mass assignment, only allow deserialization of the specific fields that\
    \ are\nrequired. If this is not easily done, consider creating an intermediary\
    \ type that\ncan be serialized with only the necessary fields exposed.\n\nDo note\
    \ that `XMLEncoder` and `XMLDecoder` are not recommended. If the application must\n\
    use this serialization method, use a custom ClassLoader to prevent loading of\
    \ arbitrary\nclasses:\n```\nXMLDecoder decoder = new XMLDecoder(inputStream, null,\
    \ null, new ClassLoader() {\n    @Override\n    protected Class<?> loadClass(String\
    \ name, boolean resolve) throws ClassNotFoundException {\n        if (!name.equals(NameOfBeanHere.class.getName())\
    \ &&\n!name.equals(XMLDecoder.class.getName())) {\n            throw new RuntimeException(\"\
    Unauthorized deserialization attempt: \" + name);\n        }\n\n        return\
    \ super.loadClass(name, resolve);\n    }\n});\n```\n\nFor more information on\
    \ XML security see OWASP's guide:\nhttps://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html#java\n\
    \nFor more details on deserialization attacks in general, see OWASP's guide:\n\
    https://cheatsheetseries.owasp.org/cheatsheets/Deserialization_Cheat_Sheet.html\n\
    \nIt should be noted that [tools exist](https://github.com/frohoff/ysoserial)\
    \ to\nautomatically create\nexploit code for these vulnerabilities.\n"
  metadata:
    shortDescription: Deserialization of untrusted data
    category: security
    cwe: CWE-502
    owasp:
    - A8:2017-Insecure Deserialization
    - A08:2021-Software and Data Integrity Failures
    security-severity: High
  patterns:
  - pattern: '(java.beans.XMLDecoder $D).readObject();

      '
  - pattern-not:
      pattern-either:
      - patterns:
        - pattern-inside: 'java.beans.XMLDecoder $DEC = new java.beans.XMLDecoder(...,
            $CL);

            ...

            '
        - pattern: $DEC.readObject();
        - metavariable-pattern:
            metavariable: $CL
            patterns:
            - pattern: "new ClassLoader(){\n  ...\n  $RET loadClass(String name, boolean\
                \ resolve){\n    if($X){\n      throw ...\n    }\n    ...\n  }\n \
                \ ...\n}\n"
            - metavariable-pattern:
                metavariable: $X
                pattern-either:
                - pattern: '!name.equals(...)

                    '
                - pattern: '!$LIST.contains(name)

                    '
      - patterns:
        - pattern-inside: 'ClassLoader $CLASS_LOADER = $CL;

            ...

            java.beans.XMLDecoder $DEC = new java.beans.XMLDecoder(..., $CLASS_LOADER);

            ...

            '
        - pattern: $DEC.readObject();
        - metavariable-pattern:
            metavariable: $CL
            patterns:
            - pattern: "new ClassLoader(){\n  ...\n  $RET loadClass(String name, boolean\
                \ resolve){\n    if($X){\n      throw ...\n    }\n    ...\n  }\n \
                \ ...\n}\n"
            - metavariable-pattern:
                metavariable: $X
                pattern-either:
                - pattern: '!name.equals(...)

                    '
                - pattern: '!$LIST.contains(name)

                    '
  severity: WARNING
