rules:
- id: template-href-var
  message: "Detected a template variable used in an anchor tag with\nthe 'href' attribute.\
    \ This allows a malicious actor to \ninput the 'javascript:' URI and is subject\
    \ to cross-\nsite scripting (XSS) attacks. Use 'url_for()' to safely\ngenerate\
    \ a URL. You may also consider setting the Content \nSecurity Policy (CSP) header.\n"
  metadata:
    cwe: 'CWE-79: Improper Neutralization of Input During Web Page Generation (''Cross-site
      Scripting'')'
    owasp: 'A7: Cross-site Scripting (XSS)'
    references:
    - https://flask.palletsprojects.com/en/1.1.x/security/#cross-site-scripting-xss
    - https://content-security-policy.com/
  languages:
  - none
  paths:
    include:
    - '*.html'
  severity: WARNING
  pattern-regex: .*href\s*=\s*[\"\']?{{\s*(?!.*url_for).*
