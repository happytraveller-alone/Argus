rules:
- id: c_access_rule-umask
  languages:
  - c
  - cpp
  message: 'The umask function call sets the process''s file mode creation mask. umask
    values determine

    what permissions a file should be created with and who can read or write to these
    files.

    Ensure that umask is given most restrictive possible setting depending on the
    context,

    usually 066 or 077, for more information please see:

    https://en.wikipedia.org/wiki/Umask#Mask_effect.

    '
  metadata:
    shortDescription: Ensure restrictive umask values
    cwe: CWE-732
    owasp:
    - A6:2017-Security Misconfiguration
    - A05:2021-Security Misconfiguration
    security-severity: High
    category: security
  pattern: umask(...)
  severity: INFO
