rules:
- id: java_file_rule-FileUploadFileName_1
  languages:
  - java
  message: "The filename provided by the FileUpload API can be tampered with\nwhich\
    \ could lead to unauthorized access or file inclusion vulnerabilities.\nTo mitigate\
    \ this risk, it is essential to conduct rigorous validation of the\nfilenames\
    \ provided by clients. This validation should ensure that the filename\nadheres\
    \ to a predefined structure, is devoid of potentially dangerous characters\n(such\
    \ as forward slashes / and backslashes \\), and corresponds to an authorized\n\
    file only.\n\nFor example, as a remediation strategy, the application could:\n\
    1. Sanitize Filenames: Create a function to sanitize filenames by removing\n \
    \  or replacing unauthorized characters, including path traversal sequences (../\
    \ or ..\\).\n2. Allowlist Validation: Implement a allowlist approach, allowing\
    \ only filenames\n   that match a specific pattern or are part of a predefined\
    \ list.\n3. Use Server-Generated Filenames: Rather than relying on client-provided\
    \ filenames,\n   generate unique names server-side for storing files.\n4. Verify\
    \ File Paths: Ensure files are being saved in the correct,\n   intended directory,\
    \ and prevent redirection to unauthorized directories.\n\nExample remediation:\n\
    ```\n  public class FileUploadHandler {\n\n        protected void doPost(HttpServletRequest\
    \ request, HttpServletResponse response)\n              throws ServletException,\
    \ IOException {\n\n          Part filePart = request.getPart(\"file\");\n    \
    \      String fileName = filePart.getSubmittedFileName();\n\n          // removes\
    \ any path information from the filename\n          String sanitizedFileName =\
    \ sanitizeFileName(fileName);\n          if (!isFileNameAllowed(sanitizedFileName))\
    \ {\n              throw new SecurityException(\"Invalid file name\");\n     \
    \     }\n\n          // Generate a unique file name for storage\n          String\
    \ storedFileName = UUID.randomUUID().toString() + \".txt\";\n\n          Path\
    \ targetPath = Paths.get(\"uploads\").resolve(storedFileName);\n          Files.copy(fileContent,\
    \ targetPath, StandardCopyOption.REPLACE_EXISTING);\n      }\n\n      private\
    \ String sanitizeFileName(String fileName) {\n          return Paths.get(fileName).getFileName().toString();\n\
    \      }\n\n      private boolean isFileNameAllowed(String fileName) {\n     \
    \     return fileName.matches(\"[a-zA-Z0-9._-]+\");\n      }\n  }\n```\n"
  pattern-either:
  - patterns:
    - pattern-inside: "$FILES = (ServletFileUpload $SFU).parseRequest(($X.servlet.http.HttpServletRequest\
        \ $REQ));\n...\nfor(FileItem $ITEM : $FILES) {\n  ...\n}\n"
    - pattern: $ITEM.getName()
  - pattern: ($X.servlet.http.Part $PART).getSubmittedFileName()
  metadata:
    shortDescription: Improper limitation of a pathname to a restricted directory
      ('Path Traversal')
    cwe: CWE-22
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    security-severity: Info
    category: security
    technology:
    - java
  severity: WARNING
