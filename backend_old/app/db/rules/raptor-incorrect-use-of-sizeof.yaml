rules:
- id: raptor-incorrect-use-of-sizeof
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/467
    - https://g.co/kgs/PCHQjJ
    - https://github.com/struct/mms
    - https://dustri.org/b/playing-with-weggli.html
    - https://mastodon.gamedev.place/@amonakov/111577826195014479
    - https://github.com/semgrep/semgrep/issues/11327
    confidence: MEDIUM
    cwe:
    - 'CWE-467: Use of sizeof on a pointer type'
    - 'CWE-131: Incorrect Calculation of Buffer Size'
    - 'CWE-119: Improper Restriction of Operations within the Bounds of a Memory Buffer'
    - 'CWE-122: Heap-based Buffer Overflow'
  message: The code calls sizeof() on a malloced pointer type, which always returns
    the wordsize (8 on 64-bit architectures). This can produce  an unexpected result
    if the programmer intended to determine how  much memory has been allocated.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - patterns:
    - pattern: sizeof((char * $_))
    - pattern-not: sizeof("...")
  - pattern: sizeof((int * $_))
  - pattern: sizeof((float * $_))
  - pattern: sizeof((double * $_))
  - patterns:
    - pattern: sizeof($PTR)
    - pattern-either:
      - pattern-inside: '$_ * $PTR;

          ...

          '
      - pattern-inside: '$_ * $PTR = $_;

          ...

          '
