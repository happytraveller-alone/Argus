rules:
- id: gcp-cloud-storage-logging
  patterns:
  - pattern: "resource \"google_storage_bucket\" $ANYTHING {\n  ...\n}\n"
  - pattern-not-inside: "resource \"google_storage_bucket\" $ANYTHING {\n  ...\n \
      \ logging {\n      log_bucket = ...\n  }          \n  ...\n}\n"
  message: Ensure bucket logs access.
  languages:
  - hcl
  severity: WARNING
  metadata:
    owasp:
    - A10:2017 - Insufficient Logging & Monitoring
    - A09:2021 - Security Logging and Monitoring Failures
    cwe:
    - 'CWE-778: Insufficient Logging'
    technology:
    - terraform
    - gcp
    category: security
    references:
    - https://docs.bridgecrew.io/docs/google-cloud-policy-index
    subcategory:
    - vuln
    likelihood: LOW
    impact: LOW
    confidence: MEDIUM
