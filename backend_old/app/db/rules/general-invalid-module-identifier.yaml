rules:
- id: general-invalid-module-identifier
  patterns:
  - pattern: module "$MODULE_NAME" { ... }
  - metavariable-regex:
      metavariable: $MODULE_NAME
      regex: (\A[\w-]*[^\w-]+[\w-]*\Z)
  message: 'This Terraform configuration uses a module name that is not a valid HCL
    identifier.


    The HCL specification defines the identifier format at https://github.com/hashicorp/hcl/blob/main/hclsyntax/spec.md#identifiers.


    This may have security implications related to https://discuss.hashicorp.com/t/hcsec-2023-27-terraform-allows-arbitrary-file-write-during-init-operation/58082,
    or may cause errors when run with Terraform 1.5.7 or newer.

    '
  languages:
  - terraform
  severity: ERROR
  metadata:
    cwe:
    - 'CWE-20: Improper Input Validation'
    - 'CWE-73: External Control of File Name or Path'
    - 'CWE-22: Path Traversal'
