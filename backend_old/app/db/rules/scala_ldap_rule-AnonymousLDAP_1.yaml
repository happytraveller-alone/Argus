rules:
- id: scala_ldap_rule-AnonymousLDAP_1
  languages:
  - scala
  message: 'Without proper access control, executing an LDAP statement that contains
    a

    user-controlled value can allow an attacker to abuse poorly configured LDAP

    context

    '
  metadata:
    category: security
    cwe: CWE-20
    shortDescription: Improper Input Validation
    security-severity: Info
  patterns:
  - pattern-inside: 'import javax.naming.Context;

      ...

      '
  - pattern: $ENV.put(Context.SECURITY_AUTHENTICATION, "none");
  severity: WARNING
