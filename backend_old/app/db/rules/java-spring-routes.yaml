rules:
- id: java-spring-routes
  languages:
  - java
  severity: INFO
  patterns:
  - pattern-inside: '@Controller

      public class $CONTROLLER { ... }

      '
  - pattern-either:
    - pattern: '@Secured($SECURE)

        @RequestMapping(value = $VALUE, method = $HTTPMETHOD)

        @Authorize($AUTHZ)

        public $RETURNTYPE $METHOD(...) { ...}

        '
    - pattern: '@Secured($SECURE)

        @RequestMapping(method = $HTTPMETHOD)

        @Authorize($AUTHZ)

        public $RETURNTYPE $METHOD(...) { ...}

        '
    - pattern: "@Secured($SECURE)\n@RequestMapping(method = $HTTPMETHOD, value = $PATH)\n\
        @Authorize($AUTHZ)\npublic $RETURNTYPE $METHOD(...) { ...}        \n"
    - pattern: "@Secured($SECURE)\n@RequestMapping(method = $HTTPMETHOD)\npublic $RETURNTYPE\
        \ $METHOD(...) { ...}           \n"
    - pattern: '@Secured($SECURE)

        @RequestMapping(value = $PATH, method = $HTTPMETHOD)

        public $RETURNTYPE $METHOD(...) { ...}

        '
    - pattern: '@Secured($SECURE)

        @PostMapping($PATH)

        public $RETURNTYPE $METHOD(...) { ...}

        '
    - pattern: '@RequestMapping(value = $VALUE, method = $HTTPMETHOD)

        @Authorize($AUTHZ)

        public $RETURNTYPE $METHOD(...) { ...}

        '
    - pattern: '@RequestMapping(method = $HTTPMETHOD)

        @Authorize($AUTHZ)

        public $RETURNTYPE $METHOD(...) { ...}

        '
    - pattern: "@RequestMapping(method = $HTTPMETHOD, value = $PATH)\n@Authorize($AUTHZ)\n\
        public $RETURNTYPE $METHOD(...) { ...}        \n"
    - pattern: "@RequestMapping(method = $HTTPMETHOD)\npublic $RETURNTYPE $METHOD(...)\
        \ { ...}           \n"
    - pattern: '@RequestMapping(value = $PATH, method = $HTTPMETHOD)

        public $RETURNTYPE $METHOD(...) { ...}

        '
    - pattern: '@PostMapping($PATH)

        public $RETURNTYPE $METHOD(...) { ...}

        '
  message: '$METHOD(),$PATH,$HTTPMETHOD,$SECURE

    '
  metadata:
    cwe:
    - 'CWE-285: Improper Authorization'
    - 'CWE-287: Improper Authentication'
    - 'CWE-306: Missing Authentication for Critical Function'
    - 'CWE-200: Exposure of Sensitive Information to an Unauthorized Actor'
