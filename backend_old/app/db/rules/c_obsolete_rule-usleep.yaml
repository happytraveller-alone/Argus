rules:
- id: c_obsolete_rule-usleep
  languages:
  - c
  - cpp
  message: 'The `usleep` function has been deprecated, use `nanosleep` or `setitimer`
    instead.


    For more information please see: https://linux.die.net/man/3/setitimer

    '
  metadata:
    shortDescription: Usage of deprecated function (usleep)
    cwe: CWE-676
    owasp:
    - A9:2017-Using Components with Known Vulnerabilities
    - A06:2021-Vulnerable and Outdated Components
    security-severity: Info
    category: security
  pattern: usleep(...)
  severity: INFO
