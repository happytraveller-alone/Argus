rules:
- id: direct-use-of-jinja2
  message: "Detected direct use of jinja2 in a Flask route. If not done properly,\n\
    this may bypass HTML escaping which opens up the application to \ncross-site scripting\
    \ (XSS) vulnerabilities. Prefer using the Flask\nmethod 'render_template()' and\
    \ templates with a '.html' extension\nin order to prevent XSS.\n"
  metadata:
    cwe: 'CWE-79: Improper Neutralization of Input During Web Page Generation (''Cross-site
      Scripting'')'
    owasp: 'A7: Cross-site Scripting (XSS)'
    references:
    - https://jinja.palletsprojects.com/en/2.11.x/api/#basics
  languages:
  - python
  severity: WARNING
  patterns:
  - pattern-inside: "@$APP.route(...)\ndef $FUNC(...):\n  ...\n"
  - pattern: $TEMPLATE.render(...)
