# =============================================
# Sandbox Runner 专用构建配置
# =============================================
# 使用方式: docker compose -f docker-compose.yml -f docker-compose.sandbox-runner.yml build sandbox-runner
# 或: docker compose -f docker-compose.yml -f docker-compose.sandbox-runner.yml up --build

services:
  # Sandbox Runner - 按需加载的轻量级代码执行镜像
  sandbox-runner:
    build:
      context: .
      dockerfile: docker/sandbox-runner.Dockerfile
      args:
        - DOCKERHUB_LIBRARY_MIRROR=${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}
        - SANDBOX_RUNNER_APT_MIRROR_PRIMARY=${SANDBOX_RUNNER_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
        - SANDBOX_RUNNER_APT_SECURITY_PRIMARY=${SANDBOX_RUNNER_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
        - SANDBOX_RUNNER_APT_MIRROR_FALLBACK=${SANDBOX_RUNNER_APT_MIRROR_FALLBACK:-deb.debian.org}
        - SANDBOX_RUNNER_APT_SECURITY_FALLBACK=${SANDBOX_RUNNER_APT_SECURITY_FALLBACK:-security.debian.org}
        - SANDBOX_RUNNER_PYPI_INDEX_PRIMARY=${SANDBOX_RUNNER_PYPI_INDEX_PRIMARY:-https://mirrors.aliyun.com/pypi/simple/}
        - SANDBOX_RUNNER_NPM_REGISTRY=${SANDBOX_RUNNER_NPM_REGISTRY:-https://registry.npmmirror.com}
    image: vulhunter/sandbox-runner:latest
    profiles: ["build", "sandbox-runner"]
    restart: "no"
    command: ["python3", "-c", "import requests; import httpx; import jwt; print('✅ Sandbox Runner OK')"]

  # 预热服务 (可选) - 在 backend 启动前拉取镜像
  sandbox-runner-warmup:
    image: vulhunter/sandbox-runner:latest
    profiles: ["warmup"]
    command: ["true"]
    restart: "no"

# 环境变量配置示例
# 在 .env 或 docker/env/backend_old/.env 中添加:
# SANDBOX_RUNNER_ENABLED=true
# SANDBOX_RUNNER_IMAGE=vulhunter/sandbox-runner:latest
# SANDBOX_RUNNER_TIMEOUT=60
