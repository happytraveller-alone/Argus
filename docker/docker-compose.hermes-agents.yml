# Hermes Agent Services — 四个角色容器（Standalone 备选）
# 主 compose (docker-compose.yml) 已包含这些服务。
# 此文件仅用于独立启动 hermes agents（需先启动主 compose 创建 vulhunter-network）。
# 启动前请将各角色目录下的 container.env.example 复制为 container.env
# docker compose -f docker/docker-compose.hermes-agents.yml up

x-hermes-build-args: &hermes-build-args
  VCS_REF: ${VCS_REF:-9ad582542ceab35bcf361e5e949b7e23d1cd35bb}
  HERMES_UPSTREAM_SHA: ${HERMES_UPSTREAM_SHA:-bf196a3fc0fd1f79353369e8732051db275c6276}
  HERMES_SUBMODULE_STATUS: ${HERMES_SUBMODULE_STATUS:-third_party/hermes-agent=bf196a3fc0fd1f79353369e8732051db275c6276;third_party/hermes-agent/tinker-atropos=65f084ee8054a5d02aeac76e24ed60388511c82b}
  HERMES_SOURCE_DIGEST: ${HERMES_SOURCE_DIGEST:-sha256:e0c66b8305e844fcf469412d99f0016f35382d3bc1f04159a61319c67a5f63fc}

services:
  hermes-recon:
    build:
      context: ..
      dockerfile: docker/hermes-agent-base.Dockerfile
      args: *hermes-build-args
    image: vulhunter/hermes-agent:latest
    container_name: hermes-recon
    restart: unless-stopped
    mem_limit: 2g
    volumes:
      - ../backend/agents/recon/data:/opt/data
      - ../backend/agents/recon/hermes-home:/opt/seed:ro
      - ${PROJECT_SOURCE_PATH:-..}:/scan:ro
    env_file:
      - path: ../backend/agents/recon/container.env
        required: false
    healthcheck:
      test: ["CMD", "sh", "/opt/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 5
    networks:
      - vulhunter-network

  hermes-analysis:
    build:
      context: ..
      dockerfile: docker/hermes-agent-base.Dockerfile
      args: *hermes-build-args
    image: vulhunter/hermes-agent:latest
    container_name: hermes-analysis
    restart: unless-stopped
    mem_limit: 2g
    volumes:
      - ../backend/agents/analysis/data:/opt/data
      - ../backend/agents/analysis/hermes-home:/opt/seed:ro
      - ${PROJECT_SOURCE_PATH:-..}:/scan:ro
    env_file:
      - path: ../backend/agents/analysis/container.env
        required: false
    healthcheck:
      test: ["CMD", "sh", "/opt/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 5
    networks:
      - vulhunter-network

  hermes-verification:
    build:
      context: ..
      dockerfile: docker/hermes-agent-base.Dockerfile
      args: *hermes-build-args
    image: vulhunter/hermes-agent:latest
    container_name: hermes-verification
    restart: unless-stopped
    mem_limit: 2g
    volumes:
      - ../backend/agents/verification/data:/opt/data
      - ../backend/agents/verification/hermes-home:/opt/seed:ro
      - ../backend/agents/verification/scratch:/opt/scratch
      - ${PROJECT_SOURCE_PATH:-..}:/scan:ro
    env_file:
      - path: ../backend/agents/verification/container.env
        required: false
    healthcheck:
      test: ["CMD", "sh", "/opt/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 5
    networks:
      - vulhunter-network

  hermes-report:
    build:
      context: ..
      dockerfile: docker/hermes-agent-base.Dockerfile
      args: *hermes-build-args
    image: vulhunter/hermes-agent:latest
    container_name: hermes-report
    restart: unless-stopped
    mem_limit: 2g
    volumes:
      - ../backend/agents/report/data:/opt/data
      - ../backend/agents/report/hermes-home:/opt/seed:ro
      - ../backend/agents/report/output:/opt/output
      - ${PROJECT_SOURCE_PATH:-..}:/scan:ro
    env_file:
      - path: ../backend/agents/report/container.env
        required: false
    healthcheck:
      test: ["CMD", "sh", "/opt/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 5
    networks:
      - vulhunter-network

networks:
  vulhunter-network:
    external: true
