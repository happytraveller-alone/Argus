# =============================================
# VulHunter Podman 手动覆盖层（可选）
# =============================================
# 通常情况下，无需使用此文件。
# 推荐方式（一次性配置，之后 docker/podman compose 命令完全等效）：
#
#   bash scripts/setup-env.sh   # 自动探测 Podman socket 并写入根 .env
#
# 写入后，以下两条命令效果完全相同：
#   docker compose -f docker-compose.yml -f docker-compose.hybrid.yml up --build
#   podman compose -f docker-compose.yml -f docker-compose.hybrid.yml up --build
#
# ──────────────────────────────────────────────────────────────────────────────
# 此覆盖文件仅在以下场景中有用：
#   - 临时测试特定的 Podman socket 路径（不想修改 .env）
#   - 在 CI/CD 中通过 PODMAN_SOCKET_PATH 环境变量注入 socket（无 .env）
#
# 用法（显式指定 socket）：
#   PODMAN_SOCKET_PATH=/run/podman/podman.sock \
#   podman compose \
#     -f docker-compose.yml \
#     -f docker-compose.hybrid.yml \
#     -f docker-compose.podman.yml up --build
#
# ──────────────────────────────────────────────────────────────────────────────
# 需求:
#   - Podman 4.7+（内置 compose-go，支持 !override）
#   - Podman socket 已启动: sudo systemctl enable --now podman.socket
# ──────────────────────────────────────────────────────────────────────────────

services:
  backend:
    # 此覆盖文件不使用 !override，仅追加环境变量
    # socket 挂载由基础 compose 中的 DOCKER_SOCKET_PATH 变量控制
    environment:
      # 告知容器内 docker-py / docker CLI 连接到挂载后的 socket 路径
      DOCKER_HOST: "unix:///var/run/docker.sock"
      CONTAINER_CLI: ${CONTAINER_CLI:-docker}
