services:
  frontend:
    image: ${STATIC_FRONTEND_IMAGE:-${DOCKERHUB_LIBRARY_MIRROR:-docker.m.daocloud.io/library}/nginx:1.27-alpine}
    build: !reset null
    working_dir: !reset null
    command: !reset null
    volumes: !override
      - ./deploy/runtime/frontend/site:/usr/share/nginx/html:ro
      - ./deploy/runtime/frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports: !override
      - "${VULHUNTER_FRONTEND_PORT:-3000}:80"
    environment: !reset null
